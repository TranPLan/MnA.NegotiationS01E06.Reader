e we here to tour Japan? Come to your senses.","sourceUid":"nar-mrje109i-ckp46k","sourceNo":"N14","viRanges":[],"koRanges":[]},{"id":16,"readerNo":17,"displayNo":"N15","n":"N15","kind":"narration","type":"dialogue","vi":"Soonyoung: Nhìn này. (Sau khi phát hiện ra Hirose) Ah. Ông Jinsu đã sai.","ko":"순영:  이거 봐. (히로세를 발견하고) 아. 진수 씨가 잘못했네.","en":"Soonyoung: Look at this. (After discovering Hirose) Ah. Mr. Jinsu was wrong.","text":"Soonyoung: Nhìn này. (Sau khi phát hiện ra Hirose) Ah. Ông Jinsu đã sai.\n순영:  이거 봐. (히로세를 발견하고) 아. 진수 씨가 잘못했네.\nSoonyoung: Look at this. (After discovering Hirose) Ah. Mr. Jinsu was wrong.","sourceUid":"nar-mrje1hsl-98b2vw","sourceNo":"N15","viRanges":[],"koRanges":[]},{"id":17,"readerNo":18,"displayNo":"N16","n":"N16","kind":"narration","type":"dialogue","vi":"Jinsu: Tôi xin lỗi... Lần sau tôi sẽ không phạm sai lầm nữa...","ko":"진수:  죄송합니다... 다음엔 실수하지 않도록...","en":"Jinsu: I'm sorry... I won't make a mistake next time...","text":"Jinsu: Tôi xin lỗi... Lần sau tôi sẽ không phạm sai lầm nữa...\n진수:  죄송합니다... 다음엔 실수하지 않도록...\nJinsu: I'm sorry... I won't make a mistake next time...","sourceUid":"nar-mrje1ime-yp0s3s","sourceNo":"N16","viRanges":[],"koRanges":[]},{"id":18,"readerNo":19,"displayNo":"N17","n":"N17","kind":"narration","type":"dialogue","vi":"Soonyoung: Daum đâu rồi? Bạn không biết rằng nếu chúng ta không ký hợp đồng trước thứ Bảy thì sẽ là một vấn đề lớn sao?","ko":"순영:  다음이 어딨어? 우리 토요일까지 계약 못 하면, 큰일인 거 모르나?","en":"Soonyoung: Where is Daum? Don't you know that if we don't sign a contract by Saturday, it's a big problem?","text":"Soonyoung: Daum đâu rồi? Bạn không biết rằng nếu chúng ta không ký hợp đồng trước thứ Bảy thì sẽ là một vấn đề lớn sao?\n순영:  다음이 어딨어? 우리 토요일까지 계약 못 하면, 큰일인 거 모르나?\nSoonyoung: Where is Daum? Don't you know that if we don't sign a contract by Saturday, it's a big problem?","sourceUid":"nar-mrje1sk8-g9zya4","sourceNo":"N17","viRanges":[],"koRanges":[]},{"id":19,"readerNo":20,"displayNo":"N18","n":"N18","kind":"narration","type":"dialogue","vi":"Jinsu: Tôi sẽ cố gắng hết sức...!","ko":"진수:  제가 어떻게든 해보겠습니다...!","en":"Jinsu: I will try my best...!","text":"Jinsu: Tôi sẽ cố gắng hết sức...!\n진수:  제가 어떻게든 해보겠습니다...!\nJinsu: I will try my best...!","sourceUid":"nar-mrje1t6f-xx4kvw","sourceNo":"N18","viRanges":[],"koRanges":[]},{"id":20,"readerNo":21,"displayNo":"N19","n":"N19","kind":"narration","type":"dialogue","vi":"Minjeong: Jinsu, anh định làm gì thế?! Nếu bạn là người trẻ nhất, hãy hành động như người trẻ nhất.","ko":"민정:  진수 씨가 뭘 어떻게 하겠다는 거예요?! 막내면 막내답게 행동하세요.","en":"Minjeong: Jinsu, what are you going to do?! If you are the youngest, act like the youngest.","text":"Minjeong: Jinsu, anh định làm gì thế?! Nếu bạn là người trẻ nhất, hãy hành động như người trẻ nhất.\n민정:  진수 씨가 뭘 어떻게 하겠다는 거예요?! 막내면 막내답게 행동하세요.\nMinjeong: Jinsu, what are you going to do?! If you are the youngest, act like the youngest.","sourceUid":"nar-mrje1yf5-lbs1nd","sourceNo":"N19","viRanges":[],"koRanges":[]},{"id":21,"readerNo":22,"displayNo":"N20","n":"N20","kind":"narration","type":"dialogue","vi":"Jinsu: ...hiện tại cậu đang diễn à?","ko":"진수:  ...지금 연기하시는 거 맞아요?","en":"Jinsu: ...are you acting right now?","text":"Jinsu: ...hiện tại cậu đang diễn à?\n진수:  ...지금 연기하시는 거 맞아요?\nJinsu: ...are you acting right now?","sourceUid":"nar-mrje1za5-071hta","sourceNo":"N20","viRanges":[],"koRanges":[]},{"id":22,"readerNo":23,"displayNo":"N21","n":"N21","kind":"narration","type":"narration","vi":"Hirose nhìn thấy Jinsu bị Minjeong mắng. Anh ấy trông có vẻ tiếc nuối.","ko":"진수가 민정에게 혼나는 모습을 본 히로세. 미안한 표정이다.","en":"Hirose sees Jinsu getting scolded by Minjeong. He looks sorry.","text":"Hirose nhìn thấy Jinsu bị Minjeong mắng. Anh ấy trông có vẻ tiếc nuối.\n진수가 민정에게 혼나는 모습을 본 히로세. 미안한 표정이다.\nHirose sees Jinsu getting scolded by Minjeong. He looks sorry.","sourceUid":"nar-mrje1zzx-7vsjbr","sourceNo":"N21","viRanges":[],"koRanges":[]},{"id":23,"readerNo":24,"displayNo":"N22","n":"N22","kind":"narration","type":"narration","vi":"Quán cà phê (ban ngày)","ko":"커피숍 ( 낮 )","en":"Coffee shop (daytime)","text":"Quán cà phê (ban ngày)\n커피숍 ( 낮 )\nCoffee shop (daytime)","sourceUid":"nar-mrje21nk-b9lth3","sourceNo":"N22","viRanges":[],"koRanges":[]},{"id":24,"readerNo":25,"displayNo":"N23","n":"N23","kind":"narration","type":"narration","vi":"Jinsu đang xem Instagram của Hirose.","ko":"진수가 히로세의 인스타그램을 살펴보고 있다.","en":"Jinsu is looking at Hirose’s Instagram.","text":"Jinsu đang xem Instagram của Hirose.\n진수가 히로세의 인스타그램을 살펴보고 있다.\nJinsu is looking at Hirose’s Instagram.","sourceUid":"nar-mrje23ct-ae4mpr","sourceNo":"N23","viRanges":[],"koRanges":[]},{"id":25,"readerNo":26,"displayNo":"N24","n":"N24","kind":"narration","type":"narration","vi":"Sau khi cuộn xuống nguồn cấp dữ liệu một lúc, nó dừng lại ở một bức ảnh được chụp ở Sinchon.","ko":"피드를 한참 내리다가, 신촌에서 찍은 사진에서 멈춘다.","en":"After scrolling down the feed for a while, it stops at a photo taken in Sinchon.","text":"Sau khi cuộn xuống nguồn cấp dữ liệu một lúc, nó dừng lại ở một bức ảnh được chụp ở Sinchon.\n피드를 한참 내리다가, 신촌에서 찍은 사진에서 멈춘다.\nAfter scrolling down the feed for a while, it stops at a photo taken in Sinchon.","sourceUid":"nar-mrje24pj-juex8k","sourceNo":"N24","viRanges":[],"koRanges":[]},{"id":26,"readerNo":27,"displayNo":"N25","n":"N25","kind":"narration","type":"narration","vi":"Và những bức ảnh sau đây.","ko":"그리고 이어지는 사진들.","en":"And the following photos.","text":"Và những bức ảnh sau đây.\n그리고 이어지는 사진들.\nAnd the following photos.","sourceUid":"nar-mrje26t6-81y1n2","sourceNo":"N25","viRanges":[],"koRanges":[]},{"id":27,"readerNo":28,"displayNo":"N26","n":"N26","kind":"narration","type":"narration","vi":"Đây là hình ảnh Hirose đang theo học tại một trường ngoại ngữ.","ko":"어학당을 다닌 히로세의 모습들이다.","en":"These are images of Hirose attending a language school.","text":"Đây là hình ảnh Hirose đang theo học tại một trường ngoại ngữ.\n어학당을 다닌 히로세의 모습들이다.\nThese are images of Hirose attending a language school.","sourceUid":"nar-mrje28dh-1y8edt","sourceNo":"N26","viRanges":[],"koRanges":[]},{"id":28,"readerNo":29,"displayNo":"N27","n":"N27","kind":"narration","type":"narration","vi":"Và rồi, cánh cửa mở ra với một tiếng chuông ‘reng’… Đó là Hirose.","ko":"그리고, ‘딸랑’ 하는 종소리와 함께 문이 열리고... 히로세다.","en":"And then, the door opens with a ‘ringing’ bell sound… It’s Hirose.","text":"Và rồi, cánh cửa mở ra với một tiếng chuông ‘reng’… Đó là Hirose.\n그리고, ‘딸랑’ 하는 종소리와 함께 문이 열리고... 히로세다.\nAnd then, the door opens with a ‘ringing’ bell sound… It’s Hirose.","sourceUid":"nar-mrje29wl-15cnab","sourceNo":"N27","viRanges":[],"koRanges":[]},{"id":29,"readerNo":30,"displayNo":"N28","n":"N28","kind":"narration","type":"narration","vi":"Jinsu nhanh chóng tắt điện thoại và giả vờ như không để ý… rồi ngẩng đầu lên nhìn Hirose.","ko":"진수, 얼른 폰을 닫고, 모른 척하다가... 인기척에 고갤 들어 히로세를 본다.","en":"Jinsu quickly closes his phone and pretends not to notice... then raises his head and looks at Hirose.","text":"Jinsu nhanh chóng tắt điện thoại và giả vờ như không để ý… rồi ngẩng đầu lên nhìn Hirose.\n진수, 얼른 폰을 닫고, 모른 척하다가... 인기척에 고갤 들어 히로세를 본다.\nJinsu quickly closes his phone and pretends not to notice... then raises his head and looks at Hirose.","sourceUid":"nar-mrje2cec-g1ojax","sourceNo":"N28","viRanges":[],"koRanges":[]},{"id":30,"readerNo":31,"displayNo":"N29","n":"N29","kind":"narration","type":"narration","vi":"Đường phố (lúc hoàng hôn)","ko":"거리 ( 해 질 녘 )","en":"Street (at sunset)","text":"Đường phố (lúc hoàng hôn)\n거리 ( 해 질 녘 )\nStreet (at sunset)","sourceUid":"nar-mrje2eik-0234q9","sourceNo":"N29","viRanges":[],"koRanges":[]},{"id":31,"readerNo":32,"displayNo":"N30","n":"N30","kind":"narration","type":"narration","vi":"Jinsu và Hirose đang đi cạnh nhau.","ko":"진수와 히로세가 나란히 걷고 있다.","en":"Jinsu and Hirose are walking side by side.","text":"Jinsu và Hirose đang đi cạnh nhau.\n진수와 히로세가 나란히 걷고 있다.\nJinsu and Hirose are walking side by side.","sourceUid":"nar-mrje2h8a-jlydiq","sourceNo":"N30","viRanges":[],"koRanges":[]},{"id":32,"readerNo":33,"displayNo":11,"n":11,"kind":"sub","type":"merged","vi":"Chào cô.\nChào anh.\nChúng ta vào trong nhé?\nVâng, chúng ta vào trong thôi.\nXin lỗi anh.\nÀ, không sao đâu.\nCông việc mà.\nChỉ là tôi bị chơi xỏ một cú thôi.\nHình như là tôi đã chơi xỏ anh nhỉ.","ko":"들어갈까요?\n네 들어가시죠\n죄송합니다.\n아니에요. 일인데요.\n제가 한 방 먹은 거죠.\n제가 간 밥을 먹였네요.","en":"Hello. Shall we go in? Yes, let's go inside. I'm sorry. Oh, no. This is business. I just got played. That's all. I guess I played you.","text":"Chào cô.\nChào anh.\nChúng ta vào trong nhé?\nVâng, chúng ta vào trong thôi.\nXin lỗi anh.\nÀ, không sao đâu.\nCông việc mà.\nChỉ là tôi bị chơi xỏ một cú thôi.\nHình như là tôi đã chơi xỏ anh nhỉ.\n들어갈까요?\n네 들어가시죠\n죄송합니다.\n아니에요. 일인데요.\n제가 한 방 먹은 거죠.\n제가 간 밥을 먹였네요.\nHello. Shall we go in? Yes, let's go inside. I'm sorry. Oh, no. This is business. I just got played. That's all. I guess I played you.","sourceUid":"merged-mrgei6qw-4","sourceNo":11,"viRanges":[{"start":71,"end":81.57055}],"koRanges":[{"start":60,"end":92.405002},{"start":60,"end":71.974187},{"start":66.87,"end":69.04},{"start":68.85,"end":70.34},{"start":75.15,"end":76.4},{"start":77.71,"end":80.2},{"start":81.29,"end":83.3},{"start":85.05,"end":87.5}]},{"id":33,"readerNo":34,"displayNo":23,"n":23,"kind":"sub","type":"merged","vi":"","ko":"","en":"♫ Pretending to fool around, ♫\n♫ Beyond the words ♫\n♫ The scenery of the summer that is about to end ♫","text":"♫ Pretending to fool around, ♫\n♫ Beyond the words ♫\n♫ The scenery of the summer that is about to end ♫","sourceUid":"merged-mrgeidrz-5","sourceNo":23,"viRanges":[{"start":81.57055,"end":98.10186}],"koRanges":[]},{"id":34,"readerNo":35,"displayNo":14,"n":14,"kind":"sub","type":"merged","vi":"Hay để tôi đổi chỗ cho cô nhé? Khói thuốc như vậy có sao không?\nKhông sao đâu.\nAnh chu đáo quá.\nKhông đâu.","ko":"자리 바꿔드릴까요?\n담배 먹으면 괜찮으세요?\n괜찮아요.\n친절하시네요.","en":"Would you like to switch seats?\nAre you okay with the cigarette smoke?\nI'm fine.\nYou're kind.\nNo, no.","text":"Hay để tôi đổi chỗ cho cô nhé? Khói thuốc như vậy có sao không?\nKhông sao đâu.\nAnh chu đáo quá.\nKhông đâu.\n자리 바꿔드릴까요?\n담배 먹으면 괜찮으세요?\n괜찮아요.\n친절하시네요.\nWould you like to switch seats?\nAre you okay with the cigarette smoke?\nI'm fine.\nYou're kind.\nNo, no.","sourceUid":"merged-mrgene3r-8","sourceNo":14,"viRanges":[{"start":98.10186,"end":115.090176}],"koRanges":[{"start":95.59,"end":97.42},{"start":97.39,"end":103.436029},{"start":97.39,"end":99.16},{"start":99.07,"end":99.92},{"start":101.31,"end":102.56}]},{"id":35,"readerNo":36,"displayNo":29,"n":29,"kind":"sub","type":"en","vi":"","ko":"","en":"♫ You intertwine your fingers with mine ♫","text":"♫ You intertwine your fingers with mine ♫","sourceUid":"en-mrfx1did-1723","sourceNo":29,"viRanges":[],"koRanges":[]},{"id":36,"readerNo":37,"displayNo":17,"n":17,"kind":"sub","type":"merged","vi":"Mà cô học tiếng Hàn ở đâu vậy?\nTôi học ở đại học Yonsei.\nỞ Sinchon à? Chỗ trung tâm ngôn ngữ của trường hả?\nTôi cũng học ở đại học Yonsei này.","ko":"근데 한국말은 어떻게 배우셨어요?\n아, 연세대에서\n신촌이요? 어학당?\n저도 연세대인데","en":"But how did you learn Korean?\nI learned it at Yonsei University.\nIn Sinchon? At the language school?\nI also went to Yonsei University.","text":"Mà cô học tiếng Hàn ở đâu vậy?\nTôi học ở đại học Yonsei.\nỞ Sinchon à? Chỗ trung tâm ngôn ngữ của trường hả?\nTôi cũng học ở đại học Yonsei này.\n근데 한국말은 어떻게 배우셨어요?\n아, 연세대에서\n신촌이요? 어학당?\n저도 연세대인데\nBut how did you learn Korean?\nI learned it at Yonsei University.\nIn Sinchon? At the language school?\nI also went to Yonsei University.","sourceUid":"merged-mrgepwe9-10","sourceNo":17,"viRanges":[{"start":115.090176,"end":126.389586}],"koRanges":[{"start":106.67,"end":116.177371},{"start":106.67,"end":109.3},{"start":109.39,"end":111.26},{"start":111.01,"end":113.2},{"start":113.55,"end":115.62}]},{"id":37,"readerNo":38,"displayNo":21,"n":21,"kind":"sub","type":"merged","vi":"Thật sao? Tôi nhập học năm 2015.","ko":"아, 진짜요?\n전 15년대\n저도 1호 학번","en":"Really?\nI enrolled in 2015.","text":"Thật sao? Tôi nhập học năm 2015.\n아, 진짜요?\n전 15년대\n저도 1호 학번\nReally?\nI enrolled in 2015.","sourceUid":"merged-mrger98m-11","sourceNo":21,"viRanges":[{"start":126.389586,"end":128.947954}],"koRanges":[{"start":115.37,"end":116.74},{"start":116.94,"end":118.7},{"start":118.45,"end":119.66}]},{"id":38,"readerNo":39,"displayNo":24,"n":24,"kind":"sub","type":"merged","vi":"Tôi cũng là sinh viên khóa 15. Tôi đã đi nhậu ở Sinchon nhiều lắm.\nTôi cũng hay đi chơi ở Sinchon.","ko":"저 신촌에서 술 엄청 먹었어요\n저도 신촌에서 많이 놀았어요","en":"I also enrolled in 2015.\nI drank a lot in Sinchon.\nI also played a lot in Sinchon.","text":"Tôi cũng là sinh viên khóa 15. Tôi đã đi nhậu ở Sinchon nhiều lắm.\nTôi cũng hay đi chơi ở Sinchon.\n저 신촌에서 술 엄청 먹었어요\n저도 신촌에서 많이 놀았어요\nI also enrolled in 2015.\nI drank a lot in Sinchon.\nI also played a lot in Sinchon.","sourceUid":"merged-mrges7i6-12","sourceNo":24,"viRanges":[{"start":128.947954,"end":133.937352}],"koRanges":[{"start":119.41,"end":132.115864},{"start":119.41,"end":121.7},{"start":121.45,"end":123.52}]},{"id":39,"readerNo":40,"displayNo":28,"n":28,"kind":"sub","type":"merged","vi":"Chúng ta có thể đã gặp nhau rồi ấy chứ.\nĐúng vậy nhỉ.\nLúc đó tôi cứ tưởng chỉ cần có việc làm là xong.\nVâng.\nTôi cũng nhớ những ngày vui vẻ đó.","ko":"그때는 취직만 하면 되는 줄 알았는데\n네\n저도 그때가 참 좋았어요","en":"We may have met before. You're right. Back then, I thought all I needed was to get hired. Yes. I miss those days as well.","text":"Chúng ta có thể đã gặp nhau rồi ấy chứ.\nĐúng vậy nhỉ.\nLúc đó tôi cứ tưởng chỉ cần có việc làm là xong.\nVâng.\nTôi cũng nhớ những ngày vui vẻ đó.\n그때는 취직만 하면 되는 줄 알았는데\n네\n저도 그때가 참 좋았어요\nWe may have met before. You're right. Back then, I thought all I needed was to get hired. Yes. I miss those days as well.","sourceUid":"merged-mrgevcmf-13","sourceNo":28,"viRanges":[{"start":133,"end":158}],"koRanges":[{"start":139.47,"end":142.8},{"start":142.55,"end":144.12},{"start":143.87,"end":147.98}]},{"id":40,"readerNo":41,"displayNo":29,"n":29,"kind":"sub","type":"merged","vi":"Hay phải thoát khỏi vị trí em út trong đội mới đỡ vất vả hơn nhỉ? Chắc vậy quá.","ko":"막내만 벗어나면 덜 힘들까요?\n그러게요","en":"Would it get better once I'm no longer the maknae?\nI know, right?\nI'm also the maknae.","text":"Hay phải thoát khỏi vị trí em út trong đội mới đỡ vất vả hơn nhỉ? Chắc vậy quá.\n막내만 벗어나면 덜 힘들까요?\n그러게요\nWould it get better once I'm no longer the maknae?\nI know, right?\nI'm also the maknae.","sourceUid":"merged-mrgexv35-14","sourceNo":29,"viRanges":[{"start":133.937352,"end":158.399574},{"start":158,"end":166.259529}],"koRanges":[{"start":150.46,"end":150.51000000000002},{"start":154.76,"end":155.55}]},{"id":41,"readerNo":42,"displayNo":31,"n":31,"kind":"sub","type":"merged","vi":"Tôi cũng là em út trong đội mà.\nThôi nào.\nMặc dù đều là em út, nhưng cô Hirose và tôi khác nhau mà.\nTôi đã bị cô Hirose cho một vố còn gì.\nCô Hirose được khen, còn tôi thì bị mắng.","ko":"저도 막내라서\n에이\n같은 막내라도 히로세 씨랑 저는 다르죠\n히로세 씨한테 한 방 먹었잖아요\n베르사 씨는 칭찬 듣고 나는 욕먹","en":"Come on.\nThough we're both maknaes, you and I are different.\nI got played by you, Hirose.\nYou were praised, but I got yelled at.","text":"Tôi cũng là em út trong đội mà.\nThôi nào.\nMặc dù đều là em út, nhưng cô Hirose và tôi khác nhau mà.\nTôi đã bị cô Hirose cho một vố còn gì.\nCô Hirose được khen, còn tôi thì bị mắng.\n저도 막내라서\n에이\n같은 막내라도 히로세 씨랑 저는 다르죠\n히로세 씨한테 한 방 먹었잖아요\n베르사 씨는 칭찬 듣고 나는 욕먹\nCome on.\nThough we're both maknaes, you and I are different.\nI got played by you, Hirose.\nYou were praised, but I got yelled at.","sourceUid":"merged-mrgfa3ov-16","sourceNo":31,"viRanges":[{"start":166.259529,"end":181.66632},{"start":166.259529,"end":178.229569}],"koRanges":[{"start":150.51000000000002,"end":173.525562},{"start":155.3,"end":158.31},{"start":159.34,"end":160.67},{"start":160.42,"end":163.95},{"start":163.7,"end":166.27},{"start":168.54,"end":171.91}]},{"id":42,"readerNo":43,"displayNo":51,"n":51,"kind":"sub","type":"en","vi":"","ko":"","en":"♫ Until dawn, oh yeah, oh yeah, oh yeah ♫","text":"♫ Until dawn, oh yeah, oh yeah, oh yeah ♫","sourceUid":"en-mrfx1did-1745","sourceNo":51,"viRanges":[],"koRanges":[]},{"id":43,"readerNo":44,"displayNo":36,"n":36,"kind":"sub","type":"merged","vi":"Và tôi cũng đói nữa.\nShizuoka nổi tiếng với món chả cá đó.\nHay là...\nChúng ta đi nhé?","ko":"배도 고프고 시즈오카는 어묵이 유명한데 혹시?","en":"And I'm also hungry.\nShizuoka is famous for its fish cakes.\nBy chance...\nShall we go?","text":"Và tôi cũng đói nữa.\nShizuoka nổi tiếng với món chả cá đó.\nHay là...\nChúng ta đi nhé?\n배도 고프고 시즈오카는 어묵이 유명한데 혹시?\nAnd I'm also hungry.\nShizuoka is famous for its fish cakes.\nBy chance...\nShall we go?","sourceUid":"merged-mrgfast4-17","sourceNo":36,"viRanges":[{"start":181.66632,"end":202.567181}],"koRanges":[{"start":178.12,"end":185.776244},{"start":178.12,"end":179.47},{"start":181.28,"end":185.21}]},{"id":44,"readerNo":45,"displayNo":44,"n":44,"kind":"sub","type":"merged","vi":"Tôi hỏi cô một câu này thôi được không?\nVâng.\nAnh tò mò điều gì?\nLối này.\nShimizu không có ý định giao dịch với chúng tôi đúng không?\nĐó là \"tatemae\" của họ,\nnhưng chúng tôi đã không hiểu được phải không?","ko":"","en":"Could I ask you something?\nSure.\nWhat are you curious about?\nThis way.\nShimizu isn't interested in a deal with us, right?\nThat's their \"tatemae,\"\nbut we're not picking up on that, right?","text":"Tôi hỏi cô một câu này thôi được không?\nVâng.\nAnh tò mò điều gì?\nLối này.\nShimizu không có ý định giao dịch với chúng tôi đúng không?\nĐó là \"tatemae\" của họ,\nnhưng chúng tôi đã không hiểu được phải không?\nCould I ask you something?\nSure.\nWhat are you curious about?\nThis way.\nShimizu isn't interested in a deal with us, right?\nThat's their \"tatemae,\"\nbut we're not picking up on that, right?","sourceUid":"merged-mrgfg8vj-18","sourceNo":44,"viRanges":[{"start":202.567181,"end":230.886818}],"koRanges":[{"start":185.776244,"end":220.765028}]},{"id":45,"readerNo":46,"displayNo":"N31","n":"N31","kind":"narration","type":"narration","vi":"Hirose nhìn Jinsu rơi nước mắt. Tuy thấy tiếc nhưng tôi thấy buồn cười nên tôi lén cười.","ko":"히로세, 울상이 된 진수를 본다. 미안하면서도 그 모습이 웃긴지, 슬쩍 웃는다.","en":"Hirose sees Jinsu in tears. Although I feel sorry, I think it's funny, so I secretly smile.","text":"Hirose nhìn Jinsu rơi nước mắt. Tuy thấy tiếc nhưng tôi thấy buồn cười nên tôi lén cười.\n히로세, 울상이 된 진수를 본다. 미안하면서도 그 모습이 웃긴지, 슬쩍 웃는다.\nHirose sees Jinsu in tears. Although I feel sorry, I think it's funny, so I secretly smile.","sourceUid":"nar-mrje70ps-3zyzpf","sourceNo":"N31","viRanges":[],"koRanges":[]},{"id":46,"readerNo":47,"displayNo":38,"n":38,"kind":"sub","type":"merged","vi":"Thực ra, Shimizu đang định chuyển trụ sở chính.\nTrụ sở chính ở Shizuoka mà, đúng không?\nĐúng vậy.","ko":"사실 시미즈는 지금 본점을 이동하려고 해요\n시즈오카가 본점 아니에요?\n맞아요","en":"Actually, Shimizu is trying to move its main branch. Isn't Shizuoka its main branch? That's right.","text":"Thực ra, Shimizu đang định chuyển trụ sở chính.\nTrụ sở chính ở Shizuoka mà, đúng không?\nĐúng vậy.\n사실 시미즈는 지금 본점을 이동하려고 해요\n시즈오카가 본점 아니에요?\n맞아요\nActually, Shimizu is trying to move its main branch. Isn't Shizuoka its main branch? That's right.","sourceUid":"merged-mrgfjzvz-20","sourceNo":38,"viRanges":[{"start":230.886818,"end":244.815888}],"koRanges":[{"start":224.97,"end":234.305539},{"start":224.97,"end":229.78},{"start":229.53,"end":232.82},{"start":233.01,"end":233.9}]},{"id":47,"readerNo":48,"displayNo":41,"n":41,"kind":"sub","type":"merged","vi":"Nhưng dân số của Shizuoka đã giảm đi rất nhiều.\nVì vậy, họ định chuyển trụ sở chính đến Tokyo.","ko":"하지만 시즈오카는 사람들이 많이 줄어서요\n도쿄로 본점을 옮기려고 하거든요","en":"so we're trying to move the main branch to Tokyo. But Shizuoka's population has diminished greatly","text":"Nhưng dân số của Shizuoka đã giảm đi rất nhiều.\nVì vậy, họ định chuyển trụ sở chính đến Tokyo.\n하지만 시즈오카는 사람들이 많이 줄어서요\n도쿄로 본점을 옮기려고 하거든요\nso we're trying to move the main branch to Tokyo. But Shizuoka's population has diminished greatly","sourceUid":"merged-mrgft3ea-21","sourceNo":41,"viRanges":[{"start":244.815888,"end":252.312662}],"koRanges":[{"start":233.65,"end":234.305539},{"start":234.305539,"end":242.036206},{"start":238.33,"end":241.54}]},{"id":48,"readerNo":49,"displayNo":43,"n":43,"kind":"sub","type":"merged","vi":"Việc ai đến Tokyo, còn ai ở lại Shizuoka được quyết định trong tháng này.","ko":"누가 도쿄에 갈지 시즈오카에 남을지가 이번 달 결정됐는데","en":"Who will go to Tokyo and who will stay in Shizuoka will be decided this month.","text":"Việc ai đến Tokyo, còn ai ở lại Shizuoka được quyết định trong tháng này.\n누가 도쿄에 갈지 시즈오카에 남을지가 이번 달 결정됐는데\nWho will go to Tokyo and who will stay in Shizuoka will be decided this month.","sourceUid":"merged-mrgfvejt-22","sourceNo":43,"viRanges":[{"start":252.312662,"end":259.203203}],"koRanges":[{"start":241.29,"end":248.58},{"start":242.036206,"end":248.835682}]},{"id":49,"readerNo":50,"displayNo":44,"n":44,"kind":"sub","type":"merged","vi":"Và trưởng phòng Yoshida rốt cuộc chắc sẽ phải ở lại\nvì thành tích của anh ấy.","ko":"여시다 팀장님은 남겨뒀어요. 실적 때문에요.","en":"Team Leader Yoshida ended up staying behind\nbecause of his performance.","text":"Và trưởng phòng Yoshida rốt cuộc chắc sẽ phải ở lại\nvì thành tích của anh ấy.\n여시다 팀장님은 남겨뒀어요. 실적 때문에요.\nTeam Leader Yoshida ended up staying behind\nbecause of his performance.","sourceUid":"merged-mrgfxn0t-23","sourceNo":44,"viRanges":[{"start":259.203203,"end":264.851457}],"koRanges":[{"start":248.33,"end":254.1},{"start":248.835682,"end":254.417025}]},{"id":50,"readerNo":51,"displayNo":45,"n":45,"kind":"sub","type":"merged","vi":"Ở Hàn Quốc cũng có vấn đề là mọi người chỉ muốn đến Seoul.","ko":"한국도 서울로만 가려고 해서 문제거든요.","en":"Everyone tries to go to Seoul in Korea, too. It's a problem.","text":"Ở Hàn Quốc cũng có vấn đề là mọi người chỉ muốn đến Seoul.\n한국도 서울로만 가려고 해서 문제거든요.\nEveryone tries to go to Seoul in Korea, too. It's a problem.","sourceUid":"merged-mrgfybiq-24","sourceNo":45,"viRanges":[{"start":264.851457,"end":27 o cậu nghe hả?\nVâng.\nHiện giờ, thành tích rất quan trọng với trưởng phòng Yoshida, đúng không?","ko":"감사합니다.\n유시다 부장님은 실적이 중요한 상황이라고 했죠?\n네","en":"Attorney. Excuse me, could I have some water?­ I thought you were a spy. Did you hear anything useful? Yes. It turns out Shimizu also has an internal situation. Did she tell you all about that? Performance is important for Mr. Yoshida right now, right?","text":"Luật sư.\nTôi tưởng cậu là gián điệp không đó.\nCậu có nghe ngóng được gì không?\nDạ có.\nHóa ra tình hình nội bộ Shimizu cũng có vấn đề.\nCô ấy kể hết cho cậu nghe hả?\nVâng.\nHiện giờ, thành tích rất quan trọng với trưởng phòng Yoshida, đúng không?\n감사합니다.\n유시다 부장님은 실적이 중요한 상황이라고 했죠?\n네\nAttorney. Excuse me, could I have some water?­ I thought you were a spy. Did you hear anything useful? Yes. It turns out Shimizu also has an internal situation. Did she tell you all about that? Performance is important for Mr. Yoshida right now, right?","sourceUid":"merged-mrgj7ssr-57","sourceNo":103,"viRanges":[{"start":747.945024,"end":780.635818}],"koRanges":[{"start":740.123401,"end":770.923401},{"start":759.47,"end":760.42},{"start":765.33,"end":770.36},{"start":770.21,"end":770.88}]},{"id":93,"readerNo":94,"displayNo":"N46","n":"N46","kind":"narration","type":"narration","vi":". Nhà Hirose (Nhật Bản) (đêm)","ko":". 히로세의 집 ( 일본 ) ( 밤 )","en":". Hirose’s house (Japan) (night)","text":". Nhà Hirose (Nhật Bản) (đêm)\n. 히로세의 집 ( 일본 ) ( 밤 )\n. Hirose’s house (Japan) (night)","sourceUid":"nar-mrjeestj-1rjntv","sourceNo":"N46","viRanges":[],"koRanges":[]},{"id":94,"readerNo":95,"displayNo":"N47","n":"N47","kind":"narration","type":"narration","vi":"Lối vào mở ra và Hirose bước vào.","ko":"현관이 열리고, 히로세가 들어선다.","en":"The entrance opens, and Hirose enters.","text":"Lối vào mở ra và Hirose bước vào.\n현관이 열리고, 히로세가 들어선다.\nThe entrance opens, and Hirose enters.","sourceUid":"nar-mrjeetz2-bznuak","sourceNo":"N47","viRanges":[],"koRanges":[]},{"id":95,"readerNo":96,"displayNo":"N48","n": ami room, hotel (Japan) (night)","sourceUid":"nar-mrjefoh3-d8gf12","sourceNo":"N52","viRanges":[],"koRanges":[]},{"id":100,"readerNo":101,"displayNo":"N53","n":"N53","kind":"narration","type":"narration","vi":"Juno và nhóm đang ngồi quanh bàn.","ko":"주노와 팀원들이 테이블에 둘러앉아 있다.","en":"Juno and the team are sitting around the table.","text":"Juno và nhóm đang ngồi quanh bàn.\n주노와 팀원들이 테이블에 둘러앉아 있다.\nJuno and the team are sitting around the table.","sourceUid":"nar-mrjefurz-ko8rxn","sourceNo":"N53","viRanges":[],"koRanges":[]},{"id":101,"readerNo":102,"displayNo":106,"n":106,"kind":"sub","type":"merged","vi":"Tiền đặt cọc cần thiết là bao nhiêu nhỉ?\nNếu áp dụng tỷ lệ chiết khấu 40% cho 9.000 sản phẩm, tiền đặt cọc là 16,666%.","ko":"필요한 계약금이 얼마라고 했죠?\n,000개 기준 할인율 40% 적용받으면 16.666%입니다","en":"What was the needed deposit again?\nBased on an order of 9000, with a 40% discount,\nit would be 16.666%.","text":"Tiền đặt cọc cần thiết là bao nhiêu nhỉ?\nNếu áp dụng tỷ lệ chiết khấu 40% cho 9.000 sản phẩm, tiền đặt cọc là 16,666%.\n필요한 계약금이 얼마라고 했죠?\n,000개 기준 할인율 40% 적용받으면 16.666%입니다\nWhat was the needed deposit again?\nBased on an order of 9000, with a 40% discount,\nit would be 16.666%.","sourceUid":"merged-mrgjbztv-58","sourceNo":106,"viRanges":[{"start":780.635818,"end":790.116539}],"koRanges":[{"start":770.923401,"end":779.392734},{"start":771.99,"end":774.18},{"start":774.39,"end":779.02}]},{"id":102,"readerNo":103,"displayNo":108,"n":108,"kind":"sub","type":"merged","vi":"Còn chiết khấu 50% thì sao?\nĐể được chiết khấu 50%,\nsố lượng đặt hàng phải vượt quá 10.000 sản phẩm.\nVâng.","ko":"할인율을 50%로 적용하면요?\n할인율 50%를 받으려면 주문량이 1만 개는 넘어야 하는데요\n네","en":"How about a 50% discount?\nIf we want a 50% discount,\nwe'd need to order more than 10,000.\nYes.","text":"Còn chiết khấu 50% thì sao?\nĐể được chiết khấu 50%,\nsố lượng đặt hàng phải vượt quá 10.000 sản phẩm.\nVâng.\n할인율을 50%로 적용하면요?\n할인율 50%를 받으려면 주문량이 1만 개는 넘어야 하는데요\n네\nHow about a 50% discount?\nIf we want a 50% discount,\nwe'd need to order more than 10,000.\nYes.","sourceUid":"merged-mrgjdmyd-59","sourceNo":108,"viRanges":[{"start":790.116539,"end":798.64697}],"koRanges":[{"start":778.77,"end":781.82},{"start":779.392734,"end":787.462067},{"start":781.59,"end":786.16},{"start":785.91,"end":787.02}]},{"id":103,"readerNo":104,"displayNo":111,"n":111,"kind":"sub","type":"merged","vi":"Tiền đặt cọc sẽ là 18%.\nCỡ đó chắc ổn rồi.","ko":"계약금 18%입니다\n감사합니다.\n그 정도면 괜찮겠네요.","en":"It would be a deposit of 18%.\nThat would be a good amount.","text":"Tiền đặt cọc sẽ là 18%.\nCỡ đó chắc ổn rồi.\n계약금 18%입니다\n감사합니다.\n그 정도면 괜찮겠네요.\nIt would be a deposit of 18%.\nThat would be a good amount.","sourceUid":"merged-mrgjf5xs-61","sourceNo":111,"viRanges":[{"start":798.64697,"end":806}],"koRanges":[{"start":787.462067,"end":796.000734},{"start":789.11,"end":791.3},{"start":791.05,"end":791.44},{"start":793.84,"end":795.51}]},{"id":104,"readerNo":105,"displayNo":114,"n":114,"kind":"sub","type":"merged","vi":"Tôi đặt lịch cuộc họp với họ nhé?\nKhông. Để tôi gặp trưởng phòng Yoshida trước đã.\nVâng.","ko":"미팅 잡을까요?\n아니요. 요시타 부장님은 제가 먼저 만나볼게요.\n네.","en":"Should I set up a meeting?\nNo. I'll meet with Mr. Yoshida first.\nOkay.","text":"Tôi đặt lịch cuộc họp với họ nhé?\nKhông. Để tôi gặp trưởng phòng Yoshida trước đã.\nVâng.\n미팅 잡을까요?\n아니요. 요시타 부장님은 제가 먼저 만나볼게요.\n네.\nShould I set up a meeting?\nNo. I'll meet with Mr. Yoshida first.\nOkay.","sourceUid":"merged-mrgjgjq8-62","sourceNo":114,"viRanges":[{"start":806,"end":812.303206}],"koRanges":[{"start":795.97,"end":797.15},{"start":796.000734,"end":802.520734},{"start":797.59,"end":800.75},{"start":801.65,"end":802.33}]},{"id":105,"readerNo":106,"displayNo":117,"n":117,"kind":"sub","type":"merged","vi":"Tôi đi gọi điện thoại một lát rồi quay lại ngay.\nTổ trưởng Yoon, mọi chuyện ổn chứ?\nVâng, giám đốc. Chúng tôi vẫn đang tiến hành.\nTôi có một việc muốn nhờ anh.\nVâng.","ko":"저 잠시 통화 좀 해볼게요.\n윤팀장님, 어떻게 뭐 잘 되고 있어요?\n네, 대표님. 진행 중인데요.\n부탁드릴 게 있어서요.\n네.","en":"I'll go make a call. Be right back.\nMr. Yun, is everything going well?\nYes, CEO. We're in the process.\nI had something to ask of you.\nOkay.","text":"Tôi đi gọi điện thoại một lát rồi quay lại ngay.\nTổ trưởng Yoon, mọi chuyện ổn chứ?\nVâng, giám đốc. Chúng tôi vẫn đang tiến hành.\nTôi có một việc muốn nhờ anh.\nVâng.\n저 잠시 통화 좀 해볼게요.\n윤팀장님, 어떻게 뭐 잘 되고 있어요?\n네, 대표님. 진행 중인데요.\n부탁드릴 게 있어서요.\n네.\nI'll go make a call. Be right back.\nMr. Yun, is everything going well?\nYes, CEO. We're in the process.\nI had something to ask of you.\nOkay.","sourceUid":"merged-mrgjjsoj-64","sourceNo":117,"viRanges":[{"start":812.303206,"end":835.044249}],"koRanges":[{"start":802.520734,"end":824.811401},{"start":803.83,"end":805.73},{"start":814.76,"end":817.69},{"start":818.54,"end":820.71},{"start":821.78,"end":823.43},{"start":823.78,"end":824.43}]},{"id":106,"readerNo":107,"displayNo":"N54","n":"N54","kind":"narration","type":"narration","vi":"Juno đứng dậy khỏi chỗ ngồi và đi ra ngoài sân thượng để gọi điện thoại. Người nhận là CEO Park Rae-kyung.","ko":"주노, 자리에서 일어나 테라스로 나가며 전화를 건다. 수신자는 박래경 대표다.","en":"Juno gets up from her seat and goes out to the terrace to make a phone call. The recipient is CEO Park Rae-kyung.","text":"Juno đứng dậy khỏi chỗ ngồi và đi ra ngoài sân thượng để gọi điện thoại. Người nhận là CEO Park Rae-kyung.\n주노, 자리에서 일어나 테라스로 나가며 전화를 건다. 수신자는 박래경 대표다.\nJuno gets up from her seat and goes out to the terrace to make a phone call. The recipient is CEO Park Rae-kyung.","sourceUid":"nar-mrjegg6f-izegj9","sourceNo":"N54","viRanges":[],"koRanges":[]},{"id":107,"readerNo":108,"displayNo":122,"n":122,"kind":"sub","type":"merged","vi":"Tôi muốn hỏi xem chúng ta có thể tăng tiền cọc lên và trả trước được không.\nBao nhiêu?\n% ạ.","ko":"저희가 계약금을 좀 높여서 선지급을 할 수 있을까 해서요.\n아, 얼마나?\n%입니다.","en":"I was wondering if we could pay a higher deposit early.\nHow much?\nTwenty percent.","text":"Tôi muốn hỏi xem chúng ta có thể tăng tiền cọc lên và trả trước được không.\nBao nhiêu?\n% ạ.\n저희가 계약금을 좀 높여서 선지급을 할 수 있을까 해서요.\n아, 얼마나?\n%입니다.\nI was wondering if we could pay a higher deposit early.\nHow much?\nTwenty percent.","sourceUid":"merged-mrgjld8x-65","sourceNo":122,"viRanges":[{"start":835.044249,"end":845.719859}],"koRanges":[{"start":824.811401,"end":835.691401},{"start":826.13,"end":829.78},{"start":830.87,"end":832.72},{"start":834.05,"end":835.3}]},{"id":108,"readerNo":109,"displayNo":125,"n":125,"kind":"sub","type":"merged","vi":"Và phải thanh toán trong tháng này.\nTrong tháng này thì chúng tôi không đủ tiền đâu, tổ trưởng Yoon.\nVậy thì giám đốc ơi,\ntôi muốn nhờ anh việc khác.","ko":"이번 달 안에 지급해야 하는 조건이고요.\n아, 이달 안에 저희가 그 정도의 연후 없습니다, 팀장님.\n아\n그러면 대표님, 제가 다른 부탁을 좀 드릴게요.","en":"We'd have to pay it this month. We don't have that much funds this month, Mr. Yun. Then, CEO, let me make a different request.","text":"Và phải thanh toán trong tháng này.\nTrong tháng này thì chúng tôi không đủ tiền đâu, tổ trưởng Yoon.\nVậy thì giám đốc ơi,\ntôi muốn nhờ anh việc khác.\n이번 달 안에 지급해야 하는 조건이고요.\n아, 이달 안에 저희가 그 정도의 연후 없습니다, 팀장님.\n아\n그러면 대표님, 제가 다른 부탁을 좀 드릴게요.\nWe'd have to pay it this month. We don't have that much funds this month, Mr. Yun. Then, CEO, let me make a different request.","sourceUid":"merged-mrgjnw2k-66","sourceNo":125,"viRanges":[{"start":845.719859,"end":866.263129}],"koRanges":[{"start":835.47,"end":837.72},{"start":838.43,"end":844.76},{"start":847.28,"end":848.07},{"start":852.08,"end":855.91}]},{"id":109,"readerNo":110,"displayNo":129,"n":129,"kind":"sub","type":"merged","vi":"Về tiền đặt cọc thì anh có thể đề nghị trụ sở chính hỗ trợ tài chính ngắn hạn.\nCó điều...\nanh đừng tìm gặp giám đốc Ha,\nmà tốt nhất là nên nói chuyện trực tiếp với Chủ tịch luôn.","ko":"그 계약금은 본사에서 단기 자금 지원을 요청하시면 될 겁니다.\n다만 하조모님을 찾아가시지 말고 회장님을 직접 뵙고 말씀드리는 게 좋을 것 같습니다.","en":"You can request short-term funding from HQ.\nJust make sure...\nyou don't go to Mr. Ha.\nIt'd be best if you spoke to the chairman directly.","text":"Về tiền đặt cọc thì anh có thể đề nghị trụ sở chính hỗ trợ tài chính ngắn hạn.\nCó điều...\nanh đừng tìm gặp giám đốc Ha,\nmà tốt nhất là nên nói chuyện trực tiếp với Chủ tịch luôn.\n그 계약금은 본사에서 단기 자금 지원을 요청하시면 될 겁니다.\n다만 하조모님을 찾아가시지 말고 회장님을 직접 뵙고 말씀드리는 게 좋을 것 같습니다.\nYou can request short-term funding from HQ.\nJust make sure...\nyou don't go to Mr. Ha.\nIt'd be best if you spoke to the chairman directly.","sourceUid":"merged-mrgjqrcx-67","sourceNo":129,"viRanges":[{"start":845.719859,"end":866.240511},{"start":866.263129,"end":880.711746}],"koRanges":[{"start":837.72,"end":856.211052},{"start":862.41,"end":870.51}]},{"id":110,"readerNo":111,"displayNo":131,"n":131,"kind":"sub","type":"merged","vi":"Nhưng về vấn đề cấp vốn,\ngiám đốc Ha là giám đốc tài chính mà.\nTôi gặp trực tiếp Chủ tịch có khác nào vượt mặt giám đốc Ha đâu.","ko":"아니, 자금이면 하조모님이 CF시잖아요. 근데 제가 바로 회장님께 말씀드리면 하조모님 건너뛰는 셈인데.","en":"But... as for funding,\nMr. Ha is the CFO.\nIf I tell the chairman directly,\nthat'd be like skipping past Mr. Ha.","text":"Nhưng về vấn đề cấp vốn,\ngiám đốc Ha là giám đốc tài chính mà.\nTôi gặp trực tiếp Chủ tịch có khác nào vượt mặt giám đốc Ha đâu.\n아니, 자금이면 하조모님이 CF시잖아요. 근데 제가 바로 회장님께 말씀드리면 하조모님 건너뛰는 셈인데.\nBut... as for funding,\nMr. Ha is the CFO.\nIf I tell the chairman directly,\nthat'd be like skipping past Mr. Ha.","sourceUid":"merged-mrh554g8-2","sourceNo":131,"viRanges":[{"start":880.711746,"end":890.568871}],"koRanges":[{"start":871,"end":881.6},{"start":871,"end":875.83},{"start":876.61,"end":881.27}]},{"id":111,"readerNo":112,"displayNo":133,"n":133,"kind":"sub","type":"merged","vi":"Vâng, đúng là vậy,\nnhưng tình hình trụ sở chính hiện tại hơi phức tạp.\nTôi nghĩ tốt nhất là lần này anh nên nói trực tiếp với Chủ tịch.\nVà sẵn tiện, tình cờ gặp Chủ tịch trong sảnh để nói thì càng hay.","ko":"네 그렇긴 한데요. 지금 본사 사정이 조금 복잡해서요. 이번만큼은 회장님을 직접 뵙고 말씀드리는 게 좋을 것 같습니다. 이왕이면 로비에서 우연히 만나시는 게 좋을 것 같고요.","en":"Yes, that's true,\nbut our current situation at HQ is a bit messy.\nI think it's best you tell the chairman\ndirectly this time.\nAnd even better to naturally run\ninto the chairman in the lobby.","text":"Vâng, đúng là vậy,\nnhưng tình hình trụ sở chính hiện tại hơi phức tạp.\nTôi nghĩ tốt nhất là lần này anh nên nói trực tiếp với Chủ tịch.\nVà sẵn tiện, tình cờ gặp Chủ tịch trong sảnh để nói thì càng hay.\n네 그렇긴 한데요. 지금 본사 사정이 조금 복잡해서요. 이번만큼은 회장님을 직접 뵙고 말씀드리는 게 좋을 것 같습니다. 이왕이면 로비에서 우연히 만나시는 게 좋을 것 같고요.\nYes, that's true,\nbut our current situation at HQ is a bit messy.\nI think it's best you tell the chairman\ndirectly this time.\nAnd even better to naturally run\ninto the chairman in the lobby.","sourceUid":"merged-mrh56lse-3","sourceNo":133,"viRanges":[{"start":890.568871,"end":906.558712}],"koRanges":[{"start":881.02,"end":898.568054},{"start":881.02,"end":896.09}]},{"id":112,"readerNo":113,"displayNo":"N55","n":"N55","kind":"narration","type":"narration","vi":". Sảnh tầng 1, trụ sở Tập đoàn Sanin (ban ngày)","ko":". 1층 로비, 산인 그룹 본사 ( 낮 )","en":". 1st floor lobby, Sanin Group headquarters (daytime)","text":". Sảnh tầng 1, trụ sở Tập đoàn Sanin (ban ngày)\n. 1층 로비, 산인 그룹 본사 ( 낮 )\n. 1st floor lobby, Sanin Group headquarters (daytime)","sourceUid":"nar-mrjeh001-cgg6xe","sourceNo":"N55","viRanges":[],"koRanges":[]},{"id":113,"readerNo":114,"displayNo":"N56","n":"N56","kind":"narration","type":"narration","vi":"Park Rae-kyung đứng trước tiền sảnh. đang đợi ai đó","ko":"로비 앞에 서 있는 박래경. 누군가를 기다리고 있다.","en":"Park Rae-kyung standing in front of the lobby. waiting for someone","text":"Park Rae-kyung đứng trước tiền sảnh. đang đợi ai đó\n로비 앞에 서 있는 박래경. 누군가를 기다리고 있다.\nPark Rae-kyung standing in front of the lobby. waiting for someone","sourceUid":"nar-mrjeh0ve-tbaa54","sourceNo":"N56","viRanges":[],"koRanges":[]},{"id":114,"readerNo":115,"displayNo":"N57","n":"N57","kind":"narration","type":"narration","vi":"Giám đốc Hà bước xuống xe và đi vào sảnh.","ko":"세단에서 하전무가 내리고, 로비로 들어선다.","en":"Director Ha gets out of the sedan and enters the lobby.","text":"Giám đốc Hà Chủ tịch rất tức giận vì vụ niêm yết.\nKhông đâu. Tức giận gì chứ.\nSao vậy? Anh có gì muốn nói với tôi à?\nTôi nghe nói sẽ ký hợp đồng với điều kiện tăng tiền đặt cọc.\nAi nói vậy? Tổ trưởng nào nói à?","ko":"그래도요\n상장 때문에 화가 많이 나셨다고\n화내 이 사람은\n그 계약금을 좀 높이는 조건으로 계약이 될 거라고 하더라고요.\n누가 그래 뭐 팀장이 그라더?","en":"Still,\nI heard you were furious over the listing issue.\nFurious? No...\nWhat is it? Do you have something to tell me?\nI was told they could close the deal by raising the deposit.\nWho told you that? Was it the Team Leader?","text":"Nhưng tôi nghe nói Chủ tịch rất tức giận vì vụ niêm yết.\nKhông đâu. Tức giận gì chứ.\nSao vậy? Anh có gì muốn nói với tôi à?\nTôi nghe nói sẽ ký hợp đồng với điều kiện tăng tiền đặt cọc.\nAi nói vậy? Tổ trưởng nào nói à?\n그래도요\n상장 때문에 화가 많이 나셨다고\n화내 이 사람은\n그 계약금을 좀 높이는 조건으로 계약이 될 거라고 하더라고요.\n누가 그래 뭐 팀장이 그라더?\nStill,\nI heard you were furious over the listing issue.\nFurious? No...\nWhat is it? Do you have something to tell me?\nI was told they could close the deal by raising the deposit.\nWho told you that? Was it the Team Leader?","sourceUid":"merged-mrh6xo5u-8","sourceNo":140,"viRanges":[{"start":935,"end":958.611532}],"koRanges":[{"start":924.1,"end":945.927696},{"start":924.1,"end":925.55},{"start":925.3,"end":927.67},{"start":928.22,"end":929.53},{"start":938.12,"end":942.85},{"start":943.61,"end":945.49}]},{"id":118,"readerNo":119,"displayNo":"N59","n":"N59","kind":"narration","type":"narration","vi":". Văn phòng Chủ tịch, Trụ sở Tập đoàn Sanin (ban ngày)","ko":". 회장실, 산인 그룹 본사 ( 낮 )","en":". Chairman’s Office, Sanin Group Headquarters (daytime)","text":". Văn phòng Chủ tịch, Trụ sở Tập đoàn Sanin (ban ngày)\n. 회장실, 산인 그룹 본사 ( 낮 )\n. Chairman’s Office, Sanin Group Headquarters (daytime)","sourceUid":"nar-mrjehy7n-ecu8vg","sourceNo":"N59","viRanges":[],"koRanges":[]},{"id":119,"readerNo":120,"displayNo":"N60","n":"N60","kind":"narration","type":"narration","vi":"Jisoo đặt xe xuống trước mặt Chủ tịch Song và Park Rae-kyung.","ko":" ","type":"narration","vi":"Lúc đó, Giám đốc điều hành Hà vừa bước xuống thang máy, nhanh chóng đi tới Công viên Rae-kyung và chặn ông ấy lại.","ko":"그때, 엘리베이터에서 내린 하전무가 빠른 걸음으로 다가가며 박래경을 불러 세운다.","en":"At that time, Executive Director Ha got off the elevator, quickly walked over to Rae-kyung Park and stopped him.","text":"Lúc đó, Giám đốc điều hành Hà vừa bước xuống thang máy, nhanh chóng đi tới Công viên Rae-kyung và chặn ông ấy lại.\n그때, 엘리베이터에서 내린 하전무가 빠른 걸음으로 다가가며 박래경을 불러 세운다.\nAt that time, Executive Director Ha got off the elevator, quickly walked over to Rae-kyung Park and stopped him.","sourceUid":"nar-mrjer1mz-yh9b7x","sourceNo":"N71","viRanges":[],"koRanges":[]},{"id":140,"readerNo":141,"displayNo":"N72","n":"N72","kind":"narration","type":"dialogue","vi":"Park Rae-kyung: (Kết thúc cuộc gọi nhanh chóng) Tôi sẽ cúp máy. Đội trưởng.","ko":"박래경:  (급히 통화를 마무리하며) 전화 끊겠습니다. 팀장님.","en":"Park Rae-kyung: (Ending the call quickly) I will hang up. Team leader.","text":"Park Rae-kyung: (Kết thúc cuộc gọi nhanh chóng) Tôi sẽ cúp máy. Đội trưởng.\n박래경:  (급히 통화를 마무리하며) 전화 끊겠습니다. 팀장님.\nPark Rae-kyung: (Ending the call quickly) I will hang up. Team leader.","sourceUid":"nar-mrjerb9x-8yg37h","sourceNo":"N72","viRanges":[],"koRanges":[]},{"id":141,"readerNo":142,"displayNo":"N73","n":"N73","kind":"narration","type":"narration","vi":"Rae-kyung Park quay đầu lại nhìn Giám đốc điều hành Hà và chào.","ko":"박래경, 고갤 돌려 하전무를 보고, 인사한다.","en":"Rae-kyung Park turns her head to look at Executive Director Ha and says hello.","text":"Rae-kyung Park quay đầu lại nhìn Giám đốc điều hành Hà và chào.\n박래경, 고갤 돌려 하전무를 보고, 인사한다.\nRae-kyung Park turns her head to look at Executive Director Ha and says hello.","sourceUid":"nar-mrjerd42-ws4mi0","sourceNo":"N73","viRanges":[],"koRanges":[]},{"id":142,"readerNo":143,"displayNo":170,"n":170,"kind":"sub","type":"merged","vi":"Này, giám đốc Park!\nAnh làm gì vậy hả?","ko":"박 대표!\n당신 뭐하는 거야?","en":"Hey, CEO Park!\nWhat's wrong with you!","text":"Này, giám đốc Park!\nAnh làm gì vậy hả?\n박 대표!\n당신 뭐하는 거야?\nHey, CEO Park!\nWhat's wrong with you!","sourceUid":"merged-mrh7pimg-21","sourceNo":170,"viRanges":[{"start":1094,"end":1102.12182}],"koRanges":[{"start":1084.89,"end":1085.86},{"start":1090,"end":1091.902},{"start":1090.16,"end":1091.59}]},{"id":143,"readerNo":144,"displayNo":174,"n":174,"kind":"sub","type":"merged","vi":"Nếu anh muốn vay tiền từ trụ sở chính,\nanh phải đến gặp giám đốc tài chính là tôi chứ.\nAnh là ai mà dám gặp thẳng Chủ tịch hả?\nTôi đến để gặp giám đốc Ha đó chứ.","ko":"본사에 돈을 빌리러 왔으면 당연히 CFO인 나를 찾아왔어야지\n당신이 뭔데 회장님한테 바로\n아니 전문의 뵈러 왔는데요","en":"If you came to HQ to borrow money,\nyou should've come to me, the CFO!\nWho are you to go directly to the chairman—\nI did come to see you, Mr. Ha.","text":"Nếu anh muốn vay tiền từ trụ sở chính,\nanh phải đến gặp giám đốc tài chính là tôi chứ.\nAnh là ai mà dám gặp thẳng Chủ tịch hả?\nTôi đến để gặp giám đốc Ha đó chứ.\n본사에 돈을 빌리러 왔으면 당연히 CFO인 나를 찾아왔어야지\n당신이 뭔데 회장님한테 바로\n아니 전문의 뵈러 왔는데요\nIf you came to HQ to borrow money,\nyou should've come to me, the CFO!\nWho are you to go directly to the chairman—\nI did come to see you, Mr. Ha.","sourceUid":"merged-mrh7sga8-24","sourceNo":174,"viRanges":[{"start":1102.12182,"end":1110.458208}],"koRanges":[{"start":1092.4,"end":1096.53},{"start":1096.28,"end":1098.31},{"start":1098.06,"end":1100.925634},{"start":1098.06,"end":1100.21}]},{"id":144,"readerNo":145,"displayNo":175,"n":175,"kind":"sub","type":"merged","vi":"Nhưng tôi tình cờ gặp Chủ tịch ở sảnh.\nÔng ấy hỏi tôi đến đây làm gì,\nnên tôi không còn cách nào khác là phải nói với ông ấy.","ko":"로비에서 회장님을 만나는 바람에 왜 왔냐고 물어보신데\n대답을 안 할 수도 없거든요","en":"But I happened to run into the chairman in the lobby.\nHe asked me why I came\nso I had no choice but to tell him.","text":"Nhưng tôi tình cờ gặp Chủ tịch ở sảnh.\nÔng ấy hỏi tôi đến đây làm gì,\nnên tôi không còn cách nào khác là phải nói với ông ấy.\n로비에서 회장님을 만나는 바람에 왜 왔냐고 물어보신데\n대답을 안 할 수도 없거든요\nBut I happened to run into the chairman in the lobby.\nHe asked me why I came\nso I had no choice but to tell him.","sourceUid":"merged-mrh7u82n-25","sourceNo":175,"viRanges":[{"start":1110.458208,"end":1117.447427}],"koRanges":[{"start":1099.96,"end":1107.095583},{"start":1099.96,"end":1104.07},{"start":1103.82,"end":1105.71}]},{"id":145,"readerNo":146,"displayNo":177,"n":177,"kind":"sub","type":"merged","vi":"Vậy họ đã chốt hợp đồng chưa?\nHình như là chưa.","ko":"그래서 계약했대요?\n아직은 아닌 것 같고요","en":"So did they close the deal?\nI don't think they did yet.","text":"Vậy họ đã chốt hợp đồng chưa?\nHình như là chưa.\n그래서 계약했대요?\n아직은 아닌 것 같고요\nSo did they close the deal?\nI don't think they did yet.","sourceUid":"merged-mrh7vl7s-26","sourceNo":177,"viRanges":[{"start":1117.447427,"end":1121.617376}],"koRanges":[{"start":1105.46,"end":1111.607431},{"start":1105.46,"end":1109.74},{"start":1109.95,"end":1111.66}]},{"id":146,"readerNo":147,"displayNo":179,"n":179,"kind":"sub","type":"merged","vi":"Tôi nghe nói có vẻ cần phải tăng tiền đặt cọc lên.\nHạn chót để đưa ra quyết định là ngày mai còn gì.\nTôi sẽ trình phê duyệt hồ sơ thanh toán vào ngày mai.","ko":"계약금을 좀 올려줘야 될 것 같다고 그러더라고요\n내일까지 결정이 나야 되는 거잖아\n내일 결정서를 올리겠습니다 전문의","en":"I hear they might need to increase the deposit.\nA decision needs to be made by tomorrow.\nI'll submit the transaction approval tomorrow.","text":"Tôi nghe nói có vẻ cần phải tăng tiền đặt cọc lên.\nHạn chót để đưa ra quyết định là ngày mai còn gì.\nTôi sẽ trình phê duyệt hồ sơ thanh toán vào ngày mai.\n계약금을 좀 올려줘야 될 것 같다고 그러더라고요\n내일까지 결정이 나야 되는 거잖아\n내일 결정서를 올리겠습니다 전문의\nI hear they might need to increase the deposit.\nA decision needs to be made by tomorrow.\nI'll submit the transaction approval tomorrow.","sourceUid":"merged-mrh7wp6o-28","sourceNo":179,"viRanges":[{"start":1121.617376,"end":1132.986455}],"koRanges":[{"start":1111.41,"end":1122.796776},{"start":1111.41,"end":1115.22},{"start":1116.46,"end":1119.21},{"start":1119.82,"end":1122.35}]},{"id":147,"reader ],"koRanges":[]},{"id":155,"readerNo":156,"displayNo":"N81","n":"N81","kind":"narration","type":"narration","vi":"Nhân viên phục vụ quỳ trước bếp pha trà.","ko":"차를 내리는 화로 앞에 무릎을 꿇고 앉는다.","en":"The waitress kneels in front of the stove to brew tea.","text":"Nhân viên phục vụ quỳ trước bếp pha trà.\n차를 내리는 화로 앞에 무릎을 꿇고 앉는다.\nThe waitress kneels in front of the stove to brew tea.","sourceUid":"nar-mrk4ljah-qt0tsy","sourceNo":"N81","viRanges":[],"koRanges":[]},{"id":156,"readerNo":157,"displayNo":185,"n":185,"kind":"sub","type":"merged","vi":"Tôi thích trà Nhật truyền thống hơn cà phê.\nAnh uống được chứ?\nTôi muốn anh có những trải nghiệm đậm chất Nhật Bản khi ở đây.","ko":"I prefer traditional Japanese tea over coffee.\nIs that alright with you?\nI wanted you to experience Japan while you're here.","en":"I prefer traditional Japanese tea over coffee.\nIs that alright with you?\nIs that all right with you?\nI wanted you to experience Japan while you're here.","text":"Tôi thích trà Nhật truyền thống hơn cà phê.\nAnh uống được chứ?\nTôi muốn anh có những trải nghiệm đậm chất Nhật Bản khi ở đây.\nI prefer traditional Japanese tea over coffee.\nIs that alright with you?\nI wanted you to experience Japan while you're here.\nI prefer traditional Japanese tea over coffee.\nIs that alright with you?\nIs that all right with you?\nI wanted you to experience Japan while you're here.","sourceUid":"merged-mrh7ztvz-31","sourceNo":185,"viRanges":[{"start":1154.554505,"end":1168.402305}],"koRanges":[{"start":1144.5,"end":1158.615443},{"start":1144.5,"end":1148.33},{"start":1150.28,"end":1152.31},{"start":1153.62,"end":1158.07}]},{"id":157,"readerNo":158,"displayNo":"N82","n":"N82","kind":"narration","type":"narration","vi":"Trong khi đó, người phục vụ trà đặt một chiếc cốc xuống.","ko":"그사이, 차를 내리는 서빙이 한 잔을 내려놓는다.","en":"Meanwhile, the tea server puts down a cup.","text":"Trong khi đó, người phục vụ trà đặt một chiếc cốc xuống.\n그사이, 차를 내리는 서빙이 한 잔을 내려놓는다.\nMeanwhile, the tea server u,\nvà chúng tôi tin rằng đó sẽ là một lời đề nghị có lợi cho Shimizu.\nOf course, I appreciate it.\nWe proposed purchasing a significantly larger quantity, around 10 times the original amount, believing it would be a favorable offer for Shimizu.\nOf course, I appreciate it.\nOf course. I appreciate it.\nWe proposed purchasing a significantly larger quantity, around 10 times the original amount, believing it would be a favorable offer for Shimizu.","sourceUid":"merged-mrh81nmp-32","sourceNo":188,"viRanges":[{"start":1168.402305,"end":1188.150174}],"koRanges":[{"start":1159.08,"end":1178.11411},{"start":1159.08,"end":1161.29},{"start":1165.25,"end":1177.68}]},{"id":165,"readerNo":166,"displayNo":190,"n":190,"kind":"sub","type":"merged","vi":"Tuy nhiên,\ncó vẻ như chúng tôi đã xem nhẹ sự khác biệt văn hóa\ngiữa Nhật Bản và Hàn Quốc.\nVâng.","ko":"네, 문화에 관한 문화에 관한 문화가 있다면 도움이 될 것입니다.","en":"However,\nHowever, it seems we may have underestimated the cultural differences between Japan and South Korea.\nYes.","text":"Tuy nhiên,\ncó vẻ như chúng tôi đã xem nhẹ sự khác biệt văn hóa\ngiữa Nhật Bản và Hàn Quốc.\nVâng.\n네, 문화에 관한 문화에 관한 문화가 있다면 도움이 될 것입니다.\nHowever,\nHowever, it seems we may have underestimated the cultural differences between Japan and South Korea.\nYes.","sourceUid":"merged-mrh84fio-33","sourceNo":190,"viRanges":[{"start":1188.150174,"end":1202.148914}],"koRanges":[{"start":1178.73,"end":1192.143443},{"start":1178.73,"end":1187.62},{"start":1190.83,"end":1196.9}]},{"id":166,"readerNo":167,"displayNo":192,"n":192,"kind":"sub","type":"merged","vi":"Nếu không hiểu rõ văn hóa thì có thể xảy ra chuyện đó. Cảm ơn anh đã thông cảm. Cảm ơn anh về tách trà này.","ko":"이해해 주셔서 감사합니다.","en":"It can happen if you are not familiar with the culture. Thank you for understanding. Thank you for the tea.","text":"Nếu không hiểu rõ văn hóa thì có thể xảy ra chuyện đó. Cảm ơn anh đã thông cảm. Cảm ơn anh về tách trà này.\n이해해 주셔서 감사합니다.\nIt can happen if you are not familiar wi 18}]},{"id":177,"readerNo":178,"displayNo":209,"n":209,"kind":"sub","type":"merged","vi":"Trong tháng này? Vâng. Ngoài ra,","ko":"이스라엘? 네, 추가적으로.","en":"Yes. Additionally,","text":"Trong tháng này? Vâng. Ngoài ra,\n이스라엘? 네, 추가적으로.\nYes. Additionally,","sourceUid":"merged-mrh9hi21-46","sourceNo":209,"viRanges":[{"start":1333.087926,"end":1343.091916}],"koRanges":[{"start":1323.18,"end":1332.956589},{"start":1328.24,"end":1329.37},{"start":1330.2,"end":1332.83}]},{"id":178,"readerNo":179,"displayNo":211,"n":211,"kind":"sub","type":"merged","vi":"chúng tôi yêu cầu hủy đơn đặt hàng hiện tại là 1000 sản phẩm của Wind.\nThay vào đó, chúng tôi muốn lên đơn đặt hàng mới.","ko":"윈즈의 현재 1,000유니트 제한을 요청합니다.\n새로운 제한을 제시하고 싶습니다.","en":"we request the cancellation of Wind's current order of 1,000 units.\nWe would like to place a new order instead.","text":"chúng tôi yêu cầu hủy đơn đặt hàng hiện tại là 1000 sản phẩm của Wind.\nThay vào đó, chúng tôi muốn lên đơn đặt hàng mới.\n윈즈의 현재 1,000유니트 제한을 요청합니다.\n새로운 제한을 제시하고 싶습니다.\nwe request the cancellation of Wind's current order of 1,000 units.\nWe would like to place a new order instead.","sourceUid":"merged-mrh9lphi-48","sourceNo":211,"viRanges":[{"start":1343.091916,"end":1352.89946}],"koRanges":[{"start":1332.956589,"end":1342.447256},{"start":1335.28,"end":1338.67},{"start":1338.88,"end":1342.17}]},{"id":179,"readerNo":180,"displayNo":215,"n":215,"kind":"sub","type":"merged","vi":"Là vì chiết khấu, đúng không?\nDù sao thì đặt hàng từ 1.000 sản phẩm đến 10.000 sản phẩm,\nTôi nghĩ không cần làm vậy đâu.\ntỷ lệ chiết khấu vẫn là 40% thôi.","ko":"음...\n제한이 1,000에서 10,000유니트 이상으로\n제한이 40%로 똑같은데요.","en":"It is because of the discount, right?\nThat may not be a concern.\nFrom 1,000 to 10,000 units,\nthe discount rate is the same at 40% anyway.","text":"Là vì chiết khấu, đúng không?\nDù sao thì đặt hàng từ 1.000 sản phẩm đến 10.000 sản phẩm,\nTôi nghĩ không cần làm vậy đâu.\ntỷ lệ chiết khấu vẫn là 40% thôi.\n음...\n제한이 1,000에서 10,000유니트 이상으로\n제한이 40%로 똑같은데요.\nIt is because of the discount, right?\nThat may not be a concern.\nFrom 1,000 to 10,000 units,\nthe discount rate is the same at 40% anyway.","sourceUid":"merged-mrh9ob76-51","sourceNo":215,"viRanges":[{"start":1352.89946,"end":1368.009845}],"koRanges":[{"start":1342.447256,"end":1358.707737},{"start":1343.95,"end":1345.02},{"start":1346.55,"end":1354.66},{"start":1354.41,"end":1357.98}]},{"id":180,"readerNo":181,"displayNo":216,"n":216,"kind":"sub","type":"merged","vi":"Không. Chúng tôi dự định đặt hàng 10.001 sản phẩm.\nTrong trường hợp đó,\nchúng tôi biết tỷ lệ chiết khấu sẽ là 50%.","ko":"No, we intend to order 10000원 units. In that case, we understand the discount rate would be 50%.","en":"No. We intend to order 10,001 units.\nIn that case,\nwe understand that the discount rate will be 50%.","text":"Không. Chúng tôi dự định đặt hàng 10.001 sản phẩm.\nTrong trường hợp đó,\nchúng tôi biết tỷ lệ chiết khấu sẽ là 50%.\nNo, we intend to order 10000원 units. In that case, we understand the discount rate would be 50%.\nNo. We intend to order 10,001 units.\nIn that case,\nwe understand that the discount rate will be 50%.","sourceUid":"merged-mrh9pb1a-53","sourceNo":216,"viRanges":[{"start":1368.009845,"end":1381.713501}],"koRanges":[{"start":1357.73,"end":1371.5},{"start":1358.707737,"end":1371.867754}]},{"id":181,"readerNo":182,"displayNo":217,"n":217,"kind":"sub","type":"merged","vi":"Không phải điều đó nằm trong quy định của Shimizu sao?\nChúng tôi cần cân nhắc thêm về việc này.\nVâng.","ko":"이즈넷 히메쥬스맨\n우리는 카운스테이를 만나러 갈 것입니다.\n네.","en":"Isn't that Shimizu's manual?\nWe will need to consider it.\nYes.","text":"Không phải điều đó nằm trong quy định của Shimizu sao?\nChúng tôi cần cân nhắc thêm về việc này.\nVâng.\n이즈넷 히메쥬스맨\n우리는 카운스테이를 만나러 갈 것입니다.\n네.\nIsn't that Shimizu's manual?\nWe will need to consider it.\nYes.","sourceUid":"merged-mrhaleov-54","sourceNo":217,"viRanges":[{"start":1381.713501,"end":1401.900449}],"koRanges":[{"start":1371.867 he secretary stands up.","text":"Khi Lee Sang-moo mặc áo khoác ngoài và rời khỏi phòng, thư ký đứng dậy.\n이상무가 겉옷을 챙겨 입고 방을 나서자, 비서가 일어난다.\nAs Lee Sang-moo puts on his outerwear and leaves the room, the secretary stands up.","sourceUid":"nar-mrk4w2j5-9hktt1","sourceNo":"N94","viRanges":[],"koRanges":[]},{"id":196,"readerNo":197,"displayNo":236,"n":236,"kind":"sub","type":"merged","vi":"À, Chủ tịch...\nCô nghĩ giờ có muộn quá không?\nTôi có việc phải báo cáo với ông ấy.\nTôi kiểm tra với phòng thư ký nhé?\nHay là để mai...","ko":"아, 회장님. 보고 드릴 게 있는데 늦었을라나?\n비서실에 확인해 볼까요? 아님 내일 하시는 게...","en":"Oh, the chairman...\nI have something to report to him.\nDo you think it's too late now?\nShould I check with the secretary's office?\nOr how about you do so tomorrow?","text":"À, Chủ tịch...\nCô nghĩ giờ có muộn quá không?\nTôi có việc phải báo cáo với ông ấy.\nTôi kiểm tra với phòng thư ký nhé?\nHay là để mai...\n아, 회장님. 보고 드릴 게 있는데 늦었을라나?\n비서실에 확인해 볼까요? 아님 내일 하시는 게...\nOh, the chairman...\nI have something to report to him.\nDo you think it's too late now?\nShould I check with the secretary's office?\nOr how about you do so tomorrow?","sourceUid":"merged-mrhd9gkq-66","sourceNo":236,"viRanges":[{"start":1475.845242,"end":1494.70565}],"koRanges":[{"start":1466.528,"end":1479.666667},{"start":1474.22,"end":1478.97}]},{"id":197,"readerNo":198,"displayNo":"N95","n":"N95","kind":"narration","type":"narration","vi":". Trước Câu lạc bộ cờ vây (đêm)","ko":". 기원 앞 ( 밤 )","en":". In front of the origin (night)","text":". Trước Câu lạc bộ cờ vây (đêm)\n. 기원 앞 ( 밤 )\n. In front of the origin (night)","sourceUid":"nar-mrk5380a-8clkzp","sourceNo":"N95","viRanges":[],"koRanges":[]},{"id":198,"readerNo":199,"displayNo":"N96","n":"N96","kind":"narration","type":"narration","vi":"Lee Sang-moo đang ngồi một mình trước bàn cờ và quay lại khi nghe thấy tiếng cửa mở.","ko":"이상무가 바둑판 앞에 홀로 앉아 있다가, 출입문 열리는 소리에 괜히 돌아본다.","en":"Lee Sang-moo is sitting alone in front of the checkerboard, and turns around when he hears the sound of the door opening.","text":"Lee Sang-moo đang ngồi một mình trước bàn cờ và quay lại khi nghe thấy tiếng cửa mở.\n이상무가 바둑판 앞에 홀로 앉아 있다가, 출입문 열리는 소리에 괜히 돌아본다.\nLee Sang-moo is sitting alone in front of the checkerboard, and turns around when he hears the sound of the door opening.","sourceUid":"nar-mrk53v55-2xmcjf","sourceNo":"N96","viRanges":[],"koRanges":[]},{"id":199,"readerNo":200,"displayNo":"N97","n":"N97","kind":"narration","type":"narration","vi":"Người vừa bước vào hình như đang ở một nhóm riêng.","ko":"방금 들어온 사람은 일행이 따로 있는 모양이다.","en":"The person who just came in seems to be with a separate party.","text":"Người vừa bước vào hình như đang ở một nhóm riêng.\n방금 들어온 사람은 일행이 따로 있는 모양이다.\nThe person who just came in seems to be with a separate party.","sourceUid":"nar-mrk53wuo-ijhugd","sourceNo":"N97","viRanges":[],"koRanges":[]},{"id":200,"readerNo":201,"displayNo":237,"n":237,"kind":"sub","type":"merged","vi":"Ừ.\nXin chào.\n(Câu lạc bộ cờ vây Jongno)\nÔi, lâu lắm rồi nhỉ.\n- Tại tôi bận công việc quá. - Vâng.","ko":"아이고 고맙네\n고맙습니다\n살리세요","en":"Okay.\nHello.\n[Jongno Go Club]\nAigoo, it's been a while.\n- I've been busy with work. - I see.","text":"Ừ.\nXin chào.\n(Câu lạc bộ cờ vây Jongno)\nÔi, lâu lắm rồi nhỉ.\n- Tại tôi bận công việc quá. - Vâng.\n아이고 고맙네\n고맙습니다\n살리세요\nOkay.\nHello.\n[Jongno Go Club]\nAigoo, it's been a while.\n- I've been busy with work. - I see.","sourceUid":"merged-mrhdar4d-67","sourceNo":237,"viRanges":[{"start":1504,"end":1524.096308}],"koRanges":[{"start":1490,"end":1529.345563},{"start":1508.5,"end":1510.05},{"start":1509.8,"end":1510.69},{"start":1510.44,"end":1511.79}]},{"id":201,"readerNo":202,"displayNo":241,"n":241,"kind":"sub","type":"merged","vi":"Anh có đông khách không?\n- Có người ở đằng kia tìm anh. - Ồ, được rồi.","ko":"사진만 하시고\n좀 수고하십시오","en":"You've got a lot of customers?\n- Someone's over there for you. - Oh, okay.","text":"Anh có đông khách không?\n- Có người ở đằng kia tìm anh. - Ồ, được ":1554.41}]},{"id":206,"readerNo":207,"displayNo":244,"n":244,"kind":"sub","type":"merged","vi":"Tại tôi thấy lần trước giám đốc Oh vất vả nhiều rồi,\nnên tôi muốn an ủi một chút.\nAn ủi tôi sao?\nGiám đốc Oh đã khổ tâm nhiều mà.","ko":"아니 뭐 저번에 보니까 고생하시길래 위로라도 좀 해드리려고\n위로요?\n마음고생 많으시지 않습니까","en":"I noticed you were having a hard time last time,\nso I wanted to comfort you a bit.\nComfort me?\nI mean, you're going through a lot emotionally.","text":"Tại tôi thấy lần trước giám đốc Oh vất vả nhiều rồi,\nnên tôi muốn an ủi một chút.\nAn ủi tôi sao?\nGiám đốc Oh đã khổ tâm nhiều mà.\n아니 뭐 저번에 보니까 고생하시길래 위로라도 좀 해드리려고\n위로요?\n마음고생 많으시지 않습니까\nI noticed you were having a hard time last time,\nso I wanted to comfort you a bit.\nComfort me?\nI mean, you're going through a lot emotionally.","sourceUid":"merged-mrhdpjiy-73","sourceNo":244,"viRanges":[{"start":1563.882886,"end":1576.084972}],"koRanges":[{"start":1554.16,"end":1561.43},{"start":1554.669448,"end":1565.650793},{"start":1561.18,"end":1562.65},{"start":1563.18,"end":1565.21}]},{"id":207,"readerNo":208,"displayNo":247,"n":247,"kind":"sub","type":"merged","vi":"Wind chẳng phải do giám đốc Ha mua lại sao?","ko":"윈드는 전무님이 사신 거 아니에요?","en":"Didn't you acquire Wind, Mr. Ha?","text":"Wind chẳng phải do giám đốc Ha mua lại sao?\n윈드는 전무님이 사신 거 아니에요?\nDidn't you acquire Wind, Mr. Ha?","sourceUid":"merged-mrhdq7v1-74","sourceNo":247,"viRanges":[{"start":1576.084972,"end":1581.123717}],"koRanges":[{"start":1568.08,"end":1570.05}]},{"id":208,"readerNo":209,"displayNo":248,"n":248,"kind":"sub","type":"merged","vi":"Đúng là vậy.\nVậy cậu cũng phải chịu trách nhiệm chứ. Sao lại có thể làm ngơ như vậy được?","ko":"그랬죠. 그럼 같이 책임을 주셔야지 이렇게 나몰라라는 건 좀 아니지 않습니까?","en":"I did.\nThen you should take responsibility, too.\nCompletely ignoring it is messed up, isn't it?","text":"Đúng là vậy.\nVậy cậu cũng phải chịu trách nhiệm chứ. Sao lại có thể làm ngơ như vậy được?\n그랬죠. 그럼 같이 책임을 주셔야지 이렇게 나몰라라는 건 좀 아니지 않습니까?\nI did.\nThen you should take responsibility, too.\nCompletely ignoring it is messed up, isn't it?","sourceUid":"merged-mrhdr18m-75","sourceNo":248,"viRanges":[{"start":1581.123717,"end":1587.614366}],"koRanges":[{"start":1570.05,"end":1576.600667},{"start":1572.16,"end":1576.69}]},{"id":209,"readerNo":210,"displayNo":249,"n":249,"kind":"sub","type":"merged","vi":"Làm ngơ gì chứ?\nChuyện niêm yết là do bộ phận IR phụ trách.\nGiám đốc Lee đã xin lỗi tôi rồi.\nVà tôi nói này, Wind chắc chắn sẽ được niêm yết.","ko":"뭐가 아니에요, 또. 상장은 IR팀에서 하는 건데.\n이 상무님은 저한테 미안하다고 하셨어요.\n그리고요, 윈드는요, 상장 될 겁니다.","en":"What do you mean, messed up?\nListing is the Investor Relations Team's responsibility.\nMr. Lee apologized to me.\nAlso, Wind...\nwill get listed.","text":"Làm ngơ gì chứ?\nChuyện niêm yết là do bộ phận IR phụ trách.\nGiám đốc Lee đã xin lỗi tôi rồi.\nVà tôi nói này, Wind chắc chắn sẽ được niêm yết.\n뭐가 아니에요, 또. 상장은 IR팀에서 하는 건데.\n이 상무님은 저한테 미안하다고 하셨어요.\n그리고요, 윈드는요, 상장 될 겁니다.\nWhat do you mean, messed up?\nListing is the Investor Relations Team's responsibility.\nMr. Lee apologized to me.\nAlso, Wind...\nwill get listed.","sourceUid":"merged-mrhdsm61-76","sourceNo":249,"viRanges":[{"start":1587.614366,"end":1598.292658}],"koRanges":[{"start":1576.600667,"end":1588.31},{"start":1577.12,"end":1581.03},{"start":1581.28,"end":1583.19},{"start":1584.68,"end":1587.87}]},{"id":210,"readerNo":211,"displayNo":252,"n":252,"kind":"sub","type":"merged","vi":"Trời ạ, giám đốc Oh.\nTrời đất ơi!\nVới cái kiểu này làm sao mà ông lên được chức giám đốc hay vậy?","ko":"아니, 대표님!\n이야, 아니 이런 눈치를 어떻게 임원까지 하셨을까?","en":"CEO.\nHow did you become an executive\nwhen you're so clueless?","text":"Trời ạ, giám đốc Oh.\nTrời đất ơi!\nVới cái kiểu này làm sao mà ông lên được chức giám đốc hay vậy?\n아니, 대표님!\n이야, 아니 이런 눈치를 어떻게 임원까지 하셨을까?\nCEO.\nHow did you become an executive\nwhen you're so clueless?","sourceUid":"merged-mrhdtqc2-77","sourceNo":252,"viRanges":[{"start":1598.292658,"end":1607.072703}],"koRanges":[{"start":1588.31,"end":1596.811333},{"start":1589.38,"end":1590.43},{"start":1592.44,"end":1596.39}]},{"id":211,"readerNo":212,"displayNo":254,"n":254,"kind":"sub","type":"merged","vi":"Ý cậu là gì đấy?\nTôi nghe nói gần đây giám đốc Oh đã bị Chủ tịch mắng đúng không?","ko":"무슨 소리입니까?\n오 대표 얼마 전에 회장님한테 엄청 혼나셨다면서요.","en":"What are you talking about?\nI thought...\nyou heard an earful from the chairman recently.","text":"Ý cậu là gì đấy?\nTôi nghe nói gần đây giám đốc Oh đã bị Chủ tịch mắng đúng không?\n무슨 소리입니까?\n오 대표 얼마 전에 회장님한테 엄청 혼나셨다면서요.\nWhat are you talking about?\nI thought...\nyou heard an earful from the chairman recently.","sourceUid":"merged-mrhdw6du-79","sourceNo":254,"viRanges":[{"start":1607.072703,"end":1612.482885}],"koRanges":[{"start":1596.811333,"end":1602.622},{"start":1597.1,"end":1598.61},{"start":1598.74,"end":1602.33}]},{"id":212,"readerNo":213,"displayNo":256,"n":256,"kind":"sub","type":"merged","vi":"Chủ tịch chỉ nóng giận nói vài câu thôi.\nNói thật ra có gì to tát đâu, mắng chửi cái gì chứ.","ko":"그냥 회장님이 욱하셔서 한마디 하신거지. 그리고 솔직히 그렇게 막 뭐라고 그러지도 않았어요. 무슨...","en":"He just lost his temper and took it out on me.\nAnd honestly,\nhe didn't really say that much! Goodness.","text":"Chủ tịch chỉ nóng giận nói vài câu thôi.\nNói thật ra có gì to tát đâu, mắng chửi cái gì chứ.\n그냥 회장님이 욱하셔서 한마디 하신거지. 그리고 솔직히 그렇게 막 뭐라고 그러지도 않았어요. 무슨...\nHe just lost his temper and took it out on me.\nAnd honestly,\nhe didn't really say that much! Goodness.","sourceUid":"merged-mrhdxghh-80","sourceNo":256,"viRanges":[{"start":1612.482885,"end":1624.321917}],"koRanges":[{"start":1602.622,"end":1614.483333},{"start":1606.54,"end":1614.33}]},{"id":213,"readerNo":214,"displayNo":257,"n":257,"kind":"sub","type":"merged","vi":"Khoảng phải vậy đâu, cái ông này.","ko":"아니 그게 아니지 이 사람아.","en":"That's not it, man.","text":"Khoảng phải vậy đâu, cái ông này.\n아니 그게 아니지 이 사람아.\nThat's not it, man.","sourceUid":"merged-mrhe0qom-81","sourceNo":257,"viRanges":[{"start":1624.321917,"end":1629.203922}],"koRanges":[{"start":1615.76,"end":1618.35}]},{"id":214,"readerNo":215,"displayNo":258,"n":258,"kind":"sub","type":"merged","vi":"Giám đốc Oh này.\nÔng nghĩ hôm đó Chủ tịch mắng như vậy là vì chuyện của Wind sao?","ko":"아니 오 대표. 회장님한테 그렇게 혼난게 윈드 때문인 것 같아요?","en":"CEO Oh,\ndo you think you got scolded by him\nbecause of Wind?","text":"Giám đốc Oh này.\nÔng nghĩ hôm đó Chủ tịch mắng như vậy là vì chuyện của Wind sao?\n아니 오 대표. 회장님한테 그렇게 혼난게 윈드 때문인 것 같아요?\nCEO Oh,\ndo you think you got scolded by him\nbecause of Wind?","sourceUid":"merged-mrhehi5l-84","sourceNo":258,"viRanges":[{"start":1629.203922,"end":1636.831183}],"koRanges":[{"start":1618.883333,"end":1626.445998},{"start":1620.1,"end":1626.11}]},{"id":215,"readerNo":216,"displayNo":259,"n":259,"kind":"sub","type":"merged","vi":"Thực ra Chủ tịch gọi cả giám đốc Lee đến để mắng giám đốc Oh,\nmục đích là muốn giám đốc Lee nghe thấy chứ không phải giám đốc Oh đâu.","ko":"회장님이 그날 이상무님까지 불러서 오 대표를 그렇게 혼내킨 건요\n이상무님 들으라고 그러신 거예요 오 대표가 아니라","en":"The chairman also called in Mr. Lee and scolded you in front of him\nfor Mr. Lee to hear. It wasn't for you, CEO Oh.","text":"Thực ra Chủ tịch gọi cả giám đốc Lee đến để mắng giám đốc Oh,\nmục đích là muốn giám đốc Lee nghe thấy chứ không phải giám đốc Oh đâu.\n회장님이 그날 이상무님까지 불러서 오 대표를 그렇게 혼내킨 건요\n이상무님 들으라고 그러신 거예요 오 대표가 아니라\nThe chairman also called in Mr. Lee and scolded you in front of him\nfor Mr. Lee to hear. It wasn't for you, CEO Oh.","sourceUid":"merged-mrhejga4-85","sourceNo":259,"viRanges":[{"start":1636.831183,"end":1647.042158}],"koRanges":[{"start":1626.445998,"end":1636.773998},{"start":1628.56,"end":1632.91},{"start":1632.66,"end":1636.25}]},{"id":216,"readerNo":217,"displayNo":261,"n":261,"kind":"sub","type":"merged","vi":"Nhưng mà...\nhọ khá là thân thiết.\nSao phải làm vậy?","ko":"아니 두 분 사이가 있는데 왜?","en":"But...\nthey are quite close.\nSo why?","text":"Nhưng mà...\nhọ khá là thân thiết.\nSao phải làm vậy?\n아니 두 분 사이가 있는데 왜?\nBut...\nthey are quite close.\nSo why?","sourceUid":"merged-mrhem9io-88","sourceNo":261,"viRanges":[{"start":1647.042158,"end":1652.815219}],"koRanges":[{"start":1636.773998,"end":1643.811331},{"start":1639.16,"end":1643.63}]},{"id":217,"readerNo":218,"displayNo":262,"n":262,"kind":"sub","type":"merged","vi":"Vì có mối quan hệ thân thiết,\nnên Chủ tịch mới không tiện nói thẳng thừng với giám đốc Lee.\nVậy nên mới gọi giám đốc Oh đến để nói những lời muốn nói với giám đốc Lee.","ko":"사이가 있으니까 이상무님한테 바로 하기 그럴 거 아닙니까\n그러니까 오 대표를 세워놓고 이상무한테 할 소리를 하신 거라니까","en":"Since they're close, it'd be hard to tell him directly.\nThat's why he brought you in\nand said what he wanted to say to Mr. Lee.","text":"Vì có mối quan hệ thân thiết,\nnên Chủ tịch mới không tiện nói thẳng thừng với giám đốc Lee.\nVậy nên mới gọi giám đốc Oh đến để nói những lời muốn nói với giám đốc Lee.\n사이가 있으니까 이상무님한테 바로 하기 그럴 거 아닙니까\n그러니까 오 대표를 세워놓고 이상무한테 할 소리를 하신 거라니까\nSince they're close, it'd be hard to tell him directly.\nThat's why he brought you in\nand said what he wanted to say to Mr. Lee.","sourceUid":"merged-mrheniip-90","sourceNo":262,"viRanges":[{"start":1652.815219,"end":1664.506466}],"koRanges":[{"start":1643.811331,"end":1654.571331},{"start":1644.14,"end":1648.85},{"start":1648.6,"end":1653.83}]},{"id":218,"readerNo":219,"displayNo":264,"n":264,"kind":"sub","type":"merged","vi":"Tôi đã nói rồi mà.\nChuyện niêm yết là do bộ phận IR làm.","ko":"내가 얘기했잖아요 상장은 IR팀에서 하는 거라고","en":"I told you already\nthat listing is handled by the IR Team.","text":"Tôi đã nói rồi mà.\nChuyện niêm yết là do bộ phận IR làm.\n내가 얘기했잖아요 상장은 IR팀에서 하는 거라고\nI told you already\nthat listing is handled by the IR Team.","sourceUid":"merged-mrheos17-91","sourceNo":264,"viRanges":[{"start":1664.506466,"end":1668.94438}],"koRanges":[{"start":1654.56,"end":1658.29},{"start":1654.571331,"end":1658.669998}]},{"id":219,"readerNo":220,"displayNo":269,"n":269,"kind":"sub","type":"merged","vi":"Vậy thì sao?\nCái gì mà \"vậy thì sao\"?\nÝ tôi là không thể cứ để yên như vậy được.\nCậu đừng có nói vòng vo nữa, muốn nói gì thì nói thẳng đi.","ko":"그래서요?\n그래서는 뭐가 그래서야\n다 하고만 있으면 안 된다는 거지 내 말은\n그러니까 빙빙 돌리지 마시고 할 말 있으면 그냥 하세요","en":"- So? - What do you mean, so?\nI'm saying you shouldn't just take things.\nStop beating about the bush.\nIf you have something to say, just say it.","text":"Vậy thì sao?\nCái gì mà \"vậy thì sao\"?\nÝ tôi là không thể cứ để yên như vậy được.\nCậu đừng có nói vòng vo nữa, muốn nói gì thì nói thẳng đi.\n그래서요?\n그래서는 뭐가 그래서야\n다 하고만 있으면 안 된다는 거지 내 말은\n그러니까 빙빙 돌리지 마시고 할 말 있으면 그냥 하세요\n- So? - What do you mean, so?\nI'm saying you shouldn't just take things.\nStop beating about the bush.\nIf you have something to say, just say it.","sourceUid":"merged-mrherezz-93","sourceNo":269,"viRanges":[{"start":1668.94438,"end":1682.402519}],"koRanges":[{"start":1658.04,"end":1658.53},{"start":1658.669998,"end":1672.059331},{"start":1660.43,"end":1661.52},{"start":1661.47,"end":1663.36},{"start":1663.89,"end":1666.68},{"start":1667.67,"end":1671.46}]},{"id":220,"readerNo":221,"displayNo":270,"n":270,"kind":"sub","type":"merged","vi":"Ông sắp đến kỳ tái ký hợp đồng rồi, đúng không?","ko":"재계약 얼마 안 남았죠.","en":"Your contract renewal is coming up, right?","text":"Ông sắp đến kỳ tái ký hợp đồng rồi, đúng không?\n재계약 얼마 안 남았죠.\nYour contract renewal is coming up, right?","sourceUid":"merged-mrheszyn-94","sourceNo":270,"viRanges":[],"koRanges":[{"start":1672.059331,"end":1678.557998},{"start":1676.88,"end":1678.15}]},{"id":221,"readerNo":222,"displayNo":272,"n":272,"kind":"sub","type":"merged","vi":"Giám đốc Oh, muốn làm việc lâu dài chuyện như này phải giải quyết rõ ràng.\nGiải quyết rõ ràng cái gì chứ?\nLà trách nhiệm của giám đốc Lee.\nPhải làm cho rõ ràng.","ko":"오래 보려면 이런 거 분명히 해야 돼 뭘 분명히 해요? 이상모님 책임이라고 확실히 해야지","en":"If you want to stick around,\nyou need to make these things clear.\nMake what clear?\nThat Mr. Lee is to blame.\nYou should make that clear.","text":"Giám đốc Oh, muốn làm việc lâu dài chuyện như này phải giải quyết rõ ràng.\nGiải quyết rõ ràng cái gì chứ?\nLà trách nhiệm của giám đốc Lee.\nPhải làm cho rõ ràng.\n오래 보려면 이런 거 분명히 해야 돼 뭘 분명히 해요? 이상모님 책임이라고 확실히 해야지\nIf you want to stick around,\nyou need to make these things clear.\nMake what clear?\nThat Mr. Lee is to blame.\nYou should make that clear.","sourceUid":"merged-mrhewi1c-97","sourceNo":272,"viRanges":[{"start":1689.581739,"end":1701.308279}],"koRanges":[{"start":1678.557998,"end":1690.856665},{"start":1684.83,"end":1686.76},{"start":1687.17,"end":1690.48}]},{"id":222,"readerNo":223,"displayNo":274,"n":274,"kind":"sub","type":"merged","vi":"Cậu làm vậy được không hả?\nĐến Chủ tịch không tiện mắng thẳng nên mới gọi tôi đến còn gì.\nVậy nên mới phải triệu tập cuộc họp hội đồng quản trị chứ.","ko":"아니 전무님이 하실 수 있어요? 회장님도 바로 혼내키지 못해서 나까지 불렀다면서?\n그러니까 이사회를 소집해야지.","en":"Could you do that? You said the chairman scolded me since he couldn't tell him directly. That's why we need to call for a board meeting.","text":"Cậu làm vậy được không hả?\nĐến Chủ tịch không tiện mắng thẳng nên mới gọi tôi đến còn gì.\nVậy nên mới phải triệu tập cuộc họp hội đồng quản trị chứ.\n아니 전무님이 하실 수 있어요? 회장님도 바로 혼내키지 못해서 나까지 불렀다면서?\n그러니까 이사회를 소집해야지.\nCould you do that? You said the chairman scolded me since he couldn't tell him directly. That's why we need to call for a board meeting.","sourceUid":"merged-mrhey4aw-98","sourceNo":274,"viRanges":[{"start":1689.581739,"end":1699.342859},{"start":1701.308279,"end":1712.88921}],"koRanges":[{"start":1690.856665,"end":1702.926804},{"start":1700.26,"end":1702.63}]},{"id":223,"readerNo":224,"displayNo":276,"n":276,"kind":"sub","type":"merged","vi":"Gì cơ? Còn cách nào khác sao? Ừ.","ko":"네? 뭐? 다른 방법 있어요? 어","en":"Pardon?\nWell, do you have any other ideas?\nYes.","text":"Gì cơ? Còn cách nào khác sao? Ừ.\n네? 뭐? 다른 방법 있어요? 어\nPardon?\nWell, do you have any other ideas?\nYes.","sourceUid":"merged-mrhf0d8f-99","sourceNo":276,"viRanges":[{"start":1712.88921,"end":1724.147986}],"koRanges":[{"start":1702.926804,"end":1708.518814},{"start":1704.16,"end":1707.27},{"start":1709.65,"end":1710.44}]},{"id":224,"readerNo":225,"displayNo":278,"n":278,"kind":"sub","type":"merged","vi":"Chúng tôi đến muộn chút.\nKhông đâu.\nĐến đúng lúc rồi mà.\nTôi bảo họ đến uống cùng luôn. Ông không phiền chứ?","ko":"좋습니다 아냐 아냐 뭐 딱 맞춰 구멍 뭐 오늘 같이 한잔 하자고 불렀습니다","en":"- I'm sorry I'm late. - No, no.\nYou came right on time.\nI invited them for drinks. That's okay, right?","text":"Chúng tôi đến muộn chút.\nKhông đâu.\nĐến đúng lúc rồi mà.\nTôi bảo họ đến uống cùng luôn. Ông không phiền chứ?\n좋습니다 아냐 아냐 뭐 딱 맞춰 구멍 뭐 오늘 같이 한잔 하자고 불렀습니다\n- I'm sorry I'm late. - No, no.\nYou came right on time.\nI invited them for drinks. That's okay, right?","sourceUid":"merged-mrhf7gky-103","sourceNo":278,"viRanges":[{"start":1724.147986,"end":1732.121137}],"koRanges":[{"start":1708.518814,"end":1720.329366},{"start":1713.49,"end":1720}]},{"id":225,"readerNo":226,"displayNo":279,"n":279,"kind":"sub","type":"merged","vi":"Mọi người đến rồi à? Mau vào đi.\nGiám đốc Kim.\nGiám đốc Oh cũng đến rồi à?\nSao cậu lại ở đây?\nChuyện gì đâu. Tôi đến ăn cơm thôi.\nChứ còn làm gì nữa?","ko":"좋으니 맞습니다 아 아 아 아 어디 패드 왔네\n뭐 주시겠어요 좀 일이 길 밥 먹으러 왔지 왜 없겠어","en":"Mr. Han.\n- I'm here. - Hey.\nCEO Kim.\nYou're here, too, CEO Oh.\nWhat brings you here?\nWhat do you mean? I came to eat.\nWhy else?","text":"Mọi người đến rồi à? Mau vào đi.\nGiám đốc Kim.\nGiám đốc Oh cũng đến rồi à?\nSao cậu lại ở đây?\nChuyện gì đâu. Tôi đến ăn cơm thôi.\nChứ còn làm gì nữa?\n좋으니 맞습니다 아 아 아 아 어디 패드 왔네\n뭐 주시겠어요 좀 일이 길 밥 먹으러 왔지 왜 없겠어\nMr. Han.\n- I'm here. - Hey.\nCEO Kim.\nYou're here, too, CEO Oh.\nWhat brings you here?\nWhat do you mean? I came to eat.\nWhy else?","sourceUid":"merged-mrhfatma-104","sourceNo":279,"viRanges":[{"start":1732.121137,"end":1742.030253}],"koRanges":[{"start":1720.329366,"end":1733.771333},{"start":1720.67,"end":1727.22},{"start":1726.97,"end":1731.24}]},{"id":226,"readerNo":227,"displayNo":"N99","n":"N99","kind":"narration","type":"narration" end":1965.1},{"start":1962.632293,"end":1965.342559}]},{"id":265,"readerNo":266,"displayNo":340,"n":340,"kind":"sub","type":"merged","vi":"Thế còn tôi thì sao?\nTôi mua một công ty 10 tỷ với giá 5 tỷ,\nchẳng phải là tôi mang về cho công ty 5 tỷ won rồi sao?","ko":"그럼 나는? 나는 100억짜리를 50억에 사왔으니까 내가 회사에 50억을 벌어다 준 거지 않습니까?","en":"Since I got a 10 billion won company for 5 billion,\nI earned my company 5 billion won.","text":"Thế còn tôi thì sao?\nTôi mua một công ty 10 tỷ với giá 5 tỷ,\nchẳng phải là tôi mang về cho công ty 5 tỷ won rồi sao?\n그럼 나는? 나는 100억짜리를 50억에 사왔으니까 내가 회사에 50억을 벌어다 준 거지 않습니까?\nSince I got a 10 billion won company for 5 billion,\nI earned my company 5 billion won.","sourceUid":"merged-mrhv9cfl-157","sourceNo":340,"viRanges":[],"koRanges":[{"start":1965.342559,"end":1974.153239},{"start":1966.03,"end":1973.65}]},{"id":266,"readerNo":267,"displayNo":341,"n":341,"kind":"sub","type":"merged","vi":"Thì đúng là vậy.\nNhưng lương của tôi thì sao?","ko":"그렇긴 하죠.\n근데 내 월급을 보면 초라하거든.","en":"That's true.\nBut when I look at my paycheck,\nit's pathetic in comparison.","text":"Thì đúng là vậy.\nNhưng lương của tôi thì sao?\n그렇긴 하죠.\n근데 내 월급을 보면 초라하거든.\nThat's true.\nBut when I look at my paycheck,\nit's pathetic in comparison.","sourceUid":"merged-mrhva636-158","sourceNo":341,"viRanges":[{"start":1984.136936,"end":1987.994351}],"koRanges":[{"start":1974.153239,"end":1979.542572},{"start":1974.78,"end":1975.97},{"start":1975.84,"end":1979.09}]},{"id":267,"readerNo":268,"displayNo":344,"n":344,"kind":"sub","type":"merged","vi":"Bèo bọt.\nCông ty thì không biết khi nào đuổi việc mình.\nĐương nhiên con người sẽ nghĩ đến chuyện tranh thủ kiếm chút khi có cơ hội chứ?","ko":"회사는 또 언제 잘릴지 알 수도 없고.\n그러니까 기회가 왔을 때 좀 챙겨놓자 이런 생각을 안 할 수가 없는 거야.","en":"And you never know when you could be laid off.\nSo it's natural for people to think they should siphon some while they can.","text":"Bèo bọt.\nCông ty thì không biết khi nào đuổi việc mình.\nĐương nhiên con người sẽ nghĩ đến chuyện tranh thủ kiếm chút khi có cơ hội chứ?\n회사는 또 언제 잘릴지 알 수도 없고.\n그러니까 기회가 왔을 때 좀 챙겨놓자 이런 생각을 안 할 수가 없는 거야.\nAnd you never know when you could be laid off.\nSo it's natural for people to think they should siphon some while they can.","sourceUid":"merged-mrhvbboa-159","sourceNo":344,"viRanges":[{"start":1987.994351,"end":1998.393988}],"koRanges":[{"start":1979.542572,"end":1989.091905},{"start":1979.9,"end":1982.11},{"start":1983.58,"end":1988.73}]},{"id":268,"readerNo":269,"displayNo":345,"n":345,"kind":"sub","type":"merged","vi":"Đúng là vậy.\nCái dễ nhất là bảo cái tên bán ấy,\nmang cái giá 5 tỷ won đến thì tôi mua cho anh 7 tỷ won,\ncòn anh đưa tôi 1 tỷ won.","ko":"진짜. 제일 쉬운 게 50억짜리 갖고 온 양반한테 내가 그거 70억에 사줄 테니까 나한테 10억만 달라.","en":"It's true then.\nThe easiest thing would be to tell the guy selling\na 5 billion won company that I would buy it for 7 billion\nif they give me 1 billion won.","text":"Đúng là vậy.\nCái dễ nhất là bảo cái tên bán ấy,\nmang cái giá 5 tỷ won đến thì tôi mua cho anh 7 tỷ won,\ncòn anh đưa tôi 1 tỷ won.\n진짜. 제일 쉬운 게 50억짜리 갖고 온 양반한테 내가 그거 70억에 사줄 테니까 나한테 10억만 달라.\nIt's true then.\nThe easiest thing would be to tell the guy selling\na 5 billion won company that I would buy it for 7 billion\nif they give me 1 billion won.","sourceUid":"merged-mrhvckv1-160","sourceNo":345,"viRanges":[{"start":1998.393988,"end":2009.029544}],"koRanges":[{"start":1989.091905,"end":1998.481238},{"start":1989.1,"end":1990.13},{"start":1991.61,"end":1997.95}]},{"id":269,"readerNo":270,"displayNo":347,"n":347,"kind":"sub","type":"merged","vi":"Rồi báo cáo với công ty,\nlà tôi đã ép được cái giá 10 tỷ won xuống còn 7 tỷ won.\nQuá dễ ăn rồi.","ko":"그러고는 회사에다가 내가 100억짜리를 70억으로 깎아왔습니다 하는 건데 이거 너무 쉽지.","en":"Then I say that I bought a 10 billion won company for 7 billion. This would be so easy.","text":"Rồi báo cáo với công ty,\nlà tôi đã ép được cái giá 10 tỷ won xuống còn 7 tỷ won.\nQuá dễ ăn rồi.\n그러고는 회사에다가 내가 100억짜리를 70억으로 깎아왔습니다 하는 건데 이거 너무 쉽지.\nThen I say that I bought a 10 billion won company for 7 billion. This would be so easy.","sourceUid":"merged-mrhve041-163","sourceNo":347,"viRanges":[{"start":2009.029544,"end":2015.006729}],"koRanges":[{"start":1997.96,"end":2004.09},{"start":1998.481238,"end":2004.410228}]},{"id":270,"readerNo":271,"displayNo":351,"n":351,"kind":"sub","type":"merged","vi":"Vậy ý anh là Yoon Joo No đã ăn hối lộ?\nThực ra là tôi ấy,\ntôi không hề có ý định làm khó thằng tôi từng nâng đỡ\nchỉ vì nó kiếm chút đỉnh đâu.","ko":"그럼 윤준호가 리메이트를 받았다 그거예요?\n내가요\n그거 좀 해먹었다고\n내가 키우던 놈한테\n모질게 하자 이런 얘기가 아니에요","en":"Then...\nare you saying Yun Ju No received a rebate?\nYou know,\nI'm not saying to treat a guy I trained badly\njust because he took some money.","text":"Vậy ý anh là Yoon Joo No đã ăn hối lộ?\nThực ra là tôi ấy,\ntôi không hề có ý định làm khó thằng tôi từng nâng đỡ\nchỉ vì nó kiếm chút đỉnh đâu.\n그럼 윤준호가 리메이트를 받았다 그거예요?\n내가요\n그거 좀 해먹었다고\n내가 키우던 놈한테\n모질게 하자 이런 얘기가 아니에요\nThen...\nare you saying Yun Ju No received a rebate?\nYou know,\nI'm not saying to treat a guy I trained badly\njust because he took some money.","sourceUid":"merged-mrhvin7l-167","sourceNo":351,"viRanges":[{"start":2015.006729,"end":2027.674404},{"start":2015.006729,"end":2025.587511}],"koRanges":[{"start":2004.410228,"end":2017.280192},{"start":2005.8,"end":2010.25},{"start":2010,"end":2010.85},{"start":2011.56,"end":2013.65},{"start":2013.4,"end":2015.41},{"start":2015.16,"end":2016.91}]},{"id":271,"readerNo":272,"displayNo":353,"n":353,"kind":"sub","type":"merged","vi":"Mà này,\nchuyện này tôi chưa nói với ai đâu nhé.","ko":"그 친구는\n내가 진짜 이런 얘기 어디 가서 한 번도 안 했는데.","en":"He is...\nI really never told anyone this anywhere.","text":"Mà này,\nchuyện này tôi chưa nói với ai đâu nhé.\n그 친구는\n내가 진짜 이런 얘기 어디 가서 한 번도 안 했는데.\nHe is...\nI really never told anyone this anywhere.","sourceUid":"merged-mrhvjhw2-168","sourceNo":353,"viRanges":[],"koRanges":[{"start":2016.66,"end":2019.87},{"start":2017.280192,"end":2030.149525},{"start":2026.06,"end" 179,"end":2052.85},{"start":2051.592192,"end":2053.379734}]},{"id":275,"readerNo":276,"displayNo":362,"n":362,"kind":"sub","type":"merged","vi":"Không phải là không có kết quả,\nmà là Yoon Joo No đã dùng tên của anh trai mình.","ko":"나온 게 없는 게 아니라\n윤준호가 지 친형 이름으로 했거든 그걸.","en":"It's not that they found nothing.\nYun Ju No did that under his brother's name.","text":"Không phải là không có kết quả,\nmà là Yoon Joo No đã dùng tên của anh trai mình.\n나온 게 없는 게 아니라\n윤준호가 지 친형 이름으로 했거든 그걸.\nIt's not that they found nothing.\nYun Ju No did that under his brother's name.","sourceUid":"merged-mrhvolod-173","sourceNo":362,"viRanges":[{"start":2063.4006,"end":2068.752812}],"koRanges":[{"start":2052.9,"end":2054.65},{"start":2053.379734,"end":2058.441082},{"start":2055.42,"end":2058.03}]},{"id":276,"readerNo":277,"displayNo":367,"n":367,"kind":"sub","type":"merged","vi":"Thế nên anh trai cậu ta mới chết trong quá trình điều tra.\nNhờ đó mà vụ án khép lại vì nghi phạm đã chết.","ko":"그러다가\n조사를 받다가 지 형이 죽어버린 거야.\n덕분에 피의자 사망으로 인한\n수사 종결.","en":"Then his brother died while being investigated.\nThus, the investigation closed\ndue to the death of the suspect.","text":"Thế nên anh trai cậu ta mới chết trong quá trình điều tra.\nNhờ đó mà vụ án khép lại vì nghi phạm đã chết.\n그러다가\n조사를 받다가 지 형이 죽어버린 거야.\n덕분에 피의자 사망으로 인한\n수사 종결.\nThen his brother died while being investigated.\nThus, the investigation closed\ndue to the death of the suspect.","sourceUid":"merged-mrhvpzmx-175","sourceNo":367,"viRanges":[{"start":2068.752812,"end":2078.69966}],"koRanges":[{"start":2058.441082,"end":2069.201082},{"start":2059.42,"end":2060.429},{"start":2061.04,"end":2063.969},{"start":2064.699,"end":2067.29},{"start":2067.679,"end":2068.929}]},{"id":277,"readerNo":278,"displayNo":368,"n":368,"kind":"sub","type":"merged","vi":"Giám đốc Lee đau lòng vì chuyện đó. Vừa thấy có lỗi nữa.\nTính ông ấy mọi người biết mà.","ko":"이 상무님은 그게 안타까운 거지. 미안하고. 성격 아시잖아요.","en":"That's what Mr. Lee feels bad and sorry abou
