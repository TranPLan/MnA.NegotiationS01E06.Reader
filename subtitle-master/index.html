ration","vi":"Lấy 50.000 won nằm dưới hộp cờ vây.","ko":"바둑통 아래 놓여 있던 5만 원을 챙긴다.","en":"Take the 50,000 won that was lying under the baduk box.","text":"Lấy 50.000 won nằm dưới hộp cờ vây.\n바둑통 아래 놓여 있던 5만 원을 챙긴다.\nTake the 50,000 won that was lying under the baduk box.","sourceUid":"nar-mrk6r1k8-lw8v8c","sourceNo":"N109","viRanges":[],"koRanges":[]},{"id":282,"readerNo":283,"displayNo":"N110","n":"N110","kind":"narration","type":"narration","vi":"Lee Sang-moo và ông già đều cười ngượng nghịu.","ko":"이상무도 노인도 모두 어색하게 웃는다.","en":"Lee Sang-moo and the old man both laugh awkwardly.","text":"Lee Sang-moo và ông già đều cười ngượng nghịu.\n이상무도 노인도 모두 어색하게 웃는다.\nLee Sang-moo and the old man both laugh awkwardly.","sourceUid":"nar-mrk6r2co-ly60u4","sourceNo":"N110","viRanges":[],"koRanges":[]},{"id":283,"readerNo":284,"displayNo":369,"n":369,"kind":"sub","type":"merged","vi":"Anh chơi giỏi đấy.\nKiểu gì cũng được.\nKhông muốn bị chửi nên chẳng dám nói lời khó nghe.","ko":"잘 드십니다\n이래도 좋고 저래도 좋고\n욕먹기 싫으니까 쓴소리도 안 하고","en":"You're good.\nHe's happy this way or that.\nHe doesn't want criticism so he says nothing mean.","text":"Anh chơi giỏi đấy.\nKiểu gì cũng được.\nKhông muốn bị chửi nên chẳng dám nói lời khó nghe.\n잘 드십니다\n이래도 좋고 저래도 좋고\n욕먹기 싫으니까 쓴소리도 안 하고\nYou're good.\nHe's happy this way or that.\nHe doesn't want criticism so he says nothing mean.","sourceUid":"merged-mrhvsg6x-177","sourceNo":369,"viRanges":[{"start":2120,"end":2130.8}],"koRanges":[{"start":2110,"end":2120.3},{"start":2111.88,"end":2113.73},{"start":2115.02,"end":2117.75},{"start":2117.5,"end":2119.77}]},{"id":284,"readerNo":285,"displayNo":"N111","n":"N111","kind":"narration","type":"narration","vi":". Nhà hàng Nhật Bản (ban đêm)","ko":". 일식집 ( 밤 )","en":". Japanese restaurant (night)","text":". Nhà hàng Nhật Bản (ban đêm)\n. 일식집 ( 밤 )\n. Japanese restaurant (night)","sourceUid":"nar-mrk6raz9-ar8182","sourceNo":"N111","viRanges":[],"koRanges":[]},{"id":285,"readerNo":286,"displayNo":372,"n":372,"kind":"s thought it was a conversation between Shimizu and others, but interpreted with a glance from Naito.","text":"Phiên dịch viên 2 tưởng đó là cuộc trò chuyện giữa Shimizu và những người khác nhưng lại giải thích bằng cái nhìn của Naito.\n통역2는 시미즈 측끼리 하는 대화인 줄 알았다가, 나이토의 눈짓에 통역한다.\nInterpreter 2 thought it was a conversation between Shimizu and others, but interpreted with a glance from Naito.","sourceUid":"nar-mrk7rcid-yso7hc","sourceNo":"N149","viRanges":[],"koRanges":[]},{"id":338,"readerNo":339,"displayNo":"N150","n":"N150","kind":"narration","type":"dialogue","vi":"Phiên dịch viên 2: Wind có phải là công ty sản xuất xe đạp không?","ko":"통역2:  윈드는 사이클을 만드는 회사가 맞습니까?","en":"Interpreter 2: Is Wind a company that manufactures cycles?","text":"Phiên dịch viên 2: Wind có phải là công ty sản xuất xe đạp không?\n통역2:  윈드는 사이클을 만드는 회사가 맞습니까?\nInterpreter 2: Is Wind a company that manufactures cycles?","sourceUid":"nar-mrk7rgo5-ncik7c","sourceNo":"N150","viRanges":[],"koRanges":[]},{"id":339,"readerNo":340,"displayNo":"N151","n":"N151","kind":"narration","type":"dialogue","vi":"Juno: Vâng.","ko":"주노:  네.","en":"Juno: Yes.","text":"Juno: Vâng.\n주노:  네.\nJuno: Yes.","sourceUid":"nar-mrk7rifj-n4ppdw","sourceNo":"N151","viRanges":[],"koRanges":[]},{"id":340,"readerNo":341,"displayNo":"N134","n":"N134","kind":"narration","type":"narration","vi":"Thay vì cố gắng đóng dấu Naito, anh lại chìm đắm trong suy nghĩ khi nhìn vào chữ ký của Park Rae-kyung trên hợp đồng.","ko":"나이토, 도장을 찍으려다 말고, 계약서에 박래경의 사인을 보며 생각에 잠긴다.","en":"Instead of trying to stamp Naito, he gets lost in thought as he looks at Park Rae-kyung's signature on the contract.","text":"Thay vì cố gắng đóng dấu Naito, anh lại chìm đắm trong suy nghĩ khi nhìn vào chữ ký của Park Rae-kyung trên hợp đồng.\n나이토, 도장을 찍으려다 말고, 계약서에 박래경의 사인을 보며 생각에 잠긴다.\nInstead of trying to stamp Naito, he gets lost in thought as he looks at Park Rae-kyung's signature on the contract.","sourceUid":"nar-mrk739sp-3yyi58","sourceNo":"N134","viRanges":[],"koRanges":[]},{"id":341,"readerNo":342,"displayNo":400,"n":400,"kind":"sub","type":"merged","vi":"Tôi giải thích một chút nhé?\nWind là công ty sản xuất cung tên.\nHọ đứng số một thế giới về cung tên...\nXin lỗi...\nnhưng tôi không thể ký được.\nAnh ấy nói không thể ký được.","ko":"あのウィンドウはアーツにも正常している会社ですアーツでは申し訳ありません私は証明できません\n사연은 이 시각 세계였습니다.\n사인할 수 없다고 하셨습니다.","en":"Could I give him a brief explanation?\nWell, Wind also makes archery bows.\nIt's number one in archery bows—\nI'm sorry,\nbut I cannot sign this.\nHe says he cannot sign this.","text":"Tôi giải thích một chút nhé?\nWind là công ty sản xuất cung tên.\nHọ đứng số một thế giới về cung tên...\nXin lỗi...\nnhưng tôi không thể ký được.\nAnh ấy nói không thể ký được.\nあのウィンドウはアーツにも正常している会社ですアーツでは申し訳ありません私は証明できません\n사연은 이 시각 세계였습니다.\n사인할 수 없다고 하셨습니다.\nCould I give him a brief explanation?\nWell, Wind also makes archery bows.\nIt's number one in archery bows—\nI'm sorry,\nbut I cannot sign this.\nHe says he cannot sign this.","sourceUid":"merged-mrhy08bz-207","sourceNo":400,"viRanges":[{"start":2401.669242,"end":2424.559714},{"start":2401.669242,"end":2417.936918}],"koRanges":[{"start":2392.457333,"end":2414.139579},{"start":2405.68,"end":2407.33},{"start":2407.08,"end":2408.51},{"start":2411.95,"end":2414.44}]},{"id":342,"readerNo":343,"displayNo":"N130","n":"N130","kind":"narration","type":"narration","vi":"* Giống như chữ ký tiếng Trung của Park Rae-kyung trên khẩu hiệu Ongojishin.","ko":"*\t 온고지신 표어에 있는 박래경의 한자 사인과 같은 것.","en":"* Same as Park Rae-kyung's Chinese character signature on the motto of Ongojishin.","text":"* Giống như chữ ký tiếng Trung của Park Rae-kyung trên khẩu hiệu Ongojishin.\n*\t 온고지신 표어에 있는 박래경의 한자 사인과 같은 것.\n* Same as Park Rae-kyung's Chinese character signature on the motto of Ongojishin.","sourceUid":"nar-mrk72wu3-vdge6w","sourceNo":"N130","viRanges":[],"koRanges":[]},{"id":343,"readerNo":344,"displayNo":"N131","n":"N131","kind":"narration","type":"narration","vi":"Naito đặt con ý vào hợp đồng này,","ko":"본인에 대해서 믿을 수 없기 때문입니다.\n나이토 씨, 고객님 앞에 실례하시겠습니까?\n부장, 당신은 자신의 경험을 위해","en":"I cannot trust this company.\nMr. Naito!\nMind your manners! They are guests.\nTeam Leader.\nAnh Naito!","text":"Tôi không thể tin tưởng công ty này.\nAnh Naito!\nHãy giữ phép lịch sự. Đây là khách của Shimizu.\nTrưởng phòng.\nAnh ký vào hợp đồng này,\n본인에 대해서 믿을 수 없기 때문입니다.\n나이토 씨, 고객님 앞에 실례하시겠습니까?\n부장, 당신은 자신의 경험을 위해\nI cannot trust this company.\nMr. Naito!\nMind your manners! They are guests.\nTeam Leader.\nAnh Naito!","sourceUid":"merged-mrhy4q5i-210","sourceNo":405,"viRanges":[{"start":2429.047137,"end":2441.408872}],"koRanges":[{"start":2419.39,"end":2422.44},{"start":2419.729594,"end":2433.145062},{"start":2422.53,"end":2426.26},{"start":2426.05,"end":2431.17}]},{"id":348,"readerNo":349,"displayNo":"N152","n":"N152","kind":"narration","type":"narration","vi":"Phía Shimizu xấu hổ. Phiên dịch viên 2 cũng ngượng ngùng và lưỡng lự khi phiên dịch.","ko":"당황하는 시미즈 측. 통역2도 당황해서 통역하기를 머뭇거린다.","en":"Shimizu's side is embarrassed. Interpreter 2 is also embarrassed and hesitates to interpret.","text":"Phía Shimizu xấu hổ. Phiên dịch viên 2 cũng ngượng ngùng và lưỡng lự khi phiên dịch.\n당황하는 시미즈 측. 통역2도 당황해서 통역하기를 머뭇거린다.\nShimizu's side is embarrassed. Interpreter 2 is also embarrassed and hesitates to interpret.","sourceUid":"nar-mrk7s63p-uz3mas","sourceNo":"N152","viRanges":[],"koRanges":[]},{"id":349,"readerNo":350,"displayNo":"N153","n":"N153","kind":"narration","type":"narration","vi":"Trong khi đó, Minjeong nói chuyện với Juno trước.","ko":"그사이, 민정이 먼저 주노에게 말한다.","en":"Meanwhile, Minjeong speaks to Juno first.","text":"Trong khi đó, Minjeong nói chuyện với Juno trước.\n그사이, 민정이 먼저 주노에게 말한다.\nMeanwhile, Minjeong speaks to Juno first.","sourceUid":"nar-mrk7s8ck-lmtj0k","sourceNo":"N153","viRanges":[],"koRanges":[]},{"id":350,"readerNo":351,"displayNo":"N154","n":"N154","kind":"narration","type":"narration","vi":"Soonyoung và Jinsu xấu hổ.","ko":"당황하는 순영과 진수.","en":"Soonyoung and Jinsu are embarrassed.","text":"Soonyoung và Jinsu xấu hổ.\n당황하는 순영과 진수.\nSoonyoung and Jinsu are embarrassed.","sourceUid":"nar-mrk7si19-tytmiv","sourceNo":"N154","viRanges":[],"koRanges":[]},{"id":351,"readerNo":352,"displayNo":408,"n":408,"kind":"sub","type":"merged","vi":"vì anh muốn đạt được chỉ tiêu để có thể lên Tokyo.\nBình tĩnh nào, Naito.","ko":"도쿄에 가고 싶기 때문에 이 계약을 진행하려고 하지 않습니까?\n나이토 씨, 조용히 하세요. 나이토 씨.","en":"You're signing this contract so you can meet your quota and go to Tokyo.\nCalm down, Mr. Naito.","text":"vì anh muốn đạt được chỉ tiêu để có thể lên Tokyo.\nBình tĩnh nào, Naito.\n도쿄에 가고 싶기 때문에 이 계약을 진행하려고 하지 않습니까?\n나이토 씨, 조용히 하세요. 나이토 씨.\nYou're signing this contract so you can meet your quota and go to Tokyo.\nCalm down, Mr. Naito.","sourceUid":"merged-mrhy6ne6-212","sourceNo":408,"viRanges":[{"start":2441.408872,"end":2445.537403}],"koRanges":[{"start":2430.92,"end":2434.07},{"start":2433.145062,"end":2434.31101},{"start":2434.02,"end":2436.01}]},{"id":352,"readerNo":353,"displayNo":410,"n":410,"kind":"sub","type":"merged","vi":"Anh cũng vậy thôi.\nTôi xin lỗi.\n- Khoan đã. - Anh Naito.\nAnh Naito.\nXin chờ một chút.","ko":"당신도 똑같지 않습니까?\n고객님, 죄송합니다.\n아니요, 아니요, 나이토 씨, 나이토 씨, 나이토 씨.\n나이토씨\n앉으세요","en":"You're the same as him.\nI'm sorry.\n- Hey, look... - Mr. Naito.\n- Mr. Naito. - What happened, Mr. Naito?\nAnh Naito.\nMr. Naito. Please wait a moment.","text":"Anh cũng vậy thôi.\nTôi xin lỗi.\n- Khoan đã. - Anh Naito.\nAnh Naito.\nXin chờ một chút.\n당신도 똑같지 않습니까?\n고객님, 죄송합니다.\n아니요, 아니요, 나이토 씨, 나이토 씨, 나이토 씨.\n나이토씨\n앉으세요\nYou're the same as him.\nI'm sorry.\n- Hey, look... - Mr. Naito.\n- Mr. Naito. - What happened, Mr. Naito?\nAnh Naito.\nMr. Naito. Please wait a moment.","sourceUid":"merged-mrhy9ymz-213","sourceNo":410,"viRanges":[{"start":2445.537403,"end":2461.698491}],"koRanges":[{"start":2434.31101,"end":2451.62076},{"start":2435.86,"end":2437.09},{"start":2438.72,"end":2440.19},{"start":2440.32,"end":2443.75},{"start":2444.88,"end":2446.01},{"start":2447.86,"end":2448.99},{"start":2448.74,"end":2449.19},{"start":2449.5,"end":2450.37}]},{"id":353,"readerNo":354,"displayNo":421,"n":421,"kind":"sub","type":"merged","vi":"Vì chúng tôi thay đổi số lượng đặt hàng nên anh không tin tưởng chúng tôi?\nNếu chúng tôi định lừa gạt Shimizu,\nchúng tôi đã có thể đặt mua truyền động từ các công ty sản xuất xe đạp khác rồi.","ko":"주문 수량을 변경하는 것 때문에\n실례하지 못하겠다는 겁니까?\n저희가 시미즈를\n속이려고 했다면 다른 사이클 회사에서\n기여를 재구매했어도 됐을 겁니다","en":"Are you unable to trust us because of the quantity change?\nIf we wanted to deceive Shimizu,\nwe could've bought the gears from other bike companies.","text":"Vì chúng tôi thay đổi số lượng đặt hàng nên anh không tin tưởng chúng tôi?\nNếu chúng tôi định lừa gạt Shimizu,\nchúng tôi đã có thể đặt mua truyền động từ các công ty sản xuất xe đạp khác rồi.\n주문 수량을 변경하는 것 때문에\n실례하지 못하겠다는 겁니까?\n저희가 시미즈를\n속이려고 했다면 다른 사이클 회사에서\n기여를 재구매했어도 됐을 겁니다\nAre you unable to trust us because of the quantity change?\nIf we wanted to deceive Shimizu,\nwe could've bought the gears from other bike companies.","sourceUid":"merged-mrhyckni-215","sourceNo":421,"viRanges":[{"start":2461.698491,"end":2475.299851}],"koRanges":[{"start":2451.62076,"end":2464.550053},{"start":2454.32,"end":2456.63},{"start":2456.38,"end":2458.13},{"start":2458.44,"end":2460.19},{"start":2459.94,"end":2462.45},{"start":2462.2,"end":2463.93}]},{"id":354,"readerNo":355,"displayNo":422,"n":422,"kind":"sub","type":"merged","vi":"Như chúng tôi đã nói,\nngành công nghiệp xe đạp ở Hàn Quốc đang gặp khó khăn.\nDù sao thì,","ko":"말씀드렸다시피\n한국의 자전거 산업은 현재\n부침을 겪고 있으니까요\n아, 이런식으로","en":"As I've mentioned already, the bicycle industry in Korea is struggling.\nWell...","text":"Như chúng tôi đã nói,\nngành công nghiệp xe đạp ở Hàn Quốc đang gặp khó khăn.\nDù sao thì,\n말씀드렸다시피\n한국의 자전거 산업은 현재\n부침을 겪고 있으니까요\n아, 이런식으로\nAs I've mentioned already, the bicycle industry in Korea is struggling.\nWell...","sourceUid":"merged-mrhyf28h-216","sourceNo":422,"viRanges":[{"start":2475.299851,"end":2480.428558}],"koRanges":[{"start":2463.68,"end":2465.61},{"start":2464.550053,"end":2471.195392},{"start":2465.36,"end":2467.39},{"start":2467.58,"end":2469.03},{"start":2468.78,"end":2472.07}]},{"id":355,"readerNo":356,"displayNo":"N155","n":"N155","kind":"narration","type":"narration","vi":"Phiên dịch viên số 1 nhanh chóng đến gần, đứng đằng sau Naito và thì thầm phiên dịch.","ko":"통역1이 얼른 다가와 나이토 뒤에 서서 귓속말로 통역한다.","en":"Interpreter 1 quickly approaches, stands behind Naito, and translates in a whisper.","text":"Phiên dịch viên số 1 nhanh chóng đến gần, đứng đằng sau Naito và thì thầm phiên dịch.\n통역1이 얼른 다가와 나이토 뒤에 서서 귓속말로 통역한다.\nInterpreter 1 quickly approaches, stands behind Naito, and translates in a whisper.","sourceUid":"nar-mrk7tf6k-90nxhi","sourceNo":"N155","viRanges":[],"koRanges":[]},{"id":356,"readerNo":357,"displayNo":426,"n":426,"kind":"sub","type":"merged","vi":"nếu đã thay đổi như thế này, chẳng phải có thể lại thay đổi nữa sao?\nMột hợp đồng như vậy thì không có ý nghĩa gì cả.\nAnh ấy nói nếu có thể thay đổi như này, việc ký lại hợp đồng không còn ý nghĩa.","ko":"계약을 변경하는 것은\nそういう契約は意味がないんですよ。","en":"if you're changing it like this, can't it change again later?\nThere's no point in such a contract.\nIf it's this changeable, there's no point in redoing the contract.","text":"nếu đã thay đổi như thế này, chẳng phải có thể lại thay đổi nữa sao?\nMột hợp đồng như vậy thì không có ý nghĩa gì cả.\nAnh ấy nói nếu có thể thay đổi như này, việc ký lại hợp đồng không còn ý nghĩa.\n계약을 변경하는 것은\nそういう契約は意味がないんですよ。\nif you're changing it like this, can't it change again later?\nThere's no point in such a contract.\nIf it's this changeable, there's no point in redoing the contract.","sourceUid":"merged-mrhyg1h1-217","sourceNo":426,"viRanges":[{"start":2480.428558,"end":2492.994371}],"koRanges":[{"start":2471.195392,"end":2480.206059},{"start":2471.82,"end":2473.97},{"start":2477,"end":2478.65}]},{"id":357,"readerNo":358,"displayNo":428,"n":428,"kind":"sub","type":"merged","vi":"Chính vì vậy mà hôm nay chúng ta mới ký hợp đồng.","ko":"그렇기 때문에 오늘 계약서를 쓰는 겁니다.","en":"That's why we are writing up a contract today.","text":"Chính vì vậy mà hôm nay chúng ta mới ký hợp đồng.\n그렇기 때문에 오늘 계약서를 쓰는 겁니다.\nThat's why we are writing up a contract today.","sourceUid":"merged-mrhyh8gd-218","sourceNo":428,"viRanges":[{"start":2492.994371,"end":2495.347307}],"koRanges":[{"start":2480.206059,"end":2485.147392},{"start":2482.69,"end":2484.9}]},{"id":358,"readerNo":359,"displayNo":429,"n":429,"kind":"sub","type":"merged","vi":"Hợp đồng không chỉ là lời hứa phải giữ\nmà còn quy định rõ ràng các điều khoản phạt nếu vi phạm.","ko":"계약은 지켜야 할 약속이기도 하지만 어겼을 시에 물어야 할 페널티도 정하는 거니까요.","en":"A contract is a promise we need to keep but also decides the penalty for breaching it.","text":"Hợp đồng không chỉ là lời hứa phải giữ\nmà còn quy định rõ ràng các điều khoản phạt nếu vi phạm.\n계약은 지켜야 할 약속이기도 하지만 어겼을 시에 물어야 할 페널티도 정하는 거니까요.\nA contract is a promise we need to keep but also decides the penalty for breaching it.","sourceUid":"merged-mrhyiuvq-219","sourceNo":429,"viRanges":[{"start":2495.347307,"end":2500.606627}],"koRanges":[{"start":2485.147392,"end":2490.699392},{"start":2485.27,"end":2490.54}]},{"id":359,"readerNo":360,"displayNo":430,"n":430,"kind":"sub","type":"merged","vi":"Tôi không biết những điều đó.\nNhưng tôi biết rằng một công ty đã từng thất hứa\nthì sẽ lại thất hứa lần nữa.\nĐiều đó thì tôi biết rất rõ.\nTôi xin phép.\nAnh ấy nói một khi đã thất hứa thì có thể sẽ thất hứa lần nữa.\nTôi xin lỗi.","ko":"一度約束を破った会社というのはまた約束を破ります私はそれをわかってますから失礼します\n申し訳ございません。","en":"I don't know about any of that.\nBut I know that a company that broke a promise once will break it again.\nI know that very well. If you'll excuse me.\nHe says if you break a promise once, you can break it again.\nI'm so sorry.\nMy apologies.","text":"Tôi không biết những điều đó.\nNhưng tôi biết rằng một công ty đã từng thất hứa\nthì sẽ lại thất hứa lần nữa.\nĐiều đó thì tôi biết rất rõ.\nTôi xin phép.\nAnh ấy nói một khi đã thất hứa thì có thể sẽ thất hứa lần nữa.\nTôi xin lỗi.\n一度約束を破った会社というのはまた約束を破ります私はそれをわかってますから失礼します\n申し訳ございません。\nI don't know about any of that.\nBut I know that a company that broke a promise once will break it again.\nI know that very well. If you'll excuse me.\nHe says if you break a promise once, you can break it again.\nI'm so sorry.\nMy apologies.","sourceUid":"merged-mrhyk8dh-220","sourceNo":430,"viRanges":[{"start":2500.606627,"end":2523.564666}],"koRanges":[{"start":2490.699392,"end":2513.49688},{"start":2503.98,"end":2505.63},{"start":2525.05,"end":2526.7}]},{"id":360,"readerNo":361,"displayNo":"N156","n":"N156","kind":"narration","type":"narration","vi":"Naito vượt qua Juno và đi ra ngoài.","ko":"나이토, 주노를 지나쳐 나가버린다.","en":"Naito passes Juno and goes out.","text":"Naito vượt qua Juno và đi ra ngoài.\n나이토, 주노를 지나쳐 나가버린다.\nNaito passes Juno and goes out.","sourceUid":"nar-mrk7uwds-1b5n9x","sourceNo":"N156","viRanges":[],"koRanges":[]},{"id":361,"readerNo":362,"displayNo":"N157","n":"N157","kind":"narration","type":"narration","vi":"Juno nhìn thấy 'hình ngựa' trên quần áo đi làm của Naito khi cô đi ngang qua.","ko":"주노, 지나치는 나이토의 작업복에 ‘말 문양’을 본다.","en":"Juno sees a ‘horse pattern’ on Naito’s work clothes as she passes by.","text":"Juno nhìn thấy 'hình ngựa' trên quần áo đi làm của Naito khi cô đi ngang qua.\n주노, 지나치는 나이토의 작업복에 ‘말 문양’을 본다.\nJuno sees a ‘horse pattern’ on Naito’s work clothes as she passes by.","sourceUid":"nar-mrk7uxjj-tww5qe","sourceNo":"N157","viRanges":[],"koRanges":[]},{"id":362,"readerNo":363,"displayNo":"N158","n":"N158","kind":"narration","type":"narration","vi":". Phòng họp, Trụ sở Shimizu (Nhật Bản) (ngày)","ko":". 회의실, 시미즈 본사 ( 일본 ) ( 낮 )","en":". Conference room, Shimizu Headquarters (Japan) (day)","text":". Phòng họp, Trụ sở Shimizu (Nhật Bản) (ngày)\n. 회의실, 시미즈 본사 ( 일본 ) ( 낮 )\n. Conference room, Shimizu Headquarters (Japan) (day)","sourceUid":"nar-mrk7uyqa-fe5tdp","sourceNo":"N158","viRanges":[],"koRanges":[]},{"id":363,"readerNo":364,"displayNo":"N159","n":"N159","kind":"narration","type":"narration","vi":"Yoshida cúi đầu xin lỗi Juno và Juno cũng cúi đầu đáp lại.","ko":"요시다가 주노를 향해 고개 숙이며 사과하고, 주노도 목례로 답한다.","en":"Yoshida bows his head to Juno and apologizes, and Juno also bows in response.","text":"Yoshida cúi đầu xin lỗi Juno và Juno cũng cúi đầu đáp lại.\n요시다가 주노를 향해 고개 숙이며 사과하고, 주노도 목례로 답한다.\nYoshida bows his head to Juno and apologizes, and Juno also bows in response.","sourceUid":"nar-mrk7uzyi-5ahaa8","sourceNo":"N159","viRanges":[],"koRanges":[]},{"id":364,"readerNo":365,"displayNo":"N160","n":"N160","kind":"narration","type":"narration","vi":"Phía sau Juno là Sunyoung, Minjeong và Jinsu, phía sau Yoshida là Ozaki và Hirose.","ko":"주노 뒤에는 순영, 민정, 진수가 서 있고, 요시다 뒤로는 오자키, 히로세가 서 있다.","en":"Behind Juno are Sunyoung, Minjeong, and Jinsu, and behind Yoshida are Ozaki and Hirose.","text":"Phía sau Juno là Sunyoung, Minjeong và Jinsu, phía sau Yoshida là Ozaki và Hirose.\n주노 뒤에는 순영, 민정, 진수가 서 있고, 요시다 뒤로는 오자키, 히로세가 서 있다.\nBehind Juno are Sunyoung, Minjeong, and Jinsu, and behind Yoshida are Ozaki and Hirose.","sourceUid":"nar-mrk7v0wq-ja33bj","sourceNo":"N160","viRanges":[],"koRanges":[]},{"id":365,"readerNo":366,"displayNo":433,"n":433,"kind":"sub","type":"merged","vi":"Tôi thành thật xin lỗi.\nHợp đồng thay đổi số lượng cung ứng này\ncần có chữ ký của giám đốc nhà máy sản xuất\nđể quản lý và đảm bảo vấn đề nguồn cung.","ko":"아폴로디스, 컨트럭트의 양도를 바꿔주기 위해서입니다.\n프로덕션 매니저의 도입이\n매니저 사업에 관한 것에 대한 요구가 필요합니다.","en":"For changing the quantity on the contract, the production manager's approval is required from the perspective of managing supply issues.","text":"Tôi thành thật xin lỗi.\nHợp đồng thay đổi số lượng cung ứng này\ncần có chữ ký của giám đốc nhà máy sản xuất\nđể quản lý và đảm bảo vấn đề nguồn cung.\n아폴로디스, 컨트럭트의 양도를 바꿔주기 위해서입니다.\n프로덕션 매니저의 도입이\n매니저 사업에 관한 것에 대한 요구가 필요합니다.\nFor changing the quantity on the contract, the production manager's approval is required from the perspective of managing supply issues.","sourceUid":"merged-mrhyo8ly-223","sourceNo":433,"viRanges":[{"start":2523.564666,"end":2556.386045},{"start":2523.564666,"end":2552.685353}],"koRanges":[{"start":2513.49688,"end":2548.606225},{"start":2532.68,"end":2538.19},{"start":2539.42,"end":2541.95},{"start":2541.7,"end":2548.25}]},{"id":366,"readerNo":367,"displayNo":435,"n":435,"kind":"sub","type":"merged","vi":"Tôi rất xin lỗi vì mọi chuyện lại thành ra như thế này.\nTôi nghĩ có lý do nào đó khiến anh Naito hành động như vậy.","ko":"매우 심각한 일이 이렇게 되었습니다. 나이토는 그런 행동을 하는 이유가 있어야 합니다.","en":"I'm very sorry things have turned out this way.\nThere must be a reason Naito is taking such a stance.","text":"Tôi rất xin lỗi vì mọi chuyện lại thành ra như thế này.\nTôi nghĩ có lý do nào đó khiến anh Naito hành động như vậy.\n매우 심각한 일이 이렇게 되었습니다. 나이토는 그런 행동을 하는 이유가 있어야 합니다.\nI'm very sorry things have turned out this way.\nThere must be a reason Naito is taking such a stance.","sourceUid":"merged-mrhyowq2-224","sourceNo":435,"viRanges":[{"start":2556.386045,"end":2567.568892}],"koRanges":[{"start":2548.606225,"end":2557.904892},{"start":2549.48,"end":2552.57},{"start":2554.7,"end":2557.53}]},{"id":367,"readerNo":368,"displayNo":437,"n":437,"kind":"sub","type":"merged","vi":"Tôi cũng không rõ lý do chính xác...\nNhưng anh Naito đến từ gia đình là nghệ nhân làm phụ tùng xe đạp lâu đời.","ko":"제가 말할 수 있는 이유는\n그 이유는, 그녀는 크라스맨의 세대에서 온 것이라고 볼 수 있어야 합니다.","en":"I-I can't say what the reason is.\nBut it should be noted that\nhe comes from generations of craftsmen.","text":"Tôi cũng không rõ lý do chính xác...\nNhưng anh Naito đến từ gia đình là nghệ nhân làm phụ tùng xe đạp lâu đời.\n제가 말할 수 있는 이유는\n그 이유는, 그녀는 크라스맨의 세대에서 온 것이라고 볼 수 있어야 합니다.\nI-I can't say what the reason is.\nBut it should be noted that\nhe comes from generations of craftsmen.","sourceUid":"merged-mrhyqr4e-226","sourceNo":437,"viRanges":[{"start":2567.568892,"end":2581.614228},{"start":2567.568892,"end":2574.148858}],"koRanges":[{"start":2557.904892,"end":2572.051754},{"start":2559.64,"end":2562.77},{"start":2562.52,"end":2571.37}]},{"id":368,"readerNo":369,"displayNo":439,"n":439,"kind":"sub","type":"merged","vi":"Vì vậy anh ấy rất bảo thủ,\nvà không có nhiều tư duy kinh doanh.","ko":"그 이유는 그녀는 매우 강력한 기술자입니다.","en":"That's why he's very strong-willed and lacks business acumen.","text":"Vì vậy anh ấy rất bảo thủ,\nvà không có nhiều tư duy kinh doanh.\n그 이유는 그녀는 매우 강력한 기술자입니다.\nThat's why he's very strong-willed and lacks business acumen.","sourceUid":"merged-mrhyrpda-227","sourceNo":439,"viRanges":[{"start":2581.614228,"end":2588.781656}],"koRanges":[{"start":2571.12,"end":2575.26},{"start":2572.051754,"end":2578.918645}]},{"id":369,"readerNo":370,"displayNo":440,"n":440,"kind":"sub","type":"merged","vi":"Bố mẹ của anh Naito cũng làm về bộ truyền động xe đạp sao?\nKhông phải bộ truyền động,","ko":"나이터의 부모님도 기술자였죠?\n아니요.","en":"Did Naito's parents also make gears?\nNot gears.","text":"Bố mẹ của anh Naito cũng làm về bộ truyền động xe đạp sao?\nKhông phải bộ truyền động,\n나이터의 부모님도 기술자였죠?\n아니요.\nDid Naito's parents also make gears?\nNot gears.","sourceUid":"merged-mrhyt0ns-228","sourceNo":440,"viRanges":[{"start":2588.781656,"end":2595.619952}],"koRanges":[{"start":2578.918645,"end":2584.587978},{"start":2579.35,"end":2582.34},{"start":2582.65,"end":2584.04}]},{"id":370,"readerNo":371,"displayNo":442,"n":442,"kind":"sub","type":"merged","vi":"nhưng bố của anh Naito cũng là một nghệ nhân,\nđặc biệt là cơ khí chính xác.","ko":"그녀의 아버지도 크라스맨이었습니다.\n특히, 기술자입니다.","en":"But his father was also a master craftsman.\nSpecifically, precision machining.","text":"nhưng bố của anh Naito cũng là một nghệ nhân,\nđặc biệt là cơ khí chính xác.\n그녀의 아버지도 크라스맨이었습니다.\n특히, 기술자입니다.\nBut his father was also a master craftsman.\nSpecifically, precision machining.","sourceUid":"merged-mrhytt15-229","sourceNo":442,"viRanges":[{"start":2595.619952,"end":2601.965546}],"koRanges":[{"start":2584.587978,"end":2592.118645},{"start":2585.44,"end":2588.84},{"start":2588.59,"end":2591.64}]},{"id":371,"readerNo":372,"displayNo":444,"n":444,"kind":"sub","type":"merged","vi":"Ông ấy còn tự mình điều hành nhà máy.\nBộ đồng phục mà anh Naito mặc\nVâng.\ncó lẽ là của công ty mà bố anh ấy điều hành.","ko":"그는 자신의 작품을 가지고 있었다.\n그는 그의 아버지의 회사의 옷을 입었을 것이다.\n네. 네.","en":"He even had his own factory.\nThe work clothes Mr. Naito was wearing were probably from his father's company.\nYes. Yes.","text":"Ông ấy còn tự mình điều hành nhà máy.\nBộ đồng phục mà anh Naito mặc\nVâng.\ncó lẽ là của công ty mà bố anh ấy điều hành.\n그는 자신의 작품을 가지고 있었다.\n그는 그의 아버지의 회사의 옷을 입었을 것이다.\n네. 네.\nHe even had his own factory.\nThe work clothes Mr. Naito was wearing were probably from his father's company.\nYes. Yes.","sourceUid":"merged-mrhyut7w-231","sourceNo":444,"viRanges":[{"start":2601.965546,"end":2612.945696}],"koRanges":[{"start":2591.39,"end":2595.58},{"start":2592.118645,"end":2602.777312},{"start":2596.21,"end":2599.56},{"start":2602.41,"end":2605.46}]},{"id":372,"readerNo":373,"displayNo":447,"n":447,"kind":"sub","type":"merged","vi":"Đúng vậy.\nNhà máy đó hiện giờ là nhà máy của Shimizu.\nAnh Naito gần như là người thừa kế và tiếp tục điều hành nhà máy.\nTôi nghĩ Nhật Bản được duy trì là nhờ những nghệ nhân như vậy.","ko":"제트 팩토리 카레 시미스\nMr. Naito is continuing his family legacy, running the factory himself.\nI believe Japan is sustained by such craftsmanship.","en":"That... That factory is currently Shimizu's.\nMr. Naito is continuing his family legacy, running the factory himself.\nMr. Naito is continuing his family legacy\nby running the factory himself.\nI believe Japan is sustained by such craftsmanship.","text":"Đúng vậy.\nNhà máy đó hiện giờ là nhà máy của Shimizu.\nAnh Naito gần như là người thừa kế và tiếp tục điều hành nhà máy.\nTôi nghĩ Nhật Bản được duy trì là nhờ những nghệ nhân như vậy.\n제트 팩토리 카레 시미스\nMr. Naito is continuing hi l.\nI see...","text":"Anh về rồi ạ.\nAnh ký hợp đồng rồi ạ?\nTừ từ rồi hãy ăn cơn.\nCon muốn ăn.\nCó chuyện gì ạ?\nDạo này đơn hàng bị hủy nhiều quá.\nTôi biết.\nKho của chúng ta đầy mất rồi.\nCứ làm tốt việc của mình đi.\n何かあったんですか最近キャンセルになった在庫も多すぎます倉庫もギュギュですよ\nDid you sign the contract?\n- Did you have one this morning? - No, not yet.\nDid something happen?\nWe have too many canceled units these days.\nI already know that.\nOur warehouses are full too!\nWe just have to do our job well.\nI see...","sourceUid":"merged-mrhz2q3q-235","sourceNo":451,"viRanges":[{"start":2672.902821,"end":2695.532977},{"start":2672.902821,"end":2686.674528}],"koRanges":[{"start":2662.794595,"end":2687.135338},{"start":2680.22,"end":2681.87}]},{"id":387,"readerNo":388,"displayNo":"N173","n":"N173","kind":"narration","type":"narration","vi":"Naito không thể trả lời mà chỉ đi vào trong nhà máy.","ko":"나이토, 뭐라 답하지 못하고, 그냥 공장 안으로 향한다.","en":"Naito, unable to answer, just heads inside the factory.","text":"Naito không thể trả lời mà chỉ đi vào trong nhà máy.\n나이토, 뭐라 답하지 못하고, 그냥 공장 안으로 향한다.\nNaito, unable to answer, just heads inside the factory.","sourceUid":"nar-mrk7xvqu-n1g308","sourceNo":"N173","viRanges":[],"koRanges":[]},{"id":388,"readerNo":389,"displayNo":"N174","n":"N174","kind":"narration","type":"narration","vi":"* Kẹo lâu đời nhất của Nhật Bản. bán tại. Kẹo sữa có vẽ ký tự 'Peko'","ko":"*\t 일본에서 가장 오래된 사탕. ex. ‘페코’ 캐릭터가 그려진 밀키 사탕","en":"* Japan's oldest candy. ex. Milky candy with ‘Peko’ character drawn on it","text":"* Kẹo lâu đời nhất của Nhật Bản. bán tại. Kẹo sữa có vẽ ký tự 'Peko'\n*\t 일본에서 가장 오래된 사탕. ex. ‘페코’ 캐릭터가 그려진 밀키 사탕\n* Japan's oldest candy. ex. Milky candy with ‘Peko’ character drawn on it","sourceUid":"nar-mrk7xxdk-n06mg9","sourceNo":"N174","viRanges":[],"koRanges":[]},{"id":389,"readerNo":390,"displayNo":"N175","n":"N175","kind":"narration","type":"narration","vi":"Một công nhân nhà máy đi theo anh ta.","ko":"그를 뒤따르는 공장 직원.","en":"A factory worker follows him.","text":"Một công nhân nhà máy đi theo anh ta.\n그를 뒤따르는 공장 직원.\nA factory worker follows him.","sourceUid":"nar-mrk7xyrk-duuho9","sourceNo":"N175","viRanges":[],"koRanges":[]},{"id":390,"readerNo":391,"displayNo":452,"n":452,"kind":"sub","type":"merged","vi":"Tôi biết nhưng mà...\nXin chào.\nChúng tôi xin lỗi vì không thể tiếp tục hợp đồng được nữa.\nTôi rất xin lỗi.\nTôi xin lỗi.\nKhông đâu.","ko":"I don't think we can proceed with the contract any further.","en":"Hello.\nI don't think we can proceed with the contract any further.\nI'm very sorry.\nI'm sorry.\nNo.","text":"Tôi biết nhưng mà...\nXin chào.\nChúng tôi xin lỗi vì không thể tiếp tục hợp đồng được nữa.\nTôi rất xin lỗi.\nTôi xin lỗi.\nKhông đâu.\nI don't think we can proceed with the contract any further.\nHello.\nI don't think we can proceed with the contract any further.\nI'm very sorry.\nI'm sorry.\nNo.","sourceUid":"merged-mrhz3x2o-236","sourceNo":452,"viRanges":[{"start":2695.532977,"end":2714.863589}],"koRanges":[{"start":2687.135338,"end":2704.25378},{"start":2691.72,"end":2697.09}]},{"id":391,"readerNo":392,"displayNo":"N176","n":"N176","kind":"narration","type":"narration","vi":"Naito bước vào nhà máy mà không trả lời.","ko":"대답 없이 공장 안으로 들어서는 나이토.","en":"Naito enters the factory without answering.","text":"Naito bước vào nhà máy mà không trả lời.\n대답 없이 공장 안으로 들어서는 나이토.\nNaito enters the factory without answering.","sourceUid":"nar-mrk7yk3g-l8tn9y","sourceNo":"N176","viRanges":[],"koRanges":[]},{"id":392,"readerNo":393,"displayNo":"N177","n":"N177","kind":"narration","type":"narration","vi":"Người nhân viên nhà máy tháo găng tay ra như thể không còn lựa chọn nào khác và đi theo Naito vào nhà máy.","ko":"공장 직원이 어쩔 수 없다는 듯이 장갑을 털며 나이토를 따라 공장 안으로 들어선다.","en":"The factory employee shakes off his gloves as if he has no choice and follows Naito into the factory.","text":"Người nhân viên nhà máy tháo găng tay ra như thể không còn lựa chọn nào khác và đi theo Naito vào nhà máy.\n공장 직원이 어쩔 수 없다는 듯이 장갑을 털며 나이토를 따라 공장 안으로 들어선다.\nThe factory employee shakes off his gloves as if he has no choice and follows Naito into the factory.","sourceUid":"nar-mrk7ylli-xdt52y","sourceNo":"N177","viRanges":[],"koRanges":[]},{"id":393,"readerNo":394,"displayNo":"N178","n":"N178","kind":"narration","type":"narration","vi":". Phòng họp, trụ sở Shimizu (montage) (Nhật Bản) (ngày)","ko":". 회의실, 시미즈 본사 ( 몽타주 ) ( 일본 ) ( 낮 )","en":". Conference room, Shimizu headquarters (montage) (Japan) (day)","text":". Phòng họp, trụ sở Shimizu (montage) (Nhật Bản) (ngày)\n. 회의실, 시미즈 본사 ( 몽타주 ) ( 일본 ) ( 낮 )\n. Conference room, Shimizu headquarters (montage) (Japan) (day)","sourceUid":"nar-mrk7ynum-9eae79","sourceNo":"N178","viRanges":[],"koRanges":[]},{"id":394,"readerNo":395,"displayNo":"N179","n":"N179","kind":"narration","type":"dialogue","vi":"Yoshida: (Tiếng Anh) Chúng tôi không thể tiếp tục hợp đồng nữa... Chúng tôi xin lỗi.","ko":"요시다:  (영어) 저희도 더 이상 계약을 진행할 수 없는 점... 사과드립니다.","en":"Yoshida: (English) We are unable to proceed with the contract any further... We apologize.","text":"Yoshida: (Tiếng Anh) Chúng tôi không thể tiếp tục hợp đồng nữa... Chúng tôi xin lỗi.\n요시다:  (영어) 저희도 더 이상 계약을 진행할 수 없는 점... 사과드립니다.\nYoshida: (English) We are unable to proceed with the contract any further... We apologize.","sourceUid":"nar-mrk7ytw0-beudf0","sourceNo":"N179","viRanges":[],"koRanges":[]},{"id":395,"readerNo":396,"displayNo":"N180","n":"N180","kind":"narration","type":"narration","vi":"Yoshida lại cúi đầu.","ko":"다시 고개 숙여 인사하는 요시다.","en":"Yoshida bows again.","text":"Yoshida lại cúi đầu.\n다시 고개 숙여 인사하는 요시다.\nYoshida bows again.","sourceUid":"nar-mrk7yuis-2r50bb","sourceNo":"N180","viRanges":[],"koRanges":[]},{"id":396,"readerNo":397,"displayNo":"N181","n":"N181","kind":"narration","type":"narration","vi":". Bên ngoài phòng họp, Trụ sở chính Shimizu (Nhật Bản) (ban ngày)","ko":". 회의실 밖, 시미즈 본사 ( 일본 ) ( 낮 )","en":". Outside the conference room, Shimizu Headquarters (Japan) (daytime)","text":". Bên ngoài phòng họp, Trụ sở chính Shimizu (Nhật Bản) (ban ngày)\n. 회의실 밖, 시미즈 본사 ( 일본 ) ( 낮 )\n. Outside the conference room, Shimizu Headquarters (Japan) (daytime)","sourceUid":"nar-mrk7yv4m-ouqz2c","sourceNo":"N181","viRanges":[],"koRanges":[]},{"id":397,"readerNo":398,"displayNo":"N182","n":"N182","kind":"narration","type":"narration","vi":"Juno và nhóm rời khỏi phòng họp, Hirose theo sau.","ko":"회의실을 나서는 주노와 팀원들, 히로세가 따라나선다.","en":"Juno and the team leave the conference room, and Hirose follows.","text":"Juno và nhóm rời khỏi phòng họp, Hirose theo sau.\n회의실을 나서는 주노와 팀원들, 히로세가 따라나선다.\nJuno and the team leave the conference room, and Hirose follows.","sourceUid":"nar-mrk7yysn-rqw4f1","sourceNo":"N182","viRanges":[],"koRanges":[]},{"id":398,"readerNo":399,"displayNo":453,"n":453,"kind":"sub","type":"merged","vi":"Tôi xin phép tiễn mọi người.","ko":"제가 폐연하겠습니다.","en":"I'll escort you back.","text":"Tôi xin phép tiễn mọi người.\n제가 폐연하겠습니다.\nI'll escort you back.","sourceUid":"merged-mrhz55mw-237","sourceNo":453,"viRanges":[{"start":2714.863589,"end":2728.873929}],"koRanges":[{"start":2704.25378,"end":2718.532113},{"start":2715.66,"end":2716.99}]},{"id":399,"readerNo":400,"displayNo":"N183","n":"N183","kind":"narration","type":"narration","vi":". Sảnh, Trụ sở Shimizu (Nhật Bản) (ngày)","ko":". 로비, 시미즈 본사 ( 일본 ) ( 낮 )","en":". Lobby, Shimizu Headquarters (Japan) (day)","text":". Sảnh, Trụ sở Shimizu (Nhật Bản) (ngày)\n. 로비, 시미즈 본사 ( 일본 ) ( 낮 )\n. Lobby, Shimizu Headquarters (Japan) (day)","sourceUid":"nar-mrk7z58t-oxl0rt","sourceNo":"N183","viRanges":[],"koRanges":[]},{"id":400,"readerNo":401,"displayNo":"N184","n":"N184","kind":"narration","type":"narration","vi":"Khi Juno và nhóm rời khỏi sảnh, họ hỏi Hirose.","ko":"주노와 팀원들이 로비를 나서다가, 히로세에게 묻는다.","en":"As Juno and the team leave the lobby, they ask Hirose.","text":"Khi Juno và nhóm rời khỏi sảnh, họ hỏi Hirose.\n주노와 팀원들이 로비를 나서다가, 히로세에게 묻는다.\nAs Juno and the team leave the lobby, they ask Hirose.","sourceUid":"nar-mrk7z6m8-hjdho2","sourceNo":"N184","viRanges":[],"koRanges":[]},{"id":401,"readerNo":402,"displayNo":"N185","n":"N185","kind":"narration","type":"narration","vi":"Ngay sau đó, một chiếc xe van dừng lại trước mặt Juno và cả nhóm.","ko":"마침, 주노와 팀원들 앞에 서는 밴 택시.","en":"Just then, a van taxi stops in front of Juno and the team.","text":"Ngay sau đó, một chiếc xe van dừng lại trước mặt Juno và cả nhóm.\n마침, 주노와 팀원들 앞에 서는 밴 택시.\nJust then, a van taxi stops in front of Juno and the team.","sourceUid":"nar-mrk7zf79-a9pqam","sourceNo":"N185","viRanges":[],"koRanges":[]},{"id":402,"readerNo":403,"displayNo":"N186","n":"N186","kind":"narration","type":"narration","vi":". Taxi (Nhật Bản) (ngày)","ko":". 택시 ( 일본 ) ( 낮 )","en":". Taxi (Japan) (day)","text":". Taxi (Nhật Bản) (ngày)\n. 택시 ( 일본 ) ( 낮 )\n. Taxi (Japan) (day)","sourceUid":"nar-mrk7zgtq-thc503","sourceNo":"N186","viRanges":[],"koRanges":[]},{"id":403,"readerNo":404,"displayNo":"N187","n":"N187","kind":"narration","type":"narration","vi":"Các thành viên trong nhóm trên một chiếc xe taxi.","ko":"밴 택시에 탄 팀원들.","en":"Team members in a van taxi.","text":"Các thành viên trong nhóm trên một chiếc xe taxi.\n밴 택시에 탄 팀원들.\nTeam members in a van taxi.","sourceUid":"nar-mrk7zhv2-9n04ne","sourceNo":"N187","viRanges":[],"koRanges":[]},{"id":404,"readerNo":405,"displayNo":"N188","n":"N188","kind":"narration","type":"dialogue","vi":"Khi Jinsu cho tài xế xem địa chỉ anh tìm thấy trên điện thoại di động, Minjeong nói:","ko":"진수가 핸드폰으로 찾은 주소를 기사에게 보여주면, 민정이 말한다.","en":"When Jinsu shows the driver the address he found on his cell phone, Minjeong says:","text":"Khi Jinsu cho tài xế xem địa chỉ anh tìm thấy trên điện thoại di động, Minjeong nói:\n진수가 핸드폰으로 찾은 주소를 기사에게 보여주면, 민정이 말한다.\nWhen Jinsu shows the driver the address he found on his cell phone, Minjeong says:","sourceUid":"nar-mrk7zj4c-n6tfis","sourceNo":"N188","viRanges":[],"koRanges":[]},{"id":405,"readerNo":406,"displayNo":454,"n":454,"kind":"sub","type":"merged","vi":"Cô Hirose.\nVâng?\nTôi muốn gặp anh Naito, có cách nào không?\nBình thường anh ấy đến nhà máy làm việc.\nLàm ơn đưa chúng tôi đến đây.\nNhà máy Shimizu phải không?\nÀ vâng. Ông có biết chỗ đó không?\nĐương nhiên là tôi biết. Chỗ đó tồn tại hơn 100 năm rồi.\nVậy sao?","ko":"히로세 씨, 나이투 씨를 뵙고 싶은데 방법이 없을까요?\nああそうですか。","en":"- Hirose. - Yes?\nI'd like to meet with Mr. Naito.\nIs there a way?\nHe usually heads to the factory for work.\nExcuse me, could you take us here?\nOh, Shimizu Factory?\nOh, yes. Do you know the place?\nOf course, I do.\nIt's been around for over 100 years.\nIs that so?","text":"Cô Hirose.\nVâng?\nTôi muốn gặp anh Naito, có cách nào không?\nBình thường anh ấy đến nhà máy làm việc.\nLàm ơn đưa chúng tôi đến đây.\nNhà máy Shimizu phải không?\nÀ vâng. Ông có biết chỗ đó không?\nĐương nhiên là tôi biết. Chỗ đó tồn tại hơn 100 năm rồi.\nVậy sao?\n히로세 씨, 나이투 씨를 뵙고 싶은데 방법이 없을까요?\nああそうですか。\n- Hirose. - Yes?\nI'd like to meet with Mr. Naito.\nIs there a way?\nHe usually heads to the factory for work.\nExcuse me, could you take us here?\nOh, Shimizu Factory?\nOh, yes. Do you know the place?\nOf course, I do.\nIt's been around for over 100 years.\nIs that so?","sourceUid":"merged-mrhz6owg-238","sourceNo":454,"viRanges":[{"start":2728.873929,"end":2763.346854}],"koRanges":[{"start":2718.532113,"end":2754.174792},{"start":2728.02,"end":2733.93},{"start":2751.59,"end":2753.24}]},{"id":406,"readerNo":407,"displayNo":456,"n":456,"kind":"sub","type":"merged","vi":"Nếu chúng ta muốn nhận lô hàng của Speed,\ncó nhất thiết phải có sự cho phép của Shimizu không?","ko":"우리가 스피드 물량을 대신 받을 때 꼭 심의실에 허락이 있어야 할까요?","en":"Will we absolutely need Shimizu's permission to receive Speed's inventory in their place?","text":"Nếu chúng ta muốn nhận lô hàng của Speed,\ncó nhất thiết phải có sự cho phép của Shimizu không?\n우리가 스피드 물량을 대신 받을 때 꼭 심의실에 허락이 있어야 할까요?\nWill we absolutely need Shimizu's permission to receive Speed's inventory in their place?","sourceUid":"merged-mrhz8xcm-239","sourceNo":456,"viRanges":[{"start":2763.346854,"end":2774.544495}],"koRanges":[{"start":2754.174792,"end":2763.654792},{"start":2759.34,"end":2763.35}]},{"id":407,"readerNo":408,"displayNo":"N189","n":"N189","kind":"narration","type":"narration","vi":"Taxi chạy ở ngoại ô thành phố.","ko":"택시가 도시 외곽을 달린다.","en":"Taxis run on the outskirts of the city.","text":"Taxi chạy ở ngoại ô thành phố.\n택시가 도시 외곽을 달린다.\nTaxis run on the outskirts of the city.","sourceUid":"nar-mrk7zyhi-rym6ey","sourceNo":"N189","viRanges":[],"koRanges":[]},{"id":408,"readerNo":409,"displayNo":457,"n":457,"kind":"sub","type":"merged","vi":"Vâng. Điều khoản cấm bán lại khá nghiêm ngặt.","ko":"네. 재판매 금지 조항이 꽤 엄격하게 들어가 있더라고요.","en":"Yes, the contract contained a strict resale ban.","text":"Vâng. Điều khoản cấm bán lại khá nghiêm ngặt.\n네. 재판매 금지 조항이 꽤 엄격하게 들어가 있더라고요.\nYes, the contract contained a strict resale ban.","sourceUid":"merged-mrhz9vgt-240","sourceNo":457,"viRanges":[{"start":2774.544495,"end":2778.42513}],"koRanges":[{"start":2763.654792,"end":2768.054792},{"start":2763.7,"end":2767.87}]},{"id":409,"readerNo":410,"displayNo":458,"n":458,"kind":"sub","type":"merged","vi":"Chúng ta không thể lùi lịch ký hợp đồng lại sao?","ko":"우리 물량 계약을 좀 늦출 수는 없을까요?","en":"Can we delay the supply contract?","text":"Chúng ta không thể lùi lịch ký hợp đồng lại sao?\n우리 물량 계약을 좀 늦출 수는 없을까요?\nCan we delay the supply contract?","sourceUid":"merged-mrhzaflq-241","sourceNo":458,"viRanges":[{"start":2778.42513,"end":2781.185402}],"koRanges":[{"start":2768.054792,"end":2771.261502},{"start":2768.62,"end":2770.91}]},{"id":410,"readerNo":411,"displayNo":459,"n":459,"kind":"sub","type":"merged","vi":"Không được. Chúng ta đã có hợp đồng OEM rồi.","ko":"네. 오의향 계약이 잡혀 있어서요.","en":"No, we can't. We have an OEM contract scheduled.","text":"Không được. Chúng ta đã có hợp đồng OEM rồi.\n네. 오의향 계약이 잡혀 있어서요.\nNo, we can't. We have an OEM contract scheduled.","sourceUid":"merged-mrhzaukf-242","sourceNo":459,"viRanges":[{"start":2781.185402,"end":2784. , Minjeong và Jinsu bước ra khỏi taxi.","ko":"택시에서 주노와 순영, 민정, 진수가 내린다.","en":"Juno, Sunyoung, Minjeong, and Jinsu get out of the taxi.","text":"Juno, Sunyoung, Minjeong và Jinsu bước ra khỏi taxi.\n택시에서 주노와 순영, 민정, 진수가 내린다.\nJuno, Sunyoung, Minjeong, and Jinsu get out of the taxi.","sourceUid":"nar-mrk80qko-m2wcho","sourceNo":"N194","viRanges":[],"koRanges":[]},{"id":416,"readerNo":417,"displayNo":"N195","n":"N195","kind":"narration","type":"narration","vi":"Một nhân viên nhà máy tiếp cận sự xuất hiện của những khách hàng xa lạ.","ko":"낯선 손님들의 등장에, 공장 직원이 다가온다.","en":"A factory employee approaches the appearance of unfamiliar customers.","text":"Một nhân viên nhà máy tiếp cận sự xuất hiện của những khách hàng xa lạ.\n낯선 손님들의 등장에, 공장 직원이 다가온다.\nA factory employee approaches the appearance of unfamiliar customers.","sourceUid":"nar-mrk80s4j-ygab1x","sourceNo":"N195","viRanges":[],"koRanges":[]},{"id":417,"readerNo":418,"displayNo":"N196","n":"N196","kind":"narration","type":"narration","vi":"Juno và nhóm nói xin chào.","ko":"주노와 팀원들이 인사한다.","en":"Juno and the team say hello.","text":"Juno và nhóm nói xin chào.\n주노와 팀원들이 인사한다.\nJuno and the team say hello.","sourceUid":"nar-mrk8176c-w9nki3","sourceNo":"N196","viRanges":[],"koRanges":[]},{"id":418,"readerNo":419,"displayNo":"N197","n":"N197","kind":"narration","type":"narration","vi":"Hầu hết nhân viên nhà máy đều mặc đồng phục mới có chữ 'Shimizu' được viết trên đó.","ko":"공장 직원들은 대부분 ‘시미즈’라고 적힌 새 유니폼을 입고 있다.","en":"Most factory employees are wearing new uniforms with ‘Shimizu’ written on them.","text":"Hầu hết nhân viên nhà máy đều mặc đồng phục mới có chữ 'Shimizu' được viết trên đó.\n공장 직원들은 대부분 ‘시미즈’라고 적힌 새 유니폼을 입고 있다.\nMost factory employees are wearing new uniforms with ‘Shimizu’ written on them.","sourceUid":"nar-mrk817zs-5s0p32","sourceNo":"N197","viRanges":[],"koRanges":[]},{"id":419,"readerNo":420,"displayNo":460,"n":460,"kind":"sub","type":"merged","vi":"Xin chào.\nSao các vị lại đến đây?\nChúng tôi đến từ có thể nhanh chóng đuổi kịp Wind nhờ danh tiếng đó.","ko":"아무래도 다이치가 가지고 있던 명성이 있었으니까요. 다른 데서 인수를 하게 되면 그 명성으로 금방 윈드를 따라잡을 수도 있다고 봤습니다.","en":"Daichi had built a strong reputation.\nIf another company acquired it,\nI thought they could quickly catch up\nto Wind with that reputation.","text":"Dù sao thì Daichi cũng có danh tiếng nhất định.\nNếu để công ty khác mua lại,\nhọ có thể nhanh chóng đuổi kịp Wind nhờ danh tiếng đó.\n아무래도 다이치가 가지고 있던 명성이 있었으니까요. 다른 데서 인수를 하게 되면 그 명성으로 금방 윈드를 따라잡을 수도 있다고 봤습니다.\nDaichi had built a strong reputation.\nIf another company acquired it,\nI thought they could quickly catch up\nto Wind with that reputation.","sourceUid":"merged-mrip7hls-23","sourceNo":489,"viRanges":[{"start":3027.108262,"end":3039.555331}],"koRanges":[{"start":3017.285909,"end":3029.776592},{"start":3018.77,"end":3029.44}]},{"id":470,"readerNo":471,"displayNo":490,"n":490,"kind":"sub","type":"merged","vi":"Vậy ra giám đốc mua để phòng thủ.","ko":"방어차원에서 인수를 하셨다는 거군요?","en":"So you acquired it as a defensive move.","text":"Vậy ra giám đốc mua để phòng thủ.\n방어차원에서 인수를 하셨다는 거군요?\nSo you acquired it as a defensive move.","sourceUid":"merged-mrip8kj6-24","sourceNo":490,"viRanges":[{"start":3039.555331,"end":3043.938036}],"koRanges":[{"start":3029.776592,"end":3033.564453},{"start":3030.57,"end":3033.38}]},{"id":471,"readerNo":472,"displayNo":491,"n":491,"kind":"sub","type":"merged","vi":"Đúng vậy.\nNhưng lúc đó,\nDaichi đã đưa ra cho tôi một điều kiện nếu muốn mua lại.\nLà tôi phải tạo ra một cây cung tốt hơn cả Daichi.","ko":"네. 근데 그때 다이치가 저에게 인수 조건으로 그걸 내걸더라고요. 다이치보다 좋은 양궁을 만들어 달라고요.","en":"Yes.\nBut...\nDaichi set this as the condition\nfor the acquisition at the time.\n\"Please make a better bow than Daichi.\"","text":"Đúng vậy.\nNhưng lúc đó,\nDaichi đã đưa ra cho tôi một điều kiện nếu muốn mua lại.\nLà tôi phải tạo ra một cây cung tốt hơn cả Daichi.\n네. 근데 그때 다이치가 저에게 인수 조건으로 그걸 내걸더라고요. 다이치보다 좋은 양궁을 만들어 달라고요.\nYes.\nBut...\nDaichi set this as the condition\nfor the acquisition at the time.\n\"Please make a better bow than Daichi.\"","sourceUid":"merged-mrip9clu-25","sourceNo":491,"viRanges":[{"start":3043.938036,"end":3059.926077}],"koRanges":[{"start":3033.83,"end":3049.44}]},{"id":472,"readerNo":473,"displayNo":492,"n":492,"kind":"sub","type":"merged","vi":"Lúc đầu tôi hơi bất ngờ.\nBan đầu tôi nghĩ họ đang khoe khoang.","ko":"처음엔 좀 당혹스러웠어요. 처음에 허셀부리나 보다 했죠.","en":"At first, I was a bit taken aback.\nAt first, I thought it was just bravado.","text":"Lúc đầu tôi hơi bất ngờ.\nBan đầu tôi nghĩ họ đang khoe khoang.\n처음엔 좀 당혹스러웠어요. 처음에 허셀부리나 보다 했죠.\nAt first, I was a bit taken aback.\nAt first, I thought it was just bravado.","sourceUid":"merged-mripmxs5-26","sourceNo":492,"viRanges":[{"start":3059.926077,"end":3067.353589}],"koRanges":[{"start":3049.44,"end":3057.466223},{"start":3049.81,"end":3056.9}]},{"id":473,"readerNo":474,"displayNo":493,"n":493,"kind":"sub","type":"merged","vi":"Giờ nghĩ lại thì thấy,\ncó lẽ đó là sự chân thành của họ.","ko":"근데 지금 생각해보면 진심이 아니었을까 싶어요.","en":"I think he truly meant it.\nBut looking back now,","text":"Giờ nghĩ lại thì thấy,\ncó lẽ đó là sự chân thành của họ.\n근데 지금 생각해보면 진심이 아니었을까 싶어요.\nI think he truly meant it.\nBut looking back now,","sourceUid":"merged-mriptzel-30","sourceNo":493,"viRanges":[],"koRanges":[{"start":3057.466223,"end":3065.256779},{"start":3058.32,"end":3064.89}]},{"id":474,"readerNo":475,"displayNo":"N228","n":"N228","kind":"narration","type":"narration","vi":"Park Rae-kyung đi ngang qua phòng triển lãm, lướt qua những bức ảnh của những vận động viên giành huy chương vàng bắn cung được trưng bày và đứng trước bức ảnh kỷ niệm ngày Daiichi tiếp quản.","ko":"전시실을 지나는 박래경, 전시된 양궁 금메달리스트들의 사진을 지나 다이치를 인수하던 날 기념하는 사진 앞에 선다.","en":"Park Rae-kyung passes through the exhibition room, past the photos of archery gold medalists on display, and stands in front of a photo commemorating the day Daiichi took over.","text":"Park Rae-kyung đi ngang qua phòng triển lãm, lướt qua những bức ảnh của những vận động viên giành huy chương vàng bắn cung được trưng bày và đứng trước bức ảnh kỷ niệm ngày Daiichi tiếp quản.\n전시실을 지나는 박래경, 전시된 양궁 금메달리스트들의 사진을 지나 다이치를 인수하던 날 기념하는 사진 앞에 선다.\nPark Rae-kyung passes through the exhibition room, past the photos of archery gold medalists on display, and stands in front of a photo commemorating the day Daiichi took over.","sourceUid":"nar-mrk8k4k7-t99i8i","sourceNo":"N228","viRanges":[],"koRanges":[]},{"id":475,"readerNo":476,"displayNo":686,"n":686,"kind":"sub","type":"merged","vi":"Giám đốc, tôi có thể gặp anh một lát được không?\nTôi sẽ đến chỗ anh ngay đây.","ko":"","en":"CEO, could I see you for a moment?\nI'll come to you right now.","text":"Giám đốc, tôi có thể gặp anh một lát được không?\nTôi sẽ đến chỗ anh ngay đây.\nCEO, could I see you for a moment?\nI'll come to you right now.","sourceUid":"merged-mripufxx-31","sourceNo":686,"viRanges":[{"start":3067.353589,"end":3083.195254}],"koRanges":[{"start":3065.256779,"end":3072.706071}]},{"id":476,"readerNo":477,"displayNo":"N229","n":"N229","kind":"narration","type":"narration","vi":". Trên taxi (Nhật Bản) (đêm)","ko":". 택시 안 ( 일본 ) ( 밤 )","en":". In a taxi (Japan) (night)","text":". Trên taxi (Nhật Bản) (đêm)\n. 택시 안 ( 일본 ) ( 밤 )\n. In a taxi (Japan) (night)","sourceUid":"nar-mrk8ke3h-dlo8wx","sourceNo":"N229","viRanges":[],"koRanges":[]},{"id":477,"readerNo":478,"displayNo":"N230","n":"N230","kind":"narration","type":"narration","vi":"Juno nhìn ra ngoài cửa sổ.","ko":"창밖을 보는 주노.","en":"Juno looks out the window.","text":"Juno nhìn ra ngoài cửa sổ.\n창밖을 보는 주노.\nJuno looks out the window.","sourceUid":"nar-mrk8kfy7-hsv964","sourceNo":"N230","viRanges":[],"koRanges":[]},{"id":478,"readerNo":479,"displayNo":"N231","n":"N231","kind":"narration","type":"dialogue","vi":"Juno (la hét): Tôi đi đây.","ko":"주노(소리):   제가 지금 가겠습니다.","en":"Juno (screaming): I'll go now.","text":"Juno (la hét): Tôi đi đây.\n주노(소리):   제가 지금 가겠습니다.\nJuno (screaming): I'll go now.","sourceUid": g in Wind's office...","text":"Bức ảnh Daichi treo ở văn phòng Wind ấy.\n윈드 사무실에 걸려있던 다이치 사진이요\nThe photo of Daichi hanging in Wind's office...","sourceUid":"merged-mriu7n0n-33","sourceNo":495,"viRanges":[{"start":3089.563342,"end":3094.793637}],"koRanges":[{"start":3079.467446,"end":3084.168779},{"start":3080.91,"end":3083.96}]},{"id":484,"readerNo":485,"displayNo":496,"n":496,"kind":"sub","type":"merged","vi":"À, bức ảnh chụp lúc thu mua Daichi?","ko":"아, 그 다이치 인수할 때 찍은 거요?","en":"The one taken when I acquired Daichi?","text":"À, bức ảnh chụp lúc thu mua Daichi?\n아, 그 다이치 인수할 때 찍은 거요?\nThe one taken when I acquired Daichi?","sourceUid":"merged-mriu86nm-34","sourceNo":496,"viRanges":[{"start":3094.793637,"end":3100.885973}],"koRanges":[{"start":3083.71,"end":3090.06},{"start":3084.168779,"end":3090.146238}]},{"id":485,"readerNo":486,"displayNo":497,"n":497,"kind":"sub","type":"merged","vi":"Vâng, có phải người nghệ nhân trong ảnh đã vẽ bản thiết kế đó không?","ko":"네, 그 사진 속에 장인께서 그 설계도를 그리신 거죠?","en":"Yes. The artisan in that photo\ndrew that blueprint, right?","text":"Vâng, có phải người nghệ nhân trong ảnh đã vẽ bản thiết kế đó không?\n네, 그 사진 속에 장인께서 그 설계도를 그리신 거죠?\nYes. The artisan in that photo\ndrew that blueprint, right?","sourceUid":"merged-mriuahx2-35","sourceNo":497,"viRanges":[{"start":3100.885973,"end":3106.363263}],"koRanges":[{"start":3090.146238,"end":3096.156916},{"start":3090.69,"end":3095.78}]},{"id":486,"readerNo":487,"displayNo":"N235","n":"N235","kind":"narration","type":"narration","vi":". Showroom, Trụ sở Gió (đêm)","ko":". 전시실, 윈드 본사 ( 밤 )","en":". Showroom, Wind Headquarters (night)","text":". Showroom, Trụ sở Gió (đêm)\n. 전시실, 윈드 본사 ( 밤 )\n. Showroom, Wind Headquarters (night)","sourceUid":"nar-mrk8lhhw-zq2r79","sourceNo":"N235","viRanges":[],"koRanges":[]},{"id":487,"readerNo":488,"displayNo":"N236","n":"N236","kind":"narration","type":"narration","vi":"Park Rae-kyung đang xem bức ảnh chụp nhà máy Daiichi treo trong phòng triển lãm.","ko":"박래경이 전시실에 걸려 있는 다이치 공장 사진을 바라보고 있다.","en":"Rae-kyung Park is looking at a photo of the Daiichi factory hanging in the exhibition room.","text":"Park Rae-kyung đang xem bức ảnh chụp nhà máy Daiichi treo trong phòng triển lãm.\n박래경이 전시실에 걸려 있는 다이치 공장 사진을 바라보고 있다.\nRae-kyung Park is looking at a photo of the Daiichi factory hanging in the exhibition room.","sourceUid":"nar-mrk8lis4-vefe61","sourceNo":"N236","viRanges":[],"koRanges":[]},{"id":488,"readerNo":489,"displayNo":"N237","n":"N237","kind":"narration","type":"narration","vi":"Khung cảnh giống với nhà máy Shimizu. Và hình ảnh một đứa trẻ đập vào mắt tôi.","ko":"그 풍경이 시미즈 공장의 풍경과 닮았다. 그리고, 한 꼬마의 모습이 눈에 띈다.","en":"The scenery resembles that of the Shimizu factory. And, the image of a kid catches my eye.","text":"Khung cảnh giống với nhà máy Shimizu. Và hình ảnh một đứa trẻ đập vào mắt tôi.\n그 풍경이 시미즈 공장의 풍경과 닮았다. 그리고, 한 꼬마의 모습이 눈에 띈다.\nThe scenery resembles that of the Shimizu factory. And, the image of a kid catches my eye.","sourceUid":"nar-mrk8llbc-ltqk1k","sourceNo":"N237","viRanges":[],"koRanges":[]},{"id":489,"readerNo":490,"displayNo":498,"n":498,"kind":"sub","type":"merged","vi":"Vâng.\nVì vậy tôi đã tặng ông ấy bức thư pháp.\nÔn cố tri tân.","ko":"예, 그래서 저도 액자로 선물로 드렸던 거고요\n온고지신","en":"Yes.\nThat's why I also gifted him the framed calligraphy.\n\"On Ko Chi Shin.\"","text":"Vâng.\nVì vậy tôi đã tặng ông ấy bức thư pháp.\nÔn cố tri tân.\n예, 그래서 저도 액자로 선물로 드렸던 거고요\n온고지신\nYes.\nThat's why I also gifted him the framed calligraphy.\n\"On Ko Chi Shin.\"","sourceUid":"merged-mriuc1cp-37","sourceNo":498,"viRanges":[{"start":3106.363263,"end":3113.683369}],"koRanges":[{"start":3096.156916,"end":3103.105726},{"start":3096.67,"end":3100.98},{"start":3100.73,"end":3102.88}]},{"id":490,"readerNo":491,"displayNo":500,"n":500,"kind":"sub","type":"merged","vi":"Cậu vẫn nhớ nhỉ?\nChính tay giám đốc đã viết, đúng không?","ko":"오, 기억하시네\n직접 쓰셨다고 했죠?","en":"Oh, you remember it.\nYou said you wrote it yourself, right?","text":"Cậu vẫn nhớ nhỉ?\nChính tay giám đốc đã viết, đúng không?\n오, 기억하시네\n직접 쓰셨다고 했죠?\nOh, you remember it.\nYou said you wrote it yourself, right?","sourceUid":"merged-mriucg2n-38","sourceNo":500,"viRanges":[{"start":3113.683369,"end":3118.353482}],"koRanges":[{"start":3102.63,"end":3104.98},{"start":3103.105726,"end":3107.693715},{"start":3104.73,"end":3107.44}]},{"id":491,"readerNo":492,"displayNo":502,"n":502,"kind":"sub","type":"merged","vi":"Nghệ nhân ấy đã yêu cầu tôi viết.\nCậu bé trong ảnh là con trai của nghệ nhân ấy, phải không?\nĐúng vậy.","ko":"여기 장인께서 요청을 하셨거든요\n사진 속의 아이가 장인의 아들인 거죠?\n그렇죠","en":"The artisan requested it. The boy in the photo is the artisan's son, right? He is.","text":"Nghệ nhân ấy đã yêu cầu tôi viết.\nCậu bé trong ảnh là con trai của nghệ nhân ấy, phải không?\nĐúng vậy.\n여기 장인께서 요청을 하셨거든요\n사진 속의 아이가 장인의 아들인 거죠?\n그렇죠\nThe artisan requested it. The boy in the photo is the artisan's son, right? He is.","sourceUid":"merged-mriue1d4-41","sourceNo":502,"viRanges":[{"start":3118.353482,"end":3127.353935},{"start":3118.353482,"end":3125.113391}],"koRanges":[{"start":3107.19,"end":3110.56},{"start":3107.693715,"end":3116.835067},{"start":3110.31,"end":3114.86},{"start":3115.58,"end":3116.44}]},{"id":492,"readerNo":493,"displayNo":505,"n":505,"kind":"sub","type":"merged","vi":"Giám đốc còn nhớ tên cậu bé ấy không?\nTôi không nhớ tên con trai ông ấy.","ko":"이름 기억나십니까?\n아들 이름은 기억이 안 나고요","en":"Do you remember his name? I don't remember the son's name.","text":"Giám đốc còn nhớ tên cậu bé ấy không?\nTôi không nhớ tên con trai ông ấy.\n이름 기억나십니까?\n아들 이름은 기억이 안 나고요\nDo you remember his name? I don't remember the son's name.","sourceUid":"merged-mriued0u-42","sourceNo":505,"viRanges":[{"start":3127.353935,"end":3134.093527}],"koRanges":[{"start":3116.19,"end":3119.54},{"start":3116.835067,"end":3124.1364},{"start":3120.74,"end":3123.67}]},{"id":493,"readerNo":494,"displayNo":507,"n":507,"kind":"sub","type":"merged","vi":"Tên của nghệ nhân đó là Daichi Naito.\nRa là vậy.","ko":"장인 선생 이름이 나이토 다이치였습니다\n그렇군요","en":"But the name of the artisan was...\nDaichi Naito.\nI see.","text":"Tên của nghệ nhân đó là Daichi Naito.\nRa là vậy.\n장인 선생 이름이 나이토 다이치였습니다\n그렇군요\nBut the name of the artisan was...\nDaichi Naito.\nI see.","sourceUid":"merged-mriufu2o-44","sourceNo":507,"viRanges":[{"start":3134.093527,"end":3142.504077}],"koRanges":[{"start":3123.42,"end":3129.13},{"start":3124.1364,"end":3131.884203},{"start":3130.16,"end":3131.63}]},{"id":494,"readerNo":495,"displayNo":509,"n":509,"kind":"sub","type":"merged","vi":"Giám đốc.\nTôi nghĩ tôi cần bức ảnh đó.\nSao cơ?","ko":"대표님 그 사진이 필요할 것 같습니다\n네?","en":"CEO.\nI think we'll need that photo.\nPardon?","text":"Giám đốc.\nTôi nghĩ tôi cần bức ảnh đó.\nSao cơ?\n대표님 그 사진이 필요할 것 같습니다\n네?\nCEO.\nI think we'll need that photo.\nPardon?","sourceUid":"merged-mriuh30w-46","sourceNo":509,"viRanges":[{"start":3142.504077,"end":3148.846945},{"start":3142.504077,"end":3147.110349}],"koRanges":[{"start":3131.38,"end":3136.05},{"start":3131.884203,"end":3138.184091},{"start":3135.8,"end":3137.69}]},{"id":495,"readerNo":496,"displayNo":511,"n":511,"kind":"sub","type":"merged","vi":"Cậu cần cái này sao? Vâng. Cảm ơn giám đốc.","ko":"이게 필요하시다고요?","en":"You need this?\nYes.\nThank you.","text":"Cậu cần cái này sao? Vâng. Cảm ơn giám đốc.\n이게 필요하시다고요?\nYou need this?\nYes.\nThank you.","sourceUid":"merged-mriuhiyn-47","sourceNo":511,"viRanges":[],"koRanges":[{"start":3138.18,"end":3140.99},{"start":3138.184091,"end":3143.741639}]},{"id":496,"readerNo":497,"displayNo":"N238","n":"N238","kind":"narration","type":"narration","vi":". Sân bay Incheon (đêm)","ko":". 인천공항 ( 밤 )","en":". Incheon Airport (night)","text":". Sân bay Incheon (đêm)\n. 인천공항 ( 밤 )\n. Incheon Airport (night)","sourceUid":"nar-mrk8nmjm-koqxf7","sourceNo":"N238","viRanges":[],"koRanges":[]},{"id":497,"readerNo":498,"displayNo":"N239","n":"N239","kind":"narration","type":"narration","vi":"Juno đứng ở khu vực chờ taxi sân bay."," akes a picture out of the frame.","text":"Juno lấy một bức ảnh ra khỏi khung.\n주노가 액자에서 사진을 꺼낸다.\nJuno takes a picture out of the frame.","sourceUid":"nar-mrk8oqoa-qpreyz","sourceNo":"N244","viRanges":[],"koRanges":[]},{"id":503,"readerNo":504,"displayNo":"N245","n":"N245","kind":"narration","type":"narration","vi":"Sau đó, bọc bức ảnh bằng giấy và đặt nó vào phong bì đựng tài liệu cùng với bức thư (viết).","ko":"그리고, 사진을 종이로 포장하고, (쓰인) 편지지와 함께 서류 봉투에 담는다.","en":"Then, wrap the photo in paper and place it in a document envelope along with the (written) letter.","text":"Sau đó, bọc bức ảnh bằng giấy và đặt nó vào phong bì đựng tài liệu cùng với bức thư (viết).\n그리고, 사진을 종이로 포장하고, (쓰인) 편지지와 함께 서류 봉투에 담는다.\nThen, wrap the photo in paper and place it in a document envelope along with the (written) letter.","sourceUid":"nar-mrk8ot02-4k0e1g","sourceNo":"N245","viRanges":[],"koRanges":[]},{"id":504,"readerNo":505,"displayNo":"N246","n":"N246","kind":"narration","type":"narration","vi":". Nhà máy Shimizu (Nhật Bản) (ngày)","ko":". 시미즈 공장 ( 일본 ) ( 낮 )","en":". Shimizu Factory (Japan) (day)","text":". Nhà máy Shimizu (Nhật Bản) (ngày)\n. 시미즈 공장 ( 일본 ) ( 낮 )\n. Shimizu Factory (Japan) (day)","sourceUid":"nar-mrk8otz6-rgr5o5","sourceNo":"N246","viRanges":[],"koRanges":[]},{"id":505,"readerNo":506,"displayNo":"N247","n":"N247","kind":"narration","type":"narration","vi":"Trong một nhà máy yên tĩnh, Sunyoung, Minjeong và Jinsoo đang ngồi trong khu vực nghỉ giải lao.","ko":"한적한 공장에 순영, 민정, 진수만이 휴게 공간에 앉아 있다.","en":"In a quiet factory, Sunyoung, Minjeong, and Jinsoo are sitting in the break area.","text":"Trong một nhà máy yên tĩnh, Sunyoung, Minjeong và Jinsoo đang ngồi trong khu vực nghỉ giải lao.\n한적한 공장에 순영, 민정, 진수만이 휴게 공간에 앉아 있다.\nIn a quiet factory, Sunyoung, Minjeong, and Jinsoo are sitting in the break area.","sourceUid":"nar-mrk8ovjj-dolw7r","sourceNo":"N247","viRanges":[],"koRanges":[]},{"id":506,"readerNo":507,"displayNo":"N248","n":"N248","kind":"narration","type":"narration","vi":"Naito tiến lại gần với vẻ mặt khó chịu.","ko":"나이토가 심기가 불편한 표정으로 다가온다.","en":"Naito approaches with an uncomfortable expression.","text":"Naito tiến lại gần với vẻ mặt khó chịu.\n나이토가 심기가 불편한 표정으로 다가온다.\nNaito approaches with an uncomfortable expression.","sourceUid":"nar-mrk8oxmp-rwqr3z","sourceNo":"N248","viRanges":[],"koRanges":[]},{"id":507,"readerNo":508,"displayNo":"N249","n":"N249","kind":"narration","type":"narration","vi":"Anh ấy đang mặc bộ quần áo lao động cũ.","ko":"오래된 작업복 차림이다.","en":"He is wearing old work clothes.","text":"Anh ấy đang mặc bộ quần áo lao động cũ.\n오래된 작업복 차림이다.\nHe is wearing old work clothes.","sourceUid":"nar-mrk8oz8d-afmcdg","sourceNo":"N249","viRanges":[],"koRanges":[]},{"id":508,"readerNo":509,"displayNo":"N250","n":"N250","kind":"narration","type":"narration","vi":"Soonyoung nhìn Naito với vẻ mặt cầu xin sự hiểu biết, còn Jinsu thì kiểm tra thời gian.","ko":"순영이 양해해 달라는 표정으로 나이토를 보고, 진수는 시간을 확인한다.","en":"Soonyoung looks at Naito with an expression asking for understanding, and Jinsu checks the time.","text":"Soonyoung nhìn Naito với vẻ mặt cầu xin sự hiểu biết, còn Jinsu thì kiểm tra thời gian.\n순영이 양해해 달라는 표정으로 나이토를 보고, 진수는 시간을 확인한다.\nSoonyoung looks at Naito with an expression asking for understanding, and Jinsu checks the time.","sourceUid":"nar-mrk8p6uo-9v3i5z","sourceNo":"N250","viRanges":[],"koRanges":[]},{"id":509,"readerNo":510,"displayNo":"N251","n":"N251","kind":"narration","type":"narration","vi":"Tiếp theo, một chiếc taxi đi vào nhà máy và Juno bước ra ngoài.","ko":"이어서, 택시 한 대가 공장으로 들어서고, 주노가 내린다.","en":"Next, a taxi enters the factory, and Juno gets out.","text":"Tiếp theo, một chiếc taxi đi vào nhà máy và Juno bước ra ngoài.\n이어서, 택시 한 대가 공장으로 들어서고, 주노가 내린다.\nNext, a taxi enters the factory, and Juno gets out.","sourceUid":"nar-mrk8p892-q6jvnm","sourceNo":"N251","viRanges":[],"koRanges":[]},{"id":510,"readerNo":511,"displayNo":"N252","n":"N252","kind":"narration","type":"narration","vi":"Naito và đồng đội đứng dậy khỏi chỗ ngồi.","ko":"자리에서 일어나는 나이토와 팀원들.","en":"Naito and his teammates get up from their seats.","text":"Naito và đồng đội đứng dậy khỏi chỗ ngồi.\n자리에서 일어나는 나이토와 팀원들.\nNaito and his teammates get up from their seats.","sourceUid":"nar-mrk8paa7-xpk5tq","sourceNo":"N252","viRanges":[],"koRanges":[]},{"id":511,"readerNo":512,"displayNo":"N253","n":"N253","kind":"narration","type":"narration","vi":"Juno xuống taxi và chào Naito.","ko":"택시에서 내린 주노가 나이토를 향해 인사한다.","en":"Juno gets off the taxi and greets Naito.","text":"Juno xuống taxi và chào Naito.\n택시에서 내린 주노가 나이토를 향해 인사한다.\nJuno gets off the taxi and greets Naito.","sourceUid":"nar-mrk8pbl5-nrjsm9","sourceNo":"N253","viRanges":[],"koRanges":[]},{"id":512,"readerNo":513,"displayNo":"N254","n":"N254","kind":"narration","type":"narration","vi":"Juno đang cầm một phong bì đựng tài liệu.","ko":"주노는 서류 봉투를 들고 있다.","en":"Juno is holding an envelope of documents.","text":"Juno đang cầm một phong bì đựng tài liệu.\n주노는 서류 봉투를 들고 있다.\nJuno is holding an envelope of documents.","sourceUid":"nar-mrk8pch8-3ldwer","sourceNo":"N254","viRanges":[],"koRanges":[]},{"id":513,"readerNo":514,"displayNo":512,"n":512,"kind":"sub","type":"merged","vi":"Ngày nghỉ mà anh vẫn đi làm. Anh thật siêng năng quá đi!\nMấy người đi giùm được không?\nAnh ấy có điều muốn nói với anh.\nAnh có thể đợi một lúc, được không?\nVậy anh ta phải đúng giờ hẹn chứ?","ko":"すごいですいいかげん帰ってもらえませんかどうしてもお話したいことがあります少しだけお待ちいただけないでしょうかいやずっとここにいられても困るんですよね","en":"You work on your day off, too. That's amazing.\nCan you please leave already?\nThere's something that he needs to tell you.\nCould you please wait a moment?\nWe'll be in trouble if you keep staying here.","text":"Ngày nghỉ mà anh vẫn đi làm. Anh thật siêng năng quá đi!\nMấy người đi giùm được không?\nAnh ấy có điều muốn nói với anh.\nAnh có thể đợi một lúc, được không?\nVậy anh ta phải đúng giờ hẹn chứ?\nすごいですいいかげん帰ってもらえませんかどうしてもお話したいことがあります少しだけお待ちいただけないでしょうかいやずっとここにいられても困るんですよね\nYou work on your day off, too. That's amazing.\nCan you please leave already?\nThere's something that he needs to tell you.\nCould you please wait a moment?\nWe'll be in trouble if you keep staying here.","sourceUid":"merged-mriuk528-49","sourceNo":512,"viRanges":[{"start":3157.476078,"end":3201.036713}],"koRanges":[{"start":3188.8,"end":3190.45}]},{"id":514,"readerNo":515,"displayNo":513,"n":513,"kind":"sub","type":"merged","vi":"Mấy người định ở lại đến bao giờ?\nMong anh thông cảm.\nTôi xin lỗi vì đã đến muộn.","ko":"예수님의 이름으로 기도합니다.\nいつまでいるんですか?\n待たせてすみません。","en":"How much longer are you going to stay here?\nPlease.\nI'm sorry to have kept you waiting.","text":"Mấy người định ở lại đến bao giờ?\nMong anh thông cảm.\nTôi xin lỗi vì đã đến muộn.\n예수님의 이름으로 기도합니다.\nいつまでいるんですか?\n待たせてすみません。\nHow much longer are you going to stay here?\nPlease.\nI'm sorry to have kept you waiting.","sourceUid":"merged-mrium1zk-50","sourceNo":513,"viRanges":[{"start":3201.036713,"end":3217.517076}],"koRanges":[{"start":3190.45,"end":3207.552321},{"start":3190.45,"end":3195.112321},{"start":3192.97,"end":3194.4},{"start":3205.41,"end":3207.06}]},{"id":515,"readerNo":516,"displayNo":516,"n":516,"kind":"sub","type":"merged","vi":"Không sao. Anh muốn nói gì?\nTôi muốn xác nhận một điều trước.","ko":"わかりました話って何ですか?\n先ず確認したいことがあります。","en":"Okay. What do you want to tell me?\nThere's something I'd like to confirm first.","text":"Không sao. Anh muốn nói gì?\nTôi muốn xác nhận một điều trước.\nわかりました話って何ですか?\n先ず確認したいことがあります。\nOkay. What do you want to tell me?\nThere's something I'd like to confirm first.","sourceUid":"merged-mriuou5k-53","sourceNo":516,"viRanges":[{"start":3217.517076,"end":3227.426192}],"koRanges":[{"start":3207.552321,"end":3216.722988},{"start":3210.18,"end":3212.53},{"start":3214.72,"end":3216.37}]},{"id":516,"readerNo":517,"displayNo":518,"n":518,"kind":"sub","type":"merged","vi":"Có phải lý do anh Naito không muốn ký hợp đồng với chúng tôi,\nlà vì anh đã thấy tên \"Park Rae Gyeong\" trong hợp đồng không?","ko":"나이토쌤께서 저희와 계약하고 싶지 않으신 거는 계약서에 박래경의 이름을 발견했기 때문인가요?","en":"Is the reason you didn't want to sign our contract\nbecause you saw \"Park Rae Gyeong\" on the contract?\nThere's something I'd like to check.\nDid you reject the contract\nbecause you saw Park Rae Gyeong's name on it?","text":"Có phải lý do anh Naito không muốn ký hợp đồng với chúng tôi,\nlà vì anh đã thấy tên \"Park Rae Gyeong\" trong hợp đồng không?\n나이토쌤께서 저희와 계약하고 싶지 않으신 거는 계약서에 박래경의 이름을 발견했기 때문인가요?\nIs the reason you didn't want to sign our contract\nbecause you saw \"Park Rae Gyeong\" on the contract?\nThere's something I'd like to check.\nDid you reject the contract\nbecause you saw Park Rae Gyeong's name on it?","sourceUid":"merged-mriup2hv-54","sourceNo":518,"viRanges":[{"start":3227.426192,"end":3244.224646}],"koRanges":[{"start":3218.9,"end":3225.73}]},{"id":517,"readerNo":518,"displayNo":519,"n":519,"kind":"sub","type":"merged","vi":"Các hợp đồng trước đây không có sự thay đổi về số lượng,\nnên anh Naito không có lý do gì để anh thấy tên Park Rae Gyeong.","ko":"이전 계약서들은 물량의 수정이 없었기 때문에 나이토쌤께서 박래경의 이름을 볼 일이 없었지만","en":"The previous contracts had no changes in quantity,\nso you wouldn't have seen Park Rae Gyeong's name.","text":"Các hợp đồng trước đây không có sự thay đổi về số lượng,\nnên anh Naito không có lý do gì để anh thấy tên Park Rae Gyeong.\n이전 계약서들은 물량의 수정이 없었기 때문에 나이토쌤께서 박래경의 이름을 볼 일이 없었지만\nThe previous contracts had no changes in quantity,\nso you wouldn't have seen Park Rae Gyeong's name.","sourceUid":"merged-mriuqkm9-55","sourceNo":519,"viRanges":[{"start":3244.224646,"end":3252.800258}],"koRanges":[{"start":3225.73,"end":3226.024321},{"start":3235.22,"end":3241.99}]},{"id":518,"readerNo":519,"displayNo":520,"n":520,"kind":"sub","type":"merged","vi":"Nhưng lần này, ông ấy là người phải phê duyệt,\nvà anh đã thấy tên Park Rae Gyeong. Đúng vậy không?","ko":"이번만큼은 결제가 필요한 사람으로 참여하였고 박래경의 이름을 발견했다. 아닌가요?","en":"But this time, your approval was necessary\nand you saw Park Rae Gyeong's name there.\nIsn't that right?","text":"Nhưng lần này, ông ấy là người phải phê duyệt,\nvà anh đã thấy tên Park Rae Gyeong. Đúng vậy không?\n이번만큼은 결제가 필요한 사람으로 참여하였고 박래경의 이름을 발견했다. 아닌가요?\nBut this time, your approval was necessary\nand you saw Park Rae Gyeong's name there.\nIsn't that right?","sourceUid":"merged-mriurm47-56","sourceNo":520,"viRanges":[{"start":3252.800258,"end":3259.351148}],"koRanges":[{"start":3226.024321,"end":3235.354988},{"start":3241.74,"end":3248.17}]},{"id":519,"readerNo":520,"displayNo":811,"n":811,"kind":"sub","type":"merged","vi":"Khác với trước đây,\nlần này ông ấy phải phê duyệt chuyện sửa đổi hợp đồng,\nnên có lẽ đây là lần đầu tiên anh thấy tên Park Rae Gyeong.","ko":"","en":"Unlike before,\nyou ended up participating in an amendment contract.\nAnd you saw\nPark Rae Gyeong's name for the first time.\nWhat about that?","text":"Khác với trước đây,\nlần này ông ấy phải phê duyệt chuyện sửa đổi hợp đồng,\nnên có lẽ đây là lần đầu tiên anh thấy tên Park Rae Gyeong.\nUnlike before,\nyou ended up participating in an amendment contract.\nAnd you saw\nPark Rae Gyeong's name for the first time.\nWhat about that?","sourceUid":"merged-mriuspim-57","sourceNo":811,"viRanges":[],"koRanges":[]},{"id":520,"readerNo":521,"displayNo":521,"n":521,"kind":"sub","type":"merged","vi":"Thì sao chứ?\nGiám đốc Park đã mua lại Daichi, công ty sản xuất cung tên trong quá khứ.","ko":"박래경 대표가 과거에 다이치라는 양공을 만드는 회사를 인수하였고","en":"CEO Park previously acquired\nthe archery bow company Daichi.","text":"Thì sao chứ?\nGiám đốc Park đã mua lại Daichi, công ty sản xuất cung tên trong quá khứ.\n박래경 대표가 과거에 다이치라는 양공을 만드는 회사를 인수하였고\nCEO Park previously acquired\nthe archery bow company Daichi.","sourceUid":"merged-mriuua5s-58","sourceNo":521,"viRanges":[{"start":3259.351,"end":3268.802}],"koRanges":[{"start":3235.354988,"end":3258.736321},{"start":3235.354988,"end":3248.906988}]},{"id":521,"readerNo":522,"displayNo":522,"n":522,"kind":"sub","type":"merged","vi":"Vì vậy mà Daichi công ty sản xuất cung số một thế giới đã biến mất.","ko":"때문에 세계 1위 기업이었던 다이치는 사라졌으니까요","en":"As a result,\nthe number one archery company, Daichi, disappeared.","text":"Vì vậy mà Daichi công ty sản xuất cung số một thế giới đã biến mất.\n때문에 세계 1위 기업이었던 다이치는 사라졌으니까요\nAs a result,\nthe number one archery company, Daichi, disappeared.","sourceUid":"merged-mriuvb9f-59","sourceNo":522,"viRanges":[{"start":3268.802,"end":3281.521692}],"koRanges":[{"start":3258.736321,"end":3271.117654},{"start":3265.8,"end":3270.89}]},{"id":522,"readerNo":523,"displayNo":523,"n":523,"kind":"sub","type":"merged","vi":"Vì Wind đã mua lại Daichi,\nnên Daichi, công ty sản xuất cung tên số một thế giới đã biến mất.","ko":"박래경 대표가 과거에 다이치라는 양공을 만드는 회사를 인수하였고","en":"With Wind's acquisition of Daichi,\nthe number one archery company Daichi disappeared.","text":"Vì Wind đã mua lại Daichi,\nnên Daichi, công ty sản xuất cung tên số một thế giới đã biến mất.\n박래경 대표가 과거에 다이치라는 양공을 만드는 회사를 인수하였고\nWith Wind's acquisition of Daichi,\nthe number one archery company Daichi disappeared.","sourceUid":"merged-mriuwdkl-61","sourceNo":523,"viRanges":[{"start":3281.521692,"end":3295.418835}],"koRanges":[{"start":3270.64,"end":3271.45},{"start":3271.117654,"end":3284.477654}]},{"id":523,"readerNo":524,"displayNo":524,"n":524,"kind":"sub","type":"merged","vi":"Thiệt tình.\nNói cái gì vậy chứ?","ko":"ウィンドウが大地を買収したことでアーツェリの弓では世界一だった大地が消えましたから。\n영상편집 및 자막이 도움이 되셨다면 구독, 좋아요, 댓글 부탁드립니다.","en":"Hang on.\nI can't take this anymore!\nCome on.","text":"Thiệt tình.\nNói cái gì vậy chứ?\nウィンドウが大地を買収したことでアーツェリの弓では世界一だった大地が消えましたから。\n영상편집 및 자막이 도움이 되셨다면 구독, 좋아요, 댓글 부탁드립니다.\nHang on.\nI can't take this anymore!\nCome on.","sourceUid":"merged-mriuxehc-62","sourceNo":524,"viRanges":[{"start":3295.418835,"end":3300.42854}],"koRanges":[{"start":3282.45,"end":3284.1},{"start":3283.85,"end":3284.62},{"start":3284.477654,"end":3289.837654}]},{"id":524,"readerNo":525,"displayNo":526,"n":526,"kind":"sub","type":"merged","vi":"Thôi đi.\nChẳng phải bố của anh Naito là một nghệ nhân làm cung ở Daichi sao?","ko":"나이토씨의 부친께서는 다이치에서 양궁을 만드는 장인 아니었습니까?\n나이토씨의 아버지는 이전에 다이치에서 아체리의 유미를 만들고 있던 직장인이었을까요?","en":"Wasn't your father\nan artisan who made bows at Daichi?\nYes, that's right. Yes.","text":"Thôi đi.\nChẳng phải bố của anh Naito là một nghệ nhân làm cung ở Daichi sao?\n나이토씨의 부친께서는 다이치에서 양궁을 만드는 장인 아니었습니까?\n나이토씨의 아버지는 이전에 다이치에서 아체리의 유미를 만들고 있던 직장인이었을까요?\nWasn't your father\nan artisan who made bows at Daichi?\nYes, that's right. Yes.","sourceUid":"merged-mriuynj7-63","sourceNo":526,"viRanges":[{"start":3300.42854,"end":3314.993257}],"koRanges":[{"start":3289.837654,"end":3305.086124},{"start":3291.77,"end":3296.7},{"start":3296.81,"end":3303.14}]},{"id":525,"readerNo":526,"displayNo":528,"n":528,"kind":"sub","type":"merged","vi":"Đúng là vậy.\nCác người bắt tôi chờ chỉ để nói mấy chuyện vớ vẩn này hả?\nTôi có cái này muốn đưa cho anh.","ko":"네, 그렇습니다.\n네.\n왜, 왜, 그것을 말하기 위해서부터 왔습니까? 여러분.\n네?\n드릴 게 있습니다.","en":"Did you come all this way to say such things?\nI have something to give you.","text":"Đúng là vậy.\nCác người bắt tôi chờ chỉ để nói mấy chuyện vớ vẩn này hả?\nTôi có cái này muốn đưa cho anh.\n네, 그렇습니다.\n네.\n왜, 왜, 그것을 말하기 위해서부터 왔습니까? 여러분.\n네?\n드릴 게 있습니다.\nDid you come all this way to say such things?\nI have something to give you.","sourceUid":"merged-mriuzzym-64","sourceNo":528,"viRanges":[{"start":3314.993257,"end":3323.161963}],"koRanges":[{"start":3303.03,"end":3303.78},{"start":3303.65,"end":3304.54},{"start":3305.086124,"end":3315.486137},{"start":3305.71,"end":3309.8},{"start":3309.77,"end":3310.54},{"start":3310.45,"end":3311.78}]},{"id":526,"readerNo":527,"displayNo":533,"n":533,"kind":"sub","type":"merged","vi":"Tổ trưởng Yoon đã bay về Hàn Quốc để mang cái này đến cho anh Naito.\nVì máy bay bị trễ nên anh ấy đến hơi muộn.\nMong anh thông cảm.\nTôi nói rồi,\nnếu là hợp đồng, tôi đã nói là tôi không thể ký rồi.\nĐây không phải là hợp đồng, nhưng liên quan đến một lời hứa.","ko":"あのユンさんは内藤さんにそれを渡したくて韓国に行ってきたところですここに少し遅れたのも飛行機の遅延のせいですどうかご理解お願いいたしますだから契約のことでしたら私は署名しませんそう言いましたよね契約書ではありませんがある約束と関係のあるものです","en":"Well, Mr. Yun went back to Korea\nto bring you this.\nThe flight back was delayed, so he was a bit late.\nPlease understand.\nIf what you want is a contract,\nI already told you\nthat I cannot sign it.\nIt's not a contract,\nbut it is about a promise.","text":"Tổ trưởng Yoon đã bay về Hàn Quốc để mang cái này đến cho anh Naito.\nVì máy bay bị trễ nên anh ấy đến hơi muộn.\nMong anh thông cảm.\nTôi nói rồi,\nnếu là hợp đồng, tôi đã nói là tôi không thể ký rồi.\nĐây không phải là hợp đồng, nhưng liên quan đến một lời hứa.\nあのユンさんは内藤さんにそれを渡したくて韓国に行ってきたところですここに少し遅れたのも飛行機の遅延のせいですどうかご理解お願いいたしますだから契約のことでしたら私は署名しませんそう言いましたよね契約書ではありませんがある約束と関係のあるものです\nWell, Mr. Yun went back to Korea\nto bring you this.\nThe flight back was delayed, so he was a bit late.\nPlease understand.\nIf what you want is a contract,\nI already told you\nthat I cannot sign it.\nIt's not a contract,\nbut it is about a promise.","sourceUid":"merged-mriv19gm-65","sourceNo":533,"viRanges":[{"start":3323.161963,"end":3357.571046}],"koRanges":[{"start":3315.486137,"end":3348.444813},{"start":3345.47,"end":3347.12}]},{"id":527,"readerNo":528,"displayNo":534,"n":534,"kind":"sub","type":"merged","vi":"Đây là bức hình\nđược chụp 30 năm trước của bố anh Naito và giám đốc Park Rae Gyeong của Wind.","ko":"지금까지 뉴스 스토리였습니다.\n나이투상의 아버지와 윈드 박리경 대표의 30년 전 모습입니다.","en":"[­On Ko Chi Shin]\nThis is a photo of your father\nand Wind CEO Park Rae Gyeong from thirty years ago.","text":"Đây là bức hình\nđược chụp 30 năm trước của bố anh Naito và giám đốc Park Rae Gyeong của Wind.\n지금까지 뉴스 스토리였습니다.\n나이투상의 아버지와 윈드 박리경 대표의 30년 전 모습입니다.\n[­On Ko Chi Shin]\nThis is a photo of your father\nand Wind CEO Park Rae Gyeong from thirty years ago.","sourceUid":"merged-mrj58x7y-66","sourceNo":534,"viRanges":[{"start":3376,"end":3382.039073}],"koRanges":[{"start":3346.87,"end":3347.78},{"start":3358,"  bow blueprint\nthat he personally drew.","text":"và tặng ông ấy bản thiết kế cung tên do chính tay mình vẽ.\nKhi đó, bố của anh Naito\nđã bán Daichi cho giám đốc Park Rae Gyeong\n본인이 직접 그린 양궁 설계도를 선물하셨습니다\na bow blueprint that he personally drew.\nAt the time, your father sold Daichi to CEO Park\nand gifted him a bow blueprint\nthat he personally drew.","sourceUid":"merged-mrj5ffis-69","sourceNo":537,"viRanges":[{"start":3388.740302,"end":3398.708011},{"start":3388.740302,"end":3392.128038}],"koRanges":[{"start":3377.72,"end":3381.55},{"start":3378.749868,"end":3390.749868},{"start":3378.749868,"end":3381.7}]},{"id":532,"readerNo":533,"displayNo":538,"n":538,"kind":"sub","type":"merged","vi":"và tặng ông ấy bản thiết kế cung tên do chính tay mình vẽ.\nCùng với lời yêu cầu hãy tạo ra cây cung tốt nhất.","ko":"최고의 양궁을 만들어달라는 요청과 함께요","en":"With the request to make the world's best bows.","text":"và tặng ông ấy bản thiết kế cung tên do chính tay mình vẽ.\nCùng với lời yêu cầu hãy tạo ra cây cung tốt nhất.\n최고의 양궁을 만들어달라는 요청과 함께요\nWith the request to make the world's best bows.","sourceUid":"merged-mrj5gaud-70","sourceNo":538,"viRanges":[{"start":3398.708011,"end":3406.869825}],"koRanges":[{"start":3389.88,"end":3393.81},{"start":3390.749868,"end":3400.889992}]},{"id":533,"readerNo":534,"displayNo":539,"n":539,"kind":"sub","type":"merged","vi":"Cùng với lời yêu cầu hãy tạo ra cây cung tốt nhất.\nGiám đốc Park đã tặng bố anh biểu ngữ đó.\nÝ nghĩa của nó là \"Ôn cố tri tân\".","ko":"박래경 대표도 부친께 표를 선물하였고요\n그 뜻이 문구의 지시","en":"And CEO Park also gifted your father a slogan. And the meaning is \"On Ko Chi Shin.\" At the time, CEO Park gifted him a framed slogan that read, \"Learn the old, understand the new.\"","text":"Cùng với lời yêu cầu hãy tạo ra cây cung tốt nhất.\nGiám đốc Park đã tặng bố anh biểu ngữ đó.\nÝ nghĩa của nó là \"Ôn cố tri tân\".\n박래경 대표도 부친께 표를 선물하였고요\n그 뜻이 문구의 지시\nAnd CEO Park also gifted your father a slogan. And the meaning is \"On Ko Chi Shin.\" At the time, CEO Park gifted him a framed slogan that read, \"Learn the old, understand the new.\"","sourceUid":"merged-mrj5iob4-73","sourceNo":539,"viRanges":[{"start":3406.869825,"end":3424.74919}],"koRanges":[{"start":3396.24,"end":3400.29},{"start":3400.04,"end":3404.35},{"start":3400.889992,"end":3417.172676}]},{"id":534,"readerNo":535,"displayNo":541,"n":541,"kind":"sub","type":"merged","vi":"Cái này...\nchính là sự coi thường với bố tôi.","ko":"미안해\nおやじを侮辱する言葉ですよ。","en":"This... is an insult to my father!","text":"Cái này...\nchính là sự coi thường với bố tôi.\n미안해\nおやじを侮辱する言葉ですよ。\nThis... is an insult to my father!","sourceUid":"merged-mrj5l2pv-74","sourceNo":541,"viRanges":[{"start":3424.74919,"end":3433.256884}],"koRanges":[{"start":3417.04,"end":3418.01},{"start":3417.172676,"end":3423.861681},{"start":3421.02,"end":3422.67}]},{"id":535,"readerNo":536,"displayNo":543,"n":543,"kind":"sub","type":"merged","vi":"Anh ta nói sẽ bảo vệ truyền thống.\nNhưng lời hứa đó đã tan vỡ.\nRa là anh nghĩ như vậy.\nNhưng dù sao thì anh vẫn treo biểu ngữ đó ở đây.","ko":"古いものを守るって言っておきながら結局約束破ったんですよ! 그렇게 생각하셨군요。 그래도 저 표호를 걸어놓으셨네요。それでもあの標語をかけておいた理由は何でしょうか?","en":"He said he would protect the old things!\nThe contract breaks this promise!\nThat's how you interpreted it, I see.\nStill, I see that you hung it up there.","text":"Anh ta nói sẽ bảo vệ truyền thống.\nNhưng lời hứa đó đã tan vỡ.\nRa là anh nghĩ như vậy.\nNhưng dù sao thì anh vẫn treo biểu ngữ đó ở đây.\n古いものを守るって言っておきながら結局約束破ったんですよ! 그렇게 생각하셨군요。 그래도 저 표호를 걸어놓으셨네요。それでもあの標語をかけておいた理由は何でしょうか?\nHe said he would protect the old things!\nThe contract breaks this promise!\nThat's how you interpreted it, I see.\nStill, I see that you hung it up there.","sourceUid":"merged-mrj5ndx4-75","sourceNo":543,"viRanges":[{"start":3433.256884,"end":3445.825357}],"koRanges":[{"start":3423.861681,"end":3435.261691},{"start":3427.99,"end":3439.76}]},{"id":536,"readerNo":537,"displayNo":544,"n":544,"kind":"sub","type":"merged","vi":"Dù vậy vẫn có
