 인사하며.\nNaito was carrying his bag and bowing to Naito's father.","sourceUid":"nar-mrk8u2dp-aq2o6r","sourceNo":"N267","viRanges":[],"koRanges":[]},{"id":551,"readerNo":552,"displayNo":"N268","n":"N268","kind":"narration","type":"dialogue","vi":"Naito: Tadaima. (Tôi đã ở đó)","ko":"나이토:  다다이마. (다녀왔습니다)","en":"Naito: Tadaima. (I’ve been there)","text":"Naito: Tadaima. (Tôi đã ở đó)\n나이토:  다다이마. (다녀왔습니다)\nNaito: Tadaima. (I’ve been there)","sourceUid":"nar-mrk8u6z2-44n28t","sourceNo":"N268","viRanges":[],"koRanges":[]},{"id":552,"readerNo":553,"displayNo":"N269","n":"N269","kind":"narration","type":"dialogue","vi":"Naitobu: Okaeri. (Chào mừng)","ko":"나이토부:  오카에리. (어서 오너라)","en":"Naitobu: Okaeri. (Welcome)","text":"Naitobu: Okaeri. (Chào mừng)\n나이토부:  오카에리. (어서 오너라)\nNaitobu: Okaeri. (Welcome)","sourceUid":"nar-mrk8ueu4-kndxpz","sourceNo":"N269","viRanges":[],"koRanges":[]},{"id":553,"readerNo":554,"displayNo":"N270","n":"N270","kind":"narration","type":"narration","vi":"Cha của Naito đưa cho Naito một viên kẹo.","ko":"나이토 부, 나이토에게 사탕 하나를 내민다.","en":"Naito's father offers Naito a candy.","text":"Cha của Naito đưa cho Naito một viên kẹo.\n나이토 부, 나이토에게 사탕 하나를 내민다.\nNaito's father offers Naito a candy.","sourceUid":"nar-mrk8ufg7-i9rk0j","sourceNo":"N270","viRanges":[],"koRanges":[]},{"id":554,"readerNo":555,"displayNo":"N271","n":"N271","kind":"narration","type":"narration","vi":"Naito trẻ nhận kẹo và mỉm cười khi nhìn Naito Bu.","ko":"사탕을 받아 드는 어린 나이토, 나이토 부를 바라보며 웃는다.","en":"Young Naito accepts the candy and smiles while looking at Naito Bu.","text":"Naito trẻ nhận kẹo và mỉm cười khi nhìn Naito Bu.\n사탕을 받아 드는 어린 나이토, 나이토 부를 바라보며 웃는다.\nYoung Naito accepts the candy and smiles while looking at Naito Bu.","sourceUid":"nar-mrk8ugbr-gju8hs","sourceNo":"N271","viRanges":[],"koRanges":[]},{"id":555,"readerNo":556,"displayNo":550,"n":550,"kind":"sub","type":"merged","vi":"Bố ơi!\nCon về rồi.\nỪ, con về rồi à?","ko":"감사합니다. 수고하셨습니다. 어서 가, 유리.","en":"Dad!\nI'm back!\nWelcome back.\nOkay.­","text":"Bố ơi!\nCon về rồi.\nỪ, con về rồi à?\n감사합니다. 수고하셨습니다. 어서 가, 유리.\nDad!\nI'm back!\nWelcome back.\nOkay.­","sourceUid":"merged-mrj5xay7-83","sourceNo":550,"viRanges":[{"start":3487.665187,"end":3500.019519}],"koRanges":[{"start":3479.83,"end":3480.86},{"start":3479.902183,"end":3490.955516},{"start":3482.83,"end":3483.98},{"start":3485.58,"end":3487.13}]},{"id":556,"readerNo":557,"displayNo":553,"n":553,"kind":"sub","type":"merged","vi":"Không, con muốn đến.\nCon cũng muốn trở thành một nghệ nhân giỏi như bố.\nĐã bảo con đừng đến nhà máy rồi mà.","ko":"工場には来るなって言ったろやだよぼくも父さんみたいな職人さんになりたい本当かうん約束する!","en":"I told you not to come to the factory.\nNo! I don't want to!\nI'm going to become an artisan just like you, Dad!\nReally?\nYes, I promise!","text":"Không, con muốn đến.\nCon cũng muốn trở thành một nghệ nhân giỏi như bố.\nĐã bảo con đừng đến nhà máy rồi mà.\n工場には来るなって言ったろやだよぼくも父さんみたいな職人さんになりたい本当かうん約束する!\nI told you not to come to the factory.\nNo! I don't want to!\nI'm going to become an artisan just like you, Dad!\nReally?\nYes, I promise!","sourceUid":"merged-mrj91er8-85","sourceNo":553,"viRanges":[{"start":3500.019519,"end":3509.960577}],"koRanges":[{"start":3490.955516,"end":3501.774183},{"start":3501.79,"end":3503.44}]},{"id":557,"readerNo":558,"displayNo":554,"n":554,"kind":"sub","type":"merged","vi":"Thật không?\nVâng! Con hứa!\nCậu bé này là bố đó.\nCon thấy chứ?\nBố...\nCon xin lỗi.\nCon cũng đang sống như bố.\nCậu bé này đã lớn như thế này rồi.","ko":"흥! 내심 何とか頑張ってんだけどな。 こんなに大きくなったよ。","en":"This is Dad. You see that? Dad... I'm sorry. I'm trying my best, though... And this little one has grown up this much.","text":"Thật không?\nVâng! Con hứa!\nCậu bé này là bố đó.\nCon thấy chứ?\nBố...\nCon xin lỗi.\nCon cũng đang sống như bố.\nCậu bé này đã lớn như thế này rồi.\n흥! 내심 何とか頑張ってんだけどな。 こんなに大きくなったよ。\nThis is Dad. You see that? Dad... I'm sorry. I'm trying my best, though... And this little one has grown up this much.","sourceUid":"merged-mrj9264z-86","sourceNo":554,"viRanges":[{"start":3509.960577,"end":3552.775271}],"koRanges":[{"start":3499.774,"end":3542.513},{"start":3503.19,"end":3504.48},{"start":3522.03,"end":3522.94},{"start":3532.05,"end":3533.7},{"start":3538.51,"end":3540.64}]},{"id":558,"readerNo":559,"displayNo":558,"n":558,"kind":"sub","type":"merged","vi":"Cái gì vậy?\nKẹo à?\nHồi bố đi học về đến nhà máy,\nông nội hay cho bố kẹo.\nCảm ơn anh.","ko":"父さんもな学校の帰りに工事をやるとな師匠はいつもこのピンターだ。","en":"What's this?\nIs this for me?\nWhenever I came to the factory after school,\nGrandpa used to give me candy.\nThanks.","text":"Cái gì vậy?\nKẹo à?\nHồi bố đi học về đến nhà máy,\nông nội hay cho bố kẹo.\nCảm ơn anh.\n父さんもな学校の帰りに工事をやるとな師匠はいつもこのピンターだ。\nWhat's this?\nIs this for me?\nWhenever I came to the factory after school,\nGrandpa used to give me candy.\nThanks.","sourceUid":"merged-mrj96rzn-87","sourceNo":558,"viRanges":[{"start":3552.775271,"end":3575.304432}],"koRanges":[{"start":3542.825,"end":3565.958757},{"start":3557.59,"end":3559.24}]},{"id":559,"readerNo":560,"displayNo":"N272","n":"N272","kind":"narration","type":"narration","vi":"Naito vừa khóc vừa cười khi nhìn hộp kẹo được trao.","ko":"나이토, 사탕을 내미는 캔을 보며 울다 웃는다.","en":"Naito cries and then laughs as he looks at the can of candy being handed out.","text":"Naito vừa khóc vừa cười khi nhìn hộp kẹo được trao.\n나이토, 사탕을 내미는 캔을 보며 울다 웃는다.\nNaito cries and then laughs as he looks at the can of candy being handed out.","sourceUid":"nar-mrk8y0b0-ojefno","sourceNo":"N272","viRanges":[],"koRanges":[]},{"id":560,"readerNo":561,"displayNo":"N273","n":"N273","kind":"narration","type":"narration","vi":"Khi ông tôi đến nhà máy sau giờ học, ông đã tặng bố tôi kẹo...","ko":"할아버지가 학교를 마치고 공장에 오면 아빠에게 사탕을 주셨는데...","en":"When my grandfather came to the factory after school, he gave my father candy...","text":"Khi ông tôi đến nhà máy sau giờ học, ông đã tặng bố tôi kẹo...\n할아버지가 학교를 마치고 공장에 오면 아빠에게 사탕을 주셨는데...\nWhen my grandfather came to the factory after school, he gave my father candy...","sourceUid":"nar-mrk8y4pq-a3yuiv","sourceNo":"N273","viRanges":[],"koRanges":[]},{"id":561,"readerNo":562,"displayNo":"N274","n":"N274","kind":"narration","type":"narration","vi":"Naito tràn ngập những cảm xúc mà anh đã kìm nén bấy lâu nay.","ko":"참았던 감정이 북받치는 나이토.","en":"Naito is filled with emotions that he had been holding back.","text":"Naito tràn ngập những cảm xúc mà anh đã kìm nén bấy lâu nay.\n참았던 감정이 북받치는 나이토.\nNaito is filled with emotions that he had been holding back.","sourceUid":"nar-mrk8y5me-v4oedi","sourceNo":"N274","viRanges":[],"koRanges":[]},{"id":562,"readerNo":563,"displayNo":"N275","n":"N275","kind":"narration","type":"narration","vi":"Juno, người đang đợi gần đó, đến gần Naito và nói.","ko":"곁에 서서 기다리던 주노가 나이토에게 다가서며, 말한다.","en":"Juno, who had been waiting nearby, approaches Naito and speaks.","text":"Juno, người đang đợi gần đó, đến gần Naito và nói.\n곁에 서서 기다리던 주노가 나이토에게 다가서며, 말한다.\nJuno, who had been waiting nearby, approaches Naito and speaks.","sourceUid":"nar-mrk8y85z-3baf3i","sourceNo":"N275","viRanges":[],"koRanges":[]},{"id":563,"readerNo":564,"displayNo":"N276","n":"N276","kind":"narration","type":"dialogue","vi":"Juno: Đây là bức thư của CEO Rae-kyung Park gửi Naito-san.","ko":"주노:  박래경 대표께서 나이토 상에게 보내는 편지입니다.","en":"Juno: This is a letter from CEO Rae-kyung Park to Naito-san.","text":"Juno: Đây là bức thư của CEO Rae-kyung Park gửi Naito-san.\n주노:  박래경 대표께서 나이토 상에게 보내는 편지입니다.\nJuno: This is a letter from CEO Rae-kyung Park to Naito-san.","sourceUid":"nar-mrk8ye0n-levsdc","sourceNo":"N276","viRanges":[],"koRanges":[]},{"id":564,"readerNo":565,"displayNo":"N277","n":"N277","kind":"narration","type":"narration","vi":"Naito nhìn bức thư viết bằng tiếng Hàn và nhìn thấy Minjeong. Điều này có nghĩa là yêu cầu giải thích.","ko":"나이토, 한글로 쓰여진 편지를 보고 민정을 본다. 통역해 달라는 뜻이다.","en":"Naito looks at the letter written in Korean and sees Minjeong. This means asking for interpretation.","text":"Naito nhìn bức thư vi t Bản) (ngày)\n. 공항 로비 ( 일본 ) ( 낮 )\n. Airport lobby (Japan) (day)","sourceUid":"nar-mrk8zsos-kh9mp9","sourceNo":"N291","viRanges":[],"koRanges":[]},{"id":587,"readerNo":588,"displayNo":"N292","n":"N292","kind":"narration","type":"narration","vi":"Juno lấy điện thoại di động ra và gọi cho Lee Sang-moo.","ko":"주노, 핸드폰을 꺼내 이상무에게 전화를 건다.","en":"Juno takes out her cell phone and calls Lee Sang-moo.","text":"Juno lấy điện thoại di động ra và gọi cho Lee Sang-moo.\n주노, 핸드폰을 꺼내 이상무에게 전화를 건다.\nJuno takes out her cell phone and calls Lee Sang-moo.","sourceUid":"nar-mrk8zttx-ntk0g8","sourceNo":"N292","viRanges":[],"koRanges":[]},{"id":588,"readerNo":589,"displayNo":570,"n":570,"kind":"sub","type":"merged","vi":"Vâng, thưa giám đốc.\nChúng tôi đã ký hợp đồng xong và đang chuẩn bị về.\nMức chiết khấu là 50%,\nđiều kiện thuận lợi hơn nhiều so với trước đây.","ko":"네, 상무님. 계약 체결하고 돌아가려고 합니다. 할인율은 50%로 이전보다 훨씬 더 유리한 조건입니다.","en":"Yes, Mr. Lee.\nWe finalized the contract and are about to return.\nThe discount rate is 50%,\na much more favorable condition than before.","text":"Vâng, thưa giám đốc.\nChúng tôi đã ký hợp đồng xong và đang chuẩn bị về.\nMức chiết khấu là 50%,\nđiều kiện thuận lợi hơn nhiều so với trước đây.\n네, 상무님. 계약 체결하고 돌아가려고 합니다. 할인율은 50%로 이전보다 훨씬 더 유리한 조건입니다.\nYes, Mr. Lee.\nWe finalized the contract and are about to return.\nThe discount rate is 50%,\na much more favorable condition than before.","sourceUid":"merged-mrj9ny0s-101","sourceNo":570,"viRanges":[{"start":3708.945607,"end":3734.873589}],"koRanges":[{"start":3698.37,"end":3724.110043},{"start":3715.37,"end":3724.02}]},{"id":589,"readerNo":590,"displayNo":571,"n":571,"kind":"sub","type":"merged","vi":"Giỏi lắm. Rất ấn tượng.Cậu vẫn chưa báo cáo, đúng không?","ko":"큰일했네. 대단하이. 아직 보고는 안 했지?","en":"You did great.\nIt's impressive.\nYou haven't reported it yet, right?","text":"Giỏi lắm. Rất ấn tượng.Cậu vẫn chưa báo cáo, đúng không?\n큰일했네. 대단하이. 아직 보고는 안 했지?\nYou did great.\nIt's impressive.\nYou haven't reported it yet, right?","sourceUid":"merged-mrj9pv4i-102","sourceNo":571,"viRanges":[{"start":3734.873589,"end":3740.360652}],"koRanges":[{"start":3724.03,"end":3729.7},{"start":3724.110043,"end":3729.908468}]},{"id":590,"readerNo":591,"displayNo":572,"n":572,"kind":"sub","type":"merged","vi":"Vâng. Hôm nay là ngày nghỉ nên tôi định về công ty rồi báo cáo.","ko":"네. 오늘이 휴일이어서 출근해서 하려고 합니다.","en":"No. Today is a holiday so I will report it once we return to work.","text":"Vâng. Hôm nay là ngày nghỉ nên tôi định về công ty rồi báo cáo.\n네. 오늘이 휴일이어서 출근해서 하려고 합니다.\nNo. Today is a holiday so I will report it once we return to work.","sourceUid":"merged-mrj9slik-103","sourceNo":572,"viRanges":[{"start":3740.360652,"end":3744.289113}],"koRanges":[{"start":3729.71,"end":3733.42},{"start":3729.908468,"end":3733.876468}]},{"id":591,"readerNo":592,"displayNo":573,"n":573,"kind":"sub","type":"merged","vi":"Nhưng cậu có thể lùi việc đó lại chút, được không?\nVâng. Tôi hiểu rồi.","ko":"근데 그걸 좀 늦출 수 있겠나? 네. 알겠습니다.","en":"But could you delay it a bit?\nYes, okay.","text":"Nhưng cậu có thể lùi việc đó lại chút, được không?\nVâng. Tôi hiểu rồi.\n근데 그걸 좀 늦출 수 있겠나? 네. 알겠습니다.\nBut could you delay it a bit?\nYes, okay.","sourceUid":"merged-mrj9wvtp-105","sourceNo":573,"viRanges":[{"start":3744.289113,"end":3752.057348}],"koRanges":[{"start":3733.876468,"end":3741.746354},{"start":3734.78,"end":3738.29},{"start":3739.3,"end":3741.31}]},{"id":592,"readerNo":593,"displayNo":575,"n":575,"kind":"sub","type":"merged","vi":"Jin Soo à.\nCậu không thấy tiếc khi phải rời Nhật Bản sao?","ko":"진수씨 일본 떠나는 거 아쉽지 않아?","en":"Jin Su. Aren't you sad to leave Japan? Gosh, still...","text":"Jin Soo à.\nCậu không thấy tiếc khi phải rời Nhật Bản sao?\n진수씨 일본 떠나는 거 아쉽지 않아?\nJin Su. Aren't you sad to leave Japan? Gosh, still...","sourceUid":"merged-mrj9xl27-106","sourceNo":575,"viRanges":[{"start":3752.057348,"end":3759.369306}],"koRanges":[{"start":3741.746354,"end":3748.015135},{"start":3744.5,"end":3747.53}]},{"id":593,"readerNo":594,"displayNo":576,"n":576,"kind":"sub","type":"merged","vi":"Dù sao thì ký được hợp đồng là may mắn lắm rồi.\nĐúng vậy.","ko":"아유 그래도 계약했으니까 천만다행인 것 같습니다\n그러게요\n그래서 그랬구나","en":"I'm relieved we managed to secure the contract.\nYes, that's true.","text":"Dù sao thì ký được hợp đồng là may mắn lắm rồi.\nĐúng vậy.\n아유 그래도 계약했으니까 천만다행인 것 같습니다\n그러게요\n그래서 그랬구나\nI'm relieved we managed to secure the contract.\nYes, that's true.","sourceUid":"merged-mrja2yab-108","sourceNo":576,"viRanges":[{"start":3759.369306,"end":3765.007371},{"start":3759.369306,"end":3762.445375}],"koRanges":[{"start":3748.015135,"end":3753.939325},{"start":3748.015135,"end":3752.592408},{"start":3748.3,"end":3752.27},{"start":3752.02,"end":3753.67},{"start":3753.42,"end":3755.87}]},{"id":594,"readerNo":595,"displayNo":579,"n":579,"kind":"sub","type":"merged","vi":"Có phải vì ký được hợp đồng rồi không... mà tôi không thấy đói nhỉ?","ko":"계약을 해서 내가 지금 배가 고픈 거구나","en":"So that's why!\nI'm hungry because we secured the contract.","text":"Có phải vì ký được hợp đồng rồi không... mà tôi không thấy đói nhỉ?\n계약을 해서 내가 지금 배가 고픈 거구나\nSo that's why!\nI'm hungry because we secured the contract.","sourceUid":"merged-mrja402k-109","sourceNo":579,"viRanges":[{"start":3765.007371,"end":3770.054809}],"koRanges":[{"start":3753.939325,"end":3760.129765},{"start":3757.06,"end":3759.69}]},{"id":595,"readerNo":596,"displayNo":580,"n":580,"kind":"sub","type":"merged","vi":"Thiệt tình, cậu không đói sao?","ko":"아이씨 배고프지 않아?","en":"Gosh, aren't you hungry?","text":"Thiệt tình, cậu không đói sao?\n아이씨 배고프지 않아?\nGosh, aren't you hungry?","sourceUid":"merged-mrja523d-110","sourceNo":580,"viRanges":[{"start":3770.054809,"end":3772.800412}],"koRanges":[{"start":3759.44,"end":3761.65},{"start":3760.129765,"end":3762.099049}]},{"id":596,"readerNo":597,"displayNo":581,"n":581,"kind":"sub","type":"merged","vi":"Có chút.\nĐúng vậy nhỉ?","ko":"아 살짝\n그치?\n어?","en":"A little bit.\nRight?","text":"Có chút.\nĐúng vậy nhỉ?\n아 살짝\n그치?\n어?\nA little bit.\nRight?","sourceUid":"merged-mrja5xu9-111","sourceNo":581,"viRanges":[{"start":3772.800412,"end":3777.543101}],"koRanges":[{"start":3761.72,"end":3763.56},{"start":3762.099049,"end":3767.31814},{"start":3764.87,"end":3766},{"start":3766.29,"end":3767.42}]},{"id":597,"readerNo":598,"displayNo":584,"n":584,"kind":"sub","type":"merged","vi":"Cô vẫn chưa về sao?\nTôi nghĩ mọi người chắc chưa ăn gì.\nTrưởng phòng bảo tôi chăm sóc cho mọi người.","ko":"아직 안 가셨네요. 식사 못하셨을 것 같아서요. 저희 팀장님이 챙기라고 하셨습니다.","en":"You haven't left yet?\nI didn't think you had eaten yet.\nMy team leader asked me to take care of it.","text":"Cô vẫn chưa về sao?\nTôi nghĩ mọi người chắc chưa ăn gì.\nTrưởng phòng bảo tôi chăm sóc cho mọi người.\n아직 안 가셨네요. 식사 못하셨을 것 같아서요. 저희 팀장님이 챙기라고 하셨습니다.\nYou haven't left yet?\nI didn't think you had eaten yet.\nMy team leader asked me to take care of it.","sourceUid":"merged-mrja6zpm-113","sourceNo":584,"viRanges":[{"start":3777.543101,"end":3786.032897}],"koRanges":[{"start":3767.31814,"end":3775.906245},{"start":3769.9,"end":3775.51}]},{"id":598,"readerNo":599,"displayNo":585,"n":585,"kind":"sub","type":"merged","vi":"Đúng là người tốt bụng.\nChúng tôi cũng đang đói đây.","ko":"역시 좋은 분이시네요. 안 그래도 저희 다 배고팠거든요.","en":"He's such a good guy.\nIt so happens that we are hungry.","text":"Đúng là người tốt bụng.\nChúng tôi cũng đang đói đây.\n역시 좋은 분이시네요. 안 그래도 저희 다 배고팠거든요.\nHe's such a good guy.\nIt so happens that we are hungry.","sourceUid":"merged-mrja7ser-115","sourceNo":585,"viRanges":[{"start":3786.032897,"end":3790.250221}],"koRanges":[{"start":3775.58,"end":3779.57},{"start":3775.906245,"end":3780.036932}]},{"id":599,"readerNo":600,"displayNo":586,"n":586,"kind":"sub","type":"merged","vi":"À, không phải.\nTôi hiểu ý nghĩa đó là gì rồi.\nÝ là muốn chúng tôi nhanh chóng rời đi nhỉ?","ko":"아 아니다. 저 이제 이거 무슨 뜻인지 알아요. 저희 빨리 가라는 얘기죠?","en":"Oh, no.\nI know what this means now.\n- Telling us to leave quickly, right? - N-No!","text":"À, không phải.\nTôi hiểu ý nghĩa đó là gì rồi.\nÝ là muốn chúng tôi nhanh chóng rời đi nhỉ?\n아 아니다. 저 이제 이거 무슨 뜻인지 알아요. 저희 빨리 가라는 얘기죠?\nOh, no.\nI know what this means now.\n- Telling us to leave quickly, right? - N-No!","sourceUid":"merged-mrja8jbs-117","sourceNo":586,"viRanges":[{"start":3790.250221,"end":3795.170035}],"koRanges":[{"start":3780.036932,"end":3786.666266},{"start":3780.44,"end":3786.55}]},{"id":600,"readerNo":601,"displayNo":590,"n":590,"kind":"sub","type":"merged","vi":"Thật lòng đấy ạ.\nCăng thẳng cả ngày, vừa thả lỏng một cái là thấy hơi đói thật","ko":"하루 종일 긴장했다가 딱 풀리니까 출출하긴 하네요.","en":"Now that I can relax after being tense all day,\nI am a bit hungry.","text":"Thật lòng đấy ạ.\nCăng thẳng cả ngày, vừa thả lỏng một cái là thấy hơi đói thật\n하루 종일 긴장했다가 딱 풀리니까 출출하긴 하네요.\nNow that I can relax after being tense all day,\nI am a bit hungry.","sourceUid":"merged-mrjakh3k-120","sourceNo":590,"viRanges":[{"start":3803.910462,"end":3810.317873}],"koRanges":[{"start":3794.43,"end":3799.22},{"start":3795.695599,"end":3799.846198}]},{"id":601,"readerNo":602,"displayNo":848,"n":848,"kind":"sub","type":"merged","vi":"À, không ạ. Tôi thật lòng muốn mời mọi người một bữa cơm.\n\"Honne\", thật lòng chứ?\nThật lòng đấy.","ko":"아니요. 진심으로 식사 대접하고 싶습니다.\n헌터니 헌터니\n헌터니","en":"I sincerely want to treat you to a meal. Are you really being honest? Really! Really.","text":"À, không ạ. Tôi thật lòng muốn mời mọi người một bữa cơm.\n\"Honne\", thật lòng chứ?\nThật lòng đấy.\n아니요. 진심으로 식사 대접하고 싶습니다.\n헌터니 헌터니\n헌터니\nI sincerely want to treat you to a meal. Are you really being honest? Really! Really.","sourceUid":"merged-mrjaahz7-119","sourceNo":848,"viRanges":[{"start":3795.170035,"end":3803.910462}],"koRanges":[{"start":3786.52,"end":3789.25},{"start":3786.666266,"end":3795.695599},{"start":3790.19,"end":3792.04},{"start":3791.79,"end":3793.36}]},{"id":602,"readerNo":603,"displayNo":"N293","n":"N293","kind":"narration","type":"narration","vi":"Juno kết thúc cuộc gọi và N315","kind":"narration","type":"narration","vi":"Kim Woo-cheol xuất hiện tiếp theo, do dự sau khi xem cách sắp xếp chỗ ngồi, rồi ngồi xuống cạnh Lee Sang-moo.","ko":"이어서 등장한 김우철, 자리 배치를 보고 망설이다가, 이상무 옆자리에 앉는다.","en":"Kim Woo-cheol appeared next, hesitated after seeing the seating arrangement, and then sat down next to Lee Sang-moo.","text":"Kim Woo-cheol xuất hiện tiếp theo, do dự sau khi xem cách sắp xếp chỗ ngồi, rồi ngồi xuống cạnh Lee Sang-moo.\n이어서 등장한 김우철, 자리 배치를 보고 망설이다가, 이상무 옆자리에 앉는다.\nKim Woo-cheol appeared next, hesitated after seeing the seating arrangement, and then sat down next to Lee Sang-moo.","sourceUid":"nar-mrk94mgp-to3vb3","sourceNo":"N315","viRanges":[],"koRanges":[]},{"id":635,"readerNo":636,"displayNo":617,"n":617,"kind":"sub","type":"merged","vi":"(Biên bản cuộc họp)\nXin chào mọi người.\nXin chào mọi người. Xin chào mọi người.\nCó vẻ như giám đốc Lee sẽ không đến.\nTình hình có vẻ không có lợi với ông ấy.\nChắc các vị cũng hiểu chứ?\nSao vậy?\nWind là trách nhiệm của giám đốc Lee sao?","ko":"장모님은\n아로시 모양이네\n안 말해도 모양이 좀 빠질 수 있으니까\n이해하시죠?\n네?\n왜? 윈드 이게 이상문님 책임이라는 거예요?","en":"Hello.\nHello. Hello.\nIt appears Mr. Lee isn't going to show up.\nThe current situation doesn't look good for him.\n- You all understand, right? - Pardon?\nAre you saying Wind is Mr. Lee's responsibility?","text":"(Biên bản cuộc họp)\nXin chào mọi người.\nXin chào mọi người. Xin chào mọi người.\nCó vẻ như giám đốc Lee sẽ không đến.\nTình hình có vẻ không có lợi với ông ấy.\nChắc các vị cũng hiểu chứ?\nSao vậy?\nWind là trách nhiệm của giám đốc Lee sao?\n장모님은\n아로시 모양이네\n안 말해도 모양이 좀 빠질 수 있으니까\n이해하시죠?\n네?\n왜? 윈드 이게 이상문님 책임이라는 거예요?\nHello.\nHello. Hello.\nIt appears Mr. Lee isn't going to show up.\nThe current situation doesn't look good for him.\n- You all understand, right? - Pardon?\nAre you saying Wind is Mr. Lee's responsibility?","sourceUid":"merged-mrjbsjco-134","sourceNo":617,"viRanges":[{"start":3983.265596,"end":4012.966835}],"koRanges":[{"start":3973.290136,"end":4002.930136},{"start":3990.11,"end":3991.56},{"start":3991.31,"end":3993.48},{"start":3993.23,"end":3996.32},{"start":3996.07,"end":3997.78},{"start":3997.69,"end":3998.24},{"start":3997.99,"end":4002.5}]},{"id":636,"readerNo":637,"displayNo":"N316","n":"N316","kind":"narration","type":"narration","vi":". Văn phòng tầng 18, trụ sở Tập đoàn Sanin (ban ngày)","ko":". 18층 사무실, 산인 그룹 본사 ( 낮 )","en":". 18th floor office, Sanin Group headquarters (daytime)","text":". Văn phòng tầng 18, trụ sở Tập đoàn Sanin (ban ngày)\n. 18층 사무실, 산인 그룹 본사 ( 낮 )\n. 18th floor office, Sanin Group headquarters (daytime)","sourceUid":"nar-mrk956p9-07p6yl","sourceNo":"N316","viRanges":[],"koRanges":[]},{"id":637,"readerNo":638,"displayNo":"N317","n":"N317","kind":"narration","type":"narration","vi":"Lee Sang-moo rời khỏi phòng và nói chuyện với Kim Hyeon.","ko":"방을 나서는 이상무, 김현에게 말한다.","en":"Lee Sang-moo leaves the room and speaks to Kim Hyeon.","text":"Lee Sang-moo rời khỏi phòng và nói chuyện với Kim Hyeon.\n방을 나서는 이상무, 김현에게 말한다.\nLee Sang-moo leaves the room and speaks to Kim Hyeon.","sourceUid":"nar-mrk958kb-b1bykd","sourceNo":"N317","viRanges":[],"koRanges":[]},{"id":638,"readerNo":639,"displayNo":"N318","n":"N318","kind":"narration","type":"narration","vi":". Phòng họp, trụ sở Tập đoàn Sanin (ban ngày)","ko":". 대회의실, 산인 그룹 본사 ( 낮 )","en":". Conference room, Sanin Group headquarters (daytime)","text":". Phòng họp, trụ sở Tập đoàn Sanin (ban ngày)\n. 대회의실, 산인 그룹 본사 ( 낮 )\n. Conference room, Sanin Group headquarters (daytime)","sourceUid":"nar-mrk95j2a-gku9aa","sourceNo":"N318","viRanges":[],"koRanges":[]},{"id":639,"readerNo":640,"displayNo":623,"n":623,"kind":"sub","type":"merged","vi":"Có điên không vậy?\nVậy là trách nhiệm của ai?\nBộ phận nào chịu trách nhiệm về việc niêm yết?\nVâng.\nChúng ta chưa tung tin tức gì ra, đúng không?\nVâng, vẫn đang chờ lệnh.\nCó nên tung ra không?\nỪ.","ko":"미친 거 아니에요?\n그럼 누구 책임입니까? 상장 책임지는 데가 어딘데요?\n기사 내보냈지?\n네, 대기 중입니다\n뭘까요?","en":"Are you crazy?\nThen whose responsibility is it?\nWho's in charge of the listing?\nI see.\nWe haven't released the article yet, right?\nNo. It's on standby.\nShould we release it?\n- Yes. - Okay.","text":"Có điên không vậy?\nVậy là trách nhiệm của ai?\nBộ phận nào chịu trách nhiệm về việc niêm yết?\nVâng.\nChúng ta chưa tung tin tức gì ra, đúng không?\nVâng, vẫn đang chờ lệnh.\nCó nên tung ra không?\nỪ.\n미친 거 아니에요?\n그럼 누구 책임입니까? 상장 책임지는 데가 어딘데요?\n기사 내보냈지?\n네, 대기 중입니다\n뭘까요?\nAre you crazy?\nThen whose responsibility is it?\nWho's in charge of the listing?\nI see.\nWe haven't released the article yet, right?\nNo. It's on standby.\nShould we release it?\n- Yes. - Okay.","sourceUid":"merged-mrjbv9vc-135","sourceNo":623,"viRanges":[{"start":4012.966835,"end":4038.108241}],"koRanges":[{"start":4002.930136,"end":4025.528062},{"start":4003.61,"end":4004.94},{"start":4006.03,"end":4010.28},{"start":4021.8,"end":4023.39},{"start":4023.24,"end":4024.97},{"start":4024.72,"end":4026.19}]},{"id":640,"readerNo":641,"displayNo":628,"n":628,"kind":"sub","type":"merged","vi":"Vậy chúng ta cứ tiến hành mà không có giám đốc Lee nhé?\nVâng, làm vậy đi.\nTôi xin lỗi vì đã đến muộn.","ko":"기사모님은 불참하는 걸로 하고 진행할까요?\n예 그러시죠.\n늦었습니다.","en":"Should we say Mr. Lee is absent and proceed?\nYes, let's do that.\nI'm sorry I'm late.","text":"Vậy chúng ta cứ tiến hành mà không có giám đốc Lee nhé?\nVâng, làm vậy đi.\nTôi xin lỗi vì đã đến muộn.\n기사모님은 불참하는 걸로 하고 진행할까요?\n예 그러시죠.\n늦었습니다.\nShould we say Mr. Lee is absent and proceed?\nYes, let's do that.\nI'm sorry I'm late.","sourceUid":"merged-mrjbzrh2-136","sourceNo":628,"viRanges":[{"start":4038.108241,"end":4051.468422}],"koRanges":[{"start":4025.528062,"end":4041.048062},{"start":4033.01,"end":4036},{"start":4035.95,"end":4037.14},{"start":4038.94,"end":4040.03}]},{"id":641,"readerNo":642,"displayNo":"N319","n":"N319","kind":"narration","type":"narration","vi":"Cùng lúc đó, Lee Sang-moo xuất hiện.","ko":"그때, 이상무가 등장한다.","en":"At that time, Lee Sang-moo appears.","text":"Cùng lúc đó, Lee Sang-moo xuất hiện.\n그때, 이상무가 등장한다.\nAt that time, Lee Sang-moo appears.","sourceUid":"nar-mrk95ssg-hqyu9z","sourceNo":"N319","viRanges":[],"koRanges":[]},{"id":642,"readerNo":643,"displayNo":"N320","n":"N320","kind":"narration","type":"narration","vi":"Lee Sang-moo và Đại diện Oh ngồi ở hàng ghế đầu.","ko":"이상무, 오대표를 지나 제일 앞자리에 앉는다.","en":"Lee Sang-moo and Representative Oh sit in the front row.","text":"Lee Sang-moo và Đại diện Oh ngồi ở hàng ghế đầu.\n이상무, 오대표를 지나 제일 앞자리에 앉는다.\nLee Sang-moo and Representative Oh sit in the front row.","sourceUid":"nar-mrk95wzn-t09rrc","sourceNo":"N320","viRanges":[],"koRanges":[]},{"id":643,"readerNo":644,"displayNo":"N321","n":"N321","kind":"narration","type":"narration","vi":"Dae-ri Lim, người đang gõ phím trong góc, thêm Giám đốc điều hành Lee Dong-jun vào số lượng người tham dự.","ko":"구석에서 타이핑하던 임대리, 참석 인원에 이동준 상무를 추가한다.","en":"Dae-ri Lim, who was typing in the corner, adds Executive Director Lee Dong-jun to the number of attendees.","text":"Dae-ri Lim, người đang gõ phím trong góc, thêm Giám đốc điều hành Lee Dong-jun vào số lượng người tham dự.\n구석에서 타이핑하던 임대리, 참석 인원에 이동준 상무를 추가한다.\nDae-ri Lim, who was typing in the corner, adds Executive Director Lee Dong-jun to the number of attendees.","sourceUid":"nar-mrk961f8-txwzsb","sourceNo":"N321","viRanges":[],"koRanges":[]},{"id":644,"readerNo":645,"displayNo":631,"n":631,"kind":"sub","type":"merged","vi":"Vì mọi người đã đến đông đủ, chúng ta bắt đầu cuộc họp hội đồng quản trị.\nVấn đề chính hôm nay là...\nChúng ta bàn chuyện khác trước đi. Vấn đề chính có vẻ quan trọng.\nVâng.","ko":"다 오셨으니까 이사회 진행하겠습니다\n아 본건은요?\n별건부터 하시죠 그게 더 중요한 것 같은데\n아 네","en":"We will start the board meeting since everyone's here. - The main agenda is— - Discuss the side issue first. I think that's more important. Oh, okay.","text":"Vì mọi người đã đến đông đủ, chúng ta bắt đầu cuộc họp hội đồng quản trị.\nVấn đề chính hôm nay là...\nChúng ta bàn chuyện khác trước đi. Vấn đề chính có vẻ quan trọng.\nVâng.\n다 오셨으니까 이사회 진행하겠습니다\n아 본건은요?\n별건부터 하시죠 그게 더 중요한 것 같은데\n아 네\nWe will start the board meeting since everyone's here. - The main agenda is— - Discuss the side issue first. I think that's more important. Oh, okay.","sourceUid":"merged-mrjc1tr1-138","sourceNo":631,"viRanges":[{"start":4051.468422,"end":4072.167841}],"koRanges":[{"start":4041.048062,"end":4060.000062},{"start":4049.84,"end":4052.59},{"start":4052.34,"end":4054.83},{"start":4054.64,"end":4057.67},{"start":4057.42,"end":4059.71}]},{"id":645,"readerNo":646,"displayNo":635,"n":635,"kind":"sub","type":"merged","vi":"Chuyện khác là về việc Wind không niêm yết được.","ko":"자 그럼 별거는 윈드 상장 실패에 관한 건데요.","en":"The side issue is about Wind's failed listing.","text":"Chuyện khác là về việc Wind không niêm yết được.\n자 그럼 별거는 윈드 상장 실패에 관한 건데요.\nThe side issue is about Wind's failed listing.","sourceUid":"merged-mrjc3v9e-139","sourceNo":635,"viRanges":[{"start":4072.167841,"end":4076.274906}],"koRanges":[{"start":4060,"end":4066.810729},{"start":4061.96,"end":4066.55}]},{"id":646,"readerNo":647,"displayNo":636,"n":636,"kind":"sub","type":"merged","vi":"Về việc này giám đốc Lee cần giải thích một chút chứ nhỉ?","ko":"이 부분은 이상무님께서 좀 해명을 해주셔야 하지 않나.","en":"I think Mr. Lee should provide an explanation.","text":"Về việc này giám đốc Lee cần giải thích một chút chứ nhỉ?\n이 부분은 이상무님께서 좀 해명을 해주셔야 하지 않나.\nI think Mr. Lee should provide an explanation.","sourceUid":"merged-mrjc5399-140","sourceNo":636,"viRanges":[{"start":4076.274906,"end":4081.53424}],"koRanges":[{"start":4066.6,"end":4071.05},{"start":4066.810729,"end":4071.381396}]},{"id":647,"readerNo":648,"displayNo":637,"n":637,"kind":"sub","type":"merged","vi":"Chỉ cần doanh thu của Wind tốt thì việc niêm yết sẽ không có vấn đề gì.","ko":"윈드 상장은 매출만 잘 나오면 문제가 없을 겁니다.","en":"Wind's listing won't be a problem\nas long as sales are strong.","text":"Chỉ cần doanh thu của Wind tốt thì việc niêm yết sẽ không có vấn đề gì.\n윈드 상장은 매출만 잘 나오면 문제가 없을 겁니다.\nWind's listing won't be a problem\nas long as sales are strong.","sourceUid":"merged-mrjc6hx9-141","sourceNo":637,"viRanges":[{"start":4081.53424,"end":4088.961723}],"koRanges":[{"start":4071.381396,"end":4078.370729},{"start":4072.92,"end":4077.87}]},{"id":648,"readerNo":649,"displayNo":638,"n":638,"kind":"sub","type":"merged","vi":"Việc niêm yết có phải chỉ dựa vào con số đâu?\nCòn phải có khí thế nữa chứ.\nNói vậy...\ný các vị là trách nhiệm của tôi sao?","ko":"상장은 무슨 숫자로 합니까? 기사로 하는 거지.\n그래서 제 책임이란 말씀인지.","en":"Listings aren't about numbers.\nIt's about momentum.\nSo...\nare you saying it's my fault?","text":"Việc niêm yết có phải chỉ dựa vào con số đâu?\nCòn phải có khí thế nữa chứ.\nNói vậy...\ný các vị là trách nhiệm của tôi sao?\n상장은 무슨 숫자로 합니까? 기사로 하는 거지.\n그래서 제 책임이란 말씀인지.\nListings aren't about numbers.\nIt's about momentum.\nSo...\nare you saying it's my fault?","sourceUid":"merged-mrjc8dtz-144","sourceNo":638,"viRanges":[{"start":4088.961723,"end":4099.49312},{"start":4088.961723,"end":4096.700906}],"koRanges":[{"start":4078.370729,"end":4089.000062},{"start":4080.34,"end":4083.47},{"start":4085.7,"end":4088.47}]},{"id":649,"readerNo":650,"displayNo":641,"n":641,"kind":"sub","type":"merged","vi":"Chẳng lẽ chỉ có mình giám đốc chịu trách nhiệm?\nNhưng giám đốc đổ lỗi cho người khác như vậy cũng không hay đâu.","ko":"상무님 책임이기만 하겠습니까?\n근데 또 상무님이 이걸 남 탓을 하시는 것도 좀 모양이 빠지지 않습니까?","en":"How could it only be your responsibility?\nBut wouldn't it also look bad for you","text":"Chẳng lẽ chỉ có mình giám đốc chịu trách nhiệm?\nNhưng giám đốc đổ lỗi cho người khác như vậy cũng không hay đâu.\n상무님 책임이기만 하겠습니까?\n근데 또 상무님이 이걸 남 탓을 하시는 것도 좀 모양이 빠지지 않습니까?\nHow could it only be your responsibility?\nBut wouldn't it also look bad for you","sourceUid":"merged-mrjc97cm-145","sourceNo":641,"viRanges":[{"start":4099.49312,"end":4108.541279}],"koRanges":[{"start":4089.000062,"end":4098.221396},{"start":4089.82,"end":4091.85},{"start":4092.32,"end":4097.87}]},{"id":650,"readerNo":65 ì sao?\nVì ngày ký hợp đồng là cuối tuần\nnên hôm nay tôi sẽ trình phê duyệt thanh toán.","ko":"그거 계약금 결제는?\n계약 당일이 주말이어서 오늘 결제 올리려고 합니다.","en":"The contract took place on the weekend\nso I will be processing the payment today.","text":"Khoản tiền đặt cọc thì sao?\nVì ngày ký hợp đồng là cuối tuần\nnên hôm nay tôi sẽ trình phê duyệt thanh toán.\n그거 계약금 결제는?\n계약 당일이 주말이어서 오늘 결제 올리려고 합니다.\nThe contract took place on the weekend\nso I will be processing the payment today.","sourceUid":"merged-mrjcgprf-152","sourceNo":652,"viRanges":[{"start":4168.750621,"end":4175.600665}],"koRanges":[{"start":4157.516407,"end":4164.70574},{"start":4158.83,"end":4160.91},{"start":4161.149,"end":4164.39}]},{"id":659,"readerNo":660,"displayNo":654,"n":654,"kind":"sub","type":"merged","vi":"Hôm nay Wind cũng sẽ có bài báo về sản phẩm mới.","ko":"그리고 오늘 윈드에서 신제품 관련 기사가 나갈 예정입니다.","en":"Also, Wind will release\nan article on their new product.\nSince sales concerns made the listing difficult,","text":"Hôm nay Wind cũng sẽ có bài báo về sản phẩm mới.\n그리고 오늘 윈드에서 신제품 관련 기사가 나갈 예정입니다.\nAlso, Wind will release\nan article on their new product.\nSince sales concerns made the listing difficult,","sourceUid":"merged-mrjchemw-153","sourceNo":654,"viRanges":[{"start":4175.600665,"end":4179.698998}],"koRanges":[{"start":4164.70574,"end":4169.676407},{"start":4166.189,"end":4169.35}]},{"id":660,"readerNo":661,"displayNo":655,"n":655,"kind":"sub","type":"merged","vi":"Vì việc niêm yết gặp khó khăn do lo ngại về doanh thu,\ntôi tin rằng hợp đồng này sẽ bù đắp cho điều đó.","ko":"매출에 대한 의구심으로 상장이 어려웠던 만큼\n이번 계약이 그에 대한 보완이 될 것으로 보고 있습니다.","en":"we believe this contract will help\naddress those concerns.","text":"Vì việc niêm yết gặp khó khăn do lo ngại về doanh thu,\ntôi tin rằng hợp đồng này sẽ bù đắp cho điều đó.\n매출에 대한 의구심으로 상장이 어려웠던 만큼\n이번 계약이 그에 대한 보완이 될 것으로 보고 있습니다.\nwe believe this contract will help\naddress those concerns.","sourceUid":"merged-mrjchzvg-154","sourceNo":655,"viRanges":[{"start":4179.698998,"end":4187.068866}],"koRanges":[{"start":4169.676407,"end":4177.444726},{"start":4170.97,"end":4173.51},{"start":4173.26,"end":4177.05}]},{"id":661,"readerNo":662,"displayNo":657,"n":657,"kind":"sub","type":"merged","vi":"Vậy tôi xin phép rời khỏi đây.\nTôi cũng có thể đứng dậy được chứ?\nGiám đốc Lee.","ko":"그럼 저는 물러가 보겠습니다\n상무님 저는 그게 아니고요","en":"Then I'll take my leave.\nMay I leave as well?\nH-Hey, Mr. Lee.\nMr. Lee, t-that's not what I meant...","text":"Vậy tôi xin phép rời khỏi đây.\nTôi cũng có thể đứng dậy được chứ?\nGiám đốc Lee.\n그럼 저는 물러가 보겠습니다\n상무님 저는 그게 아니고요\nThen I'll take my leave.\nMay I leave as well?\nH-Hey, Mr. Lee.\nMr. Lee, t-that's not what I meant...","sourceUid":"merged-mrjcj3p5-155","sourceNo":657,"viRanges":[{"start":4187.068866,"end":4210.919815}],"koRanges":[{"start":4177.444726,"end":4195.352517},{"start":4183.34,"end":4185.29},{"start":4216.4,"end":4219.85}]},{"id":662,"readerNo":663,"displayNo":"N325","n":"N325","kind":"narration","type":"narration","vi":"Khi không có ai trả lời, Lee Sang-moo đứng dậy và rời khỏi phòng họp.","ko":"아무도 답이 없자, 이상무가 자리에서 일어나 회의실을 나선다","en":"When no one answers, Lee Sang-moo gets up and leaves the conference room.","text":"Khi không có ai trả lời, Lee Sang-moo đứng dậy và rời khỏi phòng họp.\n아무도 답이 없자, 이상무가 자리에서 일어나 회의실을 나선다\nWhen no one answers, Lee Sang-moo gets up and leaves the conference room.","sourceUid":"nar-mrk98x7m-leas5o","sourceNo":"N325","viRanges":[],"koRanges":[]},{"id":663,"readerNo":664,"displayNo":"N326","n":"N326","kind":"narration","type":"narration","vi":"Lee Sang-moo đi qua phía sau Đại diện Oh, và mặt Đại diện Oh chuyển sang màu đỏ.","ko":"이상무가 오대표 뒤를 지나는데, 오대표의 얼굴이 붉게 달아오른다.","en":"Lee Sang-moo passes behind Representative Oh, and Representative Oh's face turns red.","text":"Lee Sang-moo đi qua phía sau Đại diện Oh, và mặt Đại diện Oh chuyển sang màu đỏ.\n이상무가 오대표 뒤를 지나는데, 오대표의 얼굴이 붉게 달아오른다.\nLee Sang-moo passes behind Representative Oh, and Representative Oh's face turns red.","sourceUid":"nar-mrk98ydo-j4dw9x","sourceNo":"N326","viRanges":[],"koRanges":[]},{"id":664,"readerNo":665,"displayNo":"N327","n":"N327","kind":"narration","type":"narration","vi":"Lim Dae-ri, bị bỏ lại một mình, ngơ ngác nhìn con trỏ nhấp nháy trên màn hình máy tính xách tay.","ko":"홀로 남은 임대리, 노트북 화면에 커서가 깜빡이는 걸 멍하니 보고 있다가,","en":"Lim Dae-ri, left alone, stares blankly at the cursor blinking on the laptop screen.","text":"Lim Dae-ri, bị bỏ lại một mình, ngơ ngác nhìn con trỏ nhấp nháy trên màn hình máy tính xách tay.\n홀로 남은 임대리, 노트북 화면에 커서가 깜빡이는 걸 멍하니 보고 있다가,\nLim Dae-ri, left alone, stares blankly at the cursor blinking on the laptop screen.","sourceUid":"nar-mrk9905y-60ff82","sourceNo":"N327","viRanges":[],"koRanges":[]},{"id":665,"readerNo":666,"displayNo":659,"n":659,"kind":"sub","type":"merged","vi":"Giám đốc, ý tôi không phải vậy.\nGiám đốc Oh.\nVâng, thưa giám đốc.","ko":"오 대표님\n네 상무님\n억울하다고 남 탓할 거면 그만하셔야 돼","en":"- CEO Oh. - Yes, Mr. Lee.\nIf you blame others for feeling wronged,\nyou should quit.","text":"Giám đốc, ý tôi không phải vậy.\nGiám đốc Oh.\nVâng, thưa giám đốc.\n오 대표님\n네 상무님\n억울하다고 남 탓할 거면 그만하셔야 돼\n- CEO Oh. - Yes, Mr. Lee.\nIf you blame others for feeling wronged,\nyou should quit.","sourceUid":"merged-mrjclbau-156","sourceNo":659,"viRanges":[{"start":4227,"end":4234.4}],"koRanges":[{"start":4217.46,"end":4227.459596},{"start":4219.6,"end":4222.47},{"start":4222.22,"end":4223.43},{"start":4223.68,"end":4227.23}]},{"id":666,"readerNo":667,"displayNo":"N328","n":"N328","kind":"narration","type":"narration","vi":". Hành lang, Trụ sở Tập đoàn Sanin (ngày)","ko":". 복도, 산인 그룹 본사 ( 낮 )","en":". Corridor, Sanin Group Headquarters (day)","text":". Hành lang, Trụ sở Tập đoàn Sanin (ngày)\n. 복도, 산인 그룹 본사 ( 낮 )\n. Corridor, Sanin Group Headquarters (day)","sourceUid":"nar-mrk99avv-mirkbi","sourceNo":"N328","viRanges":[],"koRanges":[]},{"id":667,"readerNo":668,"displayNo":"N329","n":"N329","kind":"narration","type":"narration","vi":"Lee Sang-moo bước erged-mrjcosow-157","sourceNo":662,"viRanges":[{"start":4234.4,"end":4241.738866}],"koRanges":[{"start":4226.98,"end":4229.25},{"start":4227.459596,"end":4233.427595},{"start":4229,"end":4231.09},{"start":4230.84,"end":4232.81}]},{"id":671,"readerNo":672,"displayNo":665,"n":665,"kind":"sub","type":"merged","vi":"Ông lo làm việc đi.\nNghe nói sắp đến hạn tái ký hợp đồng rồi.","ko":"재계약도 얼마 안 남으셨다면서요","en":"You said your contract renewal is coming up soon.","text":"Ông lo làm việc đi.\nNghe nói sắp đến hạn tái ký hợp đồng rồi.\n재계약도 얼마 안 남으셨다면서요\nYou said your contract renewal is coming up soon.","sourceUid":"merged-mrjcppvz-158","sourceNo":665,"viRanges":[{"start":4241.738866,"end":4246.987835}],"koRanges":[{"start":4233.427595,"end":4236.696929},{"start":4233.66,"end":4236.35}]},{"id":672,"readerNo":673,"displayNo":950,"n":950,"kind":"sub","type":"merged","vi":"[Biên bản họp hội đồng quản trị)","ko":"","en":"[Board Meeting Minutes by Deputy Lim Hyeong Seop]","text":"[Biên bản họp hội đồng quản trị)\n[Board Meeting Minutes by Deputy Lim Hyeong Seop]","sourceUid":"merged-mrjcsiiv-159","sourceNo":950,"viRanges":[{"start":4246.987835,"end":4272.079345}],"koRanges":[]},{"id":673,"readerNo":674,"displayNo":"N332","n":"N332","kind":"narration","type":"narration","vi":". Nơi ở của Juno (đêm)","ko":". 주노의 레지던스 ( 밤 )","en":". Juno’s Residence (night)","text":". Nơi ở của Juno (đêm)\n. 주노의 레지던스 ( 밤 )\n. Juno’s Residence (night)","sourceUid":"nar-mrk9a7la-x5dh4x","sourceNo":"N332","viRanges":[],"koRanges":[]},{"id":674,"readerNo":675,"displayNo":"N333","n":"N333","kind":"narration","type":"narration","vi":"Điện thoại của Juno đặt trên bàn rung lên.","ko":"테이블 위에 올려둔 주노의 폰이 진동한다.","en":"Juno’s phone, placed on the table, vibrates.","text":"Điện thoại của Juno đặt trên bàn rung lên.\n테이블 위에 올려둔 주노의 폰이 진동한다.\nJuno’s phone, placed on the table, vibrates.","sourceUid":"nar-mrk9ab55-a9j9wq","sourceNo":"N333","viRanges":[],"koRanges":[]},{"id":675,"readerNo":676,"displayNo":"N334","n":"N334","kind":"narration","type":"narration","vi":"Ngay sau đó, Juno bước ra khỏi phòng tắm sau khi tắm xong và trả lời điện thoại.","ko":"마침, 샤워를 마친 주노가 욕실에서 나와 전화를 받는다.","en":"Just then, Juno comes out of the bathroom after finishing her shower and answers the phone.","text":"Ngay sau đó, Juno bước ra khỏi phòng tắm sau khi tắm xong và trả lời điện thoại.\n마침, 샤워를 마친 주노가 욕실에서 나와 전화를 받는다.\nJust then, Juno comes out of the bathroom after finishing her shower and answers the phone.","sourceUid":"nar-mrk9acbp-mx7j7q","sourceNo":"N334","viRanges":[],"koRanges":[]},{"id":676,"readerNo":677,"displayNo":666,"n":666,"kind":"sub","type":"ko","vi":"Phụ đề tiếng Hàn của Han Hyo-joo","ko":"한글자막 by 한효주","en":"Korean subtitles by Han Hyo-joo","text":"Phụ đề tiếng Hàn của Han Hyo-joo\n한글자막 by 한효주\nKorean subtitles by Han Hyo-joo","sourceUid":"ko-mrfx0skz-666","sourceNo":666,"viRanges":[],"koRanges":[{"start":4264.7,"end":4265.95}]},{"id":677,"readerNo":678,"displayNo":667,"n":667,"kind":"sub","type":"merged","vi":"Vâng, anh.\nChuyến đi Nhật Bản thế nào?\nVâng. Mọi chuyện ổn rồi.\nTuyệt.\nTôi đã tìm được hết những người trong đội rồi.\nBọn họ vẫn sống như vậy thôi.\nTốt quá.\nVậy bắt đầu nhé?","ko":"음 선배 일본은 잘 다녀왔어? 네 잘 해그를 했어요. 역시 적전 멤버는 다 찾아놨어. 걔네들은 아직도 그러고 살더라.\n잘 됐네","en":"Yes, Seonbae.\nDid you have a nice trip to Japan?\nYes, we resolved it well.\nAs I thought.\nI found all the members for the plan.\nThey still live like that.\nThat works out.\nThen should we start?","text":"Vâng, anh.\nChuyến đi Nhật Bản thế nào?\nVâng. Mọi chuyện ổn rồi.\nTuyệt.\nTôi đã tìm được hết những người trong đội rồi.\nBọn họ vẫn sống như vậy thôi.\nTốt quá.\nVậy bắt đầu nhé?\n음 선배 일본은 잘 다녀왔어? 네 잘 해그를 했어요. 역시 적전 멤버는 다 찾아놨어. 걔네들은 아직도 그러고 살더라.\n잘 됐네\nYes, Seonbae.\nDid you have a nice trip to Japan?\nYes, we resolved it well.\nAs I thought.\nI found all the members for the plan.\nThey still live like that.\nThat works out.\nThen should we start?","sourceUid":"merged-mrjcup40-160","sourceNo":667,"viRanges":[{"start":4282,"end":4304.67772}],"koRanges":[{"start":4270,"end":4289.425153},{"start":4271.78,"end":4284.65},{"start":4288.04,"end":4289.13}]},{"id":678,"readerNo":679,"displayNo":669,"n":669,"kind":"sub","type":"merged","vi":"Tiền bối, em sẽ gọi lại cho anh sau.\nVâng, thưa giám đốc.\nỪ. Cậu chưa ngủ à?","ko":"선배 내가 금방 다시 전화할게요. 네, 상무님. 안 잤나?","en":"Seonbae, I'll call you right back.\nYes, Mr. Lee.\nYou're still up.","text":"Tiền bối, em sẽ gọi lại cho anh sau.\nVâng, thưa giám đốc.\nỪ. Cậu chưa ngủ à?\n선배 내가 금방 다시 전화할게요. 네, 상무님. 안 잤나?\nSeonbae, I'll call you right back.\nYes, Mr. Lee.\nYou're still up.","sourceUid":"merged-mrjcy1lc-162","sourceNo":669,"viRanges":[{"start":4310,"end":4319.88707}],"koRanges":[{"start":4299.75,"end":4309.278},{"start":4299.75,"end":4302.14},{"start":4305.68,"end":4306.97},{"start":4307.26,"end":4308.63}]},{"id":679,"readerNo":680,"displayNo":672,"n":672,"kind":"sub","type":"merged","vi":"Xin lỗi vì gọi cậu vào giờ này.\nKhông sao ạ. Có chuyện gì vậy?","ko":"이 시간에 연락해서 미안하네.\n아닙니다. 말씀하십시오.","en":"I'm sorry for calling you at this hour.\nIt's okay. Please go ahead.","text":"Xin lỗi vì gọi cậu vào giờ này.\nKhông sao ạ. Có chuyện gì vậy?\n이 시간에 연락해서 미안하네.\n아닙니다. 말씀하십시오.\nI'm sorry for calling you at this hour.\nIt's okay. Please go ahead.","sourceUid":"merged-mrjczlzy-165","sourceNo":672,"viRanges":[{"start":4319.88707,"end":4324.408146}],"koRanges":[{"start":4309.57,"end":4314.119333},{"start":4309.57,"end":4311.81},{"start":4311.86,"end":4313.91}]},{"id":680,"readerNo":681,"displayNo":674,"n":674,"kind":"sub","type":"merged","vi":"Xảy ra chuyện rồi.","ko":"사고가 터졌네.","en":"There's been an incident.","text":"Xảy ra chuyện rồi.\n사고가 터졌네.\nThere's been an incident.","sourceUid":"merged-mrjd07f3-166","sourceNo":674,"viRanges":[{"start":4324.408146,"end":4327.177144}],"koRanges":[{"start":4315.37,"end":4316.65}]},{"id":681,"readerNo":682,"displayNo":"N335","n":"N335","kind":"narration","type":"narration","vi":". Trước nhà Lee Sang- ":[{"start":4327.177144,"end":4338.074329}],"koRanges":[{"start":4319.85,"end":4326.96}]},{"id":685,"readerNo":686,"displayNo":676,"n":676,"kind":"sub","type":"merged","vi":"Chắc là ông ấy muốn làm bí mật.","ko":"아무래도 몰래 하시려고 그런 모양인데","en":"It seems he was trying to do it discreetly.","text":"Chắc là ông ấy muốn làm bí mật.\n아무래도 몰래 하시려고 그런 모양인데\nIt seems he was trying to do it discreetly.","sourceUid":"merged-mrjd1rt8-168","sourceNo":676,"viRanges":[{"start":4338.074329,"end":4344.503368}],"koRanges":[{"start":4326.96,"end":4333.961479},{"start":4330.57,"end":4333.76}]},{"id":686,"readerNo":687,"displayNo":677,"n":677,"kind":"sub","type":"merged","vi":"Không công khai mà lại vậy. Phòng thư ký đến hạn trả nợ mới biết chuyện.","ko":"공시도 없이 있다가 비서실도 만기일이 다 되어서야\n이게 문제가 된 걸 안 모양이야","en":"With no public disclosure,\nthe secretary's office realized it was a problem\nwhen it got close to the due date.","text":"Không công khai mà lại vậy. Phòng thư ký đến hạn trả nợ mới biết chuyện.\n공시도 없이 있다가 비서실도 만기일이 다 되어서야\n이게 문제가 된 걸 안 모양이야\nWith no public disclosure,\nthe secretary's office realized it was a problem\nwhen it got close to the due date.","sourceUid":"merged-mrjd2vxk-170","sourceNo":677,"viRanges":[{"start":4344.503368,"end":4352.202047}],"koRanges":[{"start":4335.13,"end":4343.071334},{"start":4335.13,"end":4340.54},{"start":4340.29,"end":4342.88}]},{"id":687,"readerNo":688,"displayNo":679,"n":679,"kind":"sub","type":"merged","vi":"(Hợp đồng vay thế chấp cổ phiếu) Có lẽ chủ tịch không muốn ai biết nên mới vậy.","ko":"회장님이 알리기 싫어하셔서 그럴 수도 있고","en":"[Stock Collateral Loan Agreement]\nMaybe the chairman didn't want it to be made public.","text":"(Hợp đồng vay thế chấp cổ phiếu) Có lẽ chủ tịch không muốn ai biết nên mới vậy.\n회장님이 알리기 싫어하셔서 그럴 수도 있고\n[Stock Collateral Loan Agreement]\nMaybe the chairman didn't want it to be made public.","sourceUid":"merged-mrjd3ozj-171","sourceNo":679,"viRanges":[{"start":4352.202047,"end":4358.775959}],"koRanges":[{"start":4345,"end":43 let idx=0,stop=false,viUrl='',koUrl='',unlocked=false,token=0;
const $=id=>document.getElementById(id);
const engine=()=>$('engine');
function toggleSettings(){const p=$('settingsPanel');if(p)p.classList.toggle('show')}
let audioCtx=null,gainNode=null,mediaSource=null,engineKind='vi';
const VOL_KEY='master_reader_volume_'+String(project.githubSlug||project.title||'reader').replace(/[^A-Za-z0-9._-]+/g,'_');

function esc2(s){return String(s||'').replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]})}
function fmt(t){t=Number(t||0);let h=Math.floor(t/3600),m=Math.floor((t%3600)/60),s=Math.floor(t%60),ms=Math.round((t-Math.floor(t))*1000);if(ms>=1000){s++;ms-=1000}return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+','+String(ms).padStart(3,'0')}
function rangeLabel(arr){if(!arr||!arr.length)return '';let a=arr[0],b=arr[arr.length-1];return fmt(a.start)+' → '+fmt(b.end)+(arr.length>1?' x'+arr.length:'')}
function hasRange(k,b){let arr=k==='vi'?b.viRanges:b.koRanges;return !!(arr&&arr.length)}
function folderPath(){let f=String(project.audioFolder||'audio').trim();while(f.endsWith('/'))f=f.slice(0,-1);return f||'audio'}
function pathFor(k){let folder=folderPath();let file=k==='vi'?project.viAudioFile:project.koAudioFile;if(!file)return '';if(file.startsWith('http://')||file.startsWith('https://'))return file;if(folder==='.'||folder==='')return './'+file;if(folder.startsWith('../')||folder.startsWith('./'))return folder+'/'+file;return './'+folder+'/'+file}
function clampVol(v){v=Number(v);if(!Number.isFinite(v))v=100;return Math.max(0,Math.min(200,v))}
function loadVolSettings(){try{return JSON.parse(localStorage.getItem(VOL_KEY)||'{}')||{}}catch(e){return {}}}
function saveVolSettings(){try{localStorage.setItem(VOL_KEY,JSON.stringify({vi:clampVol($('viVol')?.value||100),ko:clampVol($('koVol')?.value||100)}))}catch(e){}}
function volValue(k){return clampVol($(k+'Vol')?.value||100)}
function ensureGain(){
  try{
    const a=engine();
    if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    if(!mediaSource){
      mediaSource=audioCtx.createMediaElementSource(a);
      gainNode=audioCtx.createGain();
      mediaSource.connect(gainNode);
      gainNode.connect(audioCtx.destination);
    }
    if(audioCtx.state==='suspended')audioCtx.resume().catch(()=>{});
    return true;
  }catch(e){return false}
}
function applyVisibleVolume(k){
  const v=volValue(k), label=$(k+'VolLabel');
  if(label)label.textContent=Math.round(v)+'%';
}
function applyEngineVolume(k){
  engineKind=k||engineKind||'vi';
  const v=volValue(engineKind), a=engine();
  const ok=ensureGain();
  if(ok&&gainNode){a.volume=1;gainNode.gain.value=v/100}
  else a.volume=Math.min(1,v/100);
  applyVisibleVolume(engineKind);
}
function setReaderVolume(k,v,persist=true){
  const slider=$(k+'Vol');
  if(slider)slider.value=String(clampVol(v));
  applyVisibleVolume(k);
  if(engineKind===k)applyEngineVolume(k);
  if(persist)saveVolSettings();
}
function initReaderVolumeControls(){
  const saved=loadVolSettings();
  ['vi','ko'].forEach(k=>{
    const slider=$(k+'Vol');
    const val=clampVol(saved[k]??100);
    if(slider){
      slider.value=String(val);
      slider.oninput=()=>setReaderVolume(k,slider.value,true);
      slider.onchange=()=>setReaderVolume(k,slider.value,true);
    }
    setReaderVolume(k,val,false);
  });
}
function loadPaths(){viUrl=pathFor('vi');koUrl=pathFor('ko');applyVisibleVolume('vi');applyVisibleVolume('ko');$('audioInfo').textContent='Paths: '+viUrl+' | '+koUrl}
function showAudioPaths(){alert('VI: '+viUrl+'\nKO: '+koUrl+'\n\nNếu đặt reader trong thư mục subtitle-master, audio folder thường là ../audio.')}
function loadLocal(k,f){if(!f)return;if(k==='vi')viUrl=URL.createObjectURL(f);else koUrl=URL.createObjectURL(f);applyVisibleVolume(k);$('audioInfo').textContent='Loaded local '+k+': '+f.name}
function toggleAudio(){toggleSettings()}

function badgeHtml(b){
  const vi=hasRange('vi',b)?'<span class="badge vi timingBadge">VI '+rangeLabel(b.viRanges)+'</span>':'<span class="badge no">No VI</span>';
  const ko=hasRange('ko',b)?'<span class="badge vi timingBadge">KO '+rangeLabel(b.koRanges)+'</span>':'<span class="badge no">No KO</span>';
  const type=b.kind==='narration'?'<span class="badge narr">Narration</span>':'<span class="badge">Cue</span>';
  return '<div class="badges">'+type+vi+ko+'</div>';
}
function render(){
  const q=($('q').value||'').toLowerCase();
  let h='';
  project.blocks.forEach(function(b,i){
    const hay=[b.vi,b.ko,b.en,b.text,b.displayNo,b.sourceNo].join(' ').toLowerCase();
    if(q&&!hay.includes(q))return;
    const title=(b.kind==='narration'?'Narration #':'Cue #')+(b.displayNo||b.sourceNo||i+1);
    h+='<div class="item '+(b.kind==='narration'?'narr':'')+' '+(i===idx?'active':'')+'" onclick="idx='+i+';render()">';
    h+='<div class="meta"><span>'+esc2(title)+'</span><span>'+(i===idx?'SELECTED':'')+'</span></div>';
    h+=badgeHtml(b);
    h+='<div class="txt">'+(b.vi?'<div>'+esc2(b.vi)+'</div>':'')+(b.ko?'<div class="ko">'+esc2(b.ko)+'</div>':'')+(b.en?'<div class="en">'+esc2(b.en)+'</div>':'')+'</div>';
    h+='<div class="row" style="margin-top:8px"><button onclick="event.stopPropagation();idx='+i+';readKoCurrent()">Read KO</button><button class="good" onclick="event.stopPropagation();idx='+i+';playCurrent(\'vi\')">VI Dub</button><button class="violet" onclick="event.stopPropagation();idx='+i+';playCurrent(\'ko\')">KO Live</button><button class="warn" onclick="event.stopPropagation();idx='+i+';playCueMode()">VI→VI→KO→KO</button></div>';
    h+='</div>';
  });
  $('list').innerHTML=h||'<div class="item">Không có cue phù hợp.</div>';
  const viCount=project.blocks.filter(b=>hasRange('vi',b)).length, koCount=project.blocks.filter(b=>hasRange('ko',b)).length;
  $('stat').textContent=project.blocks.length+' blocks · VI '+viCount+' · KO '+koCount+' · current '+(idx+1);
}
function cur(){return project.blocks[idx]||{}}
function prev(){idx=Math.max(0,idx-1);render();scrollActive()}
function next(){idx=Math.min(project.blocks.length-1,idx+1);render();scrollActive()}
function scrollActive(){document.querySelector('.item.active')?.scrollIntoView({block:'center',behavior:'smooth'})}
function stopAll(){stop=true;token++;engine().pause();try{speechSynthesis.cancel()}catch(e){}}

function wait(ms){return new Promise(r=>setTimeout(r,ms))}
function waitMedia(a,timeout){timeout=timeout||6000;return new Promise(res=>{if(a.readyState>=1)return res(true);let done=false;function ok(){if(done)return;done=true;clean();res(true)}function bad(){if(done)return;done=true;clean();res(false)}function clean(){a.removeEventListener('loadedmetadata',ok);a.removeEventListener('canplay',ok);a.removeEventListener('error',bad);clearTimeout(to)}a.addEventListener('loadedmetadata',ok,{once:true});a.addEventListener('canplay',ok,{once:true});a.addEventListener('error',bad,{once:true});let to=setTimeout(bad,timeout)})}
async function unlockAudio(){try{let a=engine();let src=viUrl||koUrl||pathFor('vi')||pathFor('ko');if(!src){alert('Chưa có audio path.');return false}if(a.src!==new URL(src,location.href).href){a.src=src;a.load();await waitMedia(a,5000)}let vol=a.volume;a.volume=0.001;await a.play();a.pause();a.volume=vol||1;applyEngineVolume(engineKind||'vi');unlocked=true;$('audioInfo').textContent+=' | unlocked';return true}catch(e){alert('iPhone chưa cho unlock audio. Bấm lại Unlock iPhone Audio. '+(e.message||e));return false}}
function playRange(src,r,myToken,k){
  return new Promise(async res=>{
    if(!src||!r){res(false);return}
    const a=engine();stop=false;
    try{
      const abs=new URL(src,location.href).href;
      if(a.src!==abs){a.pause();a.src=src;a.load();await waitMedia(a,7000)}
      applyEngineVolume(k||'vi');
      a.currentTime=Math.max(0,Number(r.start)||0);
      const end=Math.max(Number(r.end)||0,(Number(r.start)||0)+.2);
      function finish(ok){a.removeEventListener('timeupdate',tick);a.removeEventListener('ended',ended);a.removeEventListener('error',err);res(ok)}
      function tick(){if(stop||myToken!==token){a.pause();finish(false);return}if(a.currentTime>=end-0.03){a.pause();finish(true)}}
      function ended(){finish(true)} function err(){finish(false)}
      a.addEventListener('timeupdate',tick);a.addEventListener('ended',ended,{once:true});a.addEventListener('error',err,{once:true});
      await a.play();
    }catch(e){$('audioInfo').textContent='Không phát được audio: '+(e.message||e)+' | '+src;res(false)}
  })
}
async function playAudioKind(k,myToken){
  const b=cur();const ranges=k==='vi'?b.viRanges:b.koRanges;const src=k==='vi'?viUrl:koUrl;
  if(!ranges||!ranges.length)return false;
  let any=false;
  for(const r of ranges){if(stop||myToken!==token)break;let ok=await playRange(src,r,myToken,k);any=any||ok}
  return any;
}
async function playCurrent(k){const my=++token;stop=false;const ok=await playAudioKind(k,my);if(!ok)await readKoCurrent()}

function getBestVoice(lang){
  try{
    const voices=speechSynthesis.getVoices()||[];
    const prefix=String(lang||'').slice(0,2).toLowerCase();
    const scored=voices.map(v=>{
      const hay=((v.lang||'')+' '+(v.name||'')).toLowerCase();
      let score=0;
      if((v.lang||'').toLowerCase().startsWith(prefix))score+=100;
      if(lang==='ko-KR' && /ko|korean|한국|yuna|siri|google|microsoft|samsung|premium|enhanced/.test(hay))score+=60;
      if(lang==='vi-VN' && /vi|vietnam|tiếng việt|vietnamese|google|microsoft|premium|enhanced/.test(hay))score+=60;
      if(v.localService)score+=5;
      return {v,score};
    }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score);
    return scored[0]?.v||null;
  }catch(e){return null}
}
function readTts(text,lang,myToken,rate){
  return new Promise(res=>{
    text=String(text||'').trim();
    if(!text){res(false);return}
    try{
      speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(text.slice(0,1200));
      u.lang=lang;
      u.rate=rate||1;
      u.pitch=1;
      const v=getBestVoice(lang); if(v)u.voice=v;
      let done=false;
      function finish(ok){if(done)return;done=true;res(ok)}
      u.onend=()=>finish(true);u.onerror=()=>finish(false);
      speechSynthesis.speak(u);
      setTimeout(()=>{if(myToken!==token){speechSynthesis.cancel();finish(false)}},50);
    }catch(e){res(false)}
  })
}
function readKo(text,myToken){return readTts(text,'ko-KR',myToken,0.88)}
function readVi(text,myToken){return readTts(text,'vi-VN',myToken,0.95)}
function readKoCurrent(){const my=++token;stop=false;return readKo(cur().ko||cur().text||'',my)}
function readViCurrent(){const my=++token;stop=false;return readVi(cur().vi||'',my)}
if('speechSynthesis' in window){speechSynthesis.onvoiceschanged=()=>{try{speechSynthesis.getVoices()}catch(e){}}}

async function playByModeForCurrent(mode,my){
  const b=cur();
  const hasVi=hasRange('vi',b), hasKo=hasRange('ko',b);
  if(mode==='vi-readvi-readko-ko'){
    if(hasVi) await playAudioKind('vi',my); else await readVi(b.vi||'',my);
    if(stop||my!==token)return;
    await readKo(b.ko||b.text||'',my);
    if(stop||my!==token)return;
    if(hasKo) await playAudioKind('ko',my);
  }else if(mode==='vi-readko-ko'){
    if(hasVi) await playAudioKind('vi',my);
    if(stop||my!==token)return;
    await readKo(b.ko||b.text||'',my);
    if(stop||my!==token)return;
    if(hasKo) await playAudioKind('ko',my);
  }else if(mode==='vi-ko'){
    if(hasVi)await playAudioKind('vi',my);
    if(stop||my!==token)return;
    if(hasKo)await playAudioKind('ko',my);
    else if(!hasVi)await readKo(b.ko||b.text||'',my);
  }else if(mode==='vi'){
    const ok=await playAudioKind('vi',my);
    if(!ok)await readVi(b.vi||'',my);
  }else if(mode==='ko'){
    const ok=await playAudioKind('ko',my);
    if(!ok)await readKo(b.ko||b.text||'',my);
  }else if(mode==='readko'){
    await readKo(b.ko||b.text||'',my);
  }
}
async function playCueMode(){
  const my=++token;stop=false;
  await playByModeForCurrent($('mode').value,my);
}
async function smart(){
  stop=false;const my=++token;
  const mode=$('mode').value;
  if((mode==='vi-readko-ko'||mode==='vi-readvi-readko-ko')&&!unlocked&&/iPad|iPhone|iPod/.test(navigator.userAgent)){await unlockAudio()}
  for(;idx<project.blocks.length&&my===token&&!stop;idx++){
    render();scrollActive();
    await playByModeForCurrent(mode,my);
    if(stop||my!==token)break;
  }
}
initReaderVolumeControls();loadPaths();render();
