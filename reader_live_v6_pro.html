.01", "cueNo": 14, "time": "00:00:55,170 --> 00:00:57,630", "start": 55.17, "end": 57.63, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Ở trường Yonsei, khu Sinchon ạ?", "ko": "연세대에서 신촌이요?", "en": "At Yonsei University, in Sinchon?"}, {"id": 14, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 15, "time": "00:00:57,690 --> 00:01:01,890", "start": 57.69, "end": 61.89, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Trung tâm ngôn ngữ? Em cũng học Yonsei đấy, thật ạ?", "ko": "어학당? 저도 연세대인데 진짜요?", "en": "Language school? I went to Yonsei too, really?"}, {"id": 15, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 16, "time": "00:01:02,330 --> 00:01:06,810", "start": 62.33, "end": 66.81, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Em khóa 15, em cũng là khóa đầu, em ở Sinchon uống rượu nhiều lắm", "ko": "전 15년대 저도 1학번 저 신촌에서 술 엄청 먹었어요", "en": "I was in the class of 2015. I was a freshman too. I drank so much in Sinchon."}, {"id": 16, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 17, "time": "00:01:06,810 --> 00:01:08,550", "start": 66.81, "end": 68.55, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Tôi cũng từng chơi nhiều ở Sinchon lắm.", "ko": "저도 신촌에서 많이 놀았어요", "en": "I also hung out a lot in Sinchon."}, {"id": 17, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 18, "time": "00:01:15,160 --> 00:01:16,360", "start": 75.16, "end": 76.36, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Biết đâu chúng ta đã từng gặp nhau.", "ko": "만났을 수도 있었다.", "en": "We might have run into each other."}, {"id": 18, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 19, "time": "00:01:25,230 --> 00:01:27,850", "start": 85.23, "end": 87.85, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Hồi 51,200", "start": 109.8, "end": 111.2, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Bị ông Hirose cho một bài học rồi nhỉ.", "ko": "히로세 씨한테 한 방 먹었잖아요.", "en": "Hirose-san really got one over on us, didn't he?"}, {"id": 25, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 26, "time": "00:01:53,940 --> 00:01:56,880", "start": 113.94, "end": 116.88, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Anh Ba Rosa được khen còn tôi thì bị chửi.", "ko": "배로사 씨는 칭찬 듣고 나는 욕먹", "en": "Mr. Barossa gets praised, and I get chewed out."}, {"id": 26, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 27, "time": "00:02:06,630 --> 00:02:09,210", "start": 126.63, "end": 129.21, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Shizuoka nổi tiếng với món chả cá.", "ko": "시즈오카는 어묵이 유명한데", "en": "Shizuoka is famous for its fish cakes, but..."}, {"id": 27, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 28, "time": "00:02:09,210 --> 00:02:10,070", "start": 129.21, "end": 130.07, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Hay là", "ko": "혹시", "en": "Hey, by the way..."}, {"id": 28, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 29, "time": "00:02:22,760 --> 00:02:24,160", "start": 142.76, "end": 144.16, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Tôi hỏi một câu được không?", "ko": "하나만 물어봐도 되나?", "en": "Can I ask you just one thing?"}, {"id": 29, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 30, "time": "00:02:24,420 --> 00:02:25,200", "start": 144.42, "end": 145.2, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Vâng.", "ko": "네.", "en": "Yes."}, {"id": 30, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 31, "time": "00:02:30,310 --> 00:02:31,590", "start": 150.31, "end": 151.59, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Anh muốn hỏi gì vậy?", "ko": "궁금한 게 뭔데요?", "en": "What do you want to know?"}, {"id": 31, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 32, "time": "00:02:37,850 --> 00:02:40,650", "start": 157.85, "end": 160.65, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Có phải Shimizu không có ý định giao dịch với chúng ta không?", "ko": "시미즈는 저희랑 거래할 맘이 없는 거죠?", "en": "Shimizu has no intention of doing business with us, right?"}, {"id": 32, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 33, "time": "00:02:41,430 --> 00:02:44,810", "start": 161.43, "end": 164.81, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Đó chỉ là lời nói xã giao thôi, còn chúng ta thì không hiểu được.", "ko": "다테마에 그건데 우리가 못 알아듣고 있는 거죠", "en": "That's just tatemae, and we're not picking up on it."}, {"id": 33, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 34, "time": "00:02:49,970 --> 00:02:54,350", "start": 169.97, "end": 174.35, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Thực ra bây giờ Shimizu đang định chuyển trụ sở chính.", "ko": "사실 시미즈는 지금 본점을 이동하려고 해요", "en": "The truth is, Shimizu is trying to move their main office right now."}, {"id": 34, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 35, "time": "00:02:55,600 --> 00:02:57,380", "start": 175.6, "end": 177.38, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Shizuoka không phải là trụ sở chính sao?", "ko": "시즈오카가 본점 아니에요?", "en": "Isn't Shizuoka the main office?"}, {"id": 35, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 36, "time": "00:02:57,660 --> 00:02:58,460", "start": 177.66, "end": 178.46, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Đúng vậy.", "ko": "맞아요", "en": "That's right."}, {"id": 36, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 37, "time": "00:02:59,790 --> 00:03:03,150", "start": 179.79, "end": 183.15, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Nhưng mà ở Shizuoka dân số đang giảm đi nhiều.", "ko": "하지만 시즈오카는 사람들이 많이 줄어서요", "en": "But the number of people in Shizuoka has decreased a lot."}, {"id": 37, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 38, "time": "00:03:03,950 --> 00:03:06,110", "start": 183.95, "end": 186.11, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Họ định chuyển trụ sở chính lên Tokyo.", "ko": "도쿄로 본점을 옮기려고 하거든요", "en": "So they're planning to move the main office to Tokyo."}, {"id": 38, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 39, "time": "00:03:06,110 --> 00:03:09,600", "start": 186.11, "end": 189.6, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Ai sẽ lên Tokyo,", "ko": "누가 도쿄를 갈지", "en": "Who's going to Tokyo?"}, {"id": 39, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 40, "time": "00:03:09,600 --> 00:03:13,160", "start": 189.6, "end": 193.16, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "ai sẽ ở lại Shizuoka, quyết định đã được đưa ra trong tháng này.", "ko": "시조가에 남을지가 이번 달 결정됐는데", "en": "The decision on who will stay in Shizuoka was made this month."}, {"id": 40, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 41, "time": "00:03:13,160 --> 00:03:16,320", "start": 193.16, "end": 196.32, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Chị Yoshida, trưởng nhóm, đã phải ở lại.", "ko": "여시다 팀장님은 남게 되었어요.", "en": "Team Leader Yeoshida will be staying."}, {"id": 41, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 42, "time": "00:03:17,040 --> 00:03:18,560", "start": 197.04, "end": 198.56, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Là vì thành tích.", "ko": "실적 때문에요.", "en": "Because of performance metrics."}, {"id": 42, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 43, "time": "00:03:22,310 --> 00:03:24,290", "start": 202.31, "end": 204.29, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Vấn đề là ở Hàn Quốc cũng vậy, ai cũng chỉ muốn lên Seoul.", "ko": "한국도 서울로만 가려고 해서 문제거든요.", "en": "The problem is that in Korea, everyone only wants to go to Seoul."}, {"id": 43, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 44, "time": "00:03:26,990 --> 00:03:30,250", "start": 206.99, "end": 210.25, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Dù sao thì Shizuoka cũng là thành phố nhỏ hơn Tokyo mà.", "ko": "아무래도 시조가는 도쿄보다 작은 도시니까", "en": "After all, Shizuoka is a smaller city than Tokyo."}, {"id": 44, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 45, "time": "00:03:33,010 --> 00:03:34,070", "start": 213.01, "end": 214.07, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Còn anh Hirose thì sao?", "ko": "히로세 씨는요?", "en": "What about Mr. Hirose?"}, {"id": 45, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 46, "time": "00:03:34,090 --> 00:03:35,270", "start": 214.09, "end": 215.27, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Có phải đi Tokyo không?", "ko": "도쿄로 가나요?", "en": "Is he going to Tokyo?"}, {"id": 46, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 47, "time": "00:03:35,410 --> 00:03:38,430", "start": 215.41, "end": 218.43, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Hay là ở lại Shizuoka?", "ko": "아니면 시즈오카에 남나요?", "en": "Or is he staying in Shizuoka?"}, {"id": 47, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 48, "time": "00:03:39,750 --> 00:03:42,870", "start": 219.75, "end": 222.87, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Trong nhóm mình có một người có thể đi Tokyo.", "ko": "저희 팀에서 한 명이 도쿄로 갈 수 있어요.", "en": "One person from our team can go to Tokyo."}, {"id": 48, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 49, "time": "00:03:44,230 --> 00:03:46,670", "start": 224.23, "end": 226.67, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Chắc là Ozaki-dai chứ không phải tôi nhỉ?", "ko": "저보다는 오자키다이 가지 않을까?", "en": "I think it'll be Ozaki, not me."}, {"id": 49, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 50, "time": "00:03:48,070 --> 00:03:49,890", "start": 228.07, "end": 229.89, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Anh Hirose cũng muốn đi đúng không?", "ko": "히로세 씨도 가고 싶은 거고요?", "en": "So Mr. Hirose wants to go too?"}, {"id": 50, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 51, "time": "00:03:51,480 --> 00:03:52,480", "start": 231.48, "end": 232.48, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Cũng không biết nữa.", "ko": "글쎄요.", "en": "I'm not so sure."}, {"id": 51, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 52, "time": "00:03:53,950 --> 00:03:57,810", "start": 233.95, "end": 237.81, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Dù sao thì đi Tokyo cũng tốt cho sự nghiệp.", "ko": "도쿄로 가는 곳이 아무래도 경력에는 좋지만.", "en": "Going to Tokyo is probably better for your career, though."}, {"id": 52, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 53, "time": "00:04:05,260 --> 00:04:09,980", "start": 245.26, "end": 249.98, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Trưởng phòng Yoshida, chẳng phải chỉ cần ký hợp đồng với chúng tôi và đạt chỉ tiêu là được sao?", "ko": "요시다 부장님은 우리랑 계약해서 실적을 채우시면 되는 거 아닌가요?", "en": "Can't you just fulfill your targets by signing a contract with us, Director Yoshida?"}, {"id": 53, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 54, "time": "00:04:11,030 --> 00:04:15,730", "start": 251.03, "end": 255.73, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Với hợp đồng của Windows thì hơi thiếu để tính vào thành tích.", "ko": "윈도우의 계약으로는 실적이 되기엔 좀 모자라요", "en": "The Windows contract alone isn't enough to meet the numbers."}, {"id": 54, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 55, "time": "00:04:16,070 --> 00:04:21,130", "start": 256.07, "end": 261.13, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Thành tích chỉ được công nhận khi tiền thanh toán đã được chuyển vào.", "ko": "실적은 대금 입금되야 실적을 인정받을 수 있거든요", "en": "The thing is, the performance only gets recognized once the payment comes in."}, {"id": 55, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 56, "time": "00:04:21,130 --> 00:04:26,650", "start": 261.13, "end": 266.65, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Nhưng tiền đặt cọc của Windows là không đủ.", "ko": "하지만 윈도우의 계약금으로는 충분하지 않았어요", "en": "But the deposit from Windows wasn't enough."}, {"id": 56, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 57, "time": "00:04:26,650 --> 00:04:27,870", "start": 266.65, "end": 267.87, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "À.", "ko": "아", "en": "Ah."}, {"id": 57, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 58, "time": "00:04:28,530 --> 00:04:32,450", "start": 268.53, "end": 272.45, "mp3": "./audio_assets/MnA.Negotiation.S01E06.01_MnA.Negotiation.S01E06.01.0100-0553.mp3", "vi": "Vậy ra là vì thế nên mới không chịu giảm giá à?", "ko": "그래서 할인을 안 해주겠다는 건가요", "en": "So you're saying you won't give us a discount?"}, {"id": 58, "folder": "MnA.Negotiation.S01E06.01", "cueNo": 59, "time": "00:04:34,640 --> 00:04:45,9  "ko": "아 예", "en": "Oh, yes."}, {"id": 333, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 35, "time": "00:02:11,550 --> 00:02:13,130", "start": 131.55, "end": 133.13, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Trời ơi, hôm nay...", "ko": "아유 금일", "en": "Oh, come on."}, {"id": 334, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 36, "time": "00:02:31,460 --> 00:02:34,040", "start": 151.46, "end": 154.04, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Ý tôi không phải là muốn làm gì ông Lee Sang-moon đâu.", "ko": "이상문님을 뭐 어떻게 하자 그러는 게 아닙니다", "en": "It's not about doing something to Sang-moon Lee."}, {"id": 335, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 37, "time": "00:02:35,320 --> 00:02:36,180", "start": 155.32, "end": 156.18, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Mà là cho ông Lee Sang-moon", "ko": "이상문님한테", "en": "To Sang-moon Lee..."}, {"id": 336, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 38, "time": "00:02:37,060 --> 00:02:39,880", "start": 157.06, "end": 159.88, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "một cái cớ để có thể từ bỏ Yoon Jun-ho.", "ko": "윤준호를 포기할 수 있는 명분을 드리자는 거예요", "en": "I'm suggesting we give you a justification to abandon Yoon Jun-ho."}, {"id": 337, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 39, "time": "00:02:39,880 --> 00:02:42,900", "start": 159.88, "end": 162.9, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Thì lựa chọn là do anh tự quyết định thôi.", "ko": "뭐 선택은 본인이 하시면 되는 거고", "en": "The choice is yours to make."}, {"id": 338, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 40, "time": "00:02:43,420 --> 00:02:43,980", "start": 163.42, "end": 163.98, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Nhưng mà", "ko": "근데", "en": "But,"}, {"id": 339, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 41, "time": "00:02:45,280 --> 00:02:47,960", "start": 165.28, "end": 167.96, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Nếu anh Lee Sang-mun nói sẽ chịu trách nhiệm toàn bộ và nghỉ hưu,", "ko": "이상문님이 다 책임지고 은퇴하신다고 하면", "en": "If Lee Sang-moon takes full responsibility and retires,"}, {"id": 340, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 42, "time": "00:02:48,900 --> 00:02:51,080", "start": 168.9, "end": 171.08, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Thì xử lý Yoon Jun-ho thế nào?", "ko": "윤준호는 어떻게 처리합니까?", "en": "what happens to Yoon Jun-ho?"}, {"id": 341, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 43, "time": "00:02:52,280 --> 00:02:53,560", "start": 172.28, "end": 173.56, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Chẳng phải là chỉ nhận được giấy miễn tội thôi sao?", "ko": "면죄보만 받는 거 아니에요?", "en": "Doesn't he just get a free pass?"}, {"id": 342, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 44, "time": "00:02:54,940 --> 00:02:55,540", "start": 174.94, "end": 175.54, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Giấy miễn tội.", "ko": "면죄보", "en": "A free pass."}, {"id": 343, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 45, "time": "00:02:59,690 --> 00:03:02,770", "start": 179.69, "end": 182.77, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Anh nghĩ tại sao Yoon Jun-ho lại lên trụ sở chính? Anh có biết không?", "ko": "윤준호가 본사에 왜 온 것 같으세요? 아세요?", "en": "Why do you think Yoon Jun-ho came to headquarters? Do you know?"}, {"id": 344, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 46, "time": "00:03:22,440 --> 00:03:35,530", "start": 202.44, "end": 215.53, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Khi con người ta cầm trong tay một số tiền lớn, họ dễ bị rối lắm. Dù biết đó không phải tiền của mình, nhưng một khi nó nằm trong tay mình thì cứ như là của mình vậy. Đó mới là điều đáng sợ của đồng tiền.", "ko": "사람이 큰 돈을 만지게 되면 얘 헷갈리게 돼있어 내 돈이 아닌 걸 알면서도 내 손안에 있으면 이게 꼭 내꺼 같거든 그게 돈이 무서운거야", "en": "When people get their hands on a large sum of money, it messes with their head. Even knowing it's not theirs, once it's in their hands, it feels like it's theirs. That's what makes money scary."}, {"id": 345, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 47, "time": "00:03:35,530 --> 00:03:37,290", "start": 215.53, "end": 217.29, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Thật vậy sao?", "ko": "진짜 그렇습니까", "en": "Is that really true?"}, {"id": 346, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 48, "time": "00:03:37,290 --> 00:03:38,110", "start": 217.29, "end": 218.11, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Thì đã bảo mà.", "ko": "그렇다니까", "en": "I'm telling you it is."}, {"id": 347, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 49, "time": "00:03:41,360 --> 00:03:46,260", "start": 221.36, "end": 226.26, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Làm M&A thì cũng phải động đến cả ngàn tỷ, trăm tỷ tiền bạc, đúng không?", "ko": "M&A를 하다보면 수천억 또 수백억씩 돈을 만지게 되지 않습니까?", "en": "When you do M&A, you end up handling hundreds of billions of won, right?"}, {"id": 348, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 50, "time": "00:03:47,120 --> 00:03:50,600", "start": 227.12, "end": 230.6, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Làm nhiều rồi thì tiền trở nên rẻ rúng, hiểu không. Cứ như là của mình hết ấy.", "ko": "그러다보면 이게 돈이 우수워진다 말이야. 다 내꺼 같고.", "en": "When that happens, you start to look down on money. You feel like it's all yours."}, {"id": 349, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 51, "time": "00:03:51,180 --> 00:03:52,980", "start": 231.18, "end": 232.98, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Phải biết kính nể đồng tiền mới được.", "ko": "돈은 우수할 줄 알아야 되는데.", "en": "You need to know how to respect money."}, {"id": 350, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 52, "time": "00:03:53,260 --> 00:03:53,580", "start": 233.26, "end": 233.58, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Đúng thế.", "ko": "그러니까.", "en": "Exactly."}, {"id": 351, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 53, "time": "00:03:57,820 --> 00:04:03,500", "start": 237.82, "end": 243.5, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Ừ, thử đi mua một cái công ty xem, lũ đem cái trị giá 10 tỷ ra đòi 20 tỷ, đầy ra đấy.", "ko": "예, 회사 하나 사러 나가보면 100억짜리 갖고 와서 200억 달라고 하는 놈들 쎄고 쎘거든.", "en": "Yeah, when you go out to buy a company, there are plenty of bastards who bring in a 10 billion won deal and ask for 20 billion."}, {"id": 352, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 54, "time": "00:04:03,980 --> 00:04:06,180", "start": 243.98, "end": 246.18, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Nhưng mấy thằng đó không thắng được chuyên gia đâu.", "ko": "근데 그런 놈들은 전문가를 못 이기지.", "en": "But guys like that can't beat the experts."}, {"id": 353, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 55, "time": "00:04:06,880 --> 00:04:09,060", "start": 246.88, "end": 249.06, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Cuối cùng thì cũng bán với giá 5 tỷ rồi ra đi thôi.", "ko": "결국에는 50억에 팔고 나가는데.", "en": "In the end, they sell and walk away with 5 billion."}, {"id": 354, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 56, "time": "00:04:10,250 --> 00:04:17,640", "start": 250.25, "end": 257.64, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Thế còn tôi? Tôi mua cái trị giá 10 tỷ với giá 5 tỷ, vậy chẳng phải tôi đã kiếm cho công ty 5 tỷ hay sao?", "ko": "그럼 나는? 나는 100억짜리를 50억에 사왔으니까 내가 회사에 50억을 벌어다 준 거지 않습니까?", "en": "But what about me? I bought something worth 10 billion for 5 billion, so I earned the company 5 billion, didn't I?"}, {"id": 355, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 57, "time": "00:04:19,040 --> 00:04:19,940", "start": 259.04, "end": 259.94, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Đúng là vậy thật.", "ko": "그렇긴 하죠.", "en": "That's true."}, {"id": 356, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 58, "time": "00:04:20,060 --> 00:04:23,060", "start": 260.06, "end": 263.06, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Nhưng nhìn vào lương của tôi thì thấy thật thảm hại.", "ko": "근데 내 월급을 보면 초라하거든.", "en": "But when I look at my salary, it's pathetic."}, {"id": 357, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 59, "time": "00:04:24,160 --> 00:04:26,060", "start": 264.16, "end": 266.06, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Công ty thì lại chẳng biết khi nào mình bị đuổi việc nữa.", "ko": "회사는 또 언제 잘릴지 알 수도 없고.", "en": "And you never know when the company might fire you."}, {"id": 358, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 60, "time": "00:04:27,730 --> 00:04:32,690", "start": 267.73, "end": 272.69, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Cho nên, không thể nào không nghĩ rằng khi có cơ hội thì phải vớ vát một chút.", "ko": "그러니까 기회가 왔을 때 좀 챙겨놓자 이런 생각을 안 할 수가 없는 거야", "en": "So when an opportunity comes, I can't help but think I should grab something for myself."}, {"id": 359, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 61, "time": "00:04:32,690 --> 00:04:34,170", "start": 272.69, "end": 274.17, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Ôi trời, thật đấy.", "ko": "아 진짜", "en": "Oh, seriously."}, {"id": 360, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 62, "time": "00:04:34,170 --> 00:04:38,700", "start": 274.17, "end": 278.7, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Cái dễ nhất là với cái ông mang cái trị giá 5 tỷ đến ấy", "ko": "제일 쉬운 게 50억짜리 갖고 온 양반한테", "en": "The easiest thing is to go to the guy who brought in a 5 billion deal"}, {"id": 361, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 63, "time": "00:04:38,700 --> 00:04:41,940", "start": 278.7, "end": 281.94, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Tôi sẽ mua cái đó cho anh với giá 7 tỷ, anh chỉ cần đưa tôi 1 tỷ thôi.", "ko": "내가 그거 70억에 사줄 테니까 나한테 10억만 달라", "en": "and say, \"I'll buy it from you for 7 billion, just give me 1 billion.\""}, {"id": 362, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 64, "time": "00:04:41,940 --> 00:04:47,060", "start": 281.94, "end": 287.06, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Rồi sau đó nói với công ty là tôi đã mặc cả từ 10 tỷ xuống còn 7 tỷ.", "ko": "그러고는 회사에다가 내가 100억짜리를 70억으로 깎아왔습니다 하는 건데", "en": "Then you go to the company and say, \"I negotiated a 10 billion deal down to 7 billion.\""}, {"id": 363, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 65, "time": "00:04:47,060 --> 00:04:48,100", "start": 287.06, "end": 288.1, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Cái này dễ quá nhỉ.", "ko": "뭐 이거 너무 쉽지", "en": "I mean, isn't that too easy?"}, {"id": 364, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 66, "time": "00:04:51,880 --> 00:04:54,140", "start": 291.88, "end": 294.14, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Chuyện là Yoon Jun-ho đã nhận được lời đề nghị tái đấu giá.", "ko": "윤준호가 리메이트를 받았다 그거에", "en": "The fact that Yoon Jun-ho got a rematch..."}, {"id": 365, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 67, "time": "00:04:54,140 --> 00:04:54,800", "start": 294.14, "end": 294.8, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Tôi á?", "ko": "내가요", "en": "I"}, {"id": 366, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 68, "time": "00:04:54,800 --> 00:04:57,600", "start": 294.8, "end": 297.6, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Tôi đã kiếm chác được một chút từ vụ đó.", "ko": "그거 좀 해먹었다고", "en": "made a bit of money off of that."}, {"id": 367, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 69, "time": "00:04:57,600 --> 00:04:59,360", "start": 297.6, "end": 299.36, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Không phải là chuyện tôi muốn nói", "ko": "내가 키우던 놈한테", "en": "From a guy I raised myself."}, {"id": 368, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 70, "time": "00:04:59,360 --> 00:05:00,840", "start": 299.36, "end": 300.84, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "\"Hãy đối xử tệ bạc với thằng mà tôi từng nuôi dưỡng\" đâu.", "ko": "모질게 하자 이런 얘기가 아니에요", "en": "I'm not saying we should be harsh."}, {"id": 369, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 71, "time": "00:05:10,130 --> 00:05:13,690", "start": 310.13, "end": 313.69, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Thật ra tôi chưa từng kể chuyện này với ai ở nơi khác đâu.", "ko": "내가 진짜 이런 얘기 어디 가서 한 번도 안 했는데", "en": "I've never actually talked about this anywhere else."}, {"id": 370, "f  "vi": "Ông ấy ăn uống rất tốt.", "ko": "잘 드십니다.", "en": "He eats well."}, {"id": 381, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 83, "time": "00:06:39,170 --> 00:06:43,390", "start": 399.17, "end": 403.39, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Thế nào cũng được, thế nào cũng xong, chỉ vì không muốn bị chửi nên chẳng nói lời khó nghe nào.", "ko": "이래도 좋고 저래도 좋고 욕먹기 싫으니까 쓴소리도 안 하고.", "en": "He doesn't want to get criticized, so he avoids saying anything harsh, no matter what."}, {"id": 382, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 84, "time": "00:06:43,910 --> 00:06:45,950", "start": 403.91, "end": 405.95, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Nhưng mà cái tính đó lại làm cho việc to chuyện ra đấy.", "ko": "근데 그런 성격이 일을 또 크게 만든다니까.", "en": "But that kind of personality ends up making things bigger."}, {"id": 383, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 85, "time": "00:06:46,570 --> 00:06:48,030", "start": 406.57, "end": 408.03, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Bệnh càng ngày càng nặng thêm.", "ko": "병이 곱는다고.", "en": "They say bad habits compound."}, {"id": 384, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 86, "time": "00:06:49,370 --> 00:06:51,070", "start": 409.37, "end": 411.07, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Yun Jun-ho rồi cũng sẽ bùng nổ thôi.", "ko": "윤준호도 결국은 터져요.", "en": "Yoon Jun-ho will eventually blow up too."}, {"id": 385, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 87, "time": "00:06:51,410 --> 00:06:52,810", "start": 411.41, "end": 412.81, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Không thể nào không nổ được.", "ko": "안 터질 수가 없지.", "en": "There's no way he won't."}, {"id": 386, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 해봐. 착한 사람도 이런다니까. 사람이 자기 전 재산을 다른 사람한테 맡기려고 그러면요. 절대로 못 맡겨요. 웬만한 사람은 자기 자식한테도 못 맡길 것. 그러니까 윤준호는 자기 형이랑 정말 각별했던 거야. 그래서 그 사다리 난 거고.", "en": "Go ahead and try. Even a good person acts like this. When someone is about to entrust their entire fortune to another person, they absolutely cannot do it. Most people can't even entrust it to their own children. So Yoon Jun-ho must have had a truly special relationship with his brother. That's why that ladder incident happened."}, {"id": 391, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 93, "time": "00:07:48,360 --> 00:07:52,480", "start": 468.36, "end": 472.48, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Anh giúp tôi một tay, không phải là đầu tư toàn bộ đâu nhỉ? Đúng không?", "ko": "나 좀 도와주라 전부 투자하는 거 아니야? 맞지?", "en": "You're helping me out, but it's not like I'm investing everything, right? Am I right?"}, {"id": 392, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 94, "time": "00:07:58,180 --> 00:07:59,360", "start": 478.18, "end": 479.36, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Sao anh biết được chuyện đó?", "ko": "형이 그걸 어떻게 알아?", "en": "How do you know that?"}, {"id": 393, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 95, "time": "00:08:04,840 --> 00:08:06,260", "start": 484.84, "end": 486.26, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Sao anh biết chuyện đó?", "ko": "형이 그걸 어떻게 아냐고", "en": "I'm asking how you know that."}, {"id": 394, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 96, "time": "00:08:23,110 --> 00:08:24,670", "start": 503.11, "end": 504.67, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Sanin không đầu tư vào đó.", "ko": "산인은 거기 투자 안 해.", "en": "Sanin isn't investing there."}, {"id": 395, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 97, "time": "00:08:26,250 --> 00:08:27,500", "start" ation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Số lượng là 1 kiện", "ko": "수량은 1마디", "en": "Quantity is 1 unit."}, {"id": 402, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 104, "time": "00:09:37,030 --> 00:09:44,130", "start": 577.03, "end": 584.13, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "20% của số tiền 25 đô la sẽ được thanh toán trong tháng này, và số tiền đó mang tính chất là tiền đặt cọc", "ko": "25달러 대금의 20%는 이달에 지급하고 그 대금은 계약금의 성격을 가지는 것이", "en": "20% of the $25 payment is to be paid this month, and that payment shall serve as a down payment."}, {"id": 403, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 105, "time": "00:09:44,130 --> 00:09:44,790", "start": 584.13, "end": 584.79, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Đó là điều kiện.", "ko": "조건입니다.", "en": "This is a condition."}, {"id": 404, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 106, "time": "00:09:48,830 --> 00:09:53,370", "start": 588.83, "end": 593.37, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Số lượng là 10.001 cái, vượt quá 10.000 cái, nên tỷ lệ chiết khấu là 50%, xin hãy kiểm tra lại một lần nữa", "ko": "수량은 1만 개를 초과한 1만 1개이므로 할인율이 50%인 것 다시 한번 확인", "en": "Since the quantity is 10,001 units, exceeding 10,000, please confirm once again that the discount rate is 50%."}, {"id": 405, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 107, "time": "00:09:53,370 --> 00:09:54,010", "start": 593.37, "end": 594.01, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Cảm ơn.", "ko": "부탁드리고요.", "en": "Thank you."}, {"id": 406, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 108, "time": "00:09:57,110 --> 00:09:59,570", "start": 597.11, "end": 599.57, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Chữ ký của Giám đốc P .04.2855-4150.mp3", "vi": "Ngài Naito.", "ko": "나이토씨.", "en": "Mr. Naito."}, {"id": 436, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 138, "time": "00:12:07,040 --> 00:12:07,380", "start": 727.04, "end": 727.38, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Ngài Naito.", "ko": "나이토씨.", "en": "Mr. Naito."}, {"id": 437, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 139, "time": "00:12:07,380 --> 00:12:09,760", "start": 727.38, "end": 729.76, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "内藤さん。 Naitō-san.", "ko": "内藤さん。", "en": "内藤さん。 Mr. Naito."}, {"id": 438, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 140, "time": "00:12:18,230 --> 00:12:32,730", "start": 738.23, "end": 752.73, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "Ý ông là vì việc thay đổi số lượng đặt hàng mà không tin tưởng chúng tôi sao? Nếu chúng tôi định lừa Shimizu, chúng tôi đã có thể nhận hỗ trợ từ một công ty xe đạp khác rồi. Như tôi đã nói, ngành công nghiệp xe đạp Hàn Quốc hiện đang trải qua những biến động.", "ko": "주문 수량을 변경하는 것 때문에 신뢰하지 못하겠다는 겁니까 저희가 시미즈를 속이려고 했다면 다른 사이클 회사에서 기여를 제공했어도 됐을 겁니다 말씀드렸다시피 한국의 자전거 산업은 현재 부침을 겪고 있으니까요", "en": "Are you saying you can't trust us just because we changed the order quantity? If we had intended to deceive Shimizu, we could have accepted contributions from other cycle companies. As I told you, the bicycle industry in Korea is currently experiencing ups and downs."}, {"id": 439, "folder": "MnA.Negotiation.S01E06.04", "cueNo": 141, "time": "00:12:40,730 --> 00:12:42,130", "start": 760.73, "end": 762.13, "mp3": "./audio_assets/MnA.Negotiation.S01E06.04_MnA.Negotiation.S01E06.04.2855-4150.mp3", "vi": "あのこういうふうに契約を変更するというのは今後も変更できるっていうことですよねそういう契約は意味がないんですよ Này, việc thay đổi hợp đồng như thế này có nghĩa là sau này cũng có thể thay đổi tiếp, đúng không? Một hợp đồng kiểu như vậy chẳng có ý nghĩa gì cả  "en": "Yes, because there's a contract that was signed under a misunderstanding."}, {"id": 474, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 32, "time": "00:05:13,180 --> 00:05:14,580", "start": 313.18, "end": 314.58, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "こんにちはこちら様ですか我々は韓国のウィンドウという会社から来たものですが工場長にお会いできますかああ例の契約の件ですねはい Xin chào, đây có phải là quý công ty không? Chúng tôi đến từ công ty Window của Hàn Quốc, có thể gặp quản đốc nhà máy được không? À, chuyện về hợp đồng lần trước đúng không? Vâng.", "ko": "こんにちはこちら様ですか我々は韓国のウィンドウという会社から来たものですが工場長にお会いできますかああ例の契約の件ですねはい", "en": "こんにちはこちら様ですか我々は韓国のウィンドウという会社から来たものですが工場長にお会いできますかああ例の契約の件ですねはい Hello, is this the right place? We're from a company called Window in Korea. Can we meet with the factory manager? Ah, yes, regarding that contract matter."}, {"id": 475, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 33, "time": "00:05:14,580 --> 00:05:14,720", "start": 314.58, "end": 314.72, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "はい。 Vâng.", "ko": "はい。", "en": "はい。 Yes."}, {"id": 476, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 34, "time": "00:05:24,000 --> 00:05:28,120", "start": 324.0, "end": 328.12, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "韓国の会社の方たちが来られます。 Các vị từ công ty Hàn Quốc sẽ đến.", "ko": "나이톤씨 한국에서 회사사람들이 왔어요", "en": "Mr. Naito, some people from the company came from Korea."}, {"id": 477, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 35, "time": "00:05:56,770 --> 00:05:58,170", "start": 356.77, "end": 358.17, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "いやあの話すことは何もありませんどうぞお行き取りくださいあの内藤さん Không, tôi chẳng có gì để nói cả, xin hãy cứ tự nhiên. Anh Naitou này...", "ko": "いやあの話すことは何もありませんどうぞお行き取りくださいあの内藤さん", "en": "いやあの話すことは何もありませんどうぞお行き取りくださいあの内藤さん No, well... there's nothing to discuss. Please, take this and go. Mr. Naito."}, {"id": 478, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 36, "time": "00:06:20,840 --> 00:06:24,620", "start": 380.84, "end": 384.62, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Anh này, có thể hỏi giúp tôi ngày mai anh ấy có đi làm không?", "ko": "あの 내일 혹시 출근하는지 좀 물어봐 줄 수 있어요?", "en": "Um, could you ask him if he's coming to work tomorrow?"}, {"id": 479, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 37, "time": "00:06:27,740 --> 00:06:28,540", "start": 387.74, "end": 388.54, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "あの内藤さんは明日も出勤されますか? Anh Naitou này, ngày mai anh có đi làm không ạ?", "ko": "あの内藤さんは明日も出勤されますか?", "en": "あの内藤さんは明日も出勤されますか? Will Mr. Naito be coming to work tomorrow as well?"}, {"id": 480, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 38, "time": "00:06:33,700 --> 00:06:36,520", "start": 393.7, "end": 396.52, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Quản đốc nhà máy đi làm mỗi ngày. Vậy à? Nghe nói ngày mai ông ấy có đi làm.", "ko": "工場長は毎日出勤しますそうですか 내일 출근하신다고 하네요", "en": "The factory manager comes to work every day. I see. He says he'll be coming to work tomorrow."}, {"id": 481, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 39, "time": "00:06:54,820 --> 00:06:57,560", "start": 414.82, "end": 417.56, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Trong hợp đồng cũng có tên của Giám đốc Park Mae-kyung phải không?", "ko": "계약서에는 박매경 대표님 이름도 있었죠?", "en": "Director Park Mae-kyung's name was on the contract too, right?"}, {"id": 482, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 40, "time": "00:06:57,740 --> 00:07:01,380", "start": 417.74, "end": 421.38, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Vâng, có tên và chữ ký của Giám đốc Park Mae-kyung.", "ko": "네, 박매경 대표님 성함이랑 사인이 있었습니다", "en": "Yes, Director Park Mae-kyung's name and signature were on it."}, {"id": 483, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 41, "time": "00:07:01,380 --> 00:07:05,260", "start": 421.38, "end": 425.26, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Trụ sở chính đã hỏi tôi rằng công ty chúng ta có phải là công ty sản xuất xe đạp không.", "ko": "본사에서 사이클 만드는 회사가 맞냐고 물어봤었잖아요", "en": "You asked earlier if our headquarters was a company that makes bicycles."}, {"id": 484, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 42, "time": "00:07:05,260 --> 00:07:06,180", "start": 425.26, "end": 426.18, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Trước khi ký.", "ko": "사인하기 전에", "en": "Before signing."}, {"id": 485, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 43, "time": "00:07:06,180 --> 00:07:10,520", "start": 426.18, "end": 430.52, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Vâng, vì vậy tôi đã giải thích rằng đúng vậy, chúng tôi cũng sản xuất cung tên.", "ko": "네, 그래서 맞다 양궁도 만든다고 설명드렸습니다", "en": "Yes, so I told them yes, and that we also make archery bows."}, {"id": 486, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 44, "time": "00:07:17,390 --> 00:07:19,990", "start": 437.39, "end": 439.99, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Sao ông nhớ rõ thế nhỉ?", "ko": "어떻게 기억이 잘 됐을까요?", "en": "How did you remember that so well?"}, {"id": 487, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 45, "time": "00:07:21,010 --> 00:07:23,090", "start": 441.01, "end": 443.09, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Xin lỗi. Tôi đã không làm được.", "ko": "죄송합니다. 못했습니다.", "en": "I'm sorry. I couldn't do it."}, {"id": 488, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 46, "time": "00:07:24,750 --> 00:07:25,910", "start": 444.75, "end": 445.91, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Sao lại thế?", "ko": "어쩌다가?", "en": "How did that happen?"}, {"id": 489, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 47, "time": "00:07:28,260 --> 00:07:32,840", "start": 448.26, "end": 452.84, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Ông quản đốc nhà máy là một nghệ nhân gia công kim loại, và ông ấy đã phản đối.", "ko": "공장장님이 금속세공 장인이신데 반대를 하고 계셨어요.", "en": "The factory manager, who is a metalworking artisan, was opposed to it."}, {"id": 490, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 48, "time": "00:07:34,900 --> 00:07:36,780", "start": 454.9, "end": 456.78, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Một số người có thể như vậy thôi.", "ko": "일부는 그럴 수 있죠.", "en": "That's understandable for some."}, {"id": 491, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 49, "time": "00:07:37,640 --> 00:07:40,240", "start": 457.64, "end": 460.24, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Ở đó, lòng tự tôn của các nghệ nhân rất cao.", "ko": "거기가 장인들 프라이드가 상당하거든요.", "en": "The craftsmen there have a lot of pride."}, {"id": 492, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 50, "time": "00:07:40,400 --> 00:07:44,220", "start": 460.4, "end": 464.22, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Khi tôi mua Daichi, cũng vì chuyện đó mà tôi gặp khó khăn.", "ko": "제가 다이치 살 때도 그것 때문에 해먹었습니다.", "en": "That's what got me into trouble when I bought Daichi."}, {"id": 493, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 51, "time": "00:07:45,160 --> 00:07:47,460", "start": 465.16, "end": 467.46, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Vâng. Chắc hẳn là vậy rồi.", "ko": "네. 그러셨겠네요.", "en": "Yes, I can imagine."}, {"id": 494, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 52, "time": "00:07:48,080 --> 00:07:48,720", "start": 468.08, "end": 468.72, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Vâng.", "ko": "네.", "en": "Yes."}, {"id": 495, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 53, "time": "00:07:50,230 --> 00:07:53,790", "start": 470.23, "end": 473.79, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Cho đến đầu những năm 90, Daichi là số một về bắn cung.", "ko": "90년대 초까지 양궁으로는 다이치가 1등이었죠.", "en": "Until the early 90s, Daichi was number one in archery."}, {"id": 496, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 54, "time": "00:07:55,610 --> 00:08:01,110", "start": 475.61, "end": 481.11, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Nhưng giữa các vận động viên, thị trường đã bị chúng tôi giành mất từ lâu rồi.", "ko": "근데 선수들 사이에서는 이미 시장을 우리한테 뺏기고 있었어요.", "en": "But among the athletes, we had already taken over the market."}, {"id": 497, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 55, "time": "00:08:02,310 --> 00:08:05,550", "start": 482.31, "end": 485.55, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Cuối cùng, tình hình của Daichi trở nên tồi tệ nên họ đã bán công ty.", "ko": "결국은 다이치 상황이 안 좋아져서 회사를 내놓은 거고요.", "en": "In the end, Daichi's situation deteriorated, so they put the company up for sale."}, {"id": 498, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 56, "time": "00:08:05,830 --> 00:08:08,490", "start": 485.83, "end": 488.49, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Vậy ra là ông chủ đã mua lại nó.", "ko": "그래서 대표님이 인수하신 거군요.", "en": "So that's why you acquired it, sir."}, {"id": 499, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 57, "time": "00:08:09,830 --> 00:08:13,130", "start": 489.83, "end": 493.13, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Tôi cũng không phải mua lại vì cần công nghệ của Daichi.", "ko": "저도 다이치 기술이 필요해서 산 건 아니었습니다.", "en": "It wasn't that I bought Daichi because I needed their technology."}, {"id": 500, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 58, "time": "00:08:13,130 --> 00:08:20,330", "start": 493.13, "end": 500.33, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Lúc đó, về mặt công nghệ, chúng tôi đã đi trước họ rồi.", "ko": "그때 이미 기술로는 저희가 앞서고 있었거든요", "en": "At that time, we were already ahead of them in terms of technology."}, {"id": 501, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 59, "time": "00:08:20,330 --> 00:08:22,790", "start": 500.33, "end": 502.79, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Vậy tại sao ông lại mua?", "ko": "그럼 왜 사셨습니까?", "en": "Then why did you buy it?"}, {"id": 502, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 60, "time": "00:08:25,580 --> 00:08:35,900", "start": 505.58, "end": 515.9, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Dù sao thì Daichi cũng có danh tiếng sẵn có. Tôi thấy rằng nếu để bên khác mua lại, họ có thể dùng chính danh tiếng đó để nhanh chóng bắt kịp Wind.", "ko": "아무래도 다이치가 가지고 있던 명성이 있었으니까요. 다른 데서 인수를 하게 되면 그 명성으로 금방 윈드를 따라잡을 수도 있다고 봤습니다.", "en": "It was because of the reputation Daichi had. I thought that if another company acquired them, they could use that reputation to catch up to Wind quickly."}, {"id": 503, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 61, "time": "00:08:37,280 --> 00:08:39,820", "start": 517.28, "end": 519.82, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Vậy là ông mua lại với mục đích phòng thủ.", "ko": "방어차원에서 인수를 하셨다는 거군요.", "en": "So you bought them as a defensive measure."}, {"id": 504, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 62, "time": "00:08:40,299 --> 00:08:55,660", "start": 520.299, "end": 535.66, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Đúng vậy. Nhưng lúc đó, Daichi đã đưa ra điều kiện khi mua lại với tôi. Họ bảo tôi hãy tạo ra một loại cung tốt hơn của Daichi.", "ko": "네. 근데 그때 다이치가 저에게 인수 조건으로 그걸 내걸더라고요. 다이치보다 좋은 양궁을 만들어 달라고요.", "en": "Yes. But back then, Daichi presented me with that as a condition of the acquisition. They asked me to make a recurve bow better than Daichi's."}, {"id": 505, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 63, "time": "00:08:56,760 --> 00:09:03,100", "start": 536.76, "end": 543.1, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Lúc đầu tôi hơi bối rối. Tôi đã nghĩ ban đầu chắc họ chỉ nói cho vui thôi.", "ko": "처음엔 좀 당혹스러웠어요. 처음에 헛셀부리나 보다 했죠.", "en": "At first, I was a bit taken aback. I thought they were just bluffing."}, {"id": 506, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 64, "time": "00:09:04,870 --> 00:09:11,060", "start": 544.87, "end": 551.06, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Nhưng bây giờ nghĩ lại, tôi tự hỏi không biết có phải họ đã thực lòng không.", "ko": "근데 지금 생각해보면 진심이 아니었을까 싶어요.", "en": "But looking back now, I think they might have been sincere."}, {"id": 507, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 65, "time": "00:09:12,790 --> 00:09:18,210", "start": 552.79, "end": 558.21, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Thưa giám đốc, tôi có thể gặp ông một chút được không? Tôi sẽ đến ngay đây.", "ko": "대표님 잠깐 뵐 수 있을까요? 제가 지금 가겠습니다.", "en": "Director, may I see you for a moment? I'll come right now."}, {"id": 508, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 66, "time": "00:09:23,600 --> 00:09:25,320", "start": 563.6, "end": 565.32, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Có chuyện gì vậy?", "ko": "무슨 일로 그러시는지?", "en": "What is this regarding?"}, {"id": 509, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 67, "time": "00:09:27,250 --> 00:09:30,110", "start": 567.25, "end": 570.11, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Bức ảnh Daichi treo ở văn phòng Wind ạ.", "ko": "윈드 사무실에 걸려있던 다이치 사진이요.", "en": "The photo of Daichi that was hanging in the Wind office."}, {"id": 510, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 68, "time": "00:09:30,410 --> 00:09:36,130", "start": 570.41, "end": 576.13, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "À, bức ảnh chụp lúc mua lại Daichi đó hả?", "ko": "아, 그 다이치 인수할 때 찍은 거요?", "en": "Ah, the one taken when we acquired Daichi?"}, {"id": 511, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 69, "time": "00:09:37,030 --> 00:09:41,810", "start": 577.03, "end": 581.81, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Vâng, người thợ trong bức ảnh đó chính là người đã vẽ bản thiết kế đó, đúng không ạ?", "ko": "네, 그 사진 속에 장인께서 그 설계도를 그리신 거죠?", "en": "Yes. The master craftsman in that photo drew those blueprints, didn't he?"}, {"id": 512, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 70, "time": "00:09:42,990 --> 00:09:46,990", "start": 582.99, "end": 586.99, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Phải, nên tôi cũng đã đóng khung và tặng lại cho ông ấy làm quà.", "ko": "예, 그래서 저도 액자로 선물로 드렸던 거고요.", "en": "Yes, that's why I gave it to you as a framed gift."}, {"id": 513, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 71, "time": "00:09:47,930 --> 00:09:48,890", "start": 587.93, "end": 588.89, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Ôn cố tri tân.", "ko": "온고지신.", "en": "Learning from the past."}, {"id": 514, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 72, "time": "00:09:49,150 --> 00:09:50,990", "start": 589.15, "end": 590.99, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Ồ, ông vẫn nhớ à.", "ko": "오, 기억하시네.", "en": "Oh, you remember that."}, {"id": 515, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 73, "time": "00:09:52,010 --> 00:09:53,430", "start": 592.01, "end": 593.43, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Ông nói là tự tay viết đúng không ạ?", "ko": "직접 쓰셨다고 했죠?", "en": "You said you wrote it yourself, right?"}, {"id": 516, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 74, "time": "00:09:54,860 --> 00:09:56,600", "start": 594.86, "end": 596.6, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Ở đây, người thợ cả đã có yêu cầu như vậy.", "ko": "여기 장인께서 요청을 하셨거든요", "en": "The master craftsman here made a request."}, {"id": 517, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 75, "time": "00:09:57,720 --> 00:10:00,800", "start": 597.72, "end": 600.8, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Đứa trẻ trong ảnh là con trai của người thợ cả, đúng không?", "ko": "사진 속의 아이가 장인의 아들인 거죠?", "en": "The child in the photo is the craftsman's son, isn't he?"}, {"id": 518, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 76, "time": "00:10:01,720 --> 00:10:02,280", "start": 601.72, "end": 602.28, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Đúng vậy.", "ko": "그렇죠", "en": "That's right."}, {"id": 519, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 77, "time": "00:10:03,160 --> 00:10:05,480", "start": 603.16, "end": 605.48, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Ông có nhớ tên không?", "ko": "이름 기억나십니까?", "en": "Do you remember his name?"}, {"id": 520, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 78, "time": "00:10:06,810 --> 00:10:09,570", "start": 606.81, "end": 609.57, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Tên của con trai thì tôi không nhớ.", "ko": "아들 이름은 기억이 안 나고요", "en": "I don't remember the son's name."}, {"id": 521, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 79, "time": "00:10:11,190 --> 00:10:14,990", "start": 611.19, "end": 614.99, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Tên của người thợ cả là Naito Daichi.", "ko": "장인 선생 이름이 나이토 다이치였습니다", "en": "The master craftsman's name was Naito Daichi."}, {"id": 522, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 80, "time": "00:10:16,950 --> 00:10:17,510", "start": 616.95, "end": 617.51, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Ra vậy.", "ko": "그렇군요", "en": "I see."}, {"id": 523, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 81, "time": "00:10:18,450 --> 00:10:21,910", "start": 618.45, "end": 621.91, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Đại diện à, tôi nghĩ là cần tấm ảnh đó.", "ko": "대표님 그 사진이 필요할 것 같습니다", "en": "Director, I think you'll need that photo."}, {"id": 524, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 82, "time": "00:10:21,910 --> 00:10:26,810", "start": 621.91, "end": 626.81, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.05.4150-5954.mp3", "vi": "Ông cần cái này ạ?", "ko": "이게 필요하시다고요?", "en": "You need this?"}, {"id": 525, "folder": "MnA.Negotiation.S01E06.05", "cueNo": 83, "time": "00:11:11,240 --> 00:11:12,640", "start": 671.24, "end": 672.64, "mp3": "./audio_assets/MnA.Negotiation.S01E06.05_MnA.Negotiation.S01E06.0 06.06", "cueNo": 1, "time": "00:00:06,540 --> 00:00:07,240", "start": 6.54, "end": 7.24, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Xin chào.", "ko": "안녕하세요.", "en": "Hello."}, {"id": 573, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 2, "time": "00:00:07,920 --> 00:00:10,860", "start": 7.92, "end": 10.86, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Tôi là Wind Park Na-kyung.", "ko": "윈드 박내경입니다.", "en": "I'm Wind Nae-kyung."}, {"id": 574, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 3, "time": "00:00:12,280 --> 00:00:23,000", "start": 12.28, "end": 23.0, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Khi tôi tiếp quản Daichi, cha tôi đã đưa cho tôi bản thiết kế do chính tay ông vẽ, yêu cầu tôi tạo ra những cây cung tốt nhất.", "ko": "제가 다이치를 인수할 때 아버님께서 저에게 최고의 양궁을 만들어 달라며 직접 그리신 설계도를 주셨습니다.", "en": "When I took over Dai-chi, my father gave me the blueprint he personally drew, asking me to create the finest archery equipment."}, {"id": 575, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 4, "time": "00:00:24,630 --> 00:00:28,310", "start": 24.63, "end": 28.31, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Dù cây cung thời đó và cây cung bây giờ đã khác,", "ko": "그때 양궁과 지금의 양궁은 다른 것입니다만", "en": "The archery equipment back then and the archery equipment now are different things,"}, {"id": 576, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 5, "time": "00:00:28,310 --> 00:00:33,440", "start": 28.31, "end": 33.44, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "nhưng tấm lòng muốn tạo ra những cây cung tốt thì vẫn không thay đổi.", "ko": "좋은 양궁을 만들겠다는 마음은 변함이 없습니다.", "en": "but my commitment to making good archery equipment remains unchanged."}, {"id": 577, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 6, "time": "00:00:34,700 --> 00:00:38,000", "start": 34.7, "end": 38.0, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Wind không phải là đã xóa bỏ Daichi.", "ko": "윈드는 다이치를 없앤 게 아닙니다.", "en": "Wind did not eliminate Dai-chi."}, {"id": 578, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 7, "time": "00:00:38,860 --> 00:00:44,340", "start": 38.86, "end": 44.34, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Wind là công ty duy nhất kế thừa tinh thần nghệ nhân của cha Naito-san.", "ko": "윈드는 나이토씨 아버지의 장인정신을 이어온 유일한 회사입니다.", "en": "Wind is the only company that has carried on the craftsmanship of Naito-san's father."}, {"id": 579, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 8, "time": "00:00:45,280 --> 00:00:53,760", "start": 45.28, "end": 53.76, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Và \"Ôn cố tri tân\". Câu nói đó là điều cha tôi muốn nói với Naito-san.", "ko": "그리고 온고지신. 그 표현은 부친께서 나이토상에게 해주고 싶은 말이었습니다.", "en": "And \"Onkochishin\" — that phrase was what my father wanted to say to Naito-san."}, {"id": 580, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 9, "time": "00:00:55,440 --> 00:00:59,140", "start": 55.44, "end": 59.14, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Tôi nghe nói ông Naito đang sống theo đúng như mong muốn của cha tôi.", "ko": "나이토상은 아버지의 바람대로 살고 계신다고 들었습니다.", "en": "I heard that Mr. Naito is living according to his father's wishes."}, {"id": 581, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 10, "time": "00:01:00,840 --> 00:01:03,300", "start": 60.84, "end": 63.3, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Tôi cũng sẽ ủng hộ con đường phía trước của anh/chị.", "ko": "앞으로의 길도 응원하겠습니다.", "en": "I will continue to support you on your path forward."}, {"id": 582, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 11, "time": "00:01:05,600 --> 00:01:07,040", "start": 65.6, "end": 67.04, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Park Na-kyung gửi.", "ko": "박내경 드림", "en": "Found by Park Nae-kyung."}, {"id": 583, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 12, "time": "00:01:14,940 --> 00:01:16,460", "start": 74.94, "end": 76.46, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Phát hiện. Bắt đầu.", "ko": "발견. 시작.", "en": "Starting. We're going to sign the contract and head back."}, {"id": 584, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 13, "time": "00:01:16,460 --> 00:02:06,870", "start": 76.46, "end": 126.87, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Tôi định ký hợp đồng xong rồi quay về.", "ko": "계약 체결하고 돌아가려고 합니다.", "en": "The discount rate is 50%, which is a much more favorable condition than before."}, {"id": 585, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 14, "time": "00:02:07,770 --> 00:02:11,850", "start": 127.77, "end": 131.85, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Tỷ lệ chiết khấu là 50%, một điều kiện thuận lợi hơn nhiều so với trước đây.", "ko": "할인율은 50%로 이전보다 훨씬 더 유리한 조건입니다.", "en": "You did a great job."}, {"id": 586, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 15, "time": "00:02:12,070 --> 00:02:12,850", "start": 132.07, "end": 132.85, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Làm tốt lắm.", "ko": "큰일했네.", "en": "That's amazing."}, {"id": 587, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 16, "time": "00:02:13,910 --> 00:02:14,810", "start": 133.91, "end": 134.81, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Tuyệt vời.", "ko": "대단하이.", "en": "You haven't restored it yet, right?"}, {"id": 588, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 17, "time": "00:02:15,550 --> 00:02:17,530", "start": 135.55, "end": 137.53, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Vẫn chưa phục hồi lại à?", "ko": "아직 복원을 안 했지?", "en": "Yes."}, {"id": 589, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 18, "time": "00:02:17,770 --> 00:02:18,270", "start": 137.77, "end": 138.27, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Vâng.", "ko": "네.", "en": "Since today is a holiday, I plan to go to work and then head there."}, {"id": 590, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 19, "time": "00:02:18,350 --> 00:02:21,210", "start": 138.35, "end": 141.21, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Hôm nay là ngày nghỉ nên tôi định đi làm để làm việc đó.", "ko": "오늘이 휴일이어서 출근해서 하려고 합니다.", "en": "But can you delay that a bit?"}, {"id": 591, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 20, "time": "00:02:22,910 --> 00:02:26,090", "start": 142.91, "end": 146.09, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Nhưng có thể trì hoãn việc đó một chút được không?", "ko": "근데 그걸 좀 늦출 수 있겠나?", "en": "네."}, {"id": 592, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 21, "time": "00:02:27,400 --> 00:02:27,850", "start": 147.4, "end": 147.85, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Vâng.", "ko": "네.", "en": "Understood."}, {"id": 593, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 22, "time": "00:02:28,190 --> 00:02:29,090", "start": 148.19, "end": 149.09, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Tôi hiểu rồi.", "ko": "알겠습니다.", "en": "Jinsu, aren't you sad about leaving Japan?"}, {"id": 594, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 23, "time": "00:02:30,800 --> 00:02:35,280", "start": 150.8, "end": 155.28, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Anh Jin-su, sắp rời Nhật rồi có tiếc không?", "ko": "진수씨, 일본 떠나는 거 아쉽지 않아?", "en": "Ah,"}, {"id": 595, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 24, "time": "00:02:35,280 --> 00:02:35,920", "start": 155.28, "end": 155.92, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "À,", "ko": "아,", "en": "Still, I think it's a relief that we got the contract."}, {"id": 596, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 25, "time": "00:02:36,760 --> 00:02:40,060", "start": 156.76, "end": 160.06, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Nhưng dù sao cũng đã ký hợp đồng, tôi thấy thật là may mắn.", "ko": "그래도 계약했으니까 천만다행인 것 같습니다.", "en": "I know, right?"}, {"id": 597, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 26, "time": "00:02:40,580 --> 00:02:41,420", "start": 160.58, "end": 161.42, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Đúng vậy.", "ko": "그러게요.", "en": "So that's why."}, {"id": 598, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 27, "time": "00:02:42,230 --> 00:02:43,590", "start": 162.23, "end": 163.59, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Thì ra là vậy.", "ko": "그래서 그랬구나.", "en": "So that's why I'm hungry now—because we signed the contract."}, {"id": 599, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 28, "time": "00:02:45,110 --> 00:02:47,370", "start": 165.11, "end": 167.37, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Hóa ra là vì ký hợp đồng nên bây giờ tôi mới đói bụng.", "ko": "계약을 해서 내가 지금 배가 고픈 거구나.", "en": "Ah,"}, {"id": 600, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 29, "time": "00:02:47,630 --> 00:02:48,130", "start": 167.63, "end": 168.13, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "À,", "ko": "아,", "en": "I'm hungry."}, {"id": 601, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 30, "time": "00:02:48,270 --> 00:02:48,910", "start": 168.27, "end": 168.91, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Đói quá đi mất.", "ko": "배고프잖아.", "en": "Just a little. Right? Huh?"}, {"id": 602, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 31, "time": "00:02:49,250 --> 00:02:57,300", "start": 169.25, "end": 177.3, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Hơi đói một chút. Phải không? Ồ, anh/chị vẫn chưa đi à?", "ko": "살짝. 그치? 아직 안 가셨네요?", "en": "Oh, you haven't left yet?"}, {"id": 603, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 32, "time": "00:02:57,580 --> 00:02:59,240", "start": 177.58, "end": 179.24, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Tôi nghĩ chắc anh/chị chưa kịp ăn cơm.", "ko": "식사 못하셨을 것 같아서요.", "en": "I thought you might not have had a chance to eat."}, {"id": 604, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 33, "time": "00:02:59,360 --> 00:03:01,560", "start": 179.36, "end": 181.56, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Trưởng nhóm của tôi bảo tôi mang cho anh/chị đấy ạ.", "ko": "저희 팀장님이 챙기라고 하셨습니다.", "en": "Our team leader told me to take care of it."}, {"id": 605, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 34, "time": "00:03:01,840 --> 00:03:03,520", "start": 181.84, "end": 183.52, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Quả nhiên là người tốt thật.", "ko": "역시 좋은 분이시네요.", "en": "He really is a good person."}, {"id": 606, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 35, "time": "00:03:03,800 --> 00:03:05,640", "start": 183.8, "end": 185.64, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Chúng tôi cũng đang đói bụng đây.", "ko": "안 그래도 저희도 배고팠거든요.", "en": "We were actually hungry too."}, {"id": 607, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 36, "time": "00:03:07,360 --> 00:03:08,240", "start": 187.36, "end": 188.24, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Không phải.", "ko": "아니다.", "en": "Ah,"}, {"id": 608, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 37, "time": "00:03:08,440 --> 00:03:10,880", "start": 188.44, "end": 190.88, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Bây giờ tôi biết ý đó là gì rồi.", "ko": "저 이제 이거 무슨 뜻인지 알아요.", "en": "No."}, {"id": 609, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 38, "time": "00:03:11,360 --> 00:03:12,580", "start": 191.36, "end": 192.58, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Ý là bảo chúng tôi đi nhanh lên, phải không?", "ko": "저희 빨리 가라는 얘기죠?", "en": "I know what this means now."}, {"id": 610, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 39, "time": "00:03:12,780 --> 00:03:12,880", "start": 192.78, "end": 192.88, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "À,", "ko": "아,", "en": "You're telling us to leave quickly, right?"}, {"id": 611, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 40, "time": "00:03:12,940 --> 00:03:13,540", "start": 192.94, "end": 193.54, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Không phải đâu.", "ko": "아니요.", "en": "No,"}, {"id": 612, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 41, "time": "00:03:13,540 --> 00:03:15,260", "start": 193.54, "end": 195.26, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Tôi thật lòng muốn mời các bạn một bữa ăn.", "ko": "진심으로 식사 대접하고 싶습니다.", "en": "I sincerely want to treat you to a meal."}, {"id": 613, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 42, "time": "00:03:16,870 --> 00:03:17,810", "start": 196.87, "end": 197.81, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Heon-twin, Heon-hye", "ko": "헌튼이, 헌혜", "en": "Dazed?"}, {"id": 614, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 43, "time": "00:03:17,810 --> 00:03:18,490", "start": 197.81, "end": 198.49, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Hừ,", "ko": "훗,", "en": "멍하니?"}, {"id": 615, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 44, "time": "00:03:18,490 --> 00:03:25,250", "start": 198.49, "end": 205.25, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Cả ngày nay căng thẳng, giờ thả lỏng ra thấy hơi đói bụng thật.", "ko": "헌튼이 하루 종일 긴장했다가 딱 풀리니까 출출하긴 하네요.", "en": "Dazed? Dazed? I was tense all day, and now that the tension's finally released, I am feeling a bit hungry."}, {"id": 616, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 45, "time": "00:03:27,450 --> 00:03:30,450", "start": 207.45, "end": 210.45, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Tôi định đi ăn, anh Trưởng nhóm có muốn đi cùng không ạ?", "ko": "식사하려고 하는데 팀장님도 괜찮으신가요?", "en": "We're about to have a meal. Are you okay with that, Team Leader?"}, {"id": 617, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 46, "time": "00:03:31,290 --> 00:03:31,730", "start": 211.29, "end": 211.73, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Tất nhiên rồi.", "ko": "그럼요.", "en": "Of course,"}, {"id": 618, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 47, "time": "00:03:31,830 --> 00:03:32,490", "start": 211.83, "end": 212.49, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Tốt quá.", "ko": "좋죠.", "en": "Sounds good."}, {"id": 619, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 48, "time": "00:03:33,410 --> 00:03:34,410", "start": 213.41, "end": 214.41, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Anh muốn đi đâu ạ?", "ko": "어디로 모실까요?", "en": "Where shall we take you?"}, {"id": 620, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 49, "time": "00:03:36,090 --> 00:03:37,910", "start": 216.09, "end": 217.91, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Ừm... có món gì ngon nhỉ?", "ko": "음...뭐가 맛있을까요?", "en": "Ah"}, {"id": 621, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 50, "time": "00:03:39,950 --> 00:03:41,450", "start": 219.95, "end": 221.45, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "À... vậy... anh ăn mì được không ạ?", "ko": "아...그럼...라면 드실까요?", "en": "Then, would you like some ramen?"}, {"id": 622, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 51, "time": "00:03:41,810 --> 00:03:43,610", "start": 221.81, "end": 223.61, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Anh/chị đã ăn bánh cá chưa ạ?", "ko": "어묵 드셨습니까?", "en": "Did you have some fish cake soup?"}, {"id": 623, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 52, "time": "00:03:47,220 --> 00:03:48,560", "start": 227.22, "end": 228.56, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Hai người cũng vậy phải không?", "ko": "두 분도 마찬가지시죠?", "en": "The same for both of you, right?"}, {"id": 624, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 53, "time": "00:03:57,000 --> 00:04:00,880", "start": 237.0, "end": 240.88, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Vậy thì... anh Hirose có biết chúng ta bay không?", "ko": "그러면... 히로세 씨는 우리가 비행하는 거 알고 있었나?", "en": "So, did Piroshin know we were flying?"}, {"id": 625, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 54, "time": "00:04:01,860 --> 00:04:02,320", "start": 241.86, "end": 242.32, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Tất nhiên rồi", "ko": "그럼요", "en": "Of course."}, {"id": 626, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 55, "time": "00:04:02,320 --> 00:04:02,960", "start": 242.32, "end": 242.96, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Cái này", "ko": "이거", "en": "This..."}, {"id": 627, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 56, "time": "00:04:04,680 --> 00:04:08,400", "start": 244.68, "end": 248.4, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Cái này... chẳng phải là sự trừng phạt dành cho Jinsu sao?", "ko": "이거... 진수 씨를 향한 혼내 아냐?", "en": "This isn't a scolding directed at Jin-su, is it?"}, {"id": 628, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 57, "time": "00:04:08,400 --> 00:04:10,060", "start": 248.4, "end": 250.06, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Không phải vậy đâu", "ko": "그런거 아니에요", "en": "It's not like that."}, {"id": 629, "folder": "MnA.Negotiation.S01E06.06", "cueNo": 58, "time": "00:04:11,950 --> 00:04:12,710", "start": 251.95, "end": 252.71, "mp3": "./audio_assets/MnA.Negotiation.S01E06.06_MnA.Negotiation.S01E06.06.5954-10420.mp3", "vi": "Tôi sẽ đi theo ngay đây", "ko": "이따라키마스", "en": "Let's have some together with the wipe-down later."}, {"id": 630, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 1, "time": "00:00:02,000 --> 00:00:05,480", "start": 2.0, "end": 5.48, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Anh Jin-su nói muốn anh Hirosu cũng có thể đi Tokyo."
