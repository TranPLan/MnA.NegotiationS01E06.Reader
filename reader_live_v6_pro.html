ueNo": 8, "time": "00:00:24,350 --> 00:00:25,490", "start": 24.35, "end": 25.49, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Không có gì ạ,", "ko": "아닙니다,", "en": "No, not at all."}, {"id": 638, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 9, "time": "00:00:25,510 --> 00:00:27,710", "start": 25.51, "end": 27.71, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Chính tôi mới là người mang ơn anh nhiều.", "ko": "저야말로 신세 많았습니다", "en": "I'm the one who owes you a lot."}, {"id": 639, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 10, "time": "00:00:27,710 --> 00:00:30,770", "start": 27.71, "end": 30.77, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Anh đã vất vả nhiều rồi.", "ko": "고생 많으셨습니다", "en": "You've worked hard."}, {"id": 640, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 11, "time": "00:00:30,770 --> 00:00:32,390", "start": 30.77, "end": 32.39, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Vậy tôi sẽ liên lạc lại sau.", "ko": "그럼 또 연락드리겠습니다", "en": "I'll be in touch again."}, {"id": 641, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 12, "time": "00:00:32,390 --> 00:00:33,010", "start": 32.39, "end": 33.01, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Vâng.", "ko": "네", "en": "Yes."}, {"id": 642, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 13, "time": "00:00:33,010 --> 00:00:35,280", "start": 33.01, "end": 35.28, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Tôi đã nghe rõ rồi.", "ko": "잘 들었습니다", "en": "I heard you clearly."}, {"id": 643, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 14, "time": "00:00:35,280 --> 00:00:36,180", "start": 35.28, "end": 36.18, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Cảm ơn.", "ko": "감사합니다", "en": "Thank you."}, {"id": 644, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 15, "time": "00:00:36,180 --> 00:00:37,320", "start": 36.18, "end": 37.32, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "감사합니다", "ko": "감사합니다", "en": "Thank you."}, {"id": 645, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 16, "time": "00:00:38,560 --> 00:00:39,040", "start": 38.56, "end": 39.04, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Đến đây là hết tin tức.", "ko": "지금까지 뉴스 스토리였습니다.", "en": "That was the news story so far."}, {"id": 646, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 17, "time": "00:02:14,120 --> 00:02:17,540", "start": 134.12, "end": 137.54, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Dù sao thì trông anh cũng hơi mất mặt. Anh hiểu chứ?", "ko": "암만 해도 모양이 좀 빠지시니까. 이해하시죠?", "en": "You were looking a bit rough, no matter what. You understand, right?"}, {"id": 647, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 18, "time": "00:02:17,900 --> 00:02:18,040", "start": 137.9, "end": 138.04, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Hả?", "ko": "네?", "en": "What?"}, {"id": 648, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 19, "time": "00:02:18,880 --> 00:02:22,280", "start": 138.88, "end": 142.28, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Nhưng mà đây là trách nhiệm của anh Lee Sang Moo à?", "ko": "근데 이게 이상무님 책임이라는 거예요?", "en": "But are you saying this is Sang-moo's responsibility?"}, {"id": 649, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 20, "time": "00:02:23,320 --> 00:02:24,640", "start": 143.32, "end": 144.64, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Anh điên rồi hả?", "ko": "미친 거 아니에요?", "en": "Are you crazy?"}, {"id": 650, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 21, "time": "00:02:26,200 --> 00:02:27,500", "start": 146.2, "end": 147.5, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Thế thì là trách nhiệm của ai?", "ko": "그럼 누구 책임입니까?", "en": "Then whose responsibility is it?"}, {"id": 651, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 22, "time": "00:02:28,120 --> 00:02:30,020", "start": 148.12, "end": 150.02, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Chỗ chịu trách nhiệm lên sàn là ở đâu vậy?", "ko": "상장 책임지는 데가 어딘데요?", "en": "Who's the one in charge of the listing?"}, {"id": 652, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 23, "time": "00:02:42,570 --> 00:02:43,110", "start": 162.57, "end": 163.11, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Đuổi ra ngoài rồi chứ?", "ko": "내보냈지?", "en": "Did you send them out?"}, {"id": 653, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 24, "time": "00:02:43,150 --> 00:02:44,650", "start": 163.15, "end": 164.65, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Vâng. Đang chờ lệnh ạ.", "ko": "네. 대기 중입니다.", "en": "Yes. They're on standby."}, {"id": 654, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 25, "time": "00:02:45,250 --> 00:02:45,890", "start": 165.25, "end": 165.89, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Là chuyện gì vậy?", "ko": "뭘까요?", "en": "What could it be?"}, {"id": 655, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 26, "time": "00:02:52,780 --> 00:02:55,660", "start": 172.78, "end": 175.66, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Có nên tiến hành với phương án phó giám đốc không tham dự không ạ?", "ko": "이사모님은 불참하는 걸로 하고 진행할까요?", "en": "Shall we proceed with the director absent?"}, {"id": 656, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 27, "time": "00:02:55,820 --> 00:02:56,260", "start": 175.82, "end": 176.26, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Vâng.", "ko": "예", "en": "Yes."}, {"id": 657, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 28, "time": "00:02:56,260 --> 00:02:56,860", "start": 176.26, "end": 176.86, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Cứ làm như vậy đi.", "ko": "그러십시오.", "en": "Do as you wish."}, {"id": 658, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 29, "time": "00:02:58,800 --> 00:02:59,680", "start": 178.8, "end": 179.68, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Muộn rồi.", "ko": "늦었습니다.", "en": "It's late."}, {"id": 659, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 30, "time": "00:03:09,680 --> 00:03:12,220", "start": 189.68, "end": 192.22, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Mọi người đã đến đông đủ, tôi xin phép bắt đầu cuộc họp hội đồng quản trị.", "ko": "다 오셨으니까 이사회 진행하겠습니다", "en": "Since everyone is here, I will proceed with the board meeting."}, {"id": 660, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 31, "time": "00:03:13,460 --> 00:03:14,420", "start": 193.46, "end": 194.42, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Còn vụ này thì sao?", "ko": "본건은요?", "en": "What about this matter?"}, {"id": 661, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 32, "time": "00:03:14,500 --> 00:03:15,320", "start": 194.5, "end": 195.32, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Hãy bắt đầu từ việc phụ trước đi.", "ko": "별건부터 하시죠", "en": "Let's start with the other matter first."}, {"id": 662, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 33, "time": "00:03:15,320 --> 00:03:17,280", "start": 195.32, "end": 197.28, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Tôi thấy việc đó quan trọng hơn mà.", "ko": "그게 더 중요한 것 같은데", "en": "That seems more important."}, {"id": 663, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 34, "time": "00:03:17,280 --> 00:03:19,360", "start": 197.28, "end": 199.36, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "À, vâng.", "ko": "아, 네", "en": "Oh, yes."}, {"id": 664, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 35, "time": "00:03:21,740 --> 00:03:26,060", "start": 201.74, "end": 206.06, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Vậy thì, việc phụ là về việc Wind niêm yết thất bại.", "ko": "자 그럼 별거는 윈드 상장 실패에 관한 건데요", "en": "Well then, the other matter is about Wind's failed IPO."}, {"id": 665, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 36, "time": "00:03:26,060 --> 00:03:30,600", "start": 206.06, "end": 210.6, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Về phần này, chẳng phải anh Lee (giám đốc điều hành) nên giải trình một chút sao?", "ko": "이 부분은 이 상무님께서 좀 해명을 해주셔야 하지 않나", "en": "Regarding this part, I think Director Lee needs to provide some explanation."}, {"id": 666, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 37, "time": "00:03:32,190 --> 00:03:37,450", "start": 212.19, "end": 217.45, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Việc niêm yết Wind sẽ không có vấn đề gì nếu doanh thu tốt.", "ko": "윈드 상장은 매출만 잘 나오면 문제가 없을 겁니다", "en": "Wind's IPO will be fine as long as the sales figures are good."}, {"id": 667, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 38, "time": "00:03:39,800 --> 00:03:41,900", "start": 219.8, "end": 221.9, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Lên sàn thì lấy con số nào mà lên?", "ko": "상장은 무슨 숫자로 합니까", "en": "An IPO isn't just about numbers."}, {"id": 668, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 39, "time": "00:03:41,900 --> 00:03:43,020", "start": 221.9, "end": 223.02, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Chỉ là tạo đà thôi.", "ko": "기세를 확낸 거지", "en": "You really made a big fuss."}, {"id": 669, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 40, "time": "00:03:43,020 --> 00:03:51,420", "start": 223.02, "end": 231.42, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Ý anh là trách nhiệm của tôi? Chẳng lẽ chỉ có mình tôi chịu trách nhiệm thôi sao, thưa Phó tổng?", "ko": "제 책임이란 말씀인지 상무님 책임이기만 하겠습니까", "en": "Are you saying it's my fault? As if it's only your responsibility."}, {"id": 670, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 41, "time": "00:03:51,420 --> 00:03:57,480", "start": 231.42, "end": 237.48, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Nhưng mà Phó tổng lại đổ lỗi cho người khác như vậy cũng hơi mất mặt đấy, không phải sao?", "ko": "근데 또 상무님이 이걸 남탓을 하시는 것도 좀 모양이 빠지지 않습니까?", "en": "But isn't it also a bad look for you, Director, to be blaming others for this?"}, {"id": 671, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 42, "time": "00:03:58,840 --> 00:04:02,920", "start": 238.84, "end": 242.92, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Nếu mà học đại học ở Nhật thì còn có thể nói, chứ không phải là chưa thành thục hết sao?", "ko": "일본에서 대학이라도 했으면 모를 것 다 안 된 거 아니에요?", "en": "It's not like you studied at a university in Japan or anything, so you don't know everything, do you?"}, {"id": 672, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 43, "time": "00:04:04,960 --> 00:04:07,380", "start": 244.96, "end": 247.38, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Vậy thì tôi nghĩ anh nên giơ tay một lần đi.", "ko": "전 그러시면 거수 한번 하셔야 된 거야.", "en": "If that's how you're going to be, then you should call for a vote."}, {"id": 673, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 44, "time": "00:04:07,520 --> 00:04:08,660", "start": 247.52, "end": 248.66, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Sao lại phải làm thế?", "ko": "그걸 왜 해요?", "en": "Why would I do that?"}, {"id": 674, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 45, "time": "00:04:09,020 --> 00:04:15,540", "start": 249.02, "end": 255.54, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Đây đâu phải chuyện nhỏ. Chẳng phải cần phải xác định rõ trách nhiệm thuộc về ai sao?", "ko": "찬발한 건도 아닌데. 누구 책임인지 확실히 해야 되는 거 아니에요?", "en": "This isn't some trivial matter. Shouldn't we make it clear whose responsibility it is?"}, {"id": 675, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 46, "time": "00:04:21,820 --> 00:04:24,900", "start": 261.82, "end": 264.9, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Việc niêm yết Wind thất bại là lỗi của đội IR.", "ko": "윈드 상장 실패는 IR팀의 잘못이다.", "en": "The failure of Wind's IPO is the IR team's fault."}, {"id": 676, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 47, "time": "00:04:25,020 --> 00:04:26,220", "start": 265.02, "end": 266.22, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Anh/chị có thể giơ tay.", "ko": "손 드시면 됩니다.", "en": "You can raise your hand."}, {"id": 677, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 48, "time": "00:04:31,600 --> 00:04:33,900", "start": 271.6, "end": 273.9, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Ồ, giám đốc Oh, vừa rồi anh/chị giơ tay phải không?", "ko": "오 대표님 지금 손 드신 거예요?", "en": "CEO Oh, did you just raise your hand?"}, {"id": 678, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 49, "time": "00:04:34,870 --> 00:04:35,200", "start": 274.87, "end": 275.2, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Vâng.", "ko": "네", "en": "Yes."}, {"id": 679, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 50, "time": "00:04:48,620 --> 00:04:49,420", "start": 288.62, "end": 289.42, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Xin chào.", "ko": "안녕하십니까.", "en": "Hello."}, {"id": 680, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 51, "time": "00:04:49,460 --> 00:04:51,520", "start": 289.46, "end": 291.52, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Tôi có việc cần báo cáo nên ghé qua một lát.", "ko": "보고 드릴 게 있어서 잠깐 들렀습니다.", "en": "I stopped by briefly because I have something to report."}, {"id": 681, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 52, "time": "00:04:53,180 --> 00:04:55,980", "start": 293.18, "end": 295.98, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Trước hết, hợp đồng khẩn cấp với công ty Shimizu của Nhật Bản đã được ký kết.", "ko": "먼저 일본 시미즈와의 기업 응급 계약은 체결했습니다.", "en": "First, we've signed the emergency corporate contract with Shimizu in Japan."}, {"id": 682, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 53, "time": "00:04:57,680 --> 00:05:03,180", "start": 297.68, "end": 303.18, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Còn việc thanh toán tiền đặt cọc của hợp đồng đó thì sao? Vì ngày ký hợp đồng rơi vào cuối tuần nên tôi định trình thanh toán vào hôm nay.", "ko": "그거 계약금 결제는? 계약 당일이 주말이어서 오늘 결제 올리려고 합니다.", "en": "What about the down payment for that contract? Since the contract date fell on a weekend, I plan to submit the payment today."}, {"id": 683, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 54, "time": "00:05:05,180 --> 00:05:08,020", "start": 305.18, "end": 308.02, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Và hôm nay, Wind sẽ đăng một bài báo liên quan đến sản phẩm mới.", "ko": "그리고 오늘 윈드에서 신제품 관련 기사가 나갈 예정입니다.", "en": "Also, an article about the new product from Wind is scheduled to be released today."}, {"id": 684, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 55, "time": "00:05:09,840 --> 00:05:15,580", "start": 309.84, "end": 315.58, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Vì việc niêm yết gặp khó khăn do nghi ngờ về doanh thu, nên hợp đồng lần này được xem như một sự bổ sung cho vấn đề đó.", "ko": "매출에 대한 의구심으로 상장이 어려웠던 만큼 이번 계약이 그에 대한 보완이 될 것으로 보고 있습니다.", "en": "Since the listing was difficult due to doubts about our revenue, we see this contract as a way to make up for that."}, {"id": 685, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 56, "time": "00:05:22,020 --> 00:05:23,700", "start": 322.02, "end": 323.7, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Vậy tôi xin phép lui ra.", "ko": "그럼 저는 물러가 보겠습니다.", "en": "Then I'll take my leave."}, {"id": 686, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 57, "time": "00:05:29,420 --> 00:05:30,940", "start": 329.42, "end": 330.94, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Tôi cũng có thể đứng dậy được không ạ?", "ko": "저도 일어나도 될까요?", "en": "May I get up as well?"}, {"id": 687, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 58, "time": "00:05:54,830 --> 00:05:58,010", "start": 354.83, "end": 358.01, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Thưa Phó Tổng, tôi không phải ý như vậy đâu ạ.", "ko": "상무님 저는 그게 아니고요", "en": "Um,"}, {"id": 688, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 59, "time": "00:05:58,010 --> 00:06:00,760", "start": 358.01, "end": 360.76, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Ông Oh, Tổng giám đốc.", "ko": "오 대표님", "en": "Um, Managing Director,"}, {"id": 689, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 60, "time": "00:06:00,760 --> 00:06:01,220", "start": 360.76, "end": 361.22, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Vâng.", "ko": "네", "en": "Managing Director,"}, {"id": 690, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 61, "time": "00:06:01,220 --> 00:06:05,390", "start": 361.22, "end": 365.39, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Thưa Phó Tổng, nếu ông định đổ lỗi cho người khác vì thấy oan ức thì ông nên dừng lại đi.", "ko": "상무님 억울하다고 남 탓할 거면 그만하셔야 돼", "en": "No, that's not what I meant."}, {"id": 691, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 62, "time": "00:06:05,390 --> 00:06:07,430", "start": 365.39, "end": 367.43, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Không phải tôi thấy oan ức gì đâu ạ.", "ko": "제가 억울하다는 게 아니고요", "en": "CEO Oh."}, {"id": 692, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 63, "time": "00:06:07,430 --> 00:06:08,870", "start": 367.43, "end": 368.87, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Xin lỗi.", "ko": "죄송합니다", "en": "Yes,"}, {"id": 693, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 64, "time": "00:06:08,870 --> 00:06:09,310", "start": 368.87, "end": 369.31, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Thưa giám đốc.", "ko": "상무님", "en": "Director, if you're going to play the victim and blame others, you need to stop."}, {"id": 694, .Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Anh đã xử lý tốt lắm.", "ko": "잘 해결했어요.", "en": "Senior."}, {"id": 701, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 72, "time": "00:06:57,090 --> 00:07:00,370", "start": 417.09, "end": 420.37, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Quả nhiên. Tôi đã tìm hết các thành viên của chiến dịch đó rồi.", "ko": "역시. 그 작전 멤버는 다 찾아놨어.", "en": "How was your trip to Japan?"}, {"id": 702, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 73, "time": "00:07:01,130 --> 00:07:02,710", "start": 421.13, "end": 422.71, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Bọn họ vẫn còn sống như thế à.", "ko": "걔네들은 아직도 그러고 살더라.", "en": "Yes,"}, {"id": 703, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 74, "time": "00:07:17,960 --> 00:07:20,160", "start": 437.96, "end": 440.16, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Tiền bối, em sẽ gọi lại ngay.", "ko": "선배 내가 금방 다시 전화할게요", "en": "I handled it well."}, {"id": 704, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 75, "time": "00:07:23,950 --> 00:07:24,510", "start": 443.95, "end": 444.51, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Vâng,", "ko": "네,", "en": "As expected. I've already located all the members of that operation."}, {"id": 705, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 76, "time": "00:07:24,610 --> 00:07:26,650", "start": 444.61, "end": 446.65, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Phó tổng giám đốc. Không ngủ sao?", "ko": "상무님. 안 잤나?", "en": "They're still living like that."}, {"id": 706, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 77, "time": "00:07:27,890 --> 00:07:29,810", "start": 447.89, "end": 449.81, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Xin lỗi vì đã liên lạc vào giờ này.", "ko": "이 시간에 연락해서 미안하네.", "en": "Senior, I'll call you back in a bit."}, {"id": 707, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 78, "time": "00:07:30,010 --> 00:07:30,710", "start": 450.01, "end": 450.71, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Không ạ.", "ko": "아닙니다.", "en": "Yes,"}, {"id": 708, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 79, "time": "00:07:30,990 --> 00:07:31,910", "start": 450.99, "end": 451.91, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Xin hãy nói.", "ko": "말씀하십시오.", "en": "Director, you haven't slept?"}, {"id": 709, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 80, "time": "00:07:33,230 --> 00:07:34,650", "start": 453.23, "end": 454.65, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Chuyện đã xảy ra rồi.", "ko": "사고가 터졌네.", "en": "Sorry for contacting you at this hour."}, {"id": 710, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 81, "time": "00:07:38,060 --> 00:07:44,910", "start": 458.06, "end": 464.91, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Chủ tịch đã vay tiền bằng cổ phiếu làm tài sản thế chấp, và có vẻ như ông ấy đã tiến hành việc đó thông qua văn phòng thư ký.", "ko": "회장님이 주식을 담보로 대출을 하셨는데 그걸 비서실을 통해서 진행하신 모양이야.", "en": "No, it's fine."}, {"id": 711, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 82, "time": "00:07:48,590 --> 00:08:00,830", "start": 468.59, "end": 480.83, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Có lẽ ông ấy định làm lén nên mới như vậy, nhưng không có công bố thông tin, và đến khi văn phòng thư ký biết được vấn đề thì cũng đã gần đến ngày đáo hạn rồi.", "ko": "아무래도 몰래 하시려고 그런 모양인데 공시도 없이 있다가 비서실도 만기일이 다 되어서야 이게 문제가 된 걸 안 모양이야.", "en": "Please go ahead."}, {"id": 712, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 83, "time": "00:08:03,180 --> 00:08:07,940", "start": 483.18, "end": 487.94, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Có thể là do chủ tịch không muốn tiết lộ, không sao chứ ạ?", "ko": "회장님이 알리기 싫어하셔서 그럴 수도 있고 괜찮을까요", "en": "There's been an incident."}, {"id": 713, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 84, "time": "00:08:07,940 --> 00:08:11,000", "start": 487.94, "end": 491.0, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Bà chủ? Không ổn chút nào.", "ko": "사모님? 괜찮지가 않지", "en": "The chairman took out a loan using his shares as collateral, and it seems he handled it through the secretariat."}, {"id": 714, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 85, "time": "00:08:11,000 --> 00:08:14,880", "start": 491.0, "end": 494.88, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Này anh bạn, hãy coi như là đang cứu tôi, tôi xin nhờ anh đấy.", "ko": "이 사람아 저 살려주신다고 생각하시고 부탁드리겠습니다", "en": "He probably did it secretly, without any public disclosure, and it seems the secretariat only found out about the problem when the maturity date was approaching."}, {"id": 715, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 86, "time": "00:08:14,880 --> 00:08:18,650", "start": 494.88, "end": 498.65, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Chi tiết cụ thể thì gặp mặt rồi nói sau nhé.", "ko": "자세한 건 만나서 얘기하지", "en": "It could be that the chairman didn't want anyone to know, so... will that be okay?"}, {"id": 716, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 87, "time": "00:08:18,650 --> 00:08:19,630", "start": 498.65, "end": 499.63, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Vâng.", "ko": "네", "en": "Ma'am? She's not okay."}, {"id": 717, "folder": "MnA.Negotiation.S01E06.07", "cueNo": 88, "time": "00:08:19,630 --> 00:08:20,890", "start": 499.63, "end": 500.89, "mp3": "./audio_assets/MnA.Negotiation.S01E06.07_MnA.Negotiation.S01E06.07.10420-11400.mp3", "vi": "Vâng, tôi hiểu rồi.", "ko": "알겠습니다", "en": "Please, just think of it as saving my life and do me this favor."}];

function getLinks(blockId){const v=links[String(blockId)] ?? links[blockId]; if(Array.isArray(v)) return v.map(Number); if(v===undefined||v===null) return []; return [Number(v)];}
function getCue(id){return cues.find(c=>Number(c.id)===Number(id));}
function cueLabel(id){const c=getCue(id); return c?`${c.folder} #${c.cueNo}`:'#?';}
function splitLang(text){let lines=(text||'').split('\n').map(x=>x.trim()).filter(Boolean).filter(x=>x!=='Merged'); let ko=[], non=[]; lines.forEach(l=>/[가-힣]/.test(l)?ko.push(l):non.push(l)); let vi='', en=''; if(non.length===1){vi=non[0]} else if(non.length>=2){vi=non[0]; en=non[non.length-1]; if(non.length>2) vi=non.slice(0,non.length-1).join('\n')} return {vi,ko:ko.join('\n'),en,all:lines.join('\n')};}
function modeItems(b){const L=splitLang(b.text); const pause=Number($('pauseMs').value||260), sp=Number($('shadowPauseMs').value||2500), mode=$('modeSelect').value; const item=(lang,text)=>({lang,text}); const p=ms=>({pause:ms}); const ko=item('ko',L.ko||L.all), vi=item('vi',L.vi||L.all), en=item('en',L.en||L.all); const arr={
 'single-vi':[vi], 'single-ko':[ko], 'single-en':[en], 'vi-ko':[vi,p(pause),ko], 'ko2':[ko,p(pause),ko], 'vi-ko-en':[vi,p(pause),ko,p(pause),en], 'ko-vi-ko':[ko,p(pause),vi,p(pause),ko], 'ko-en-ko':[ko,p(pause),en,p(pause),ko], 'ko-pause-ko':[ko,p(sp),ko], 'ko-shadow':[ko,p(sp),ko]
 }[mode]||[vi,p(pause),ko,p(pause),en]; return arr.filter(x=>x.pause || (x.text&&x.text.trim()));}
function displayText(b){const L=splitLang(b.text), m=$('displayMode').value; if(m==='ko')return L.ko||L.all; if(m==='vi-ko')return [L.vi,L.ko].filter(Boolean).join('\n'); if(m==='ko-en')return [L.ko,L.en].filter(Boolean).join('\n'); if(m==='vi-en')return [L.vi,L.en].filter(Boolean).join('\n'); return [L.vi,L.ko,L.en].filter(Boolean).join('\n')||L.all;}
function renderTextLines(text, idx){return (text||'').split('\n').map((l,j)=>`<span class="line ${idx===current&&j===0?'current':''}" id="line-${idx}-${j}">${esc(l)}</span>`).join('');}
function passes(b){const q=($('q').value||'').toLowerCase().trim(), f=$('filter').value, t=getType(b); if(f==='live'&&!getLinks(b.id).length)return false; if(f==='narration'&&t!=='narration')return false; if(f==='dialogue'&&t!=='dialogue')return false; return !q || (b.text||'').toLowerCase().includes(q);}
function toggleMobileOptions(){document.body.classList.toggle('mobileOptions');}
function render(){let html='',shown=0,linked=0; blocks.forEach((b,i)=>{const ids=getLinks(b.id); if(ids.length) linked++; if(!passes(b)) return; shown++; const t=getType(b), active=i===current, same=samePrev && (samePrev[b.id]!==undefined||samePrev[String(b.id)]!==undefined); const linkBox=ids.length?`<div class="linkBox ${same?'same':''}">${same?'<span class="badge same">↳ Same/range</span><br>':''}Live: ${esc(ids.map(cueLabel).join(' → '))}</div>`:''; html+=`<div class="seg ${t} ${active?'active':''}" id="seg-${i}" onclick="setCurrent(${i},false)"><div class="meta"><span>#${b.n||i+1} · ${t} ${ids.length?'<span class="badge live">LIVE</span>':''}</span><span>${ids.length?esc(ids.map(cueLabel).join(', ')):''}</span></div><div class="text ko">${renderTextLines(displayText(b),i)}</div><div class="mini" style="margin-top:7px"><button class="ok" onclick="event.stopPropagation();readBlock(${i})">Read</button>${ids.length?`<button class="violet" onclick="event.stopPropagation();playBlockLive(${i})">Play Live</button>`:''}</div>${linkBox}</div>`;}); $('segments').innerHTML=html; $('stat').textContent=`${blocks.length} blocks · ${linked} live-linked · ${shown} shown · current #${current+1}`; $('autoReadBtn').textContent='Auto Read: '+(autoRead?'On':'Off'); $('autoLiveBtn').textContent='Auto Live: '+(autoLive?'On':'Off'); if($('autoMixBtn')) $('autoMixBtn').textContent='Auto Mix: '+(autoMix?'On':'Off'); save();}
function setCurrent(i, auto=true){current=Math.max(0,Math.min(blocks.length-1,i)); render(); jumpToCurrent(); if(auto){ if(autoMix) smartFlowCurrent(); else if(autoLive&&getLinks(blocks[current].id).length) playCurrentLive(); else if(autoRead) readCurrent(); }}
function jumpToCurrent(){const el=$('seg-'+current); if(el&&$('autoScrollToggle').value==='on') el.scrollIntoView({behavior:'smooth',block:'center'});} function nextSeg(){setCurrent(current+1)} function prevSeg(){setCurrent(current-1)} function clearSearch(){$('q').value='';render();}
function getVoice(lang){const sel=lang==='ko'?'voiceKo':lang==='en'?'voiceEn':'voiceVi'; return voices.find(v=>v.name===$(sel).value)||null;} function getRate(lang){return Number($(lang==='ko'?'rateKo':lang==='en'?'rateEn':'rateVi').value||1);}
function setStatus(s){$('status').textContent=s;}
function speakItem(item, token){return new Promise(resolve=>{if(token!==runToken)return resolve(); if(item.pause){setStatus('Pause '+item.pause+' ms'); return setTimeout(resolve,item.pause);} const u=new SpeechSynthesisUtterance(item.text); const v=getVoice(item.lang); if(v)u.voice=v; u.lang=v?.lang || (item.lang==='ko'?'ko-KR':item.lang==='en'?'en-US':'vi-VN'); u.rate=getRate(item.lang); u.onstart=()=>setStatus('Reading '+item.lang.toUpperCase()); u.onend=()=>resolve(); u.onerror=()=>resolve(); speechSynthesis.speak(u);});}
async function readBlock(i){stopAudio(); current=i; render(); jumpToCurrent(); const token=++runToken; speechSynthesis.cancel(); for(const it of modeItems(blocks[i])){if(token!==runToken)break; await speakItem(it,token);} if(token===runToken){setStatus('Done'); if(autoRead && current<blocks.length-1) setTimeout(()=>setCurrent(current+1),120);}}
function modeHasKo(){return modeItems(blocks[current]||{}).some(x=>x.lang==='ko'&&x.text);} 
function blockHasLive(i){const b=blocks[i]; return !!(b&&getLinks(b.id).length);}
function playBlockLivePromise(i, token){return new Promise(resolve=>{const b=blocks[i]; if(!b||!getLinks(b.id).length) return resolve(); const oldEnded=audio.onended; current=i; render(); jumpToCurrent(); playQueue=getLinks(b.id).map(getCue).filter(Boolean); playIndex=0; if(!playQueue.length) return resolve(); const finish=()=>{audio.removeEventListener('ended', onEnded); resolve();}; const onEnded=()=>{}; const oldPlayNext=playNext; window._smartResolveLive=finish; playOne(); const checker=setInterval(()=>{if(token!==runToken){clearInterval(checker); audio.pause(); resolve(); return;} if(playStopAt===null && (audio.paused || playIndex>=playQueue.length)){clearInterval(checker); resolve();}},180);});}
async function smartFlowBlock(i){current=i; render(); jumpToCurrent(); const b=blocks[i]; const ids=b?getLinks(b.id):[]; const token=++runToken; speechSynthesis.cancel(); stopAudio(); const items=modeItems(b); for(const it of items){if(token!==runToken)break; await speakItem(it,token); if(token!==runToken)break; if(it.lang==='ko' && ids.length){setStatus('Live Korean actor audio'); await playBlockLivePromise(i, token);}} if(token===runToken){setStatus('Smart Flow done'); if(autoMix && current<blocks.length-1) setTimeout(()=>setCurrent(current+1),120);}}
function readCurrent(){readBlock(current)} function readFromHere(){autoRead=true; autoLive=false; autoMix=false; render(); readCurrent();} function smartFlowCurrent(){smartFlowBlock(current)} function smartFlowFromHere(){autoMix=true; autoRead=false; autoLive=false; render(); smartFlowCurrent();} function repeatCurrent(){ if(autoMix) smartFlowCurrent(); else readCurrent();}
function stopTTS(){runToken++; speechSynthesis.cancel(); pausedTTS=false; setStatus('Stopped');} function pauseResumeTTS(){if(speechSynthesis.paused){speechSynthesis.resume();pausedTTS=false;setStatus('Resumed');}else{speechSynthesis.pause();pausedTTS=true;setStatus('Paused');}} function stopAll(){stopTTS();stopAudio();}
function playCurrentLive(){playBlockLive(current)}
function playBlockLive(i){stopTTS(); current=i; render(); jumpToCurrent(); const ids=getLinks(blocks[i].id); if(!ids.length){$('nowInfo').textContent='No live cue'; return;} playQueue=ids.map(getCue).filter(Boolean); playIndex=0; playOne();}
function audioCandidates(mp3){
 const clean=(mp3||'').replace(/^\.\//,'');
 const parts=clean.split('/').map(x=>encodeURIComponent(decodeURIComponent(x)));
 const encoded=parts.join('/');
 const file=encoded.split('/').pop();
 const repo = location.pathname.split('/').filter(Boolean)[0] || '';
 const base = location.origin + (repo ? '/' + repo + '/' : '/');
 const here = new URL('.', location.href).href;
 const out=[];
 function add(u){ if(u && !out.includes(u)) out.push(u); }
 add(new URL(clean, here).href);
 add(new URL(encoded, here).href);
 add(base + clean);
 add(base + encoded);
 add(base + 'audio_assets/' + file);
 add(location.origin + '/audio_assets/' + file);
 add(clean);
 return out;
}
function tryLoadCandidate(c, urls, idx){
 if(idx>=urls.length){
   const first=urls[0]||c.mp3;
   setStatus('Không tìm thấy file audio sau khi thử nhiều path. Mở test audio: '+first+' . Nếu 404 thì GitHub chưa có đúng folder audio_assets cùng cấp với HTML.');
   $('nowInfo').innerHTML='Audio path failed · <a href="'+first+'" target="_blank" style="color:#2563eb">open failed audio</a>';
   return;
 }
 const src=urls[idx];
 playStopAt=c.end;
 audio.onloadedmetadata=null;
 audio.onerror=null;
 audio.src=src;
 audio.load();
 const startAt=c.start+0.01;
 let played=false;
 const doPlay=()=>{
   if(played) return; played=true;
   try{audio.currentTime=startAt;}catch(e){}
   const p=audio.play();
   if(p&&p.catch)p.catch(err=>{
     setStatus('Audio đã tìm thấy nhưng browser cần bạn bấm Play Live lại một lần nữa.');
     $('nowInfo').innerHTML=`Click Play again · ${c.folder} #${c.cueNo} · <a href="${src}" target="_blank" style="color:#2563eb">test audio</a>`;
   });
 };
 audio.onloadedmetadata=doPlay;
 audio.onerror=()=>tryLoadCandidate(c, urls, idx+1);
 setTimeout(()=>{if(audio.readyState>=1) doPlay();},250);
 $('nowInfo').innerHTML=`${c.folder} #${c.cueNo} ${c.time} (${playIndex+1}/${playQueue.length}) · path ${idx+1}/${urls.length} · <a href="${src}" target="_blank" style="color:#2563eb">test audio</a>`;
}
function playOne(){
 const c=playQueue[playIndex]; if(!c)return;
 const urls=audioCandidates(c.mp3);
 tryLoadCandidate(c, urls, 0);
 const el=$('seg-'+current); if(el){el.classList.add('livePlaying'); setTimeout(()=>el.classList.remove('livePlaying'),800);}
}
function playNext(){playIndex++; if(playIndex<playQueue.length) playOne(); else{audio.pause(); playStopAt=null; if(window._smartResolveLive){const r=window._smartResolveLive; window._smartResolveLive=null; r(); return;} if(autoLive && current<blocks.length-1) setTimeout(()=>setCurrent(current+1),120);}}
audio.addEventListener('timeupdate',()=>{if(playStopAt!==null && audio.currentTime>=playStopAt) playNext();}); 
function stopAudio(){audio.pause(); playStopAt=null; if(window._smartResolveLive){const r=window._smartResolveLive; window._smartResolveLive=null; r();}} function pauseResumeAudio(){if(audio.paused) audio.play(); else audio.pause();}
function toggleAutoRead(){autoRead=!autoRead; if(autoRead){autoLive=false;autoMix=false;} render();} function toggleAutoLive(){autoLive=!autoLive; if(autoLive){autoRead=false;autoMix=false;} render();} function toggleAutoMix(){autoMix=!autoMix; if(autoMix){autoRead=false;autoLive=false;} render();} function toggleFloat(){$('floatWrap').classList.toggle('open');}
function fillVoices(){voices=speechSynthesis.getVoices().slice().sort((a,b)=>a.name.localeCompare(b.name)); const fill=(id,regex)=>{const sel=$(id), old=localStorage.getItem(storeKey+'_'+id)||sel.value; const list=voices.filter(v=>regex.test((v.lang+' '+v.name).toLowerCase())); sel.innerHTML=[...list,...voices.filter(v=>!list.includes(v))].map(v=>`<option value="${esc(v.name)}">${esc(v.name)} — ${esc(v.lang)}</option>`).join(''); if(old) sel.value=old;}; fill('voiceVi',/vi|vietnam/); fill('voiceKo',/ko|korean|hangul/); fill('voiceEn',/en|english/);} 
['voiceVi','voiceKo','voiceEn','modeSelect','filter','displayMode','autoScrollToggle'].forEach(id=>setTimeout(()=>$(id).addEventListener('change',()=>{saveSettings();render();}),0));
document.addEventListener('keydown',e=>{if(e.target&&['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName))return; if(e.key==='j'||e.key==='ArrowRight')nextSeg(); if(e.key==='k'||e.key==='ArrowLeft')prevSeg(); if(e.key==='r')readCurrent(); if(e.key===' ') {e.preventDefault(); playCurrentLive();}});
loadSettings(); fillVoices(); if('speechSynthesis' in window) speechSynthesis.onvoiceschanged=fillVoices; render(); setTimeout(jumpToCurrent,250);
</script>
