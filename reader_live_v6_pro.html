ove on.", "suggestedCue": 277}, {"id": 336, "n": 337, "type": "dialogue", "text": "Đại diện Oh: Bạn muốn làm rõ điều gì?\n오대표: 뭘 분명히 합니까?\nRepresentative Oh: What do you want to clarify?", "suggestedCue": 30}, {"id": 337, "n": 338, "type": "dialogue", "text": "Giám đốc điều hành Hà: Lee Sang-moo chịu trách nhiệm. Tôi phải chắc chắn.\n하전무: 이상무 책임이라고. 확실히 해야죠.\nExecutive Director Ha: Lee Sang-moo is responsible. I have to be sure.", "suggestedCue": 167}, {"id": 338, "n": 339, "type": "dialogue", "text": "Người đại diện Oh: ...Ông làm được không, Giám đốc điều hành?\n오대표: ...전무님이 하실 수 있어요?\nRepresentative Oh: ...Can you do it, Executive Director?", "suggestedCue": 280}, {"id": 339, "n": 340, "type": "dialogue", "text": "Nghe nói Chủ tịch không mắng được tôi liền gọi điện cho tôi?\n회장님도 바로 혼내키지 못해서, 나를 불렀다면서요?\nI heard that the Chairman couldn't scold me right away, so he called me?", "suggestedCue": 281}, {"id": 340, "n": 341, "type": "dialogue", "text": "Giám đốc điều hành Hà: Vậy chúng ta cần triệu tập một cuộc họp hội đồng quản trị.\n하전무: 그니까, 이사회를 소집해야지.\nExecutive Director Ha: So, we need to convene a board meeting.", "suggestedCue": 281}, {"id": 341, "n": 342, "type": "dialogue", "text": "Đại diện Oh: Vâng...?\n오대표: 예...?\nRepresentative Oh: Yes...?", "suggestedCue": 291}, {"id": 342, "n": 343, "type": "dialogue", "text": "Giám đốc điều hành Hà: Có cách nào khác không?\n하전무: 다른 방법이 있어요?\nExecutive Director Ha: Is there another way?", "suggestedCue": 467}, {"id": 343, "n": 344, "type": "narration", "text": "Đại diện Oh không thể nói gì nhưng Giám đốc Jo, Đại diện Park và Choi Dae-pyo bước vào phòng.\n오대표, 아무 말도 하지 못하고 있는데, 방 안으로 들어서는 조이사, 박대표, 최대표.\nRepresentative Oh cannot say anything, but Director Jo, Representative Park, and Choi Dae-pyo enter the room.", "suggestedCue": 271}, {"id": 344, "n": 345, "type": "dialogue", "text": "Đạo diễn Jo: Muộn rồi.\n조이사: 늦었습니다.\nDirector Jo: It's late.", "suggestedCue": 658}, {"id": 345, "n": 346, "type": "dialogue", "text": "Giám đốc điều hành Hà: (Nhìn đồng hồ) Đến vừa đúng lúc.\n하전무: (시계 보며) 딱 맞춰 왔구만.\nExecutive Director Ha: (Looking at his watch) It came just in time.", "suggestedCue": 556}, {"id": 346, "n": 347, "type": "dialogue", "text": "(Với đại diện Oh) Tôi mời anh ấy đi uống nước với tôi. Bạn có ổn không?\n(오대표에게) 같이 한잔하자고 했어요. 괜찮죠?\n(To Representative Oh) I asked him to have a drink with me. Are you okay?", "suggestedCue": 616}, {"id": 347, "n": 348, "type": "narration", "text": "Mặc dù anh ấy có vẻ mặt lo lắng nhưng chính Đại diện Oh là người nhường ghế cho Gina.\n떨떠름한 표정이지만, 지나는 자리를 내어주는 오대표다.\nAlthough he has a nervous expression, it is Representative Oh who gives Gina his seat.", "suggestedCue": 207}, {"id": 348, "n": 349, "type": "dialogue", "text": "Và người cuối cùng xuất hiện là Kim Woo-cheol.\n그리고, 마지막으로 등장하는 김우철.\nAnd, the last to appear is Kim Woo-cheol.", "suggestedCue": 247}, {"id": 349, "n": 350, "type": "dialogue", "text": "Người đại diện Oh: Người đại diện...\n오대표: 대표님...\nRepresentative Oh: Representative...", "suggestedCue": 291}, {"id": 350, "n": 351, "type": "dialogue", "text": "Kim Woo-cheol: (xấu hổ) À, vâng... Đại diện Oh cũng ở đây...\n김우철: (당황하며) 아, 응... 오대표도 왔네...\nKim Woo-cheol: (embarrassed) Ah, yes... Representative Oh is here too...", "suggestedCue": 291}, {"id": 351, "n": 352, "type": "dialogue", "text": "Người đại diện Oh: Không, tại sao bạn lại ở đây?\n오대표: 아니, 왜 여기 계세요?\nRepresentative Oh: No, why are you here?", "suggestedCue": 280}, {"id": 352, "n": 353, "type": "dialogue", "text": "Kim Woo-cheol: ...Tôi đến đây để ăn... Tại sao tôi lại đến...\n김우철: ...밥 먹으러 왔지... 왜 왔겠어...\nKim Woo-cheol: ...I came here to eat... Why did I come...", "suggestedCue": 293}, {"id": 353, "n": 354, "type": "dialogue", "text": "Kim Woo-cheol ngập ngừng ngồi xuống.\n김우철이 엉거주춤 자리에 앉는다.\nKim Woo-cheol sits down hesitantly.", "suggestedCue": 166}, {"id": 354, "n": 355, "type": "dialogue", "text": "18. Nguồn gốc (đêm)\n18. 기원 ( 밤 )\n18. Origin (night)", "suggestedCue": null}, {"id": 355, "n": 356, "type": "dialogue", "text": "Lee Sang-moo đang chờ đợi đối thủ của mình.\n상대를 기다리는 이상무.\nLee Sang-moo is waiting for his opponent.", "suggestedCue": 416}, {"id": 356, "n": 357, "type": "dialogue", "text": "Một ông già đi ngang qua và thoáng nhìn thấy Lee Sang-moo.\n한 노인이 지나다가, 이상무를 슬쩍 본다.\nAn old man passes by and catches a glimpse of Lee Sang-moo.", "suggestedCue": 145}, {"id": 357, "n": 358, "type": "dialogue", "text": "Ông già: Bao nhiêu tiền?\n노인: 얼마나 두시우?\nOld man: How much doosiu?", "suggestedCue": 295}, {"id": 358, "n": 359, "type": "dialogue", "text": "Sangmoo Lee: Vâng. Để nó ở cấp độ 3.\n이상무: 예. 3급 둡니다.\nSangmoo Lee: Yes. Leave it at level 3.", "suggestedCue": 274}, {"id": 359, "n": 360, "type": "dialogue", "text": "Ông già: (không thể tin được) Ồ, cái gì. Chỉ cần nhìn vào nó, nó có vẻ tốt.\n노인: (못 믿겠다) 에이, 무슨. 딱 봐도 고순데.\nOld man: (in disbelief) Oh, what. Just by looking at it, it looks good.", "suggestedCue": 556}, {"id": 360, "n": 361, "type": "dialogue", "text": "Lee Sang-moo: (với một ông già đang cố gắng đi ngang qua) Bởi vì ông không cần phải cá cược...\n이상무: (지나치려는 노인에게) 내기 안 하면 되니까...\nLee Sang-moo: (to an old man trying to pass by) Because you don't have to bet...", "suggestedCue": 145}, {"id": 361, "n": 362, "type": "dialogue", "text": "Ông già: Không đặt cược thì nhặt đá có gì vui?\n노인: 내기 안 하면 무슨 재미로 돌을 집나?\nOld man: If you don't bet, what's the fun in picking up stones?", "suggestedCue": 303}, {"id": 362, "n": 363, "type": "dialogue", "text": "Một lần nữa, Lee Sang-moo đang chờ đợi đối thủ của mình.\n다시, 상대를 기다리는 이상무.\nAgain, Lee Sang-moo is waiting for his opponent.", "suggestedCue": 416}, {"id": 363, "n": 364, "type": "dialogue", "text": "19. Nhà hàng Nhật Bản (ban đêm)\n19. 일식집 ( 밤 )\n19. Japanese restaurant (night)", "suggestedCue": 65}, {"id": 364, "n": 365, "type": "narration", "text": "Giám đốc điều hành Ha, các giám đốc điều hành, Kim Woo-cheol và Giám đốc điều hành Oh đang ngồi lúng túng trước đồ ăn.\n하전무와 임원들, 김우철, 오대표가 음식을 앞에 두고 어색하게 앉아 있다.\nExecutive Director Ha, executives, Kim Woo-cheol, and CEO Oh are sitting awkwardly in front of the food.", "suggestedCue": 406}, {"id": 365, "n": 366, "type": "dialogue", "text": "Giám đốc điều hành Hà: Mời ăn. Nơi này ngon nhất ở Hàn Quốc.\n하전무: 드세요. 대한민국에서 여기가 젤 맛있어.\nExecutive Director Ha: Please eat. This place is the most delicious in Korea.", "suggestedCue": 305}, {"id": 366, "n": 367, "type": "dialogue", "text": "Đại diện Oh: Tôi không thể phản bội Lee Sang-moo.\n오대표: 저는요, 이상무님 배신 못 해요.\nRepresentative Oh: I can’t betray Lee Sang-moo.", "suggestedCue": 306}, {"id": 367, "n": 368, "type": "dialogue", "text": "(Đứng dậy khỏi chỗ ngồi) Tôi sẽ dậy trước.\n(자리에서 일어나며) 먼저 일어나겠습니다.\n(Getting up from his seat) I will get up first.", "suggestedCue": 21}, {"id": 368, "n": 369, "type": "dialogue", "text": "Giám đốc điều hành Hà: Ai bảo anh phản bội... Vậy CEO Kim có phải là kẻ phản bội không?\n하전무: 누가 배신하라 그랬다고... 그럼, 김대표가 배신자예요?\nExecutive Director Ha: Who told you to betray... Then, is CEO Kim a traitor?", "suggestedCue": 311}, {"id": 369, "n": 370, "type": "dialogue", "text": "Đại diện Oh, hãy nhìn Kim Woo-cheol.\n오대표, 김우철을 본다.\nRepresentative Oh, look at Kim Woo-cheol.", "suggestedCue": 153}, {"id": 370, "n": 371, "type": "dialogue", "text": "Kim Woo-cheol: ...Ăn cơm rồi đi thôi. Bởi vì tôi cũng sẽ như vậy.\n김우철: ...밥만 먹고 가자고. 나도 그럴 거니까.\nKim Woo-cheol: ...Let's just eat and let's go. Because I will too.", "suggestedCue": 312}, {"id": 371, "n": 372, "type": "dialogue", "text": "Giám đốc Jo: Đại diện Ồ, có một con dao kề vào cổ anh, vậy anh đứng về phía tôi à?\n조이사: 오대표님은 목에 칼이 들어왔는데, 니 편 내 편 따지세요?\nDirector Jo: Representative Oh, there is a knife to your throat, so are you taking my side?", "suggestedCue": 313}, {"id": 372, "n": 373, "type": "dialogue", "text": "Đại diện Ô:...\n오대표: ...\nRepresentative Oh: ...", "suggestedCue": 291}, {"id": 373, "n": 374, "type": "dialogue", "text": "Joisa: Hãy nhìn vào đây. Năm, phải không? Có ba ở đó.\n조이사: 여기 한번 둘러보세요. 다섯이죠? 거기는 셋이고.\nJoisa: Take a look here. Five, right? There are three there.", "suggestedCue": 315}, {"id": 374, "n": 375, "type": "dialogue", "text": "Cuộc họp hội đồng quản trị sẽ được tổ chức ngay cả khi không có Đại diện Oh.\n오대표님 없어도 이사회는 열립니다.\nThe board meeting will be held even without Representative Oh.", "suggestedCue": 316}, {"id": 375, "n": 376, "type": "dialogue", "text": "Người đại diện Oh: Vậy tại sao tôi lại gọi cho bạn?\n오대표: 그럼 저는 뭣하러 불렀습니까?\nRepresentative Oh: Then why did I call you?", "suggestedCue": 317}, {"id": 376, "n": 377, "type": "dialogue", "text": "Joisa: Cứ tiếp tục đi. sau đó.\n조이사: 가세요. 그럼.\nJoisa: Go ahead. then.", "suggestedCue": 318}, {"id": 377, "n": 378, "type": "dialogue", "text": "Người đại diện Ồ, có vẻ như bước đi của bạn không hề chậm lại.\n오대표, 걸음이 떨어지지 않는 모양이다.\nRepresentative Oh, it looks like your steps aren’t slowing down.", "suggestedCue": 207}, {"id": 378, "n": 379, "type": "dialogue", "text": "Giám đốc điều hành Hà: (như đang cố gắng khuyên can Giám đốc Jo) Ồ, (với CEO Oh) bạn có đứng lên và lắng nghe không?\n하전무: (조이사를 만류하듯) 에이, (오대표에게) 서서 들을 거예요?\nExecutive Director Ha: (as if trying to dissuade Director Jo) Oh, (to CEO Oh) will you stand and listen?", "suggestedCue": 438}, {"id": 379, "n": 380, "type": "dialogue", "text": "Tôi có điều gì muốn nói với bạn?\n내 할얘기가 있다니까?\nI have something to tell you?", "suggestedCue": 321}, {"id": 380, "n": 381, "type": "dialogue", "text": "Đại diện Oh lại lặng lẽ ngồi xuống.\n오대표, 슬그머니 다시 앉는다.\nRepresentative Oh quietly sits down again.", "suggestedCue": 291}, {"id": 381, "n": 382, "type": "dialogue", "text": "Đại diện Oh: Đúng rồi… ban giám đốc cũng hơi giống vậy.\n오대표: 그렇다고... 이사회는 좀 그렇죠.\nRepresentative Oh: That’s right… the board of directors is a bit like that.", "suggestedCue": 281}, {"id": 382, "n": 383, "type": "narration", "text": "Bạn đang bảo tôi quay lưng lại với Lee Sang-moo phải không? (Tôi cố tình nhìn Kim Woo-cheol)\n이상무님 보는 데서, 등을 돌리라는 거잖습니까. (일부러 김우철을 본다)\nYou're telling me to turn my back on Lee Sang-moo, right? (I deliberately look at Kim Woo-cheol)", "suggestedCue": 324}, {"id": 383, "n": 384, "type": "dialogue", "text": "Kim Woo-cheol: (Hãy giao tiếp bằng mắt) Vậy à? Thay vào đó, Đại diện Oh có nên viết đơn từ chức không?\n김우철: (눈이 마주치자) 그래서? 오대표가 대신 사표 쓰게?\nKim Woo-cheol: (Let’s make eye contact) So? Should Representative Oh write his resignation instead?", "suggestedCue": 325}, {"id": 384, "n": 385, "type": "dialogue", "text": "Đại diện Oh: Tại sao tôi từ chức?\n오대표: 제가 사표를 왜 씁니까?\nRepresentative Oh: Why am I resigning?", "suggestedCue": 291}, {"id": 385, "n": 386, "type": "dialogue", "text": "Kim Woo-cheol: Nếu một giám đốc điều hành không gia hạn hợp đồng, anh ta phải từ chức.\n김우철: 임원이 재계약 안 되는 게, 사표 쓰는 거지.\nKim Woo-cheol: If an executive doesn't renew his contract, he has to resign.", "suggestedCue": 327}, {"id": 386, "n": 387, "type": "dialogue", "text": "Lee Sang-moo và Yun Joon-no không nên làm điều đó.\n이상무님도, 윤주노랑 그러면 안 되는 거야.\nLee Sang-moo and Yun Joon-no shouldn’t do that.", "suggestedCue": 390}, {"id": 387, "n": 388, "type": "narration", "text": "Trong bầu không khí mọi người đều đồng tình, Đại diện Oh, người không biết tiếng Anh, chú ý.\n다들 동의한다는 분위기에, 영문을 모르는 오대표가 눈치를 살핀다.\nIn the atmosphere of everyone agreeing, Representative Oh, who does not know the English language, takes notice.", "suggestedCue": 344}, {"id": 388, "n": 389, "type": "dialogue", "text": "Đại diện Oh: Vậy... Yun Joon-no chịu trách nhiệm thì sao?\n오대표: 그러면요... 윤주노가 책임지는 건 어떻습니까?\nRepresentative Oh: Then... how about Yun Joon-no taking responsibility?", "suggestedCue": 329}, {"id": 389, "n": 390, "type": "dialogue", "text": "Giám đốc điều hành Hà: Đó cũng là một phương pháp hay. (Nhìn Kim Woo-cheol đang ngồi yên) Tận hưởng đi.\n하전무: 그것도 좋은 방법이고. (가만히 앉아만 있는 김우철을 보며) 드세요.\nExecutive Director Ha: That’s a good method too. (Looking at Kim Woo-cheol sitting still) Enjoy.", "suggestedCue": 330}, {"id": 390, "n": 391, "type": "dialogue", "text": "Kim Woo-cheol ăn một miếng trước.\n김우철이 먼저 한 점을 먹는다.\nKim Woo-cheol eats one piece first.", "suggestedCue": 120}, {"id": 391, "n": 392, "type": "dialogue", "text": "Giám đốc điều hành Hà: Tôi. Tôi không thực sự yêu cầu bạn làm điều gì đó về Lee Sang-moo.\n하전무: 제가요. 진짜 이상무님 어떻게 하자고 이러는 거 아닙니다.\nExecutive Director Ha: Me. I'm not really asking you to do something about Lee Sang-moo.", "suggestedCue": 145}, {"id": 392, "n": 393, "type": "dialogue", "text": "Ý tưởng là để cho Lee Sang-moo một lý do để từ bỏ Yoon Jun-no.\n이상무님이 윤주노를 포기할 수 있게, 명분을 주자는 거예요.\nThe idea is to give Lee Sang-moo a reason to give up on Yoon Jun-no.", "suggestedCue": 544}, {"id": 393, "n": 394, "type": "dialogue", "text": "Sự lựa chọn là tùy thuộc vào bạn.\n선택은 본인이 하시면 되는 거고.\nThe choice is up to you.", "suggestedCue": 337}, {"id": 394, "n": 395, "type": "dialogue", "text": "(Nhìn Đại diện Oh và gật đầu)\n(오대표를 보며 고갤 끄덕인다)\n(Looks at Representative Oh and nods his head)", "suggestedCue": 325}, {"id": 395, "n": 396, "type": "dialogue", "text": "Đạo diễn Jo: Nhưng... chuyện gì sẽ xảy ra nếu Lee Sang-moo nói rằng anh ấy sẽ nghỉ hưu với toàn bộ trách nhiệm?\n조이사: 근데... 이상무님 다 책임지고 은퇴하신다고 하면요?\nDirector Jo: But... what if Lee Sang-moo says he’s retiring with full responsibility?", "suggestedCue": 339}, {"id": 396, "n": 397, "type": "narration", "text": "Vậy bạn đối phó với Yun Juno như thế nào? Không phải bạn chỉ nhận được niềm đam mê sao?\n그럼, 윤주노는 어떻게 처리합니까? 면죄부만 받는 거 아니에요?\nSo, how do you deal with Yun Juno? Aren’t you just getting indulgence?", "suggestedCue": 556}, {"id": 397, "n": 398, "type": "dialogue", "text": "Giám đốc điều hành Hà: Xin lỗi... (thở dài) Bạn có biết tại sao Yun Juno lại đến trụ sở không? Bạn có biết không?\n하전무: 면죄부... (피식) 윤주노가 본사에 왜 온 줄 아십니까? 아세요?\nExecutive Director Ha: Excuse me... (sighs) Do you know why Yun Juno came to the headquarters? Do you know?", "suggestedCue": 343}, {"id": 398, "n": 399, "type": "narration", "text": "Giám đốc điều hành Hà cười khúc khích khi nhìn Đại diện Oh, người đang chờ câu trả lời.\n하전무, 대답을 기다리는 오대표를 보며 피식 웃는다.\nExecutive Director Ha chuckles as he looks at Representative Oh, who is waiting for an answer.", "suggestedCue": 176}, {"id": 399, "n": 400, "type": "narration", "text": "Và khi tôi nâng ly rượu nhân sâm lên, CEO Park có vẻ nghĩ rằng đây là một cơ hội nên cũng đưa cho tôi một ly.\n그리고, 인삼주가 든 잔을 드는데, 박대표가 기회다 싶은지 같이 잔을 내민다.\nAnd, as I raise a glass filled with ginseng liquor, CEO Park seems to think this is an opportunity and holds out a glass for me as well.", "suggestedCue": 247}, {"id": 400, "n": 401, "type": "dialogue", "text": "Sau đó, Giám đốc Jo, Choi Dae-pyo và Kim Woo-cheol cũng nâng ly.\n그러자, 조이사, 최대표, 김우철도 잔을 든다.\nThen, Director Jo, Choi Dae-pyo, and Kim Woo-cheol also raise their glasses.", "suggestedCue": 362}, {"id": 401, "n": 402, "type": "dialogue", "text": "Cuối cùng, Đại diện Oh cũng cụng ly.\n마지막으로 오대표도 잔을 부딪치고.\nLastly, Representative Oh also clinked his glasses.", "suggestedCue": 291}, {"id": 402, "n": 403, "type": "dialogue", "text": "Giám đốc điều hành Hà: (rót cạn ly) Khi mọi người xử lý một số tiền lớn, điều đó sẽ trở nên khó hiểu.\n하전무: (잔을 비우고) 사람이, 큰돈을 만지다 보면, 이게 헷갈리거든요.\nExecutive Director Ha: (Emptying his glass) When people handle large sums of money, it gets confusing.", "suggestedCue": 344}, {"id": 403, "n": 404, "type": "narration", "text": "Dù biết đó không phải tiền của mình nhưng khi nằm trong tay tôi có cảm giác như nó là của mình. Đó là lý do vì sao tiền rất đáng sợ.\n내 돈 아닌 거 알아도, 내 손에 있으면 내 거 같거든. 그래서 돈이 무서운 거야.\nEven though I know it's not my money, it feels like it's mine when it's in my hands. That's why money is scary.", "suggestedCue": 344}, {"id": 404, "n": 405, "type": "dialogue", "text": "Max Pyo: Điều đó có thật không?\n최대표: 진짜 그렇습니까?\nMax Pyo: Is that really true?", "suggestedCue": 345}, {"id": 405, "n": 406, "type": "dialogue", "text": "Giám đốc điều hành Hà: Vâng. Khi thực hiện M&A, bạn đang giao dịch với hàng trăm tỷ USD, hoặc ít nhất là hàng chục tỷ USD.\n하전무: 응. M&A 하다 보면, 수천억씩, 적어도 수백억은 만지잖습니까.\nExecutive Director Ha: Yes. When doing M&A, you're dealing with hundreds of billions of dollars, or at least tens of billions of dollars.", "suggestedCue": 138}, {"id": 406, "n": 407, "type": "dialogue", "text": "Sau đó, một lần nữa, tiền có một chút buồn cười. Cảm giác như tất cả là của tôi vậy.\n그러다 보면, 돈이 좀 우습거든요. 다 내 거 같고.\nThen again, money is a bit funny. It feels like it's all mine.", "suggestedCue": 348}, {"id": 407, "n": 408, "type": "dialogue", "text": "Đạo diễn Jo: Bạn phải học cách sợ tiền.\n조이사: 돈을 무서워할 줄 알아야 되는데.\nDirector Jo: You have to learn to be afraid of money.", "suggestedCue": 172}, {"id": 408, "n": 409, "type": "dialogue", "text": "Giám đốc điều hành Hà: Đúng vậy. Nếu bạn ra ngoài mua một công ty, bạn sẽ mang theo 10 tỷ won.\n하전무: 그니까요. 회사 하나 사러 나가보면, 100억짜리 가져와서,\nExecutive Director Ha: That’s right. When you go out to buy a company, you bring 10 billion won.", "suggestedCue": 351}, {"id": 409, "n": 410, "type": "narration", "text": "Bọn đòi 20 tỷ thì cứng đầu. Những kẻ đó không thể đánh bại các chuyên gia.\n200억 달라고 하는 놈들 쌔고 쌨거든요. 그런 놈들은 전문가 못 이기지.\nThe guys asking for 20 billion are tough. Those guys can't beat the experts.", "suggestedCue": 352}, {"id": 410, "n": 411, "type": "dialogue", "text": "Cuối cùng, nó được bán với giá 5 tỷ won.\n결국엔 50억에 팔고 나가거든요.\nIn the end, it is sold for 5 billion won.", "suggestedCue": 353}, {"id": 411, "n": 412, "type": "narration", "text": "Vậy thì, vì tôi mua 10 tỷ won với giá 5 tỷ nên tôi đang kiếm được 5 tỷ cho công ty phải không?\n그러면, 나는 100억짜리를 50억에사 온 거니까, 회사에 50억 벌어다 주는 거잖습니까.\nThen, since I bought 10 billion won for 5 billion, I'm earning 5 billion for the company, right?", "suggestedCue": 354}, {"id": 412, "n": 413, "type": "dialogue", "text": "Đại diện Park: Đúng vậy.\n박대표: 그렇긴 하죠.\nRepresentative Park: That’s right.", "suggestedCue": 355}, {"id": 413, "n": 414, "type": "dialogue", "text": "Giám đốc điều hành Hà: Nhưng lương của tôi là bao nhiêu? Nó tồi tàn. Bạn không bao giờ biết khi nào một công ty sẽ sa thải bạn.\n하전무: 근데, 내 월급은? 초라하거든. 회사는 언제 짤릴지 알 수는 없고.\nManaging Director Ha: But, what is my salary? It's shabby. You never know when a company will fire you.", "suggestedCue": 357}, {"id": 414, "n": 415, "type": "dialogue", "text": "Hãy nắm lấy nó khi chúng ta có cơ hội. Tôi không thể không nghĩ như vậy.\n기회될 때 챙겨놓자. 그런 생각이 안 날 수가 없어요.\nLet’s grab it when we get the chance. I can't help but think like that.", "suggestedCue": 358}, {"id": 415, "n": 416, "type": "dialogue", "text": "Choi Dae-pyo: (Như thể anh ấy đồng ý) Thật vậy.\n최대표: (동의한다는 듯이) 진짜.\nChoi Dae-pyo: (As if he agrees) Really.", "suggestedCue": 669}, {"id": 416, "n": 417, "type": "dialogue", "text": "Choi Dae-pyo ăn món ăn nhẹ quý giá nhất.\n최대표가 젤 귀한 안주를 먹는다.\nChoi Dae-pyo eats the most precious snack.", "suggestedCue": 193}, {"id": 417, "n": 418, "type": "dialogue", "text": "Giám đốc điều hành Hà: Đơn giản nhất là nói với anh chàng mang 5 tỷ won là tôi sẽ mua với giá 7 tỷ won, chỉ cần đưa cho tôi 1 tỷ won thôi.\n하전무: 젤 쉬운 게, 50억짜리 가져온 양반한테, 그거 내가 70억에 사줄 테니까, 10억만 달라.\nExecutive Director Ha: The easiest thing is to tell the guy who brought 5 billion won, I will buy it for 7 billion won, just give me 1 billion won.", "suggestedCue": 361}, {"id": 418, "n": 419, "type": "dialogue", "text": "Và công ty đã nhận được 7 tỷ trên 10 tỷ.\n그리고 회사에는 100억짜리 70억으로\nAnd the company received 7 billion out of 10 billion.", "suggestedCue": 351}, {"id": 419, "n": 420, "type": "dialogue", "text": "Tôi đã cắt nó rồi. Mình đang làm nhưng nó dễ quá.\n깎아왔습니다. 하는 건데, 이거는 너무 쉽지.\nI've been cutting it. I'm doing it, but it's too easy.", "suggestedCue": 363}, {"id": 420, "n": 421, "type": "dialogue", "text": "Đại diện Oh: Vậy ý bạn là Yun Juno đã nhận lại quả?\n오대표: 그니까, 윤주노가 리베이트를 받아먹었다 그 말입니까?\nRepresentative Oh: So, you’re saying that Yun Juno received a kickback?", "suggestedCue": 281}, {"id": 421, "n": 422, "type": "dialogue", "text": "Giám đốc điều hành Hà: Tôi. Chỉ vì tôi làm điều đó không có nghĩa là tôi tàn nhẫn với người mà tôi đã nuôi nấng.\n하전무: 내가요. 그거 좀 해 먹었다고, 내가 키우던 놈한테 모질게 하는 거아니에요.\nExecutive Director Ha: Me. Just because I did that doesn't mean I'm being cruel to the guy I raised.", "suggestedCue": 556}, {"id": 422, "n": 423, "type": "dialogue", "text": "Anh ấy... tôi vẫn chưa nói với ai về chuyện này.\n걔는... 내가 이거 아직까지 아무한테도 말을 안 했는데.\nHe... I haven't told anyone about this yet.", "suggestedCue": 369}, {"id": 423, "n": 424, "type": "dialogue", "text": "Giám đốc Hà kéo tới bàn ngồi xuống.\n하전무, 테이블로 자리를 당겨 앉는다.\nDirector Ha, pulls up to the table and sits down.", "suggestedCue": 166}, {"id": 424, "n": 425, "type": "narration", "text": "Phần còn lại là hấp dẫn. Ngay cả CEO Oh cũng không thể rời mắt khỏi miệng Giám đốc Hà.\n솔깃한 나머지. 오대표마저도 하전무의 입에서 눈을 떼지 못한다.\nThe rest is tempting. Even CEO Oh can’t take his eyes off Director Ha’s mouth.", "suggestedCue": 390}, {"id": 425, "n": 426, "type": "dialogue", "text": "Giám đốc điều hành Hà: Bạn biết Jumbo Pharmaceuticals phải không?\n하전무: 점보제약, 아시죠?\nExecutive Director Ha: You know Jumbo Pharmaceuticals, right?", "suggestedCue": 144}, {"id": 426, "n": 427, "type": "dialogue", "text": "Choi Dae-pyo: Tôi biết, tôi gần như mất trí vì điều đó.\n최대표: 알죠, 그거 때문에 산인 훅 갈 뻔했는데.\nChoi Dae-pyo: I know, I almost lost my mind because of that.", "suggestedCue": 371}, {"id": 427, "n": 428, "type": "dialogue", "text": "Giám đốc điều hành Hà: Vâng. Đó là công việc của Yun Juno.\n하전무: 응. 그거, 윤주노 작품이잖아요.\nExecutive Director Ha: Yes. That's Yun Juno's work.", "suggestedCue": 544}, {"id": 428, "n": 429, "type": "dialogue", "text": "Đạo diễn Jo: Tôi hiểu rằng việc này đã được cơ quan công tố điều tra nhưng vẫn chưa có kết quả gì phải không?\n조이사: 그거 검찰 조사까지 받은 걸로 아는데 나온 거 없지 않아요?\nDirector Jo: I understand that this has been investigated by the prosecution, but nothing has come out, right?", "suggestedCue": 373}, {"id": 429, "n": 430, "type": "dialogue", "text": "Giám đốc điều hành Hà: Không phải là không có gì xảy ra mà là Yun Joon-no đã sử dụng tên của anh trai mình. Cái đó.\n하전무: 나온 게 없는 게 아니라, 윤주노가 친형 이름으로 했거든요. 그걸.\nExecutive Director Ha: It’s not that nothing came out, but Yun Joon-no used his older brother’s name. That.", "suggestedCue": 375}, {"id": 430, "n": 431, "type": "narration", "text": "Vậy là anh trai tôi đã chết trong khi đang bị điều tra. Nhờ đó, cuộc điều tra về cái chết của nghi phạm đã kết thúc.\n그래서, 친형이 조사받다 죽었잖아요. 덕분에, 피의자 사망으로 인한 수사 종결.\nSo, my older brother died while being investigated. Thanks to this, the investigation due to the death of the suspect was concluded.", "suggestedCue": 377}, {"id": 431, "n": 432, "type": "dialogue", "text": "Không ai có thể dễ dàng tiếp tục nói sau lời của Giám đốc Hà.\n하전무의 말에, 아무도 쉽게 말을 잇지 못한다.\nNo one can easily continue speaking after Director Ha's words.", "suggestedCue": 62}, {"id": 432, "n": 433, "type": "dialogue", "text": "Giám đốc điều hành Ha: Lee Sang-moo cảm thấy tiếc vì điều đó. Tôi xin lỗi... bạn biết tính cách của tôi rồi.\n하전무: 이상무님은 그게 안타까우신 거야. 미안하고... 성격 아시잖아요.\nExecutive Director Ha: Lee Sang-moo feels sorry for that. I'm sorry... you know my personality.", "suggestedCue": 379}, {"id": 433, "n": 434, "type": "dialogue", "text": "20. Nguồn gốc (đêm)\n20. 기원 ( 밤 )\n20. Origin (night)", "suggestedCue": null}, {"id": 434, "n": 435, "type": "dialogue", "text": "Lee Sang-moo và ông già (người muốn cá cược) đang chơi cờ vây.\n이상무와 (내기하자던) 노인이 바둑을 두고 있다.\nLee Sang-moo and the old man (who wanted to bet) are playing baduk.", "suggestedCue": 272}, {"id": 435, "n": 436, "type": "narration", "text": "Khi Lee Sang-mu, người đang lo lắng, đặt ván cờ vây vào góc, ông già mỉm cười rạng rỡ.\n고민하던 이상무가 모서리에 바둑알을 올리자, 노인이 방긋 웃으며\nWhen Lee Sang-mu, who was worried, placed a baduk game on the corner, the old man smiled brightly.", "suggestedCue": 39}, {"id": 436, "n": 437, "type": "dialogue", "text": "Lấy 50.000 won nằm dưới hộp cờ vây.\n바둑통 아래 놓여 있던 5만 원을 챙긴다.\nTake the 50,000 won that was lying under the baduk box.", "suggestedCue": 502}, {"id": 437, "n": 438, "type": "dialogue", "text": "Lee Sang-moo và ông già đều cười ngượng nghịu.\n이상무도 노인도 모두 어색하게 웃는다.\nLee Sang-moo and the old man both laugh awkwardly.", "suggestedCue": 193}, {"id": 438, "n": 439, "type": "dialogue", "text": "Giám đốc điều hành Hà (giọng nói): Làm thế này được, làm thế kia cũng được. Tôi không muốn bị chỉ trích nên cũng không nói lời cay đắng.\n하전무(소리): 이래도 좋고, 저래도 좋고. 욕먹기 싫어서, 쓴소리도 안 하고.\nExecutive Director Ha (voice): It’s okay to do it this way, it’s okay to do it that way. I don't want to be criticized, so I don't say anything bitter.", "suggestedCue": 381}, {"id": 439, "n": 440, "type": "dialogue", "text": "21. Nhà hàng Nhật Bản (ban đêm)\n21. 일식집 ( 밤 )\n21. Japanese restaurant (night)", "suggestedCue": 65}, {"id": 440, "n": 441, "type": "dialogue", "text": "Giám đốc điều hành Hà: Nhưng liệu tính cách đó có làm nên chuyện lớn không? Bệnh đang hoành hành.\n하전무: 근데, 그런 성격이 일을 크게 만든다니까? 병이 곪는다고.\nExecutive Director Ha: But, does that kind of personality make things big? The disease is festering.", "suggestedCue": 382}, {"id": 441, "n": 442, "type": "dialogue", "text": "Giám đốc điều hành Hà nhìn Đại diện Oh, người đang lo lắng.\n하전무, 고민하는 오대표를 본다.\nExecutive Director Ha looks at Representative Oh, who is worried.", "suggestedCue": 155}, {"id": 442, "n": 443, "type": "dialogue", "text": "Giám đốc điều hành Hà: Cuối cùng thì Yun Juno cũng bùng nổ. Nó không thể phát nổ.\n하전무: 윤주노도 결국엔 터져요. 안 터질 수는 없어.\nExecutive Director Ha: Yun Juno also explodes in the end. It can't explode.", "suggestedCue": 556}, {"id": 443, "n": 444, "type": "narration", "text": "Vì vậy, Lee Sang-moo cần phải nhanh chóng giải quyết mọi việc. Hãy cùng nhau bay như thế nhé.\n그니까, 이상무님도 얼른 정리하셔야 돼. 저러다 같이 날아가.\nSo, Lee Sang-moo needs to sort things out quickly. Let's fly together like that.", "suggestedCue": 440}, {"id": 444, "n": 445, "type": "dialogue", "text": "Kim Woo-cheol: Nhưng... Yun Joon-no chắc hẳn là một chàng trai thông minh về mặt đó.\n김우철: 근데... 윤주노가 그쪽으로는 빠삭한 놈일 텐데,\nKim Woo-cheol: But... Yun Joon-no must be a smart guy in that area.", "suggestedCue": 388}, {"id": 445, "n": 446, "type": "dialogue", "text": "Ý bạn là bạn đã mua cổ phiếu dưới tên anh trai mình?\n주식을 티 나게 형이름으로 샀다는 거예요?\nAre you saying that you bought stocks in your brother’s name?", "suggestedCue": 389}, {"id": 446, "n": 447, "type": "dialogue", "text": "Giám đốc điều hành Hà: (thở dài) Đúng vậy. Đây là điều người tốt làm. Bởi vì tôi chưa thử nó.\n하전무: (피식) 그니까. 착한 양반들은 이런다니까. 안 해봤으니까.\nExecutive Director Ha: (sighing) That’s right. This is what good people do. Because I haven't tried it.", "suggestedCue": 390}, {"id": 447, "n": 448, "type": "narration", "text": "Nếu tôi cố gắng ủy thác toàn bộ tài sản của mình cho người khác thì sao? Tôi không thể để nó cho bạn.\n내 전 재산을 다른 사람한테 맡기려고 하면요. 못 맡겨요.\nWhat if I try to entrust all my assets to someone else? I can't leave it to you.", "suggestedCue": 390}, {"id": 448, "n": 449, "type": "dialogue", "text": "Hầu hết mọi người sẽ không thể để lại thứ gì đó cho con cái mình, phải không?\n웬만한 사람은 자식한테도 못 맡길걸요?\nMost people wouldn't be able to leave something to their children, right?", "suggestedCue": 390}, {"id": 449, "n": 450, "type": "dialogue", "text": "22. Phòng của Juno, khách sạn (Nhật Bản) (đêm)\n22. 주노의 방, 호텔 ( 일본 ) ( 밤 )\n22. Juno’s room, hotel (Japan) (night)", "suggestedCue": 671}, {"id": 450, "n": 451, "type": "dialogue", "text": "Giám đốc điều hành Ha (giọng nói): Vì vậy, bạn và Yoon Joon-ho rất đặc biệt.\n하전무(소리): 그니까, 윤주노랑 형이랑은, 각별했던 거야.\nExecutive Director Ha (voice): So, you and Yoon Joon-ho were special.", "suggestedCue": 390}, {"id": 451, "n": 452, "type": "dialogue", "text": "Đó là lý do Sadal ra đời.\n그래서 그 사달이 난 거고.\nThat's why Sadal was born.", "suggestedCue": 390}, {"id": 452, "n": 453, "type": "dialogue", "text": "Juno bước vào phòng.\n방 안으로 들어서는 주노.\nJuno enters the room.", "suggestedCue": 21}, {"id": 453, "n": 454, "type": "dialogue", "text": "Ghi chú (âm thanh): Juno... giúp tôi... chỉ một lần thôi...\n주석(소리): 주노야... 나 한 번만... 도와줘라...\nNotes (sound): Juno... help me... just once...", "suggestedCue": 361}, {"id": 454, "n": 455, "type": "dialogue", "text": "23. Nhà Juno (quá khứ) (ngày)\n23. 주노의 집 ( 과거 ) ( 낮 )\n23. Juno’s house (past) (day)", "suggestedCue": 193}, {"id": 455, "n": 456, "type": "dialogue", "text": "Lưu ý: Không phải bạn đang... tiếp quản Jumbo sao? ...Phải?\n주석: 너... 점보 인수하는 거 아니야? ...맞지?\nNote: Aren't you... taking over Jumbo? ...right?", "suggestedCue": 391}, {"id": 456, "n": 457, "type": "dialogue", "text": "Juno: Sao cậu biết điều đó? Làm sao bạn biết được?!\n주노: 형이 그걸 어떻게 알아? 어떻게 알았냐고?!\nJuno: How do you know that? How did you know?!", "suggestedCue": 392}, {"id": 457, "n": 458, "type": "dialogue", "text": "Lưu ý: Thế thì... mình có nên lên không nhỉ...! Tại sao lại như thế này...!\n주석: 그러면... 올라야 되는 거 아니냐고...! 왜 이런 거냐고...!\nNote: Then... shouldn't I go up...! Why is it like this...!", "suggestedCue": 390}, {"id": 458, "n": 459, "type": "narration", "text": "Joo-seong vừa khóc vừa đưa chiếc điện thoại di động cho Juno xem biểu đồ chứng khoán khổng lồ.\n울먹이는 주석, 점보 주식 차트가 보이는 핸드폰을 주노에게 들이민다.\nJoo-seong, crying, holds out a cell phone showing a jumbo stock chart to Juno.", "suggestedCue": 244}, {"id": 459, "n": 460, "type": "dialogue", "text": "Anna đang quan sát hai người từ trong bếp.\n주방 쪽에서 그 둘을 보고 있는 안나.\nAnna is watching the two from the kitchen.", "suggestedCue": 271}, {"id": 460, "n": 461, "type": "dialogue", "text": "Juno nhìn thấy Anna.\n주노, 안나를 본다.\nJuno sees Anna.", "suggestedCue": 0}, {"id": 461, "n": 462, "type": "dialogue", "text": "Đôi mắt của Anna dao động.\n안나의 눈빛이 흔들린다.\nAnna's eyes waver.", "suggestedCue": 313}, {"id": 462, "n": 463, "type": "dialogue", "text": "Juno nhìn lại ghi chú.\n다시, 주석을 보는 주노.\nJuno looking at the notes again.", "suggestedCue": 140}, {"id": 463, "n": 464, "type": "dialogue", "text": "Juno: Sanin không sống ở đó. Công ty đó là lừa đảo.\n주노: 산인은 거기 안 사. 그 회사는 사기야.\nJuno: Sanin don’t live there. That company is a scam.", "suggestedCue": 395}, {"id": 464, "n": 465, "type": "dialogue", "text": "Lưu ý: Anh Lee... Vậy tại sao anh lại đi khảo sát thực tế?!\n주석: 이 씨... 그럼 실사는 왜 간 건데?!\nNote: Mr. Lee... Then why did you go to the actual inspection?!", "suggestedCue": 556}, {"id": 465, "n": 466, "type": "dialogue", "text": "Juno: Bạn đã mua bao nhiêu?\n주노: 얼마나 샀어?\nJuno: How much did you buy?", "suggestedCue": 295}, {"id": 466, "n": 467, "type": "dialogue", "text": "Lưu ý: Bạn có định đầu tư không?\n주석: 투자할 거야?\nNote: Are you going to invest?", "suggestedCue": 144}, {"id": 467, "n": 468, "type": "dialogue", "text": "Juno: (Biểu cảm trên khuôn mặt trở nên méo mó)\n주노: (표정이 일그러진다)\nJuno: (Facial expression becomes distorted)", "suggestedCue": 13}, {"id": 468, "n": 469, "type": "dialogue", "text": "Nhận xét: Không trả lời, tôi nhìn vào chiếc điện thoại trên tay (với giá cổ phiếu khổng lồ được hiển thị).\n주석, 대답도 없이 손에 든 (점보 주가창이 뜬) 폰을 본다.\nComment: Without answering, I look at the phone in my hand (with the jumbo stock price displayed).", "suggestedCue": 167}, {"id": 469, "n": 470, "type": "dialogue", "text": "Lưu ý: Juno... Nếu Jumbo thất bại, tôi xong việc. Mất tất cả...\n주석: 주노야... 점보 망하면 나는 끝이야. 다 잃는다고...\nNote: Juno... If Jumbo fails, I'm done. Losing everything...", "suggestedCue": 274}, {"id": 470, "n": 471, "type": "dialogue", "text": "Juno: Mất một số tiền không kết thúc cuộc đời bạn. Hãy bán nó ngay bây giờ.\n주노: 돈 좀 잃는다고, 인생 안 끝나. 지금이라도 당장 팔아.\nJuno: Losing some money doesn't end your life. Sell it right now.", "suggestedCue": 507}, {"id": 471, "n": 472, "type": "dialogue", "text": "Lưu ý: (la hét) Không. Tôi xong rồi. Bạn biết tôi phụ trách các khoản vay của công ty phải không?\n주석: (절레절레) 아니. 나는 끝나. 너 내가 기업 대출 담당인 거 알지?\nNote: (screaming) No. I'm done. You know I'm in charge of corporate lending, right?", "suggestedCue": 281}, {"id": 472, "n": 473, "type": "dialogue", "text": "Dù có lấy ra một lát rồi đặt lại cũng sẽ không có ai biết...\n그거 잠깐 뺐다가 돌려놓아도 아무도 모르거든...\nEven if you take it out for a moment and put it back, no one will know...", "suggestedCue": 62}, {"id": 473, "n": 474, "type": "dialogue", "text": "Juno: Ý bạn là bạn đã rút tiền ra khỏi ngân hàng và mua cổ phiếu khổng lồ?\n주노: 지금, 은행 돈을 빼서 점보 주식을 샀다는 거야?\nJuno: Are you saying you took money out of the bank and bought jumbo stocks?", "suggestedCue": 351}, {"id": 474, "n": 475, "type": "dialogue", "text": "Lưu ý: Bạn có thể trả lại ngay. Không ai biết!\n주석: 금방 돌려놓으면 돼. 아무도 모른다고!\nNote: You can return it right away. No one knows!", "suggestedCue": 62}, {"id": 475, "n": 476, "type": "dialogue", "text": "Nhưng... vì đây... là... tôi không thể bán nó và lấy lại được...!!!\n근데... 이게... 내리니까... 팔아서 돌려놓을 수도 없잖아...!!!\nBut... since this... is... I can't sell it and get it back...!!!", "suggestedCue": 62}, {"id": 476, "n": 477, "type": "dialogue", "text": "Juno: Điên rồi...\n주노: 미친...\nJuno: Crazy...", "suggestedCue": 649}, {"id": 477, "n": 478, "type": "dialogue", "text": "Lưu ý: (la hét) Vậy Juno, chỉ lần này thôi... Nếu được giá hợp lý, tôi sẽ bán và nạp lại ngay.\n주석: (절레절레) 그니까, 주노야, 한 번만... 제값만 오면, 바로 팔고 채워 넣을게.\nNote: (screaming) So, Juno, just this once... If I get the right price, I'll sell it and refill it right away.", "suggestedCue": 21}, {"id": 478, "n": 479, "type": "dialogue", "text": "Đó là sự thật. Bạn có thể giải quyết nó mà không ai biết... chỉ một lần...\n진짜야. 아무도 모르게 해결할 수 있어... 한 번만...\nIt's true. You can solve it without anyone knowing... just once...", "suggestedCue": 62}, {"id": 479, "n": 480, "type": "dialogue", "text": "Juno cúi đầu.\n주노, 고갤 떨군다.\nJuno lowers her head.", "suggestedCue": null}, {"id": 480, "n": 481, "type": "dialogue", "text": "Lưu ý: Nếu không...tôi sẽ chết...\n주석: 안 그러면... 나 죽어...\nNote: Otherwise... I'll die...", "suggestedCue": 387}, {"id": 481, "n": 482, "type": "dialogue", "text": "24. Phòng của Juno, khách sạn (Nhật Bản) (lại, hiện tại) (bình minh)\n24. 주노의 방, 호텔 ( 일본 ) ( 다시, 현재 ) ( 새벽 )\n24. Juno's room, hotel (Japan) (again, present) (dawn)", "suggestedCue": 416}, {"id": 482, "n": 483, "type": "dialogue", "text": "Juno, nhìn ra ngoài cửa sổ lúc bình minh.\n주노, 여명이 밝아오는 창밖을 보고 있다.\nJuno, looking out the window at the dawn.", "suggestedCue": 33}, {"id": 483, "n": 484, "type": "dialogue", "text": "Bạn có thể nhìn thấy phong cảnh núi Phú Sĩ bên ngoài cửa sổ.\n창밖으로 후지산의 풍경이 보인다.\nYou can see the scenery of Mt. Fuji outside the window.", "suggestedCue": 474}, {"id": 484, "n": 485, "type": "dialogue", "text": "25. Sảnh, Trụ sở Shimizu (Nhật Bản) (ngày)\n25. 로비, 시미즈 본사 ( 일본 ) ( 낮 )\n25. Lobby, Shimizu Headquarters (Japan) (day)", "suggestedCue": 681}, {"id": 485, "n": 486, "type": "narration", "text": "Hirose và Ozaki đang đợi bên trong sảnh và trao đổi lời chào với Juno và nhóm.\n로비 안쪽에서 히로세와 오자키가 기다리고 있다가, 주노와 팀원들과 인사를 나눈다.\nHirose and Ozaki are waiting inside the lobby and exchange greetings with Juno and the team.", "suggestedCue": 23}, {"id": 486, "n": 487, "type": "dialogue", "text": "Shimizu có biểu cảm tươi sáng hơn trước.\n이전보다 밝은 표정의 시미즈 측이다.\nShimizu has a brighter expression than before.", "suggestedCue": 438}, {"id": 487, "n": 488, "type": "dialogue", "text": "26. Phòng họp, Trụ sở Shimizu (Nhật Bản) (ngày)\n26. 회의실, 시미즈 본사 ( 일본 ) ( 낮 )\n26. Conference room, Shimizu Headquarters (Japan) (day)", "suggestedCue": 140}, {"id": 488, "n": 489, "type": "dialogue", "text": "Yoshida, luật sư, Naito, Ozaki và Hirose đang ngồi đối diện anh ta.\n요시다와 변호사, 나이토, 오자키, 히로세가 앉아 있고, 맞은편에\nYoshida, the lawyer, Naito, Ozaki, and Hirose are sitting across from him.", "suggestedCue": 23}, {"id": 489, "n": 490, "type": "dialogue", "text": "Juno và nhóm đang ngồi.\n주노와 팀원들이 앉아 있다.\nJuno and the team are sitting.", "suggestedCue": 438}, {"id": 490, "n": 491, "type": "narration", "text": "Phiên dịch 1 và 2 ngồi phía sau mỗi ghế của công ty và phiên dịch với giọng trầm.\n각 회사 자리 뒤편에 통역1, 2가 앉아 작은 목소리로 통역한다.\nInterpreters 1 and 2 sit at the back of each company seat and interpret in a low voice.", "suggestedCue": 351}, {"id": 491, "n": 492, "type": "dialogue", "text": "Soonyoung: Số lượng: 10.001 chiếc, đơn giá mỗi chiếc là 25$, thanh toán 20% giá trị trong tháng này,\n순영: 수량 1만 1개, 개당 단가는 25달러, 대금의 20%를 이달에 지급하고,\nSoonyoung: Quantity: 10,001 units, unit price per unit is $25, 20% of the price is paid this month,", "suggestedCue": 402}, {"id": 492, "n": 493, "type": "dialogue", "text": "Điều kiện là giá có tính chất trả trước.\n그 대금에는 계약금의 성격을 가지는 것이 조건입니다.\nThe condition is that the price has the nature of a down payment.", "suggestedCue": 402}, {"id": 493, "n": 494, "type": "dialogue", "text": "Yoshida: (Nghe phiên dịch viên 1 thì thầm và trả lời) (Tiếng Nhật) Đúng vậy.\n요시다: (통역1의 귓속말을 듣고 대답한다) (일어) 네.\nYoshida: (Listens to interpreter 1’s whisper and answers) (Japanese) Yes.", "suggestedCue": 69}, {"id": 494, "n": 495, "type": "dialogue", "text": "Soonyoung: Số lượng là 10.001 tức là hơn 10.000 nên tỷ lệ chiết khấu là 50%.\n순영: 수량은 1만 개를 초과한 1만 1개이므로, 할인율 50%인 거 다시\nSoonyoung: The quantity is 10,001, which is more than 10,000, so the discount rate is 50%.", "suggestedCue": 404}, {"id": 495, "n": 496, "type": "narration", "text": "Vui lòng xác nhận. Chúng tôi đã nhận được chữ ký trước của CEO Wind Park Rae-kyung.\n확인 부탁드리고요. 윈드의 박래경 대표의 사인은 저희가 미리 받아 왔고,\nPlease confirm. We received the autograph of Wind CEO Park Rae-kyung in advance.", "suggestedCue": 406}, {"id": 496, "n": 497, "type": "dialogue", "text": "Thông tin do chúng tôi cung cấp với tư cách là đại lý cũng được đính kèm.\n저희가 대리인으로 보장하는 내용도 첨부되었습니다.\nThe information provided by us as an agent is also attached.", "suggestedCue": 407}, {"id": 497, "n": 498, "type": "dialogue", "text": "Khi Soonyoung đưa hợp đồng cho anh, Yoshida đã lịch sự nhận lấy.\n순영이 계약서를 건네면, 요시다가 예의를 차려서 계약서를 받는다.\nWhen Soonyoung hands him the contract, Yoshida politely accepts it.", "suggestedCue": 440}, {"id": 498, "n": 499, "type": "dialogue", "text": "Và sau đó chuyển nó cho luật sư.\n그리고 변호사에게 전달한다.\nAnd then forward it to the lawyer.", "suggestedCue": 144}, {"id": 499, "n": 500, "type": "narration", "text": "Luật sư Shimizu đeo kính vào và bắt đầu xem xét hợp đồng một cách cẩn thận.\n시미즈 변호사, 안경을 쓰고 꼼꼼히 계약서를 보기 시작한다.\nAttorney Shimizu puts on his glasses and begins to look at the contract carefully.", "suggestedCue": 409}, {"id": 500, "n": 501, "type": "dialogue", "text": "Soonyoung đưa ra một hợp đồng khác.\n순영이 다른 계약서를 내민다.\nSoonyoung holds out another contract.", "suggestedCue": 390}, {"id": 501, "n": 502, "type": "dialogue", "text": "Soonyoung: Điều kiện là chúng ta nhận số lượng từ Shimizu về Speed của Hàn Quốc thay thế.\n순영: 시미즈에서 한국의 스피드로 가는 수량을 저희가 대신 받는 조건이고요.\nSoonyoung: The condition is that we receive the quantity from Shimizu to Korea's Speed instead.", "suggestedCue": 409}, {"id": 502, "n": 503, "type": "dialogue", "text": "Hợp đồng MOU với Speed sẽ được đính kèm sau.\n스피드와의 MOU 계약서는 추후 첨부하도록 하겠습니다.\nThe MOU contract with Speed will be attached later.", "suggestedCue": 410}, {"id": 503, "n": 504, "type": "dialogue", "text": "Yoshida: (Nghe phiên dịch) (Nói) Đúng. cảm ơn bạn\n요시다: (통역을 들으며) (일어) 네. 감사합니다.\nYoshida: (Listening to interpretation) (Speaking) Yes. thank you", "suggestedCue": 52}, {"id": 504, "n": 505, "type": "dialogue", "text": "Sau khi xem xét hợp đồng, Sunyoung gật đầu với Juno.\n계약서 검토를 마친 순영이 주노를 향해 고갤 끄덕인다.\nAfter reviewing the contract, Sunyoung nods towards Juno.", "suggestedCue": 211}, {"id": 505, "n": 506, "type": "dialogue", "text": "Khi luật sư của Shimizu cũng thì thầm với Yoshida, Yoshida gật đầu.\n시미즈 측 변호사도 요시다에게 귓속말하면, 요시다가 고갤 끄덕인다.\nWhen Shimizu's lawyer also whispers to Yoshida, Yoshida nods.", "suggestedCue": 440}, {"id": 506, "n": 507, "type": "dialogue", "text": "Yoshida: (Đứng dậy) Không sao đâu.\n요시다: (일어) 이상 없습니다.\nYoshida: (Standing up) There's no problem.", "suggestedCue": 3}, {"id": 507, "n": 508, "type": "dialogue", "text": "Yoshida, tem.\n요시다, 도장을 찍는다.\nYoshida, stamp.", "suggestedCue": 52}, {"id": 508, "n": 509, "type": "dialogue", "text": "Sau đó, Ozaki giao hợp đồng cho Naito.\n그리고, 오자키가 계약서를 나이토에게 건넨다.\nThen, Ozaki hands the contract to Naito.", "suggestedCue": 544}, {"id": 509, "n": 510, "type": "dialogue", "text": "Jinsu nhìn Hirose với vẻ mặt vui vẻ.\n진수가 기쁜 표정으로 히로세를 본다.\nJinsu looks at Hirose with a happy expression.", "suggestedCue": 141}, {"id": 510, "n": 511, "type": "dialogue", "text": "Hirose mỉm cười nhẹ với anh.\n그에 슬쩍 미소 짓는 히로세.\nHirose smiles slightly at him.", "suggestedCue": 23}, {"id": 511, "n": 512, "type": "narration", "text": "Tuy nhiên, khi Naito đang định đóng dấu vị trí quản lý nhà máy thì tay anh chợt dừng lại.\n그런데, 나이토가 공장장의 자리에 도장을 찍으려다가... 손을 멈춘다.\nHowever, while Naito was about to stamp the position of the factory manager... his hand stopped.", "suggestedCue": 544}, {"id": 512, "n": 513, "type": "narration", "text": "Trong hợp đồng, tên của Rae-kyung Park được viết là đại diện của Wind và chữ ký * được viết bằng chữ Trung Quốc.\n계약서에 윈드 대표로 박래경의 이름이 적혀 있고, 한자로 사인 * 이되어 있다.\nIn the contract, Rae-kyung Park's name is written as Wind's representative, and the signature * is written in Chinese characters.", "suggestedCue": 531}, {"id": 513, "n": 514, "type": "dialogue", "text": "Naito: (Đứng dậy) Nhưng... đây là nơi họ làm xe đạp à?\n나이토: (일어) 근데... 여기가 사이클을 만드는 데라고요?\nNaito: (Standing up) But... this is where they make the cycles?", "suggestedCue": 504}, {"id": 514, "n": 515, "type": "dialogue", "text": "Naito nhìn Phiên dịch viên 2, người vẫn đứng yên.\n나이토가 가만히 있는 통역2를 쳐다본다.\nNaito looks at Interpreter 2, who is still.", "suggestedCue": 538}, {"id": 515, "n": 516, "type": "narration", "text": "Phiên dịch viên 2 tưởng đó là cuộc trò chuyện giữa Shimizu và những người khác nhưng lại giải thích bằng cái nhìn của Naito.\n통역2는 시미즈 측끼리 하는 대화인 줄 알았다가, 나이토의 눈짓에 통역한다.\nInterpreter 2 thought it was a conversation between Shimizu and others, but interpreted with a glance from Naito.", "suggestedCue": 544}, {"id": 516, "n": 517, "type": "dialogue", "text": "Phiên dịch viên 2: Wind có phải là công ty sản xuất xe đạp không?\n통역2: 윈드는 사이클을 만드는 회사가 맞습니까?\nInterpreter 2: Is Wind a company that manufactures cycles?", "suggestedCue": 483}, {"id": 517, "n": 518, "type": "dialogue", "text": "Juno: Vâng.\n주노: 네.\nJuno: Yes.", "suggestedCue": 0}, {"id": 518, "n": 519, "type": "narration", "text": "Thay vì cố gắng đóng dấu Naito, anh lại chìm đắm trong suy nghĩ khi nhìn vào chữ ký của Park Rae-kyung trên hợp đồng.\n나이토, 도장을 찍으려다 말고, 계약서에 박래경의 사인을 보며 생각에 잠긴다.\nInstead of trying to stamp Naito, he gets lost in thought as he looks at Park Rae-kyung's signature on the contract.", "suggestedCue": 531}, {"id": 519, "n": 520, "type": "dialogue", "text": "Minjeong: (với Juno) Bạn có muốn tôi giải thích không?\n민정: (주노에게) 설명을 좀 드릴까요?\nMinjeong: (to Juno) Would you like me to explain?", "suggestedCue": 271}, {"id": 520, "n": 521, "type": "dialogue", "text": "Juno: (gật đầu)\n주노: (끄덕끄덕)\nJuno: (nods)", "suggestedCue": null}, {"id": 521, "n": 522, "type": "dialogue", "text": "Minjeong: (Tiếng Nhật) Wind là một công ty cũng sản xuất cung tên. Đứng đầu thế giới về môn bắn cung...\n민정: (일어) 윈드는 양궁도 만드는 회사입니다. 양궁으로는 세계 1위를...\nMinjeong: (Japanese) Wind is a company that also manufactures archery. Ranked first in the world in archery...", "suggestedCue": 578}, {"id": 522, "n": 523, "type": "narration", "text": "* Giống như chữ ký tiếng Trung của Park Rae-kyung trên khẩu hiệu Ongojishin.\n* 온고지신 표어에 있는 박래경의 한자 사인과 같은 것.\n* Same as Park Rae-kyung's Chinese character signature on the motto of Ongojishin.", "suggestedCue": 406}, {"id": 523, "n": 524, "type": "dialogue", "text": "Naito đặt con dấu xuống.\n도장을 내려놓는 나이토.\nNaito puts down the seal.", "suggestedCue": 166}, {"id": 524, "n": 525, "type": "dialogue", "text": "Yoshida, Ozaki và Hirose đều xấu hổ.\n당황하는 요시다, 오자키, 히로세.\nYoshida, Ozaki, and Hirose are embarrassed.", "suggestedCue": 23}, {"id": 525, "n": 526, "type": "narration", "text": "Soonyoung, Minjeong và Jinsu cảm thấy có điều gì đó không ổn nên nhìn xung quanh.\n뭔가 잘못되고 있음을 직감한 순영, 민정과 진수를 둘러본다.\nSoonyoung, Minjeong, and Jinsu, who sense something is wrong, look around.", "suggestedCue": 247}, {"id": 526, "n": 527, "type": "dialogue", "text": "Naito: (Đặt con tem xuống) (Đứng lên) ...Xin lỗi... Tôi không đóng dấu được.\n나이토: (도장을 내려놓으며) (일어) ...죄송하지만... 난 도장 못 찍습니다.\nNaito: (Putting down the stamp) (Standing up) ...Sorry... I can't stamp it.", "suggestedCue": 441}, {"id": 527, "n": 528, "type": "narration", "text": "Phía Shimizu xấu hổ. Phiên dịch viên 2 cũng ngượng ngùng và lưỡng lự khi phiên dịch.\n당황하는 시미즈 측. 통역2도 당황해서 통역하기를 머뭇거린다.\nShimizu's side is embarrassed. Interpreter 2 is also embarrassed and hesitates to interpret.", "suggestedCue": 440}, {"id": 528, "n": 529, "type": "dialogue", "text": "Trong khi đó, Minjeong nói chuyện với Juno trước.\n그사이, 민정이 먼저 주노에게 말한다.\nMeanwhile, Minjeong speaks to Juno first.", "suggestedCue": 530}, {"id": 529, "n": 530, "type": "dialogue", "text": "Minjeong: Tôi không thể đóng dấu nó được...\n민정: 도장을 찍을 수 없다고...\nMinjeong: I can't stamp it...", "suggestedCue": 62}, {"id": 530, "n": 531, "type": "dialogue", "text": "Soonyoung và Jinsu xấu hổ.\n당황하는 순영과 진수.\nSoonyoung and Jinsu are embarrassed.", "suggestedCue": 23}, {"id": 531, "n": 532, "type": "dialogue", "text": "Juno: Tại sao?\n주노: 왜죠?\nJuno: Why?", "suggestedCue": 203}, {"id": 532, "n": 533, "type": "dialogue", "text": "Minjeong: (tiếng Nhật) Tại sao bạn không thể có được một con tem?\n민정: (일어) 왜 도장을 찍을 수 없으신지요?\nMinjeong: (Japanese) Why can’t you get a stamp?", "suggestedCue": 58}, {"id": 533, "n": 534, "type": "dialogue", "text": "Naito: (Nói) ...Tôi không thể tin tưởng công ty này.\n나이토: (일어) ...저는 이 회사를 신뢰할 수 없습니다.\nNaito: (Speaking) ...I cannot trust this company.", "suggestedCue": 416}, {"id": 534, "n": 535, "type": "dialogue", "text": "Yoshida: (Đứng dậy) Naito-san! Hãy lịch sự. Tôi là khách của Shimizu.\n요시다: (일어) 나이토 상! 예의를 지키세요. 시미즈의 손님입니다.\nYoshida: (Standing up) Naito-san! Be polite. I am Shimizu’s guest.", "suggestedCue": 207}, {"id": 535, "n": 536, "type": "dialogue", "text": "Naito: (Đứng dậy) Yoshida. Mặc dù bạn nói Shimizu đang ở trong tình thế khó khăn,\n나이토: (일어) 요시다. 당신은 시미즈가 어려운 상황이라고 해놓고도,\nNaito: (Standing up) Yoshida. Even though you say Shimizu is in a difficult situation,", "suggestedCue": 438}, {"id": 536, "n": 537, "type": "dialogue", "text": "Bạn không quan tâm đến hợp đồng này.\n이 계약에는 관심이 없었잖아요.\nYou weren't interested in this contract.", "suggestedCue": 62}, {"id": 537, "n": 538, "type": "dialogue", "text": "Bởi vì nó có thể lấp đầy màn trình diễn của bạn.\n당신 실적을 채울 수 있으니까.\nBecause it can fill your performance.", "suggestedCue": 62}, {"id": 538, "n": 539, "type": "dialogue", "text": "Đó là lý do tôi muốn ký hợp đồng này vì tôi có thể đến Tokyo.\n그래서 도쿄로 갈 수 있으니까, 이 계약을 하려는 거고.\nThat's why I want to sign this contract because I can go to Tokyo.", "suggestedCue": 390}, {"id": 539, "n": 540, "type": "dialogue", "text": "Yoshida: ...\n요시다: ...\nYoshida: ...", "suggestedCue": 52}, {"id": 540, "n": 541, "type": "dialogue", "text": "Ozaki: (Đứng dậy) Bình tĩnh nào. Giải thưởng Naito...\n오자키: (일어) 진정하세요. 나이토 상...\nOzaki: (Standing up) Calm down. Naito Award...", "suggestedCue": 207}, {"id": 541, "n": 542, "type": "dialogue", "text": "Naito: (đứng dậy) Cậu cũng vậy.\n나이토: (일어) 너도 마찬가지야.\nNaito: (stands up) Same goes for you.", "suggestedCue": 623}, {"id": 542, "n": 543, "type": "dialogue", "text": "Naito đứng dậy và rời đi.\n나이토, 자리에서 일어나 나선다.\nNaito stands up and leaves.", "suggestedCue": 32}, {"id": 543, "n": 544, "type": "dialogue", "text": "Sau đó, anh ấy đối mặt với Juno.\n그러다, 주노와 마주 서게 된다.\nThen, he comes face to face with Juno.", "suggestedCue": 69}, {"id": 544, "n": 545, "type": "dialogue", "text": "Juno: Ý bạn là bạn không thể tin tưởng tôi vì bạn đang thay đổi số lượng đặt hàng?\n주노: 주문 수량을 변경하는 거 때문에, 신뢰하지 못하겠다는 겁니까?\nJuno: Are you saying you can't trust me because you're changing the order quantity?", "suggestedCue": 438}, {"id": 545, "n": 546, "type": "narration", "text": "Nếu chúng tôi cố lừa Shimizu, chúng tôi có thể mua lại thiết bị từ các công ty xe đạp khác.\n저희가 시미즈를 속이려고 했다면, 다른 사이클 회사들에서 기어를 재구매해도 됐을 겁니다.\nIf we were trying to trick Shimizu, we could have repurchased gear from other cycle companies.", "suggestedCue": 438}, {"id": 546, "n": 547, "type": "narration", "text": "Như tôi đã nói, ngành công nghiệp xe đạp Hàn Quốc đang trải qua những thăng trầm.\n말씀드렸다시피, 한국의 자전거 산업은 부침을 겪고 있으니까요.\nAs I said, the Korean bicycle industry is going through ups and downs.", "suggestedCue": 438}, {"id": 547, "n": 548, "type": "narration", "text": "Phiên dịch viên số 1 nhanh chóng đến gần, đứng đằng sau Naito và thì thầm phiên dịch.\n통역1이 얼른 다가와 나이토 뒤에 서서 귓속말로 통역한다.\nInterpreter 1 quickly approaches, stands behind Naito, and translates in a whisper.", "suggestedCue": 438}, {"id": 548, "n": 549, "type": "dialogue", "text": "Naito: (Đứng dậy) Dù sao thì, nếu nó thay đổi như thế này, chẳng phải nó có thể thay đổi lần nữa sao?\n나이토: (일어) 어쨌든, 이렇게 바꾸는 거면, 또 바뀔 수도 있는 거 아닙니까?\nNaito: (Standing up) Anyway, if it changes like this, doesn't it mean it can change again?", "suggestedCue": 439}, {"id": 549, "n": 550, "type": "dialogue", "text": "Không có điểm nào trong việc thực hiện một hợp đồng như vậy.\n그런 계약은 할 의미가 없습니다.\nThere is no point in making such a contract.", "suggestedCue": 438}, {"id": 550, "n": 551, "type": "dialogue", "text": "Phiên dịch 1: Nếu có thể thay đổi như thế này thì việc gia hạn hợp đồng cũng chẳng có ý nghĩa gì.\n통역1: 이렇게 바꿀 수 있는 거라면, 계약을 다시 할 의미가 없습니다.\nInterpreter 1: If it can be changed like this, there is no point in renewing the contract.", "suggestedCue": 439}, {"id": 551, "n": 552, "type": "dialogue", "text": "Juno: Đó là lý do tại sao hôm nay tôi ký hợp đồng.\n주노: 그렇기 때문에, 오늘 계약서를 쓰는 겁니다.\nJuno: That's why I'm signing the contract today.", "suggestedCue": 440}, {"id": 552, "n": 553, "type": "narration", "text": "Hợp đồng là một lời hứa phải được giữ nhưng nó cũng đặt ra một hình phạt phải trả nếu vi phạm.\n계약은 지켜야 할약속이기도 하지만, 어겼을 시에 물어야 할 패널티도 정하는 거니까요.\nA contract is a promise that must be kept, but it also sets a penalty to be paid if it is broken.", "suggestedCue": 440}, {"id": 553, "n": 554, "type": "dialogue", "text": "Naito: (Đứng dậy) Tôi không biết chuyện đó.\n나이토: (일어) 그런 건 난 모릅니다.\nNaito: (Standing up) I don't know about that.", "suggestedCue": 144}, {"id": 554, "n": 555, "type": "narration", "text": "Tuy nhiên, chúng tôi biết rằng một công ty đã thất hứa một lần sẽ thất hứa lần nữa.\n하지만, 한 번 약속을 어긴 회사가 또약속을 어길 거라는 건 압니다.\nHowever, we know that a company that has broken its promise once will break its promise again.", "suggestedCue": 441}, {"id": 555, "n": 556, "type": "dialogue", "text": "Phiên dịch viên 2: Người ta nói rằng nếu bạn thất hứa một lần... bạn có thể thất hứa lần nữa.\n통역2: 한 번 약속을 어겼으면... 또 어길 수 있다고 말씀하십니다.\nInterpreter 2: They say that if you break a promise once... you can break it again.", "suggestedCue": 441}, {"id": 556, "n": 557, "type": "dialogue", "text": "Naito vượt qua Juno và đi ra ngoài.\n나이토, 주노를 지나쳐 나가버린다.\nNaito passes Juno and goes out.", "suggestedCue": 351}, {"id": 557, "n": 558, "type": "dialogue", "text": "Juno nhìn thấy 'hình ngựa' trên quần áo đi làm của Naito khi cô đi ngang qua.\n주노, 지나치는 나이토의 작업복에 ‘말 문양’을 본다.\nJuno sees a ‘horse pattern’ on Naito’s work clothes as she passes by.", "suggestedCue": 438}, {"id": 558, "n": 559, "type": "dialogue", "text": "27. Phòng họp, Trụ sở Shimizu (Nhật Bản) (ngày)\n27. 회의실, 시미즈 본사 ( 일본 ) ( 낮 )\n27. Conference room, Shimizu Headquarters (Japan) (day)", "suggestedCue": 140}, {"id": 559, "n": 560, "type": "dialogue", "text": "Yoshida cúi đầu xin lỗi Juno và Juno cũng cúi đầu đáp lại.\n요시다가 주노를 향해 고개 숙이며 사과하고, 주노도 목례로 답한다.\nYoshida bows his head to Juno and apologizes, and Juno also bows in response.", "suggestedCue": 247}, {"id": 560, "n": 561, "type": "narration", "text": "Phía sau Juno là Sunyoung, Minjeong và Jinsu, phía sau Yoshida là Ozaki và Hirose.\n주노 뒤에는 순영, 민정, 진수가 서 있고, 요시다 뒤로는 오자키, 히로세가 서 있다.\nBehind Juno are Sunyoung, Minjeong, and Jinsu, and behind Yoshida are Ozaki and Hirose.", "suggestedCue": 23}, {"id": 561, "n": 562, "type": "dialogue", "text": "Yoshida: (tiếng Anh) Tôi xin lỗi.\n요시다: (영어) 죄송합니다.\nYoshida: (English) I'm sorry.", "suggestedCue": 52}, {"id": 562, "n": 563, "type": "narration", "text": "Hợp đồng thay đổi số lượng cung được thiết kế để quản lý các vấn đề cung và cầu.\n공급 수량 변경 계약은 수급의 문제를 관리하는 차원에서,\nSupply quantity change contracts are designed to manage supply and demand issues.", "suggestedCue": 438}, {"id": 563, "n": 564, "type": "narration", "text": "Một con tem từ người quản lý nhà máy sản xuất là hoàn toàn cần thiết... Tôi xin lỗi vì mọi chuyện lại kết thúc như thế này.\n생산공장장의 도장이 반드시 필요합니다만... 일이 이렇게 되어 죄송합니다.\nA stamp from the production plant manager is absolutely necessary... I'm sorry that things ended up like this.", "suggestedCue": 390}, {"id": 564, "n": 565, "type": "dialogue", "text": "Juno: (tiếng Anh) Tôi nghĩ có lý do khiến ông Naito lại xuất hiện như thế này.\n주노: (영어) 나이토 씨가 이렇게 나오는 데는 이유가 있을 거 같은데요.\nJuno: (English) I think there is a reason why Mr. Naito appears like this.", "suggestedCue": 390}, {"id": 565, "n": 566, "type": "dialogue", "text": "Yoshida: (tiếng Anh) Tôi không biết tại sao, nhưng...\n요시다: (영어) 이유는 저도 알 수 없지만...\nYoshida: (English) I don't know why, but...", "suggestedCue": 343}, {"id": 566, "n": 567, "type": "dialogue", "text": "Ông Naito là một nghệ nhân đã làm bánh răng qua nhiều thế hệ.\n나이토씨는 대대로 기어를 만드는 장인입니다.\nMr. Naito is a craftsman who has been making gears for generations.", "suggestedCue": 538}, {"id": 567, "n": 568, "type": "dialogue", "text": "Vì vậy, tôi rất cứng đầu...\n그래서 자기만의 고집이 강하고...\nSo, I am very stubborn...", "suggestedCue": 57}, {"id": 568, "n": 569, "type": "dialogue", "text": "Thiếu tư duy kinh doanh.\n비즈니스 마인드가 부족합니다.\nLack of business mindset.", "suggestedCue": 445}, {"id": 569, "n": 570, "type": "dialogue", "text": "Juno: (tiếng Anh) Bố mẹ anh Naito cũng làm đồ nghề à?\n주노: (영어) 나이토 씨의 부모님도 기어를 만드셨단 말인가요?\nJuno: (English) Mr. Naito’s parents also made gear?", "suggestedCue": 538}, {"id": 570, "n": 571, "type": "dialogue", "text": "Yoshida: (Tiếng Anh) Mặc dù không chế tạo bánh răng nhưng cha của ông Naito cũng là một thợ thủ công chính xác.\n요시다: (영어) 기어를 만드신 건 아니었지만 나이토 씨의 아버지께서도 정밀 세공을 하는 장인이었습니다.\nYoshida: (English) Although he did not make gears, Mr. Naito's father was also a precision craftsman.", "suggestedCue": 544}, {"id": 571, "n": 572, "type": "dialogue", "text": "Bạn đã tự mình vận hành nhà máy.\n직접 공장을 운영하셨고요.\nYou operated the factory yourself.", "suggestedCue": 23}, {"id": 572, "n": 573, "type": "dialogue", "text": "Juno: (tiếng Anh) Bộ quần áo đi làm mà Naito-san đang mặc có lẽ là...\n주노: (영어) 나이토 상이 입고 있던 작업복은 아마도...\nJuno: (English) The work clothes Naito-san was wearing were probably...", "suggestedCue": 457}, {"id": 573, "n": 574, "type": "dialogue", "text": "Chắc nó đến từ công ty mà bố tôi điều hành.\n아버지가 운영하시던 회사의 것이겠군요.\nIt must be from the company my father ran.", "suggestedCue": 21}, {"id": 574, "n": 575, "type": "dialogue", "text": "Yoshida: (tiếng Anh) Vâng. Nhà máy đó hiện là nhà máy của Shimizu.\n요시다: (영어) 네. 그 공장이 현재 시미즈의 공장입니다.\nYoshida: (English) Yes. That factory is currently Shimizu's factory.", "suggestedCue": 438}, {"id": 575, "n": 576, "type": "dialogue", "text": "28. Xe tải của Naito (Nhật Bản) (Ngày)\n28. 나이토의 트럭 ( 일본 ) ( 낮 )\n28. Naito's Truck (Japan) (Day)", "suggestedCue": 681}, {"id": 576, "n": 577, "type": "dialogue", "text": "Yoshida (giọng nói): (Tiếng Anh) Ông Naito đã điều hành nhà máy qua nhiều thế hệ.\n요시다(소리): (영어) 나이토 씨가 대를 이어서 공장을 운영하는 셈이고요.\nYoshida (voice): (English) Mr. Naito has been running the factory for generations.", "suggestedCue": 461}, {"id": 577, "n": 578, "type": "dialogue", "text": "Naito đi đến nhà máy. Anh ấy có một biểu hiện gắt gỏng.\n공장으로 향하는 나이토. 심술이 난 표정이다.\nNaito heads to the factory. He has a grumpy expression.", "suggestedCue": 544}, {"id": 578, "n": 579, "type": "dialogue", "text": "Đôi bàn tay thô ráp cầm vô lăng phủ đầy bụi sắt.\n운전대를 잡은 거친 손에는 쇳가루가 잔뜩 묻어 있다.\nThe rough hands holding the steering wheel are covered in iron dust.", "suggestedCue": 281}, {"id": 579, "n": 580, "type": "dialogue", "text": "Yoshida (giọng nói): (tiếng Anh) Tôi nghĩ Nhật Bản được duy trì là nhờ những người thợ thủ công đó.\n요시다(소리): (영어) 일본은 그런 장인들 덕분에 유지되고 있다고 생각합니다.\nYoshida (voice): (English) I think Japan is maintained thanks to those craftsmen.", "suggestedCue": 136}, {"id": 580, "n": 581, "type": "dialogue", "text": "Xe tải của Naito tiến vào nhà máy Shimizu.\n나이토의 트럭이 시미즈 공장으로 들어선다.\nNaito's truck enters the Shimizu factory.", "suggestedCue": 461}, {"id": 581, "n": 582, "type": "dialogue", "text": "29. Bãi đỗ xe, Nhà máy Shimizu (Nhật Bản) (ngày)\n29. 주차장, 시미즈 공장 ( 일본 ) ( 낮 )\n29. Parking lot, Shimizu Factory (Japan) (day)", "suggestedCue": 681}, {"id": 582, "n": 583, "type": "narration", "text": "Naito xuống chiếc xe tải đang đậu và đi về phía nhà máy với vẻ mặt nghiêm nghị.\n주차된 트럭에서 내리는 나이토, 굳은 표정으로 공장으로 향한다.\nNaito gets off the parked truck and heads toward the factory with a stern expression.", "suggestedCue": 438}, {"id": 583, "n": 584, "type": "narration", "text": "Lúc đó, một đứa trẻ (con trai Naito, sau đây gọi là Can) chạy về phía Naito.\n그때, 한 아이(나이토의 아들, 이하 캔)가 나이토에게 달려간다.\nAt that time, a child (Naito's son, hereinafter referred to as Can) runs towards Naito.", "suggestedCue": 390}, {"id": 584, "n": 585, "type": "dialogue", "text": "Can: (đứng dậy) Bố ơi!\n캔: (일어) 아빠!\nCan: (stands up) Dad!", "suggestedCue": 28}, {"id": 585, "n": 586, "type": "narration", "text": "Naito phát hiện ra chiếc lon và vẻ mặt nghiêm nghị của anh nhanh chóng chuyển thành nụ cười.\n캔을 발견한 나이토, 굳은 표정은 금세 웃는 표정이 되어 있다.\nNaito discovers the can and his stern expression quickly turns into a smile.", "suggestedCue": 390}, {"id": 586, "n": 587, "type": "dialogue", "text": "Naito: (đứng dậy) Có thể! Tại sao bạn lại đến... Tôi đã bảo bạn đừng đến mà.\n나이토: (일어) 캔! 왜 왔어... 오지 말라니까.\nNaito: (stands up) Can! Why did you come... I told you not to come.", "suggestedCue": 556}, {"id": 587, "n": 588, "type": "dialogue", "text": "Can: (đứng dậy) Con ở đây với mẹ đây!\n캔: (일어) 엄마랑 왔어!\nCan: (stands up) I'm here with mom!", "suggestedCue": 390}, {"id": 588, "n": 589, "type": "narration", "text": "Naito hỏi Can tại sao lại đến nhưng để ý thấy người phụ nữ đứng đằng sau Can (sau đây gọi là bà Naito).\n나이토, 캔에게 왜 왔냐고 말하면서도, 캔 뒤에 서 있는 여자(이하, 나이토 부인)의 눈치를 본다.\nNaito asks Can why he came, but notices the woman standing behind Can (hereinafter referred to as Mrs. Naito).", "suggestedCue": 544}, {"id": 589, "n": 590, "type": "dialogue", "text": "Bà Naito gật đầu tỏ vẻ không thích.\n나이토 부인, 맘에 안 든다는 듯이 고갤 절레절레한다.\nMrs. Naito nods her head as if she doesn’t like it.", "suggestedCue": 531}, {"id": 590, "n": 591, "type": "dialogue", "text": "Lúc đó, một nhân viên nhà máy đến chào vợ chồng Naito.\n그때 공장 직원이 다가와, 나이토와 부인에게 인사한다.\nAt that time, a factory employee approaches and greets Naito and his wife.", "suggestedCue": 207}, {"id": 591, "n": 592, "type": "dialogue", "text": "Trong khi đó, Naito bí mật đưa cho Can một viên kẹo.\n그사이 나이토는 캔에게 사탕 * 하나를 몰래 건넨다.\nMeanwhile, Naito secretly gives Can a piece of candy.", "suggestedCue": 544}, {"id": 592, "n": 593, "type": "dialogue", "text": "Nhân viên nhà máy: (tiếng Nhật) Bạn đã ký hợp đồng chưa?\n공장 직원: (일어) 계약하셨어요?\nFactory Employee: (Japanese) Did you sign a contract?", "suggestedCue": 58}, {"id": 593, "n": 594, "type": "dialogue", "text": "Naito: (la hét) Không.\n나이토: (절레절레) 아니.\nNaito: (screaming) No.", "suggestedCue": 137}, {"id": 594, "n": 595, "type": "dialogue", "text": "Nhân viên nhà máy: (Đứng dậy) Chuyện gì vậy?\n공장 직원: (일어) 무슨 일 있으셨어요?\nFactory Employee: (Standing up) What happened?", "suggestedCue": 207}, {"id": 595, "n": 596, "type": "dialogue", "text": "Naito: (cười)\n나이토: (절레절레)\nNaito: (laughter)", "suggestedCue": 521}, {"id": 596, "n": 597, "type": "dialogue", "text": "Naito không thể trả lời mà chỉ đi vào trong nhà máy.\n나이토, 뭐라 답하지 못하고, 그냥 공장 안으로 향한다.\nNaito, unable to answer, just heads inside the factory.", "suggestedCue": 544}, {"id": 597, "n": 598, "type": "narration", "text": "* Kẹo lâu đời nhất của Nhật Bản. bán tại. Kẹo sữa có vẽ ký tự 'Peko'\n* 일본에서 가장 오래된 사탕. ex. ‘페코’ 캐릭터가 그려진 밀키 사탕\n* Japan's oldest candy. ex. Milky candy with ‘Peko’ character drawn on it", "suggestedCue": 344}, {"id": 598, "n": 599, "type": "dialogue", "text": "Một công nhân nhà máy đi theo anh ta.\n그를 뒤따르는 공장 직원.\nA factory worker follows him.", "suggestedCue": 136}, {"id": 599, "n": 600, "type": "dialogue", "text": "Nhân viên nhà máy: (Đứng dậy) Dạo này có quá nhiều đơn hàng bị hủy.\n공장 직원: (일어) 요즘 취소분이 너무 많아요.\nFactory Employee: (Standing up) There are too many cancellations these days.", "suggestedCue": 463}, {"id": 600, "n": 601, "type": "dialogue", "text": "Naito: (Đứng dậy) Nếu chúng ta làm tốt thì cuối cùng nó sẽ bán được.\n나이토: (일어) 우리가 잘 만들어 놓으면, 결국엔 팔리게 되어 있어.\nNaito: (Standing up) If we make it well, it will eventually sell.", "suggestedCue": 32}, {"id": 601, "n": 602, "type": "dialogue", "text": "Nhân viên nhà máy: (Đứng dậy) Kho đầy rồi.\n공장 직원: (일어) 창고도 꽉 찼다니까요.\nFactory Employee: (Standing up) The warehouse is full.", "suggestedCue": 438}, {"id": 602, "n": 603, "type": "dialogue", "text": "Naito bước vào nhà máy mà không trả lời.\n대답 없이 공장 안으로 들어서는 나이토.\nNaito enters the factory without answering.", "suggestedCue": 474}, {"id": 603, "n": 604, "type": "narration", "text": "Người nhân viên nhà máy tháo găng tay ra như thể không còn lựa chọn nào khác và đi theo Naito vào nhà máy.\n공장 직원이 어쩔 수 없다는 듯이 장갑을 털며 나이토를 따라 공장 안으로 들어선다.\nThe factory employee shakes off his gloves as if he has no choice and follows Naito into the factory.", "suggestedCue": 438}, {"id": 604, "n": 605, "type": "dialogue", "text": "30. Phòng họp, trụ sở Shimizu (montage) (Nhật Bản) (ngày)\n30. 회의실, 시미즈 본사 ( 몽타주 ) ( 일본 ) ( 낮 )\n30. Conference room, Shimizu headquarters (montage) (Japan) (day)", "suggestedCue": 140}, {"id": 605, "n": 606, "type": "dialogue", "text": "Yoshida: (Tiếng Anh) Chúng tôi không thể tiếp tục hợp đồng nữa... Chúng tôi xin lỗi.\n요시다: (영어) 저희도 더 이상 계약을 진행할 수 없는 점... 사과드립니다.\nYoshida: (English) We are unable to proceed with the contract any further... We apologize.", "suggestedCue": 465}, {"id": 606, "n": 607, "type": "dialogue", "text": "Yoshida lại cúi đầu.\n다시 고개 숙여 인사하는 요시다.\nYoshida bows again.", "suggestedCue": 52}, {"id": 607, "n": 608, "type": "dialogue", "text": "31. Bên ngoài phòng họp, Trụ sở chính Shimizu (Nhật Bản) (ban ngày)\n31. 회의실 밖, 시미즈 본사 ( 일본 ) ( 낮 )\n31. Outside the conference room, Shimizu Headquarters (Japan) (daytime)", "suggestedCue": 140}, {"id": 608, "n": 609, "type": "dialogue", "text": "Juno và nhóm rời khỏi phòng họp, Hirose theo sau.\n회의실을 나서는 주노와 팀원들, 히로세가 따라나선다.\nJuno and the team leave the conference room, and Hirose follows.", "suggestedCue": 23}, {"id": 609, "n": 610, "type": "dialogue", "text": "Hirose: Tôi sẽ tiễn bạn.\n히로세: 제가 배웅하겠습니다.\nHirose: I will see you off.", "suggestedCue": 23}, {"id": 610, "n": 611, "type": "dialogue", "text": "32. Sảnh, Trụ sở Shimizu (Nhật Bản) (ngày)\n32. 로비, 시미즈 본사 ( 일본 ) ( 낮 )\n32. Lobby, Shimizu Headquarters (Japan) (day)", "suggestedCue": 681}, {"id": 611, "n": 612, "type": "dialogue", "text": "Khi Juno và nhóm rời khỏi sảnh, họ hỏi Hirose.\n주노와 팀원들이 로비를 나서다가, 히로세에게 묻는다.\nAs Juno and the team leave the lobby, they ask Hirose.", "suggestedCue": 23}, {"id": 612, "n": 613, "type": "dialogue", "text": "Juno: Tôi muốn gặp anh Naito, có cách nào không?\n주노: 나이토 씨를 뵙고 싶은데, 방법이 없을까요?\nJuno: I want to meet Mr. Naito, is there any way?", "suggestedCue": 467}, {"id": 613, "n": 614, "type": "dialogue", "text": "Hirose: (Suy nghĩ về điều đó) ...Anh ấy thường đến làm việc ở nhà máy.\n히로세: (고민하다가) ...평소엔 공장으로 출근하십니다.\nHirose: (Thinking about it) ...He usually goes to work at the factory.", "suggestedCue": 544}, {"id": 614, "n": 615, "type": "dialogue", "text": "Ngay sau đó, một chiếc xe van dừng lại trước mặt Juno và cả nhóm.\n마침, 주노와 팀원들 앞에 서는 밴 택시.\nJust then, a van taxi stops in front of Juno and the team.", "suggestedCue": 438}, {"id": 615, "n": 616, "type": "dialogue", "text": "33. Taxi (Nhật Bản) (ngày)\n33. 택시 ( 일본 ) ( 낮 )\n33. Taxi (Japan) (day)", "suggestedCue": 681}, {"id": 616, "n": 617, "type": "dialogue", "text": "Các thành viên trong nhóm trên một chiếc xe taxi.\n밴 택시에 탄 팀원들.\nTeam members in a van taxi.", "suggestedCue": 438}, {"id": 617, "n": 618, "type": "narration", "text": "Khi Jinsu cho tài xế xem địa chỉ anh tìm thấy trên điện thoại di động, Minjeong nói:\n진수가 핸드폰으로 찾은 주소를 기사에게 보여주면, 민정이 말한다.\nWhen Jinsu shows the driver the address he found on his cell phone, Minjeong says:", "suggestedCue": 544}, {"id": 618, "n": 619, "type": "dialogue", "text": "Minjeong: (tiếng Nhật) Xin hãy đến đây.\n민정: (일어) 여기로 부탁드립니다.\nMinjeong: (Japanese) Please come here.", "suggestedCue": 172}, {"id": 619, "n": 620, "type": "dialogue", "text": "Bài báo: (tiếng Nhật) Nhà máy Shimizu.\n기사: (일어) 시미즈 공장이요.\nArticle: (Japanese) Shimizu Factory.", "suggestedCue": 461}, {"id": 620, "n": 621, "type": "dialogue", "text": "Minjeong: (Đứng dậy) À, vâng. Bạn có biết nơi này không?\n민정: (일어) 아, 네. 아시는 곳인가요?\nMinjeong: (Standing up) Ah, yes. Do you know this place?", "suggestedCue": 144}, {"id": 621, "n": 622, "type": "dialogue", "text": "Hiệp sĩ: (tiếng Nhật) Tất nhiên là tôi biết. Nó đã hơn 100 tuổi rồi.\n기사: (일어) 당연히 알죠. 100년도 넘은 곳인데.\nKnight: (Japanese) Of course I know. It's over 100 years old.", "suggestedCue": 344}, {"id": 622, "n": 623, "type": "dialogue", "text": "Taxi chạy ở ngoại ô thành phố.\n택시가 도시 외곽을 달린다.\nTaxis run on the outskirts of the city.", "suggestedCue": 409}, {"id": 623, "n": 624, "type": "dialogue", "text": "Juno: (với Soonyoung) Khi chúng ta thay mặt anh ấy nhận vật tư tăng tốc, chúng ta có thực sự cần sự cho phép của Shimizu không?\n주노: (순영에게) 우리가 스피드 물량을 대신 받을 때, 시미즈의 허락이 꼭있어야 할까요?\nJuno: (to Soonyoung) When we receive speed supplies on his behalf, do we really need Shimizu’s permission?", "suggestedCue": 470}, {"id": 624, "n": 625, "type": "dialogue", "text": "Soonyoung: Vâng. Có một lệnh cấm khá nghiêm ngặt về việc bán lại.\n순영: 네. 재판매 금지 조항이 꽤 엄격하게 들어가 있더라고요.\nSoonyoung: Yes. There was a pretty strict prohibition on resale.", "suggestedCue": 471}, {"id": 625, "n": 626, "type": "dialogue", "text": "Juno: (Gật đầu) (với Minjeong) Chúng ta không thể trì hoãn lịch trình hợp đồng được sao?\n주노: (끄덕끄덕) (민정에게) 우리 계약 일정을 늦출 순 없나요?\nJuno: (Nods) (to Minjeong) Can’t we delay our contract schedule?", "suggestedCue": 472}, {"id": 626, "n": 627, "type": "dialogue", "text": "Minjeong: Vâng. Tôi có một hợp đồng OEM tại chỗ.\n민정: 네. OEM 계약이 잡혀 있어서요.\nMinjeong: Yes. I have an OEM contract in place.", "suggestedCue": 473}, {"id": 627, "n": 628, "type": "dialogue", "text": "Juno thở dài rồi đột nhiên nhìn ra ngoài cửa sổ xe.\n주노, 한숨 쉬다가, 문득 차창 밖을 본다.\nJuno sighs, then suddenly looks out the car window.", "suggestedCue": 33}, {"id": 628, "n": 629, "type": "dialogue", "text": "Theo khung cảnh của Núi Phú Sĩ, Nhà máy Shimizu xuất hiện.\n후지산의 풍경에 이어서, 시미즈 공장이 모습을 드러낸다.\nFollowing the scenery of Mt. Fuji, the Shimizu Factory appears.", "suggestedCue": 31}, {"id": 629, "n": 630, "type": "dialogue", "text": "34. Trước nhà máy Shimizu (Nhật Bản) (ban ngày)\n34. 시미즈 공장 앞 ( 일본 ) ( 낮 )\n34. In front of Shimizu Factory (Japan) (daytime)", "suggestedCue": 681}, {"id": 630, "n": 631, "type": "dialogue", "text": "Taxi vào khu phức hợp nhà máy.\n공장 단지로 들어서는 택시.\nTaxi entering the factory complex.", "suggestedCue": 474}, {"id": 631, "n": 632, "type": "dialogue", "text": "Juno, Sunyoung, Minjeong và Jinsu bước ra khỏi taxi.\n택시에서 주노와 순영, 민정, 진수가 내린다.\nJuno, Sunyoung, Minjeong, and Jinsu get out of the taxi.", "suggestedCue": 351}, {"id": 632, "n": 633, "type": "dialogue", "text": "Một nhân viên nhà máy tiếp cận sự xuất hiện của những khách hàng xa lạ.\n낯선 손님들의 등장에, 공장 직원이 다가온다.\nA factory employee approaches the appearance of unfamiliar customers.", "suggestedCue": 439}, {"id": 633, "n": 634, "type": "dialogue", "text": "Nhân viên nhà máy: (Đứng dậy) Làm thế nào bạn đến được đây...?\n공장 직원: (일어) 어떻게 오셨습니까...?\nFactory Employee: (Standing up) How did you get here...?", "suggestedCue": 486}, {"id": 634, "n": 635, "type": "dialogue", "text": "Juno và nhóm nói xin chào.\n주노와 팀원들이 인사한다.\nJuno and the team say hello.", "suggestedCue": 474}, {"id": 635, "n": 636, "type": "narration", "text": "Hầu hết nhân viên nhà máy đều mặc đồng phục mới có chữ 'Shimizu' được viết trên đó.\n공장 직원들은 대부분 ‘시미즈’라고 적힌 새 유니폼을 입고 있다.\nMost factory employees are wearing new uniforms with ‘Shimizu’ written on them.", "suggestedCue": 438}, {"id": 636, "n": 637, "type": "dialogue", "text": "Minjeong: (tiếng Nhật) Xin chào. Chúng tôi đến từ một công ty tên là Wind ở Hàn Quốc.\n민정: (일어) 안녕하세요. 저희는 한국의 윈드라는 회사에서 온사람들입니다.\nMinjeong: (Japanese) Hello. We are from a company called Wind in Korea.", "suggestedCue": 474}, {"id": 637, "n": 638, "type": "dialogue", "text": "Tôi đang tự hỏi liệu tôi có thể gặp người quản lý nhà máy được không.\n공장장님 뵐 수 있을까 해서요.\nI was wondering if I could meet the factory manager.", "suggestedCue": 126}, {"id": 638, "n": 639, "type": "dialogue", "text": "Nhân viên nhà máy: (Đứng dậy) À... đây là những người mà anh đang cố ký hợp đồng phải không?\n공장 직원: (일어) 아... 계약하시려던 분들이시죠?\nFactory Employee: (Standing up) Ah... these are the people you were trying to sign a contract with, right?", "suggestedCue": 474}, {"id": 639, "n": 640, "type": "dialogue", "text": "Juno: (Đứng dậy) Vâng.\n주노: (일어) 네.\nJuno: (Standing up) Yes.", "suggestedCue": 0}, {"id": 640, "n": 641, "type": "narration", "text": "Các nhân viên nhà máy gật đầu như thể họ biết cảm giác của Juno và nhóm rồi tiến vào trong nhà máy.\n공장 직원, 주노와 팀원들의 심정을 안다는 듯이 고갤 끄덕이며, 공장 안으로 향한다.\nThe factory employees nod as if they know how Juno and the team feel, and head inside the factory.", "suggestedCue": 144}, {"id": 641, "n": 642, "type": "dialogue", "text": "35. Bên trong nhà máy Shimizu (Nhật Bản) (ngày)\n35. 시미즈 공장 안 ( 일본 ) ( 낮 )\n35. Inside the Shimizu factory (Japan) (day)", "suggestedCue": 681}, {"id": 642, "n": 643, "type": "dialogue", "text": "Khung cảnh bên trong một nhà máy sầm uất.\n한창 바쁜 공장 안, 풍경.\nScenery inside a busy factory.", "suggestedCue": 39}, {"id": 643, "n": 644, "type": "dialogue", "text": "Naito đang quan sát xung quanh và giám sát quá trình sản xuất.\n나이토가 제작 공정을 둘러보며 감독을 하고 있다.\nNaito is looking around and supervising the production process.", "suggestedCue": 438}, {"id": 644, "n": 645, "type": "dialogue", "text": "Nhân viên nhà máy mở cửa bước vào.\n문을 열고 들어서는 공장 직원.\nFactory employees opening the door and entering.", "suggestedCue": 357}, {"id": 645, "n": 646, "type": "dialogue", "text": "36. Bên ngoài nhà máy Shimizu (Nhật Bản) (ngày)\n36. 시미즈 공장 밖 ( 일본 ) ( 낮 )\n36. Outside Shimizu Factory (Japan) (day)", "suggestedCue": 681}, {"id": 646, "n": 647, "type": "dialogue", "text": "Juno lén nhìn vào bên trong nhà máy qua cánh cửa mở.\n열린 문 사이로 공장 안을 슬쩍 살피는 주노.\nJuno peeks inside the factory through the open door.", "suggestedCue": 39}, {"id": 647, "n": 648, "type": "dialogue", "text": "Tôi nhìn thấy một khung tranh có chữ ‘Ongojishin’ treo ở góc phòng.\n구석에 ‘온고지신’이라 적힌 액자 하나가 걸려 있는 걸 본다.\nI see a picture frame with ‘Ongojishin’ written on it hanging in the corner.", "suggestedCue": 556}, {"id": 648, "n": 649, "type": "narration", "text": "Trong khi đó, Naito, người nghe thấy những gì nhân viên nhà máy nói, đi ra cửa và đối mặt với Juno và cả nhóm.\n그사이, 공장 직원의 말을 들은 나이토가 문을 나서고, 주노와 팀원들을 마주한다.\nMeanwhile, Naito, who heard what the factory employee said, goes out the door and faces Juno and the team.", "suggestedCue": 39}, {"id": 649, "n": 650, "type": "dialogue", "text": "Naito: (Đứng dậy) Cậu đến đây mà không hẹn trước.\n나이토: (일어) 약속도 없이 찾아오다니.\nNaito: (Standing up) You came here without an appointment.", "suggestedCue": 247}, {"id": 650, "n": 651, "type": "dialogue", "text": "Minjeong: Anh đến mà không hẹn trước...\n민정: 약속 없이 찾아왔다고...\nMinjeong: You came without an appointment...", "suggestedCue": 247}, {"id": 651, "n": 652, "type": "dialogue", "text": "Juno cúi chào Naito.\n주노, 나이토에게 고개 숙여 인사한다.\nJuno bows to Naito.", "suggestedCue": 477}, {"id": 652, "n": 653, "type": "dialogue", "text": "Juno: (tiếng Nhật) Tôi xin lỗi. Tôi có chuyện muốn hỏi.\n주노: (일어) 죄송합니다. 물어볼 게 있어서요.\nJuno: (Japanese) I'm sorry. I have something to ask.", "suggestedCue": 145}, {"id": 653, "n": 654, "type": "dialogue", "text": "Người trong nhà máy tụ tập lại với nhau.\n공장 사람들이 모여든다.\nFactory people gather together.", "suggestedCue": 36}, {"id": 654, "n": 655, "type": "dialogue", "text": "Naito trông có vẻ nặng nề trước sự tụ tập của công nhân nhà máy.\n나이토, 공장 사람들이 모여든 것이 부담스러운 기색이다.\nNaito looks burdened by the gathering of factory workers.", "suggestedCue": 544}, {"id": 655, "n": 656, "type": "dialogue", "text": "Naito: (Đứng dậy) ...Tôi không muốn nói gì thêm nữa. Quay lại đi.\n나이토: (일어) ...더 이상 말하고 싶지 않습니다. 돌아가세요.\nNaito: (Standing up) ...I don't want to say any more. Go back.", "suggestedCue": 531}, {"id": 656, "n": 657, "type": "dialogue", "text": "Juno nhìn thấy những người trong nhà máy đang tụ tập xung quanh.\n주노, 주변에 모여든 공장 사람들을 본다.\nJuno sees the factory people gathered around.", "suggestedCue": 36}, {"id": 657, "n": 658, "type": "dialogue", "text": "Naito, vung vẩy và quay lại đi.\n나이토, 휙 하고 돌아간다.\nNaito, swish and go back.", "suggestedCue": 477}, {"id": 658, "n": 659, "type": "dialogue", "text": "Minjeong: (Như đang gọi) (Nói) Naito-san.\n민정: (불러 세우듯이) (일어) 나이토 상.\nMinjeong: (As if calling out) (Speaking) Naito-san.", "suggestedCue": 438}, {"id": 659, "n": 660, "type": "dialogue", "text": "Naito phớt lờ lời nói của Minjeong và bỏ đi.\n나이토가 민정의 말을 무시하고 간다.\nNaito ignores Minjeong’s words and goes.", "suggestedCue": 129}, {"id": 660, "n": 661, "type": "narration", "text": "Juno và cả nhóm cũng quay lại... và nhìn thấy một đứa trẻ đang trốn trong nhà máy, chỉ thò đầu ra ngoài.\n주노와 팀원들도 돌아서는데... 공장에 몸을 숨긴 채 고개만 내밀고 있는 한 아이를 본다.\nJuno and the team also turn around... and see a child hiding in the factory, only sticking his head out.", "suggestedCue": 247}, {"id": 661, "n": 662, "type": "dialogue", "text": "Đó là một cái lon. Sunyoung nhìn theo ánh mắt của Juno cũng tìm được một cái lon.\n캔이다. 주노의 시선을 쫓은 순영도 캔을 발견하고.\nIt's a can. Sunyoung, who followed Juno's gaze, also found a can.", "suggestedCue": 62}, {"id": 662, "n": 663, "type": "dialogue", "text": "Soonyoung: Ờ. Dễ thương quá.\n순영: 엇. 귀요미.\nSoonyoung: Ugh. Cutie.", "suggestedCue": 193}, {"id": 663, "n": 664, "type": "narration", "text": "Can, người giao tiếp bằng mắt với Juno, chạy về phía Naito như thể xấu hổ và trốn đằng sau Naito.\n주노와 눈이 마주친 캔, 당황한 듯이 나이토에게 달려가, 나이토 뒤로 몸을 숨긴다.\nCan, who makes eye contact with Juno, runs towards Naito as if embarrassed, and hides behind Naito.", "suggestedCue": 438}, {"id": 664, "n": 665, "type": "dialogue", "text": "Juno, tôi nhận ra khung cảnh này quen quen.\n주노, 그 풍경이 낯익다는 걸 깨닫는다.\nJuno, I realize that the scene is familiar.", "suggestedCue": 33}, {"id": 665, "n": 666, "type": "dialogue", "text": "Naito: (nói với công nhân) (đứng dậy) Bạn đang làm gì vậy?! Hẹn gặp lại bạn nhanh chóng!\n나이토: (공장 직원에게) (일어) 뭐 해?! 빨리 배웅해 드려!\nNaito: (to factory worker) (stands up) What are you doing?! See you off quickly!", "suggestedCue": 386}, {"id": 666, "n": 667, "type": "dialogue", "text": "Juno chào Naito lần nữa và mỉm cười với cái lon.\n주노, 나이토에게 다시 인사하며, 캔을 향해 미소 짓는다.\nJuno greets Naito again and smiles at the can.", "suggestedCue": 141}, {"id": 667, "n": 668, "type": "dialogue", "text": "Chào Juno và những công nhân nhà máy đi ngang qua.\n주노에게 인사하고 지나쳐 가는 공장 직원에게.\nSay hello to Juno and to the factory workers passing by.", "suggestedCue": 438}, {"id": 668, "n": 669, "type": "dialogue", "text": "Juno: Ngày mai cậu có đi làm không?\n주노: 내일 출근하시나요?\nJuno: Are you going to work tomorrow?", "suggestedCue": 478}, {"id": 669, "n": 670, "type": "dialogue", "text": "Minjeong: (Đứng dậy) Ngày mai cậu cũng đi làm à?\n민정: (일어) 혹시 내일도 출근하시나요?\nMinjeong: (Standing up) Are you going to work tomorrow too?", "suggestedCue": 478}, {"id": 670, "n": 671, "type": "dialogue", "text": "Nhân viên nhà máy: (Tiếng Nhật) Quản lý nhà máy đến làm việc hàng ngày.\n공장 직원: (일어) 공장장님은 매일 출근하십니다.\nFactory Employee: (Japanese) The factory manager comes to work every day.", "suggestedCue": 480}, {"id": 671, "n": 672, "type": "dialogue", "text": "37. Taxi (Nhật Bản) (lúc hoàng hôn)\n37. 택시 ( 일본 ) ( 해 질 녘 )\n37. Taxi (Japan) (at sunset)", "suggestedCue": 671}, {"id": 672, "n": 673, "type": "dialogue", "text": "Trên đường trở về khách sạn.\n호텔로 돌아가는 길.\nOn the way back to the hotel.", "suggestedCue": 126}, {"id": 673, "n": 674, "type": "dialogue", "text": "Juno: (Suy nghĩ) Tên của CEO Park Rae-kyung có trong hợp đồng phải không?\n주노: (생각하다가) 계약서에는 박래경 대표님 이름도 있죠?\nJuno: (Thinking) CEO Park Rae-kyung’s name is in the contract, right?", "suggestedCue": 481}, {"id": 674, "n": 675, "type": "dialogue", "text": "Soonyoung: Vâng. Có tên và chữ ký của CEO Park Rae-kyung.\n순영: 네. 박래경 대표님 성함과 사인이 있었습니다.\nSoonyoung: Yes. There was CEO Park Rae-kyung’s name and autograph.", "suggestedCue": 482}, {"id": 675, "n": 676, "type": "dialogue", "text": "Juno: (Với Minjeong) Trụ sở chính hỏi liệu đó có phải là công ty sản xuất xe đạp không.\n주노: (민정에게) 본사에서, 사이클 만드는 회사가 맞냐고 물었잖아요.\nJuno: (To Minjeong) The headquarters asked if it was a company that made cycles.", "suggestedCue": 483}, {"id": 676, "n": 677, "type": "dialogue", "text": "Trước khi dán tem.\n도장 찍기 전에요.\nBefore stamping it.", "suggestedCue": 169}, {"id": 677, "n": 678, "type": "dialogue", "text": "Minjeong: Vâng. Vì vậy, tôi đã giải thích rằng đúng vậy, họ cũng làm môn bắn cung.\n민정: 네. 그래서 맞다, 양궁도 만든다고 설명 드렸습니다.\nMinjeong: Yes. So, I explained that yes, they also make archery.", "suggestedCue": 485}, {"id": 678, "n": 679, "type": "dialogue", "text": "Juno: (gật đầu)\n주노: (끄덕끄덕)\nJuno: (nods)", "suggestedCue": null}, {"id": 679, "n": 680, "type": "dialogue", "text": "38. Phòng của Juno, khách sạn (Nhật Bản) (đêm)\n38. 주노의 방, 호텔 ( 일본 ) ( 밤 )\n38. Juno’s room, hotel (Japan) (night)", "suggestedCue": 671}, {"id": 680, "n": 681, "type": "dialogue", "text": "Juno đang nghe điện thoại để xử lý hộ chiếu của cô ấy.\n주노가 여권을 챙기며 통화 중이다.\nJuno is on the phone taking care of her passport.", "suggestedCue": 578}, {"id": 681, "n": 682, "type": "dialogue", "text": "Rae-kyung Park (gọi điện): Làm thế nào...hợp đồng diễn ra tốt đẹp?\n박래경(통화): 어떻게... 계약이 잘됐을까요?\nRae-kyung Park (phone call): How...did the contract go well?", "suggestedCue": 531}, {"id": 682, "n": 683, "type": "dialogue", "text": "Juno: Tôi không thể. Xin lỗi.\n주노: 못 했습니다. 죄송합니다.\nJuno: I couldn't. sorry.", "suggestedCue": 441}, {"id": 683, "n": 684, "type": "dialogue", "text": "Rae-kyung Park (nói chuyện điện thoại): À... sao chuyện đó lại xảy ra vậy...\n박래경(통화): 아... 어쩌다가...\nRae-kyung Park (on the phone): Ah... how did it happen...", "suggestedCue": 144}, {"id": 684, "n": 685, "type": "dialogue", "text": "Juno: Giám đốc nhà máy là một thợ thủ công kim loại và ông ấy phản đối việc đó.\n주노: 공장장님이 금속 세공 장인이신데, 반대를 하고 계셔서요.\nJuno: The factory manager is a metalwork craftsman, and he is opposed to it.", "suggestedCue": 489}, {"id": 685, "n": 686, "type": "dialogue", "text": "Rae-kyung Park (qua điện thoại): À... Nhật Bản có thể làm được điều đó.\n박래경(통화): 아... 일본은 그럴 수 있죠.\nRae-kyung Park (via phone): Ah... Japan can do that.", "suggestedCue": 547}, {"id": 686, "n": 687, "type": "dialogue", "text": "Ở đó, có rất nhiều niềm tự hào giữa những người thợ thủ công.\n거기가, 장인들 프라이드가 상당하거든요.\nThere, there is a lot of pride among the craftsmen.", "suggestedCue": 491}, {"id": 687, "n": 688, "type": "dialogue", "text": "Ngay cả
