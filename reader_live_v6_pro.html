khi tôi sống ở Daichi, tôi cũng gặp khó khăn vì điều đó.\n제가 다이치 살 때도, 그거 때문에 애먹었거든요.\nEven when I lived at Daichi, I had a hard time because of that.", "suggestedCue": 492}, {"id": 688, "n": 689, "type": "dialogue", "text": "Juno: Tôi đoán vậy.\n주노: 그러셨겠네요.\nJuno: I guess so.", "suggestedCue": null}, {"id": 689, "n": 690, "type": "dialogue", "text": "39. Văn phòng đại diện > Phòng triển lãm, Trụ sở Gió (ban đêm)\n39. 대표실 > 전시실, 윈드 본사 ( 밤 )\n39. Representative Office > Exhibition Room, Wind Headquarters (night)", "suggestedCue": 140}, {"id": 690, "n": 691, "type": "dialogue", "text": "văn phòng đại diện\n대표실\nrepresentative office", "suggestedCue": 34}, {"id": 691, "n": 692, "type": "dialogue", "text": "Park Rae-kyung đang nói chuyện điện thoại.\n통화하는 박래경.\nPark Rae-kyung talking on the phone.", "suggestedCue": 550}, {"id": 692, "n": 693, "type": "dialogue", "text": "Park Rae-Kyung: Đúng vậy. Cho đến đầu những năm 90, Daichi là số một về môn bắn cung.\n박래경: 네. 90년대 초까지, 양궁으로는 다이치가 1등이었죠.\nRae-Kyung Park: Yes. Until the early 90s, Daichi was number one in archery.", "suggestedCue": 495}, {"id": 693, "n": 694, "type": "dialogue", "text": "Tuy nhiên, trong số những người chơi, thị trường đã bị mất vào tay chúng tôi.\n근데, 선수들 사이에서는 이미 우리한테 시장을 뺏기고 있었어요.\nHowever, among players, the market was already being lost to us.", "suggestedCue": 496}, {"id": 694, "n": 695, "type": "narration", "text": "Cuối cùng, tình hình của Daichi trở nên tồi tệ hơn nên anh đã giải thể công ty.\n결국엔 다이치 상황이 안 좋아져서, 회사를 내놓은 거고요.\nIn the end, Daichi's situation got worse, so he put the company down.", "suggestedCue": 497}, {"id": 695, "n": 696, "type": "dialogue", "text": "Juno (trên điện thoại): Vậy là CEO đã tiếp quản.\n주노(통화): 그래서, 대표님이 인수하신 거군요.\nJuno (on phone): So, the CEO took over.", "suggestedCue": 498}, {"id": 696, "n": 697, "type": "dialogue", "text": "Park Rae-Kyung: Đúng vậy. Tuy nhiên, tôi không mua nó vì tôi cần công nghệ của Daichi.\n박래경: 네. 근데, 저도 다이치 기술이 필요해서 산 건 아니었습니다.\nRae-Kyung Park: Yes. However, I didn't buy it because I needed Daichi's technology.", "suggestedCue": 499}, {"id": 697, "n": 698, "type": "dialogue", "text": "Vào thời điểm đó, Wind đã đi trước về mặt công nghệ.\n그때, 이미 기술로는 윈드가 앞서가고 있었거든요.\nAt that time, Wind was already ahead in terms of technology.", "suggestedCue": 500}, {"id": 698, "n": 699, "type": "dialogue", "text": "Juno (trên điện thoại): Vậy tại sao bạn lại mua nó?\n주노(통화): 그럼, 왜 사셨습니까?\nJuno (on phone): Then why did you buy it?", "suggestedCue": 501}, {"id": 699, "n": 700, "type": "dialogue", "text": "hành lang\n복도\nhallway", "suggestedCue": null}, {"id": 700, "n": 701, "type": "dialogue", "text": "Park Rae-kyung rời văn phòng đại diện.\n박래경이 대표실을 나선다.\nRae-kyung Park leaves the representative office.", "suggestedCue": 531}, {"id": 701, "n": 702, "type": "narration", "text": "Và nơi mà Rae-kyung Park hướng tới là phòng triển lãm nơi treo các khung tranh.\n그리고, 박래경이 향하는 곳은 액자가 걸려 있는 전시실이다.\nAnd, the place Rae-kyung Park heads to is the exhibition room where the picture frames are hanging.", "suggestedCue": 531}, {"id": 702, "n": 703, "type": "dialogue", "text": "Park Rae-kyung (lồng tiếng): Bởi vì Daichi có danh tiếng.\n박래경(소리): 아무래도 다이치가 가지고 있던 명성이 있었으니까요.\nPark Rae-kyung (voice): Because Daichi had a reputation.", "suggestedCue": 502}, {"id": 703, "n": 704, "type": "narration", "text": "Tôi nghĩ rằng nếu nó được người khác mua lại, danh tiếng của nó có thể nhanh chóng đuổi kịp Gió.\n다른 데서 인수를 하게 되면, 그 명성으로 금방 윈드를 따라잡을 수도 있다고 봤습니다.\nI thought that if it were acquired by someone else, its reputation could quickly catch up with Wind.", "suggestedCue": 502}, {"id": 704, "n": 705, "type": "dialogue", "text": "Juno (giọng nói): Vậy là cậu chiếm nó vì mục đích phòng thủ.\n주노(소리): 방어 차원에서 인수하셨다는 거군요.\nJuno (voice): So you took it over for defensive purposes.", "suggestedCue": 503}, {"id": 705, "n": 706, "type": "dialogue", "text": "Rae-kyung Park (âm thanh): Vâng. Nhưng lúc đó Daichi đề nghị với tôi điều đó như một điều kiện để tiếp quản.\n박래경(소리): 네. 근데, 그때 다이치가 저에게 인수 조건으로 그걸 내걸더라고요.\nRae-kyung Park (sound): Yes. But, at that time, Daichi offered me that as a condition for taking over.", "suggestedCue": 504}, {"id": 706, "n": 707, "type": "dialogue", "text": "‘Xin hãy bắn cung giỏi hơn Daichi’. Lúc đầu tôi hơi bối rối.\n‘다이치보다 좋은 양궁을 만들어 달라’라고요. 첨엔 좀당혹스러웠어요.\n‘Please make archery better than Daichi’. I was a little perplexed at first.", "suggestedCue": 504}, {"id": 707, "n": 708, "type": "narration", "text": "Lúc đầu tôi tưởng anh ấy đang nói dối. Bây giờ khi nghĩ lại, tôi tự hỏi liệu điều đó có chân thành hay không.\n처음엔 허세를 부리나보다 했죠. 지금 생각해 보면, 그게 진심이 아니었을까 싶어요.\nAt first, I thought he was bluffing. When I think about it now, I wonder if that was sincere.", "suggestedCue": 506}, {"id": 708, "n": 709, "type": "narration", "text": "Park Rae-kyung đi ngang qua phòng triển lãm, lướt qua những bức ảnh của những vận động viên giành huy chương vàng bắn cung được trưng bày và đứng trước bức ảnh kỷ niệm ngày Daiichi tiếp quản.\n전시실을 지나는 박래경, 전시된 양궁 금메달리스트들의 사진을 지나 다이치를 인수하던 날 기념하는 사진 앞에 선다.\nPark Rae-kyung passes through the exhibition room, past the photos of archery gold medalists on display, and stands in front of a photo commemorating the day Daiichi took over.", "suggestedCue": 550}, {"id": 709, "n": 710, "type": "dialogue", "text": "Juno (giọng nói): Người đại diện. Tôi có thể gặp bạn một lát được không?\n주노(소리): 대표님. 잠깐 뵐 수 있을까요?\nJuno (voice): Representative. Can I see you for a moment?", "suggestedCue": 507}, {"id": 710, "n": 711, "type": "dialogue", "text": "40. Trên taxi (Nhật Bản) (đêm)\n40. 택시 안 ( 일본 ) ( 밤 )\n40. In a taxi (Japan) (night)", "suggestedCue": 681}, {"id": 711, "n": 712, "type": "dialogue", "text": "Juno nhìn ra ngoài cửa sổ.\n창밖을 보는 주노.\nJuno looks out the window.", "suggestedCue": 33}, {"id": 712, "n": 713, "type": "dialogue", "text": "Juno (la hét): Tôi đi đây.\n주노(소리): 제가 지금 가겠습니다.\nJuno (screaming): I'll go now.", "suggestedCue": 507}, {"id": 713, "n": 714, "type": "dialogue", "text": "41. Bên trong máy bay (đêm)\n41. 비행기 안 ( 밤 )\n41. Inside the airplane (night)", "suggestedCue": 39}, {"id": 714, "n": 715, "type": "dialogue", "text": "Bầu trời bên ngoài cửa sổ Juno nhìn đã trở thành bầu trời đêm.\n주노가 바라보는 창밖은 어느새 밤하늘이 되어 있다.\nThe sky outside the window Juno looks at has already become the night sky.", "suggestedCue": 474}, {"id": 715, "n": 716, "type": "dialogue", "text": "Juno ngồi trên máy bay và nhắm mắt lại một lúc.\n기내에 앉은 주노, 잠시 눈을 감는다.\nJuno sits on the plane and closes her eyes for a moment.", "suggestedCue": 247}, {"id": 716, "n": 717, "type": "dialogue", "text": "Park Rae-kyung (giọng nói): Có chuyện gì thế...\n박래경(소리): 무슨 일로 그러시는지...\nPark Rae-kyung (voice): What's the matter...", "suggestedCue": 547}, {"id": 717, "n": 718, "type": "dialogue", "text": "Juno (lồng tiếng): Đó là bức ảnh Daichi treo trong văn phòng của Wind.\n주노(소리): 윈드 사무실에 걸려 있던 다이치 사진이요.\nJuno (voice): It's the picture of Daichi hanging in Wind's office.", "suggestedCue": 509}, {"id": 718, "n": 719, "type": "dialogue", "text": "Rae-kyung Park (giọng nói): À... vâng. Điều này được thực hiện khi Daichi tiếp quản.\n박래경(소리): 아... 네. 다이치 인수할 때, 찍은 거요.\nRae-kyung Park (voice): Ah... yes. This was taken when Daichi took over.", "suggestedCue": 547}, {"id": 719, "n": 720, "type": "dialogue", "text": "Juno (giọng nói): Bố vợ của bạn có vẽ bản thiết kế trong bức ảnh đó không?\n주노(소리): 그 사진 속에 장인께서 그 설계도를 그리신 거죠?\nJuno (voice): Did your father-in-law draw the blueprint in that photo?", "suggestedCue": 511}, {"id": 720, "n": 721, "type": "dialogue", "text": "42. Showroom, Trụ sở Gió (đêm)\n42. 전시실, 윈드 본사 ( 밤 )\n42. Showroom, Wind Headquarters (night)", "suggestedCue": 140}, {"id": 721, "n": 722, "type": "narration", "text": "Park Rae-kyung đang xem bức ảnh chụp nhà máy Daiichi treo trong phòng triển lãm.\n박래경이 전시실에 걸려 있는 다이치 공장 사진을 바라보고 있다.\nRae-kyung Park is looking at a photo of the Daiichi factory hanging in the exhibition room.", "suggestedCue": 509}, {"id": 722, "n": 723, "type": "narration", "text": "Khung cảnh giống với nhà máy Shimizu. Và hình ảnh một đứa trẻ đập vào mắt tôi.\n그 풍경이 시미즈 공장의 풍경과 닮았다. 그리고, 한 꼬마의 모습이 눈에 띈다.\nThe scenery resembles that of the Shimizu factory. And, the image of a kid catches my eye.", "suggestedCue": 144}, {"id": 723, "n": 724, "type": "dialogue", "text": "Rae-kyung Park (âm thanh): Vâng. Đó là lý do tại sao tôi cũng tặng anh ấy một khung tranh làm quà.\n박래경(소리): 네. 그래서 저도 액자를 선물 드렸던 거고요.\nRae-kyung Park (sound): Yes. That's why I also gave him a picture frame as a gift.", "suggestedCue": 512}, {"id": 724, "n": 725, "type": "dialogue", "text": "Juno (giọng nói): Ongojishin.\n주노(소리): 온고지신.\nJuno (voice): Ongojishin.", "suggestedCue": 36}, {"id": 725, "n": 726, "type": "dialogue", "text": "Rae-kyung Park (âm thanh): Vâng. Bạn nhớ nhé.\n박래경(소리): 네. 기억하시네요.\nRae-kyung Park (sound): Yes. You remember.", "suggestedCue": 533}, {"id": 726, "n": 727, "type": "dialogue", "text": "Juno (giọng nói): Cậu nói là cậu tự viết phải không?\n주노(소리): 직접 쓰셨다고 했죠?\nJuno (voice): You said you wrote it yourself, right?", "suggestedCue": 515}, {"id": 727, "n": 728, "type": "dialogue", "text": "Rae-kyung Park (âm thanh): Vâng. Bố chồng tôi đã yêu cầu điều đó.\n박래경(소리): 예. 장인께서 요청하셨거든요.\nRae-kyung Park (sound): Yes. My father-in-law requested it.", "suggestedCue": 531}, {"id": 728, "n": 729, "type": "narration", "text": "Trong bức ảnh. Một khẩu hiệu chữ Trung Quốc do một nghệ nhân cầm. Đó là 'Ongojishin'.\n사진 속. 장인이 들고 있는 한자 표어. ‘온고지신’이다.\nIn the photo. A Chinese character slogan held by a craftsman. It is ‘Ongojishin’.", "suggestedCue": 556}, {"id": 729, "n": 730, "type": "dialogue", "text": "Juno (la hét): Đứa trẻ trong ảnh là con của bố vợ bạn phải không?\n주노(소리): 사진 속에 아이가 장인의 아들인 거죠?\nJuno (screaming): The child in the photo is your father-in-law’s son, right?", "suggestedCue": 517}, {"id": 730, "n": 731, "type": "dialogue", "text": "Rae-kyung Park (lồng tiếng): Đúng rồi.\n박래경(소리): 그렇죠.\nRae-kyung Park (voice): That’s right.", "suggestedCue": 533}, {"id": 731, "n": 732, "type": "dialogue", "text": "43. Sân bay Incheon (đêm)\n43. 인천공항 ( 밤 )\n43. Incheon Airport (night)", "suggestedCue": null}, {"id": 732, "n": 733, "type": "dialogue", "text": "Juno đứng ở khu vực chờ taxi sân bay.\n공항 택시 타는 기다리는 곳에 선 주노.\nJuno stands at the waiting area for an airport taxi.", "suggestedCue": 215}, {"id": 733, "n": 734, "type": "dialogue", "text": "Lên taxi.\n택시에 오른다.\nGet in a taxi.", "suggestedCue": 344}, {"id": 734, "n": 735, "type": "dialogue", "text": "Juno (giọng nói): Bạn có nhớ tên mình không?\n주노(소리): 이름, 기억나십니까?\nJuno (voice): Do you remember your name?", "suggestedCue": 519}, {"id": 735, "n": 736, "type": "dialogue", "text": "Rae-kyung Park (giọng nói): Tôi không nhớ tên con trai tôi.\n박래경(소리): 아들 이름은 기억이 안 나고요.\nRae-kyung Park (voice): I don’t remember my son’s name.", "suggestedCue": 520}, {"id": 736, "n": 737, "type": "dialogue", "text": "Tên bố vợ tôi là Daichi Naito.\n장인 선생 이름이 나이토 다이치였습니다.\nThe name of my father-in-law was Daichi Naito.", "suggestedCue": 521}, {"id": 737, "n": 738, "type": "dialogue", "text": "Juno (la hét): Tôi hiểu rồi. Tiêu biểu. Tôi nghĩ tôi cần bức ảnh đó.\n주노(소리): 그렇군요. 대표님. 그 사진이 필요할 거 같습니다.\nJuno (screaming): I see. Representative. I think I need that picture.", "suggestedCue": 523}, {"id": 738, "n": 739, "type": "dialogue", "text": "Park Rae-kyung (giọng nói): Vâng...? Bạn cần cái này?\n박래경(소리): 예...? 이게 필요하시다고요?\nPark Rae-kyung (voice): Yes...? You need this?", "suggestedCue": 524}, {"id": 739, "n": 740, "type": "dialogue", "text": "Juno (giọng nói): Vâng.\n주노(소리): 네.\nJuno (voice): Yes.", "suggestedCue": 482}, {"id": 740, "n": 741, "type": "dialogue", "text": "44. Showroom, Trụ sở Gió (bình minh)\n44. 전시실, 윈드 본사 ( 새벽 )\n44. Showroom, Wind Headquarters (dawn)", "suggestedCue": 140}, {"id": 741, "n": 742, "type": "dialogue", "text": "Juno bước vào phòng triển lãm.\n주노가 전시실로 들어선다.\nJuno enters the exhibition room.", "suggestedCue": 281}, {"id": 742, "n": 743, "type": "dialogue", "text": "Và chúng tôi chào hỏi Park Rae-kyung, người đang đợi.\n그리고, 기다리고 있던 박래경과 인사를 주고받는다.\nAnd, we exchange greetings with Park Rae-kyung, who was waiting.", "suggestedCue": 533}, {"id": 743, "n": 744, "type": "dialogue", "text": "Juno lấy một bức ảnh ra khỏi khung.\n주노가 액자에서 사진을 꺼낸다.\nJuno takes a picture out of the frame.", "suggestedCue": 202}, {"id": 744, "n": 745, "type": "narration", "text": "Sau đó, bọc bức ảnh bằng giấy và đặt nó vào phong bì đựng tài liệu cùng với bức thư (viết).\n그리고, 사진을 종이로 포장하고, (쓰인) 편지지와 함께 서류 봉투에 담는다.\nThen, wrap the photo in paper and place it in a document envelope along with the (written) letter.", "suggestedCue": 439}, {"id": 745, "n": 746, "type": "dialogue", "text": "45. Nhà máy Shimizu (Nhật Bản) (ngày)\n45. 시미즈 공장 ( 일본 ) ( 낮 )\n45. Shimizu Factory (Japan) (day)", "suggestedCue": 681}, {"id": 746, "n": 747, "type": "narration", "text": "Trong một nhà máy yên tĩnh, Sunyoung, Minjeong và Jinsoo đang ngồi trong khu vực nghỉ giải lao.\n한적한 공장에 순영, 민정, 진수만이 휴게 공간에 앉아 있다.\nIn a quiet factory, Sunyoung, Minjeong, and Jinsoo are sitting in the break area.", "suggestedCue": 438}, {"id": 747, "n": 748, "type": "dialogue", "text": "Naito tiến lại gần với vẻ mặt khó chịu.\n나이토가 심기가 불편한 표정으로 다가온다.\nNaito approaches with an uncomfortable expression.", "suggestedCue": 126}, {"id": 748, "n": 749, "type": "dialogue", "text": "Anh ấy đang mặc bộ quần áo lao động cũ.\n오래된 작업복 차림이다.\nHe is wearing old work clothes.", "suggestedCue": 457}, {"id": 749, "n": 750, "type": "dialogue", "text": "Soonyoung: (Cười) (Đứng lên) Cậu vẫn đi làm ngay cả trong ngày nghỉ. Bạn thật tuyệt vời.\n순영: (웃으며) (일어) 휴일에도 출근을 하시는군요. 대단하십니다.\nSoonyoung: (Laughing) (Standing up) You go to work even on holidays. You are amazing.", "suggestedCue": 390}, {"id": 750, "n": 751, "type": "dialogue", "text": "Naito: (Đứng dậy) Xin hãy rời đi ngay.\n나이토: (일어) 이제 그만 가세요.\nNaito: (Standing up) Please leave now.", "suggestedCue": 477}, {"id": 751, "n": 752, "type": "dialogue", "text": "Minjeong: (tiếng Nhật) Tôi có điều này thực sự muốn nói với bạn. Bạn có thể vui lòng đợi một chút được không?\n민정: (일어) 꼭 드리고 싶은 말이 있어서요. 조금만 기다려 주시겠습니까.\nMinjeong: (Japanese) I have something I really want to tell you. Could you please wait a moment?", "suggestedCue": 145}, {"id": 752, "n": 753, "type": "narration", "text": "Soonyoung nhìn Naito với vẻ mặt cầu xin sự hiểu biết, còn Jinsu thì kiểm tra thời gian.\n순영이 양해해 달라는 표정으로 나이토를 보고, 진수는 시간을 확인한다.\nSoonyoung looks at Naito with an expression asking for understanding, and Jinsu checks the time.", "suggestedCue": 244}, {"id": 753, "n": 754, "type": "dialogue", "text": "Tiếp theo, một chiếc taxi đi vào nhà máy và Juno bước ra ngoài.\n이어서, 택시 한 대가 공장으로 들어서고, 주노가 내린다.\nNext, a taxi enters the factory, and Juno gets out.", "suggestedCue": 211}, {"id": 754, "n": 755, "type": "dialogue", "text": "Naito và đồng đội đứng dậy khỏi chỗ ngồi.\n자리에서 일어나는 나이토와 팀원들.\nNaito and his teammates get up from their seats.", "suggestedCue": 21}, {"id": 755, "n": 756, "type": "dialogue", "text": "Juno xuống taxi và chào Naito.\n택시에서 내린 주노가 나이토를 향해 인사한다.\nJuno gets off the taxi and greets Naito.", "suggestedCue": 23}, {"id": 756, "n": 757, "type": "dialogue", "text": "Juno đang cầm một phong bì đựng tài liệu.\n주노는 서류 봉투를 들고 있다.\nJuno is holding an envelope of documents.", "suggestedCue": 126}, {"id": 757, "n": 758, "type": "dialogue", "text": "Juno: (đứng dậy) Cảm ơn vì đã chờ đợi.\n주노: (일어) 기다려 주셔서 감사합니다.\nJuno: (standing up) Thank you for waiting.", "suggestedCue": 528}, {"id": 758, "n": 759, "type": "dialogue", "text": "Naito: (Nói) Ý bạn là gì khi nói muốn làm điều đó?\n나이토: (일어) 하고 싶다는 말이 뭡니까?\nNaito: (Speaking) What do you mean by wanting to do it?", "suggestedCue": 30}, {"id": 759, "n": 760, "type": "dialogue", "text": "Juno: Tôi muốn kiểm tra vài thứ trước.\n주노: 먼저 확인하고 싶은 게 있습니다.\nJuno: I want to check something first.", "suggestedCue": 530}, {"id": 760, "n": 761, "type": "dialogue", "text": "Sở dĩ ông Naito không muốn ký hợp đồng với chúng tôi là vì\n나이토 씨가 저희와 계약을 하지 않으려고 하는 건,\nThe reason Mr. Naito doesn't want to sign a contract with us is because", "suggestedCue": 531}, {"id": 761, "n": 762, "type": "dialogue", "text": "Có phải vì bạn tìm thấy tên của Park Rae-kyung trên hợp đồng?\n계약서에서 박래경의 이름을 발견했기 때문인가요?\nIs it because you found Park Rae-kyung’s name on the contract?", "suggestedCue": 531}, {"id": 762, "n": 763, "type": "dialogue", "text": "Minjeong: (Tiếng Nhật) Có một điều tôi muốn kiểm tra.\n민정: (일어) 확인하고 싶은 게 있습니다.\nMinjeong: (Japanese) There is something I want to check.", "suggestedCue": 530}, {"id": 763, "n": 764, "type": "narration", "text": "Ông Naito, ông từ chối hợp đồng vì tìm thấy tên Park Rae-kyung trong hợp đồng phải không?\n나이토씨가 계약을 거부하신 건, 계약서에서 박래경이라는 이름을 발견했기 때문인가요?\nMr. Naito, did you reject the contract because you found the name Park Rae-kyung in the contract?", "suggestedCue": 531}, {"id": 764, "n": 765, "type": "dialogue", "text": "Naito: ...!\n나이토: ...!\nNaito: ...!", "suggestedCue": 521}, {"id": 765, "n": 766, "type": "dialogue", "text": "Juno: Vì các hợp đồng trước đó không thay đổi số lượng nên\n주노: 예전 계약서들은 물량의 수정이 없었기 때문에,\nJuno: Because the previous contracts did not change the quantity,", "suggestedCue": 532}, {"id": 766, "n": 767, "type": "narration", "text": "Naito-san chưa có dịp nhìn thấy tên Park Rae-kyung, nhưng lần này cô ấy tham gia với tư cách là người cần được chấp thuận.\n나이토 상께서 박래경의 이름을 볼 일이 없었지만, 이번만큼은 결재가 필요한 사람으로 참여하였고,\nNaito-san had no occasion to see Park Rae-kyung's name, but this time she participated as a person who needed approval.", "suggestedCue": 533}, {"id": 767, "n": 768, "type": "dialogue", "text": "Tôi đã tìm thấy tên của Park Rae-kyung. Phải không?\n박래경의 이름을 발견했다. 아닌가요?\nI found Park Rae-kyung’s name. Isn't it?", "suggestedCue": 531}, {"id": 768, "n": 769, "type": "dialogue", "text": "Minjeong: (Tiếng Nhật) Không giống như trước đây, tôi đang tham gia vào hợp đồng sửa đổi.\n민정: (일어) 이전과는 달리, 수정 계약에 참여하게 되어,\nMinjeong: (Japanese) Unlike before, I am participating in the revised contract.", "suggestedCue": 167}, {"id": 769, "n": 770, "type": "dialogue", "text": "Tôi nghĩ đây là lần đầu tiên bạn nhìn thấy tên của Park Rae-kyung.\n박래경의 이름을 처음으로 보신 게 아닌가 합니다.\nI think this is the first time you’ve seen Park Rae-kyung’s name.", "suggestedCue": 531}, {"id": 770, "n": 771, "type": "dialogue", "text": "Naito: (Đứng dậy) Ý anh là gì?\n나이토: (일어) 그게 어쨌다는 겁니까?\nNaito: (Standing up) What do you mean?", "suggestedCue": 260}, {"id": 771, "n": 772, "type": "dialogue", "text": "Juno: Giám đốc điều hành Park Rae-kyung trước đây đã mua lại Daichi, công ty sản xuất cung tên.\n주노: 박래경 대표가 과거에 양궁을 만드는 다이치를 인수했고,\nJuno: CEO Park Rae-kyung previously acquired Daichi, which manufactures archery.", "suggestedCue": 534}, {"id": 772, "n": 773, "type": "dialogue", "text": "Vì điều đó mà Daiichi, công ty số một thế giới, biến mất.\n그 때문에 세계 1위 기업이었던 다이치는 사라졌으니까요.\nBecause of that, Daiichi, the world's number one company, disappeared.", "suggestedCue": 535}, {"id": 773, "n": 774, "type": "dialogue", "text": "Juno gật đầu với Minjeong đang do dự. Nó có nghĩa là diễn giải.\n머뭇거리는 민정에게 고갤 끄덕이는 주노. 통역을 하라는 뜻이다.\nJuno nods to the hesitant Minjeong. It means interpreting.", "suggestedCue": 556}, {"id": 774, "n": 775, "type": "dialogue", "text": "Minjeong: (Tiếng Nhật) Với việc Gió mua lại Daiichi,\n민정: (일어) 윈드가 다이치를 인수하는 것으로,\nMinjeong: (Japanese) With Wind acquiring Daiichi,", "suggestedCue": 502}, {"id": 775, "n": 776, "type": "dialogue", "text": "Daichi, công ty bắn cung số một thế giới, đã biến mất.\n세계 1위였던 양궁 회사 다이치는 사라졌으니까요.\nDaichi, the world's number one archery company, has disappeared.", "suggestedCue": 535}, {"id": 776, "n": 777, "type": "dialogue", "text": "Naito: (đứng dậy) Cái gì?!\n나이토: (일어) 뭐?!\nNaito: (stands up) What?!", "suggestedCue": 521}, {"id": 777, "n": 778, "type": "dialogue", "text": "Naito sắp nổi giận và tức giận... Juno tiếp tục.\n나이토, 발끈하며 화를 내려 하는데... 주노가 말을 잇는다.\nNaito is about to get angry and get angry... Juno continues.", "suggestedCue": 145}, {"id": 778, "n": 779, "type": "dialogue", "text": "Juno: Cha của ông Naito không phải là một cao thủ bắn cung ở Daichi sao?\n주노: 나이토 씨의 부친께선 다이치에서 양궁을 만드는 장인 아니었습니까?\nJuno: Wasn’t Mr. Naito’s father an archery master at Daichi?", "suggestedCue": 538}, {"id": 779, "n": 780, "type": "dialogue", "text": "Minjeong: (Tiếng Nhật) Cha anh không phải là cao thủ bắn cung ở Daichi sao?\n민정: (일어) 부친께서 다이치에서 양궁을 만드는 장인 아니었습니까?\nMinjeong: (Japanese) Wasn’t your father an archery master at Daichi?", "suggestedCue": 538}, {"id": 780, "n": 781, "type": "dialogue", "text": "Naito: (đứng dậy) Cậu đến đây để nói những điều như thế à?!\n나이토: (일어) 그런 소리를 하려고, 온 겁니까?!\nNaito: (stands up) Are you here to say something like that?!", "suggestedCue": 145}, {"id": 781, "n": 782, "type": "dialogue", "text": "Juno: Tôi có thứ này cho bạn.\n주노: 드릴 게 있습니다.\nJuno: I have something for you.", "suggestedCue": 543}, {"id": 782, "n": 783, "type": "dialogue", "text": "Juno, đưa tôi một phong bì.\n주노, 서류 봉투를 건넨다.\nJuno, hands me an envelope.", "suggestedCue": 247}, {"id": 783, "n": 784, "type": "dialogue", "text": "Minjeong: (Tiếng Nhật) Ah... Trưởng nhóm đã đến Hàn Quốc để giao cái này cho Naito-san.\n민정: (일어) 아... 팀장님은 나이토 상에게 이걸 전해드리려고, 한국에 다녀왔습니다.\nMinjeong: (Japanese) Ah... Team leader went to Korea to deliver this to Naito-san.", "suggestedCue": 544}, {"id": 784, "n": 785, "type": "dialogue", "text": "Chuyến bay bị hoãn nên chúng tôi đến hơi muộn. Xin hãy hiểu.\n비행기가 연착되어, 다소 늦은 거고요. 양해 부탁드립니다.\nThe flight was delayed, so we're a bit late. Please understand.", "suggestedCue": 544}, {"id": 785, "n": 786, "type": "dialogue", "text": "Naito nhìn vào chiếc phong bì.\n나이토, 서류 봉투를 쳐다본다.\nNaito looks at the envelope.", "suggestedCue": 539}, {"id": 786, "n": 787, "type": "dialogue", "text": "Naito: (tiếng Nhật) Nếu là hợp đồng thì tôi đã bảo là tôi không đóng dấu được mà.\n나이토: (일어) 계약서라면, 저는 도장을 찍을 수 없다고 말씀드렸습니다.\nNaito: (Japanese) If it's a contract, I told you I can't stamp it.", "suggestedCue": 62}, {"id": 787, "n": 788, "type": "dialogue", "text": "Juno: Đó không phải là một hợp đồng mà là một lời hứa.\n주노: 계약서는 아닙니다만, 약속에 관한 것이긴 합니다.\nJuno: It's not a contract, but it's a promise.", "suggestedCue": 544}, {"id": 788, "n": 789, "type": "dialogue", "text": "Minjeong: (Tiếng Nhật) Đây không phải là hợp đồng mà là một lời hứa.\n민정: (일어) 계약서는 아니지만, 약속에 관한 것입니다.\nMinjeong: (Japanese) It's not a contract, but it's about a promise.", "suggestedCue": 544}, {"id": 789, "n": 790, "type": "dialogue", "text": "Naito lấy phong bì và mở nó ra. Sau đó lấy ảnh ra.\n나이토가 봉투를 받아 열어본다. 그리고, 사진을 꺼낸다.\nNaito takes the envelope and opens it. Then, take out the photo.", "suggestedCue": 714}, {"id": 790, "n": 791, "type": "dialogue", "text": "Juno: Đây là cha của Naito và CEO của Wind, Park Rae-kyung từ 30 năm trước.\n주노: 나이토 상의 아버지와 윈드 박래경 대표의 30년 전 모습입니다.\nJuno: This is Naito’s father and Wind CEO Park Rae-kyung from 30 years ago.", "suggestedCue": 546}, {"id": 791, "n": 792, "type": "dialogue", "text": "Naito: ...!\n나이토: ...!\nNaito: ...!", "suggestedCue": 521}, {"id": 792, "n": 793, "type": "dialogue", "text": "Xấu hổ, Naito và Juno lần lượt xem các bức ảnh.\n당황한 나이토, 주노와 사진을 번갈아 본다.\nEmbarrassed, Naito and Juno take turns looking at the photos.", "suggestedCue": 141}, {"id": 793, "n": 794, "type": "dialogue", "text": "Juno: Lúc đó bố của Naito đã bán Daichi cho CEO Park Rae-kyung.\n주노: 당시에, 나이토 상의 부친께서는 다이치를 박래경 대표에게 매각하시면서,\nJuno: At that time, Naito’s father sold Daichi to CEO Park Rae-kyung.", "suggestedCue": 547}, {"id": 794, "n": 795, "type": "dialogue", "text": "Anh ấy trình bày một bản thiết kế bắn cung do chính anh ấy vẽ.\n본인이 직접 그린 양궁 설계도를 선물하셨습니다.\nHe presented an archery blueprint he drew himself.", "suggestedCue": 548}, {"id": 795, "n": 796, "type": "dialogue", "text": "Minjeong: (Tiếng Nhật) Lúc đó bố của Naito-san đã bán Daichi.\n민정: (일어) 당시, 나이토 상의 부친께서 다이치를 매각하시면서,\nMinjeong: (Japanese) At that time, Naito-san's father sold Daichi.", "suggestedCue": 547}, {"id": 796, "n": 797, "type": "dialogue", "text": "Anh ấy đã trình bày bản thiết kế bắn cung vẽ tay cho CEO Park Rae-kyung.\n박래경 대표에게 직접 그린 양궁 설계도를 선물하셨습니다.\nHe presented a hand-drawn archery blueprint to CEO Park Rae-kyung.", "suggestedCue": 550}, {"id": 797, "n": 798, "type": "dialogue", "text": "Juno: Với yêu cầu tạo ra môn bắn cung tốt nhất.\n주노: 최고의 양궁을 만들어 달라는 요청과 함께요.\nJuno: With a request to create the best archery.", "suggestedCue": 551}, {"id": 798, "n": 799, "type": "dialogue", "text": "Minjeong: (Tiếng Nhật) Bạn đang yêu cầu chúng tôi bắn cung giỏi nhất.\n민정: (일어) 최고의 양궁을 만들어 달라고 요청하시면서요.\nMinjeong: (Japanese) You are asking us to make the best archery.", "suggestedCue": 574}, {"id": 799, "n": 800, "type": "narration", "text": "Naito nhìn thấy Park Rae-kyung đứng trong bức ảnh cầm một bản thiết kế bắn cung.\n나이토, 사진 속 양궁 설계도를 들고 서 있는 박래경을 본다.\nNaito sees Park Rae-kyung standing in the photo holding an archery blueprint.", "suggestedCue": 550}, {"id": 800, "n": 801, "type": "dialogue", "text": "Và chúng ta thấy Naitobu đang giữ khẩu hiệu ‘Ongojishin’.\n그리고, ‘온고지신’ 표어를 들고 있는 나이토 부를 본다.\nAnd, we see Naitobu holding the motto ‘Ongojishin’.", "suggestedCue": 32}, {"id": 801, "n": 802, "type": "dialogue", "text": "Juno: Giám đốc điều hành Rae-kyung Park đã tặng khẩu hiệu này như một món quà cho cha cô ấy. Điều đó có nghĩa là Ongojishin.\n주노: 박래경 대표는 부친께 표어를 선물했고요. 그 뜻이 온고지신.\nJuno: CEO Rae-kyung Park gave the slogan as a gift to her father. That means Ongojishin.", "suggestedCue": 556}, {"id": 802, "n": 803, "type": "dialogue", "text": "Minjeong: (tiếng Nhật) Lúc đó, CEO Park Rae-kyung đã nói, ‘Học cái cũ đi,\n민정: (일어) 당시에 박래경 대표가 ‘옛것을 익히고,\nMinjeong: (Japanese) At the time, CEO Park Rae-kyung said, ‘Learn the old things,", "suggestedCue": 547}, {"id": 803, "n": 804, "type": "dialogue", "text": "Người ta nói rằng ông đã đưa ra phương châm 'Biết điều gì đó mới mẻ'.\n새로운 것을 안다’라는 표어를 선물했다고 합니다.\nIt is said that he presented the motto ‘Know something new’.", "suggestedCue": 244}, {"id": 804, "n": 805, "type": "dialogue", "text": "Chèn 〉\n인서트 〉\nInsert 〉", "suggestedCue": null}, {"id": 805, "n": 806, "type": "narration", "text": "Bên trong nhà máy. Có một phương châm, 'Hãy đi và sống thật với chính mình' ở góc.\n공장 안. 구석에 ‘온고지신’ 표어가 붙어 있다.\nInside the factory. There is a motto, ‘Go and stay true to yourself’ in the corner.", "suggestedCue": 402}, {"id": 806, "n": 807, "type": "dialogue", "text": "Một lần nữa, trước nhà máy\n다시, 공장 앞\nAgain, in front of the factory", "suggestedCue": 207}, {"id": 807, "n": 808, "type": "dialogue", "text": "Naito: (Nói) Bạn không biết rằng điều này là thiếu tôn trọng tay nghề của chúng tôi sao?\n나이토: (일어) 우리 장인 정신을 무시하는 말이라는 걸 모릅니까?\nNaito: (Speaking) Don't you know that this is disrespectful to our craftsmanship?", "suggestedCue": 343}, {"id": 808, "n": 809, "type": "dialogue", "text": "Juno: Bạn đã nghĩ vậy. Tuy nhiên, bạn vẫn đưa ra khẩu hiệu đó.\n주노: 그렇게 생각하셨군요. 그래도, 저 표어를 걸어놓으셨네요.\nJuno: You thought so. Still, you put up that slogan.", "suggestedCue": 556}, {"id": 809, "n": 810, "type": "dialogue", "text": "Minjeong: (tiếng Nhật) Tuy nhiên, có lý do gì khiến bạn đưa ra khẩu hiệu đó không?\n민정: (일어) 그럼에도 불구하고, 그 표어를 걸어놓으신 이유가 있을까요?\nMinjeong: (Japanese) Nevertheless, is there a reason you put up that slogan?", "suggestedCue": 58}, {"id": 810, "n": 811, "type": "dialogue", "text": "Naito: (Đứng dậy) Nhìn vậy, tôi cố gắng hiểu cảm giác của bố tôi mỗi ngày!\n나이토: (일어) 난 그걸 보면서, 매일 아버지의 심정을 헤아리려 했습니다!\nNaito: (Standing up) Watching that, I tried to understand how my father felt every day!", "suggestedCue": 556}, {"id": 811, "n": 812, "type": "dialogue", "text": "Khi giọng nói của Naito ngày càng to hơn,\n나이토의 언성이 높아지자,\nAs Naito’s voice grew louder,", "suggestedCue": 479}, {"id": 812, "n": 813, "type": "narration", "text": "Can, người đang trốn trong góc, lẻn đến cạnh Naito và nắm lấy tay Naito.\n구석에 숨어 있던 캔이 나이토 옆으로 슬금슬금 다가와 나이토의 손을 잡는다.\nCan, who was hiding in the corner, sneaks up next to Naito and grabs Naito's hand.", "suggestedCue": 438}, {"id": 813, "n": 814, "type": "dialogue", "text": "Minjeong mỉm cười với cái hộp như thể không sao đâu.\n민정이, 괜찮다는 듯이, 캔을 향해 미소 짓는다.\nMinjeong smiles at the can as if it’s okay.", "suggestedCue": 438}, {"id": 814, "n": 815, "type": "dialogue", "text": "Juno: Đó là điều cha Naito-san yêu cầu.\n주노: 그것은 나이토 상의 아버지께서 요청하신 말이었습니다.\nJuno: That was what Naito-san's father requested.", "suggestedCue": 558}, {"id": 815, "n": 816, "type": "dialogue", "text": "Minjeong: (Tiếng Nhật) ...Người ta nói rằng đây là điều cha tôi yêu cầu.\n민정: (일어) ...아버지께서 요청하신 말이라고 합니다.\nMinjeong: (Japanese) ...It is said that this is what my father requested.", "suggestedCue": 344}, {"id": 816, "n": 817, "type": "dialogue", "text": "Juno: Có lẽ cha cậu muốn cậu tiếp nối dòng dõi của ông ấy, nhưng đồng thời,\n주노: 아마도, 부친께서는 자신의 대를 이어주기를 바라는 동시에,\nJuno: Perhaps, your father wants you to continue his lineage, but at the same time,", "suggestedCue": 559}, {"id": 817, "n": 818, "type": "dialogue", "text": "Chẳng phải anh ấy muốn bạn đi theo con đường riêng của mình sao?\n자신만의 길을 가기를 바라신 게 아닐까요?\nDidn’t he want you to go your own way?", "suggestedCue": 560}, {"id": 818, "n": 819, "type": "dialogue", "text": "Minjeong: (tiếng Nhật) Mặc dù bố tôi muốn tôi nối bước ông,\n민정: (일어) 부친께서는 자신의 뒤를 이어주기를 바라면서도,\nMinjeong: (Japanese) Although my father wanted me to follow in his footsteps,", "suggestedCue": 559}, {"id": 819, "n": 820, "type": "dialogue", "text": "Tôi nghĩ anh ấy muốn đi một con đường mới.\n새로운 길을 가기를 바라셨을 거 같습니다.\nI think he wanted to take a new path.", "suggestedCue": 136}, {"id": 820, "n": 821, "type": "dialogue", "text": "Naito: ...!\n나이토: ...!\nNaito: ...!", "suggestedCue": 521}, {"id": 821, "n": 822, "type": "dialogue", "text": "Can nắm chặt tay Naito.\n캔이 나이토의 손을 꼭 잡는다.\nCan holds Naito’s hand tightly.", "suggestedCue": 676}, {"id": 822, "n": 823, "type": "dialogue", "text": "Naito, lại tràn ngập cảm xúc. Nhìn vào bức tranh.\n감정에 북받치는 나이토, 다시. 사진을 본다.\nNaito, overcome with emotion, again. Look at the picture.", "suggestedCue": 136}, {"id": 823, "n": 824, "type": "dialogue", "text": "Trong ảnh là bố Naito và cậu bé Naito.\n사진 속의 나이토 부, 그리고 어린 나이토의 모습이다.\nIn the photo is Naito's father and young Naito.", "suggestedCue": 517}, {"id": 824, "n": 825, "type": "dialogue", "text": "Hình ảnh biến thành video và ký ức về quá khứ được gợi lại.\n사진이 동영상으로 바뀌며, 과거의 모습이 회상된다.\nPhotos turn into videos, and memories of the past are recalled.", "suggestedCue": 438}, {"id": 825, "n": 826, "type": "dialogue", "text": "46. Trước nhà máy Daichi (hồi tưởng) (ngày)\n46. 다이치 공장 앞 ( 회상 ) ( 낮 )\n46. In front of Daichi factory (flashback) (day)", "suggestedCue": 207}, {"id": 826, "n": 827, "type": "narration", "text": "Naito Bu và Park Rae-kyung đứng chụp ảnh kỷ niệm trước nhà máy.\n공장 앞에서 기념사진을 찍으려 서 있는 나이토 부와 박래경.\nNaito Bu and Park Rae-kyung standing to take a commemorative photo in front of the factory.", "suggestedCue": 532}, {"id": 827, "n": 828, "type": "dialogue", "text": "Naito trẻ đang quan sát từ phía sau bức tường nhà máy.\n공장 벽 뒤에 숨어 그 모습을 보고 있는 어린 나이토.\nYoung Naito is watching from behind the factory wall.", "suggestedCue": 474}, {"id": 828, "n": 829, "type": "dialogue", "text": "Một bức ảnh được chụp.\n사진이 찍힌다.\nA picture is taken.", "suggestedCue": 33}, {"id": 829, "n": 830, "type": "dialogue", "text": "Và trong khi Rae-kyung Park đang nói chuyện với nhân viên của Wind,\n그리고, 박래경이 윈드 직원들과 이야기를 나누는 사이,\nAnd while Rae-kyung Park was talking with Wind employees,", "suggestedCue": 546}, {"id": 830, "n": 831, "type": "dialogue", "text": "Naito trẻ chạy đến Naito Bu.\n나이토 부에게 달려가는 어린 나이토.\nYoung Naito running to Naito Bu.", "suggestedCue": 532}, {"id": 831, "n": 832, "type": "dialogue", "text": "Naito: (Đứng dậy) Bố.\n나이토: (일어) 아빠.\nNaito: (Standing up) Dad.", "suggestedCue": 521}, {"id": 832, "n": 833, "type": "dialogue", "text": "Naito đang xách túi của mình và cúi chào bố Naito.\n나이토가 가방을 멘 채로, 나이토 부에게 꾸벅 인사하며.\nNaito was carrying his bag and bowing to Naito's father.", "suggestedCue": 580}, {"id": 833, "n": 834, "type": "dialogue", "text": "Naito: Tadaima. (Tôi đã ở đó)\n나이토: 다다이마. (다녀왔습니다)\nNaito: Tadaima. (I’ve been there)", "suggestedCue": 153}, {"id": 834, "n": 835, "type": "dialogue", "text": "Naitobu: Okaeri. (Chào mừng)\n나이토부: 오카에리. (어서 오너라)\nNaitobu: Okaeri. (Welcome)", "suggestedCue": 0}, {"id": 835, "n": 836, "type": "dialogue", "text": "Cha của Naito đưa cho Naito một viên kẹo.\n나이토 부, 나이토에게 사탕 하나를 내민다.\nNaito's father offers Naito a candy.", "suggestedCue": 539}, {"id": 836, "n": 837, "type": "dialogue", "text": "Naito trẻ nhận kẹo và mỉm cười khi nhìn Naito Bu.\n사탕을 받아 드는 어린 나이토, 나이토 부를 바라보며 웃는다.\nYoung Naito accepts the candy and smiles while looking at Naito Bu.", "suggestedCue": 141}, {"id": 837, "n": 838, "type": "dialogue", "text": "Naitobu: (Đứng dậy) Họ bảo tôi đừng đến nhà máy.\n나이토부: (일어) 공장에 오지 말라니까.\nNaitobu: (Standing up) They told me not to come to the factory.", "suggestedCue": 172}, {"id": 838, "n": 839, "type": "dialogue", "text": "Naito: (Đứng dậy) Không. Tôi sẽ trở thành thợ thủ công như cha tôi.\n나이토: (일어) 아니. 나도 아빠 같은 장인이 될 거야.\nNaito: (Standing up) No. I will become a craftsman like my father.", "suggestedCue": 562}, {"id": 839, "n": 840, "type": "dialogue", "text": "Naitobu: (Đứng dậy) Có thật không?\n나이토부: (일어) 진짜야?\nNaitobu: (Standing up) Is it true?", "suggestedCue": 32}, {"id": 840, "n": 841, "type": "dialogue", "text": "Naito: (đứng dậy) Vâng! hứa!\n나이토: (일어) 응! 약속!\nNaito: (stands up) Yes! promise!", "suggestedCue": 521}, {"id": 841, "n": 842, "type": "dialogue", "text": "Cha của Naito mỉm cười với Naito.\n나이토를 보며 웃는 나이토 부.\nNaito's father smiles at Naito.", "suggestedCue": 538}, {"id": 842, "n": 843, "type": "dialogue", "text": "47. Nhà máy Shimizu (lại, bây giờ) (ngày)\n47. 시미즈 공장 ( 다시, 현재 ) ( 낮 )\n47. Shimizu Factory (again, now) (day)", "suggestedCue": 33}, {"id": 843, "n": 844, "type": "dialogue", "text": "Naito mỉm cười khi nhìn vào cái lon.\n캔을 보며 웃는 나이토.\nNaito smiles while looking at the can.", "suggestedCue": 539}, {"id": 844, "n": 845, "type": "dialogue", "text": "Can nắm chặt tay Naito.\n나이토의 손을 꼭 잡고 있는 캔.\nCan holding Naito's hand tightly.", "suggestedCue": 676}, {"id": 845, "n": 846, "type": "dialogue", "text": "Naito: (Đứng dậy) Can. Đây là ông nội. Thằng bé này là bố tôi.\n나이토: (일어) 캔. 여기 할아버지야. 이 꼬마가 아빠고.\nNaito: (Standing up) Can. Here's grandpa. This kid is my dad.", "suggestedCue": 390}, {"id": 846, "n": 847, "type": "dialogue", "text": "Can, nhìn vào bức ảnh một cách cẩn thận.\n캔, 사진을 유심히 본다.\nCan, look at the photo carefully.", "suggestedCue": 153}, {"id": 847, "n": 848, "type": "dialogue", "text": "Naito: (Nói) Thưa cha... con sống như cha con...\n나이토: (일어) 아버지... 저도 아버지처럼 살고 있습니다...\nNaito: (Speaking) Father... I live like my father...", "suggestedCue": 562}, {"id": 848, "n": 849, "type": "dialogue", "text": "Đứa trẻ này đã lớn lên rất nhiều...\n이 꼬마가 이렇게 컸어요...\nThis kid has grown so much...", "suggestedCue": 15}, {"id": 849, "n": 850, "type": "dialogue", "text": "Naito đang khóc.\n나이토가 울먹인다.\nNaito is crying.", "suggestedCue": 416}, {"id": 850, "n": 851, "type": "narration", "text": "Không biết tại sao, Can rơi nước mắt đi theo Naito và lấy kẹo từ trong túi ra đưa cho anh.\n캔도 이유를 모른 채, 나이토를 따라서 울먹이다 주머니에서 사탕을 꺼내어 건넨다.\nWithout knowing why, Can follows Naito in tears and takes out candy from his pocket and gives it to him.", "suggestedCue": 390}, {"id": 851, "n": 852, "type": "dialogue", "text": "Naito vừa khóc vừa cười khi nhìn hộp kẹo được trao.\n나이토, 사탕을 내미는 캔을 보며 울다 웃는다.\nNaito cries and then laughs as he looks at the can of candy being handed out.", "suggestedCue": 544}, {"id": 852, "n": 853, "type": "dialogue", "text": "Naito: (Nhận kẹo) (Đứng dậy) Cảm ơn. Có thể.\n나이토: (사탕을 받아 들며) (일어) 고맙다. 캔.\nNaito: (Accepts candy) (Stands up) Thank you. can.", "suggestedCue": 58}, {"id": 853, "n": 854, "type": "narration", "text": "Khi ông tôi đến nhà máy sau giờ học, ông đã tặng bố tôi kẹo...\n할아버지가 학교를 마치고 공장에 오면 아빠에게 사탕을 주셨는데...\nWhen my grandfather came to the factory after school, he gave my father candy...", "suggestedCue": 574}, {"id": 854, "n": 855, "type": "dialogue", "text": "Naito tràn ngập những cảm xúc mà anh đã kìm nén bấy lâu nay.\n참았던 감정이 북받치는 나이토.\nNaito is filled with emotions that he had been holding back.", "suggestedCue": 390}, {"id": 855, "n": 856, "type": "dialogue", "text": "Juno, người đang đợi gần đó, đến gần Naito và nói.\n곁에 서서 기다리던 주노가 나이토에게 다가서며, 말한다.\nJuno, who had been waiting nearby, approaches Naito and speaks.", "suggestedCue": 438}, {"id": 856, "n": 857, "type": "dialogue", "text": "Juno: Đây là bức thư của CEO Rae-kyung Park gửi Naito-san.\n주노: 박래경 대표께서 나이토 상에게 보내는 편지입니다.\nJuno: This is a letter from CEO Rae-kyung Park to Naito-san.", "suggestedCue": 568}, {"id": 857, "n": 858, "type": "narration", "text": "Naito nhìn bức thư viết bằng tiếng Hàn và nhìn thấy Minjeong. Điều này có nghĩa là yêu cầu giải thích.\n나이토, 한글로 쓰여진 편지를 보고 민정을 본다. 통역해 달라는 뜻이다.\nNaito looks at the letter written in Korean and sees Minjeong. This means asking for interpretation.", "suggestedCue": 439}, {"id": 858, "n": 859, "type": "dialogue", "text": "Thay vào đó, Minjeong đọc lá thư.\n민정이 대신 편지를 읽는다.\nMinjeong reads the letter instead.", "suggestedCue": 409}, {"id": 859, "n": 860, "type": "dialogue", "text": "Minjeong: (tiếng Nhật) Xin chào, tên tôi là Wind Rae-kyung.\n민정: (일어) 안녕하세요, 윈드 박래경이라고 합니다.\nMinjeong: (Japanese) Hello, my name is Wind Rae-kyung.", "suggestedCue": 570}, {"id": 860, "n": 861, "type": "dialogue", "text": "Chèn 〉 Văn phòng đại diện Gió\n인서트 〉 윈드 대표실\nInsert 〉 Wind Representative Office", "suggestedCue": 509}, {"id": 861, "n": 862, "type": "dialogue", "text": "Park Rae-kyung viết một lá thư.\n편지를 쓰는 박래경.\nPark Rae-kyung writes a letter.", "suggestedCue": 568}, {"id": 862, "n": 863, "type": "dialogue", "text": "Park Rae-kyung (giọng nói): Khi tôi tiếp quản Daichi, cha tôi đã đưa cho tôi một bản thiết kế mà ông ấy đã tự vẽ để tạo ra môn bắn cung tốt nhất.\n박래경(소리): 제가 다이치를 인수할 때 아버님께서 저에게 최고의 양궁을 만들어 달라며 직접 그린 설계도를 주셨습니다.\nPark Rae-kyung (voice): When I took over Daichi, my father gave me a blueprint he drew himself to create the best archery.", "suggestedCue": 574}, {"id": 863, "n": 864, "type": "dialogue", "text": "Một lần nữa, nhà máy Shimizu\n다시, 시미즈 공장\nAgain, Shimizu factory", "suggestedCue": 459}, {"id": 864, "n": 865, "type": "dialogue", "text": "Naito, đang nhìn vào bức ảnh.\n나이토, 사진을 보고 있다.\nNaito, looking at the photo.", "suggestedCue": 461}, {"id": 865, "n": 866, "type": "dialogue", "text": "Park Rae-kyung (lồng tiếng): Bắn cung ngày xưa và bắn cung của Wind bây giờ khác nhau rồi...\n박래경(소리): 그때의 양궁과 지금 윈드의 양궁은 다른 것입니다만...\nPark Rae-kyung (voice): Archery back then and Wind’s archery now are different...", "suggestedCue": 575}, {"id": 866, "n": 867, "type": "narration", "text": "Mong muốn tạo ra khả năng bắn cung giỏi cũng vậy. Gió không loại bỏ được Daichi.\n좋은 양궁을 만들겠다는 마음은 같습니다. 윈드는 다이치를 없앤 게 아닙니다.\nThe desire to create good archery is the same. Wind didn't eliminate Daichi.", "suggestedCue": 576}, {"id": 867, "n": 868, "type": "narration", "text": "Wind là công ty duy nhất tiếp nối nghề thủ công của cha ông Naito.\n윈드는 나이토 씨 아버지의 장인 정신을 이어온 유일한 회사입니다.\nWind is the only company that has continued the craftsmanship of Mr. Naito's father.", "suggestedCue": 578}, {"id": 868, "n": 869, "type": "dialogue", "text": "Naito rơi nước mắt.\n눈물을 흘리는 나이토.\nNaito sheds tears.", "suggestedCue": 521}, {"id": 869, "n": 870, "type": "dialogue", "text": "Juno và các thành viên trong nhóm nhìn thấy điều này trở nên trang trọng.\n그 모습을 보는 주노와 팀원들도 숙연해진다.\nJuno and the team members who see this become solemn.", "suggestedCue": 39}, {"id": 870, "n": 871, "type": "dialogue", "text": "Park Rae-kyung (lồng tiếng): Và, Ongojisin. Phương châm đó là điều cha tôi muốn nói với Naito-san.\n박래경(소리): 그리고, 온고지신. 그 표어는 부친께서 나이토 상에게 하고 싶으신 말이었습니다.\nPark Rae-kyung (voice): And, Ongojisin. That motto was what my father wanted to say to Naito-san.", "suggestedCue": 579}, {"id": 871, "n": 872, "type": "dialogue", "text": "Tôi nghe nói Naito-san đang sống theo mong muốn của cha anh ấy.\n나이토 상은 아버지의 바람대로 살고 계신다고 들었습니다.\nI heard that Naito-san is living according to his father's wishes.", "suggestedCue": 580}, {"id": 872, "n": 873, "type": "dialogue", "text": "Minjeong: (tiếng Nhật) Tôi sẽ hỗ trợ bạn trên con đường tương lai. Park Rae Kyung thân mến.\n민정: (일어) 앞으로의 길도 응원하겠습니다. 박래경 드림.\nMinjeong: (Japanese) I will support you on your future path. Dear Park Rae-kyung.", "suggestedCue": 581}, {"id": 873, "n": 874, "type": "dialogue", "text": "Naito nhìn Juno.\n나이토, 주노를 본다.\nNaito looks at Juno.", "suggestedCue": 538}, {"id": 874, "n": 875, "type": "dialogue", "text": "Naito: (Đứng dậy) Cảm ơn!\n나이토: (일어) 감사합니다!\nNaito: (Standing up) Thank you!", "suggestedCue": 90}, {"id": 875, "n": 876, "type": "dialogue", "text": "48. Phòng họp sân bay (Nhật Bản) (ngày)\n48. 공항 미팅실 ( 일본 ) ( 낮 )\n48. Airport meeting room (Japan) (day)", "suggestedCue": 544}, {"id": 876, "n": 877, "type": "dialogue", "text": "Juno và nhóm đang ngồi.\n주노와 팀원들이 앉아 있다.\nJuno and the team are sitting.", "suggestedCue": 438}, {"id": 877, "n": 878, "type": "narration", "text": "Ngồi đối diện là người của Shimizu (Yoshida, Naito, Ozaki, Hirose).\n맞은편에는 시미즈의 사람들(요시다, 나이토, 오자키, 히로세)이 앉아 있다.\nSitting opposite are Shimizu's people (Yoshida, Naito, Ozaki, Hirose).", "suggestedCue": 23}, {"id": 878, "n": 879, "type": "dialogue", "text": "Juno và Yoshida ký hợp đồng tương ứng và trao đổi chúng.\n주노와 요시다가 각자의 계약서에 사인을 하고, 주고받는다.\nJuno and Yoshida sign their respective contracts and exchange them.", "suggestedCue": 485}, {"id": 879, "n": 880, "type": "dialogue", "text": "Hai người bắt tay nhau. Shimizu và Sanin cũng bắt tay nhau.\n악수하는 두 사람. 시미즈와 산인 측도 악수를 나눈다.\nTwo people shaking hands. Shimizu and Sanin also shake hands.", "suggestedCue": 344}, {"id": 880, "n": 881, "type": "dialogue", "text": "49. Sảnh sân bay (Nhật Bản) (ngày)\n49. 공항 로비 ( 일본 ) ( 낮 )\n49. Airport lobby (Japan) (day)", "suggestedCue": 681}, {"id": 881, "n": 882, "type": "dialogue", "text": "Juno lấy điện thoại di động ra và gọi cho Lee Sang-moo.\n주노, 핸드폰을 꺼내 이상무에게 전화를 건다.\nJuno takes out her cell phone and calls Lee Sang-moo.", "suggestedCue": 269}, {"id": 882, "n": 883, "type": "dialogue", "text": "Juno: Vâng. Giám đốc điều hành. Tôi đã ký hợp đồng và sẽ quay lại.\n주노: 네. 상무님. 계약 체결하고, 돌아가려고 합니다.\nJuno: Yes. Managing Director. I signed a contract and am going back.", "suggestedCue": 584}, {"id": 883, "n": 884, "type": "dialogue", "text": "Tỷ lệ chiết khấu là 50%, có lợi hơn trước rất nhiều.\n할인율은 50%로 이전보다 훨씬 더 유리한 조건입니다.\nThe discount rate is 50%, which is much more advantageous than before.", "suggestedCue": 584}, {"id": 884, "n": 885, "type": "dialogue", "text": "Lee Sang-moo (nói chuyện điện thoại): Thật tuyệt vời. Bạn vẫn chưa nhìn thấy nó phải không?\n이상무(통화): 거 참 대단하네. 아직 보고는 안 했지?\nLee Sang-moo (on the phone): That’s amazing. You haven't seen it yet, right?", "suggestedCue": 144}, {"id": 885, "n": 886, "type": "dialogue", "text": "Juno: Vâng. Hôm nay là ngày lễ nên tôi sẽ đi làm và làm việc đó.\n주노: 네. 오늘이 휴일이라, 출근해서 하려고 합니다.\nJuno: Yes. Today is a holiday, so I'm going to go to work and do it.", "suggestedCue": 390}, {"id": 886, "n": 887, "type": "dialogue", "text": "Lee Sang-moo (trên điện thoại): Vâng. Nhưng bạn có thể trì hoãn nó được không?\n이상무(통화): 응. 근데 그거 좀 늦출 수 있겠나?\nLee Sang-moo (on phone): Yes. But can you delay it?", "suggestedCue": 544}, {"id": 887, "n": 888, "type": "dialogue", "text": "Juno: (suy nghĩ một lúc) Vâng. Được rồi.\n주노: (잠시 생각) 네. 알겠습니다.\nJuno: (thinks for a moment) Yes. All right.", "suggestedCue": 507}, {"id": 888, "n": 889, "type": "narration", "text": "Cách Juno một khoảng, Sunyoung, Minjeong và Jinsu đang ngồi đợi.\n주노와 얼마간 떨어진 곳에 순영, 민정, 진수가 앉아서 기다리고 있다.\nSome distance away from Juno, Sunyoung, Minjeong, and Jinsu are sitting and waiting.", "suggestedCue": 438}, {"id": 889, "n": 890, "type": "dialogue", "text": "Soonyoung: Jinsu, anh không buồn khi phải rời Nhật Bản sao?\n순영: 진수 씨는 일본 떠나는 거, 아쉽지 않아?\nSoonyoung: Jinsu, aren’t you sad that you’re leaving Japan?", "suggestedCue": 144}, {"id": 890, "n": 891, "type": "dialogue", "text": "Jinsu: Tuy nhiên, tôi cảm thấy may mắn vì đã ký được hợp đồng.\n진수: 그래도, 계약했으니까 천만다행인 거 같습니다.\nJinsu: Still, I feel fortunate that I signed a contract.", "suggestedCue": 596}, {"id": 891, "n": 892, "type": "dialogue", "text": "Minjeong: Tất nhiên rồi.\n민정: 그러게요.\nMinjeong: Of course.", "suggestedCue": 189}, {"id": 892, "n": 893, "type": "dialogue", "text": "Soonyoung: Tôi đoán là do tôi đã ký hợp đồng... Cậu không đói à?\n순영: 계약을 해서 그런가... 배고프지 않아요?\nSoonyoung: I guess it's because I signed a contract... Aren't you hungry?", "suggestedCue": 62}, {"id": 893, "n": 894, "type": "dialogue", "text": "Lúc đó, Hirose tiếp cận các thành viên trong nhóm.\n그때, 히로세가 팀원들에게 다가온다.\nAt that time, Hirose approaches the team members.", "suggestedCue": 402}, {"id": 894, "n": 895, "type": "dialogue", "text": "Jinsu: Cậu vẫn chưa đi.\n진수: 아직 안 가셨네요.\nJinsu: You haven’t gone yet.", "suggestedCue": 602}, {"id": 895, "n": 896, "type": "dialogue", "text": "Hirose: Tôi tưởng cậu không ăn được. Trưởng nhóm của chúng tôi đã bảo chúng tôi hãy chăm sóc nó.\n히로세: 식사 못 하셨을 거 같아서요. 저희 팀장님이 챙기라고 하셨습니다.\nHirose: I thought you weren’t able to eat. Our team leader told us to take care of it.", "suggestedCue": 604}, {"id": 896, "n": 897, "type": "dialogue", "text": "Soonyoung: Ồ...thật tốt. Tôi đã đói! À... không. Điều này có nghĩa là đi nhanh phải không?\n순영: 오... 잘됐다. 배고팠는데! 아... 아니다. 이거 빨리 가란 소리죠?\nSoonyoung: Oh... that's good. I was hungry! Ah... no. This means go quickly, right?", "suggestedCue": 390}, {"id": 897, "n": 898, "type": "dialogue", "text": "Hirose: (xấu hổ) Ồ, không. Tôi chân thành muốn chiêu đãi bạn một bữa ăn.\n히로세: (당황) 아, 아니요. 진심으로 식사 대접하고 싶습니다.\nHirose: (embarrassed) Oh, no. I sincerely want to treat you to a meal.", "suggestedCue": 612}, {"id": 898, "n": 899, "type": "dialogue", "text": "Jinsu: Hontoni Honne?\n진수: 혼또니 혼네?\nJinsu: Hontoni Honne?", "suggestedCue": 627}, {"id": 899, "n": 900, "type": "dialogue", "text": "Hirose: Hontoni!\n히로세: 혼또니!\nHirose: Hontoni!", "suggestedCue": 23}, {"id": 900, "n": 901, "type": "dialogue", "text": "Bụng Minjeong kêu lên một tiếng ‘gầm gừ’.\n민정의 배에서 ‘꼬르륵’ 소리가 난다.\nMinjeong’s stomach makes a ‘growling’ sound.", "suggestedCue": 344}, {"id": 901, "n": 902, "type": "dialogue", "text": "Minjeong: Tôi đã lo lắng cả ngày hôm nay, nhưng bây giờ tôi đã cảm thấy nhẹ nhõm...Tôi cảm thấy đói...\n민정: 하루 종일 긴장했다가, 딱 풀리니까... 출출하긴 하네요...\nMinjeong: I was nervous all day, but now that I'm relieved... I feel hungry...", "suggestedCue": 615}, {"id": 902, "n": 903, "type": "dialogue", "text": "Juno kết thúc cuộc gọi và tham gia cùng các thành viên trong nhóm của mình.\n통화를 끝내고, 팀원들에게 합류하는 주노.\nJuno ends the call and joins her team members.", "suggestedCue": 247}, {"id": 903, "n": 904, "type": "dialogue", "text": "Hirose: Tôi định đi ăn, cậu có đồng ý không, trưởng nhóm?\n히로세: 식사하려고 하는데, 팀장님도 괜찮으신가요?\nHirose: I'm going to eat, is it okay with you, team leader?", "suggestedCue": 616}, {"id": 904, "n": 905, "type": "dialogue", "text": "Juno: Vâng. Tốt.\n주노: 네. 좋죠.\nJuno: Yes. Good.", "suggestedCue": 0}, {"id": 905, "n": 906, "type": "dialogue", "text": "Hirose: Tôi nên đưa bạn đi đâu?\n히로세: 어디로 모실까요?\nHirose: Where should I take you?", "suggestedCue": 619}, {"id": 906, "n": 907, "type": "dialogue", "text": "Juno: Ừm... tôi không biết.\n주노: 음... 글쎄요.\nJuno: Um... I don't know.", "suggestedCue": 50}, {"id": 907, "n": 908, "type": "narration", "text": "Juno nhìn quanh các thành viên trong nhóm nhưng họ không thể dễ dàng trả lời.\n주노, 팀원들을 둘러보지만, 선뜻 대답하지 못하는 팀원들.\nJuno looks around at the team members, but they cannot readily answer.", "suggestedCue": 544}, {"id": 908, "n": 909, "type": "dialogue", "text": "Hirose: Vậy cậu có muốn ăn ramen không? Bởi vì bạn đã ăn oden.\n히로세: 그럼, 라멘 드실까요? 오뎅은 드셨으니까.\nHirose: Then, would you like some ramen? Because you ate oden.", "suggestedCue": 621}, {"id": 909, "n": 910, "type": "dialogue", "text": "Soonyoung và Minjeong giả vờ như không để ý và nhìn Jinsu.\n순영과 민정이 모른 척하며 진수를 본다.\nSoonyoung and Minjeong pretend not to notice and look at Jinsu.", "suggestedCue": 391}, {"id": 910, "n": 911, "type": "dialogue", "text": "Jinsu gãi đầu.\n진수가 머리를 긁적인다.\nJinsu scratches his head.", "suggestedCue": null}, {"id": 911, "n": 912, "type": "dialogue", "text": "Hirose: (Nhìn Soonyoung và Minjeong) Hai người cũng vậy phải không?\n히로세: (순영, 민정을 보며) 두 분도 마찬가지시죠?\nHirose: (Looking at Soonyoung and Minjeong) It’s the same for you two, right?", "suggestedCue": 623}, {"id": 912, "n": 913, "type": "dialogue", "text": "Soonyoung và Minjeong xấu hổ.\n당황하는 순영과 민정.\nSoonyoung and Minjeong are embarrassed.", "suggestedCue": 23}, {"id": 913, "n": 914, "type": "dialogue", "text": "50. Nhà hàng Ramen, nhà hàng sân bay (Nhật Bản) (ban ngày)\n50. 라멘집, 공항 식당 ( 일본 ) ( 낮 )\n50. Ramen restaurant, airport restaurant (Japan) (daytime)", "suggestedCue": 681}, {"id": 914, "n": 915, "type": "dialogue", "text": "Juno và cả nhóm đang ăn ramen.\n라멘을 먹는 주노와 팀원들.\nJuno and the team eating ramen.", "suggestedCue": 438}, {"id": 915, "n": 916, "type": "dialogue", "text": "Soonyoung: Vậy thì... Anh Hirose có biết chúng ta đang bị theo dõi không?\n순영: 그러면... 히로세 씨는 우리가 미행하는 걸 알고 있었나?\nSoonyoung: Then... Did Mr. Hirose know that we were being followed?", "suggestedCue": 624}, {"id": 916, "n": 917, "type": "dialogue", "text": "Minjeong: Có lẽ vậy...\n민정: 그런가 봐요...\nMinjeong: I guess so...", "suggestedCue": null}, {"id": 917, "n": 918, "type": "dialogue", "text": "Soonyoung: Đây không phải là cách Honne hướng tới Jinsu sao?\n순영: 이거, 진수를 향한 혼네 아닌가?\nSoonyoung: Isn’t this Honne’s way toward Jinsu?", "suggestedCue": 627}, {"id": 918, "n": 919, "type": "dialogue", "text": "Jinsu: Không phải thế đâu...\n진수: 그런 거 아니에요...\nJinsu: It’s not like that...", "suggestedCue": 328}, {"id": 919, "n": 920, "type": "dialogue", "text": "Hirose thanh toán tại quầy trước, sau đó đến ngồi cạnh tôi.\n히로세가 카운터에서 계산을 먼저하고 다가와 옆에 앉는다.\nHirose pays at the counter first, then comes over and sits next to me.", "suggestedCue": 247}, {"id": 920, "n": 921, "type": "dialogue", "text": "Hirose: Chúc cậu ăn ngon miệng nhé.\n히로세: 맛있게 드세요.\nHirose: Enjoy your meal.", "suggestedCue": 23}, {"id": 921, "n": 922, "type": "dialogue", "text": "Soonyoung: Vâng.\n순영: 넵.\nSoonyoung: Yes.", "suggestedCue": 0}, {"id": 922, "n": 923, "type": "dialogue", "text": "Jinsu liếc nhìn Hirose mà không hiểu lý do.\n진수, 괜히 히로세를 슬쩍 본다.\nJinsu glances at Hirose for no reason.", "suggestedCue": 58}, {"id": 923, "n": 924, "type": "dialogue", "text": "51. Trước sảnh khởi hành sân bay (Nhật Bản) (ban ngày)\n51. 공항 출국장 앞 ( 일본 ) ( 낮 )\n51. In front of the airport departure hall (Japan) (daytime)", "suggestedCue": 681}, {"id": 924, "n": 925, "type": "dialogue", "text": "Juno và nhóm đang chào đón Hirose.\n주노와 팀원들이 히로세와 인사를 나누고 있다.\nJuno and the team are greeting Hirose.", "suggestedCue": 23}, {"id": 925, "n": 926, "type": "dialogue", "text": "Juno: Jinsu yêu cầu Hirose cũng được phép đến Tokyo.\n주노: 진수 씨가 히로세 씨도 도쿄로 갈 수 있게 해달라고 하더라고요.\nJuno: Jinsu asked that Hirose be allowed to go to Tokyo as well.", "suggestedCue": 630}, {"id": 926, "n": 927, "type": "dialogue", "text": "Hirose: Vâng. Tôi đã nghe điều đó từ trưởng nhóm. Nhưng tôi thích Shizuoka.\n히로세: 네. 팀장님께 들었습니다. 근데, 저는 시즈오카가 좋아서요.\nHirose: Yes. I heard it from the team leader. But, I like Shizuoka.", "suggestedCue": 138}, {"id": 927, "n": 928, "type": "dialogue", "text": "Hirose mỉm cười nhẹ với Jinsu.\n히로세, 진수를 향해 살짝 미소 짓는다.\nHirose smiles slightly at Jinsu.", "suggestedCue": 23}, {"id": 928, "n": 929, "type": "dialogue", "text": "Jinsu cũng khẽ cúi đầu.\n진수도 살짝 목례하고.\nJinsu also bowed slightly.", "suggestedCue": 416}, {"id": 929, "n": 930, "type": "dialogue", "text": "Juno: Vâng. Bạn đã nói như vậy.\n주노: 네. 그러셨다고.\nJuno: Yes. You said so.", "suggestedCue": 148}, {"id": 930, "n": 931, "type": "dialogue", "text": "Soonyoung: Bạn đã giúp tôi về nhiều mặt.\n순영: 여러 가지로 도움을 주셨네요.\nSoonyoung: You helped me in many ways.", "suggestedCue": 636}, {"id": 931, "n": 932, "type": "dialogue", "text": "Hirose: Không. Tôi thực sự mắc nợ bạn!\n히로세: 아닙니다. 저야말로, 신세 많았습니다!\nHirose: No. I really am indebted to you!", "suggestedCue": 58}, {"id": 932, "n": 933, "type": "dialogue", "text": "Juno, đồng đội của cô và Hirose cúi chào và trao nhau lời chào.\n주노와 팀원들, 히로세와 고개 숙여 인사를 주고받는다.\nJuno, her teammates, and Hirose bow and exchange greetings.", "suggestedCue": 23}, {"id": 933, "n": 934, "type": "narration", "text": "Và đang hướng tới sảnh khởi hành... Đột nhiên, Jinsu quay lại nhìn Hirose.\n그리고, 출국장으로 향하는데... 문득 진수가 히로세를 돌아본다.\nAnd, heading to the departure hall... Suddenly, Jinsu looks back at Hirose.", "suggestedCue": 438}, {"id": 934, "n": 935, "type": "dialogue", "text": "Hirose giao tiếp bằng mắt với Jinsu và chào anh lần nữa.\n진수와 눈이 마주친 히로세, 다시 인사한다.\nHirose makes eye contact with Jinsu and greets him again.", "suggestedCue": 136}, {"id": 935, "n": 936, "type": "dialogue", "text": "52. Trước sân bay (Nhật Bản) (hoàng hôn)\n52. 공항 앞 ( 일본 ) ( 해 질 녘 )\n52. In front of the airport (Japan) (sunset)", "suggestedCue": 544}, {"id": 936, "n": 937, "type": "dialogue", "text": "Bên ngoài tiền sảnh. Hirose đang ngồi trên một chiếc ghế dài.\n로비 밖. 벤치에 앉아 있는 히로세.\nOutside the lobby. Hirose sitting on a bench.", "suggestedCue": 23}, {"id": 937, "n": 938, "type": "dialogue", "text": "Tôi cởi giày và vẫy chân khi chờ xe buýt.\n신발을 벗어둔 채로, 발을 흔들며 버스를 기다리고 있다.\nI took off my shoes and waved my feet as I waited for the bus.", "suggestedCue": 571}, {"id": 938, "n": 939, "type": "dialogue", "text": "Những chiếc tất nhân vật nổi bật.\n캐릭터 양말이 눈에 띈다.\nThe character socks stand out.", "suggestedCue": 269}, {"id": 939, "n": 940, "type": "dialogue", "text": "Một chiếc máy bay bay qua đầu Hirose.\n히로세의 머리 위로 비행기 한 대가 날아간다.\nAn airplane flies over Hirose’s head.", "suggestedCue": 24}, {"id": 940, "n": 941, "type": "dialogue", "text": "Hirose nhìn lên máy bay.\n비행기를 올려다보는 히로세.\nHirose looks up at the airplane.", "suggestedCue": 23}, {"id": 941, "n": 942, "type": "dialogue", "text": "53. Phòng họp, trụ sở Tập đoàn Sanin (ngày khác) (ban ngày)\n53. 대회의실, 산인 그룹 본사 ( 다른 날 ) ( 낮 )\n53. Conference room, Sanin Group headquarters (another day) (daytime)", "suggestedCue": 140}, {"id": 942, "n": 943, "type": "narration", "text": "Giám đốc điều hành Ha, Giám đốc Jo, Đại diện Park và Choi Dae-pyo đang ngồi, và Đại diện Min đang ngồi một mình đối diện với họ.\n하전무와 조이사, 박대표, 최대표가 앉아 있고, 맞은편에는 민대표가 홀로 앉아 있다.\nExecutive Director Ha, Director Jo, Representative Park, and Choi Dae-pyo are sitting, and Representative Min is sitting alone across from them.", "suggestedCue": 438}, {"id": 943, "n": 944, "type": "dialogue", "text": "Ở trong góc, Lim Dae-ri đang ngồi mở máy tính xách tay.\n구석에는 임대리가 노트북을 펼쳐놓고 앉아 있다.\nIn the corner, Lim Dae-ri is sitting with her laptop open.", "suggestedCue": 438}, {"id": 944, "n": 945, "type": "narration", "text": "Biên bản cuộc họp trống xuất hiện trên màn hình máy tính xách tay. Tiếp theo, đại diện Oh bước vào.\n노트북 화면에는 빈 회의록이 보인다. 이어서, 오대표가 들어온다.\nBlank meeting minutes appear on the laptop screen. Next, Representative Oh comes in.", "suggestedCue": 211}, {"id": 945, "n": 946, "type": "dialogue", "text": "Đại diện Oh: Xin chào.\n오대표: 안녕하십니까.\nRepresentative Oh: Hello.", "suggestedCue": 679}, {"id": 946, "n": 947, "type": "narration", "text": "Giám đốc điều hành Hà, người đã giao tiếp bằng mắt với Đại diện Oh, mỉm cười và gật đầu.\n오대표와 눈이 마주친 하전무, 웃으며 고갤 끄덕인다.\nExecutive Director Ha, who made eye contact with Representative Oh, smiles and nods.", "suggestedCue": 136}, {"id": 947, "n": 948, "type": "dialogue", "text": "Và Đại diện Oh ngồi xa Lee Sang-moo nhất.\n그리고 오대표가 이상무와 제일 먼 쪽에 앉는다.\nAnd Representative Oh sits furthest from Lee Sang-moo.", "suggestedCue": 546}, {"id": 948, "n": 949, "type": "narration", "text": "Kim Woo-cheol xuất hiện tiếp theo, do dự sau khi xem cách sắp xếp chỗ ngồi, rồi ngồi xuống cạnh Lee Sang-moo.\n이어서 등장한 김우철, 자리 배치를 보고 망설이다가, 이상무 옆자리에 앉는다.\nKim Woo-cheol appeared next, hesitated after seeing the seating arrangement, and then sat down next to Lee Sang-moo.", "suggestedCue": 211}, {"id": 949, "n": 950, "type": "dialogue", "text": "Đạo diễn Jo: Có vẻ như Lee Sang-moo sẽ không đến.\n조이사: 이상무님은 안 오실 모양이네.\nDirector Jo: It looks like Lee Sang-moo is not coming.", "suggestedCue": 328}, {"id": 950, "n": 951, "type": "dialogue", "text": "Giám đốc điều hành Hà: Bởi vì bạn không có phong độ. Vâng, bạn hiểu.\n하전무: 모양 빠지시니까. 뭐, 이해하시죠.\nExecutive Director Ha: Because you’re out of shape. Well, you understand.", "suggestedCue": 144}, {"id": 951, "n": 952, "type": "dialogue", "text": "Đại diện Min: Vâng? Gió ơi, đây có phải là trách nhiệm của Sangmoo Lee không? Bạn không điên à?\n민대표: 네? 윈드, 이게 이상무님 책임이란 거예요? 미친 거 아니에요?\nRepresentative Min: Yes? Wind, is this Sangmoo Lee’s responsibility? Aren't you crazy?", "suggestedCue": 648}, {"id": 952, "n": 953, "type": "dialogue", "text": "Giám đốc điều hành Hà: Thế thì ai chịu trách nhiệm? Trách nhiệm niêm yết ở đâu?\n하전무: 그럼, 누구 책임입니까? 상장 책임지는 데가 어딘데요?\nExecutive Director Ha: Then, who is responsible? Where is the responsibility for listing?", "suggestedCue": 650}, {"id": 953, "n": 954, "type": "dialogue", "text": "Đại diện Min, tôi không thể trả lời dễ dàng được.\n민대표, 선뜻 대답하지 못한다.\nRepresentative Min, I cannot readily answer.", "suggestedCue": 176}, {"id": 954, "n": 955, "type": "dialogue", "text": "54. Văn phòng tầng 18, trụ sở Tập đoàn Sanin (ban ngày)\n54. 18층 사무실, 산인 그룹 본사 ( 낮 )\n54. 18th floor office, Sanin Group headquarters (daytime)", "suggestedCue": 140}, {"id": 955, "n": 956, "type": "dialogue", "text": "Lee Sang-moo rời khỏi phòng và nói chuyện với Kim Hyeon.\n방을 나서는 이상무, 김현에게 말한다.\nLee Sang-moo leaves the room and speaks to Kim Hyeon.", "suggestedCue": 144}, {"id": 956, "n": 957, "type": "dialogue", "text": "Lee Sang-moo: Chúng tôi chưa xuất bản bài báo phải không?\n이상무: 우리, 기사 안 내보냈지?\nLee Sang-moo: We didn’t publish the article, right?", "suggestedCue": 271}, {"id": 957, "n": 958, "type": "dialogue", "text": "Huy Kim: Vâng. Chờ. Tôi có nên xịt nó không?\n김현: 네. 대기 중입니다. 뿌릴까요?\nHyun Kim: Yes. Waiting. Should I spray it?", "suggestedCue": 244}, {"id": 958, "n": 959, "type": "dialogue", "text": "Sangmoo Lee: Vâng.\n이상무: 응.\nSangmoo Lee: Yes.", "suggestedCue": 0}, {"id": 959, "n": 960, "type": "dialogue", "text": "Lee Sang-moo gật đầu và rời khỏi văn phòng.\n이상무, 고갤 끄덕이며, 사무실을 나선다.\nLee Sang-moo nods his head and leaves the office.", "suggestedCue": 306}, {"id": 960, "n": 961, "type": "dialogue", "text": "55. Phòng họp, trụ sở Tập đoàn Sanin (ban ngày)\n55. 대회의실, 산인 그룹 본사 ( 낮 )\n55. Conference room, Sanin Group headquarters (daytime)", "suggestedCue": 140}, {"id": 961, "n": 962, "type": "dialogue", "text": "Đạo diễn Jo: Chúng ta sẽ tiếp tục với sự vắng mặt của Lee Sang-moo chứ?\n조이사: 이상무님은 불참하는 걸로 하고, 진행할까요?\nDirector Jo: Shall we proceed with Lee Sang-moo’s absence?", "suggestedCue": 655}, {"id": 962, "n": 963, "type": "dialogue", "text": "Cùng lúc đó, Lee Sang-moo xuất hiện.\n그때, 이상무가 등장한다.\nAt that time, Lee Sang-moo appears.", "suggestedCue": 500}, {"id": 963, "n": 964, "type": "dialogue", "text": "Lee Sang-moo: Muộn rồi.\n이상무: 늦었습니다.\nLee Sang-moo: It’s late.", "suggestedCue": 306}, {"id": 964, "n": 965, "type": "dialogue", "text": "Lee Sang-moo và Đại diện Oh ngồi ở hàng ghế đầu.\n이상무, 오대표를 지나 제일 앞자리에 앉는다.\nLee Sang-moo and Representative Oh sit in the front row.", "suggestedCue": 269}, {"id": 965, "n": 966, "type": "narration", "text": "Dae-ri Lim, người đang gõ phím trong góc, thêm Giám đốc điều hành Lee Dong-jun vào số lượng người tham dự.\n구석에서 타이핑하던 임대리, 참석 인원에 이동준 상무를 추가한다.\nDae-ri Lim, who was typing in the corner, adds Executive Director Lee Dong-jun to the number of attendees.", "suggestedCue": 36}, {"id": 966, "n": 967, "type": "dialogue", "text": "Giám đốc Jo: ...Vì tất cả các bạn đều ở đây nên hãy bắt đầu cuộc họp hội đồng quản trị. Còn chương trình nghị sự này thì sao...\n조이사: ...다 오셨으니까, 이사회 시작하겠습니다. 본 안건은요...\nDirector Jo: ...Since you're all here, let's start the board meeting. What about this agenda...", "suggestedCue": 556}, {"id": 967, "n": 968, "type": "dialogue", "text": "Giám đốc điều hành Hà: Trước tiên hãy làm việc khác đã. Bởi vì tôi nghĩ vấn đề này rất quan trọng.\n하전무: 별건부터 하시죠. 본건이 중요한 거 같으니까.\nExecutive Director Ha: Let’s do something else first. Because I think this matter is important.", "suggestedCue": 109}, {"id": 968, "n": 969, "type": "dialogue", "text": "Joisa: À... vâng. Một vấn đề riêng liên quan đến việc Wind không được niêm yết.\n조이사: 아... 예. 별건은 윈드 상장 실패에 관한 건데요.\nJoisa: Ah... yes. A separate issue concerns the failure of Wind to be listed.", "suggestedCue": 664}, {"id": 969, "n": 970, "type": "dialogue", "text": "Bạn có nghĩ Lee Sang-moo cần phải giải thích điều gì đó không...\n이상무님이 해명을좀 해주셔야 하지 않나...\nDon't you think Lee Sang-moo needs to explain something...", "suggestedCue": 665}, {"id": 970, "n": 971, "type": "dialogue", "text": "Lee Sang-moo: Chỉ cần Wind có doanh thu tốt thì việc niêm yết sẽ không thành vấn đề.\n이상무: 윈드는 매출만 잘 나오면, 상장은 문제가 없을 거거든요.\nLee Sang-moo: As long as Wind has good sales, listing will not be a problem.", "suggestedCue": 666}, {"id": 971, "n": 972, "type": "dialogue", "text": "Giám đốc Hà liếc nhìn Giám đốc Jo.\n하전무, 조이사에게 눈짓을 보낸다.\nDirector Ha gives Director Jo a glance.", "suggestedCue": 655}, {"id": 972, "n": 973, "type": "dialogue", "text": "Giám đốc Jo: Danh sách là số mấy? Bạn làm điều đó với động lực.\n조이사: 상장이 무슨 숫자로 합니까? 기세로 하는 거지.\nDirector Jo: What number is the listing? You do it with momentum.", "suggestedCue": 254}, {"id": 973, "n": 974, "type": "dialogue", "text": "Lee Sang-moo: Vậy ý bạn là đó là trách nhiệm của tôi?\n이상무: 그래서, 제 책임이란 말씀인지...\nLee Sang-moo: So, are you saying it’s my responsibility?", "suggestedCue": 669}, {"id": 974, "n": 975, "type": "dialogue", "text": "Giám đốc điều hành Hà: Đó chỉ là trách nhiệm của anh thôi phải không? Nhưng.\n하전무: 상무님 책임이기만 하겠습니까. 근데요.\nManaging Director Ha: Is it just your responsibility? But.", "suggestedCue": 669}, {"id": 975, "n": 976, "type": "narration", "text": "Việc giám đốc điều hành đổ lỗi cho người khác về việc này có phải là điều bất thường không?\n상무님이 이걸 남 탓이라고 하는 것도, 모양 빠지는 거잖습니까.\nIsn’t it out of character for the managing director to blame others for this?", "suggestedCue": 670}, {"id": 976, "n": 977, "type": "dialogue", "text": "Đại diện Park: Nếu chúng tôi ký hợp đồng ở Nhật Bản thì điều đó có xảy ra không?\n박대표: 일본에서 계약이라도 했으면 모를까, 다 안 된 거 아니에요?\nRepresentative Park: If we had signed a contract in Japan, wouldn’t that have happened?", "suggestedCue": 438}, {"id": 977, "n": 978, "type": "narration", "text": "Khi CEO Park nhìn Giám đốc điều hành Hà như thể đang xác nhận, Giám đốc điều hành Hà gật đầu.\n박대표가 하전무에게 확인받듯이 쳐다보면, 하전무가 고개를 끄덕인다.\nWhen CEO Park looks at Executive Director Ha as if receiving confirmation, Executive Director Ha nods.", "suggestedCue": 547}, {"id": 978, "n": 979, "type": "dialogue", "text": "Choi Dae-pyo: Nếu đúng như vậy, tại sao bạn không giơ tay?\n최대표: 정 그러시면, 거수 한번 하시던가요.\nChoi Dae-pyo: If that’s the case, why don’t you just raise your hand?", "suggestedCue": 144}, {"id": 979, "n": 980, "type": "dialogue", "text": "민대표: 그걸 왜 해요? 찬반 안건도 아닌데.\n민대표: 그걸 왜 해요? 찬반 안건도 아닌데.\nRepresentative Min: Why are you doing that? It's not even a pro or con issue.", "suggestedCue": 344}, {"id": 980, "n": 981, "type": "dialogue", "text": "Đại diện Park: Không phải bạn đang nói rằng chúng tôi muốn biết chắc ai là người chịu trách nhiệm sao?\n박대표: 누구 책임인지 확실히 하자는 거 아니에요?\nRepresentative Park: Aren’t you saying we want to make sure who is responsible?", "suggestedCue": 674}, {"id": 981, "n": 982, "type": "dialogue", "text": "이상무: ...그러시죠.\n이상무: ...그러시죠.\nLee Sang-moo: ...Of course.", "suggestedCue": 306}, {"id": 982, "n": 983, "type": "dialogue", "text": "Giám đốc Jo: (Ngập ngừng) Đó là lỗi của nhóm IR. Bạn có thể giơ tay.\n조이사: (망설이다가) IR팀의 잘못이다. 손 드시면 됩니다.\nDirector Jo: (Hesitating) It’s the IR team’s fault. You can raise your hand.", "suggestedCue": 676}, {"id": 983, "n": 984, "type": "dialogue", "text": "Đại diện Park và Choi Dae-pyo giơ tay như thể họ đang vui vẻ.\n박대표, 최대표는 재밌다는 듯이, 손을 든다.\nRepresentative Park and Choi Dae-pyo raise their hands as if they are having fun.", "suggestedCue": 438}, {"id": 984, "n": 985, "type": "dialogue", "text": "Đại diện Park là như vậy, còn Đại diện Min đang nhắm đến Dae Dae-pyo.\n그런 박대표, 최대표를 노려보는 민대표.\nRepresentative Park is like that, and Representative Min is aiming for Dae Dae-pyo.", "suggestedCue": 210}, {"id": 985, "n": 986, "type": "narration", "text": "Đại diện Oh ngồi lại và nhẹ nhàng giơ tay lên để Lee Sang-moo không dễ dàng nhìn thấy.\n오대표는 이상무에게 잘 보이지 않도록, 몸을 뒤로 물러앉으며 손을 슬쩍 든다.\nRepresentative Oh sits back and gently raises his hand so as not to be easily seen by Lee Sang-moo.", "suggestedCue": 271}, {"id": 986, "n": 987, "type": "dialogue", "text": "Kim Woo-cheol lo lắng vì anh ấy ngồi ngay cạnh Lee Sang-moo...\n김우철은, 이상무 바로 옆에 앉은 탓에 고민하는데...\nKim Woo-cheol is worried because he sits right next to Lee Sang-moo...", "suggestedCue": 271}, {"id": 987, "n": 988, "type": "dialogue", "text": "Đại diện Min: (nói với Đại diện Oh) Bây giờ bạn có giơ tay không? Đại diện Ồ?\n민대표: (오대표에게) 지금 손 드신 거예요? 오대표님?\nRepresentative Min: (to Representative Oh) Are you raising your hand now? Representative Oh?", "suggestedCue": 677}, {"id": 988, "n": 989, "type": "dialogue", "text": "Người đại diện Oh: ...Vâng? Vâng...\n오대표: ...예? 예...\nRepresentative Oh: ...Yes? Yes...", "suggestedCue": 291}, {"id": 989, "n": 990, "type": "narration", "text": "Kim Woo-cheol, tôi đang từ bỏ ý định giơ tay vì điều đó thật khó chịu.\n김우철, 괜히 뜨끔해서 손 들 생각을 접는다.\nKim Woo-cheol, I'm giving up the thought of raising my hand because it's so annoying.", "suggestedCue": 502}, {"id": 990, "n": 991, "type": "dialogue", "text": "Biểu hiện của đạo diễn Ha khi nhìn thấy Kim Woo-cheol như vậy là không ổn.\n그런 김우철을 보는 하전무의 표정이 좋지 않다.\nDirector Ha's expression when he sees Kim Woo-cheol like that is not good.", "suggestedCue": 344}, {"id": 991, "n": 992, "type": "dialogue", "text": "그때, 주노가 등장한다.\n그때, 주노가 등장한다.\nThen, Juno appears.", "suggestedCue": 504}, {"id": 992, "n": 993, "type": "dialogue", "text": "주노: 안녕하십니까. Tôi có chuyện muốn báo cáo nên tôi ghé qua.\n주노: 안녕하십니까. 보고드릴 게 있어서, 잠깐 들렀습니다.\nJuno: Hello. I had something to report, so I stopped by.", "suggestedCue": 680}, {"id": 993, "n": 994, "type": "dialogue", "text": "Ngoại trừ Lee Sang-moo, các giám đốc điều hành đều xấu hổ.\n이상무를 제외하고, 당황하는 임원들.\nExcept for Lee Sang-moo, the executives are embarrassed.", "suggestedCue": 648}, {"id": 994, "n": 995, "type": "dialogue", "text": "Juno: Đầu tiên, chúng tôi ký hợp đồng cung cấp thiết bị với Shimizu của Nhật Bản.\n주노: 먼저, 일본 시미즈와의 기어 공급 계약은 체결했습니다.\nJuno: First, we signed a gear supply contract with Shimizu of Japan.", "suggestedCue": 681}, {"id": 995, "n": 996, "type": "dialogue", "text": "하전무: 그거 계약금 결재는?\n하전무: 그거 계약금 결재는?\nExecutive Director Ha: What about the down payment for that?", "suggestedCue": 682}, {"id": 996, "n": 997, "type": "dialogue", "text": "Juno: Ngày ký hợp đồng là cuối tuần nên tôi dự định sẽ nộp khoản thanh toán ngay hôm nay.\n주노: 계약 당일이 주말이어서 오늘 결재 올리려고 합니다.\nJuno: The day of the contract is on the weekend, so I’m planning to submit the payment today.", "suggestedCue": 682}, {"id": 997, "n": 998, "type": "dialogue", "text": "Giám đốc điều hành Hà: ...\n하전무: ...\nExecutive Director Ha: ...", "suggestedCue": 259}, {"id": 998, "n": 999, "type": "dialogue", "text": "Juno: Một bài viết về sản phẩm mới cũng sẽ được đăng trên Wind hôm nay.\n주노: 오늘 윈드에서 신제품 관련 기사도 나갈 예정이고요.\nJuno: An article about new products will also be published in Wind today.", "suggestedCue": 683}, {"id": 999, "n": 1000, "type": "dialogue", "text": "Do việc niêm yết gặp khó khăn do nghi ngờ về doanh số bán hàng,\n매출에 대한 의구심으로 상장이 어려웠던 만큼,\nAs listing was difficult due to doubts about sales,", "suggestedCue": 684}, {"id": 1000, "n": 1001, "type": "dialogue", "text": "Chúng tôi tin rằng hợp đồng này sẽ bổ sung cho điều đó.\n이번 계약이 그에 대한 보완이 될것으로 보고 있습니다.\nWe believe this contract will complement that.", "suggestedCue": 684}, {"id": 1001, "n": 1002, "type": "narration", "text": "Trong khi những người điều hành còn chưa kịp nói gì thì Juno lại lên tiếng.\n임원들이 아무 말도 하지 못하는 가운데, 주노가 다시 말을 잇는다.\nWhile the executives were unable to say anything, Juno spoke again.", "suggestedCue": 54}, {"id": 1002, "n": 1003, "type": "dialogue", "text": "Juno: Vậy thì tôi sẽ lùi lại một bước.\n주노: 그럼, 저는 물러가 보겠습니다.\nJuno: Well then, I'll take a step back.", "suggestedCue": 685}, {"id": 1003, "n": 1004, "type": "dialogue", "text": "Juno rời đi.\n주노가 퇴장한다.\nJuno leaves.", "suggestedCue": null}, {"id": 1004, "n": 1005, "type": "dialogue", "text": "Sangmoo Lee: Tôi cũng đứng dậy được không?\n이상무: 저도 일어나도 될까요?\nSangmoo Lee: Can I get up too?", "suggestedCue": 686}, {"id": 1005, "n": 1006, "type": "dialogue", "text": "Khi không có ai trả lời, Lee Sang-moo đứng dậy và rời khỏi phòng họp.\n아무도 답이 없자, 이상무가 자리에서 일어나 회의실을 나선다\nWhen no one answers, Lee Sang-moo gets up and leaves the conference room.", "suggestedCue": 176}, {"id": 1006, "n": 1007, "type": "narration", "text": "Lee Sang-moo đi qua phía sau Đại diện Oh, và mặt Đại diện Oh chuyển sang màu đỏ.\n이상무가 오대표 뒤를 지나는데, 오대표의 얼굴이 붉게 달아오른다.\nLee Sang-moo passes behind Representative Oh, and Representative Oh's face turns red.", "suggestedCue": 306}, {"id": 1007, "n": 1008, "type": "narration", "text": "Lim Dae-ri, bị bỏ lại một mình, ngơ ngác nhìn con trỏ nhấp nháy trên màn hình máy tính xách tay.\n홀로 남은 임대리, 노트북 화면에 커서가 깜빡이는 걸 멍하니 보고 있다가,\nLim Dae-ri, left alone, stares blankly at the cursor blinking on the laptop screen.", "suggestedCue": 140}, {"id": 1008, "n": 1009, "type": "dialogue", "text": "Nhấn nút backspace nhẹ nhàng. Biên bản cuộc họp bị xóa nhanh chóng.\n백스페이스 버튼을 지그시 누른다. 빠르게 지워지는 회의록.\nPress the backspace button gently. Meeting minutes erased quickly.", "suggestedCue": 502}, {"id": 1009, "n": 1010, "type": "dialogue", "text": "56. Hành lang, Trụ sở Tập đoàn Sanin (ngày)\n56. 복도, 산인 그룹 본사 ( 낮 )\n56. Corridor, Sanin Group Headquarters (day)", "suggestedCue": 140}, {"id": 1010, "n": 1011, "type": "dialogue", "text": "Lee Sang-moo bước xuống hành lang và CEO Oh bước nhanh theo sau anh.\n이상무가 복도를 걷는데, 오대표가 빠른 걸음으로 따라간다.\nLee Sang-moo walks down the hallway, and CEO Oh follows him at a fast pace.", "suggestedCue": 269}, {"id": 1011, "n": 1012, "type": "dialogue", "text": "Người đại diện Oh: Giám đốc điều hành, tôi không nói thế...\n오대표: 상무님, 저는 그게 아니라...\nRepresentative Oh: Managing Director, I’m not saying that...", "suggestedCue": 271}, {"id": 1012, "n": 1013, "type": "dialogue", "text": "Lee Sang-moo dừng bước và nhìn Đại diện Oh.\n이상무가 걸음을 멈추고, 오대표를 빤히 본다.\nLee Sang-moo stops walking and looks at Representative Oh.", "suggestedCue": 269}, {"id": 1013, "n": 1014, "type": "dialogue", "text": "Lee Sang-moo: Đại diện Oh.\n이상무: 오대표님.\nLee Sang-moo: Representative Oh.", "suggestedCue": 272}, {"id": 1014, "n": 1015, "type": "dialogue", "text": "Đại diện Oh: (ngạc nhiên) Vâng. Giám đốc điều hành.\n오대표: (흠칫 놀라며) 예. 상무님.\nRepresentative Oh: (surprised) Yes. Managing Director.", "suggestedCue": 688}, {"id": 1015, "n": 1016, "type": "dialogue", "text": "Lee Sang-moo: Nếu bạn định đổ lỗi cho người khác vì không công bằng thì bạn cần phải dừng lại.\n이상무: 억울하다고 남 탓할 거면, 그만하셔야 돼.\nLee Sang-moo: If you’re going to blame others for being unfair, you need to stop.", "suggestedCue": 144}, {"id": 1016, "n": 1017, "type": "dialogue", "text": "Người đại diện Oh: Không phải là tôi không công bằng... Tôi xin lỗi. Giám đốc điều hành.\n오대표: 제가 억울하다는 게 아니고요... 죄송합니다. 상무님.\nRepresentative Oh: It's not that I'm being unfair... I'm sorry. Managing Director.", "suggestedCue": 416}, {"id": 1017, "n": 1018, "type": "dialogue", "text": "Lee Sang-moo: Hãy nhìn vào công việc của bạn. Tôi nghe nói rằng việc gia hạn hợp đồng của bạn sắp đến gần.\n이상무: 일보세요. 재계약도 얼마 안 남으셨다면서요.\nLee Sang-moo: Look at your work. I heard that your contract renewal is just around the corner.", "suggestedCue": 409}, {"id": 1018, "n": 1019, "type": "dialogue", "text": "Lee Sang-moo lại bước đi.\n다시 걷는 이상무.\nLee Sang-moo walks again.", "suggestedCue": 306}, {"id": 1019, "n": 1020, "type": "dialogue", "text": "Đại diện Oh không thể chịu đựng được để theo kịp.\n오대표는 차마 따라가지 못한다.\nRepresentative Oh cannot bear to keep up.", "suggestedCue": 556}, {"id": 1020, "n": 1021, "type": "dialogue", "text": "57. Nơi ở của Juno (đêm)\n57. 주노의 레지던스 ( 밤 )\n57. Juno’s Residence (night)", "suggestedCue": null}, {"id": 1021, "n": 1022, "type": "dialogue", "text": "Điện thoại của Juno đặt trên bàn rung lên.\n테이블 위에 올려둔 주노의 폰이 진동한다.\nJuno’s phone, placed on the table, vibrates.", "suggestedCue": 211}, {"id": 1022, "n": 1023, "type": "narration", "text": "Ngay sau đó, Juno bước ra khỏi phòng tắm sau khi tắm xong và trả lời điện thoại.\n마침, 샤워를 마친 주노가 욕실에서 나와 전화를 받는다.\nJust then, Juno comes out of the bathroom after finishing her shower and answers the phone.", "suggestedCue": 544}, {"id": 1023, "n": 1024, "type": "dialogue", "text": "Juno: Vâng. người lớn tuổi.\n주노: 응. 선배.\nJuno: Yes. senior.", "suggestedCue": 0}, {"id": 1024, "n": 1025, "type": "dialogue", "text": "Tiền bối Jang (gọi điện): Ở Nhật vui vẻ chứ?\n장선배(통화): 일본은 잘 다녀왔어?\nSenior Jang (phone call): Did you have a good time in Japan?", "suggestedCue": 247}, {"id": 1025, "n": 1026, "type": "dialogue", "text": "Juno: Vâng. Nó hoạt động tốt.\n주노: 네. 잘 해결됐어요.\nJuno: Yes. It worked out well.", "suggestedCue": 138}, {"id": 1026, "n": 1027, "type": "dialogue", "text": "Tiền bối Jang (nói chuyện điện thoại): Đúng như dự đoán. Chúng tôi đã tìm thấy tất cả các thành viên hoạt động.\n장선배(통화): 역시. 작전 멤버는 다 찾아놨어.\nSenior Jang (on phone): As expected. We've found all the operation members.", "suggestedCue": 149}, {"id": 1027, "n": 1028, "type": "dialogue", "text": "Họ vẫn sống như vậy.\n걔네들은 아직도 그러고 살더라.\nThey still live like that.", "suggestedCue": 702}, {"id": 1028, "n": 1029, "type": "dialogue", "text": "Juno: Điều đó thật tuyệt.\n주노: 잘됐네요.\nJuno: That's great.", "suggestedCue": 390}, {"id": 1029, "n": 1030, "type": "dialogue", "text": "Tiền bối Jang (trên điện thoại): Vậy chúng ta bắt đầu nhé?\n장선배(통화): 그럼, 시작해?\nSenior Jang (on phone): Then, shall we begin?", "suggestedCue": 202}, {"id": 1030, "n": 1031, "type": "dialogue", "text": "Đúng lúc đó, điện thoại của Juno lại rung lên. Đó là cuộc gọi của Lee Sang-moo.\n그때, 주노의 폰이 다시 진동한다. 이상무의 전화다.\nAt that time, Juno's phone vibrates again. It's Lee Sang-moo's call.", "suggestedCue": 279}, {"id": 1031, "n": 1032, "type": "dialogue", "text": "Juno: Đợi một chút. Tôi sẽ gọi lại cho bạn.\n주노: 잠시만요. 다시 전화할게요.\nJuno: Wait a minute. I'll call you back.", "suggestedCue": 361}, {"id": 1032, "n": 1033, "type": "narration", "text": "Sau khi kết thúc cuộc gọi với Juno và tiền bối Jang, tôi nhận được cuộc gọi từ Lee Sang-moo.\n주노, 장선배와의 통화를 끝내고, 이상무의 전화를 받는다.\nAfter finishing the call with Juno and Senior Jang, I take a call from Lee Sang-moo.", "suggestedCue": 247}, {"id": 1033, "n": 1034, "type": "dialogue", "text": "Juno: Vâng. Giám đốc điều hành.\n주노: 네. 상무님.\nJuno: Yes. Managing Director.", "suggestedCue": 378}, {"id": 1034, "n": 1035, "type": "dialogue", "text": "Lee Sang-moo (trên điện thoại): Vâng. Bạn chưa ngủ à? Tôi xin lỗi vì đã liên lạc với bạn vào lúc này.\n이상무(통화): 응. 안 잤나? 이 시간에 연락해서 미안하네.\nLee Sang-moo (on phone): Yes. Didn't you sleep? I'm sorry for contacting you at this time.", "suggestedCue": 648}, {"id": 1035, "n": 1036, "type": "dialogue", "text": "Juno: Không sao đâu. Chuyện gì đang xảy ra vậy?\n주노: 괜찮습니다. 무슨 일입니까?\nJuno: It's okay. What's going on?", "suggestedCue": 144}, {"id": 1036, "n": 1037, "type": "dialogue", "text": "Lee Sang-moo (trên điện thoại): Đã xảy ra tai nạn...\n이상무(통화): 사고가 터졌네...\nLee Sang-moo (on the phone): An accident occurred...", "suggestedCue": 324}, {"id": 1037, "n": 1038, "type": "dialogue", "text": "58. Trước nhà Lee Sang-moo (đêm)\n58. 이상무 집 앞 ( 밤 )\n58. In front of Lee Sang-moo’s house (night)", "suggestedCue": 324}, {"id": 1038, "n": 1039, "type": "dialogue", "text": "Lee Sang-moo rời khỏi lối vào căn hộ trong bộ đồ ngủ.\n이상무가 파자마 차림으로 아파트 입구를 나선다.\nLee Sang-moo leaves the apartment entrance wearing pajamas.", "suggestedCue": 306}, {"id": 1039, "n": 1040, "type": "dialogue", "text": "Thư ký trưởng đang đợi trước mặt anh tiến lại gần và chào đón anh.\n그 앞에서 기다리고 있던 비서실장이 인사하며 다가선다.\nThe chief secretary who was waiting in front of him approaches and greets him.", "suggestedCue": 126}, {"id": 1040, "n": 1041, "type": "dialogue", "text": "Lee Sang-moo (giọng nói): Chủ tịch đã vay tiền bằng cách sử dụng cổ phiếu làm tài sản thế chấp.\n이상무(소리): 회장님이 주식을 담보로 대출하셨는데,\nLee Sang-moo (voice): The chairman took out a loan using stocks as collateral.", "suggestedCue": 713}, {"id": 1041, "n": 1042, "type": "dialogue", "text": "Có vẻ như việc này được thực hiện thông qua văn phòng thư ký.\n그걸 비서실을 통해서 진행하신 모양이야.\nIt appears that this was carried out through the secretary's office.", "suggestedCue": 710}, {"id": 1042, "n": 1043, "type": "dialogue", "text": "Có vẻ như họ đang cố gắng làm điều đó một cách bí mật...\n아무래도 몰래 하시려고 그런 모양인데...\nIt looks like they're trying to do it secretly...", "suggestedCue": 138}, {"id": 1043, "n": 1044, "type": "dialogue", "text": "Thư ký trưởng đưa cho Lee Sang-moo một phong bì đựng tài liệu.\n비서실장이 이상무에게 서류 봉투 하나를 내민다.\nThe chief secretary gives Lee Sang-moo an envelope of documents.", "suggestedCue": 544}, {"id": 1044, "n": 1045, "type": "dialogue", "text": "Lee Sang-moo (giọng nói): Không có thông báo công khai nào... cho đến khi đến ngày hết hạn của ban thư ký.\n이상무(소리): 공시도 없이 있다가...비서실도 만기일이 다 되어서야,\nLee Sang-moo (voice): There was no public notice... until the expiration date for the secretariat was reached.", "suggestedCue": 711}, {"id": 1045, "n": 1046, "type": "narration", "text": "Có vẻ như anh ấy biết đây là một vấn đề. Có thể là vì Chủ tịch không muốn nói...\n이게 문제가된 걸 안 모양이야. 회장님이 알리기 싫어하셔서 그럴 수도 있고...\nLooks like he knew this was a problem. It could be because the Chairman doesn't want to tell...", "suggestedCue": 502}, {"id": 1046, "n": 1047, "type": "dialogue", "text": "Lee Sang-moo lấy ra một hợp đồng từ một phong bì tài liệu.\n이상무가 서류 봉투에서 계약서를 꺼낸다.\nLee Sang-moo takes out a contract from a document envelope.", "suggestedCue": 306}, {"id": 1047, "n": 1048, "type": "dialogue", "text": "Đó là một 'hợp đồng cho vay được đảm bảo bằng cổ phiếu'.\n‘주식 담보 대출 계약서’다.\nIt is a ‘stock-backed loan contract.’", "suggestedCue": 167}, {"id": 1048, "n": 1049, "type": "dialogue", "text": "Thư ký trưởng: ...Mr. Có ổn không...?\n비서실장: ...상무님. 괜찮을까요...?\nChief Secretary: ...Mr. Is it okay...?", "suggestedCue": 167}, {"id": 1049, "n": 1050, "type": "dialogue", "text": "Lee Sang-moo: Không ổn đâu anh bạn.\n이상무: 괜찮지가 않지, 이 사람아.\nLee Sang-moo: It’s not okay, you guy.", "suggestedCue": 271}, {"id": 1050, "n": 1051, "type": "dialogue", "text": "Thư ký trưởng: Xin hãy coi đó như việc cứu mạng tôi...\n비서실장: 저 살려주신다 생각하시고... 부탁드리겠습니다.\nChief Secretary: Please think of it as saving my life.", "suggestedCue": 717}, {"id": 1051, "n": 1052, "type": "dialogue", "text": "59. Nơi ở của Juno (đêm)\n59. 주노의 레지던스 ( 밤 )\n59. Juno’s Residence (night)", "suggestedCue": null}, {"id": 1052, "n": 1053, "type": "dialogue", "text": "Juno đang nói chuyện điện thoại.\n통화 중인 주노.\nJuno on the phone.", "suggestedCue": 33}, {"id": 1053, "n": 1054, "type": "dialogue", "text": "Lee Sang-moo (trên điện thoại): ...Để biết thêm chi tiết, chúng ta hãy gặp nhau và nói chuyện.\n이상무(통화): ...자세한 건, 만나서 얘기하지.\nLee Sang-m
