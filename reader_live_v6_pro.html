*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}.wrap{max-width:1160px;margin:0 auto;padding:8px 12px calc(112px + env(safe-area-inset-bottom))}.sticky{position:sticky;top:0;z-index:20;padding-top:env(safe-area-inset-top);background:linear-gradient(to bottom,rgba(245,247,251,1),rgba(245,247,251,.92),rgba(245,247,251,.82));backdrop-filter:saturate(180%) blur(14px);border-bottom:1px solid var(--line)}.title{font-size:20px;font-weight:900;margin:4px 0 2px}.sub{font-size:12px;color:var(--muted);margin-bottom:7px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:10px;margin-bottom:10px}.top{display:grid;grid-template-columns:1fr;gap:8px}@media(min-width:900px){.top{grid-template-columns:1fr 1fr}}button,select,input[type=range]{width:100%;border:none;border-radius:14px;padding:10px 12px;font-size:14px;font-weight:750;background:#eef2ff;color:#1e3a8a}button{cursor:pointer}button.primary{background:var(--primary);color:white}button.ok{background:#d1fae5;color:#065f46}button.violet{background:var(--violet);color:white}button.stop{background:#fee2e2;color:#991b1b}button.warn{background:#fef3c7;color:#92400e}select{border:1px solid var(--line);background:white;color:#111827}.row{display:grid;grid-template-columns:1fr;gap:8px;margin-top:8px}@media(min-width:760px){.row.two{grid-template-columns:1fr 1fr}.row.three{grid-template-columns:repeat(3,1fr)}.row.four{grid-template-columns:repeat(4,1fr)}}.mini{display:flex;gap:6px;flex-wrap:wrap;align-items:center}.mini button,.mini select{width:auto;font-size:12px;padding:8px 10px}.pill{display:inline-block;background:#eff6ff;color:#1d4ed8;border-radius:999px;padding:3px 8px;font-size:12px}.hint,.status,.small{font-size:12px;color:var(--muted)}audio{width:100%;height:34px}.search{display:grid;grid-template-columns:1fr 80px;gap:6px}.search input{width:100%;border:1px solid var(--line);border-radius:14px;padding:10px 12px;font-size:14px}.control{border:1px solid var(--line);border-radius:14px;padding:10px;background:white}.control label{display:flex;justify-content:space-between;gap:8px;font-size:13px;color:var(--muted);margin-bottom:7px}.segments{display:grid;gap:10px;margin-top:10px}.seg{background:white;border:1px solid var(--line);border-left:5px solid var(--ok);border-radius:16px;padding:12px 13px;box-shadow:0 2px 10px rgba(0,0,0,.035);scroll-margin-top:170px}.seg.dialogue{border-left-color:var(--violet)}.seg.active{background:var(--active);border-color:#93c5fd;box-shadow:0 0 0 3px rgba(37,99,235,.12)}.seg.livePlaying{background:var(--live);border-color:#f59e0b}.meta{display:flex;justify-content:space-between;gap:8px;font-size:12px;color:var(--muted);margin-bottom:7px}.text{white-space:pre-wrap;line-height:1.7;font-size:var(--reader-size);font-weight:620}.line{display:block;padding:3px 6px;border-radius:8px}.line.current{background:var(--highlight)}.ko{font-family:"Malgun Gothic","Apple SD Gothic Neo",Arial,sans-serif}.badge{display:inline-block;border-radius:999px;padding:2px 8px;font-size:11px;font-weight:800;margin-left:4px}.badge.live{background:#dcfce7;color:#166534}.badge.same{background:white;border:1px solid #d1d5db;color:#374151}.linkBox{font-size:12px;margin-top:7px;background:#ecfdf5;color:#065f46;padding:7px 9px;border-radius:12px;display:inline-block}.floatWrap{position:fixed;left:0;right:0;bottom:0;z-index:9999;padding:10px 12px calc(10px + env(safe-area-inset-bottom));background:linear-gradient(to top,rgba(245,247,251,.98),rgba(245,247,251,.92),rgba(245,247,251,0));backdrop-filter:saturate(180%) blur(16px)}.floatInner{max-width:1160px;margin:0 auto;background:#ffffffee;border:1px solid var(--line);box-shadow:var(--shadow);border-radius:18px;padding:9px}.floatGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}@media(min-width:800px){.float <script>
const blocks = [{"id": 0, "n": 1, "type": "narration", "text": "Nghệ thuật đàm phán S01E06\nArtOfNegotiation S01E06\nArtOfNegotiation S01E06", "suggestedCue": 416}, {"id": 1, "n": 2, "type": "dialogue", "text": "Tập 6\n6화\nEpisode 6", "suggestedCue": null}, {"id": 2, "n": 3, "type": "dialogue", "text": "1. Montage (Nhật Bản)\n1. 몽타주 ( 일본 )\n1. Montage (Japan)", "suggestedCue": 681}, {"id": 3, "n": 4, "type": "dialogue", "text": "Sảnh khách sạn (ngày)\n호텔 로비 ( 낮 )\nHotel lobby (day)", "suggestedCue": 176}, {"id": 4, "n": 5, "type": "dialogue", "text": "Min-jeong và Jin-su đang đứng đối diện nhau và chuẩn bị sẵn sàng.\n민정과 진수가 마주 서서 준비를 하고 있다.\nMin-jeong and Jin-su are standing facing each other and getting ready.", "suggestedCue": 438}, {"id": 5, "n": 6, "type": "dialogue", "text": "Minjeong: Anh Jinsu. Bạn có thể làm tốt điều đó phải không?\n민정: 진수 씨. 잘할 수 있죠?\nMinjeong: Mr. Jinsu. You can do it well, right?", "suggestedCue": 144}, {"id": 6, "n": 7, "type": "dialogue", "text": "Jinsu: Vâng. (gật đầu)\n진수: 네. (끄덕끄덕)\nJinsu: Yes. (nod)", "suggestedCue": 627}, {"id": 7, "n": 8, "type": "dialogue", "text": "Sunyoung chạm vào quần áo của Jinsu và nói.\n순영이 진수 옷매무새를 만져 주며 말한다.\nSunyoung touches Jinsu’s clothes and says.", "suggestedCue": 136}, {"id": 8, "n": 9, "type": "dialogue", "text": "Soonyoung: Thành viên nhỏ tuổi nhất hả? Hãy cố gắng làm tốt hơn những việc như đồng đội. Được rồi?\n순영: 막내끼리, 응? 동병상련 그런 걸로 잘 좀 해봐. 알겠지?\nSoonyoung: The youngest members, huh? Try to do better with things like comrade-in-arms. Okay?", "suggestedCue": 390}, {"id": 9, "n": 10, "type": "dialogue", "text": "Jinsu: Vâng. Tôi cũng nhìn thấy Hirose và anh ấy nói điều gì đó rất to ở trên.\n진수: 네. 히로세도 보니까, 위에서 엄청 뭐라고 하더라고요.\nJinsu: Yes. I also saw Hirose, and he said something really loud above.", "suggestedCue": 247}, {"id": 10, "n": 11, "type": "dialogue", "text": "Soonyoung: ...Tôi không nói gì cả Jinsu, nhưng tôi đoán đó là Quản lý Minjeong. Phải?\n순영: ...내가 진수 씨 뭐라고 한 건 없는데, 민정 과장님인가 보다. 그지?\nSoonyoung: ...I didn't say anything Jinsu, but I guess it's Manager Minjeong. Right?", "suggestedCue": 373}, {"id": 11, "n": 12, "type": "dialogue", "text": "Minjeong tinh nghịch liếc nhìn Soonyoung... Hirose xuất hiện.\n민정이 장난스럽게 순영을 흘겨보는데... 히로세가 등장한다.\nMinjeong playfully glances at Soonyoung... Hirose appears.", "suggestedCue": 140}, {"id": 12, "n": 13, "type": "dialogue", "text": "Minjeong nhìn thấy vậy liền lên tiếng trước.\n이를 본 민정이 먼저 대사를 시작한다.\nMinjeong, seeing this, speaks first.", "suggestedCue": 69}, {"id": 13, "n": 14, "type": "dialogue", "text": "Minjeong: Anh Jinsu. Chúng ta đến đây để du lịch Nhật Bản phải không? Hãy tỉnh táo lại.\n민정: 진수 씨. 우리가 일본 관광하러 왔어요? 정신 차리세요.\nMinjeong: Mr. Jinsu. Are we here to tour Japan? Come to your senses.", "suggestedCue": 544}, {"id": 14, "n": 15, "type": "dialogue", "text": "Soonyoung: Nhìn này. (Sau khi phát hiện ra Hirose) Ah. Ông Jinsu đã sai.\n순영: 이거 봐. (히로세를 발견하고) 아. 진수 씨가 잘못했네.\nSoonyoung: Look at this. (After discovering Hirose) Ah. Mr. Jinsu was wrong.", "suggestedCue": 627}, {"id": 15, "n": 16, "type": "dialogue", "text": "Jinsu: Tôi xin lỗi... Lần sau tôi sẽ không phạm sai lầm nữa...\n진수: 죄송합니다... 다음엔 실수하지 않도록...\nJinsu: I'm sorry... I won't make a mistake next time...", "suggestedCue": 94}, {"id": 16, "n": 17, "type": "dialogue", "text": "Soonyoung: Daum đâu rồi? Bạn không biết rằng nếu chúng ta không ký hợp đồng trước thứ Bảy thì sẽ là một vấn đề lớn sao?\n순영: 다음이 어딨어? 우리 토요일까지 계약 못 하면, 큰일인 거 모르나?\nSoonyoung: Where is Daum? Don't you know that if we don't sign a contract by Saturday, it's a big problem?", "suggestedCue": 144}, {"id": 17, "n": 18, "type": "dialogue", "text": "Jinsu: Tôi sẽ cố gắng hết sức...!\n진수: 제가 어떻게든 해보겠습니다...!\nJinsu: I will try my best...!", "suggestedCue": 571}, {"id": 18, "n": 19, "type": "dialogue", "text": "Minjeong: Jinsu, anh định làm gì thế?! Nếu bạn là người trẻ nhất, hãy hành động như người trẻ nhất.\n민정: 진수 씨가 뭘 어떻게 하겠다는 거예요?! 막내면 막내답게 행동하세요.\nMinjeong: Jinsu, what are you going to do?! If you are the youngest, act like the youngest.", "suggestedCue": 144}, {"id": 19, "n": 20, "type": "dialogue", "text": "Jinsu: ...hiện tại cậu đang diễn à?\n진수: ...지금 연기하시는 거 맞아요?\nJinsu: ...are you acting right now?", "suggestedCue": 33}, {"id": 20, "n": 21, "type": "dialogue", "text": "Hirose nhìn thấy Jinsu bị Minjeong mắng. Anh ấy trông có vẻ tiếc nuối.\n진수가 민정에게 혼나는 모습을 본 히로세. 미안한 표정이다.\nHirose sees Jinsu getting scolded by Minjeong. He looks sorry.", "suggestedCue": 544}, {"id": 21, "n": 22, "type": "dialogue", "text": "Quán cà phê (ban ngày)\n커피숍 ( 낮 )\nCoffee shop (daytime)", "suggestedCue": 186}, {"id": 22, "n": 23, "type": "dialogue", "text": "Jinsu đang xem Instagram của Hirose.\n진수가 히로세의 인스타그램을 살펴보고 있다.\nJinsu is looking at Hirose’s Instagram.", "suggestedCue": 627}, {"id": 23, "n": 24, "type": "narration", "text": "Sau khi cuộn xuống nguồn cấp dữ liệu một lúc, nó dừng lại ở một bức ảnh được chụp ở Sinchon.\n피드를 한참 내리다가, 신촌에서 찍은 사진에서 멈춘다.\nAfter scrolling down the feed for a while, it stops at a photo taken in Sinchon.", "suggestedCue": 207}, {"id": 24, "n": 25, "type": "dialogue", "text": "Và những bức ảnh sau đây.\n그리고 이어지는 사진들.\nAnd the following photos.", "suggestedCue": 410}, {"id": 25, "n": 26, "type": "dialogue", "text": "Đây là hình ảnh Hirose đang theo học tại một trường ngoại ngữ.\n어학당을 다닌 히로세의 모습들이다.\nThese are images of Hirose attending a language school.", "suggestedCue": 438}, {"id": 26, "n": 27, "type": "dialogue", "text": "Và rồi, cánh cửa mở ra với một tiếng chuông ‘reng’… Đó là Hirose.\n그리고, ‘딸랑’ 하는 종소리와 함께 문이 열리고... 히로세다.\nAnd then, the door opens with a ‘ringing’ bell sound… It’s Hirose.", "suggestedCue": 136}, {"id": 27, "n": 28, "type": "narration", "text": "Jinsu nhanh chóng tắt điện thoại và giả vờ như không để ý… rồi ngẩng đầu lên nhìn Hirose.\n진수, 얼른 폰을 닫고, 모른 척하다가... 인기척에 고갤 들어 히로세를 본다.\nJinsu quickly closes his phone and pretends not to notice... then raises his head and looks at Hirose.", "suggestedCue": 556}, {"id": 28, "n": 29, "type": "dialogue", "text": "Đường phố (lúc hoàng hôn)\n거리 ( 해 질 녘 )\nStreet (at sunset)", "suggestedCue": 140}, {"id": 29, "n": 30, "type": "dialogue", "text": "Jinsu và Hirose đang đi cạnh nhau.\n진수와 히로세가 나란히 걷고 있다.\nJinsu and Hirose are walking side by side.", "suggestedCue": 23}, {"id": 30, "n": 31, "type": "dialogue", "text": "Jinsu: Tôi có thể hỏi một câu được không?\n진수: 저... 하나만 물어봐도 되나요?\nJinsu: Can I ask one question?", "suggestedCue": 28}, {"id": 31, "n": 32, "type": "dialogue", "text": "Hirose: Ừm... vâng.\n히로세: 음... 네.\nHirose: Um... yes.", "suggestedCue": 23}, {"id": 32, "n": 33, "type": "narration", "text": "Jinsu liếc nhìn phía sau rồi lại bước đi như chưa có chuyện gì xảy ra và hỏi.\n진수, 뒤를 슬쩍 보고, 다시 아무렇지 않은 척 걸으며 묻는다.\nJinsu glances behind him, then walks again as if nothing has happened and asks.", "suggestedCue": 69}, {"id": 33, "n": 34, "type": "dialogue", "text": "Hirose: Bạn tò mò về điều gì?\n히로세: 궁금한 게 뭔데요?\nHirose: What are you curious about?", "suggestedCue": 23}, {"id": 34, "n": 35, "type": "dialogue", "text": "Jinsu: Shimizu không muốn hợp tác kinh doanh với chúng tôi à? Datemae.\n진수: 시미즈는 저희랑 거래할 맘이 없는 거죠? 다테마에.\nJinsu: Shimizu doesn’t want to do business with us? Datemae.", "suggestedCue": 31}, {"id": 35, "n": 36, "type": "dialogue", "text": "Đó là điều chúng ta không hiểu, phải không?\n그건데, 우리가 못 알아듣고 있는 거죠?\nThat's what we don't understand, right?", "suggestedCue": 32}, {"id": 36, "n": 37, "type": "narration", "text": "Hirose nhìn Jinsu rơi nước mắt. Tuy thấy tiếc nhưng tôi thấy buồn cười nên tôi lén cười.\n히로세, 울상이 된 진수를 본다. 미안하면서도 그 모습이 웃긴지, 슬쩍 웃는다.\nHirose sees Jinsu in tears. Although I feel sorry, I think it's funny, so I secretly smile.", "suggestedCue": 136}, {"id": 37, "n": 38, "type": "dialogue", "text": "Hirose: Thật ra... Shimizu hiện đang có ý định chuyển trụ sở.\n히로세: 사실... 시미즈는 지금 본점을 이동하려고 해요.\nHirose: Actually... Shimizu is planning to move its headquarters now.", "suggestedCue": 33}, {"id": 38, "n": 39, "type": "dialogue", "text": "Jinsu: Shizuoka không phải là trụ sở chính sao?\n진수: 시즈오카가 본점 아니에요?\nJinsu: Isn’t Shizuoka the head office?", "suggestedCue": 34}, {"id": 39, "n": 40, "type": "dialogue", "text": "Hirose: Đúng vậy. Tuy nhiên, số lượng người ở Shizuoka đã giảm đi rất nhiều.\n히로세: 맞아요. 하지만, 시즈오카는 사람들이 많이 줄어서요.\nHirose: That's right. However, the number of people in Shizuoka has decreased a lot.", "suggestedCue": 36}, {"id": 40, "n": 41, "type": "dialogue", "text": "Chúng tôi đang có kế hoạch chuyển trụ sở chính đến Tokyo.\n도쿄로 본점을 옮기려고 하거든요.\nWe are planning to move our head office to Tokyo.", "suggestedCue": 37}, {"id": 41, "n": 42, "type": "narration", "text": "Sẽ được quyết định trong tháng này ai sẽ đến Tokyo và ai sẽ ở lại Shizuoka, nhưng Trưởng nhóm Yoshida sẽ ở lại.\n누가 도쿄로 갈지, 시즈오카에 남을지가 이번 달에 결정되는데, 요시다 팀장님은 남게 되었어요.\nIt will be decided this month who will go to Tokyo and who will stay in Shizuoka, but Team Leader Yoshida will stay.", "suggestedCue": 39}, {"id": 42, "n": 43, "type": "dialogue", "text": "Vì hiệu suất.\n실적 때문에요.\nBecause of performance.", "suggestedCue": 41}, {"id": 43, "n": 44, "type": "dialogue", "text": "Jinsu: Ah... Hàn Quốc chỉ muốn đến Seoul thôi, nên đó là một vấn đề.\n진수: 아... 한국도 서울로만 가려고 해서, 문제거든요.\nJinsu: Ah... Korea only wants to go to Seoul, so that's a problem.", "suggestedCue": 42}, {"id": 44, "n": 45, "type": "dialogue", "text": "Hirose: Vâng. Xét cho cùng, Shizuoka là một thành phố nhỏ hơn Tokyo.\n히로세: 네. 아무래도 시즈오카는 도쿄보다 작은 도시니까.\nHirose: Yes. After all, Shizuoka is a smaller city than Tokyo.", "suggestedCue": 43}, {"id": 45, "n": 46, "type": "dialogue", "text": "Jinsu: Còn Hirose thì sao? Bạn có đi Tokyo không? Hay tôi nên ở lại Shizuoka?\n진수: 히로세 씨는요? 도쿄로 가나요? 아니면, 시즈오카에 남나요?\nJinsu: What about Hirose? Are you going to Tokyo? Or should I stay in Shizuoka?", "suggestedCue": 144}, {"id": 46, "n": 47, "type": "dialogue", "text": "Hirose: Một người trong nhóm chúng tôi có thể đến Tokyo.\n히로세: 저희 팀에서 한 명이 도쿄로 갈 수 있어요.\nHirose: One person from our team can go to Tokyo.", "suggestedCue": 47}, {"id": 47, "n": 48, "type": "dialogue", "text": "Chẳng phải sẽ tốt hơn nếu Ozaki đến gặp tôi sao...\n저보다는... 오자키 상이 가지 않을까...\nWouldn't it be better for Ozaki to go to me...", "suggestedCue": 48}, {"id": 48, "n": 49, "type": "dialogue", "text": "Jinsu: Anh Hirose, anh có muốn đi không?\n진수: 히로세 씨도 가고 싶은 거고요?\nJinsu: Mr. Hirose, do you want to go too?", "suggestedCue": 49}, {"id": 49, "n": 50, "type": "dialogue", "text": "Hirose: Ờ... đến Tokyo sẽ tốt cho sự nghiệp của tôi, nhưng...\n히로세: 글쎄요... 도쿄로 가는 것이 아무래도 경력에는 좋지만...\nHirose: Well... going to Tokyo would be good for my career, but...", "suggestedCue": 51}, {"id": 50, "n": 51, "type": "dialogue", "text": "Một cặp đôi đi ngang qua từ phía bên kia.\n맞은편에서 커플이 지나친다.\nA couple passes by from the other side.", "suggestedCue": 438}, {"id": 51, "n": 52, "type": "dialogue", "text": "Khi Jinsu nhường chỗ trước một bước, cặp đôi người Nhật đi ngang qua.\n진수가 한 걸음 앞서 공간을 양보하면, 일본 커플이 지나친다.\nWhen Jinsu gives up space one step ahead, the Japanese couple passes by.", "suggestedCue": 138}, {"id": 52, "n": 53, "type": "dialogue", "text": "Hirose đứng đằng sau Jinsu và chờ đợi, liếc nhanh Jinsu.\n히로세, 진수 뒤에 서서 기다리며 진수를 슬쩍 본다.\nHirose stands behind Jinsu and waits, taking a quick look at Jinsu.", "suggestedCue": 23}, {"id": 53, "n": 54, "type": "dialogue", "text": "Jinsu: (Lại đi cạnh nhau) Nhưng.\n진수: (다시 나란히 걸으며) 근데요.\nJinsu: (Walking side by side again) But.", "suggestedCue": 23}, {"id": 54, "n": 55, "type": "narration", "text": "Trưởng nhóm Yoshida, không phải bạn nên ký hợp đồng với chúng tôi và đáp ứng các yêu cầu về hiệu suất của chúng tôi sao?\n요시다 팀장님은 우리랑 계약해서 실적을 채우시면 되는 거 아닌가요?\nTeam Leader Yoshida, shouldn’t you just sign a contract with us and meet our performance requirements?", "suggestedCue": 52}, {"id": 55, "n": 56, "type": "dialogue", "text": "Hirose: Hợp đồng với Wind chưa đủ để mang lại kết quả.\n히로세: 윈드와의 계약으로는 실적이 되기엔 좀 모자라요.\nHirose: The contract with Wind is not enough to produce results.", "suggestedCue": 53}, {"id": 56, "n": 57, "type": "dialogue", "text": "Hiệu suất chỉ có thể được công nhận khi thanh toán được thực hiện.\n실적은 대금이 입금되어야, 실적으로 인정받을 수 있거든요.\nPerformance can be recognized only when payment is made.", "suggestedCue": 54}, {"id": 57, "n": 58, "type": "dialogue", "text": "Tuy nhiên, số tiền đặt cọc của Wind là chưa đủ.\n하지만, 윈드의 계약금으로는 충분하지 않아서요.\nHowever, Wind’s down payment is not enough.", "suggestedCue": 55}, {"id": 58, "n": 59, "type": "dialogue", "text": "Jinsu: Vậy... ý anh là anh sẽ không giảm giá à?\n진수: 그래서... 할인은 안 해주겠다는 건가요?\nJinsu: So... you’re saying you won’t give a discount?", "suggestedCue": 57}, {"id": 59, "n": 60, "type": "dialogue", "text": "Hirose: (Gật đầu) Nếu không giảm giá, cậu có thể bù lại, nhưng...\n히로세: (끄덕끄덕) 할인을 해주지 않는다면, 실적을 채울 수도 있지만...\nHirose: (Nods) If you don't give a discount, you can make up for it, but...", "suggestedCue": 62}, {"id": 60, "n": 61, "type": "dialogue", "text": "Jinsu: Nếu chúng ta không được giảm giá thì chẳng có lý do gì để ký hợp đồng này cả...\n진수: 우리는 할인을 못 받으면, 이 계약을 할 이유가 없거든요...\nJinsu: If we don't get a discount, there's no reason to sign this contract...", "suggestedCue": 58}, {"id": 61, "n": 62, "type": "dialogue", "text": "Hirose: Khó lắm.\n히로세: 어렵네요.\nHirose: It's difficult.", "suggestedCue": 23}, {"id": 62, "n": 63, "type": "dialogue", "text": "Trước Odeng Bar (đêm)\n오뎅바 앞 ( 밤 )\nIn front of Odeng Bar (night)", "suggestedCue": 207}, {"id": 63, "n": 64, "type": "dialogue", "text": "Jinsu và Hirose đứng trước một quán oden.\n오뎅바 앞에 선 진수와 히로세.\nJinsu and Hirose stand in front of an oden bar.", "suggestedCue": 247}, {"id": 64, "n": 65, "type": "dialogue", "text": "Hirose: Đây. Nơi thường xuyên của tôi.\n히로세: 여기에요. 저의 단골집.\nHirose: Here. My regular place.", "suggestedCue": 86}, {"id": 65, "n": 66, "type": "dialogue", "text": "Jinsu: Ồ... thật lãng mạn.\n진수: 오... 낭만 있네요.\nJinsu: Oh... it's romantic.", "suggestedCue": 271}, {"id": 66, "n": 67, "type": "dialogue", "text": "Odeng Bar (đêm)\n오뎅바 ( 밤 )\nOdeng Bar (night)", "suggestedCue": null}, {"id": 67, "n": 68, "type": "dialogue", "text": "Jinsu và Hirose ngồi cạnh nhau ở bàn bar.\n바테이블에 나란히 앉은 진수와 히로세.\nJinsu and Hirose sit side by side at the bar table.", "suggestedCue": 23}, {"id": 68, "n": 69, "type": "dialogue", "text": "Jinsu: Thế thì. Thường nhận được bao nhiêu phần trăm tiền trả trước?\n진수: 그러면요. 계약금은 보통 몇 퍼센트를 받나요?\nJinsu: Then. What percentage of down payment is usually received?", "suggestedCue": 66}, {"id": 69, "n": 70, "type": "dialogue", "text": "Hirose: Hướng dẫn sử dụng là ‘Gửi 10% vào cuối tháng tiếp theo.’\n히로세: ‘10%를 다음 달 말일까지 입금한다.’가 매뉴얼이죠.\nHirose: The manual is ‘Deposit 10% by the end of the next month.’", "suggestedCue": 67}, {"id": 70, "n": 71, "type": "dialogue", "text": "Jinsu: Ah... Đến tháng sau, những người sẽ đến Tokyo đã được quyết định rồi...\n진수: 아... 다음 달이면, 도쿄로 떠날 사람들은 이미 정해졌을 테니까...\nJinsu: Ah... By next month, the people who will leave for Tokyo will have already been decided...", "suggestedCue": 68}, {"id": 71, "n": 72, "type": "dialogue", "text": "Nó không liên quan gì đến Trưởng nhóm Yoshida.\n요시다 팀장님이랑은 또 상관이 없네요.\nIt has nothing to do with Team Leader Yoshida.", "suggestedCue": 69}, {"id": 72, "n": 73, "type": "dialogue", "text": "Hirose: Vâng.\n히로세: 네.\nHirose: Yes.", "suggestedCue": 23}, {"id": 73, "n": 74, "type": "dialogue", "text": "Người khách ngồi cạnh tôi đứng dậy sau khi dùng bữa xong.\n옆자리, 음식을 다 먹은 손님이 자리에서 일어선다.\nThe customer sitting next to me stands up after finishing his meal.", "suggestedCue": 556}, {"id": 74, "n": 75, "type": "dialogue", "text": "Khách hàng: (Nói) Tôi rất thích bữa ăn của mình.\n손님: (일어) 잘 먹고 갑니다.\nCustomer: (Speaking) I enjoyed my meal.", "suggestedCue": 556}, {"id": 75, "n": 76, "type": "dialogue", "text": "Chủ tịch: (tiếng Nhật) Cảm ơn bạn. tạm biệt!\n사장: (일어) 감사합니다. 안녕히 가세요!\nPresident: (Japanese) Thank you. goodbye!", "suggestedCue": 135}, {"id": 76, "n": 77, "type": "dialogue", "text": "Tiếp theo, chủ tịch đặt oden trước mặt Jinsu và Hirose.\n이어서, 사장이 진수와 히로세 앞에 오뎅을 놓는다.\nNext, the president places oden in front of Jinsu and Hirose.", "suggestedCue": 423}, {"id": 77, "n": 78, "type": "dialogue", "text": "Hirose: (tiếng Nhật) Cảm ơn bạn.\n히로세: (일어) 감사합니다.\nHirose: (Japanese) Thank you.", "suggestedCue": 23}, {"id": 78, "n": 79, "type": "dialogue", "text": "Jinsu: (tiếng Nhật) Cảm ơn bạn.\n진수: (일어) 감사합니다.\nJinsu: (Japanese) Thank you.", "suggestedCue": 94}, {"id": 79, "n": 80, "type": "dialogue", "text": "Bên ngoài Odeng Bar (ban đêm)\n오뎅바 밖 ( 밤 )\nOutside Odeng Bar (at night)", "suggestedCue": 505}, {"id": 80, "n": 81, "type": "narration", "text": "Sau khi khách hàng rời quán Odeng Bar (nơi Jinsu và Hirose ở) đi ngang qua, quán Odeng Bar đối diện họ hiện ra.\n(진수와 히로세가 있던) 오뎅바를 나선 손님이 지나면, 맞은편 오뎅바 모습이 보인다.\nAfter the customers leaving the Odeng Bar (where Jinsu and Hirose were located) pass by, the Odeng Bar across from them is visible.", "suggestedCue": 438}, {"id": 81, "n": 82, "type": "dialogue", "text": "Sunyoung và Minjeong đang ở quán bar Odeng bên kia đường.\n맞은편 오뎅바에 순영과 민정이 있다.\nSunyoung and Minjeong are at the Odeng bar across the street.", "suggestedCue": 438}, {"id": 82, "n": 83, "type": "dialogue", "text": "Odeng được phục vụ trước mặt họ, Sunyoung lấy một chiếc và ăn.\n둘 앞에도 오뎅이 서빙되고, 순영이 하나 집어 먹는다.\nOdeng is served in front of them, and Sunyoung takes one and eats it.", "suggestedCue": 207}, {"id": 83, "n": 84, "type": "dialogue", "text": "Odeng Bar (đêm)\n오뎅바 ( 밤 )\nOdeng Bar (night)", "suggestedCue": null}, {"id": 84, "n": 85, "type": "dialogue", "text": "Jinsu, nhặt một chiếc oden lên và ăn nó.\n진수, 오뎅 하나를 집어 먹는다.\nJinsu, picks up one oden and eats it.", "suggestedCue": 627}, {"id": 85, "n": 86, "type": "dialogue", "text": "Hirose, tôi đang nhìn bạn.\n히로세, 그 모습을 보고 있다.\nHirose, I am looking at you.", "suggestedCue": 23}, {"id": 86, "n": 87, "type": "dialogue", "text": "Hirose: Bạn cảm thấy thế nào?\n히로세: 어때요?\nHirose: How do you feel?", "suggestedCue": 86}, {"id": 87, "n": 88, "type": "dialogue", "text": "Jinsu: (Ăn oden nóng) Ồ, ngon quá! Ôi!\n진수: (뜨거운 오뎅을 먹으며) 어, 진짜 맛있어요! 오이시!\nJinsu: (Eating hot oden) Oh, it’s really delicious! Oishi!", "suggestedCue": 77}, {"id": 88, "n": 89, "type": "dialogue", "text": "Hirose mỉm cười.\n웃는 히로세.\nHirose smiles.", "suggestedCue": 23}, {"id": 89, "n": 90, "type": "dialogue", "text": "Jinsu: Nhưng lý do cậu nói với tôi về tình hình của Shimizu là...\n진수: 근데요, 저한테 시미즈 사정을 알려주시는 이유가...\nJinsu: But, the reason you told me about Shimizu’s situation is...", "suggestedCue": 83}, {"id": 90, "n": 91, "type": "dialogue", "text": "Hirose: À... tôi cảm thấy tiếc... (mỉm cười) Tôi cũng muốn làm như vậy.\n히로세: 음... 미안한 마음도 있고... (미소) 저도 그러고 싶어서요.\nHirose: Well... I feel sorry... (smiling) I want to do the same.", "suggestedCue": 144}, {"id": 91, "n": 92, "type": "dialogue", "text": "Jinsu: Có lẽ vậy. Ông Hirose, nếu ông cũng cần kết quả. Vì vậy, bạn có thể đi đến Tokyo.\n진수: 혹시요. 히로세 씨도 성과가 필요하신 거면요. 도쿄로 가실 수있게요.\nJinsu: Perhaps. Mr. Hirose, if you also need results. So you can go to Tokyo.", "suggestedCue": 86}, {"id": 92, "n": 93, "type": "dialogue", "text": "Nếu đúng như vậy thì tôi sẽ tìm hiểu xem thế nào.\n그러신 거면, 제가 방법을 알아보겠습니다.\nIf that's the case, I'll find out how.", "suggestedCue": 87}, {"id": 93, "n": 94, "type": "dialogue", "text": "Hirose: À... vâng. (gật đầu)\n히로세: 아... 네. (끄덕끄덕)\nHirose: Ah... yes. (nod)", "suggestedCue": 23}, {"id": 94, "n": 95, "type": "dialogue", "text": "Trước đường Oden (đêm)\n오뎅 거리 앞 ( 밤 )\nIn front of Oden Street (night)", "suggestedCue": 207}, {"id": 95, "n": 96, "type": "dialogue", "text": "Jinsu và Hirose đang đứng đối mặt nhau.\n진수와 히로세가 마주 서 있다.\nJinsu and Hirose are standing face to face.", "suggestedCue": 23}, {"id": 96, "n": 97, "type": "dialogue", "text": "Jinsu: Hôm nay cảm ơn bạn rất nhiều. Mua cho tôi thứ gì đó ngon nhé. Lẽ ra tôi nên mua nó.\n진수: 오늘 정말 감사했습니다. 맛있는 것도 사주시고. 제가 샀어야 했는데.\nJinsu: Thank you so much today. Buy me something delicious. I should have bought it.", "suggestedCue": 94}, {"id": 97, "n": 98, "type": "dialogue", "text": "Hirose: Lần sau anh Jinsu hãy mua cho em nhé.\n히로세: 다음에는 진수 씨가 사주세요.\nHirose: Next time, Mr. Jinsu, please buy it for me.", "suggestedCue": 94}, {"id": 98, "n": 99, "type": "dialogue", "text": "Jinsu: Vâng! Lần tới, à, khi cậu đến Hàn Quốc, tôi sẽ mua cho cậu thứ gì đó ngon ngon!\n진수: 네! 다음에, 아, 한국 오시면 제가 맛있는 거 사드리겠습니다!\nJinsu: Yes! Next time, ah, when you come to Korea, I'll buy you something delicious!", "suggestedCue": 96}, {"id": 99, "n": 100, "type": "dialogue", "text": "Hirose: (Cười) Jinsu có vẻ là một người thuần khiết.\n히로세: (웃음) 진수 씨는 순수한 사람 같아요.\nHirose: (Laughs) Jinsu seems like a pure person.", "suggestedCue": 97}, {"id": 100, "n": 101, "type": "dialogue", "text": "Jinsu: Vâng? Tôi? Datemae phải không? Nguyên chất...? (Hãy nghĩ xem nó có ý nghĩa gì)\n진수: 예? 제가요? 다테마에죠? 순수...? (무슨 뜻인지 생각해 보고)\nJinsu: Yes? Me? Datemae, right? Pure...? (Think about what it means)", "suggestedCue": 48}, {"id": 101, "n": 102, "type": "dialogue", "text": "Hirose: (Cười, cười lớn) Không. Đây là Honne.\n히로세: (웃으며, 절레절레) 아뇨. 혼네예요.\nHirose: (Laughing, laughing) No. This is Honne.", "suggestedCue": 23}, {"id": 102, "n": 103, "type": "dialogue", "text": "Hirose kiểm tra đồng hồ và chào Jinsu lần nữa.\n히로세가 손목시계를 확인하고, 다시 진수에게 인사한다.\nHirose checks his watch and greets Jinsu again.", "suggestedCue": 404}, {"id": 103, "n": 104, "type": "dialogue", "text": "Hirose: Chắc chắn rồi. tạm biệt.\n히로세: 그럼. 안녕히 가세요.\nHirose: Sure. goodbye.", "suggestedCue": 624}, {"id": 104, "n": 105, "type": "dialogue", "text": "Jinsu: Vâng. tạm biệt!\n진수: 네. 안녕히 가세요!\nJinsu: Yes. goodbye!", "suggestedCue": 627}, {"id": 105, "n": 106, "type": "dialogue", "text": "Jinsu và Hirose rời đi rồi quay lại phố Oden.\n진수, 떠나는 히로세를 보다가 다시 오뎅 거리로 들어간다.\nJinsu and Hirose leave, then go back to Oden Street.", "suggestedCue": 324}, {"id": 106, "n": 107, "type": "dialogue", "text": "Odeng Bar bên kia đường (ban đêm)\n건너편 오뎅바 ( 밤 )\nOdeng Bar across the street (at night)", "suggestedCue": 470}, {"id": 107, "n": 108, "type": "dialogue", "text": "Jinsu bước vào quán bar Odeng nơi Soonyoung và Minjeong đang ở.\n순영과 민정이 있는 오뎅바로 들어온 진수.\nJinsu enters the Odeng bar where Soonyoung and Minjeong are.", "suggestedCue": 438}, {"id": 108, "n": 109, "type": "dialogue", "text": "Jinsu: Luật sư. (Ngồi cạnh bạn.)\n진수: 변호사님. (옆에 앉는다.)\nJinsu: Attorney. (Sits next to you.)", "suggestedCue": 94}, {"id": 109, "n": 110, "type": "dialogue", "text": "Soonyoung: Vâng. Bạn là loại gián điệp nào?\n순영: 이야. 무슨 스파이인 줄?\nSoonyoung: Yes. What kind of spy are you?", "suggestedCue": 144}, {"id": 110, "n": 111, "type": "dialogue", "text": "Minjeong: Không. Bạn có nghe thấy gì không?\n민정: 아니. 들은 거 좀 있어요?\nMinjeong: No. Have you heard anything?", "suggestedCue": 280}, {"id": 111, "n": 112, "type": "dialogue", "text": "Jinsu: Vâng. …Shimizu cũng có hoàn cảnh nội tâm.\n진수: 네. ...시미즈도 내부 사정이 있더라고요.\nJinsu: Yes. ...Shimizu also had internal circumstances.", "suggestedCue": 107}, {"id": 112, "n": 113, "type": "dialogue", "text": "Soonyoung: Cậu kể cho tôi nghe mọi chuyện à?\n순영: 그걸 다 말해줬어?\nSoonyoung: Did you tell me everything?", "suggestedCue": 108}, {"id": 113, "n": 114, "type": "dialogue", "text": "Jinsu: Vâng.\n진수: 네.\nJinsu: Yes.", "suggestedCue": 627}, {"id": 114, "n": 115, "type": "dialogue", "text": "2. Nhà Hirose (Nhật Bản) (đêm)\n2. 히로세의 집 ( 일본 ) ( 밤 )\n2. Hirose’s house (Japan) (night)", "suggestedCue": 681}, {"id": 115, "n": 116, "type": "dialogue", "text": "Lối vào mở ra và Hirose bước vào.\n현관이 열리고, 히로세가 들어선다.\nThe entrance opens, and Hirose enters.", "suggestedCue": 23}, {"id": 116, "n": 117, "type": "dialogue", "text": "Khi anh cởi giày và bước vào phòng, một con mèo chào đón Hirose.\n신발을 벗고 실내로 들어서면, 고양이 한 마리가 히로세를 반긴다.\nWhen he takes off his shoes and enters the room, a cat greets Hirose.", "suggestedCue": 390}, {"id": 117, "n": 118, "type": "dialogue", "text": "Một con mèo đang ôm chân Hirose.\n히로세의 발에 몸을 부비는 고양이.\nA cat hugging Hirose’s feet.", "suggestedCue": 23}, {"id": 118, "n": 119, "type": "dialogue", "text": "Hirose và Jinsu đang đi những chiếc tất có hình nhân vật được tặng cho họ.\n히로세, 진수가 준 캐릭터 양말을 신고 있다.\nHirose and Jinsu are wearing character socks given to them.", "suggestedCue": 23}, {"id": 119, "n": 120, "type": "dialogue", "text": "Tập 6. Suy nghĩ nội tâm\n6화. 속마음\nEpisode 6. inner thoughts", "suggestedCue": null}, {"id": 120, "n": 121, "type": "dialogue", "text": "3. Phòng Tatami, khách sạn (Nhật Bản) (đêm)\n3. 다다미방, 호텔 ( 일본 ) ( 밤 )\n3. Tatami room, hotel (Japan) (night)", "suggestedCue": 671}, {"id": 121, "n": 122, "type": "dialogue", "text": "Juno và nhóm đang ngồi quanh bàn.\n주노와 팀원들이 테이블에 둘러앉아 있다.\nJuno and the team are sitting around the table.", "suggestedCue": 438}, {"id": 122, "n": 123, "type": "dialogue", "text": "Juno: Trưởng nhóm Yoshida, bạn đang nói rằng hiệu suất là quan trọng phải không?\n주노: 요시다 팀장님은 실적이 중요한 상황이라는 거죠?\nJuno: Team Leader Yoshida, you’re saying that performance is important, right?", "suggestedCue": 109}, {"id": 123, "n": 124, "type": "dialogue", "text": "Jinsu: Vâng.\n진수: 네.\nJinsu: Yes.", "suggestedCue": 627}, {"id": 124, "n": 125, "type": "dialogue", "text": "Juno: (nói với Minjeong) Cần đặt cọc bao nhiêu?\n주노: (민정에게) 필요한 계약금은 얼마죠?\nJuno: (to Minjeong) How much down payment is needed?", "suggestedCue": 111}, {"id": 125, "n": 126, "type": "dialogue", "text": "Minjeong: Dựa trên 9.000 căn, nếu áp dụng tỷ lệ chiết khấu 40% thì khoản trả trước là 16,666%.\n민정: 9천 개 기준, 할인율 40%를 적용받으면 계약금 16.666%입니다.\nMinjeong: Based on 9,000 units, if a 40% discount rate is applied, the down payment is 16.666%.", "suggestedCue": 112}, {"id": 126, "n": 127, "type": "dialogue", "text": "Juno: Nếu tỷ lệ chiết khấu là 50% thì sao?\n주노: 할인율 50%로 하면요?\nJuno: What if the discount rate is 50%?", "suggestedCue": 112}, {"id": 127, "n": 128, "type": "dialogue", "text": "Soonyoung: Để được giảm giá 50%, số lượng đặt hàng phải vượt quá 10.000 chiếc.\n순영: 할인율 50%를 받으려면 주문량이 일만 개를 넘어야 하는데요.\nSoonyoung: To receive a 50% discount, the order quantity must exceed 10,000 units.", "suggestedCue": 113}, {"id": 128, "n": 129, "type": "dialogue", "text": "Juno: Vâng. (Thể hiện rằng anh ấy biết) Sunyoung: Ah... (Nhận ra ý của Juno)\n주노: 네. (알고 있다는 뜻으로) 순영: 아... (주노의 뜻을 깨닫고)\nJuno: Yes. (Indicating that he knows) Sunyoung: Ah... (Realizing Juno’s meaning)", "suggestedCue": 207}, {"id": 129, "n": 130, "type": "dialogue", "text": "Minjeong: Khoản trả trước là 18%.\n민정: 계약금 18%입니다.\nMinjeong: The down payment is 18%.", "suggestedCue": 682}, {"id": 130, "n": 131, "type": "dialogue", "text": "Juno: Sẽ ổn thôi.\n주노: 그 정도면 괜찮겠네요.\nJuno: That would be fine.", "suggestedCue": 117}, {"id": 131, "n": 132, "type": "dialogue", "text": "Minjeong: Chúng ta hẹn gặp nhau nhé?\n민정: 미팅 잡을까요?\nMinjeong: Shall we set up a meeting?", "suggestedCue": 118}, {"id": 132, "n": 133, "type": "dialogue", "text": "Juno: Không. Tôi sẽ gặp Trưởng nhóm Yoshida trước.\n주노: 아뇨. 제가 요시다 팀장님을 먼저 만날게요.\nJuno: No. I will meet Team Leader Yoshida first.", "suggestedCue": 40}, {"id": 133, "n": 134, "type": "dialogue", "text": "Minjeong: Vâng.\n민정: 넵.\nMinjeong: Yes.", "suggestedCue": 0}, {"id": 134, "n": 135, "type": "dialogue", "text": "Juno: Xin hãy nói chuyện với tôi một lát.\n주노: 잠시 통화 좀.\nJuno: Please talk to me for a moment.", "suggestedCue": 247}, {"id": 135, "n": 136, "type": "narration", "text": "Juno đứng dậy khỏi chỗ ngồi và đi ra ngoài sân thượng để gọi điện thoại. Người nhận là CEO Park Rae-kyung.\n주노, 자리에서 일어나 테라스로 나가며 전화를 건다. 수신자는 박래경 대표다.\nJuno gets up from her seat and goes out to the terrace to make a phone call. The recipient is CEO Park Rae-kyung.", "suggestedCue": 438}, {"id": 136, "n": 137, "type": "dialogue", "text": "Rae-kyung Park (gọi điện): Trưởng nhóm Yoon. Thế nào... mọi chuyện ổn chứ?\n박래경(통화): 윤팀장님. 어떻게... 잘되고 있나요?\nRae-kyung Park (phone call): Team Leader Yoon. How... is it going well?", "suggestedCue": 167}, {"id": 137, "n": 138, "type": "dialogue", "text": "Juno: Vâng. Nó đang được tiến hành. Tôi có vài điều muốn hỏi bạn.\n주노: 네. 진행 중인데요. 부탁드릴 게 있어서요.\nJuno: Yes. It's in progress. I have something to ask you.", "suggestedCue": 125}, {"id": 138, "n": 139, "type": "dialogue", "text": "Rae-kyung Park (gọi điện): Vâng.\n박래경(통화): 네.\nRae-kyung Park (phone call): Yes.", "suggestedCue": 534}, {"id": 139, "n": 140, "type": "dialogue", "text": "Juno: Tôi đang tự hỏi liệu chúng ta có thể tăng số tiền đặt cọc và trả trước không.\n주노: 저희가 계약금을 높여서 선지급할 수 있을까 해서요.\nJuno: I was wondering if we could raise the down payment and pay it in advance.", "suggestedCue": 126}, {"id": 140, "n": 141, "type": "dialogue", "text": "Park Rae-kyung (gọi điện): Ah... sao...\n박래경(통화): 아... 얼마나...\nPark Rae-kyung (phone call): Ah... how...", "suggestedCue": 534}, {"id": 141, "n": 142, "type": "dialogue", "text": "Juno: 20%. Điều kiện là thanh toán phải được thực hiện trong tháng này.\n주노: 20%입니다. 이달 안에 지급해야 하는 조건이고요.\nJuno: 20%. The condition is that payment must be made within this month.", "suggestedCue": 129}, {"id": 142, "n": 143, "type": "dialogue", "text": "Rae-kyung Park (qua điện thoại): À... chúng ta không có nhiều thời gian rảnh trong tháng này đâu. Đội trưởng.\n박래경(통화): 아... 이달 안에는 저희가 그 정도 여유는 없습니다. 팀장님.\nRae-kyung Park (via phone): Ah... we don't have that much free time within this month. Team leader.", "suggestedCue": 131}, {"id": 143, "n": 144, "type": "dialogue", "text": "Juno: Vâng. Đó không phải là điều tôi yêu cầu bạn làm.\n주노: 네. 제가 부탁드릴 건, 그게 아니고요.\nJuno: Yes. That's not what I'm asking you to do.", "suggestedCue": 144}, {"id": 144, "n": 145, "type": "narration", "text": "Đối với khoản trả trước, bạn có thể yêu cầu hỗ trợ tài chính ngắn hạn từ trụ sở chính. Nhưng...\n계약금은 본사에서 단기 자금 지원 요청하시면 될 겁니다. 다만...\nFor the down payment, you can request short-term financial support from the head office. But...", "suggestedCue": 135}, {"id": 145, "n": 146, "type": "dialogue", "text": "4. Sảnh tầng 1, trụ sở Tập đoàn Sanin (ban ngày)\n4. 1층 로비, 산인 그룹 본사 ( 낮 )\n4. 1st floor lobby, Sanin Group headquarters (daytime)", "suggestedCue": 140}, {"id": 146, "n": 147, "type": "dialogue", "text": "Park Rae-kyung đứng trước tiền sảnh. đang đợi ai đó\n로비 앞에 서 있는 박래경. 누군가를 기다리고 있다.\nPark Rae-kyung standing in front of the lobby. waiting for someone", "suggestedCue": 406}, {"id": 147, "n": 148, "type": "dialogue", "text": "Giám đốc Hà bước xuống xe và đi vào sảnh.\n세단에서 하전무가 내리고, 로비로 들어선다.\nDirector Ha gets out of the sedan and enters the lobby.", "suggestedCue": 269}, {"id": 148, "n": 149, "type": "dialogue", "text": "Park Rae-kyung, nhanh chóng ẩn mình đi.\n박래경, 얼른 몸을 숨기고.\nPark Rae-kyung, quickly hide yourself.", "suggestedCue": 550}, {"id": 149, "n": 150, "type": "dialogue", "text": "Juno (giọng nói): Thay vì đến gặp Giám đốc điều hành Hà, tôi nghĩ sẽ tốt hơn nếu gặp Chủ tịch và nói với ông ấy ngay.\n주노(소리): 하전무님을 찾아가지 마시고, 바로 회장님을 뵙고 말씀드리는 게좋을 거 같습니다.\nJuno (voice): Instead of going to Executive Director Ha, I think it would be better to meet the Chairman and tell him right away.", "suggestedCue": 136}, {"id": 150, "n": 151, "type": "dialogue", "text": "Park Rae-kyung (giọng nói): Không... Khi nói đến quỹ, Giám đốc điều hành Hà là Giám đốc tài chính.\n박래경(소리): 아니... 자금이면 하전무님이 CFO시잖아요.\nPark Rae-kyung (voice): No... When it comes to funds, Executive Director Ha is the CFO.", "suggestedCue": 137}, {"id": 151, "n": 152, "type": "narration", "text": "Nhưng nếu nói ngay với chủ tịch thì coi như bỏ qua Giám đốc điều hành Hà…\n근데 제가 바로 회장님께 말씀을 드리면, 하전무님을 건너뛰는 셈인데...\nBut if I tell the chairman right away, it would be like skipping Executive Director Ha...", "suggestedCue": 138}, {"id": 152, "n": 153, "type": "dialogue", "text": "Juno (giọng nói): Vâng. Vâng, đúng vậy. Tình hình ở trụ sở hiện tại có chút phức tạp.\n주노(소리): 네. 그렇긴 한데요. 지금 본사 사정이 조금 복잡해서요.\nJuno (voice): Yes. Yes, it is. The situation at the headquarters is a bit complicated right now.", "suggestedCue": 140}, {"id": 153, "n": 154, "type": "dialogue", "text": "Tôi nghĩ lần này tốt nhất nên báo cáo trực tiếp với Chủ tịch.\n이번만큼은 회장님께 직접 보고하시는 게 어떨까 합니다.\nI think it would be a good idea to report directly to the Chairman this time.", "suggestedCue": 141}, {"id": 154, "n": 155, "type": "dialogue", "text": "Nếu có thể thì tình cờ gặp nhau ở sảnh sẽ tốt hơn.\n이왕이면 로비에서 우연히 만나시는 게 좋을 거 같고요.\nIf possible, it would be better to meet by chance in the lobby.", "suggestedCue": 142}, {"id": 155, "n": 156, "type": "dialogue", "text": "Cùng lúc đó, xe của Chủ tịch Song xuất hiện, theo sau là xe nghi lễ.\n그때, 송회장의 차가 등장하고, 뒤따르는 의전차량.\nAt that time, Chairman Song's car appears, followed by a ceremonial vehicle.", "suggestedCue": 500}, {"id": 156, "n": 157, "type": "narration", "text": "Park Rae-kyung đang lẩn trốn nhanh chóng bước ra, nhìn thấy Chủ tịch Song và cúi đầu.\n몸을 숨기고 있던 박래경이 얼른 나와, 송회장을 보고 꾸벅 인사한다.\nPark Rae-kyung, who was hiding, quickly comes out, sees Chairman Song, and bows.", "suggestedCue": 533}, {"id": 157, "n": 158, "type": "dialogue", "text": "Park Rae-Kyung: Chủ tịch.\n박래경: 회장님.\nRae-Kyung Park: Chairman.", "suggestedCue": 550}, {"id": 158, "n": 159, "type": "dialogue", "text": "Chủ tịch Song: Chuyện gì đã xảy ra vậy?\n송회장: 어짠 일이고?\nChairman Song: What happened?", "suggestedCue": 33}, {"id": 159, "n": 160, "type": "dialogue", "text": "Rae-kyung Park: Lẽ ra tôi phải điều hành tốt hoạt động này... Tôi xin lỗi.\n박래경: 제가 운영을 잘했어야 하는데... 죄송합니다.\nRae-kyung Park: I should have run the operation well... I'm sorry.", "suggestedCue": 144}, {"id": 160, "n": 161, "type": "dialogue", "text": "Chủ tịch Song: Bạn đang nói về cái gì vậy? Bạn chỉ cần xử lý nó tốt. Chẳng phải chúng ta đã nói là sẽ bán nó sao?\n송회장: 뭔 소리고. 니는 잘 맨들기만 해라. 팔기는 우리가 팔아준다 안 했나.\nChairman Song: What are you talking about? You just have to handle it well. Didn’t we say we would sell it?", "suggestedCue": 144}, {"id": 161, "n": 162, "type": "dialogue", "text": "Park Rae-kyung: Tuy nhiên... Tôi nghe nói bạn rất tức giận về việc niêm yết...\n박래경: 그래도요... 상장 때문에 화가 많이 나셨다고...\nPark Rae-kyung: Still... I heard you were very angry about the listing...", "suggestedCue": 145}, {"id": 162, "n": 163, "type": "dialogue", "text": "Chủ tịch Song: Là Aida. Sự tức giận là gì? (Nhưng) Ồ?\n송회장: 아이다. 화는 무슨. (근데) 와?\nChairman Song: It’s Aida. What is anger? (But) Wow?", "suggestedCue": 137}, {"id": 163, "n": 164, "type": "dialogue", "text": "5. Văn phòng Chủ tịch, Trụ sở Tập đoàn Sanin (ban ngày)\n5. 회장실, 산인 그룹 본사 ( 낮 )\n5. Chairman’s Office, Sanin Group Headquarters (daytime)", "suggestedCue": 140}, {"id": 164, "n": 165, "type": "dialogue", "text": "Jisoo đặt xe xuống trước mặt Chủ tịch Song và Park Rae-kyung.\n지수가 송회장과 박래경 앞에 차를 내려놓는다.\nJisoo puts the car down in front of Chairman Song and Park Rae-kyung.", "suggestedCue": 406}, {"id": 165, "n": 166, "type": "dialogue", "text": "Rae-Kyung Park: Họ nói rằng hợp đồng sẽ được ký với điều kiện số tiền trả trước phải tăng lên.\n박래경: 계약금을 좀 높이는 조건으로 계약이 될 거라고 하더라고요.\nRae-Kyung Park: They said the contract would be signed on the condition that the down payment be increased.", "suggestedCue": 146}, {"id": 166, "n": 167, "type": "dialogue", "text": "Chủ tịch Song: Đội trưởng?\n송회장: 그 팀장이?\nChairman Song: The team leader?", "suggestedCue": 149}, {"id": 167, "n": 168, "type": "dialogue", "text": "Park Rae-Kyung: Đúng vậy. Đây là Trưởng nhóm Yun Juno.\n박래경: 예. 윤주노 팀장이요.\nRae-Kyung Park: Yes. This is Team Leader Yun Juno.", "suggestedCue": 546}, {"id": 168, "n": 169, "type": "dialogue", "text": "Chủ tịch Song: Nếu số tiền trả trước cao hơn thì tổng số tiền phải giảm xuống. Bạn không viết à?\n송회장: 계약금을 높이 주면, 총액은 깎아야지. 안 글나?\nChairman Song: If the down payment is higher, the total amount should be reduced. Don’t you write?", "suggestedCue": 149}, {"id": 169, "n": 170, "type": "dialogue", "text": "Park Rae-Kyung: ...Đúng.\n박래경: ...네.\nRae-Kyung Park: ...Yes.", "suggestedCue": 534}, {"id": 170, "n": 171, "type": "narration", "text": "Khi chuẩn bị rời khỏi phòng chủ tịch, Chủ tịch Song nói chuyện với Jisoo, cô đứng đó một lúc, nghe cuộc trò chuyện rồi rời khỏi cửa.\n회장실을 나서려다, 잠시 서서 대화를 듣고 문을 나서는 지수에게 송회장이 말한다.\nAs he was about to leave the chairman's office, Chairman Song spoke to Jisoo, who stood for a moment, listened to the conversation, and then left the door.", "suggestedCue": 247}, {"id": 171, "n": 172, "type": "dialogue", "text": "Chủ tịch Song: Đưa cho tôi.\n송회장: 주라 해라.\nChairman Song: Give it to me.", "suggestedCue": 361}, {"id": 172, "n": 173, "type": "dialogue", "text": "Jisoo: Vâng.\n지수: 네.\nJisoo: Yes.", "suggestedCue": 0}, {"id": 173, "n": 174, "type": "dialogue", "text": "Jisoo chào rồi rời đi.\n인사하고 나가는 지수.\nJisoo says hello and leaves.", "suggestedCue": 23}, {"id": 174, "n": 175, "type": "narration", "text": "Chủ tịch Song nhìn Rae-kyung Park từ trên xuống dưới rồi chạm vào đùi Rae-kyung Park.\n송회장은 박래경을 위아래로 훑어보더니, 박래경의 허벅지를 만져본다.\nChairman Song looks Rae-kyung Park up and down, then touches Rae-kyung Park's thigh.", "suggestedCue": 532}, {"id": 175, "n": 176, "type": "dialogue", "text": "Chủ tịch Song: Wow... Tôi đoán là do bạn từng là vận động viên... Bạn vẫn mập à?\n송회장: 와따... 니는 운동선수 출신이라 그런가... 아직 두껍다이?\nChairman Song: Wow... I guess it's because you were an athlete... Are you still thick?", "suggestedCue": 268}, {"id": 176, "n": 177, "type": "dialogue", "text": "Park Rae-kyung: (xấu hổ) À, vâng...\n박래경: (당황하며) 아, 예...\nPark Rae-kyung: (embarrassed) Ah, yes...", "suggestedCue": 534}, {"id": 177, "n": 178, "type": "dialogue", "text": "Chủ tịch Song: Thông thường, người có thể lực tốt thì giỏi kinh doanh.\n송회장: 원래, 체력이 좋은 놈이 사업도 잘한다.\nChairman Song: Normally, people with good physical strength are good at business.", "suggestedCue": 155}, {"id": 178, "n": 179, "type": "dialogue", "text": "Park Rae-kyung: (xấu hổ)\n박래경: (머쓱해하고)\nPark Rae-kyung: (embarrassed)", "suggestedCue": 534}, {"id": 179, "n": 180, "type": "dialogue", "text": "6. Văn phòng thư ký tầng 19, trụ sở Tập đoàn Sanin (ban ngày)\n6. 19층 비서실, 산인 그룹 본사 ( 낮 )\n6. 19th floor secretary office, Sanin Group headquarters (daytime)", "suggestedCue": 140}, {"id": 180, "n": 181, "type": "narration", "text": "Jisoo đến gặp Tham mưu trưởng và báo cáo, Tham mưu trưởng gật đầu.\n지수가 비서실장에게 다가가 보고하자, 비서실장이 고갤 끄덕인다.\nJisoo approaches the Chief of Staff and reports, and the Chief of Staff nods.", "suggestedCue": 67}, {"id": 181, "n": 182, "type": "dialogue", "text": "Jisoo quay lại chỗ ngồi, nhấc điện thoại và gọi.\n자리로 돌아온 지수, 수화기를 들고 전화한다.\nJisoo returns to her seat, picks up the phone and makes a call.", "suggestedCue": 247}, {"id": 182, "n": 183, "type": "dialogue", "text": "Jisoo: Đó là văn phòng thư ký. Có trưởng nhóm lập kế hoạch không?\n지수: 비서실인데요. 기획팀장님 계신가요?\nJisoo: It’s the secretary’s office. Is there a planning team leader?", "suggestedCue": 158}, {"id": 183, "n": 184, "type": "dialogue", "text": "7. Văn phòng tầng 18, trụ sở Tập đoàn Sanin (ban ngày)\n7. 18층 사무실, 산인 그룹 본사 ( 낮 )\n7. 18th floor office, Sanin Group headquarters (daytime)", "suggestedCue": 140}, {"id": 184, "n": 185, "type": "dialogue", "text": "Trưởng nhóm lập kế hoạch trực điện thoại.\n통화 중인 기획팀장.\nPlanning team leader on the phone.", "suggestedCue": 149}, {"id": 185, "n": 186, "type": "dialogue", "text": "Trưởng nhóm kế hoạch: Có. Xin hãy nói. (Tạm dừng) Nhưng đây có phải là điều Chủ tịch ra lệnh không?\n기획팀장: 예. 말씀하세요. (잠시) 근데 이거 회장님께서 지시한 게 맞아요?\nPlanning Team Leader: Yes. Please speak. (Pause) But is this what the Chairman ordered?", "suggestedCue": 160}, {"id": 186, "n": 187, "type": "dialogue", "text": "À... vâng. Được rồi.\n아... 넵. 알겠습니다.\nAh... yes. All right.", "suggestedCue": 474}, {"id": 187, "n": 188, "type": "narration", "text": "Sau khi kết thúc cuộc gọi với trưởng nhóm kế hoạch, tôi vào phòng Giám đốc điều hành Hà và báo cáo.\n기획팀장 통화를 끝내고, 하전무 방으로 들어가 보고한다.\nAfter finishing the call with the planning team leader, I go into Executive Director Ha’s room and report.", "suggestedCue": 149}, {"id": 188, "n": 189, "type": "dialogue", "text": "Nghe báo cáo xong, Giám đốc Hà rời khỏi phòng.\n보고를 들은 하전무, 방을 나선다.\nAfter hearing the report, Director Ha leaves the room.", "suggestedCue": 481}, {"id": 189, "n": 190, "type": "dialogue", "text": "8. Sảnh tầng 1, trụ sở Tập đoàn Sanin (ban ngày)\n8. 1층 로비, 산인 그룹 본사 ( 낮 )\n8. 1st floor lobby, Sanin Group headquarters (daytime)", "suggestedCue": 140}, {"id": 190, "n": 191, "type": "dialogue", "text": "Park Rae-kyung rời khỏi sảnh trong khi nói chuyện điện thoại.\n박래경이 통화하며 로비를 나선다.\nRae-kyung Park leaves the lobby while talking on the phone.", "suggestedCue": 481}, {"id": 191, "n": 192, "type": "dialogue", "text": "Rae-kyung Park: (trên điện thoại) Trưởng nhóm Yoon. Đúng như bạn nói, anh ấy đồng ý ngay.\n박래경: (통화하며) 윤팀장님. 말씀하신 대로, 바로 오케이하시더라고요.\nRae-kyung Park: (on the phone) Team Leader Yoon. As you said, he said okay right away.", "suggestedCue": 163}, {"id": 192, "n": 193, "type": "dialogue", "text": "Juno (trên điện thoại): Tuyệt vời. Cảm ơn sự nỗ lực của bạn\n주노(통화): 잘됐네요. 수고하셨습니다.\nJuno (on phone): Great. Thank you for your effort", "suggestedCue": 185}, {"id": 193, "n": 194, "type": "dialogue", "text": "Park Rae-kyung: Nhưng... anh ấy bảo tôi cắt bớt đi một chút.\n박래경: 근데... 좀 깎아오라고 하시네요.\nPark Rae-kyung: But... he's telling me to cut it down a bit.", "suggestedCue": 533}, {"id": 194, "n": 195, "type": "narration", "text": "Bản thân hợp đồng sẽ khó khăn, nhưng tôi tự hỏi liệu có thể giảm giá được không…\n계약 자체가 힘들 텐데, 가격까지 깎는 게 가능이나 할지...\nThe contract itself will be difficult, but I wonder if it will even be possible to reduce the price...", "suggestedCue": 167}, {"id": 195, "n": 196, "type": "dialogue", "text": "9. Trung tâm thành phố (Nhật Bản) (ngày)\n9. 시내 ( 일본 ) ( 낮 )\n9. Downtown (Japan) (day)", "suggestedCue": 671}, {"id": 196, "n": 197, "type": "dialogue", "text": "Juno bước xuống phố nói chuyện điện thoại.\n통화하며 거리를 걷는 주노.\nJuno walks down the street talking on the phone.", "suggestedCue": 166}, {"id": 197, "n": 198, "type": "dialogue", "text": "Juno: (mỉm cười) Tôi sẽ thử.\n주노: (미소) 해봐야죠.\nJuno: (smiling) I'll give it a try.", "suggestedCue": 361}, {"id": 198, "n": 199, "type": "dialogue", "text": "Xin hãy rời đi nhanh trước khi tôi gặp Giám đốc Hà.\n하전무님 만나기 전에, 얼른 가세요.\nPlease leave quickly before I meet Director Ha.", "suggestedCue": 169}, {"id": 199, "n": 200, "type": "dialogue", "text": "10. Sảnh tầng 1, trụ sở Tập đoàn Sanin (ban ngày)\n10. 1층 로비, 산인 그룹 본사 ( 낮 )\n10. 1st floor lobby, Sanin Group headquarters (daytime)", "suggestedCue": 140}, {"id": 200, "n": 201, "type": "dialogue", "text": "Park Rae-Kyung: Đúng vậy. Tôi sợ chúng ta sẽ gặp lại nhau...\n박래경: 예. 안 그래도 만날까 봐...\nRae-Kyung Park: Yes. I'm afraid we'll meet again...", "suggestedCue": 550}, {"id": 201, "n": 202, "type": "narration", "text": "Lúc đó, Giám đốc điều hành Hà vừa bước xuống thang máy, nhanh chóng đi tới Công viên Rae-kyung và chặn cô lại.\n그때, 엘리베이터에서 내린 하전무가 빠른 걸음으로 다가가며 박래경을 불러 세운다.\nAt that time, Executive Director Ha got off the elevator, quickly walked over to Rae-kyung Park and stopped her.", "suggestedCue": 533}, {"id": 202, "n": 203, "type": "dialogue", "text": "Giám đốc điều hành Hà: Này, CEO Park!\n하전무: 어이, 박대표!\nExecutive Director Ha: Hey, CEO Park!", "suggestedCue": 406}, {"id": 203, "n": 204, "type": "dialogue", "text": "Park Rae-kyung: (Kết thúc cuộc gọi nhanh chóng) Tôi sẽ cúp máy. Đội trưởng.\n박래경: (급히 통화를 마무리하며) 전화 끊겠습니다. 팀장님.\nPark Rae-kyung: (Ending the call quickly) I will hang up. Team leader.", "suggestedCue": 532}, {"id": 204, "n": 205, "type": "dialogue", "text": "Rae-kyung Park quay đầu lại nhìn Giám đốc điều hành Hà và chào.\n박래경, 고갤 돌려 하전무를 보고, 인사한다.\nRae-kyung Park turns her head to look at Executive Director Ha and says hello.", "suggestedCue": 533}, {"id": 205, "n": 206, "type": "dialogue", "text": "Giám đốc điều hành Hà: Bạn đang làm gì vậy? Nếu bạn định vay tiền từ trụ sở chính, bạn nên đến gặp tôi, giám đốc tài chính.\n하전무: 당신, 뭐 하는 거야? 본사에서 돈을 빌릴 거면, CFO인 나를 찾아왔어야지.\nManaging Director Ha: What are you doing? If you were going to borrow money from headquarters, you should have come to me, the CFO.", "suggestedCue": 172}, {"id": 206, "n": 207, "type": "dialogue", "text": "Bạn là ai, đến ngay với Chủ tịch...!\n당신이 뭔데, 회장님한테 바로...!\nWhat are you, right away to the Chairman...!", "suggestedCue": 281}, {"id": 207, "n": 208, "type": "dialogue", "text": "Park Rae-kyung: À... Tôi đến gặp giám đốc điều hành... Tôi đã gặp chủ tịch ở sảnh...\n박래경: 아... 전무님 뵈러 왔다가요... 로비에서 회장님을 만나가지고요...\nPark Rae-kyung: Ah... I came to see the executive director... I met the chairman in the lobby...", "suggestedCue": 532}, {"id": 208, "n": 209, "type": "dialogue", "text": "Họ hỏi tôi tại sao lại đến đây, nhưng tôi không thể không trả lời.\n왜 왔냐고 물으시는데, 대답을 안 할 수도 없잖습니까.\nThey ask me why I came, but I can't not answer.", "suggestedCue": 176}, {"id": 209, "n": 210, "type": "dialogue", "text": "Giám đốc điều hành Hà: ...Vậy à? Bạn đã ký hợp đồng chưa?\n하전무: ...그래서? 계약했대요?\nExecutive Director Ha: ...So? Did you sign a contract?", "suggestedCue": 58}, {"id": 210, "n": 211, "type": "dialogue", "text": "Rae-Kyung Park: Tôi chưa nghĩ vậy. Tôi nghe nói nếu làm vậy... tôi sẽ phải tăng số tiền đặt cọc lên một chút.\n박래경: 아직은 아닌 거 같고요. 하게 되면... 계약금을 좀 올려줘야 된다더라고요.\nRae-Kyung Park: I don’t think so yet. I heard that if I do it... I'll have to raise the down payment a bit.", "suggestedCue": 144}, {"id": 211, "n": 212, "type": "dialogue", "text": "Giám đốc điều hành Hà: Việc đó phải được quyết định vào ngày mai.\n하전무: 그거 내일까지 결정 나야 되잖아.\nExecutive Director Ha: That has to be decided by tomorrow.", "suggestedCue": 180}, {"id": 212, "n": 213, "type": "dialogue", "text": "Rae-Kyung Park: Vâng... Ngày mai tôi sẽ tải chứng từ thanh toán lên. Giám đốc điều hành.\n박래경: 예... 내일 결재 서류 올리겠습니다. 전무님.\nRae-Kyung Park: Yes... I will upload the payment documents tomorrow. Managing Director.", "suggestedCue": 533}, {"id": 213, "n": 214, "type": "dialogue", "text": "Park Rae-kyung cúi đầu chào.\n고개 숙여 인사하는 박래경.\nPark Rae-kyung bows her head in greeting.", "suggestedCue": 531}, {"id": 214, "n": 215, "type": "dialogue", "text": "Giám đốc Hà gật đầu, vẻ mặt nghiêm nghị quay người rời đi.\n고갤 끄덕이는 하전무, 굳은 표정으로 돌아서서 간다.\nDirector Ha nods, turns around with a stern expression and leaves.", "suggestedCue": 136}, {"id": 215, "n": 216, "type": "dialogue", "text": "11. Trước quán trà (Nhật Bản) (ban ngày)\n11. 찻집 앞 ( 일본 ) ( 낮 )\n11. In front of the teahouse (Japan) (daytime)", "suggestedCue": 681}, {"id": 216, "n": 217, "type": "dialogue", "text": "Juno đang đợi ai đó.\n주노가 누군가를 기다리고 있다.\nJuno is waiting for someone.", "suggestedCue": 416}, {"id": 217, "n": 218, "type": "dialogue", "text": "Yoshida đến gần Juno và họ gật đầu với nhau.\n주노에게 다가오는 요시다, 서로 목례를 주고받는다.\nYoshida approaches Juno and they exchange nods.", "suggestedCue": 23}, {"id": 218, "n": 219, "type": "dialogue", "text": "Juno: (tiếng Anh) Cảm ơn bạn đã trả lời cuộc gọi khẩn cấp của tôi.\n주노: (영어) 급한 연락에도 응해주셔서 감사합니다.\nJuno: (English) Thank you for responding to my urgent call.", "suggestedCue": 181}, {"id": 219, "n": 220, "type": "dialogue", "text": "Yoshida: (tiếng Anh) Không. Cảm ơn bạn đã liên hệ với chúng tôi.\n요시다: (영어) 아닙니다. 연락 주셔서 감사합니다.\nYoshida: (English) No. Thank you for contacting us.", "suggestedCue": 52}, {"id": 220, "n": 221, "type": "dialogue", "text": "12. Tea house > phòng tatami, khách sạn (Nhật Bản) (chéo) (ngày)\n12. 찻집 > 다다미방, 호텔 ( 일본 ) ( 교차 ) ( 낮 )\n12. Tea house > tatami room, hotel (Japan) (cross) (day)", "suggestedCue": 671}, {"id": 221, "n": 222, "type": "dialogue", "text": "Khu vườn trước quán trà\n찻집 앞 정원\nGarden in front of the teahouse", "suggestedCue": 281}, {"id": 222, "n": 223, "type": "dialogue", "text": "Yoshida và Juno băng qua một cái ao nhỏ.\n작은 연못 위를 건너는 요시다와 주노.\nYoshida and Juno crossing a small pond.", "suggestedCue": 438}, {"id": 223, "n": 224, "type": "dialogue", "text": "Yoshida: (tiếng Anh) Tôi thích trà truyền thống hơn cà phê. Bạn có ổn không?\n요시다: (영어) 커피보다는 전통 차가 좋아서요. 괜찮으시죠?\nYoshida: (English) I like traditional tea more than coffee. Are you okay?", "suggestedCue": 186}, {"id": 224, "n": 225, "type": "dialogue", "text": "Tôi đến Nhật Bản vì tôi muốn bạn cảm nhận được Nhật Bản.\n일본에 왔는데, 일본을 느끼시면 좋겠다 싶어서요.\nI came to Japan because I wanted you to feel Japan.", "suggestedCue": 188}, {"id": 225, "n": 226, "type": "dialogue", "text": "Juno: (tiếng Anh) Vâng. cảm ơn bạn\n주노: (영어) 네. 감사합니다.\nJuno: (English) Yes. thank you", "suggestedCue": 11}, {"id": 226, "n": 227, "type": "dialogue", "text": "quán trà\n찻집\ntea house", "suggestedCue": 136}, {"id": 227, "n": 228, "type": "dialogue", "text": "Juno và Yoshida đang ngồi cạnh nhau.\n주노와 요시다가 나란히 앉아 있다.\nJuno and Yoshida are sitting side by side.", "suggestedCue": 23}, {"id": 228, "n": 229, "type": "narration", "text": "Một người phục vụ mặc kimono đi qua phía sau Juno và Yoshida, phát ra âm thanh lạo xạo.\n기모노를 입은 서빙이 사각사각 소리를 내며 주노와 요시다 뒤를 지나,\nA server wearing a kimono passed behind Juno and Yoshida, making a crunching sound.", "suggestedCue": 533}, {"id": 229, "n": 230, "type": "dialogue", "text": "Tôi quỳ trước bếp pha trà.\n차를 내리는 화로 앞에 무릎을 꿇고 앉는다.\nI kneel in front of the stove to brew tea.", "suggestedCue": 281}, {"id": 230, "n": 231, "type": "dialogue", "text": "Juno: (tiếng Anh) Lý do chúng tôi yêu cầu mua gấp 10 lần số lượng hiện có là,\n주노: (영어) 저희가 기존 수량의 10배를 구매하겠다고 요청드린 건,\nJuno: (English) The reason we asked to purchase 10 times the existing quantity is,", "suggestedCue": 409}, {"id": 231, "n": 232, "type": "dialogue", "text": "Đó là vì tôi nghĩ đó sẽ là điều mà Shimizu cũng sẽ hoan nghênh.\n시미즈에서도 반길 일이라고 생각했기 때문입니다.\nThis is because I thought it would be something that Shimizu would also welcome.", "suggestedCue": 439}, {"id": 232, "n": 233, "type": "narration", "text": "Tuy nhiên, có vẻ như sự khác biệt về văn hóa giữa Nhật Bản và Hàn Quốc đã bị bỏ qua.\n하지만, 일본과 한국의 문화 차이가 있음을 간과한 거 같습니다.\nHowever, it seems that the cultural differences between Japan and Korea have been overlooked.", "suggestedCue": 193}, {"id": 233, "n": 234, "type": "dialogue", "text": "Yoshida: (với vẻ mặt sửng sốt) (tiếng Anh) Vâng. Điều đó có thể xảy ra nếu bạn không hiểu rõ về văn hóa.\n요시다: (떨떠름한 표정으로) (영어) 네. 문화를 잘 모르면 그럴 수 있죠.\nYoshida: (with a shocked expression) (English) Yes. That can happen if you don’t know the culture well.", "suggestedCue": 144}, {"id": 234, "n": 235, "type": "dialogue", "text": "Juno: (tiếng Anh) Cảm ơn sự thông cảm của bạn.\n주노: (영어) 이해해 주셔서 감사합니다.\nJuno: (English) Thank you for your understanding.", "suggestedCue": 195}, {"id": 235, "n": 236, "type": "dialogue", "text": "Trong khi đó, người phục vụ trà đặt một chiếc cốc xuống.\n그사이, 차를 내리는 서빙이 한 잔을 내려놓는다.\nMeanwhile, the tea server puts down a cup.", "suggestedCue": 113}, {"id": 236, "n": 237, "type": "dialogue", "text": "Sau đó, Yoshida nhượng bộ bằng cách ra hiệu cho Juno ăn trước.\n그러자, 요시다가 주노에게 먼저 드시라는 손짓으로 양보한다.\nThen, Yoshida yields with a hand gesture telling Juno to eat first.", "suggestedCue": 69}, {"id": 237, "n": 238, "type": "narration", "text": "Juno cúi đầu ngắn gọn, cầm lấy tách trà, xoay 90 độ và uống trà.\n주노, 짧게 목례하고 찻잔을 가져가 90도를 돌려서 차를 마신다.\nJuno, bows briefly, takes the teacup, turns it 90 degrees, and drinks the tea.", "suggestedCue": 136}, {"id": 238, "n": 239, "type": "dialogue", "text": "Yoshida nhìn vào đó và có vẻ xấu hổ.\n그 모습을 보는 요시다, 당황한 듯하다.\nYoshida looks at that and looks embarrassed.", "suggestedCue": 265}, {"id": 239, "n": 240, "type": "dialogue", "text": "Juno: (Đặt tách trà đã hoàn thành xuống) (tiếng Anh)\n주노: (다 마신 찻잔을 내려놓으며) (영어)\nJuno: (Putting down the finished tea cup) (English)", "suggestedCue": 149}, {"id": 240, "n": 241, "type": "narration", "text": "Sau đó, tôi muốn hỏi làm thế nào chúng ta có thể đạt được thỏa thuận mà không tỏ ra thô lỗ.\n그렇다면 저희가 무례를 범하지 않는 선에서 합의할 수 있는 방법을 여쭈고자 합니다.\nThen, I would like to ask how we can reach an agreement without being rude.", "suggestedCue": 197}, {"id": 241, "n": 242, "type": "dialogue", "text": "Vẻ mặt của Yoshida có vẻ dịu đi. Tuy nhiên, nó vẫn nặng.\n요시다의 표정이 누그러진 듯하다. 하지만, 여전히 무겁다.\nYoshida's expression seems to have softened. However, it is still heavy.", "suggestedCue": 136}, {"id": 242, "n": 243, "type": "dialogue", "text": "Yoshida: (Tiếng Anh) Không phải số lượng là không thể, nhưng khi phải thay đổi lịch trình thì...\n요시다: (영어) 수량이 불가능한 것은 아니지만, 아무래도 일정을 변경하는 것에 있어서...\nYoshida: (English) It's not that the quantity is impossible, but when it comes to changing the schedule...", "suggestedCue": 440}, {"id": 243, "n": 244, "type": "dialogue", "text": "Những thứ như trách nhiệm...\n책임의 문제라든가... 하는 것들이...\nThings like responsibility...", "suggestedCue": 669}, {"id": 244, "n": 245, "type": "dialogue", "text": "Juno: (tiếng Anh) Vâng. Tôi nghĩ bạn có thể lo lắng về những điều đó.\n주노: (영어) 네. 그런 부분들을 걱정하실 거 같아서요.\nJuno: (English) Yes. I think you might be worried about those things.", "suggestedCue": 136}, {"id": 245, "n": 246, "type": "dialogue", "text": "Để bổ sung cho điều đó, sao chúng tôi không trả tiền cho bạn trước?\n그에 대해 보완하는 것으로, 저희가 대금을 먼저 지급하는 것은 어떠신지요?\nTo complement that, how about we pay you first?", "suggestedCue": 144}, {"id": 246, "n": 247, "type": "dialogue", "text": "phòng chiếu tatami, khách sạn\n다다미방, 호텔\ntatami room, hotel", "suggestedCue": 21}, {"id": 247, "n": 248, "type": "dialogue", "text": "Sunyoung, Minjeong và Jinsu đang làm việc với các tài liệu được phân tán.\n순영, 민정, 진수가 서류를 펼쳐놓고 일하고 있다.\nSunyoung, Minjeong, and Jinsu are working with documents spread out.", "suggestedCue": 438}, {"id": 248, "n": 249, "type": "narration", "text": "Đây là những tài liệu như thỏa thuận hiểu biết và tỷ lệ chiết khấu của Speed.\n스피드의 양해 계약서와 할인율 등의 자료들이다.\nThese are materials such as Speed’s understanding agreement and discount rate.", "suggestedCue": 438}, {"id": 249, "n": 250, "type": "dialogue", "text": "Jinsu: Nhưng sao cậu lại cố gắng gặp riêng đội trưởng thế?\n진수: 근데, 왜 팀장님은 혼자서 만나려고 하시는 거예요?\nJinsu: But why are you trying to meet the team leader alone?", "suggestedCue": 203}, {"id": 250, "n": 251, "type": "dialogue", "text": "Minjeong: Vì sự quan tâm của Trưởng nhóm Yoshida.\n민정: 요시다 팀장님 배려해서요.\nMinjeong: Because of Team Leader Yoshida’s consideration.", "suggestedCue": 40}, {"id": 251, "n": 252, "type": "dialogue", "text": "Jinsu: Sao lại ân cần thế?\n진수: 그게 왜 배려예요?\nJinsu: Why is that considerate?", "suggestedCue": 206}, {"id": 252, "n": 253, "type": "dialogue", "text": "Soonyoung: Mặc dù tôi biết rằng việc ký hợp đồng với chúng tôi là tốt cho Shimizu,\n순영: 우리랑 계약하는 게, 시미즈를 위해서 좋은 일인 걸 알면서도,\nSoonyoung: Even though I know that signing with us is good for Shimizu,", "suggestedCue": 207}, {"id": 253, "n": 254, "type": "dialogue", "text": "Bởi vì anh đã từ chối vì vinh quang của chính mình.\n자기 영전을 위해서 거부한 거니까.\nBecause he refused for his own glory.", "suggestedCue": 207}, {"id": 254, "n": 255, "type": "narration", "text": "Nói về điều đó trước mặt người khác có chút thiếu tôn trọng với Trưởng nhóm Yoshida.\n그걸 다른 사람들 앞에서 이야기하는 건, 요시다 팀장 체면이 좀 그렇지.\nTalking about that in front of other people is a bit out of respect for Team Leader Yoshida.", "suggestedCue": 207}, {"id": 255, "n": 256, "type": "dialogue", "text": "Jinsu: Ah... Họ nói Nhật Bản coi trọng thể diện. Hàn Quốc cũng vậy.\n진수: 아... 일본이 체면을 중요시한다고 하더라고요. 한국도 그런 편이지만.\nJinsu: Ah... They say Japan values face. Korea is also like that.", "suggestedCue": 209}, {"id": 256, "n": 257, "type": "dialogue", "text": "quán trà\n찻집\ntea house", "suggestedCue": 136}, {"id": 257, "n": 258, "type": "dialogue", "text": "Yoshida: (tiếng Anh) Trước hết... cậu đang nói đến khi nào vậy?\n요시다: (영어) 먼저라면... 언제까지를 말씀하시는 건지?\nYoshida: (English) First of all... until when are you talking about?", "suggestedCue": 52}, {"id": 258, "n": 259, "type": "dialogue", "text": "Người phục vụ đặt tách trà thứ hai xuống. Đây là tách trà của Yoshida.\n서빙이 두 번째 찻잔을 내려놓는다. 요시다의 찻잔이다.\nThe server sets down the second teacup. This is Yoshida’s teacup.", "suggestedCue": 474}, {"id": 259, "n": 260, "type": "dialogue", "text": "Juno: (tiếng Anh) Theo hợp đồng hiện tại, khoản đặt cọc 10% sẽ phải được thanh toán trong tháng tới.\n주노: (영어) 기존 계약상으로는 계약금 10%를 다음 달 안에 지급하는 것입니다만,\nJuno: (English) According to the existing contract, a 10% deposit is to be paid within the next month.", "suggestedCue": 129}, {"id": 260, "n": 261, "type": "dialogue", "text": "Tháng này tôi sẽ trả trước 20%.\n계약금으로 20%를 이번 달에 지급하겠습니다.\nI will pay 20% as a down payment this month.", "suggestedCue": 402}, {"id": 261, "n": 262, "type": "dialogue", "text": "Yoshida: ...! (Tiếng Anh) Trong tháng này?\n요시다: ...! (영어) 이번 달 안에요?\nYoshida: ...! (English) Within this month?", "suggestedCue": 129}, {"id": 262, "n": 263, "type": "dialogue", "text": "Juno: (tiếng Anh) Vâng. Ngoài ra, đơn hàng 1.000 chiếc hiện có của Wind đã bị hủy và đặt hàng lại.\n주노: (영어) 네. 그리고, 윈드의 기존 주문량 1천 개는 취소하고, 다시\nJuno: (English) Yes. In addition, Wind's existing order of 1,000 units was canceled and re-ordered.", "suggestedCue": 113}, {"id": 263, "n": 264, "type": "dialogue", "text": "Xin vui lòng cho phép tôi sắp xếp lại.\n재주문할 수 있도록 부탁드립니다.\nPlease allow me to reorder.", "suggestedCue": 469}, {"id": 264, "n": 265, "type": "dialogue", "text": "Yoshida: (Tiếng Anh) Nếu là do chiết khấu thì không cần phải làm vậy.\n요시다: (영어) 할인율 때문이라면, 그렇게 하지 않으셔도 됩니다.\nYoshida: (English) If it's because of the discount rate, you don't have to do that.", "suggestedCue": 144}, {"id": 265, "n": 266, "type": "narration", "text": "Dù sao, từ 1.000 đến 10.000 mặt hàng, tỷ lệ chiết khấu đều giống nhau ở mức 40%.\n어차피 일천 개부터 일만 개까지는 할인율 40%로 같으니까요.\nAnyway, from 1,000 to 10,000 items, the discount rate is the same at 40%.", "suggestedCue": 113}, {"id": 266, "n": 267, "type": "dialogue", "text": "Juno: (tiếng Anh) Không. Chúng tôi muốn đặt một món.\n주노: (영어) 아뇨. 저희는 일만 한 개를 주문하려고 합니다.\nJuno: (English) No. We would like to order one item.", "suggestedCue": 62}, {"id": 267, "n": 268, "type": "dialogue", "text": "Trong trường hợp đó, tôi hiểu rằng tỷ lệ chiết khấu sẽ là 50%.\n그럴 경우, 할인율은 50%가 되는 걸로 알고 있습니다만.\nIn that case, I understand that the discount rate will be 50%.", "suggestedCue": 223}, {"id": 268, "n": 269, "type": "dialogue", "text": "Yoshida: (có vẻ bối rối) Juno: (tiếng Anh) Đó không phải là sách hướng dẫn của Shimizu sao?\n요시다: (곤란한 표정이다) 주노: (영어) 그것이 시미즈의 매뉴얼 아닌가요?\nYoshida: (looks troubled) Juno: (English) Isn't that Shimizu's manual?", "suggestedCue": 52}, {"id": 269, "n": 270, "type": "dialogue", "text": "Yoshida: (Suy nghĩ một lúc) (Tiếng Anh) Tôi sẽ phải suy nghĩ về điều đó.\n요시다: (잠시 생각하다가) (영어) 고민해 봐야겠네요.\nYoshida: (Thinking for a moment) (English) I'll have to think about it.", "suggestedCue": 136}, {"id": 270, "n": 271, "type": "dialogue", "text": "Juno: (tiếng Anh) Vâng. Tuy nhiên, như bạn biết, hạn chót của chúng tôi là ngày mai.\n주노: (영어) 네. 다만, 아시다시피, 저희 데드라인이 내일입니다.\nJuno: (English) Yes. However, as you know, our deadline is tomorrow.", "suggestedCue": 136}, {"id": 271, "n": 272, "type": "dialogue", "text": "Yoshida đang lo lắng.\n고민하는 요시다.\nYoshida is worried.", "suggestedCue": 52}, {"id": 272, "n": 273, "type": "dialogue", "text": "Trong khi đó, máy chủ rời đi với âm thanh lạo xạo.\n그러는 중에, 서빙이 사각사각 소리를 내며, 퇴장한다.\nMeanwhile, the server leaves with a crunching sound.", "suggestedCue": 54}, {"id": 273, "n": 274, "type": "dialogue", "text": "13. Khu vườn trước quán trà (Nhật Bản) (lúc hoàng hôn)\n13. 찻집 앞 정원 ( 일본 ) ( 해 질 녘 )\n13. Garden in front of the teahouse (Japan) (at sunset)", "suggestedCue": 544}, {"id": 274, "n": 275, "type": "dialogue", "text": "Juno đang đi dạo trong vườn và nói chuyện điện thoại.\n주노가 정원을 거닐며 통화하고 있다.\nJuno is walking in the garden and talking on the phone.", "suggestedCue": 438}, {"id": 275, "n": 276, "type": "dialogue", "text": "Juno: Vâng. Giám đốc điều hành. Shimizu đã quyết định chấp nhận đề nghị của chúng tôi.\n주노: 네. 상무님. 시미즈 측에서 저희 제안을 받아들이기로 했습니다.\nJuno: Yes. Managing Director. Shimizu has decided to accept our proposal.", "suggestedCue": 231}, {"id": 276, "n": 277, "type": "dialogue", "text": "Lee Sang-moo (nói chuyện điện thoại): Tốt đấy. Tôi nghĩ Chủ tịch sẽ bớt căng thẳng một chút.\n이상무(통화): 다행이네. 회장님도 마음이 좀 누그러지시겠다.\nLee Sang-moo (on the phone): That’s good. I think the Chairman will relent a bit.", "suggestedCue": 233}, {"id": 277, "n": 278, "type": "dialogue", "text": "(Thở dài) Juno: ...Cậu ổn chứ?\n(한숨) 주노: ...괜찮으시죠?\n(Sigh) Juno: ...Are you okay?", "suggestedCue": 153}, {"id": 278, "n": 279, "type": "dialogue", "text": "Lee Sang-moo (nói chuyện điện thoại): Là tôi đây, tôi ổn. Anh ấy là người sẽ bước xuống.\n이상무(통화): 나야, 괜찮지. 물러날 사람인데.\nLee Sang-moo (on the phone): It’s me, I’m fine. He is the one who will step down.", "suggestedCue": 235}, {"id": 279, "n": 280, "type": "dialogue", "text": "Tôi làm vậy vì tôi cảm thấy có lỗi với bạn.\n자네한테 미안해서 그러지.\nI do that because I feel sorry for you.", "suggestedCue": 235}, {"id": 280, "n": 281, "type": "dialogue", "text": "Juno, đừng đi nữa.\n주노, 걸음을 멈춘다.\nJuno, stop walking.", "suggestedCue": 275}, {"id": 281, "n": 282, "type": "dialogue", "text": "Juno: ...Anh sắp bước xuống à?\n주노: ...물러나신다고요?\nJuno: ...You're stepping down?", "suggestedCue": 235}, {"id": 282, "n": 283, "type": "dialogue", "text": "Lee Sang-moo (nói chuyện điện thoại): Đúng vậy. Tôi không thể làm điều này trong 1.000.000 năm.\n이상무(통화): 그래야지. 내가 천년 만년 일만 할 순 없지 않겠나.\nLee Sang-moo (on the phone): That’s right. I can't just do this for 1,000,000 years.", "suggestedCue": 236}, {"id": 283, "n": 284, "type": "dialogue", "text": "Tôi cần phải nghỉ hưu và nghỉ ngơi một chút.\n은퇴하고, 좀 쉬어야지.\nI need to retire and get some rest.", "suggestedCue": 237}, {"id": 284, "n": 285, "type": "dialogue", "text": "Juno cảm thấy nhẹ nhõm trước lời nói của Lee Sang-mu và bắt đầu bước đi trở lại.\n주노, 이상무의 말에 안도하며, 다시 걸음을 옮긴다.\nJuno is relieved by Lee Sang-mu’s words and starts walking again.", "suggestedCue": 438}, {"id": 285, "n": 286, "type": "dialogue", "text": "Juno: Ngay cả khi bạn nghỉ hưu, bạn vẫn nên được tôn vinh.\n주노: 은퇴하시더라도, 축하받으면서 하셔야죠.\nJuno: Even if you retire, you should be celebrated.", "suggestedCue": 238}, {"id": 286, "n": 287, "type": "dialogue", "text": "14. Văn phòng của Lee Sang-moo, trụ sở Tập đoàn Sanin (lúc hoàng hôn)\n14. 이상무 사무실, 산인 그룹 본사 ( 해 질 녘 )\n14. Lee Sang-moo’s office, Sanin Group headquarters (at sunset)", "suggestedCue": 140}, {"id": 287, "n": 288, "type": "dialogue", "text": "Lee Sang-moo: (qua điện thoại) Cảm ơn lời nói của bạn. Vậy thì hãy nghỉ ngơi đi.\n이상무: (통화하며) 말이라도 고맙네. 그럼, 쉬게.\nLee Sang-moo: (on the phone) Thank you for your words. Well then, take a break.", "suggestedCue": 240}, {"id": 288, "n": 289, "type": "dialogue", "text": "Lee Sang-moo kết thúc cuộc gọi.\n통화를 끝낸 이상무.\nLee Sang-moo ended the call.", "suggestedCue": 247}, {"id": 289, "n": 290, "type": "narration", "text": "Khi Lee Sang-moo mặc áo khoác ngoài và rời khỏi phòng, thư ký đứng dậy.\n이상무가 겉옷을 챙겨 입고 방을 나서자, 비서가 일어난다.\nAs Lee Sang-moo puts on his outerwear and leaves the room, the secretary stands up.", "suggestedCue": 306}, {"id": 290, "n": 291, "type": "dialogue", "text": "Sangmoo Lee: Vâng. Tôi có nên nghỉ làm không?\n이상무: 응. 퇴근해야지?\nSangmoo Lee: Yes. Should I get off work?", "suggestedCue": 237}, {"id": 291, "n": 292, "type": "dialogue", "text": "Thư ký: Vâng.\n비서: 네.\nSecretary: Yes.", "suggestedCue": 0}, {"id": 292, "n": 293, "type": "dialogue", "text": "Lee Sang-moo: À, Chủ tịch... Tôi có chuyện muốn báo cáo, nhưng ngài đến muộn?\n이상무: 아, 회장님... 보고할 게 있는데, 늦었을라나?\nLee Sang-moo: Ah, Chairman... I have something to report, but you're late?", "suggestedCue": 244}, {"id": 293, "n": 294, "type": "dialogue", "text": "Thư ký: Chúng ta có nên kiểm tra với văn phòng thư ký không? (Hoặc) Ngày mai bạn làm gì...\n비서: 비서실에 확인해 볼까요? (아니면) 내일 하시는 게...\nSecretary: Shall we check with the secretary’s office? (Or) What you do tomorrow...", "suggestedCue": 244}, {"id": 294, "n": 295, "type": "dialogue", "text": "Lee Sang-moo: Vâng... (gật đầu)\n이상무: 응... (끄덕끄덕)\nLee Sang-moo: Yes... (nods)", "suggestedCue": 306}, {"id": 295, "n": 296, "type": "dialogue", "text": "15. Trước cội nguồn (đêm)\n15. 기원 앞 ( 밤 )\n15. In front of the origin (night)", "suggestedCue": 423}, {"id": 296, "n": 297, "type": "dialogue", "text": "Lee Sang-moo đứng trước Kiwon.\n이상무가 기원 앞에 선다.\nLee Sang-moo stands in front of Kiwon.", "suggestedCue": 324}, {"id": 297, "n": 298, "type": "dialogue", "text": "Sau khi kiểm tra dấu hiệu không có lý do, tôi nhập nguồn gốc.\n괜히 간판을 확인하고, 기원으로 들어선다.\nAfter checking the sign for no reason, I entered the origin.", "suggestedCue": 58}, {"id": 298, "n": 299, "type": "dialogue", "text": "16. Nguồn gốc (đêm)\n16. 기원 ( 밤 )\n16. Origin (night)", "suggestedCue": null}, {"id": 299, "n": 300, "type": "narration", "text": "Tại quầy vào, Lee Sang-moo đưa 10.000 won và nhận lại 4.000 won.\n입구 카운터에서 이상무가 만 원을 건네고, 4천 원을 거슬러 받는다.\nAt the entrance counter, Lee Sang-moo hands over 10,000 won and receives 4,000 won back.", "suggestedCue": 136}, {"id": 300, "n": 301, "type": "narration", "text": "Lee Sang-moo đang ngồi một mình trước bàn cờ và quay lại khi nghe thấy tiếng cửa mở.\n이상무가 바둑판 앞에 홀로 앉아 있다가, 출입문 열리는 소리에 괜히 돌아본다.\nLee Sang-moo is sitting alone in front of the checkerboard, and turns around when he hears the sound of the door opening.", "suggestedCue": 176}, {"id": 301, "n": 302, "type": "dialogue", "text": "Người vừa bước vào hình như đang ở một nhóm riêng.\n방금 들어온 사람은 일행이 따로 있는 모양이다.\nThe person who just came in seems to be with a separate party.", "suggestedCue": 141}, {"id": 302, "n": 303, "type": "dialogue", "text": "17. Nhà hàng Nhật Bản (ban đêm)\n17. 일식집 ( 밤 )\n17. Japanese restaurant (night)", "suggestedCue": 65}, {"id": 303, "n": 304, "type": "narration", "text": "Giám đốc điều hành Hà ngồi một mình và trả lời tin nhắn ‘Được’ cho ‘Bố ơi, con gà khi bố đến’.\n하전무가 홀로 앉아서 ‘아빠 올 때 치킨’이라는 문자에 ‘오케이’라고 답장을 보낸다.\nExecutive Director Ha sits alone and replies ‘Okay’ to the text message ‘Dad, chicken when you come.’", "suggestedCue": 144}, {"id": 304, "n": 305, "type": "dialogue", "text": "Đại diện Oh ngồi đối diện. Đó là một biểu hiện không hấp dẫn.\n맞은편에는 오대표가 앉아 있다. 탐탁지 못한 표정이다.\nRepresentative Oh is sitting opposite. It's an unappealing expression.", "suggestedCue": 244}, {"id": 305, "n": 306, "type": "dialogue", "text": "Giám đốc điều hành Hà: (Nhìn Đại diện Oh) Tôi có một tin nhắn quan trọng. (đặt điện thoại xuống)\n하전무: (오대표를 슬쩍 보고) 중요한 연락이 와가지고. (폰을 내려놓고)\nExecutive Director Ha: (Looking at Representative Oh) I have an important message. (put down the phone)", "suggestedCue": 247}, {"id": 306, "n": 307, "type": "dialogue", "text": "Người đại diện Oh: Vì lý do nào đó, giám đốc điều hành muốn gặp tôi.\n오대표: 무슨 일로, 전무님께서 저를 다 보자고.\nRepresentative Oh: For some reason, the managing director wants to see me.", "suggestedCue": 247}, {"id": 307, "n": 308, "type": "dialogue", "text": "Giám đốc điều hành Hà: Lần trước gặp em, thấy em khó khăn nên muốn an ủi em.\n하전무: 저번에 보니까, 고생하시길래, 위로해 드리려고요.\nExecutive Director Ha: Last time I saw you, I saw you were having a hard time, so I wanted to comfort you.", "suggestedCue": 247}, {"id": 308, "n": 309, "type": "dialogue", "text": "Người đại diện Oh: ...Lên?\n오대표: ...위로요?\nRepresentative Oh: ...Up?", "suggestedCue": 291}, {"id": 309, "n": 310, "type": "dialogue", "text": "Giám đốc điều hành Hà: Các bạn đang phải trải qua rất nhiều khó khăn.\n하전무: 맘고생 많으시잖습니까.\nExecutive Director Ha: You are going through a lot of hardships.", "suggestedCue": 144}, {"id": 310, "n": 311, "type": "dialogue", "text": "Đại diện Oh: ...Gió không phải là do giám đốc quản lý mua sao?\n오대표: ...윈드는 전무님이 사신 거 아닙니까?\nRepresentative Oh: ...Isn’t the wind purchased by the managing director?", "suggestedCue": 249}, {"id": 311, "n": 312, "type": "dialogue", "text": "Giám đốc điều hành Hà: Đúng vậy.\n하전무: 그랬죠.\nExecutive Director Ha: That’s right.", "suggestedCue": 109}, {"id": 312, "n": 313, "type": "dialogue", "text": "Đại diện Oh: Vậy thì các bạn hãy cùng nhau chịu trách nhiệm. Không phải là hơi quá khi nói rằng bạn không biết tôi sao?\n오대표: 그럼, 같이 책임을 지셔야지, 나 몰라라 하는 건 좀 아니지 않아요?\nRepresentative Oh: Then, you should take responsibility together. Isn’t it a bit much to say that you don’t know me?", "suggestedCue": 144}, {"id": 313, "n": 314, "type": "dialogue", "text": "Giám đốc điều hành Hà: Không có gì đâu. Việc niêm yết được thực hiện bởi nhóm IR.\n하전무: 뭐가 아니에요. 상장은 IR 팀에서 하는 건데.\nExecutive Director Ha: It’s nothing. Listing is done by the IR team.", "suggestedCue": 254}, {"id": 314, "n": 315, "type": "dialogue", "text": "Đại diện Oh: Lee Sang-moo nói rằng anh ấy cảm thấy tiếc cho tôi.\n오대표: 이상무님은 저한테 미안하다 하셨어요.\nRepresentative Oh: Lee Sang-moo said he felt sorry for me.", "suggestedCue": 306}, {"id": 315, "n": 316, "type": "dialogue", "text": "Và. Gió sẽ được liệt kê.\n그리고요. 윈드는요, 상장될 겁니다.\nAnd. Wind will be listed.", "suggestedCue": 257}, {"id": 316, "n": 317, "type": "dialogue", "text": "Giám đốc điều hành Hà: Không. Người đại diện. Chà... làm thế nào bạn trở thành một nhà điều hành với cái nhìn sâu sắc này?\n하전무: 아니. 대표님. 거 참... 어떻게 이 눈치로 임원까지 되셨어?\nExecutive Director Ha: No. Representative. Well... how did you become an executive with this insight?", "suggestedCue": 259}, {"id": 317, "n": 318, "type": "dialogue", "text": "Người đại diện Oh: ...Bạn đang nói về cái gì vậy?\n오대표: ...무슨 소립니까?\nRepresentative Oh: ...What are you talking about?", "suggestedCue": 313}, {"id": 318, "n": 319, "type": "dialogue", "text": "Giám đốc điều hành Hà: Đại diện Ồ, tôi nghe nói anh bị Chủ tịch mắng.\n하전무: 오대표, 회장님한테 혼났다면서요.\nExecutive Director Ha: Representative Oh, I heard you got scolded by the Chairman.", "suggestedCue": 262}, {"id": 319, "n": 320, "type": "dialogue", "text": "Đại diện Oh: Chủ tịch cũng nói gì đó vì tức giận chứ không phải chỉ nói gì đó thôi.\n오대표: 회장님도 욱해서 한마디 하신 거지, 막 뭐라고 하신 건 아니에요.\nRepresentative Oh: The Chairman also said something because he was angry, he didn't just say something.", "suggestedCue": 544}, {"id": 320, "n": 321, "type": "dialogue", "text": "Giám đốc điều hành Hà: Không phải vậy. Anh chàng này...\n하전무: 그게 아니지. 이 사람아...\nExecutive Director Ha: That’s not it. This guy...", "suggestedCue": 266}, {"id": 321, "n": 322, "type": "dialogue", "text": "Đại diện Ô:...\n오대표: ...\nRepresentative Oh: ...", "suggestedCue": 291}, {"id": 322, "n": 323, "type": "dialogue", "text": "Giám đốc điều hành Hà: Bạn có nghĩ vì Gió mà CEO Oh bị Chủ tịch mắng không?\n하전무: 오대표가 회장님한테 혼난 게, 윈드 때문인 거 같아요?\nExecutive Director Ha: Do you think it was because of Wind that CEO Oh got scolded by the Chairman?", "suggestedCue": 268}, {"id": 323, "n": 324, "type": "narration", "text": "Đại diện Oh cảm thấy bị xúc phạm bởi lời nói của Giám đốc điều hành Hà nhưng tò mò về những gì ông nói.\n오대표는 하전무의 말이 기분 나쁘지만, 뒷말이 궁금하다.\nRepresentative Oh is offended by Executive Director Ha's words, but is curious about what he said.", "suggestedCue": 556}, {"id": 324, "n": 325, "type": "dialogue", "text": "Giám đốc điều hành Hà: Đại diện Ồ, ngày hôm đó, Chủ tịch thậm chí còn gọi điện cho Lee Sang-moo và mắng Đại diện Oh.\n하전무: 오대표, 그날, 회장님이 이상무님까지 불러서, 오대표 혼내킨 건요.\nExecutive Director Ha: Representative Oh, that day, the Chairman even called Lee Sang-moo and scolded Representative Oh.", "suggestedCue": 269}, {"id": 325, "n": 326, "type": "dialogue", "text": "Lee Sang-moo nói rằng bạn nên lắng nghe. Không đại diện Oh.\n이상무님 들으라고 그러신 거예요. 오대표가 아니라.\nLee Sang-moo said that you should listen. Not Representative Oh.", "suggestedCue": 270}, {"id": 326, "n": 327, "type": "dialogue", "text": "Người đại diện Oh: Không... hai người đang yêu nhau... tại sao...\n오대표: 아니... 두 분 사이가 있으신데... 왜...\nRepresentative Oh: No... you two are in a relationship... why...", "suggestedCue": 271}, {"id": 327, "n": 328, "type": "dialogue", "text": "Giám đốc điều hành Hà: Vì chúng tôi có mối quan hệ, không phải sẽ tốt hơn nếu làm điều đó trực tiếp với Lee Sang-moo sao?\n하전무: 사이가 있으니까, 이상무님한테 바로 하기 그럴 거 아닙니까.\nExecutive Director Ha: Since we have a relationship, wouldn’t it be better to do it directly to Lee Sang-moo?", "suggestedCue": 271}, {"id": 328, "n": 329, "type": "dialogue", "text": "Vì vậy, bạn đã thành lập Đại diện Oh và nói gì đó với Lee Sang-moo?\n그러니까, 오대표 세워놓고, 이상무한테 할 소릴 하신 거라니까?\nSo, you set up Representative Oh and said something to Lee Sang-moo?", "suggestedCue": 272}, {"id": 329, "n": 330, "type": "dialogue", "text": "Tôi đã nói với bạn rồi. Việc niêm yết được thực hiện bởi nhóm IR.\n말했잖아요. 상장은 IR팀에서 하는 거라고.\nI told you. Listing is done by the IR team.", "suggestedCue": 273}, {"id": 330, "n": 331, "type": "dialogue", "text": "Người đại diện Oh: ...Vậy à?\n오대표: ...그래서요?\nRepresentative Oh: ...So?", "suggestedCue": 291}, {"id": 331, "n": 332, "type": "dialogue", "text": "Giám đốc điều hành Hà: Tại sao lại như vậy? Sẽ không ổn nếu bạn bị bắt nạt. Ý tôi là.\n하전무: 뭐가 그래서야. 당하고 있으면 안 된다는 거지. 내 말은.\nExecutive Director Ha: Why is that so? It's not okay if you're being bullied. I mean.", "suggestedCue": 274}, {"id": 332, "n": 333, "type": "dialogue", "text": "Người đại diện Oh: Vì vậy, đừng quay vòng vòng và chỉ nói những gì bạn phải nói.\n오대표: 그니까, 빙빙 돌리지 마시고, 하실 말 그냥 하세요.\nRepresentative Oh: So, don’t spin around and just say what you have to say.", "suggestedCue": 275}, {"id": 333, "n": 334, "type": "dialogue", "text": "Giám đốc điều hành Hà: Không còn thời gian để gia hạn hợp đồng sao?\n하전무: 재계약 얼마 안 남았죠?\nExecutive Director Ha: Isn’t there some time left to renew the contract?", "suggestedCue": 58}, {"id": 334, "n": 335, "type": "dialogue", "text": "Đại diện Ồ: ...!\n오대표: ...!\nRepresentative Oh: ...!", "suggestedCue": 291}, {"id": 335, "n": 336, "type": "dialogue", "text": "Giám đốc điều hành Hà: Đại diện Ồ, muốn xem lâu thì cần làm rõ những chuyện này rồi đi tiếp.\n하전무: 오대표님, 오래 보려면, 이런 건 분명히 하고 넘어가야 돼.\nExecutive Director Ha: Representative Oh, if you want to see it for a long time, you need to make these things clear and m
