ố một thế giới đã biến mất.","ko":"때문에 세계 1위 기업이었던 다이치는 사라졌으니까요","en":"As a result,\nthe number one archery company, Daichi, disappeared.","text":"Vì vậy mà Daichi công ty sản xuất cung số một thế giới đã biến mất.\n때문에 세계 1위 기업이었던 다이치는 사라졌으니까요\nAs a result,\nthe number one archery company, Daichi, disappeared.","sourceUid":"merged-mriuvb9f-59","sourceNo":522},{"id":268,"readerNo":269,"displayNo":523,"n":523,"type":"narration","vi":"Vì Wind đã mua lại Daichi,\nnên Daichi, công ty sản xuất cung tên số một thế giới đã biến mất.","ko":"박래경 대표가 과거에 다이치라는 양공을 만드는 회사를 인수하였고","en":"With Wind's acquisition of Daichi,\nthe number one archery company Daichi disappeared.","text":"Vì Wind đã mua lại Daichi,\nnên Daichi, công ty sản xuất cung tên số một thế giới đã biến mất.\n박래경 대표가 과거에 다이치라는 양공을 만드는 회사를 인수하였고\nWith Wind's acquisition of Daichi,\nthe number one archery company Daichi disappeared.","sourceUid":"merged-mriuwdkl-61","sourceNo":523},{"id":269,"readerNo":270,"displayNo":524,"n":524,"type":"narration","vi":"Thiệt tình.\nNói cái gì vậy chứ?","ko":"ウィンドウが大地を買収したことでアーツェリの弓では世界一だった大地が消えましたから。\n영상편집 및 자막이 도움이 되셨다면 구독, 좋아요, 댓글 부탁드립니다.","en":"Hang on.\nI can't take this anymore!\nCome on.","text":"Thiệt tình.\nNói cái gì vậy chứ?\nウィンドウが大地を買収したことでアーツェリの弓では世界一だった大地が消えましたから。\n영상편집 및 자막이 도움이 되셨다면 구독, 좋아요, 댓글 부탁드립니다.\nHang on.\nI can't take this anymore!\nCome on.","sourceUid":"merged-mriuxehc-62","sourceNo":524},{"id":270,"readerNo":271,"displayNo":526,"n":526,"type":"narration","vi":"Thôi đi.\nChẳng phải bố của anh Naito là một nghệ nhân làm cung ở Daichi sao?","ko":"나이토씨의 부친께서는 다이치에서 양궁을 만드는 장인 아니었습니까?\n나이토씨의 아버지는 이전에 다이치에서 아체리의 유미를 만들고 있던 직장인이었을까요?","en":"Wasn't your father\nan artisan who made bows at Daichi?\nYes, that's right. Yes.","text":"Thôi đi.\nChẳng phải bố của anh Naito là một nghệ nhân làm cung ở Daichi sao?\n나이토씨의 부친께서는 다이치에서 양궁을 만드는 장인 아니었습니까?\n나이토씨의 아버지는 이전에 다이치에서 아체리의 유미를 만들고 있던 직장인이었을까요?\nWasn't your father\nan artisan who made bows at Daichi?\nYes, that's right. Yes.","sourceUid":"merged-mriuynj7-63","sourceNo":526},{"id":271,"readerNo":272,"displayNo":528,"n":528,"type":"narration","vi":"Đúng là vậy.\nCác người bắt tôi chờ chỉ để nói mấy chuyện vớ vẩn này hả?\nTôi có cái này muốn đưa cho anh.","ko":"네, 그렇습니다.\n네.\n왜, 왜, 그것을 말하기 위해서부터 왔습니까? 여러분.\n네?\n드릴 게 있습니다.","en":"Did you come all this way to say such things?\nI have something to give you.","text":"Đúng là vậy.\nCác người bắt tôi chờ chỉ để nói mấy chuyện vớ vẩn này hả?\nTôi có cái này muốn đưa cho anh.\n네, 그렇습니다.\n네.\n왜, 왜, 그것을 말하기 위해서부터 왔습니까? 여러분.\n네?\n드릴 게 있습니다.\nDid you come all this way to say such things?\nI have something to give you.","sourceUid":"merged-mriuzzym-64","sourceNo":528},{"id":272,"readerNo":273,"displayNo":533,"n":533,"type":"narration","vi":"Tổ trưởng Yoon đã bay về Hàn Quốc để mang cái này đến cho anh Naito.\nVì máy bay bị trễ nên anh ấy đến hơi muộn.\nMong anh thông cảm.\nTôi nói rồi,\nnếu là hợp đồng, tôi đã nói là tôi không thể ký rồi.\nĐây không phải là hợp đồng, nhưng liên quan đến một lời hứa.","ko":"あのユンさんは内藤さんにそれを渡したくて韓国に行ってきたところですここに少し遅れたのも飛行機の遅延のせいですどうかご理解お願いいたしますだから契約のことでしたら私は署名しませんそう言いましたよね契約書ではありませんがある約束と関係のあるものです","en":"Well, Mr. Yun went back to Korea\nto bring you this.\nThe flight back was delayed, so he was a bit late.\nPlease understand.\nIf what you want is a contract,\nI already told you\nthat I cannot sign it.\nIt's not a contract,\nbut it is about a promise.","text":"Tổ trưởng Yoon đã bay về Hàn Quốc để mang cái này đến cho anh Naito.\nVì máy bay bị trễ nên anh ấy đến hơi muộn.\nMong anh thông cảm.\nTôi nói rồi,\nnếu là hợp đồng, tôi đã nói là tôi không thể ký rồi.\nĐây không phải là hợp đồng, nhưng liên quan đến một lời hứa.\nあのユンさんは内藤さんにそれを渡したくて韓国に行ってきたところですここに少し遅れたのも飛行機の遅延のせいですどうかご理解お願いいたしますだから契約のことでしたら私は署名しませんそう言いましたよね契約書ではありませんがある約束と関係のあるものです\nWell, Mr. Yun went back to Korea\nto bring you this.\nThe flight back was delayed, so he was a bit late.\nPlease understand.\nIf what you want is a contract,\nI already told you\nthat I cannot sign it.\nIt's not a contract,\nbut it is about a promise.","sourceUid":"merged-mriv19gm-65","sourceNo":533},{"id":273,"readerNo":274,"displayNo":534,"n":534,"type":"narration","vi":"Đây là bức hình\nđược chụp 30 năm trước của bố anh Naito và giám đốc Park Rae Gyeong của Wind.","ko":"지금까지 뉴스 스토리였습니다.\n나이투상의 아버지와 윈드 박리경 대표의 30년 전 모습입니다.","en":"[­On Ko Chi Shin]\nThis is a photo of your father\nand Wind CEO Park Rae Gyeong from thirty years ago.","text":"Đây là bức hình\nđược chụp 30 năm trước của bố anh Naito và giám đốc Park Rae Gyeong của Wind.\n지금까지 뉴스 스토리였습니다.\n나이투상의 아버지와 윈드 박리경 대표의 30년 전 모습입니다.\n[­On Ko Chi Shin]\nThis is a photo of your father\nand Wind CEO Park Rae Gyeong from thirty years ago.","sourceUid":"merged-mrj58x7y-66","sourceNo":534},{"id":274,"readerNo":275,"displayNo":536,"n":536,"type":"narration","vi":"Khi đó, bố của anh Naito\nđã bán Daichi cho giám đốc Park Rae Gyeong","ko":"당시 나이토상의 아버지께서는 다이치를 박래경 대표에게 매각하면서","en":"At the time, your father\nsold Daichi to CEO Park and gifted him","text":"Khi đó, bố của anh Naito\nđã bán Daichi cho giám đốc Park Rae Gyeong\n당시 나이토상의 아버지께서는 다이치를 박래경 대표에게 매각하면서\nAt the time, your father\nsold Daichi to CEO Park and gifted him","sourceUid":"merged-mrj5dcnk-67","sourceNo":536},{"id":275,"readerNo":276,"displayNo":537,"n":537,"type":"narration","vi":"và tặng ông ấy bản thiết kế cung tên do chính tay mình vẽ.\nKhi đó, bố của anh Naito\nđã bán Daichi cho giám đốc Park Rae Gyeong","ko":"본인이 직접 그린 양궁 설계도를 선물하셨습니다","en":"a bow blueprint that he personally drew.\nAt the time, your father sold Daichi to CEO Park\nand gifted him a bow blueprint\nthat he personally drew.","text":"và tặng ông ấy bản thiết kế cung tên do chính tay mình vẽ.\nKhi đó, bố của anh Naito\nđã bán Daichi cho giám đốc Park Rae Gyeong\n본인이 직접 그린 양궁 설계도를 선물하셨습니다\na bow blueprint that he personally drew.\nAt the time, your father sold Daichi to CEO Park\nand gifted him a bow blueprint\nthat he personally drew.","sourceUid":"merged-mrj5ffis-69","sourceNo":537},{"id":276,"readerNo":277,"displayNo":538,"n":538,"type":"narration","vi":"và tặng ông ấy bản thiết kế cung tên do chính tay mình vẽ.\nCùng với lời yêu cầu hãy tạo ra cây cung tốt nhất.","ko":"최고의 양궁을 만들어달라는 요청과 함께요","en":"With the request to make the world's best bows.","text":"và tặng ông ấy bản thiết kế cung tên do chính tay mình vẽ.\nCùng với lời yêu cầu hãy tạo ra cây cung tốt nhất.\n최고의 양궁을 만들어달라는 요청과 함께요\nWith the request to make the world's best bows.","sourceUid":"merged-mrj5gaud-70","sourceNo":538},{"id":277,"readerNo":278,"displayNo":539,"n":539,"type":"narration","vi":"Cùng với lời yêu cầu hãy tạo ra cây cung tốt nhất.\nGiám đốc Park đã tặng bố anh biểu ngữ đó.\nÝ nghĩa của nó là \"Ôn cố tri tân\".","ko":"박래경 대표도 부친께 표를 선물하였고요\n그 뜻이 문구의 지시","en":"And CEO Park also gifted your father a slogan. And the meaning is \"On Ko Chi Shin.\" At the time, CEO Park gifted him a framed slogan that read, \"Learn the old, understand the new.\"","text":"Cùng với lời yêu cầu hãy tạo ra cây cung tốt nhất.\nGiám đốc Park đã tặng bố anh biểu ngữ đó.\nÝ nghĩa của nó là \"Ôn cố tri tân\".\n박래경 대표도 부친께 표를 선물하였고요\n그 뜻이 문구의 지시\nAnd CEO Park also gifted your father a slogan. And the meaning is \"On Ko Chi Shin.\" At the time, CEO Park gifted him a framed slogan that read, \"Learn the old, understand the new.\"","sourceUid":"merged-mrj5iob4-73","sourceNo":539},{"id":278,"readerNo":279,"displayNo":541,"n":541,"type":"narration","vi":"Cái này...\nchính là sự coi thường với bố tôi.","ko":"미안해\nおやじを侮辱する言葉ですよ。","en":"This... is an insult to my father!","text":"Cái này...\nchính là sự coi thường với bố tôi.\n미안해\nおやじを侮辱する言葉ですよ。\nThis... is an insult to my father!","sourceUid":"merged-mrj5l2pv-74","sourceNo":541},{"id":279,"readerNo":280,"displayNo":543,"n":543,"type":"narration","vi":"Anh ta nói sẽ bảo vệ truyền thống.\nNhưng lời hứa đó đã tan vỡ.\nRa là anh nghĩ như vậy.\nNhưng dù sao thì anh vẫn treo biểu ngữ đó ở đây.","ko":"古いものを守るって言っておきながら結局約束破ったんですよ! 그렇게 생각하셨군요。 그래도 저 표호를 걸어놓으셨네요。それでもあの標語をかけておいた理由は何でしょうか?","en":"He said he would protect the old things!\nThe contract breaks this promise!\nThat's how you interpreted it, I see.\nStill, I see that you hung it up there.","text":"Anh ta nói sẽ bảo vệ truyền thống.\nNhưng lời hứa đó đã tan vỡ.\nRa là anh nghĩ như vậy.\nNhưng dù sao thì anh vẫn treo biểu ngữ đó ở đây.\n古いものを守るって言っておきながら結局約束破ったんですよ! 그렇게 생각하셨군요。 그래도 저 표호를 걸어놓으셨네요。それでもあの標語をかけておいた理由は何でしょうか?\nHe said he would protect the old things!\nThe contract breaks this promise!\nThat's how you interpreted it, I see.\nStill, I see that you hung it up there.","sourceUid":"merged-mrj5ndx4-75","sourceNo":543},{"id":280,"readerNo":281,"displayNo":544,"n":544,"type":"narration","vi":"Dù vậy vẫn có lý do nào đó khiến anh vẫn treo biểu ngữ đó ở đây?\nCái gì?\nNhìn vào đó mỗi ngày để tôi có thể thấu hiểu tâm tư của bố.","ko":"親父が受けた侮辱を忘れないためですよ!","en":"Is there a reason you hung up the slogan - despite that? - What? I look at it every day, trying to understand how my father felt!","text":"Dù vậy vẫn có lý do nào đó khiến anh vẫn treo biểu ngữ đó ở đây?\nCái gì?\nNhìn vào đó mỗi ngày để tôi có thể thấu hiểu tâm tư của bố.\n親父が受けた侮辱を忘れないためですよ!\nIs there a reason you hung up the slogan - despite that? - What? I look at it every day, trying to understand how my father felt!","sourceUid":"merged-mrj5osiu-77","sourceNo":544},{"id":281,"readerNo":282,"displayNo":547,"n":547,"type":"narration","vi":"Đó là lời mà bố anh Naito đã yêu cầu.\nĐó là lời mà bố anh đã yêu cầu.","ko":"그것은 나이투상의 아버지께서 요청하신 말이었습니다.\n그 표고는 아버지께서 요청한 것이었습니다.","en":"That slogan was requested by your father.\nHe says your father requested those words.","text":"Đó là lời mà bố anh Naito đã yêu cầu.\nĐó là lời mà bố anh đã yêu cầu.\n그것은 나이투상의 아버지께서 요청하신 말이었습니다.\n그 표고는 아버지께서 요청한 것이었습니다.\nThat slogan was requested by your father.\nHe says your father requested those words.","sourceUid":"merged-mrj5ue4b-80","sourceNo":547},{"id":282,"readerNo":283,"displayNo":548,"n":548,"type":"narration","vi":"Có lẽ bố anh vừa muốn anh tiếp nối truyền thống gia đình,\nvừa muốn anh tạo dựng con đường riêng của mình chăng?","ko":"아마 부친께서는 자신의 대를 이어가기를 바라는 동시에 자신만의 길을 가기를 바라는 마음이 아니었을까요?","en":"Don't you think your father wanted you to carry on his legacy, while also wanting you to forge your own path?","text":"Có lẽ bố anh vừa muốn anh tiếp nối truyền thống gia đình,\nvừa muốn anh tạo dựng con đường riêng của mình chăng?\n아마 부친께서는 자신의 대를 이어가기를 바라는 동시에 자신만의 길을 가기를 바라는 마음이 아니었을까요?\nDon't you think your father wanted you to carry on his legacy, while also wanting you to forge your own path?","sourceUid":"merged-mrj5vgs0-81","sourceNo":548},{"id":283,"readerNo":284,"displayNo":549,"n":549,"type":"narration","vi":"Có lẽ bố anh vừa muốn anh tiếp nối truyền thống gia đình,\nvừa muốn anh tạo dựng con đường riêng của mình chăng?","ko":"아버지는 자신의 일을 받으시길 바라며 나이투상은 새로운 길을 걸고 싶었다고 생각합니다.","en":"I think your father would want you to\ncarry on his legacy,\nbut also take a new path for yourself.","text":"Có lẽ bố anh vừa muốn anh tiếp nối truyền thống gia đình,\nvừa muốn anh tạo dựng con đường riêng của mình chăng?\n아버지는 자신의 일을 받으시길 바라며 나이투상은 새로운 길을 걸고 싶었다고 생각합니다.\nI think your father would want you to\ncarry on his legacy,\nbut also take a new path for yourself.","sourceUid":"merged-mrj5wb3r-82","sourceNo":549},{"id":284,"readerNo":285,"displayNo":550,"n":550,"type":"narration","vi":"Bố ơi!\nCon về rồi.\nỪ, con về rồi à?","ko":"감사합니다. 수고하셨습니다. 어서 가, 유리.","en":"Dad!\nI'm back!\nWelcome back.\nOkay.­","text":"Bố ơi!\nCon về rồi.\nỪ, con về rồi à?\n감사합니다. 수고하셨습니다. 어서 가, 유리.\nDad!\nI'm back!\nWelcome back.\nOkay.­","sourceUid":"merged-mrj5xay7-83","sourceNo":550},{"id":285,"readerNo":286,"displayNo":553,"n":553,"type":"narration","vi":"Không, con muốn đến.\nCon cũng muốn trở thành một nghệ nhân giỏi như bố.\nĐã bảo con đừng đến nhà máy rồi mà.","ko":"工場には来るなって言ったろやだよぼくも父さんみたいな職人さんになりたい本当かうん約束する!","en":"I told you not to come to the factory.\nNo! I don't want to!\nI'm going to become an artisan just like you, Dad!\nReally?\nYes, I promise!","text":"Không, con muốn đến.\nCon cũng muốn trở thành một nghệ nhân giỏi như bố.\nĐã bảo con đừng đến nhà máy rồi mà.\n工場には来るなって言ったろやだよぼくも父さんみたいな職人さんになりたい本当かうん約束する!\nI told you not to come to the factory.\nNo! I don't want to!\nI'm going to become an artisan just like you, Dad!\nReally?\nYes, I promise!","sourceUid":"merged-mrj91er8-85","sourceNo":553},{"id":286,"readerNo":287,"displayNo":554,"n":554,"type":"narration","vi":"Thật không?\nVâng! Con hứa!\nCậu bé này là bố đó.\nCon thấy chứ?\nBố...\nCon xin lỗi.\n\nCon cũng đang sống như bố.\n\nCậu bé này đã lớn như thế này rồi.","ko":"흥! 내심 何とか頑張ってんだけどな。 こんなに大きくなったよ。","en":"This is Dad. You see that? Dad... I'm sorry. I'm trying my best, though... And this little one has grown up this much.","text":"Thật không?\nVâng! Con hứa!\nCậu bé này là bố đó.\nCon thấy chứ?\nBố...\nCon xin lỗi.\n\nCon cũng đang sống như bố.\n\nCậu bé này đã lớn như thế này rồi.\n흥! 내심 何とか頑張ってんだけどな。 こんなに大きくなったよ。\nThis is Dad. You see that? Dad... I'm sorry. I'm trying my best, though... And this little one has grown up this much.","sourceUid":"merged-mrj9264z-86","sourceNo":554},{"id":287,"readerNo":288,"displayNo":558,"n":558,"type":"narration","vi":"Cái gì vậy?\nKẹo à?\nHồi bố đi học về đến nhà máy,\nông nội hay cho bố kẹo.\nCảm ơn anh.","ko":"父さんもな学校の帰りに工事をやるとな師匠はいつもこのピンターだ。","en":"What's this?\nIs this for me?\nWhenever I came to the factory after school,\nGrandpa used to give me candy.\nThanks.","text":"Cái gì vậy?\nKẹo à?\nHồi bố đi học về đến nhà máy,\nông nội hay cho bố kẹo.\nCảm ơn anh.\n父さんもな学校の帰りに工事をやるとな師匠はいつもこのピンターだ。\nWhat's this?\nIs this for me?\nWhenever I came to the factory after school,\nGrandpa used to give me candy.\nThanks.","sourceUid":"merged-mrj96rzn-87","sourceNo":558},{"id":288,"readerNo":289,"displayNo":559,"n":559,"type":"narration","vi":"Đây là lá thư\ncủa giám đốc Park gửi cho anh.\nĐây là lá thư của giám đốc Park gửi cho anh.","ko":"박래경 대표께서 나이트상에게 보내는 편지입니다.\n박래경 대표께서 보내는 편지입니다.","en":"This is a letter\nfrom CEO Park to you, Mr. Naito.\nThis is a letter from CEO Park to you.","text":"Đây là lá thư\ncủa giám đốc Park gửi cho anh.\nĐây là lá thư của giám đốc Park gửi cho anh.\n박래경 대표께서 나이트상에게 보내는 편지입니다.\n박래경 대표께서 보내는 편지입니다.\nThis is a letter\nfrom CEO Park to you, Mr. Naito.\nThis is a letter from CEO Park to you.","sourceUid":"merged-mrj9bwlm-89","sourceNo":559},{"id":289,"readerNo":290,"displayNo":561,"n":561,"type":"narration","vi":"Chào cậu.\nTôi là Park Rae Gyeong của Wind.\nKhi tôi mua lại Daichi,\nbố cậu đã trao cho tôi bản thiết kế do chính tay ông ấy vẽ,\nvà yêu cầu tôi tạo ra cây cung tốt nhất.","ko":"안녕하세요. 윈드 박내경입니다.\n제가 다이치를 인수할 때 아버님께서 저에게 최고의 양궁을 만들어 달라며\n직접 그리신 설계도를 주셨습니다.","en":"Hello.\nThis is Park Rae Gyeong of Wind.\nWhen I acquired Daichi,\nyour father asked me to make the world's best bow\nand gave me a bow blueprint he personally drew.","text":"Chào cậu.\nTôi là Park Rae Gyeong của Wind.\nKhi tôi mua lại Daichi,\nbố cậu đã trao cho tôi bản thiết kế do chính tay ông ấy vẽ,\nvà yêu cầu tôi tạo ra cây cung tốt nhất.\n안녕하세요. 윈드 박내경입니다.\n제가 다이치를 인수할 때 아버님께서 저에게 최고의 양궁을 만들어 달라며\n직접 그리신 설계도를 주셨습니다.\nHello.\nThis is Park Rae Gyeong of Wind.\nWhen I acquired Daichi,\nyour father asked me to make the world's best bow\nand gave me a bow blueprint he personally drew.","sourceUid":"merged-mrj9dqep-91","sourceNo":561},{"id":290,"readerNo":291,"displayNo":564,"n":564,"type":"narration","vi":"Cây cung đó khác với cây cung của Wind hiện tại,","ko":"그때 양궁과 지금의 양궁은 다른 것입니다만","en":"Though bows from then are different from bows now,","text":"Cây cung đó khác với cây cung của Wind hiện tại,\n그때 양궁과 지금의 양궁은 다른 것입니다만\nThough bows from then are different from bows now,","sourceUid":"merged-mrj9g9p5-92","sourceNo":564},{"id":291,"readerNo":292,"displayNo":565,"n":565,"type":"narration","vi":"nhưng tâm huyết tạo ra một cây cung tốt nhất thì vẫn vậy.","ko":"좋은 양궁을 만들겠다는 마음은 변함이 없습니다.","en":"my desire to make good bows hasn't changed.","text":"nhưng tâm huyết tạo ra một cây cung tốt nhất thì vẫn vậy.\n좋은 양궁을 만들겠다는 마음은 변함이 없습니다.\nmy desire to make good bows hasn't changed.","sourceUid":"merged-mrj9grvp-93","sourceNo":565},{"id":292,"readerNo":293,"displayNo":566,"n":566,"type":"narration","vi":"Wind không hề xóa bỏ Daichi.\nWind là công ty duy nhất kế thừa tinh thần của nghệ nhân,\nngười cha của cậu.","ko":"윈드는 다이치를 없앤 게 아닙니다. 윈드는 나이토 씨 아버지의 장인정신을 이어온 유일한 회사입니다.","en":"Wind didn't cause Daichi to disappear.\nWind is the only company to carry on\nyour father's artisan mentality.","text":"Wind không hề xóa bỏ Daichi.\nWind là công ty duy nhất kế thừa tinh thần của nghệ nhân,\nngười cha của cậu.\n윈드는 다이치를 없앤 게 아닙니다. 윈드는 나이토 씨 아버지의 장인정신을 이어온 유일한 회사입니다.\nWind didn't cause Daichi to disappear.\nWind is the only company to carry on\nyour father's artisan mentality.","sourceUid":"merged-mrj9jexv-96","sourceNo":566},{"id":293,"readerNo":294,"displayNo":567,"n":567,"type":"narration","vi":"Với lại \"Ôn cố tri tân\".\nBiểu ngữ đó là lời mà bố cậu muốn nhắn nhủ với cậu.\nTôi nghe nói cậu đang sống theo tâm nguyện của cha mình.","ko":"그리고 온고지신 그 표현은 부친께서 나이토상에게 해주고 싶은 말이었습니다. 나이토상은 아버지의 바람대로 살고 계신다고 들었습니다.","en":"Also, \"On Ko Chi Shin.\"\nThat slogan was\nwhat your father wanted to tell you.\nI heard you are living out your father's wishes.","text":"Với lại \"Ôn cố tri tân\".\nBiểu ngữ đó là lời mà bố cậu muốn nhắn nhủ với cậu.\nTôi nghe nói cậu đang sống theo tâm nguyện của cha mình.\n그리고 온고지신 그 표현은 부친께서 나이토상에게 해주고 싶은 말이었습니다. 나이토상은 아버지의 바람대로 살고 계신다고 들었습니다.\nAlso, \"On Ko Chi Shin.\"\nThat slogan was\nwhat your father wanted to tell you.\nI heard you are living out your father's wishes.","sourceUid":"merged-mrj9jn5n-97","sourceNo":567},{"id":294,"readerNo":295,"displayNo":568,"n":568,"type":"narration","vi":"Tôi xin chúc cậu mọi điều tốt đẹp trên con đường phía trước.","ko":"앞으로의 길도 응원하겠습니다.","en":"I will continue to support your future endeavors.","text":"Tôi xin chúc cậu mọi điều tốt đẹp trên con đường phía trước.\n앞으로의 길도 응원하겠습니다.\nI will continue to support your future endeavors.","sourceUid":"merged-mrj9kalo-98","sourceNo":568},{"id":295,"readerNo":296,"displayNo":569,"n":569,"type":"narration","vi":"Park Rae Gyeong kính gửi.\nCảm ơn anh!\nXin cảm ơn.","ko":"난 매서운다","en":"Sincerely, Park Rae Gyeong. Thank you.","text":"Park Rae Gyeong kính gửi.\nCảm ơn anh!\nXin cảm ơn.\n난 매서운다\nSincerely, Park Rae Gyeong. Thank you.","sourceUid":"merged-mrj9l23m-99","sourceNo":569},{"id":296,"readerNo":297,"displayNo":570,"n":570,"type":"narration","vi":"Vâng, thưa giám đốc.\nChúng tôi đã ký hợp đồng xong và đang chuẩn bị về.\nMức chiết khấu là 50%,\nđiều kiện thuận lợi hơn nhiều so với trước đây.","ko":"네, 상무님. 계약 체결하고 돌아가려고 합니다. 할인율은 50%로 이전보다 훨씬 더 유리한 조건입니다.","en":"Yes, Mr. Lee.\nWe finalized the contract and are about to return.\nThe discount rate is 50%,\na much more favorable condition than before.","text":"Vâng, thưa giám đốc.\nChúng tôi đã ký hợp đồng xong và đang chuẩn bị về.\nMức chiết khấu là 50%,\nđiều kiện thuận lợi hơn nhiều so với trước đây.\n네, 상무님. 계약 체결하고 돌아가려고 합니다. 할인율은 50%로 이전보다 훨씬 더 유리한 조건입니다.\nYes, Mr. Lee.\nWe finalized the contract and are about to return.\nThe discount rate is 50%,\na much more favorable condition than before.","sourceUid":"merged-mrj9ny0s-101","sourceNo":570},{"id":297,"readerNo":298,"displayNo":571,"n":571,"type":"narration","vi":"Giỏi lắm. Rất ấn tượng.Cậu vẫn chưa báo cáo, đúng không?","ko":"큰일했네. 대단하이. 아직 보고는 안 했지?","en":"You did great.\nIt's impressive.\nYou haven't reported it yet, right?","text":"Giỏi lắm. Rất ấn tượng.Cậu vẫn chưa báo cáo, đúng không?\n큰일했네. 대단하이. 아직 보고는 안 했지?\nYou did great.\nIt's impressive.\nYou haven't reported it yet, right?","sourceUid":"merged-mrj9pv4i-102","sourceNo":571},{"id":298,"readerNo":299,"displayNo":572,"n":572,"type":"narration","vi":"Vâng. Hôm nay là ngày nghỉ nên tôi định về công ty rồi báo cáo.","ko":"네. 오늘이 휴일이어서 출근해서 하려고 합니다.","en":"No. Today is a holiday so I will report it once we return to work.","text":"Vâng. Hôm nay là ngày nghỉ nên tôi định về công ty rồi báo cáo.\n네. 오늘이 휴일이어서 출근해서 하려고 합니다.\nNo. Today is a holiday so I will report it once we return to work.","sourceUid":"merged-mrj9slik-103","sourceNo":572},{"id":299,"readerNo":300,"displayNo":573,"n":573,"type":"narration","vi":"Nhưng cậu có thể lùi việc đó lại chút, được không?\nVâng. Tôi hiểu rồi.","ko":"근데 그걸 좀 늦출 수 있겠나? 네. 알겠습니다.","en":"But could you delay it a bit?\nYes, okay.","text":"Nhưng cậu có thể lùi việc đó lại chút, được không?\nVâng. Tôi hiểu rồi.\n근데 그걸 좀 늦출 수 있겠나? 네. 알겠습니다.\nBut could you delay it a bit?\nYes, okay.","sourceUid":"merged-mrj9wvtp-105","sourceNo":573},{"id":300,"readerNo":301,"displayNo":575,"n":575,"type":"narration","vi":"Jin Soo à.\nCậu không thấy tiếc khi phải rời Nhật Bản sao?","ko":"진수씨 일본 떠나는 거 아쉽지 않아?","en":"Jin Su. Aren't you sad to leave Japan? Gosh, still...","text":"Jin Soo à.\nCậu không thấy tiếc khi phải rời Nhật Bản sao?\n진수씨 일본 떠나는 거 아쉽지 않아?\nJin Su. Aren't you sad to leave Japan? Gosh, still...","sourceUid":"merged-mrj9xl27-106","sourceNo":575},{"id":301,"readerNo":302,"displayNo":576,"n":576,"type":"narration","vi":"Dù sao thì ký được hợp đồng là may mắn lắm rồi.\nĐúng vậy.","ko":"아유 그래도 계약했으니까 천만다행인 것 같습니다\n그러게요\n그래서 그랬구나","en":"I'm relieved we managed to secure the contract.\nYes, that's true.","text":"Dù sao thì ký được hợp đồng là may mắn lắm rồi.\nĐúng vậy.\n아유 그래도 계약했으니까 천만다행인 것 같습니다\n그러게요\n그래서 그랬구나\nI'm relieved we managed to secure the contract.\nYes, that's true.","sourceUid":"merged-mrja2yab-108","sourceNo":576},{"id":302,"readerNo":303,"displayNo":579,"n":579,"type":"narration","vi":"Có phải vì ký được hợp đồng rồi không... mà tôi không thấy đói nhỉ?","ko":"계약을 해서 내가 지금 배가 고픈 거구나","en":"So that's why!\nI'm hungry because we secured the contract.","text":"Có phải vì ký được hợp đồng rồi không... mà tôi không thấy đói nhỉ?\n계약을 해서 내가 지금 배가 고픈 거구나\nSo that's why!\nI'm hungry because we secured the contract.","sourceUid":"merged-mrja402k-109","sourceNo":579},{"id":303,"readerNo":304,"displayNo":580,"n":580,"type":"narration","vi":"Thiệt tình, cậu không đói sao?","ko":"아이씨 배고프지 않아?","en":"Gosh, aren't you hungry?","text":"Thiệt tình, cậu không đói sao?\n아이씨 배고프지 않아?\nGosh, aren't you hungry?","sourceUid":"merged-mrja523d-110","sourceNo":580},{"id":304,"readerNo":305,"displayNo":581,"n":581,"type":"narration","vi":"Có chút.\nĐúng vậy nhỉ?","ko":"아 살짝\n그치?\n어?","en":"A little bit.\nRight?","text":"Có chút.\nĐúng vậy nhỉ?\n아 살짝\n그치?\n어?\nA little bit.\nRight?","sourceUid":"merged-mrja5xu9-111","sourceNo":581},{"id":305,"readerNo":306,"displayNo":584,"n":584,"type":"narration","vi":"Cô vẫn chưa về sao?\nTôi nghĩ mọi người chắc chưa ăn gì.\nTrưởng phòng bảo tôi chăm sóc cho mọi người.","ko":"아직 안 가셨네요. 식사 못하셨을 것 같아서요. 저희 팀장님이 챙기라고 하셨습니다.","en":"You haven't left yet?\nI didn't think you had eaten yet.\nMy team leader asked me to take care of it.","text":"Cô vẫn chưa về sao?\nTôi nghĩ mọi người chắc chưa ăn gì.\nTrưởng phòng bảo tôi chăm sóc cho mọi người.\n아직 안 가셨네요. 식사 못하셨을 것 같아서요. 저희 팀장님이 챙기라고 하셨습니다.\nYou haven't left yet?\nI didn't think you had eaten yet.\nMy team leader asked me to take care of it.","sourceUid":"merged-mrja6zpm-113","sourceNo":584},{"id":306,"readerNo":307,"displayNo":585,"n":585,"type":"narration","vi":"Đúng là người tốt bụng.\nChúng tôi cũng đang đói đây.","ko":"역시 좋은 분이시네요. 안 그래도 저희 다 배고팠거든요.","en":"He's such a good guy.\nIt so happens that we are hungry.","text":"Đúng là người tốt bụng.\nChúng tôi cũng đang đói đây.\n역시 좋은 분이시네요. 안 그래도 저희 다 배고팠거든요.\nHe's such a good guy.\nIt so happens that we are hungry.","sourceUid":"merged-mrja7ser-115","sourceNo":585},{"id":307,"readerNo":308,"displayNo":586,"n":586,"type":"narration","vi":"À, không phải.\nTôi hiểu ý nghĩa đó là gì rồi.\nÝ là muốn chúng tôi nhanh chóng rời đi nhỉ?","ko":"아 아니다. 저 이제 이거 무슨 뜻인지 알아요. 저희 빨리 가라는 얘기죠?","en":"Oh, no.\nI know what this means now.\n- Telling us to leave quickly, right? - N-No!","text":"À, không phải.\nTôi hiểu ý nghĩa đó là gì rồi.\nÝ là muốn chúng tôi nhanh chóng rời đi nhỉ?\n아 아니다. 저 이제 이거 무슨 뜻인지 알아요. 저희 빨리 가라는 얘기죠?\nOh, no.\nI know what this means now.\n- Telling us to leave quickly, right? - N-No!","sourceUid":"merged-mrja8jbs-117","sourceNo":586},{"id":308,"readerNo":309,"displayNo":590,"n":590,"type":"narration","vi":"Thật lòng đấy ạ.\nCăng thẳng cả ngày, vừa thả lỏng một cái là thấy hơi đói thật","ko":"하루 종일 긴장했다가 딱 풀리니까 출출하긴 하네요.","en":"Now that I can relax after being tense all day,\nI am a bit hungry.","text":"Thật lòng đấy ạ.\nCăng thẳng cả ngày, vừa thả lỏng một cái là thấy hơi đói thật\n하루 종일 긴장했다가 딱 풀리니까 출출하긴 하네요.\nNow that I can relax after being tense all day,\nI am a bit hungry.","sourceUid":"merged-mrjakh3k-120","sourceNo":590},{"id":309,"readerNo":310,"displayNo":848,"n":848,"type":"narration","vi":"À, không ạ. Tôi thật lòng muốn mời mọi người một bữa cơm.\n\"Honne\", thật lòng chứ?\nThật lòng đấy.","ko":"아니요. 진심으로 식사 대접하고 싶습니다.\n헌터니 헌터니\n헌터니","en":"I sincerely want to treat you to a meal. Are you really being honest? Really! Really.","text":"À, không ạ. Tôi thật lòng muốn mời mọi người một bữa cơm.\n\"Honne\", thật lòng chứ?\nThật lòng đấy.\n아니요. 진심으로 식사 대접하고 싶습니다.\n헌터니 헌터니\n헌터니\nI sincerely want to treat you to a meal. Are you really being honest? Really! Really.","sourceUid":"merged-mrjaahz7-119","sourceNo":848},{"id":310,"readerNo":311,"displayNo":591,"n":591,"type":"narration","vi":"Chúng tôi đang định đi ăn,\ntổ trưởng có muốn đi cùng không?\nVâng. Được thôi.","ko":"식사하려고 하는데 팀장님도 괜찮으신가요?\n그럼요. 좋죠.","en":"Would that be okay with you, Mr. Yun?\nOf course. Sounds good.\nWe're about to go eat.","text":"Chúng tôi đang định đi ăn,\ntổ trưởng có muốn đi cùng không?\nVâng. Được thôi.\n식사하려고 하는데 팀장님도 괜찮으신가요?\n그럼요. 좋죠.\nWould that be okay with you, Mr. Yun?\nOf course. Sounds good.\nWe're about to go eat.","sourceUid":"merged-mrjbav3r-122","sourceNo":591},{"id":311,"readerNo":312,"displayNo":593,"n":593,"type":"narration","vi":"Mọi người muốn ăn ở đâu?\nMón gì ngon nhỉ?\nVậy chúng ta ăn ramen nhé?\nMón oden thì mọi người ăn rồi.","ko":"어디로 먹으실까요?\n음... 뭐가 맛있을까요?\n그럼 라면 드실까요? 오뎅 드셨습니까?","en":"Where would you like to go?\nWhat's tasty?\nThen how about ramen?\nSince you've already had fish cakes.","text":"Mọi người muốn ăn ở đâu?\nMón gì ngon nhỉ?\nVậy chúng ta ăn ramen nhé?\nMón oden thì mọi người ăn rồi.\n어디로 먹으실까요?\n음... 뭐가 맛있을까요?\n그럼 라면 드실까요? 오뎅 드셨습니까?\nWhere would you like to go?\nWhat's tasty?\nThen how about ramen?\nSince you've already had fish cakes.","sourceUid":"merged-mrjbc2mg-123","sourceNo":593},{"id":312,"readerNo":313,"displayNo":596,"n":596,"type":"narration","vi":"Hai người cũng vậy đúng không?\nTôi ấy hả?\nVâng.","ko":"두 분도 마찬가지시죠?","en":"That goes for both of you, too, right?\n- Me? - Yes.","text":"Hai người cũng vậy đúng không?\nTôi ấy hả?\nVâng.\n두 분도 마찬가지시죠?\nThat goes for both of you, too, right?\n- Me? - Yes.","sourceUid":"merged-mrjbd7jd-124","sourceNo":596},{"id":313,"readerNo":314,"displayNo":597,"n":597,"type":"narration","vi":"Vậy là...\nHirose biết chúng ta theo dõi họ sao?\nCó vẻ là vậy.","ko":"그러면, 히로세 씨는 우리가 비행하는 거 알고 있었나?\n그런 건가요","en":"Then...\ndid Hirose know we were following them?\nIt seems like it.","text":"Vậy là...\nHirose biết chúng ta theo dõi họ sao?\nCó vẻ là vậy.\n그러면, 히로세 씨는 우리가 비행하는 거 알고 있었나?\n그런 건가요\nThen...\ndid Hirose know we were following them?\nIt seems like it.","sourceUid":"merged-mrjbf069-126","sourceNo":597},{"id":314,"readerNo":315,"displayNo":599,"n":599,"type":"narration","vi":"Đây chẳng phải là tình cảm thật lòng của cô ấy dành cho Jin Soo sao?\nKhông phải vậy đâu.","ko":"이거 이거, 진수 씨를 향한 혼내 아냐?\n그런 거 아니에요","en":"Isn't this her true feelings for you, Jin Su?\nIt's nothing like that!","text":"Đây chẳng phải là tình cảm thật lòng của cô ấy dành cho Jin Soo sao?\nKhông phải vậy đâu.\n이거 이거, 진수 씨를 향한 혼내 아냐?\n그런 거 아니에요\nIsn't this her true feelings for you, Jin Su?\nIt's nothing like that!","sourceUid":"merged-mrjbfeup-127","sourceNo":599},{"id":315,"readerNo":316,"displayNo":601,"n":601,"type":"narration","vi":"Mời mọi người dùng bữa ngon miệng.\nNgồi chung nào.\nVâng, luật sư.\nChúc mọi người ăn ngon miệng.\nJin Soo bảo tôi giúp cô Hirose có thể đến Tokyo.","ko":"잘 먹겠습니다\n같이 드시죠\n네네\n진수씨가 히로스씨도 도쿄로 갈 수 있게 해달라고 하더라고요","en":"Thank you for the food!\nLet's sit together.\nOh, Attorney.\nThank you for the food.\nJin Su asked me to help you go to Tokyo.","text":"Mời mọi người dùng bữa ngon miệng.\nNgồi chung nào.\nVâng, luật sư.\nChúc mọi người ăn ngon miệng.\nJin Soo bảo tôi giúp cô Hirose có thể đến Tokyo.\n잘 먹겠습니다\n같이 드시죠\n네네\n진수씨가 히로스씨도 도쿄로 갈 수 있게 해달라고 하더라고요\nThank you for the food!\nLet's sit together.\nOh, Attorney.\nThank you for the food.\nJin Su asked me to help you go to Tokyo.","sourceUid":"merged-mrjbhj29-129","sourceNo":601},{"id":316,"readerNo":317,"displayNo":605,"n":605,"type":"narration","vi":"Vâng. Tôi nghe trưởng phòng nói rồi.\nNhưng tôi thích Shizuoka hơn.\nVâng, tôi nghe nói đó là quyết định của cô","ko":"네, 팀장님께 들었습니다\n근데 저는 시즈오카가 좋아서요\n네, 그러셨다고","en":"Yes, I heard from the Team Leader.\nBut I like Shizuoka.\nYes, I heard that's what you decided.","text":"Vâng. Tôi nghe trưởng phòng nói rồi.\nNhưng tôi thích Shizuoka hơn.\nVâng, tôi nghe nói đó là quyết định của cô\n네, 팀장님께 들었습니다\n근데 저는 시즈오카가 좋아서요\n네, 그러셨다고\nYes, I heard from the Team Leader.\nBut I like Shizuoka.\nYes, I heard that's what you decided.","sourceUid":"merged-mrjbisqp-130","sourceNo":605},{"id":317,"readerNo":318,"displayNo":610,"n":610,"type":"narration","vi":"Cô đã giúp chúng tôi rất nhiều việc.\nKhông, chính tôi mới là người mang ơn mọi người.","ko":"여러가지로 도움을 받았네요\n아닙니다\n저야말로 신세 많았습니다","en":"We received so much help from you. No, I received so much from you.","text":"Cô đã giúp chúng tôi rất nhiều việc.\nKhông, chính tôi mới là người mang ơn mọi người.\n여러가지로 도움을 받았네요\n아닙니다\n저야말로 신세 많았습니다\nWe received so much help from you. No, I received so much from you.","sourceUid":"merged-mrjbjwqx-131","sourceNo":610},{"id":318,"readerNo":319,"displayNo":611,"n":611,"type":"narration","vi":"Cô đã vất vả nhiều rồi.\nChúng tôi sẽ liên lạc lại.\nVâng.\nCảm ơn cô.\nCảm ơn cô vì tất cả.","ko":"고생 많으셨습니다 그럼 또 연락드리겠습니다 네 감사합니다","en":"Thank you for all your hard work.\n- I'll get in touch again. - Okay.\nThank you.\nThank you for everything.","text":"Cô đã vất vả nhiều rồi.\nChúng tôi sẽ liên lạc lại.\nVâng.\nCảm ơn cô.\nCảm ơn cô vì tất cả.\n고생 많으셨습니다 그럼 또 연락드리겠습니다 네 감사합니다\nThank you for all your hard work.\n- I'll get in touch again. - Okay.\nThank you.\nThank you for everything.","sourceUid":"merged-mrjblo1e-132","sourceNo":611},{"id":319,"readerNo":320,"displayNo":982,"n":982,"type":"narration","vi":"","ko":"","en":"[Board Meeting Minutes]","text":"[Board Meeting Minutes]","sourceUid":"en-mrfx1dif-2676","sourceNo":982},{"id":320,"readerNo":321,"displayNo":617,"n":617,"type":"narration","vi":"(Biên bản cuộc họp)\nXin chào mọi người.\nXin chào mọi người. Xin chào mọi người.\nCó vẻ như giám đốc Lee sẽ không đến.\nTình hình có vẻ không có lợi với ông ấy.\nChắc các vị cũng hiểu chứ?\nSao vậy?\nWind là trách nhiệm của giám đốc Lee sao?","ko":"장모님은\n아로시 모양이네\n안 말해도 모양이 좀 빠질 수 있으니까\n이해하시죠?\n네?\n왜? 윈드 이게 이상문님 책임이라는 거예요?","en":"Hello.\nHello. Hello.\nIt appears Mr. Lee isn't going to show up.\nThe current situation doesn't look good for him.\n- You all understand, right? - Pardon?\nAre you saying Wind is Mr. Lee's responsibility?","text":"(Biên bản cuộc họp)\nXin chào mọi người.\nXin chào mọi người. Xin chào mọi người.\nCó vẻ như giám đốc Lee sẽ không đến.\nTình hình có vẻ không có lợi với ông ấy.\nChắc các vị cũng hiểu chứ?\nSao vậy?\nWind là trách nhiệm của giám đốc Lee sao?\n장모님은\n아로시 모양이네\n안 말해도 모양이 좀 빠질 수 있으니까\n이해하시죠?\n네?\n왜? 윈드 이게 이상문님 책임이라는 거예요?\nHello.\nHello. Hello.\nIt appears Mr. Lee isn't going to show up.\nThe current situation doesn't look good for him.\n- You all understand, right? - Pardon?\nAre you saying Wind is Mr. Lee's responsibility?","sourceUid":"merged-mrjbsjco-134","sourceNo":617},{"id":321,"readerNo":322,"displayNo":623,"n":623,"type":"narration","vi":"Có điên không vậy?\nVậy là trách nhiệm của ai?\nBộ phận nào chịu trách nhiệm về việc niêm yết?\nVâng.\nChúng ta chưa tung tin tức gì ra, đúng không?\nVâng, vẫn đang chờ lệnh.\nCó nên tung ra không?\nỪ.","ko":"미친 거 아니에요?\n그럼 누구 책임입니까? 상장 책임지는 데가 어딘데요?\n기사 내보냈지?\n네, 대기 중입니다\n뭘까요?","en":"Are you crazy?\nThen whose responsibility is it?\nWho's in charge of the listing?\nI see.\nWe haven't released the article yet, right?\nNo. It's on standby.\nShould we release it?\n- Yes. - Okay.","text":"Có điên không vậy?\nVậy là trách nhiệm của ai?\nBộ phận nào chịu trách nhiệm về việc niêm yết?\nVâng.\nChúng ta chưa tung tin tức gì ra, đúng không?\nVâng, vẫn đang chờ lệnh.\nCó nên tung ra không?\nỪ.\n미친 거 아니에요?\n그럼 누구 책임입니까? 상장 책임지는 데가 어딘데요?\n기사 내보냈지?\n네, 대기 중입니다\n뭘까요?\nAre you crazy?\nThen whose responsibility is it?\nWho's in charge of the listing?\nI see.\nWe haven't released the article yet, right?\nNo. It's on standby.\nShould we release it?\n- Yes. - Okay.","sourceUid":"merged-mrjbv9vc-135","sourceNo":623},{"id":322,"readerNo":323,"displayNo":628,"n":628,"type":"narration","vi":"Vậy chúng ta cứ tiến hành mà không có giám đốc Lee nhé?\nVâng, làm vậy đi.\nTôi xin lỗi vì đã đến muộn.","ko":"기사모님은 불참하는 걸로 하고 진행할까요?\n예 그러시죠.\n늦었습니다.","en":"Should we say Mr. Lee is absent and proceed?\nYes, let's do that.\nI'm sorry I'm late.","text":"Vậy chúng ta cứ tiến hành mà không có giám đốc Lee nhé?\nVâng, làm vậy đi.\nTôi xin lỗi vì đã đến muộn.\n기사모님은 불참하는 걸로 하고 진행할까요?\n예 그러시죠.\n늦었습니다.\nShould we say Mr. Lee is absent and proceed?\nYes, let's do that.\nI'm sorry I'm late.","sourceUid":"merged-mrjbzrh2-136","sourceNo":628},{"id":323,"readerNo":324,"displayNo":631,"n":631,"type":"narration","vi":"Vì mọi người đã đến đông đủ, chúng ta bắt đầu cuộc họp hội đồng quản trị.\nVấn đề chính hôm nay là...\nChúng ta bàn chuyện khác trước đi. Vấn đề chính có vẻ quan trọng.\nVâng.","ko":"다 오셨으니까 이사회 진행하겠습니다\n아 본건은요?\n별건부터 하시죠 그게 더 중요한 것 같은데\n아 네","en":"We will start the board meeting since everyone's here. - The main agenda is— - Discuss the side issue first. I think that's more important. Oh, okay.","text":"Vì mọi người đã đến đông đủ, chúng ta bắt đầu cuộc họp hội đồng quản trị.\nVấn đề chính hôm nay là...\nChúng ta bàn chuyện khác trước đi. Vấn đề chính có vẻ quan trọng.\nVâng.\n다 오셨으니까 이사회 진행하겠습니다\n아 본건은요?\n별건부터 하시죠 그게 더 중요한 것 같은데\n아 네\nWe will start the board meeting since everyone's here. - The main agenda is— - Discuss the side issue first. I think that's more important. Oh, okay.","sourceUid":"merged-mrjc1tr1-138","sourceNo":631},{"id":324,"readerNo":325,"displayNo":635,"n":635,"type":"narration","vi":"Chuyện khác là về việc Wind không niêm yết được.","ko":"자 그럼 별거는 윈드 상장 실패에 관한 건데요.","en":"The side issue is about Wind's failed listing.","text":"Chuyện khác là về việc Wind không niêm yết được.\n자 그럼 별거는 윈드 상장 실패에 관한 건데요.\nThe side issue is about Wind's failed listing.","sourceUid":"merged-mrjc3v9e-139","sourceNo":635},{"id":325,"readerNo":326,"displayNo":636,"n":636,"type":"narration","vi":"Về việc này giám đốc Lee cần giải thích một chút chứ nhỉ?","ko":"이 부분은 이상무님께서 좀 해명을 해주셔야 하지 않나.","en":"I think Mr. Lee should provide an explanation.","text":"Về việc này giám đốc Lee cần giải thích một chút chứ nhỉ?\n이 부분은 이상무님께서 좀 해명을 해주셔야 하지 않나.\nI think Mr. Lee should provide an explanation.","sourceUid":"merged-mrjc5399-140","sourceNo":636},{"id":326,"readerNo":327,"displayNo":637,"n":637,"type":"narration","vi":"Chỉ cần doanh thu của Wind tốt thì việc niêm yết sẽ không có vấn đề gì.","ko":"윈드 상장은 매출만 잘 나오면 문제가 없을 겁니다.","en":"Wind's listing won't be a problem\nas long as sales are strong.","text":"Chỉ cần doanh thu của Wind tốt thì việc niêm yết sẽ không có vấn đề gì.\n윈드 상장은 매출만 잘 나오면 문제가 없을 겁니다.\nWind's listing won't be a problem\nas long as sales are strong.","sourceUid":"merged-mrjc6hx9-141","sourceNo":637},{"id":327,"readerNo":328,"displayNo":638,"n":638,"type":"narration","vi":"Việc niêm yết có phải chỉ dựa vào con số đâu?\nCòn phải có khí thế nữa chứ.\nNói vậy...\ný các vị là trách nhiệm của tôi sao?","ko":"상장은 무슨 숫자로 합니까? 기사로 하는 거지.\n그래서 제 책임이란 말씀인지.","en":"Listings aren't about numbers.\nIt's about momentum.\nSo...\nare you saying it's my fault?","text":"Việc niêm yết có phải chỉ dựa vào con số đâu?\nCòn phải có khí thế nữa chứ.\nNói vậy...\ný các vị là trách nhiệm của tôi sao?\n상장은 무슨 숫자로 합니까? 기사로 하는 거지.\n그래서 제 책임이란 말씀인지.\nListings aren't about numbers.\nIt's about momentum.\nSo...\nare you saying it's my fault?","sourceUid":"merged-mrjc8dtz-144","sourceNo":638},{"id":328,"readerNo":329,"displayNo":641,"n":641,"type":"narration","vi":"Chẳng lẽ chỉ có mình giám đốc chịu trách nhiệm?\nNhưng giám đốc đổ lỗi cho người khác như vậy cũng không hay đâu.","ko":"상무님 책임이기만 하겠습니까?\n근데 또 상무님이 이걸 남 탓을 하시는 것도 좀 모양이 빠지지 않습니까?","en":"How could it only be your responsibility?\nBut wouldn't it also look bad for you","text":"Chẳng lẽ chỉ có mình giám đốc chịu trách nhiệm?\nNhưng giám đốc đổ lỗi cho người khác như vậy cũng không hay đâu.\n상무님 책임이기만 하겠습니까?\n근데 또 상무님이 이걸 남 탓을 하시는 것도 좀 모양이 빠지지 않습니까?\nHow could it only be your responsibility?\nBut wouldn't it also look bad for you","sourceUid":"merged-mrjc97cm-145","sourceNo":641},{"id":329,"readerNo":330,"displayNo":642,"n":642,"type":"narration","vi":"Nếu ký được hợp đồng ở Nhật thì không nói làm gì,\nđằng này có được gì đâu đúng không?","ko":"일본에서 대학이라도 했으면 모를 것 다 안 된 거 아니에요?","en":"if you blame others, Mr. Lee?\nIt'd be a different story\nif we secured that deal in Japan.\nBut everything fell through, didn't it?","text":"Nếu ký được hợp đồng ở Nhật thì không nói làm gì,\nđằng này có được gì đâu đúng không?\n일본에서 대학이라도 했으면 모를 것 다 안 된 거 아니에요?\nif you blame others, Mr. Lee?\nIt'd be a different story\nif we secured that deal in Japan.\nBut everything fell through, didn't it?","sourceUid":"merged-mrjcadrh-147","sourceNo":642},{"id":330,"readerNo":331,"displayNo":643,"n":643,"type":"narration","vi":"Nếu thật sự như vậy thì chúng ta biểu quyết đi.\nSao lại phải làm vậy?\nĐây đâu phải vấn đề cần bỏ phiếu tán thành hay phản đối.","ko":"전 그러시면 거수 한 번 하셔야 된 거야.\n그걸 왜 해요? 찬반한 건도 아닌데.","en":"If you feel that way, why don't we put it to a vote?\nWhy would we do that?\nThis isn't even a yes-or-no agenda.\nShouldn't we clarify whose responsibility this is?","text":"Nếu thật sự như vậy thì chúng ta biểu quyết đi.\nSao lại phải làm vậy?\nĐây đâu phải vấn đề cần bỏ phiếu tán thành hay phản đối.\n전 그러시면 거수 한 번 하셔야 된 거야.\n그걸 왜 해요? 찬반한 건도 아닌데.\nIf you feel that way, why don't we put it to a vote?\nWhy would we do that?\nThis isn't even a yes-or-no agenda.\nShouldn't we clarify whose responsibility this is?","sourceUid":"merged-mrjcbkwv-148","sourceNo":643},{"id":331,"readerNo":332,"displayNo":645,"n":645,"type":"narration","vi":"Chẳng phải là để xác định rõ trách nhiệm của ai sao?\nVậy cũng được.\nVậy thì...\nThất bại niêm yết của Wind là lỗi của bộ phận IR.\nAi đồng ý thì giơ tay.","ko":"누구 책임인지 확실히 해야 되는 거 아니에요?\n그러시죠.\n네. 그럼 윈드 성장 실패는 IR팀의 잘못이다. 손 드시면 됩니다.","en":"Let's do that then.\nOkay. Then...\nif you think Wind's failed listing is\nIR Team's fault,\nraise your hand.","text":"Chẳng phải là để xác định rõ trách nhiệm của ai sao?\nVậy cũng được.\nVậy thì...\nThất bại niêm yết của Wind là lỗi của bộ phận IR.\nAi đồng ý thì giơ tay.\n누구 책임인지 확실히 해야 되는 거 아니에요?\n그러시죠.\n네. 그럼 윈드 성장 실패는 IR팀의 잘못이다. 손 드시면 됩니다.\nLet's do that then.\nOkay. Then...\nif you think Wind's failed listing is\nIR Team's fault,\nraise your hand.","sourceUid":"merged-mrjccw2v-149","sourceNo":645},{"id":332,"readerNo":333,"displayNo":648,"n":648,"type":"narration","vi":"Giám đốc Oh đang giơ tay sao?\nVâng.\nTrời ơi!","ko":"오 대표님 지금 손 드신 거예요?\n네.","en":"CEO Oh, did you just raise your hand?\nYes.\nAigoo...","text":"Giám đốc Oh đang giơ tay sao?\nVâng.\nTrời ơi!\n오 대표님 지금 손 드신 거예요?\n네.\nCEO Oh, did you just raise your hand?\nYes.\nAigoo...","sourceUid":"merged-mrjce28v-150","sourceNo":648},{"id":333,"readerNo":334,"displayNo":650,"n":650,"type":"narration","vi":"Xin chào mọi người.\nTôi có chuyện muốn báo cáo nên ghé qua một lát.\nTrước hết, chúng tôi đã ký hợp đồng cung cấp bộ truyền động với Shimizu.","ko":"안녕하십니까. 보고 드릴 게 있어서 잠깐 들렀습니다.\n먼저 일본 시미즈와의 기업 응급 계약은 체결했습니다.","en":"Hello.\nI stopped by to report something.\nWe secured the gear supply contract\nwith Shimizu in Japan.\nWhat about the contract deposit payment?","text":"Xin chào mọi người.\nTôi có chuyện muốn báo cáo nên ghé qua một lát.\nTrước hết, chúng tôi đã ký hợp đồng cung cấp bộ truyền động với Shimizu.\n안녕하십니까. 보고 드릴 게 있어서 잠깐 들렀습니다.\n먼저 일본 시미즈와의 기업 응급 계약은 체결했습니다.\nHello.\nI stopped by to report something.\nWe secured the gear supply contract\nwith Shimizu in Japan.\nWhat about the contract deposit payment?","sourceUid":"merged-mrjcfbop-151","sourceNo":650},{"id":334,"readerNo":335,"displayNo":652,"n":652,"type":"narration","vi":"Khoản tiền đặt cọc thì sao?\nVì ngày ký hợp đồng là cuối tuần\nnên hôm nay tôi sẽ trình phê duyệt thanh toán.","ko":"그거 계약금 결제는?\n계약 당일이 주말이어서 오늘 결제 올리려고 합니다.","en":"The contract took place on the weekend\nso I will be processing the payment today.","text":"Khoản tiền đặt cọc thì sao?\nVì ngày ký hợp đồng là cuối tuần\nnên hôm nay tôi sẽ trình phê duyệt thanh toán.\n그거 계약금 결제는?\n계약 당일이 주말이어서 오늘 결제 올리려고 합니다.\nThe contract took place on the weekend\nso I will be processing the payment today.","sourceUid":"merged-mrjcgprf-152","sourceNo":652},{"id":335,"readerNo":336,"displayNo":654,"n":654,"type":"narration","vi":"Hôm nay Wind cũng sẽ có bài báo về sản phẩm mới.","ko":"그리고 오늘 윈드에서 신제품 관련 기사가 나갈 예정입니다.","en":"Also, Wind will release\nan article on their new product.\nSince sales concerns made the listing difficult,","text":"Hôm nay Wind cũng sẽ có bài báo về sản phẩm mới.\n그리고 오늘 윈드에서 신제품 관련 기사가 나갈 예정입니다.\nAlso, Wind will release\nan article on their new product.\nSince sales concerns made the listing difficult,","sourceUid":"merged-mrjchemw-153","sourceNo":654},{"id":336,"readerNo":337,"displayNo":655,"n":655,"type":"narration","vi":"Vì việc niêm yết gặp khó khăn do lo ngại về doanh thu,\ntôi tin rằng hợp đồng này sẽ bù đắp cho điều đó.","ko":"매출에 대한 의구심으로 상장이 어려웠던 만큼\n이번 계약이 그에 대한 보완이 될 것으로 보고 있습니다.","en":"we believe this contract will help\naddress those concerns.","text":"Vì việc niêm yết gặp khó khăn do lo ngại về doanh thu,\ntôi tin rằng hợp đồng này sẽ bù đắp cho điều đó.\n매출에 대한 의구심으로 상장이 어려웠던 만큼\n이번 계약이 그에 대한 보완이 될 것으로 보고 있습니다.\nwe believe this contract will help\naddress those concerns.","sourceUid":"merged-mrjchzvg-154","sourceNo":655},{"id":337,"readerNo":338,"displayNo":657,"n":657,"type":"narration","vi":"Vậy tôi xin phép rời khỏi đây.\nTôi cũng có thể đứng dậy được chứ?\nGiám đốc Lee.","ko":"그럼 저는 물러가 보겠습니다\n상무님 저는 그게 아니고요","en":"Then I'll take my leave.\nMay I leave as well?\nH-Hey, Mr. Lee.\nMr. Lee, t-that's not what I meant...","text":"Vậy tôi xin phép rời khỏi đây.\nTôi cũng có thể đứng dậy được chứ?\nGiám đốc Lee.\n그럼 저는 물러가 보겠습니다\n상무님 저는 그게 아니고요\nThen I'll take my leave.\nMay I leave as well?\nH-Hey, Mr. Lee.\nMr. Lee, t-that's not what I meant...","sourceUid":"merged-mrjcj3p5-155","sourceNo":657},{"id":338,"readerNo":339,"displayNo":659,"n":659,"type":"narration","vi":"Giám đốc, ý tôi không phải vậy.\nGiám đốc Oh.\nVâng, thưa giám đốc.","ko":"오 대표님\n네 상무님\n억울하다고 남 탓할 거면 그만하셔야 돼","en":"- CEO Oh. - Yes, Mr. Lee.\nIf you blame others for feeling wronged,\nyou should quit.","text":"Giám đốc, ý tôi không phải vậy.\nGiám đốc Oh.\nVâng, thưa giám đốc.\n오 대표님\n네 상무님\n억울하다고 남 탓할 거면 그만하셔야 돼\n- CEO Oh. - Yes, Mr. Lee.\nIf you blame others for feeling wronged,\nyou should quit.","sourceUid":"merged-mrjclbau-156","sourceNo":659},{"id":339,"readerNo":340,"displayNo":662,"n":662,"type":"narration","vi":"Nếu cảm thấy oan ức mà cứ đổ lỗi cho người khác thì nên dừng lại đi.\nTôi không có ý nói mình bị oan.\nXin lỗi giám đốc Lee.","ko":"제가 억울하다는 게 아니고요 죄송합니다 상무님 일 보세요","en":"I'm not saying I feel wronged...\nI'm sorry, Mr. Lee.\nGo about your business.","text":"Nếu cảm thấy oan ức mà cứ đổ lỗi cho người khác thì nên dừng lại đi.\nTôi không có ý nói mình bị oan.\nXin lỗi giám đốc Lee.\n제가 억울하다는 게 아니고요 죄송합니다 상무님 일 보세요\nI'm not saying I feel wronged...\nI'm sorry, Mr. Lee.\nGo about your business.","sourceUid":"merged-mrjcosow-157","sourceNo":662},{"id":340,"readerNo":341,"displayNo":665,"n":665,"type":"narration","vi":"Ông lo làm việc đi.\nNghe nói sắp đến hạn tái ký hợp đồng rồi.","ko":"재계약도 얼마 안 남으셨다면서요","en":"You said your contract renewal is coming up soon.","text":"Ông lo làm việc đi.\nNghe nói sắp đến hạn tái ký hợp đồng rồi.\n재계약도 얼마 안 남으셨다면서요\nYou said your contract renewal is coming up soon.","sourceUid":"merged-mrjcppvz-158","sourceNo":665},{"id":341,"readerNo":342,"displayNo":950,"n":950,"type":"narration","vi":"[Biên bản họp hội đồng quản trị)","ko":"","en":"[Board Meeting Minutes by Deputy Lim Hyeong Seop]","text":"[Biên bản họp hội đồng quản trị)\n[Board Meeting Minutes by Deputy Lim Hyeong Seop]","sourceUid":"merged-mrjcsiiv-159","sourceNo":950},{"id":342,"readerNo":343,"displayNo":666,"n":666,"type":"narration","vi":"Phụ đề tiếng Hàn của Han Hyo-joo","ko":"한글자막 by 한효주","en":"Korean subtitles by Han Hyo-joo","text":"Phụ đề tiếng Hàn của Han Hyo-joo\n한글자막 by 한효주\nKorean subtitles by Han Hyo-joo","sourceUid":"ko-mrfx0skz-666","sourceNo":666},{"id":343,"readerNo":344,"displayNo":667,"n":667,"type":"narration","vi":"Vâng, anh.\nChuyến đi Nhật Bản thế nào?\nVâng. Mọi chuyện ổn rồi.\nTuyệt.\nTôi đã tìm được hết những người trong đội rồi.\nBọn họ vẫn sống như vậy thôi.\nTốt quá.\nVậy bắt đầu nhé?","ko":"음 선배 일본은 잘 다녀왔어? 네 잘 해그를 했어요. 역시 적전 멤버는 다 찾아놨어. 걔네들은 아직도 그러고 살더라.\n잘 됐네","en":"Yes, Seonbae.\nDid you have a nice trip to Japan?\nYes, we resolved it well.\nAs I thought.\nI found all the members for the plan.\nThey still live like that.\nThat works out.\nThen should we start?","text":"Vâng, anh.\nChuyến đi Nhật Bản thế nào?\nVâng. Mọi chuyện ổn rồi.\nTuyệt.\nTôi đã tìm được hết những người trong đội rồi.\nBọn họ vẫn sống như vậy thôi.\nTốt quá.\nVậy bắt đầu nhé?\n음 선배 일본은 잘 다녀왔어? 네 잘 해그를 했어요. 역시 적전 멤버는 다 찾아놨어. 걔네들은 아직도 그러고 살더라.\n잘 됐네\nYes, Seonbae.\nDid you have a nice trip to Japan?\nYes, we resolved it well.\nAs I thought.\nI found all the members for the plan.\nThey still live like that.\nThat works out.\nThen should we start?","sourceUid":"merged-mrjcup40-160","sourceNo":667},{"id":344,"readerNo":345,"displayNo":669,"n":669,"type":"narration","vi":"Tiền bối, em sẽ gọi lại cho anh sau.\nVâng, thưa giám đốc.\nỪ. Cậu chưa ngủ à?","ko":"선배 내가 금방 다시 전화할게요. 네, 상무님. 안 잤나?","en":"Seonbae, I'll call you right back.\nYes, Mr. Lee.\nYou're still up.","text":"Tiền bối, em sẽ gọi lại cho anh sau.\nVâng, thưa giám đốc.\nỪ. Cậu chưa ngủ à?\n선배 내가 금방 다시 전화할게요. 네, 상무님. 안 잤나?\nSeonbae, I'll call you right back.\nYes, Mr. Lee.\nYou're still up.","sourceUid":"merged-mrjcy1lc-162","sourceNo":669},{"id":345,"readerNo":346,"displayNo":672,"n":672,"type":"narration","vi":"Xin lỗi vì gọi cậu vào giờ này.\nKhông sao ạ. Có chuyện gì vậy?","ko":"이 시간에 연락해서 미안하네.\n아닙니다. 말씀하십시오.","en":"I'm sorry for calling you at this hour.\nIt's okay. Please go ahead.","text":"Xin lỗi vì gọi cậu vào giờ này.\nKhông sao ạ. Có chuyện gì vậy?\n이 시간에 연락해서 미안하네.\n아닙니다. 말씀하십시오.\nI'm sorry for calling you at this hour.\nIt's okay. Please go ahead.","sourceUid":"merged-mrjczlzy-165","sourceNo":672},{"id":346,"readerNo":347,"displayNo":674,"n":674,"type":"narration","vi":"Xảy ra chuyện rồi.","ko":"사고가 터졌네.","en":"There's been an incident.","text":"Xảy ra chuyện rồi.\n사고가 터졌네.\nThere's been an incident.","sourceUid":"merged-mrjd07f3-166","sourceNo":674},{"id":347,"readerNo":348,"displayNo":675,"n":675,"type":"narration","vi":"Chủ tịch đã thế chấp cổ phiếu để vay tiền,\ncó vẻ như ông ấy đã làm việc đó thông qua phòng thư ký.","ko":"회장님이 주식을 담보로 대출을 하셨는데 그걸 비서실을 통해서 진행하신 모양이야.","en":"The chairman took out a loan\nwith his stocks as collateral,\nand he processed it through the secretary's office.","text":"Chủ tịch đã thế chấp cổ phiếu để vay tiền,\ncó vẻ như ông ấy đã làm việc đó thông qua phòng thư ký.\n회장님이 주식을 담보로 대출을 하셨는데 그걸 비서실을 통해서 진행하신 모양이야.\nThe chairman took out a loan\nwith his stocks as collateral,\nand he processed it through the secretary's office.","sourceUid":"merged-mrjd0ms5-167","sourceNo":675},{"id":348,"readerNo":349,"displayNo":676,"n":676,"type":"narration","vi":"Chắc là ông ấy muốn làm bí mật.","ko":"아무래도 몰래 하시려고 그런 모양인데","en":"It seems he was trying to do it discreetly.","text":"Chắc là ông ấy muốn làm bí mật.\n아무래도 몰래 하시려고 그런 모양인데\nIt seems he was trying to do it discreetly.","sourceUid":"merged-mrjd1rt8-168","sourceNo":676},{"id":349,"readerNo":350,"displayNo":677,"n":677,"type":"narration","vi":"Không công khai mà lại vậy. Phòng thư ký đến hạn trả nợ mới biết chuyện.","ko":"공시도 없이 있다가 비서실도 만기일이 다 되어서야\n이게 문제가 된 걸 안 모양이야","en":"With no public disclosure,\nthe secretary's office realized it was a problem\nwhen it got close to the due date.","text":"Không công khai mà lại vậy. Phòng thư ký đến hạn trả nợ mới biết chuyện.\n공시도 없이 있다가 비서실도 만기일이 다 되어서야\n이게 문제가 된 걸 안 모양이야\nWith no public disclosure,\nthe secretary's office realized it was a problem\nwhen it got close to the due date.","sourceUid":"merged-mrjd2vxk-170","sourceNo":677},{"id":350,"readerNo":351,"displayNo":679,"n":679,"type":"narration","vi":"(Hợp đồng vay thế chấp cổ phiếu) Có lẽ chủ tịch không muốn ai biết nên mới vậy.","ko":"회장님이 알리기 싫어하셔서 그럴 수도 있고","en":"[Stock Collateral Loan Agreement]\nMaybe the chairman didn't want it to be made public.","text":"(Hợp đồng vay thế chấp cổ phiếu) Có lẽ chủ tịch không muốn ai biết nên mới vậy.\n회장님이 알리기 싫어하셔서 그럴 수도 있고\n[Stock Collateral Loan Agreement]\nMaybe the chairman didn't want it to be made public.","sourceUid":"merged-mrjd3ozj-171","sourceNo":679},{"id":351,"readerNo":352,"displayNo":680,"n":680,"type":"narration","vi":"Giám đốc Lee, liệu có ổn không?\nĐương nhiên không ổn rồi.\nXin giám đốc hãy nghĩ đến việc cứu tôi.\nTôi cầu xin anh.","ko":"괜찮을까요, 사모님?\n괜찮지가 않지, 이 사람아\n저 살려주신다고 생각하시고 부탁드리겠습니다","en":"Will it be okay, Mr. Lee?\nOf course not.\nThink of it as saving my life.\nPlease resolve this for me.","text":"Giám đốc Lee, liệu có ổn không?\nĐương nhiên không ổn rồi.\nXin giám đốc hãy nghĩ đến việc cứu tôi.\nTôi cầu xin anh.\n괜찮을까요, 사모님?\n괜찮지가 않지, 이 사람아\n저 살려주신다고 생각하시고 부탁드리겠습니다\nWill it be okay, Mr. Lee?\nOf course not.\nThink of it as saving my life.\nPlease resolve this for me.","sourceUid":"merged-mrjd5cty-173","sourceNo":680},{"id":352,"readerNo":353,"displayNo":683,"n":683,"type":"narration","vi":"Chuyện chi tiết thì gặp nhau rồi nói.\nVâng. Tôi hiểu rồi.","ko":"자세한 건 만나서 얘기하지\n네, 알겠습니다","en":"Let's talk about the details in person. Okay. I understand.","text":"Chuyện chi tiết thì gặp nhau rồi nói.\nVâng. Tôi hiểu rồi.\n자세한 건 만나서 얘기하지\n네, 알겠습니다\nLet's talk about the details in person. Okay. I understand.","sourceUid":"merged-mrjd66jz-174","sourceNo":683},{"id":353,"readerNo":354,"displayNo":1084,"n":1084,"type":"narration","vi":"(Bậc Thầy Đàm Phán)","ko":"","en":"[The Art of Negotiation]\n[On Go Ji Sin]","text":"(Bậc Thầy Đàm Phán)\n[The Art of Negotiation]\n[On Go Ji Sin]","sourceUid":"merged-mrjd6zs3-175","sourceNo":1084},{"id":354,"readerNo":355,"displayNo":685,"n":685,"type":"narration","vi":"Tôi có thể hỏi Chủ tịch đã dùng 50 tỷ won vào việc gì không?\nCó gì đó hơi lạ ở đây.","ko":"500억을 어디에 쓰셨는지 여쭤봐도 될까요?\n이거 좀 이상한데?","en":"Timing and Subtitles by the 🐺 Wolf in a Suit 👔 Team @ Viki\nMay I ask you where you spent the 50 billion won?\nSomething's off about this.","text":"Tôi có thể hỏi Chủ tịch đã dùng 50 tỷ won vào việc gì không?\nCó gì đó hơi lạ ở đây.\n500억을 어디에 쓰셨는지 여쭤봐도 될까요?\n이거 좀 이상한데?\nTiming and Subtitles by the 🐺 Wolf in a Suit 👔 Team @ Viki\nMay I ask you where you spent the 50 billion won?\nSomething's off about this.","sourceUid":"merged-mrjd8nrs-178","sourceNo":685},{"id":355,"readerNo":356,"displayNo":687,"n":687,"type":"narration","vi":"Chúng ta nên vay tiền ở chỗ khác để trả nợ.","ko" function langHtml(L){let h='';if(L.vi)h+='<div class="txt viTxt">'+esc(L.vi)+'</div>';if(L.ko)h+='<div class="txt koTxt">'+esc(L.ko)+'</div>';if(L.en)h+='<div class="txt enTxt">'+esc(L.en)+'</div>';return h}
function label(b,i){return b.displayNo||b.sourceNo||b.n||i+1}
function fmt(t){t=Number(t||0);let h=Math.floor(t/3600),m=Math.floor((t%3600)/60),s=Math.floor(t%60),ms=Math.round((t-Math.floor(t))*1000);return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')},${String(ms).padStart(3,'0')}`}
function setMsg(s){let el=$('stat'); if(el) el.textContent=s}
function isIOS(){return /iPad|iPhone|iPod/.test(navigator.userAgent)|| (navigator.platform==='MacIntel' && navigator.maxTouchPoints>1)}
function getRange(kind,i=cur){let b=blocks[i];return (kind==='vi'?vi:ko)[String(b&&b.id)]}
function getAudio(kind){return kind==='vi'?via:koa}
function clampVol(v){v=Number(v);if(!Number.isFinite(v))v=100;return Math.max(0,Math.min(200,v))}
function loadVolSettings(){try{return JSON.parse(localStorage.getItem(VOL_KEY)||'{}')||{}}catch(e){return {}}}
function saveVolSettings(){try{localStorage.setItem(VOL_KEY,JSON.stringify({vi:clampVol($('viVol')?.value||100),ko:clampVol($('koVol')?.value||100)}))}catch(e){}}
function volValue(kind){return clampVol($(kind+'Vol')?.value||100)}
function ensureGain(){
  try{
    if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    if(!mediaSource){
      mediaSource=audioCtx.createMediaElementSource(engine);
      gainNode=audioCtx.createGain();
      mediaSource.connect(gainNode);
      gainNode.connect(audioCtx.destination);
    }
    if(audioCtx.state==='suspended')audioCtx.resume().catch(()=>{});
    return true;
  }catch(e){return false}
}
function applyVisibleVolume(kind){
  const v=volValue(kind), a=getAudio(kind), label=$(kind+'VolLabel');
  if(label)label.textContent=Math.round(v)+'%';
  if(a)a.volume=Math.min(1,v/100);
}
function applyEngineVolume(kind){
  engineKind=kind||engineKind||'vi';
  const v=volValue(engineKind);
  const ok=ensureGain();
  if(ok&&gainNode){engine.volume=1;gainNode.gain.value=v/100}
  else engine.volume=Math.min(1,v/100);
  applyVisibleVolume(engineKind);
}
function setReaderVolume(kind,v,persist=true){
  const slider=$(kind+'Vol');
  if(slider)slider.value=String(clampVol(v));
  applyVisibleVolume(kind);
  if(engineKind===kind)applyEngineVolume(kind);
  if(persist)saveVolSettings();
}
function initReaderVolumeControls(){
  const saved=loadVolSettings();
  ['vi','ko'].forEach(kind=>{
    const slider=$(kind+'Vol');
    const val=clampVol(saved[kind]??100);
    if(slider){
      slider.value=String(val);
      slider.oninput=()=>setReaderVolume(kind,slider.value,true);
      slider.onchange=()=>setReaderVolume(kind,slider.value,true);
    }
    setReaderVolume(kind,val,false);
  });
}

function getSource(kind){let a=getAudio(kind);return a.currentSrc||a.src||''}
function unique(arr){return Array.from(new Set(arr.filter(Boolean)))}
function encPath(p){return String(p||'').split('/').map(x=>encodeURIComponent(decodeURIComponent(x))).join('/')}
function baseAudioFolder(){return String(project.audioFolder||'audio').replace(/^\.\//,'').replace(/^\//,'').replace(/\/$/,'')||'audio'}
function slugBase(){return String(project.githubSlug||project.title||'reader').replace(/[^A-Za-z0-9._-]+/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'')||'reader'}
function candidateNames(kind){
  let main=kind==='vi'?project.viAudioFile:project.koAudioFile;
  let slug=slugBase();
  let fallback=kind==='vi'?[slug+'_VI_Dub.mp3',slug+'_vi_dub.mp3','vi_dub.mp3','VI_Dub.mp3','VI_DUB.mp3','agency_s01e02_VI_Dub.mp3']:[slug+'_KO_Live.mp3',slug+'_ko_live.mp3','ko_live.mp3','KO_Live.mp3','KO_LIVE.mp3','agency_s01e02_KO_Live.mp3'];
  return unique([main,...fallback]);
}
function candidateUrls(kind){
  let folder=baseAudioFolder();
  let names=candidateNames(kind);
  let out=[];
  names.forEach(n=>{out.push('./'+folder+'/'+n); out.push('./'+encPath(folder+'/'+n));});
  return unique(out);
}
function showAudioPaths(){
  alert('VI candidates:\n'+candidateUrls('vi').join('\n')+'\n\nKO candidates:\n'+candidateUrls('ko').join('\n')+'\n\nTên trên GitHub phân biệt HOA/thường. Nếu Smart Flow không phát, kiểm tra file trong folder audio hoặc dùng nút chọn file thủ công.');
}
async function tryLoadCandidate(kind){
  let a=getAudio(kind); let cur=a.currentSrc||a.src||'';
  if(cur && cur.startsWith('blob:')) return cur;
  for(const src of candidateUrls(kind)){
    try{
      engine.pause(); engine.src=src; engine.load();
      let ok=await waitMedia(engine,8000);
      if(ok){ a.src=src; try{a.load();}catch(e){} return src; }
    }catch(e){}
  }
  return '';
}

function waitMedia(a,timeout=5000){return new Promise(res=>{if(a.readyState>=1)return res(true);let done=false;let ok=()=>{if(done)return;done=true;clean();res(true)};let bad=()=>{if(done)return;done=true;clean();res(false)};let clean=()=>{a.removeEventListener('loadedmetadata',ok);a.removeEventListener('canplay',ok);a.removeEventListener('error',bad);clearTimeout(to)};a.addEventListener('loadedmetadata',ok,{once:true});a.addEventListener('canplay',ok,{once:true});a.addEventListener('error',bad,{once:true});let to=setTimeout(bad,timeout)})}
async function prepareEngine(kind,start=0){let src=await tryLoadCandidate(kind);if(!src)throw new Error('Không load được audio '+kind.toUpperCase()+'. Kiểm tra folder audio/tên file trên GitHub, hoặc chọn file thủ công. Bấm Audio paths để xem đường dẫn đang thử.');if(engine.src!==src){engine.pause();engine.src=src;engine.load();}let ok=await waitMedia(engine,8000);if(!ok)throw new Error('Không load được audio '+kind.toUpperCase()+'. File có thể chưa tải xong trên GitHub Pages, thử chờ vài giây rồi bấm lại.');applyEngineVolume(kind);try{engine.currentTime=Math.max(0,Number(start||0));}catch(e){}return engine}
async function unlockAudio(show=true){try{let src=await tryLoadCandidate('vi'); if(!src) src=await tryLoadCandidate('ko'); if(!src){if(show)alert('Chưa tìm thấy audio VI/KO. Kiểm tra thư mục audio hoặc chọn file MP3 thủ công.');return false}if(engine.src!==src){engine.src=src;engine.load();await waitMedia(engine,8000)}let oldVol=engine.volume;engine.volume=0.001;try{engine.currentTime=Math.min(0.05,Math.max(0,engine.currentTime||0));}catch(e){}await engine.play();engine.pause();engine.volume=oldVol||1;applyEngineVolume(engineKind||'vi');unlocked=true;setMsg('Đã unlock audio cho iPhone. Bây giờ bấm Smart Flow hoặc VI/KO.');return true}catch(e){unlocked=false;if(show)alert('iPhone chưa cho phát audio. Hãy bấm Unlock iPhone Audio một lần nữa.\n'+(e&&e.message?e.message:e));return false}}

function render(){let q=($('q').value||'').toLowerCase(),h='';blocks.forEach((b,i)=>{if(q&&!blockSearchText(b).includes(q))return;let L=split(b),vr=vi[String(b.id)],kr=ko[String(b.id)];let time=(vr?'<span class="timeBadge">VI '+fmt(vr.start)+'→'+fmt(vr.end)+'</span>':'<span class="badge no">No VI</span>')+' '+(kr?'<span class="timeBadge">KO '+fmt(kr.start)+'→'+fmt(kr.end)+'</span>':'<span class="badge no">No KO</span>');let cls=(i===cur?'active ':'')+(String(b.type||'').toLowerCase().includes('narr')?'narr':'');h+='<div class="seg '+cls+'" onclick="cur='+i+';render();side()"><div class="meta"><span>Cue #'+label(b,i)+'</span><span>'+time+'</span></div><div class="badges">'+(L.vi?'<span class="badge vi">VI</span>':'')+(L.ko?'<span class="badge ko">KO</span>':'')+(L.en?'<span class="badge">EN</span>':'')+'</div>'+langHtml(L)+'<div class="row" style="margin-top:8px"><button class="good" onclick="event.stopPropagation();cur='+i+';playCurrent(\'vi\')">VI Dub</button><button class="violet" onclick="event.stopPropagation();cur='+i+';playCurrent(\'ko\')">KO Live</button><button class="warn" onclick="event.stopPropagation();cur='+i+';smart()">Smart</button></div></div>'});$('list').innerHTML=h;$('stat').textContent=blocks.length+' blocks · current Cue #'+label(blocks[cur]||{},cur)+(isIOS()?' · iPhone mode: dùng 1 audio engine':'');side()}
function side(){let L=split(blocks[cur]||{});$('vip').textContent=L.vi;$('kop').textContent=L.ko}

function play(kind,i=cur,token=++tok){return new Promise(async res=>{let r=getRange(kind,i);if(!r)return res();try{let a=await prepareEngine(kind,r.start);let end=Number(r.end||0);let done=false;let cleanup=()=>{a.removeEventListener('timeupdate',check);a.removeEventListener('ended',ended);a.removeEventListener('error',errored)};let finish=()=>{if(done)return;done=true;cleanup();a.pause();res()};let check=()=>{if(done)return;if(token!==tok||!flow&&token!==tok)return finish();if(a.currentTime>=end-0.03)finish()};let ended=()=>finish();let errored=()=>finish();a.addEventListener('timeupdate',check);a.addEventListener('ended',ended,{once:true});a.addEventListener('error',errored,{once:true});setMsg(`Đang phát ${kind.toUpperCase()} Cue #${label(blocks[i]||{},i)} ${fmt(r.start)} → ${fmt(r.end)}`);try{await a.play();}catch(e){cleanup();if(isIOS()&&!unlocked){alert('iPhone cần unlock audio trước. Bấm Unlock iPhone Audio rồi thử lại.')}else{alert('Không phát được audio: '+(e&&e.message?e.message:e));}return res()}setTimeout(check,80)}catch(e){alert(e.message||e);res()}})}
function playCurrent(k){stopAll(false);tok++;play(k,cur,tok)}
function sequenceFor(mode){if(mode==='vi')return['vi'];if(mode==='ko')return['ko'];if(mode==='vi-ko-vi')return['vi','ko','vi'];return['vi','ko']}
async function smart(){let token=++tok;flow=true;if(isIOS()&&!unlocked){let ok=await unlockAudio(false);if(!ok){alert('Trên iPhone, hãy bấm Unlock iPhone Audio trước, sau đó bấm Smart Flow.');flow=false;return}}let mode=$('mode').value, seq=sequenceFor(mode);for(let i=cur;i<blocks.length&&token===tok&&flow;i++){cur=i;render();document.querySelector('.seg.active')?.scrollIntoView({block:'center'});for(const k of seq){if(token!==tok||!flow)break;await play(k,i,token)}}if(token===tok)setMsg('Smart Flow đã dừng/kết thúc')}
function stopAll(inc=true){if(inc)tok++;flow=false;via.pause();koa.pause();engine.pause();setMsg('Đã stop')}
function next(){cur=Math.min(blocks.length-1,cur+1);render()}function prev(){cur=Math.max(0,cur-1);render()}
$('viaf').onchange=e=>{let f=e.target.files[0];if(f){via.src=URL.createObjectURL(f);applyVisibleVolume('vi');if(!engine.src){engine.src=via.src;engineKind='vi';applyEngineVolume('vi')}unlocked=false;setMsg('Đã chọn VI audio. Nếu dùng iPhone, bấm Unlock.')}};
$('koaf').onchange=e=>{let f=e.target.files[0];if(f){koa.src=URL.createObjectURL(f);applyVisibleVolume('ko');unlocked=false;setMsg('Đã chọn KO audio. Nếu dùng iPhone, bấm Unlock.')}};
function tryAuto(){let vu=candidateUrls('vi')[0], ku=candidateUrls('ko')[0]; if(vu)via.src=vu; if(ku)koa.src=ku; applyVisibleVolume('vi');applyVisibleVolume('ko'); try{via.load();koa.load();}catch(e){} setMsg('Đã khai báo audio từ GitHub. Nếu iPhone chưa nghe, chờ vài giây rồi bấm Unlock/Smart Flow.')}initReaderVolumeControls();tryAuto();
(function addIphoneButtons(){let row=document.querySelector('.float .row');if(row){let b=document.createElement('button');b.textContent='Unlock iPhone Audio';b.className='warn';b.onclick=()=>unlockAudio(true);row.insertBefore(b,row.children[3]||null);let d=document.createElement('button');d.textContent='Audio paths';d.onclick=()=>showAudioPaths();row.appendChild(d);}})();
render();</script></body></html>
