displayNo":281,"n":281,"type":"narration","vi":"Chào giám đốc.\nAnh chơi bao lâu rồi?\nTôi chỉ là tay chơi hạng ba thôi.\nAnh nói dối.\nNhìn biết ngay anh là dân cao thủ.","ko":"얼마나 드시오?\n아 예, 3급 정도 듭니다\n에이 무슨 딱 봐도 고수인데","en":"How good are you?\nI'm around a tier-three player.\nYou're lying.\nI can tell you're a pro.","text":"Chào giám đốc.\nAnh chơi bao lâu rồi?\nTôi chỉ là tay chơi hạng ba thôi.\nAnh nói dối.\nNhìn biết ngay anh là dân cao thủ.\n얼마나 드시오?\n아 예, 3급 정도 듭니다\n에이 무슨 딱 봐도 고수인데\nHow good are you?\nI'm around a tier-three player.\nYou're lying.\nI can tell you're a pro.","sourceUid":"merged-mrhfcwcx-105","sourceNo":281},{"id":129,"readerNo":130,"displayNo":285,"n":285,"type":"narration","vi":"Chúng ta vừa nói chuyện vừa chơi là biết ngay thôi.\nNếu không đặt cược, chơi sẽ mất vui.","ko":"그럼 뭐 내기를 안 하면 되니까요\n내기 안 하려면 무슨 재미로 돈을 짓나?","en":"Then we can just not place bets. If we don't place bets, it won't be fun to play.","text":"Chúng ta vừa nói chuyện vừa chơi là biết ngay thôi.\nNếu không đặt cược, chơi sẽ mất vui.\n그럼 뭐 내기를 안 하면 되니까요\n내기 안 하려면 무슨 재미로 돈을 짓나?\nThen we can just not place bets. If we don't place bets, it won't be fun to play.","sourceUid":"merged-mrhfebm3-106","sourceNo":285},{"id":130,"readerNo":131,"displayNo":286,"n":286,"type":"narration","vi":"Mời anh ngồi.","ko":"앉으시죠","en":"Please take a seat.","text":"Mời anh ngồi.\n앉으시죠\nPlease take a seat.","sourceUid":"merged-mrhtikwo-107","sourceNo":286},{"id":131,"readerNo":132,"displayNo":288,"n":288,"type":"narration","vi":"Ở đây có món sashimi ngon nhất Hàn Quốc.\nTôi không thể phản bội giám đốc Lee.","ko":"이 회는 대한민국에서 이 집이 제일 맛있어\n저는요 이 상무님 배신 못해요","en":"This place has the best sashimi in Korea. I cannot betray Mr. Lee.","text":"Ở đây có món sashimi ngon nhất Hàn Quốc.\nTôi không thể phản bội giám đốc Lee.\n이 회는 대한민국에서 이 집이 제일 맛있어\n저는요 이 상무님 배신 못해요\nThis place has the best sashimi in Korea. I cannot betray Mr. Lee.","sourceUid":"merged-mrhtogb2-111","sourceNo":288},{"id":132,"readerNo":133,"displayNo":291,"n":291,"type":"narration","vi":"Tôi xin phép đi trước.\nTrời đất ơi!\nAi bảo ông phản bội anh ấy chứ?","ko":"저 먼저 일어나겠습니다\n에이 참\n누가 무슨 배신을 하라 그랬다고","en":"I'll be leaving first. My goodness. Whoever told you to betray him?","text":"Tôi xin phép đi trước.\nTrời đất ơi!\nAi bảo ông phản bội anh ấy chứ?\n저 먼저 일어나겠습니다\n에이 참\n누가 무슨 배신을 하라 그랬다고\nI'll be leaving first. My goodness. Whoever told you to betray him?","sourceUid":"merged-mrhtt57g-115","sourceNo":291},{"id":133,"readerNo":134,"displayNo":292,"n":292,"type":"narration","vi":"Vậy, chẳng lẽ giám đốc Kim là kẻ phản bội sao?","ko":"그럼 뭐 김 대표는 배신자예요?","en":"Then is CEO Kim a traitor?","text":"Vậy, chẳng lẽ giám đốc Kim là kẻ phản bội sao?\n그럼 뭐 김 대표는 배신자예요?\nThen is CEO Kim a traitor?","sourceUid":"merged-mrhtxbbw-117","sourceNo":292},{"id":134,"readerNo":135,"displayNo":295,"n":295,"type":"narration","vi":"Chúng ta cứ ăn rồi về thôi. Tôi cũng vậy.\nÔng vẫn chọn phe ngay cả khi công việc của ông gặp nguy hiểm sao?","ko":"밥만 먹고 가자고 나도 그럴 거니까\n아니 오 대표님은 목에 칼이 들어왔는데\n네 편 내 편 따지세요?","en":"Let's just eat and leave. I'll do the same. Do you pick and choose sides\neven when your job is at risk?","text":"Chúng ta cứ ăn rồi về thôi. Tôi cũng vậy.\nÔng vẫn chọn phe ngay cả khi công việc của ông gặp nguy hiểm sao?\n밥만 먹고 가자고 나도 그럴 거니까\n아니 오 대표님은 목에 칼이 들어왔는데\n네 편 내 편 따지세요?\nLet's just eat and leave. I'll do the same. Do you pick and choose sides\neven when your job is at risk?","sourceUid":"merged-mrhtzrrv-120","sourceNo":295},{"id":135,"readerNo":136,"displayNo":296,"n":296,"type":"narration","vi":"Ông nhìn quanh đây xem.\nNgay cả khi không có giám đốc Oh cuộc họp hội đồng quản trị vẫn diễn ra.","ko":"여기 한번 둘러보세요\n오 대표님 없어도 이사회는 열립니다","en":"Look around here.\nEven without you, the board meeting will happen.","text":"Ông nhìn quanh đây xem.\nNgay cả khi không có giám đốc Oh cuộc họp hội đồng quản trị vẫn diễn ra.\n여기 한번 둘러보세요\n오 대표님 없어도 이사회는 열립니다\nLook around here.\nEven without you, the board meeting will happen.","sourceUid":"merged-mrhu0uss-121","sourceNo":296},{"id":136,"readerNo":137,"displayNo":298,"n":298,"type":"narration","vi":"Vậy cậu gọi tôi đến đây làm gì?","ko":"그럼 전 뭐하러 부르셨어요?","en":"Then why did you call me here?","text":"Vậy cậu gọi tôi đến đây làm gì?\n그럼 전 뭐하러 부르셨어요?\nThen why did you call me here?","sourceUid":"merged-mrhu1or3-122","sourceNo":298},{"id":137,"readerNo":138,"displayNo":300,"n":300,"type":"narration","vi":"Vậy thì ông đi đi.\nTrời đất, thật tình.\nÔng định đứng đó mà nghe à?","ko":"가세요, 그럼\n에헤이, 참\n거기 서서 들으실 거예요?","en":"Leave then.\nGosh, seriously.\nWill you listen while standing there?","text":"Vậy thì ông đi đi.\nTrời đất, thật tình.\nÔng định đứng đó mà nghe à?\n가세요, 그럼\n에헤이, 참\n거기 서서 들으실 거예요?\nLeave then.\nGosh, seriously.\nWill you listen while standing there?","sourceUid":"merged-mrhu4az0-126","sourceNo":300},{"id":138,"readerNo":139,"displayNo":302,"n":302,"type":"narration","vi":"Tôi đã bảo là tôi có chuyện muốn nói.\nGiám đốc Oh.\nThôi nào.\nÝ tôi là,","ko":"내가 할 얘기가 있다니까\n오, 대표님\n자","en":"I said I had something to say.\nCEO Oh.\nCome on.\nI mean,","text":"Tôi đã bảo là tôi có chuyện muốn nói.\nGiám đốc Oh.\nThôi nào.\nÝ tôi là,\n내가 할 얘기가 있다니까\n오, 대표님\n자\nI said I had something to say.\nCEO Oh.\nCome on.\nI mean,","sourceUid":"merged-mrhu5tsy-127","sourceNo":302},{"id":139,"readerNo":140,"displayNo":305,"n":305,"type":"narration","vi":"triệu tập cuộc họp hội đồng quản trị có hơi quá rồi.\nChẳng khác nào bảo tôi quay lưng lại với giám đốc Lee ngay trước mặt ông ấy sao?","ko":"아니, 아무리 그래도 이사회 소집은 좀 그렇죠.\n이상문이 보는 앞에서 등 돌리라는 거잖습니까.","en":"holding a board meeting is too much.\nI'd be turning my back on Mr. Lee in his presence.","text":"triệu tập cuộc họp hội đồng quản trị có hơi quá rồi.\nChẳng khác nào bảo tôi quay lưng lại với giám đốc Lee ngay trước mặt ông ấy sao?\n아니, 아무리 그래도 이사회 소집은 좀 그렇죠.\n이상문이 보는 앞에서 등 돌리라는 거잖습니까.\nholding a board meeting is too much.\nI'd be turning my back on Mr. Lee in his presence.","sourceUid":"merged-mrhu78s5-128","sourceNo":305},{"id":140,"readerNo":141,"displayNo":307,"n":307,"type":"narration","vi":"Vậy thì sao?\nÔng sẽ từ chức thay ông ấy sao?\nSao tôi phải viết đơn từ chức?","ko":"그래서 오 대표가 대신 사표 쓰게?\n내가 왜 사표 써요?","en":"Then\nwill you resign in his place?\nWhy should I resign?","text":"Vậy thì sao?\nÔng sẽ từ chức thay ông ấy sao?\nSao tôi phải viết đơn từ chức?\n그래서 오 대표가 대신 사표 쓰게?\n내가 왜 사표 써요?\nThen\nwill you resign in his place?\nWhy should I resign?","sourceUid":"merged-mrhuba7e-129","sourceNo":307},{"id":141,"readerNo":142,"displayNo":309,"n":309,"type":"narration","vi":"Một giám đốc không được tái ký hợp đồng cũng giống như viết đơn từ chức còn gì.","ko":"이번이 재계약 못하면 그게 사표 쓰는 거지.","en":"If you can't renew your contract,\nthat's a resignation.","text":"Một giám đốc không được tái ký hợp đồng cũng giống như viết đơn từ chức còn gì.\n이번이 재계약 못하면 그게 사표 쓰는 거지.\nIf you can't renew your contract,\nthat's a resignation.","sourceUid":"merged-mrhuc4i5-130","sourceNo":309},{"id":142,"readerNo":143,"displayNo":310,"n":310,"type":"narration","vi":"Giám đốc Lee và Yoon Joo No không nên làm vậy.","ko":"이상문님이나 윤준호나 정말 그런 거 아니야.","en":"Mr. Lee and Yun Ju No really shouldn't do that.","text":"Giám đốc Lee và Yoon Joo No không nên làm vậy.\n이상문님이나 윤준호나 정말 그런 거 아니야.\nMr. Lee and Yun Ju No really shouldn't do that.","sourceUid":"merged-mrhucp4j-131","sourceNo":310},{"id":143,"readerNo":144,"displayNo":311,"n":311,"type":"narration","vi":"Vậy Yoon Joo No chịu trách nhiệm thì sao?","ko":"아니, 그럼 그냥 윤준호가 책임지는 건 어때요?","en":"Then how about Yun Ju No just takes responsibility for it?","text":"Vậy Yoon Joo No chịu trách nhiệm thì sao?\n아니, 그럼 그냥 윤준호가 책임지는 건 어때요?\nThen how about Yun Ju No just takes responsibility for it?","sourceUid":"merged-mrhud7d6-132","sourceNo":311},{"id":144,"readerNo":145,"displayNo":312,"n":312,"type":"narration","vi":"Đó cũng là một cách hay.\nMời mọi người dùng bữa.","ko":"뭐 그것도 좋은 방법이고\n드세요\n아 예","en":"Well, that's a good idea as well.\nPlease, eat.\nOh, okay.","text":"Đó cũng là một cách hay.\nMời mọi người dùng bữa.\n뭐 그것도 좋은 방법이고\n드세요\n아 예\nWell, that's a good idea as well.\nPlease, eat.\nOh, okay.","sourceUid":"merged-mrhuerhl-133","sourceNo":312},{"id":145,"readerNo":146,"displayNo":315,"n":315,"type":"narration","vi":"Vâng.\nTôi nói thật đấy.\nNào.","ko":"아 이거 금일","en":"Well, I'll go ahead. Here.","text":"Vâng.\nTôi nói thật đấy.\nNào.\n아 이거 금일\nWell, I'll go ahead. Here.","sourceUid":"merged-mrhuo7zf-134","sourceNo":315},{"id":146,"readerNo":147,"displayNo":316,"n":316,"type":"narration","vi":"Tôi không hề có ý định làm gì giám đốc Lee cả.","ko":"이상문님을 뭐 어떻게 하자 그러는 게 아닙니다","en":"So I'm not saying\nwe should do something against Mr. Lee.","text":"Tôi không hề có ý định làm gì giám đốc Lee cả.\n이상문님을 뭐 어떻게 하자 그러는 게 아닙니다\nSo I'm not saying\nwe should do something against Mr. Lee.","sourceUid":"merged-mrhupu62-135","sourceNo":316},{"id":147,"readerNo":148,"displayNo":317,"n":317,"type":"narration","vi":"Tôi chỉ muốn tạo cơ hội để giám đốc Lee có thể từ bỏ Yoon Joo No thôi.","ko":"이상문님한테\n윤준호를 포기할 수 있는 명분을 드리자는 거예요","en":"I'm saying\nwe give him a good reason to give up Yun Ju No.","text":"Tôi chỉ muốn tạo cơ hội để giám đốc Lee có thể từ bỏ Yoon Joo No thôi.\n이상문님한테\n윤준호를 포기할 수 있는 명분을 드리자는 거예요\nI'm saying\nwe give him a good reason to give up Yun Ju No.","sourceUid":"merged-mrhur3ta-136","sourceNo":317},{"id":148,"readerNo":149,"displayNo":319,"n":319,"type":"narration","vi":"Quyết định là ở ông ấy.\nNhưng nếu giám đốc Lee nhận hết trách nhiệm rồi nghỉ hưu thì sao?","ko":"뭐 선택은 본인이 하시면 되는 거고\n근데\n이상문님이 다 책임지고 은퇴하신다고 하면","en":"He can make the decision himself.\nBut...\nwhat if Mr. Lee says he'd take all the blame and retire?","text":"Quyết định là ở ông ấy.\nNhưng nếu giám đốc Lee nhận hết trách nhiệm rồi nghỉ hưu thì sao?\n뭐 선택은 본인이 하시면 되는 거고\n근데\n이상문님이 다 책임지고 은퇴하신다고 하면\nHe can make the decision himself.\nBut...\nwhat if Mr. Lee says he'd take all the blame and retire?","sourceUid":"merged-mrhus8hd-137","sourceNo":319},{"id":149,"readerNo":150,"displayNo":322,"n":322,"type":"narration","vi":"Vậy Yoon Joo No sẽ bị xử lý thế nào?","ko":"윤준호는 어떻게 처리합니까?","en":"How will you get rid of Yun Ju No then?","text":"Vậy Yoon Joo No sẽ bị xử lý thế nào?\n윤준호는 어떻게 처리합니까?\nHow will you get rid of Yun Ju No then?","sourceUid":"merged-mrhutezu-139","sourceNo":322},{"id":150,"readerNo":151,"displayNo":323,"n":323,"type":"narration","vi":"Cậu ta sẽ được xá tội là xong à?\nXá tội.","ko":"면죄부만 받는 거 아니에요?\n면죄부","en":"Won't he just be receiving a pardon?\nPardon...","text":"Cậu ta sẽ được xá tội là xong à?\nXá tội.\n면죄부만 받는 거 아니에요?\n면죄부\nWon't he just be receiving a pardon?\nPardon...","sourceUid":"merged-mrhuu2m9-140","sourceNo":323},{"id":151,"readerNo":152,"displayNo":325,"n":325,"type":"narration","vi":"Giám đốc Oh có biết tại sao Yoon Joo No lại đến trụ sở chính không? Anh có biết không? -","ko":"윤준호가 본사에 왜 온 것 같으세요? 아세요?","en":"Why do you think Yun Ju No came to HQ?","text":"Giám đốc Oh có biết tại sao Yoon Joo No lại đến trụ sở chính không? Anh có biết không? -\n윤준호가 본사에 왜 온 것 같으세요? 아세요?\nWhy do you think Yun Ju No came to HQ?","sourceUid":"merged-mrhuunyh-141","sourceNo":325},{"id":152,"readerNo":153,"displayNo":327,"n":327,"type":"narration","vi":"Cạn ly nào. - Cạn ly. Con người ta, khi chạm vào những khoản tiền lớn, dễ bị lẫn lộn lắm.","ko":"사람이 큰 돈을 만지게 되면 이게 헷갈리게 돼 있어 내 돈이 아닌 걸 알면서도","en":"Do you know why?\nHere.\nWhen a person starts handling large sums of money,\nthey start getting confused.","text":"Cạn ly nào. - Cạn ly. Con người ta, khi chạm vào những khoản tiền lớn, dễ bị lẫn lộn lắm.\n사람이 큰 돈을 만지게 되면 이게 헷갈리게 돼 있어 내 돈이 아닌 걸 알면서도\nDo you know why?\nHere.\nWhen a person starts handling large sums of money,\nthey start getting confused.","sourceUid":"merged-mrhux3jt-144","sourceNo":327},{"id":153,"readerNo":154,"displayNo":329,"n":329,"type":"narration","vi":"Dù biết đó không phải tiền của mình,\nnhưng cứ ở trong tay mình là lại thấy như của mình vậy.\nThế nên tiền bạc mới đáng sợ.\nThật vậy sao?\nChứ sao nữa.","ko":"내 손 안에 있으면 이게 꼭 내 거 같거든\n그게 돈이 무서운 거야\n진짜 그렇습니까?\n그렇다니까","en":"Even though they know it's not their money,\nit feels like it's theirs while it's in their hands.\nThat's why money is a scary thing.\nIs that really so?\nI'm telling you.","text":"Dù biết đó không phải tiền của mình,\nnhưng cứ ở trong tay mình là lại thấy như của mình vậy.\nThế nên tiền bạc mới đáng sợ.\nThật vậy sao?\nChứ sao nữa.\n내 손 안에 있으면 이게 꼭 내 거 같거든\n그게 돈이 무서운 거야\n진짜 그렇습니까?\n그렇다니까\nEven though they know it's not their money,\nit feels like it's theirs while it's in their hands.\nThat's why money is a scary thing.\nIs that really so?\nI'm telling you.","sourceUid":"merged-mrhv4loa-149","sourceNo":329},{"id":154,"readerNo":155,"displayNo":333,"n":333,"type":"narration","vi":"Làm M&A ấy,\nphải động đến hàng chục tỷ, hàng trăm tỷ đó sao?","ko":"M&A를 하다보면 수천억 또 수백억씩 돈을 만지게 되지 않습니까","en":"When you do M&A,\nyou end up handling tons of billions of won.","text":"Làm M&A ấy,\nphải động đến hàng chục tỷ, hàng trăm tỷ đó sao?\nM&A를 하다보면 수천억 또 수백억씩 돈을 만지게 되지 않습니까\nWhen you do M&A,\nyou end up handling tons of billions of won.","sourceUid":"merged-mrhv4v15-150","sourceNo":333},{"id":155,"readerNo":156,"displayNo":334,"n":334,"type":"narration","vi":"Làm riết rồi thấy tiền cũng thường thôi.\nCứ tưởng là của mình hết.","ko":"그러다보면 이게 돈이 우수워진다 말이야 다 내꺼 같고","en":"Over time, money seems trivial,\nand it all feels like it's yours.","text":"Làm riết rồi thấy tiền cũng thường thôi.\nCứ tưởng là của mình hết.\n그러다보면 이게 돈이 우수워진다 말이야 다 내꺼 같고\nOver time, money seems trivial,\nand it all feels like it's yours.","sourceUid":"merged-mrhv5tky-151","sourceNo":334},{"id":156,"readerNo":157,"displayNo":335,"n":335,"type":"narration","vi":"Phải biết sợ tiền mới được.\nThì đấy.","ko":"돈은 우수할 줄 알아야 되는데\n그러니까","en":"You should know to be wary of money.\nExactly.","text":"Phải biết sợ tiền mới được.\nThì đấy.\n돈은 우수할 줄 알아야 되는데\n그러니까\nYou should know to be wary of money.\nExactly.","sourceUid":"merged-mrhv6gnm-152","sourceNo":335},{"id":157,"readerNo":158,"displayNo":337,"n":337,"type":"narration","vi":"Cứ thử đi mua một công ty xem.\nĐầy thằng đòi cái giá 20 tỷ won cho một công ty trị giá 10 tỷ won.","ko":"이에 회사 하나 사러 나가보면 100억짜리 갖고 와서 200억 달라고 하는 놈들 쎄고 쎘거든.","en":"When you go out to acquire a company,\nyou meet people who want 20 billion for 10 billion won company.","text":"Cứ thử đi mua một công ty xem.\nĐầy thằng đòi cái giá 20 tỷ won cho một công ty trị giá 10 tỷ won.\n이에 회사 하나 사러 나가보면 100억짜리 갖고 와서 200억 달라고 하는 놈들 쎄고 쎘거든.\nWhen you go out to acquire a company,\nyou meet people who want 20 billion for 10 billion won company.","sourceUid":"merged-mrhv71ax-153","sourceNo":337},{"id":158,"readerNo":159,"displayNo":338,"n":338,"type":"narration","vi":"Mấy thằng đó làm sao qua mặt được dân chuyên nghiệp.","ko":"근데 그런 놈들은 전문가를 못 이기지.","en":"But those guys can't beat an expert.\nIn the end, they sell the company for 5 billion.","text":"Mấy thằng đó làm sao qua mặt được dân chuyên nghiệp.\n근데 그런 놈들은 전문가를 못 이기지.\nBut those guys can't beat an expert.\nIn the end, they sell the company for 5 billion.","sourceUid":"merged-mrhv84k2-155","sourceNo":338},{"id":159,"readerNo":160,"displayNo":339,"n":339,"type":"narration","vi":"Cuối cùng cũng phải bán tháo công ty với giá 5 tỷ rồi biến thôi.","ko":"결국에는 50억에 팔고 나가는데.","en":"Then how about me?","text":"Cuối cùng cũng phải bán tháo công ty với giá 5 tỷ rồi biến thôi.\n결국에는 50억에 팔고 나가는데.\nThen how about me?","sourceUid":"merged-mrhv8qj5-156","sourceNo":339},{"id":160,"readerNo":161,"displayNo":340,"n":340,"type":"narration","vi":"Thế còn tôi thì sao?\nTôi mua một công ty 10 tỷ với giá 5 tỷ,\nchẳng phải là tôi mang về cho công ty 5 tỷ won rồi sao?","ko":"그럼 나는? 나는 100억짜리를 50억에 사왔으니까 내가 회사에 50억을 벌어다 준 거지 않습니까?","en":"Since I got a 10 billion won company for 5 billion,\nI earned my company 5 billion won.","text":"Thế còn tôi thì sao?\nTôi mua một công ty 10 tỷ với giá 5 tỷ,\nchẳng phải là tôi mang về cho công ty 5 tỷ won rồi sao?\n그럼 나는? 나는 100억짜리를 50억에 사왔으니까 내가 회사에 50억을 벌어다 준 거지 않습니까?\nSince I got a 10 billion won company for 5 billion,\nI earned my company 5 billion won.","sourceUid":"merged-mrhv9cfl-157","sourceNo":340},{"id":161,"readerNo":162,"displayNo":341,"n":341,"type":"narration","vi":"Thì đúng là vậy.\nNhưng lương của tôi thì sao?","ko":"그렇긴 하죠.\n근데 내 월급을 보면 초라하거든.","en":"That's true.\nBut when I look at my paycheck,\nit's pathetic in comparison.","text":"Thì đúng là vậy.\nNhưng lương của tôi thì sao?\n그렇긴 하죠.\n근데 내 월급을 보면 초라하거든.\nThat's true.\nBut when I look at my paycheck,\nit's pathetic in comparison.","sourceUid":"merged-mrhva636-158","sourceNo":341},{"id":162,"readerNo":163,"displayNo":344,"n":344,"type":"narration","vi":"Bèo bọt.\nCông ty thì không biết khi nào đuổi việc mình.\nĐương nhiên con người sẽ nghĩ đến chuyện tranh thủ kiếm chút khi có cơ hội chứ?","ko":"회사는 또 언제 잘릴지 알 수도 없고.\n그러니까 기회가 왔을 때 좀 챙겨놓자 이런 생각을 안 할 수가 없는 거야.","en":"And you never know when you could be laid off.\nSo it's natural for people to think they should siphon some while they can.","text":"Bèo bọt.\nCông ty thì không biết khi nào đuổi việc mình.\nĐương nhiên con người sẽ nghĩ đến chuyện tranh thủ kiếm chút khi có cơ hội chứ?\n회사는 또 언제 잘릴지 알 수도 없고.\n그러니까 기회가 왔을 때 좀 챙겨놓자 이런 생각을 안 할 수가 없는 거야.\nAnd you never know when you could be laid off.\nSo it's natural for people to think they should siphon some while they can.","sourceUid":"merged-mrhvbboa-159","sourceNo":344},{"id":163,"readerNo":164,"displayNo":345,"n":345,"type":"narration","vi":"Đúng là vậy.\nCái dễ nhất là bảo cái tên bán ấy,\nmang cái giá 5 tỷ won đến thì tôi mua cho anh 7 tỷ won,\ncòn anh đưa tôi 1 tỷ won.","ko":"진짜. 제일 쉬운 게 50억짜리 갖고 온 양반한테 내가 그거 70억에 사줄 테니까 나한테 10억만 달라.","en":"It's true then.\nThe easiest thing would be to tell the guy selling\na 5 billion won company that I would buy it for 7 billion\nif they give me 1 billion won.","text":"Đúng là vậy.\nCái dễ nhất là bảo cái tên bán ấy,\nmang cái giá 5 tỷ won đến thì tôi mua cho anh 7 tỷ won,\ncòn anh đưa tôi 1 tỷ won.\n진짜. 제일 쉬운 게 50억짜리 갖고 온 양반한테 내가 그거 70억에 사줄 테니까 나한테 10억만 달라.\nIt's true then.\nThe easiest thing would be to tell the guy selling\na 5 billion won company that I would buy it for 7 billion\nif they give me 1 billion won.","sourceUid":"merged-mrhvckv1-160","sourceNo":345},{"id":164,"readerNo":165,"displayNo":347,"n":347,"type":"narration","vi":"Rồi báo cáo với công ty,\nlà tôi đã ép được cái giá 10 tỷ won xuống còn 7 tỷ won.\nQuá dễ ăn rồi.","ko":"그러고는 회사에다가 내가 100억짜리를 70억으로 깎아왔습니다 하는 건데 이거 너무 쉽지.","en":"Then I say that I bought a 10 billion won company for 7 billion. This would be so easy.","text":"Rồi báo cáo với công ty,\nlà tôi đã ép được cái giá 10 tỷ won xuống còn 7 tỷ won.\nQuá dễ ăn rồi.\n그러고는 회사에다가 내가 100억짜리를 70억으로 깎아왔습니다 하는 건데 이거 너무 쉽지.\nThen I say that I bought a 10 billion won company for 7 billion. This would be so easy.","sourceUid":"merged-mrhve041-163","sourceNo":347},{"id":165,"readerNo":166,"displayNo":351,"n":351,"type":"narration","vi":"Vậy ý anh là Yoon Joo No đã ăn hối lộ?\nThực ra là tôi ấy,\ntôi không hề có ý định làm khó thằng tôi từng nâng đỡ\nchỉ vì nó kiếm chút đỉnh đâu.","ko":"그럼 윤준호가 리메이트를 받았다 그거예요?\n내가요\n그거 좀 해먹었다고\n내가 키우던 놈한테\n모질게 하자 이런 얘기가 아니에요","en":"Then...\nare you saying Yun Ju No received a rebate?\nYou know,\nI'm not saying to treat a guy I trained badly\njust because he took some money.","text":"Vậy ý anh là Yoon Joo No đã ăn hối lộ?\nThực ra là tôi ấy,\ntôi không hề có ý định làm khó thằng tôi từng nâng đỡ\nchỉ vì nó kiếm chút đỉnh đâu.\n그럼 윤준호가 리메이트를 받았다 그거예요?\n내가요\n그거 좀 해먹었다고\n내가 키우던 놈한테\n모질게 하자 이런 얘기가 아니에요\nThen...\nare you saying Yun Ju No received a rebate?\nYou know,\nI'm not saying to treat a guy I trained badly\njust because he took some money.","sourceUid":"merged-mrhvin7l-167","sourceNo":351},{"id":166,"readerNo":167,"displayNo":353,"n":353,"type":"narration","vi":"Mà này,\nchuyện này tôi chưa nói với ai đâu nhé.","ko":"그 친구는\n내가 진짜 이런 얘기 어디 가서 한 번도 안 했는데.","en":"He is...\nI really never told anyone this anywhere.","text":"Mà này,\nchuyện này tôi chưa nói với ai đâu nhé.\n그 친구는\n내가 진짜 이런 얘기 어디 가서 한 번도 안 했는데.\nHe is...\nI really never told anyone this anywhere.","sourceUid":"merged-mrhvjhw2-168","sourceNo":353},{"id":167,"readerNo":168,"displayNo":355,"n":355,"type":"narration","vi":"Tập đoàn dược phẩm Jumbo, mọi người biết chứ?\nSuýt nữa thì Sanin sập vì vụ đó.","ko":"정보제약 아시죠?\n알죠.\n그것 때문에 저 사진 훅 갓 보냈는데.","en":"You know Jumbo Pharma, right?\nOf course, we do.\nSanin almost went under because of it.","text":"Tập đoàn dược phẩm Jumbo, mọi người biết chứ?\nSuýt nữa thì Sanin sập vì vụ đó.\n정보제약 아시죠?\n알죠.\n그것 때문에 저 사진 훅 갓 보냈는데.\nYou know Jumbo Pharma, right?\nOf course, we do.\nSanin almost went under because of it.","sourceUid":"merged-mrhvlb1s-170","sourceNo":355},{"id":168,"readerNo":169,"displayNo":358,"n":358,"type":"narration","vi":"Biết chứ.\nVụ đó...\nlà tác phẩm của Yoon Joo No đấy.\nTôi nhớ vụ đó có cả điều tra của bên công tố,","ko":"그게\n그게 윤준호 작품이에요.\n그거 검찰 조사까지 받은 걸로 아는데","en":"That was...\nThat was Yun Ju No's doing.\nBut didn't he get investigated by the prosecution","text":"Biết chứ.\nVụ đó...\nlà tác phẩm của Yoon Joo No đấy.\nTôi nhớ vụ đó có cả điều tra của bên công tố,\n그게\n그게 윤준호 작품이에요.\n그거 검찰 조사까지 받은 걸로 아는데\nThat was...\nThat was Yun Ju No's doing.\nBut didn't he get investigated by the prosecution","sourceUid":"merged-mrhvn6kc-171","sourceNo":358},{"id":169,"readerNo":170,"displayNo":361,"n":361,"type":"narration","vi":"nhưng không có kết quả gì thì phải?","ko":"나온 거 없지 않아요?","en":"and they found nothing?","text":"nhưng không có kết quả gì thì phải?\n나온 거 없지 않아요?\nand they found nothing?","sourceUid":"merged-mrhvnxtd-172","sourceNo":361},{"id":170,"readerNo":171,"displayNo":362,"n":362,"type":"narration","vi":"Không phải là không có kết quả,\nmà là Yoon Joo No đã dùng tên của anh trai mình.","ko":"나온 게 없는 게 아니라\n윤준호가 지 친형 이름으로 했거든 그걸.","en":"It's not that they found nothing.\nYun Ju No did that under his brother's name.","text":"Không phải là không có kết quả,\nmà là Yoon Joo No đã dùng tên của anh trai mình.\n나온 게 없는 게 아니라\n윤준호가 지 친형 이름으로 했거든 그걸.\nIt's not that they found nothing.\nYun Ju No did that under his brother's name.","sourceUid":"merged-mrhvolod-173","sourceNo":362},{"id":171,"readerNo":172,"displayNo":367,"n":367,"type":"narration","vi":"Thế nên anh trai cậu ta mới chết trong quá trình điều tra.\nNhờ đó mà vụ án khép lại vì nghi phạm đã chết.","ko":"그러다가\n조사를 받다가 지 형이 죽어버린 거야.\n덕분에 피의자 사망으로 인한\n수사 종결.","en":"Then his brother died while being investigated.\nThus, the investigation closed\ndue to the death of the suspect.","text":"Thế nên anh trai cậu ta mới chết trong quá trình điều tra.\nNhờ đó mà vụ án khép lại vì nghi phạm đã chết.\n그러다가\n조사를 받다가 지 형이 죽어버린 거야.\n덕분에 피의자 사망으로 인한\n수사 종결.\nThen his brother died while being investigated.\nThus, the investigation closed\ndue to the death of the suspect.","sourceUid":"merged-mrhvpzmx-175","sourceNo":367},{"id":172,"readerNo":173,"displayNo":368,"n":368,"type":"narration","vi":"Giám đốc Lee đau lòng vì chuyện đó. Vừa thấy có lỗi nữa.\nTính ông ấy mọi người biết mà.","ko":"이 상무님은 그게 안타까운 거지. 미안하고. 성격 아시잖아요.","en":"That's what Mr. Lee feels bad and sorry about.\nYou know his personality.","text":"Giám đốc Lee đau lòng vì chuyện đó. Vừa thấy có lỗi nữa.\nTính ông ấy mọi người biết mà.\n이 상무님은 그게 안타까운 거지. 미안하고. 성격 아시잖아요.\nThat's what Mr. Lee feels bad and sorry about.\nYou know his personality.","sourceUid":"merged-mrhvqzhl-176","sourceNo":368},{"id":173,"readerNo":174,"displayNo":369,"n":369,"type":"narration","vi":"Anh chơi giỏi đấy.\nKiểu gì cũng được.\nKhông muốn bị chửi nên chẳng dám nói lời khó nghe.","ko":"잘 드십니다\n이래도 좋고 저래도 좋고\n욕먹기 싫으니까 쓴소리도 안 하고","en":"You're good.\nHe's happy this way or that.\nHe doesn't want criticism so he says nothing mean.","text":"Anh chơi giỏi đấy.\nKiểu gì cũng được.\nKhông muốn bị chửi nên chẳng dám nói lời khó nghe.\n잘 드십니다\n이래도 좋고 저래도 좋고\n욕먹기 싫으니까 쓴소리도 안 하고\nYou're good.\nHe's happy this way or that.\nHe doesn't want criticism so he says nothing mean.","sourceUid":"merged-mrhvsg6x-177","sourceNo":369},{"id":174,"readerNo":175,"displayNo":372,"n":372,"type":"narration","vi":"Nhưng cái tính cách đó lại hay làm hỏng việc lớn đấy.\nBệnh để lâu là thành ung thư.\nYoon Joo No rồi cũng sẽ lộ mặt thôi.","ko":"근데 그런 성격이 일을 또 크게 만든다니까\n병이 곱는다고\n윤준호도 결국은 터져요","en":"But people like him make problems worse.\nThe problem only festers.\nYun Ju No is bound to blow up.","text":"Nhưng cái tính cách đó lại hay làm hỏng việc lớn đấy.\nBệnh để lâu là thành ung thư.\nYoon Joo No rồi cũng sẽ lộ mặt thôi.\n근데 그런 성격이 일을 또 크게 만든다니까\n병이 곱는다고\n윤준호도 결국은 터져요\nBut people like him make problems worse.\nThe problem only festers.\nYun Ju No is bound to blow up.","sourceUid":"merged-mrhvxx5e-178","sourceNo":372},{"id":175,"readerNo":176,"displayNo":375,"n":375,"type":"narration","vi":"Không thể không lộ được.\nVậy nên giám đốc Lee cũng phải nhanh chóng giải quyết.","ko":"안 터질 수가 없지\n그러니까 이상호님 얼른 정리를 하셔야 돼","en":"It's inevitable.\nTherefore, Mr. Lee needs to get rid of him quickly,","text":"Không thể không lộ được.\nVậy nên giám đốc Lee cũng phải nhanh chóng giải quyết.\n안 터질 수가 없지\n그러니까 이상호님 얼른 정리를 하셔야 돼\nIt's inevitable.\nTherefore, Mr. Lee needs to get rid of him quickly,","sourceUid":"merged-mrhvz7s9-179","sourceNo":375},{"id":176,"readerNo":177,"displayNo":377,"n":377,"type":"narration","vi":"Cứ thế này là cả hai cùng đi tong đấy.\nNhưng mà...\nYoon Joo No chắc chắn là cáo già trong chuyện này,","ko":"안 그러면 같이 날아간다니까 근데 윤준호가 그쪽으로 빠삭할 텐데","en":"or he's also doomed.\nBut...\nYun Ju No should be an expert in that field.","text":"Cứ thế này là cả hai cùng đi tong đấy.\nNhưng mà...\nYoon Joo No chắc chắn là cáo già trong chuyện này,\n안 그러면 같이 날아간다니까 근데 윤준호가 그쪽으로 빠삭할 텐데\nor he's also doomed.\nBut...\nYun Ju No should be an expert in that field.","sourceUid":"merged-mrhw4pna-181","sourceNo":377},{"id":177,"readerNo":178,"displayNo":379,"n":379,"type":"narration","vi":"Sao lại mua cổ phiếu lộ liễu bằng tên anh trai vậy?","ko":"그런데 친하게 형 이름으로 주식을 샀다고요?","en":"He bought stocks under\nhis brother's name so obviously?","text":"Sao lại mua cổ phiếu lộ liễu bằng tên anh trai vậy?\n그런데 친하게 형 이름으로 주식을 샀다고요?\nHe bought stocks under\nhis brother's name so obviously?","sourceUid":"merged-mrhw50zk-182","sourceNo":379},{"id":178,"readerNo":179,"displayNo":381,"n":381,"type":"narration","vi":"Đấy. Mấy người tốt bụng là vậy đó. Đâu có đâu. Thử bảo ai đó giao hết tài sản cho người khác xem.\nKhông ai dám đâu.","ko":"해봐. 착한 사람도 이런다니까.\n사람이 자기 전 재산을 다른 사람한테 맡기려고 그러면요. 절대로 못 맡겨요.","en":"You see.\nNice guys are like this.\nNo, I'm not nice.\nIf someone tries to\nentrust their entire fortune to someone else,\nthey wouldn't be able to do it.","text":"Đấy. Mấy người tốt bụng là vậy đó. Đâu có đâu. Thử bảo ai đó giao hết tài sản cho người khác xem.\nKhông ai dám đâu.\n해봐. 착한 사람도 이런다니까.\n사람이 자기 전 재산을 다른 사람한테 맡기려고 그러면요. 절대로 못 맡겨요.\nYou see.\nNice guys are like this.\nNo, I'm not nice.\nIf someone tries to\nentrust their entire fortune to someone else,\nthey wouldn't be able to do it.","sourceUid":"merged-mrhw8gwy-187","sourceNo":381},{"id":179,"readerNo":180,"displayNo":382,"n":382,"type":"narration","vi":"Người bình thường chắc còn chẳng dám giao cho con cái ấy chứ.","ko":"웬만한 사람은 자기 자식한테도 못 맡길 것.","en":"Most couldn't even entrust it to their own children.","text":"Người bình thường chắc còn chẳng dám giao cho con cái ấy chứ.\n웬만한 사람은 자기 자식한테도 못 맡길 것.\nMost couldn't even entrust it to their own children.","sourceUid":"merged-mrhw8qm6-188","sourceNo":382},{"id":180,"readerNo":181,"displayNo":383,"n":383,"type":"narration","vi":"Có thể nói Yoon Joo No và anh trai cực kỳ thân thiết với nhau.","ko":"그러니까 윤준호는 자기 형이랑 정말 각별했던 거야.","en":"Basically,\nYun Ju No was very close to his brother.","text":"Có thể nói Yoon Joo No và anh trai cực kỳ thân thiết với nhau.\n그러니까 윤준호는 자기 형이랑 정말 각별했던 거야.\nBasically,\nYun Ju No was very close to his brother.","sourceUid":"merged-mrhw9dap-189","sourceNo":383},{"id":181,"readerNo":182,"displayNo":384,"n":384,"type":"narration","vi":"Thế nên mới xảy ra chuyện đó.","ko":"그래서 그 사다리는 안 보고","en":"That's why all that went down.","text":"Thế nên mới xảy ra chuyện đó.\n그래서 그 사다리는 안 보고\nThat's why all that went down.","sourceUid":"merged-mrhwbt5t-191","sourceNo":384},{"id":182,"readerNo":183,"displayNo":495,"n":495,"type":"narration","vi":"Joo No à.\nGiúp anh một lần thôi.\nEm đang đầu tư vào Jumbo, đúng không?","ko":"","en":"Ju No.\nHelp me out.\nYou're investing in Jumbo, right?","text":"Joo No à.\nGiúp anh một lần thôi.\nEm đang đầu tư vào Jumbo, đúng không?\nJu No.\nHelp me out.\nYou're investing in Jumbo, right?","sourceUid":"merged-mrhwcbrg-192","sourceNo":495},{"id":183,"readerNo":184,"displayNo":385,"n":385,"type":"narration","vi":"Sao anh biết chuyện đó?\nHả?\nSao anh biết vậy hả?","ko":"형이 그걸 어떻게 알아?\n형이 그걸 어떻게 아냐고","en":"How do you know that? Well? I asked how you know that, Hyeong.","text":"Sao anh biết chuyện đó?\nHả?\nSao anh biết vậy hả?\n형이 그걸 어떻게 알아?\n형이 그걸 어떻게 아냐고\nHow do you know that? Well? I asked how you know that, Hyeong.","sourceUid":"merged-mrhwdgdt-193","sourceNo":385},{"id":184,"readerNo":185,"displayNo":387,"n":387,"type":"narration","vi":"Sanin không đầu tư vào công ty đó.\nCông ty đó là lũ lừa đảo.","ko":"산인은 거기 투자 안 해 그 회사는 사기야","en":"Sanin isn't investing in that company.\nThat company is a scam!","text":"Sanin không đầu tư vào công ty đó.\nCông ty đó là lũ lừa đảo.\n산인은 거기 투자 안 해 그 회사는 사기야\nSanin isn't investing in that company.\nThat company is a scam!","sourceUid":"merged-mrhwgqfc-196","sourceNo":387},{"id":185,"readerNo":186,"displayNo":388,"n":388,"type":"narration","vi":"Em đừng nói dối.\nNếu Sanin đầu tư vào đó, vậy giá cổ phiếu phải tăng lên chứ?","ko":"거짓말하지 말고 산인 투자하면 올라야 되는 거 아니야?","en":"Don't lie.\nIf Sanin invested in it, shouldn't its stocks go up?","text":"Em đừng nói dối.\nNếu Sanin đầu tư vào đó, vậy giá cổ phiếu phải tăng lên chứ?\n거짓말하지 말고 산인 투자하면 올라야 되는 거 아니야?\nDon't lie.\nIf Sanin invested in it, shouldn't its stocks go up?","sourceUid":"merged-mrhwhbgp-197","sourceNo":388},{"id":186,"readerNo":187,"displayNo":389,"n":389,"type":"narration","vi":"Nhưng...\nsao lại rớt như vậy chứ?\nJoo No à.\nCứu anh lần này thôi.\nNếu không, anh sẽ chết mất.\nNhé?","ko":"근데 그걸 왜 떨어지는 거야?\n준호야, 한 번만 살려줘, 안 그러면 나 진짜 죽어, 어?","en":"But...\nwhy is it falling?\nJu No.\nSave me this once.\nIf you don't, I'm dead!\nPlease?","text":"Nhưng...\nsao lại rớt như vậy chứ?\nJoo No à.\nCứu anh lần này thôi.\nNếu không, anh sẽ chết mất.\nNhé?\n근데 그걸 왜 떨어지는 거야?\n준호야, 한 번만 살려줘, 안 그러면 나 진짜 죽어, 어?\nBut...\nwhy is it falling?\nJu No.\nSave me this once.\nIf you don't, I'm dead!\nPlease?","sourceUid":"merged-mrhwiim8-198","sourceNo":389},{"id":187,"readerNo":188,"displayNo":391,"n":391,"type":"narration","vi":"Xin chào.\nSố lượng là 10.001 chiếc, đơn giá mỗi chiếc là 25 đô.\n20% tổng giá trị sẽ được thanh toán trong tháng này,\nvà khoản thanh toán này sẽ được coi như tiền đặt cọc.","ko":"수량은 1만 1개, 개당 단가는 25달러, 대금의 20%는 이달에 지급하고 그 대금은 계약금의 성격을 가지는 것이 조건입니다.","en":"Hello.\nThe quantity is 10,001.\nThe unit price is 25 dollars.\n20% of the total amount will be paid this month,\nand this payment will serve as a deposit.","text":"Xin chào.\nSố lượng là 10.001 chiếc, đơn giá mỗi chiếc là 25 đô.\n20% tổng giá trị sẽ được thanh toán trong tháng này,\nvà khoản thanh toán này sẽ được coi như tiền đặt cọc.\n수량은 1만 1개, 개당 단가는 25달러, 대금의 20%는 이달에 지급하고 그 대금은 계약금의 성격을 가지는 것이 조건입니다.\nHello.\nThe quantity is 10,001.\nThe unit price is 25 dollars.\n20% of the total amount will be paid this month,\nand this payment will serve as a deposit.","sourceUid":"merged-mrhwjrw9-199","sourceNo":391},{"id":188,"readerNo":189,"displayNo":392,"n":392,"type":"narration","vi":"Tôi hiểu rồi.\nVì số lượng vượt quá 10.000 chiếc, cụ thể là 10.001 chiếc,\nnên chúng tôi xin xác nhận lại mức chiết khấu là 50%.","ko":"수량은 1만 개를 초과한 1만 1개이므로 할인율이 50%인 것 다시 한번 확인 부탁드리고요.","en":"I understand.\nThe quantity, at 10,001 units, exceeds 10,000,\nso please reconfirm the discount rate of 50%.\nPlease reconfirm that the discount rate is 50%.","text":"Tôi hiểu rồi.\nVì số lượng vượt quá 10.000 chiếc, cụ thể là 10.001 chiếc,\nnên chúng tôi xin xác nhận lại mức chiết khấu là 50%.\n수량은 1만 개를 초과한 1만 1개이므로 할인율이 50%인 것 다시 한번 확인 부탁드리고요.\nI understand.\nThe quantity, at 10,001 units, exceeds 10,000,\nso please reconfirm the discount rate of 50%.\nPlease reconfirm that the discount rate is 50%.","sourceUid":"merged-mrhwo0oo-200","sourceNo":392},{"id":189,"readerNo":190,"displayNo":393,"n":393,"type":"narration","vi":"Chúng tôi đã có chữ ký giám đốc Park Rae Gyeong của Wind,","ko":"윈드의 박내경 대표의 사인은 저희가 미리 받아갔고요","en":"We've already obtained Wind CEO, Park Rae Gyeong's signature.","text":"Chúng tôi đã có chữ ký giám đốc Park Rae Gyeong của Wind,\n윈드의 박내경 대표의 사인은 저희가 미리 받아갔고요\nWe've already obtained Wind CEO, Park Rae Gyeong's signature.","sourceUid":"merged-mrhwq19e-201","sourceNo":393},{"id":190,"readerNo":191,"displayNo":394,"n":394,"type":"narration","vi":"Và chúng tôi cũng đính kèm văn bản đảm bảo với tư cách là người đại diện.","ko":"저희가 대리인으로서 보장하는 내용도 같이 첨부하였습니다","en":"A document guaranteeing our role as his agent is also included.","text":"Và chúng tôi cũng đính kèm văn bản đảm bảo với tư cách là người đại diện.\n저희가 대리인으로서 보장하는 내용도 같이 첨부하였습니다\nA document guaranteeing our role as his agent is also included.","sourceUid":"merged-mrhwqs7p-202","sourceNo":394},{"id":191,"readerNo":192,"displayNo":395,"n":395,"type":"narration","vi":"Cảm ơn.\nChúng tôi sẽ tiếp quản lô hàng mà Shimizu đã gửi cho Speed tại Hàn Quốc.","ko":"심의지에서 한국에 스피드로 가는 수량을 저희가 대신 받는 조건이고요","en":"Thank you.\nThere's no problem.\nWe will take over the supply Shimizu sent\nto Speed in Korea.","text":"Cảm ơn.\nChúng tôi sẽ tiếp quản lô hàng mà Shimizu đã gửi cho Speed tại Hàn Quốc.\n심의지에서 한국에 스피드로 가는 수량을 저희가 대신 받는 조건이고요\nThank you.\nThere's no problem.\nWe will take over the supply Shimizu sent\nto Speed in Korea.","sourceUid":"merged-mrhwros8-203","sourceNo":395},{"id":192,"readerNo":193,"displayNo":396,"n":396,"type":"narration","vi":"Chúng tôi sẽ gửi kèm hợp đồng MOU với Speed sau.\nCảm ơn các vị.","ko":"스피드와 MOU 계약서는 추후 첨부하도록 하겠습니다","en":"The MOU contract with Speed will be attached later. Thank you.","text":"Chúng tôi sẽ gửi kèm hợp đồng MOU với Speed sau.\nCảm ơn các vị.\n스피드와 MOU 계약서는 추후 첨부하도록 하겠습니다\nThe MOU contract with Speed will be attached later. Thank you.","sourceUid":"merged-mrhxpha0-204","sourceNo":396},{"id":193,"readerNo":194,"displayNo":397,"n":397,"type":"narration","vi":"Không còn vấn đề gì nữa cả.\nNhưng có đúng Wind là nơi sản xuất xe đạp sao?\nCông ty này thực sự sản xuất xe đạp sao?\nWind có đúng là công ty sản xuất xe đạp không?\nVâng, đúng vậy.","ko":"本社は自転車を製造する会社ですよね?\n고맙습니다.\n네 맞습니다","en":"There are no issues.\nBut are you sure Wind makes bicycles?\nDoes this company really make bicycles?\nIs Wind really a company that makes bicycles?\nYes, it is.","text":"Không còn vấn đề gì nữa cả.\nNhưng có đúng Wind là nơi sản xuất xe đạp sao?\nCông ty này thực sự sản xuất xe đạp sao?\nWind có đúng là công ty sản xuất xe đạp không?\nVâng, đúng vậy.\n本社は自転車を製造する会社ですよね?\n고맙습니다.\n네 맞습니다\nThere are no issues.\nBut are you sure Wind makes bicycles?\nDoes this company really make bicycles?\nIs Wind really a company that makes bicycles?\nYes, it is.","sourceUid":"merged-mrhxu68x-205","sourceNo":397},{"id":194,"readerNo":195,"displayNo":400,"n":400,"type":"narration","vi":"Tôi giải thích một chút nhé?\nWind là công ty sản xuất cung tên.\nHọ đứng số một thế giới về cung tên...\nXin lỗi...\nnhưng tôi không thể ký được.\nAnh ấy nói không thể ký được.","ko":"あのウィンドウはアーツにも正常している会社ですアーツでは申し訳ありません私は証明できません\n사연은 이 시각 세계였습니다.\n사인할 수 없다고 하셨습니다.","en":"Could I give him a brief explanation?\nWell, Wind also makes archery bows.\nIt's number one in archery bows—\nI'm sorry,\nbut I cannot sign this.\nHe says he cannot sign this.","text":"Tôi giải thích một chút nhé?\nWind là công ty sản xuất cung tên.\nHọ đứng số một thế giới về cung tên...\nXin lỗi...\nnhưng tôi không thể ký được.\nAnh ấy nói không thể ký được.\nあのウィンドウはアーツにも正常している会社ですアーツでは申し訳ありません私は証明できません\n사연은 이 시각 세계였습니다.\n사인할 수 없다고 하셨습니다.\nCould I give him a brief explanation?\nWell, Wind also makes archery bows.\nIt's number one in archery bows—\nI'm sorry,\nbut I cannot sign this.\nHe says he cannot sign this.","sourceUid":"merged-mrhy08bz-207","sourceNo":400},{"id":195,"readerNo":196,"displayNo":403,"n":403,"type":"narration","vi":"Lý do của anh là gì?\nTại sao anh lại không thể ký vậy?","ko":"이유가 뭐죠?\n왜 증명해 주지 않으셨을까요?","en":"What's the reason?\nWhy can't you sign it?","text":"Lý do của anh là gì?\nTại sao anh lại không thể ký vậy?\n이유가 뭐죠?\n왜 증명해 주지 않으셨을까요?\nWhat's the reason?\nWhy can't you sign it?","sourceUid":"merged-mrhy178m-208","sourceNo":403},{"id":196,"readerNo":197,"displayNo":405,"n":405,"type":"narration","vi":"Tôi không thể tin tưởng công ty này.\nAnh Naito!\nHãy giữ phép lịch sự. Đây là khách của Shimizu.\nTrưởng phòng.\nAnh ký vào hợp đồng này,","ko":"본인에 대해서 믿을 수 없기 때문입니다.\n나이토 씨, 고객님 앞에 실례하시겠습니까?\n부장, 당신은 자신의 경험을 위해","en":"I cannot trust this company.\nMr. Naito!\nMind your manners! They are guests.\nTeam Leader.\nAnh Naito!","text":"Tôi không thể tin tưởng công ty này.\nAnh Naito!\nHãy giữ phép lịch sự. Đây là khách của Shimizu.\nTrưởng phòng.\nAnh ký vào hợp đồng này,\n본인에 대해서 믿을 수 없기 때문입니다.\n나이토 씨, 고객님 앞에 실례하시겠습니까?\n부장, 당신은 자신의 경험을 위해\nI cannot trust this company.\nMr. Naito!\nMind your manners! They are guests.\nTeam Leader.\nAnh Naito!","sourceUid":"merged-mrhy4q5i-210","sourceNo":405},{"id":197,"readerNo":198,"displayNo":408,"n":408,"type":"narration","vi":"vì anh muốn đạt được chỉ tiêu để có thể lên Tokyo.\nBình tĩnh nào, Naito.","ko":"도쿄에 가고 싶기 때문에 이 계약을 진행하려고 하지 않습니까?\n나이토 씨, 조용히 하세요. 나이토 씨.","en":"You're signing this contract so you can meet your quota and go to Tokyo.\nCalm down, Mr. Naito.","text":"vì anh muốn đạt được chỉ tiêu để có thể lên Tokyo.\nBình tĩnh nào, Naito.\n도쿄에 가고 싶기 때문에 이 계약을 진행하려고 하지 않습니까?\n나이토 씨, 조용히 하세요. 나이토 씨.\nYou're signing this contract so you can meet your quota and go to Tokyo.\nCalm down, Mr. Naito.","sourceUid":"merged-mrhy6ne6-212","sourceNo":408},{"id":198,"readerNo":199,"displayNo":410,"n":410,"type":"narration","vi":"Anh cũng vậy thôi.\nTôi xin lỗi.\n- Khoan đã. - Anh Naito.\nAnh Naito.\nXin chờ một chút.","ko":"당신도 똑같지 않습니까?\n고객님, 죄송합니다.\n아니요, 아니요, 나이토 씨, 나이토 씨, 나이토 씨.\n나이토씨\n앉으세요","en":"You're the same as him.\nI'm sorry.\n- Hey, look... - Mr. Naito.\n- Mr. Naito. - What happened, Mr. Naito?\nAnh Naito.\nMr. Naito. Please wait a moment.","text":"Anh cũng vậy thôi.\nTôi xin lỗi.\n- Khoan đã. - Anh Naito.\nAnh Naito.\nXin chờ một chút.\n당신도 똑같지 않습니까?\n고객님, 죄송합니다.\n아니요, 아니요, 나이토 씨, 나이토 씨, 나이토 씨.\n나이토씨\n앉으세요\nYou're the same as him.\nI'm sorry.\n- Hey, look... - Mr. Naito.\n- Mr. Naito. - What happened, Mr. Naito?\nAnh Naito.\nMr. Naito. Please wait a moment.","sourceUid":"merged-mrhy9ymz-213","sourceNo":410},{"id":199,"readerNo":200,"displayNo":421,"n":421,"type":"narration","vi":"Vì chúng tôi thay đổi số lượng đặt hàng nên anh không tin tưởng chúng tôi?\nNếu chúng tôi định lừa gạt Shimizu,\nchúng tôi đã có thể đặt mua truyền động từ các công ty sản xuất xe đạp khác rồi.","ko":"주문 수량을 변경하는 것 때문에\n실례하지 못하겠다는 겁니까?\n저희가 시미즈를\n속이려고 했다면 다른 사이클 회사에서\n기여를 재구매했어도 됐을 겁니다","en":"Are you unable to trust us because of the quantity change?\nIf we wanted to deceive Shimizu,\nwe could've bought the gears from other bike companies.","text":"Vì chúng tôi thay đổi số lượng đặt hàng nên anh không tin tưởng chúng tôi?\nNếu chúng tôi định lừa gạt Shimizu,\nchúng tôi đã có thể đặt mua truyền động từ các công ty sản xuất xe đạp khác rồi.\n주문 수량을 변경하는 것 때문에\n실례하지 못하겠다는 겁니까?\n저희가 시미즈를\n속이려고 했다면 다른 사이클 회사에서\n기여를 재구매했어도 됐을 겁니다\nAre you unable to trust us because of the quantity change?\nIf we wanted to deceive Shimizu,\nwe could've bought the gears from other bike companies.","sourceUid":"merged-mrhyckni-215","sourceNo":421},{"id":200,"readerNo":201,"displayNo":422,"n":422,"type":"narration","vi":"Như chúng tôi đã nói,\nngành công nghiệp xe đạp ở Hàn Quốc đang gặp khó khăn.\nDù sao thì,","ko":"말씀드렸다시피\n한국의 자전거 산업은 현재\n부침을 겪고 있으니까요\n아, 이런식으로","en":"As I've mentioned already, the bicycle industry in Korea is struggling.\nWell...","text":"Như chúng tôi đã nói,\nngành công nghiệp xe đạp ở Hàn Quốc đang gặp khó khăn.\nDù sao thì,\n말씀드렸다시피\n한국의 자전거 산업은 현재\n부침을 겪고 있으니까요\n아, 이런식으로\nAs I've mentioned already, the bicycle industry in Korea is struggling.\nWell...","sourceUid":"merged-mrhyf28h-216","sourceNo":422},{"id":201,"readerNo":202,"displayNo":426,"n":426,"type":"narration","vi":"nếu đã thay đổi như thế này, chẳng phải có thể lại thay đổi nữa sao?\nMột hợp đồng như vậy thì không có ý nghĩa gì cả.\nAnh ấy nói nếu có thể thay đổi như này, việc ký lại hợp đồng không còn ý nghĩa.","ko":"계약을 변경하는 것은\nそういう契約は意味がないんですよ。","en":"if you're changing it like this, can't it change again later?\nThere's no point in such a contract.\nIf it's this changeable, there's no point in redoing the contract.","text":"nếu đã thay đổi như thế này, chẳng phải có thể lại thay đổi nữa sao?\nMột hợp đồng như vậy thì không có ý nghĩa gì cả.\nAnh ấy nói nếu có thể thay đổi như này, việc ký lại hợp đồng không còn ý nghĩa.\n계약을 변경하는 것은\nそういう契約は意味がないんですよ。\nif you're changing it like this, can't it change again later?\nThere's no point in such a contract.\nIf it's this changeable, there's no point in redoing the contract.","sourceUid":"merged-mrhyg1h1-217","sourceNo":426},{"id":202,"readerNo":203,"displayNo":428,"n":428,"type":"narration","vi":"Chính vì vậy mà hôm nay chúng ta mới ký hợp đồng.","ko":"그렇기 때문에 오늘 계약서를 쓰는 겁니다.","en":"That's why we are writing up a contract today.","text":"Chính vì vậy mà hôm nay chúng ta mới ký hợp đồng.\n그렇기 때문에 오늘 계약서를 쓰는 겁니다.\nThat's why we are writing up a contract today.","sourceUid":"merged-mrhyh8gd-218","sourceNo":428},{"id":203,"readerNo":204,"displayNo":429,"n":429,"type":"narration","vi":"Hợp đồng không chỉ là lời hứa phải giữ\nmà còn quy định rõ ràng các điều khoản phạt nếu vi phạm.","ko":"계약은 지켜야 할 약속이기도 하지만 어겼을 시에 물어야 할 페널티도 정하는 거니까요.","en":"A contract is a promise we need to keep but also decides the penalty for breaching it.","text":"Hợp đồng không chỉ là lời hứa phải giữ\nmà còn quy định rõ ràng các điều khoản phạt nếu vi phạm.\n계약은 지켜야 할 약속이기도 하지만 어겼을 시에 물어야 할 페널티도 정하는 거니까요.\nA contract is a promise we need to keep but also decides the penalty for breaching it.","sourceUid":"merged-mrhyiuvq-219","sourceNo":429},{"id":204,"readerNo":205,"displayNo":430,"n":430,"type":"narration","vi":"Tôi không biết những điều đó.\nNhưng tôi biết rằng một công ty đã từng thất hứa\nthì sẽ lại thất hứa lần nữa.\n\nĐiều đó thì tôi biết rất rõ.\nTôi xin phép.\nAnh ấy nói một khi đã thất hứa thì có thể sẽ thất hứa lần nữa.\nTôi xin lỗi.","ko":"一度約束を破った会社というのはまた約束を破ります私はそれをわかってますから失礼します\n申し訳ございません。","en":"I don't know about any of that.\nBut I know that a company that broke a promise once will break it again.\nI know that very well. If you'll excuse me.\nHe says if you break a promise once, you can break it again.\nI'm so sorry.\nMy apologies.","text":"Tôi không biết những điều đó.\nNhưng tôi biết rằng một công ty đã từng thất hứa\nthì sẽ lại thất hứa lần nữa.\n\nĐiều đó thì tôi biết rất rõ.\nTôi xin phép.\nAnh ấy nói một khi đã thất hứa thì có thể sẽ thất hứa lần nữa.\nTôi xin lỗi.\n一度約束を破った会社というのはまた約束を破ります私はそれをわかってますから失礼します\n申し訳ございません。\nI don't know about any of that.\nBut I know that a company that broke a promise once will break it again.\nI know that very well. If you'll excuse me.\nHe says if you break a promise once, you can break it again.\nI'm so sorry.\nMy apologies.","sourceUid":"merged-mrhyk8dh-220","sourceNo":430},{"id":205,"readerNo":206,"displayNo":433,"n":433,"type":"narration","vi":"Tôi thành thật xin lỗi.\nHợp đồng thay đổi số lượng cung ứng này\ncần có chữ ký của giám đốc nhà máy sản xuất\nđể quản lý và đảm bảo vấn đề nguồn cung.","ko":"아폴로디스, 컨트럭트의 양도를 바꿔주기 위해서입니다.\n프로덕션 매니저의 도입이\n매니저 사업에 관한 것에 대한 요구가 필요합니다.","en":"For changing the quantity on the contract, the production manager's approval is required from the perspective of managing supply issues.","text":"Tôi thành thật xin lỗi.\nHợp đồng thay đổi số lượng cung ứng này\ncần có chữ ký của giám đốc nhà máy sản xuất\nđể quản lý và đảm bảo vấn đề nguồn cung.\n아폴로디스, 컨트럭트의 양도를 바꿔주기 위해서입니다.\n프로덕션 매니저의 도입이\n매니저 사업에 관한 것에 대한 요구가 필요합니다.\nFor changing the quantity on the contract, the production manager's approval is required from the perspective of managing supply issues.","sourceUid":"merged-mrhyo8ly-223","sourceNo":433},{"id":206,"readerNo":207,"displayNo":435,"n":435,"type":"narration","vi":"Tôi rất xin lỗi vì mọi chuyện lại thành ra như thế này.\nTôi nghĩ có lý do nào đó khiến anh Naito hành động như vậy.","ko":"매우 심각한 일이 이렇게 되었습니다. 나이토는 그런 행동을 하는 이유가 있어야 합니다.","en":"I'm very sorry things have turned out this way.\nThere must be a reason Naito is taking such a stance.","text":"Tôi rất xin lỗi vì mọi chuyện lại thành ra như thế này.\nTôi nghĩ có lý do nào đó khiến anh Naito hành động như vậy.\n매우 심각한 일이 이렇게 되었습니다. 나이토는 그런 행동을 하는 이유가 있어야 합니다.\nI'm very sorry things have turned out this way.\nThere must be a reason Naito is taking such a stance.","sourceUid":"merged-mrhyowq2-224","sourceNo":435},{"id":207,"readerNo":208,"displayNo":437,"n":437,"type":"narration","vi":"Tôi cũng không rõ lý do chính xác...\nNhưng anh Naito đến từ gia đình là nghệ nhân làm phụ tùng xe đạp lâu đời.","ko":"제가 말할 수 있는 이유는\n그 이유는, 그녀는 크라스맨의 세대에서 온 것이라고 볼 수 있어야 합니다.","en":"I-I can't say what the reason is.\nBut it should be noted that\nhe comes from generations of craftsmen.","text":"Tôi cũng không rõ lý do chính xác...\nNhưng anh Naito đến từ gia đình là nghệ nhân làm phụ tùng xe đạp lâu đời.\n제가 말할 수 있는 이유는\n그 이유는, 그녀는 크라스맨의 세대에서 온 것이라고 볼 수 있어야 합니다.\nI-I can't say what the reason is.\nBut it should be noted that\nhe comes from generations of craftsmen.","sourceUid":"merged-mrhyqr4e-226","sourceNo":437},{"id":208,"readerNo":209,"displayNo":439,"n":439,"type":"narration","vi":"Vì vậy anh ấy rất bảo thủ,\nvà không có nhiều tư duy kinh doanh.","ko":"그 이유는 그녀는 매우 강력한 기술자입니다.","en":"That's why he's very strong-willed and lacks business acumen.","text":"Vì vậy anh ấy rất bảo thủ,\nvà không có nhiều tư duy kinh doanh.\n그 이유는 그녀는 매우 강력한 기술자입니다.\nThat's why he's very strong-willed and lacks business acumen.","sourceUid":"merged-mrhyrpda-227","sourceNo":439},{"id":209,"readerNo":210,"displayNo":440,"n":440,"type":"narration","vi":"Bố mẹ của anh Naito cũng làm về bộ truyền động xe đạp sao?\nKhông phải bộ truyền động,","ko":"나이터의 부모님도 기술자였죠?\n아니요.","en":"Did Naito's parents also make gears?\nNot gears.","text":"Bố mẹ của anh Naito cũng làm về bộ truyền động xe đạp sao?\nKhông phải bộ truyền động,\n나이터의 부모님도 기술자였죠?\n아니요.\nDid Naito's parents also make gears?\nNot gears.","sourceUid":"merged-mrhyt0ns-228","sourceNo":440},{"id":210,"readerNo":211,"displayNo":442,"n":442,"type":"narration","vi":"nhưng bố của anh Naito cũng là một nghệ nhân,\nđặc biệt là cơ khí chính xác.","ko":"그녀의 아버지도 크라스맨이었습니다.\n특히, 기술자입니다.","en":"But his father was also a master craftsman.\nSpecifically, precision machining.","text":"nhưng bố của anh Naito cũng là một nghệ nhân,\nđặc biệt là cơ khí chính xác.\n그녀의 아버지도 크라스맨이었습니다.\n특히, 기술자입니다.\nBut his father was also a master craftsman.\nSpecifically, precision machining.","sourceUid":"merged-mrhytt15-229","sourceNo":442},{"id":211,"readerNo":212,"displayNo":444,"n":444,"type":"narration","vi":"Ông ấy còn tự mình điều hành nhà máy.\nBộ đồng phục mà anh Naito mặc\nVâng.\ncó lẽ là của công ty mà bố anh ấy điều hành.","ko":"그는 자신의 작품을 가지고 있었다.\n그는 그의 아버지의 회사의 옷을 입었을 것이다.\n네. 네.","en":"He even had his own factory.\nThe work clothes Mr. Naito was wearing were probably from his father's company.\nYes. Yes.","text":"Ông ấy còn tự mình điều hành nhà máy.\nBộ đồng phục mà anh Naito mặc\nVâng.\ncó lẽ là của công ty mà bố anh ấy điều hành.\n그는 자신의 작품을 가지고 있었다.\n그는 그의 아버지의 회사의 옷을 입었을 것이다.\n네. 네.\nHe even had his own factory.\nThe work clothes Mr. Naito was wearing were probably from his father's company.\nYes. Yes.","sourceUid":"merged-mrhyut7w-231","sourceNo":444},{"id":212,"readerNo":213,"displayNo":447,"n":447,"type":"narration","vi":"Đúng vậy.\nNhà máy đó hiện giờ là nhà máy của Shimizu.\nAnh Naito gần như là người thừa kế và tiếp tục điều hành nhà máy.\nTôi nghĩ Nhật Bản được duy trì là nhờ những nghệ nhân như vậy.","ko":"제트 팩토리 카레 시미스\nMr. Naito is continuing his family legacy, running the factory himself.\nI believe Japan is sustained by such craftsmanship.","en":"That... That factory is currently Shimizu's.\nMr. Naito is continuing his family legacy, running the factory himself.\nMr. Naito is continuing his family legacy\nby running the factory himself.\nI believe Japan is sustained by such craftsmanship.","text":"Đúng vậy.\nNhà máy đó hiện giờ là nhà máy của Shimizu.\nAnh Naito gần như là người thừa kế và tiếp tục điều hành nhà máy.\nTôi nghĩ Nhật Bản được duy trì là nhờ những nghệ nhân như vậy.\n제트 팩토리 카레 시미스\nMr. Naito is continuing his family legacy, running the factory himself.\nI believe Japan is sustained by such craftsmanship.\nThat... That factory is currently Shimizu's.\nMr. Naito is continuing his family legacy, running the factory himself.\nMr. Naito is continuing his family legacy\nby running the factory himself.\nI believe Japan is sustained by such craftsmanship.","sourceUid":"merged-mrhyw2fy-232","sourceNo":447},{"id":213,"readerNo":214,"displayNo":666,"n":666,"type":"narration","vi":"Bố!\nKen! Sao con lại đến đây?\nBố đã bảo đừng đến mà.","ko":"","en":"­[Shimiz] [Fleet Vehicles and Loading Vehicles Only]\nDad!\nKen, I told you not to come.\n- Are you done with school? - Yeah.\nHello, Sir.","text":"Bố!\nKen! Sao con lại đến đây?\nBố đã bảo đừng đến mà.\n­[Shimiz] [Fleet Vehicles and Loading Vehicles Only]\nDad!\nKen, I told you not to come.\n- Are you done with school? - Yeah.\nHello, Sir.","sourceUid":"merged-mrhyxwkf-233","sourceNo":666},{"id":214,"readerNo":215,"displayNo":451,"n":451,"type":"narration","vi":"Anh về rồi ạ.\nAnh ký hợp đồng rồi ạ?\nTừ từ rồi hãy ăn cơn.\nCon muốn ăn.\nCó chuyện gì ạ?\nDạo này đơn hàng bị hủy nhiều quá.\nTôi biết.\nKho của chúng ta đầy mất rồi.\nCứ làm tốt việc của mình đi.","ko":"何かあったんですか最近キャンセルになった在庫も多すぎます倉庫もギュギュですよ","en":"Did you sign the contract?\n- Did you have one this morning? - No, not yet.\nDid something happen?\nWe have too many canceled units these days.\nI already know that.\nOur warehouses are full too!\nWe just have to do our job well.\nI see...","text":"Anh về rồi ạ.\nAnh ký hợp đồng rồi ạ?\nTừ từ rồi hãy ăn cơn.\nCon muốn ăn.\nCó chuyện gì ạ?\nDạo này đơn hàng bị hủy nhiều quá.\nTôi biết.\nKho của chúng ta đầy mất rồi.\nCứ làm tốt việc của mình đi.\n何かあったんですか最近キャンセルになった在庫も多すぎます倉庫もギュギュですよ\nDid you sign the contract?\n- Did you have one this morning? - No, not yet.\nDid something happen?\nWe have too many canceled units these days.\nI already know that.\nOur warehouses are full too!\nWe just have to do our job well.\nI see...","sourceUid":"merged-mrhz2q3q-235","sourceNo":451},{"id":215,"readerNo":216,"displayNo":452,"n":452,"type":"narration","vi":"Tôi biết nhưng mà...\nXin chào.\nChúng tôi xin lỗi vì không thể tiếp tục hợp đồng được nữa.\nTôi rất xin lỗi.\nTôi xin lỗi.\nKhông đâu.","ko":"I don't think we can proceed with the contract any further.","en":"Hello.\nI don't think we can proceed with the contract any further.\nI'm very sorry.\nI'm sorry.\nNo.","text":"Tôi biết nhưng mà...\nXin chào.\nChúng tôi xin lỗi vì không thể tiếp tục hợp đồng được nữa.\nTôi rất xin lỗi.\nTôi xin lỗi.\nKhông đâu.\nI don't think we can proceed with the contract any further.\nHello.\nI don't think we can proceed with the contract any further.\nI'm very sorry.\nI'm sorry.\nNo.","sourceUid":"merged-mrhz3x2o-236","sourceNo":452},{"id":216,"readerNo":217,"displayNo":453,"n":453,"type":"narration","vi":"Tôi xin phép tiễn mọi người.","ko":"제가 폐연하겠습니다.","en":"I'll escort you back.","text":"Tôi xin phép tiễn mọi người.\n제가 폐연하겠습니다.\nI'll escort you back.","sourceUid":"merged-mrhz55mw-237","sourceNo":453},{"id":217,"readerNo":218,"displayNo":454,"n":454,"type":"narration","vi":"Cô Hirose.\nVâng?\nTôi muốn gặp anh Naito, có cách nào không?\nBình thường anh ấy đến nhà máy làm việc.\nLàm ơn đưa chúng tôi đến đây.\nNhà máy Shimizu phải không?\nÀ vâng. Ông có biết chỗ đó không?\nĐương nhiên là tôi biết. Chỗ đó tồn tại hơn 100 năm rồi.\nVậy sao?","ko":"히로세 씨, 나이투 씨를 뵙고 싶은데 방법이 없을까요?\nああそうですか。","en":"- Hirose. - Yes?\nI'd like to meet with Mr. Naito.\nIs there a way?\nHe usually heads to the factory for work.\nExcuse me, could you take us here?\nOh, Shimizu Factory?\nOh, yes. Do you know the place?\nOf course, I do.\nIt's been around for over 100 years.\nIs that so?","text":"Cô Hirose.\nVâng?\nTôi muốn gặp anh Naito, có cách nào không?\nBình thường anh ấy đến nhà máy làm việc.\nLàm ơn đưa chúng tôi đến đây.\nNhà máy Shimizu phải không?\nÀ vâng. Ông có biết chỗ đó không?\nĐương nhiên là tôi biết. Chỗ đó tồn tại hơn 100 năm rồi.\nVậy sao?\n히로세 씨, 나이투 씨를 뵙고 싶은데 방법이 없을까요?\nああそうですか。\n- Hirose. - Yes?\nI'd like to meet with Mr. Naito.\nIs there a way?\nHe usually heads to the factory for work.\nExcuse me, could you take us here?\nOh, Shimizu Factory?\nOh, yes. Do you know the place?\nOf course, I do.\nIt's been around for over 100 years.\nIs that so?","sourceUid":"merged-mrhz6owg-238","sourceNo":454},{"id":218,"readerNo":219,"displayNo":456,"n":456,"type":"narration","vi":"Nếu chúng ta muốn nhận lô hàng của Speed,\ncó nhất thiết phải có sự cho phép của Shimizu không?","ko":"우리가 스피드 물량을 대신 받을 때 꼭 심의실에 허락이 있어야 할까요?","en":"Will we absolutely need Shimizu's permission to receive Speed's inventory in their place?","text":"Nếu chúng ta muốn nhận lô hàng của Speed,\ncó nhất thiết phải có sự cho phép của Shimizu không?\n우리가 스피드 물량을 대신 받을 때 꼭 심의실에 허락이 있어야 할까요?\nWill we absolutely need Shimizu's permission to receive Speed's inventory in their place?","sourceUid":"merged-mrhz8xcm-239","sourceNo":456},{"id":219,"readerNo":220,"displayNo":457,"n":457,"type":"narration","vi":"Vâng. Điều khoản cấm bán lại khá nghiêm ngặt.","ko":"네. 재판매 금지 조항이 꽤 엄격하게 들어가 있더라고요.","en":"Yes, the contract contained a strict resale ban.","text":"Vâng. Điều khoản cấm bán lại khá nghiêm ngặt.\n네. 재판매 금지 조항이 꽤 엄격하게 들어가 있더라고요.\nYes, the contract contained a strict resale ban.","sourceUid":"merged-mrhz9vgt-240","sourceNo":457},{"id":220,"readerNo":221,"displayNo":458,"n":458,"type":"narration","vi":"Chúng ta không thể lùi lịch ký hợp đồng lại sao?","ko":"우리 물량 계약을 좀 늦출 수는 없을까요?","en":"Can we delay the supply contract?","text":"Chúng ta không thể lùi lịch ký hợp đồng lại sao?\n우리 물량 계약을 좀 늦출 수는 없을까요?\nCan we delay the supply contract?","sourceUid":"merged-mrhzaflq-241","sourceNo":458},{"id":221,"readerNo":222,"displayNo":459,"n":459,"type":"narration","vi":"Không được. Chúng ta đã có hợp đồng OEM rồi.","ko":"네. 오의향 계약이 잡혀 있어서요.","en":"No, we can't. We have an OEM contract scheduled.","text":"Không được. Chúng ta đã có hợp đồng OEM rồi.\n네. 오의향 계약이 잡혀 있어서요.\nNo, we can't. We have an OEM contract scheduled.","sourceUid":"merged-mrhzaukf-242","sourceNo":459},{"id":222,"readerNo":223,"displayNo":460,"n":460,"type":"narration","vi":"Xin chào.\nSao các vị lại đến đây?\nChúng tôi đến từ công ty Wind của Hàn Quốc.\nChúng tôi muốn gặp giám đốc nhà máy.\nÀ, các vị là những người định ký hợp đồng phải không?\nVâng.","ko":"こんにちはこちら様ですか我々は韓国のウィンドウという会社から来たものですが工場長にお会いできますかああ例の契約の件ですねはい\nはい。","en":"Hello.\nMay I have your name?\nWe are from the Korean company Wind.\nCould we meet the Factory Manager?\nYou're the ones trying to make a contract.\nYes.","text":"Xin chào.\nSao các vị lại đến đây?\nChúng tôi đến từ công ty Wind của Hàn Quốc.\nChúng tôi muốn gặp giám đốc nhà máy.\nÀ, các vị là những người định ký hợp đồng phải không?\nVâng.\nこんにちはこちら様ですか我々は韓国のウィンドウという会社から来たものですが工場長にお会いできますかああ例の契約の件ですねはい\nはい。\nHello.\nMay I have your name?\nWe are from the Korean company Wind.\nCould we meet the Factory Manager?\nYou're the ones trying to make a contract.\nYes.","sourceUid":"merged-mrhzbt2x-243","sourceNo":460},{"id":223,"readerNo":224,"displayNo":462,"n":462,"type":"narration","vi":"Anh Naito.\nCó mấy vị khách Hàn Quốc tìm anh.","ko":"韓国の会社の方たちが来られています。","en":"Mr. Naito. Mr. Naito. There are Korean people looking for you. Anh Naito.","text":"Anh Naito.\nCó mấy vị khách Hàn Quốc tìm anh.\n韓国の会社の方たちが来られています。\nMr. Naito. Mr. Naito. There are Korean people looking for you. Anh Naito.","sourceUid":"merged-mrhzf6dd-244","sourceNo":462},{"id":224,"readerNo":225,"displayNo":632,"n":632,"type":"dialogue","vi":"(Ôn cố tri tân)","ko":"","en":"[On Ko Chi Shin*] (T/N: Gain new insights through old experiences)","text":"(Ôn cố tri tân)\n[On Ko Chi Shin*] (T/N: Gain new insights through old experiences)","sourceUid":"merged-mrimijtm-1","sourceNo":632},{"id":225,"readerNo":226,"displayNo":463,"n":463,"type":"narration","vi":"Sao mọi người lại đến đây mà không hẹn trước?\nAnh ấy nói sao chúng ta sao đến mà không hẹn trước.\nTôi Xin lỗi. Tôi có vài điều muốn hỏi.\nTôi có vài điều muốn hỏi.\nTôi không muốn nói gì thêm nữa.\nMời mọi người về cho.\n\nAnh Naito.","ko":"いやあの話すことは何もありませんどうぞお行き取りくださいあの内藤さん","en":"How could you come without an appointment?\nHe's saying we came without an appointment.\nI'm sorry.\nI just had something to ask you.\nBut I don't want to speak to you anymore.\nPlease go back.\nM-Mr. Naito.\nAnh Naito.","text":"Sao mọi người lại đến đây mà không hẹn trước?\nAnh ấy nói sao chúng ta sao đến mà không hẹn trước.\nTôi Xin lỗi. Tôi có vài điều muốn hỏi.\nTôi có vài điều muốn hỏi.\nTôi không muốn nói gì thêm nữa.\nMời mọi người về cho.\n\nAnh Naito.\nいやあの話すことは何もありませんどうぞお行き取りくださいあの内藤さん\nHow could you come without an appointment?\nHe's saying we came without an appointment.\nI'm sorry.\nI just had something to ask you.\nBut I don't want to speak to you anymore.\nPlease go back.\nM-Mr. Naito.\nAnh Naito.","sourceUid":"merged-mrimjbib-2","sourceNo":463},{"id":226,"readerNo":227,"displayNo":464,"n":464,"type":"narration","vi":"Dễ thương quá!\nDù sao thì số lượng...\nCho tôi hỏi...\nhỏi anh ấy giùm tôi mai anh ấy có đi làm hay không?\nMai anh Naito có đi làm không ạ?\nMai anh ấy có đi làm.\nCảm ơn anh.\nAnh ấy nói ngày mai anh Naito có đi làm.","ko":"내일 혹시 출근하는지 좀 물어봐 줄 수 있어요? 나이토 씨는 내일까지 출근할 수 있을까요? 고조처는 매일 출근합니다. 그래요? 내일 출근하시면 됩니다.","en":"Cutie!\nOtherwise, the number of...\nSo...\nCould you ask if he's working tomorrow?\nIs Mr. Naito coming to work tomorrow?\nHe comes to work every day.\nI see.\nHe says he is coming to work tomorrow.","text":"Dễ thương quá!\nDù sao thì số lượng...\nCho tôi hỏi...\nhỏi anh ấy giùm tôi mai anh ấy có đi làm hay không?\nMai anh Naito có đi làm không ạ?\nMai anh ấy có đi làm.\nCảm ơn anh.\nAnh ấy nói ngày mai anh Naito có đi làm.\n내일 혹시 출근하는지 좀 물어봐 줄 수 있어요? 나이토 씨는 내일까지 출근할 수 있을까요? 고조처는 매일 출근합니다. 그래요? 내일 출근하시면 됩니다.\nCutie!\nOtherwise, the number of...\nSo...\nCould you ask if he's working tomorrow?\nIs Mr. Naito coming to work tomorrow?\nHe comes to work every day.\nI see.\nHe says he is coming to work tomorrow.","sourceUid":"merged-mriolm87-5","sourceNo":464},{"id":227,"readerNo":228,"displayNo":648,"n":648,"type":"narration","vi":"(Ôn cố tri tân)","ko":"","en":"[On Ko Chi Shin]","text":"(Ôn cố tri tân)\n[On Ko Chi Shin]","sourceUid":"merged-mriomuv1-6","sourceNo":648},{"id":228,"readerNo":229,"displayNo":469,"n":469,"type":"narration","vi":"Trong hợp đồng có tên của giám đốc Park đúng không?\nCó tên và chữ ký của giám đốc Park.","ko":"계약서에는 박래경 대표님 이름도 있었죠?\n네. 박래경 대표님 성함이랑 사인이 있었습니다.","en":"CEO Park's name was also on the contract, right?\nYes. It had both CEO Park's name and signature.","text":"Trong hợp đồng có tên của giám đốc Park đúng không?\nCó tên và chữ ký của giám đốc Park.\n계약서에는 박래경 대표님 이름도 있었죠?\n네. 박래경 대표님 성함이랑 사인이 있었습니다.\nCEO Park's name was also on the contract, right?\nYes. It had both CEO Park's name and signature.","sourceUid":"merged-mrioucbt-8","sourceNo":469},{"id":229,"readerNo":230,"displayNo":471,"n":471,"type":"narration","vi":"Ở trụ sở chính anh ấy hỏi chúng ta Wind là công ty sản xuất xe đạp,\ntrước khi ký hợp đồng nhỉ?\nVì vậy tôi đã nói đúng vậy và giải thích rằng chúng tôi cũng sản xuất cung tên.","ko":"본사에서 사이클 만드는 회사가 맞냐고 물어봤었잖아요. 사인하기 전에.\n네. 그래서 맞다. 양궁도 만든다고 설명드렸습니다.","en":"You know how he asked if Wind was a bicycle company?\n- Before signing? - Yes. So, I said yes\nand explained that it also makes archery bows.","text":"Ở trụ sở chính anh ấy hỏi chúng ta Wind là công ty sản xuất xe đạp,\ntrước khi ký hợp đồng nhỉ?\nVì vậy tôi đã nói đúng vậy và giải thích rằng chúng tôi cũng sản xuất cung tên.\n본사에서 사이클 만드는 회사가 맞냐고 물어봤었잖아요. 사인하기 전에.\n네. 그래서 맞다. 양궁도 만든다고 설명드렸습니다.\nYou know how he asked if Wind was a bicycle company?\n- Before signing? - Yes. So, I said yes\nand explained that it also makes archery bows.","sourceUid":"merged-mriovp4n-9","sourceNo":471},{"id":230,"readerNo":231,"displayNo":473,"n":473,"type":"narration","vi":"Sao rồi? Hợp đồng ký kết ổn thỏa chứ?\nTôi xin lỗi.\nChúng tôi đã không thành công.","ko":"어떻게 기억이 잘 됐을까요?\n죄송합니다. 못했습니다.","en":"So did the contract go well?\nI'm sorry.\nWe failed to do so.","text":"Sao rồi? Hợp đồng ký kết ổn thỏa chứ?\nTôi xin lỗi.\nChúng tôi đã không thành công.\n어떻게 기억이 잘 됐을까요?\n죄송합니다. 못했습니다.\nSo did the contract go well?\nI'm sorry.\nWe failed to do so.","sourceUid":"merged-mriox1wb-10","sourceNo":473},{"id":231,"readerNo":232,"displayNo":475,"n":475,"type":"narration","vi":"Sao lại thế?\nGiám đốc nhà máy là nghệ nhân kim khí, anh ấy đang phản đối.","ko":"어쩌다가?\n공장장님이 금속세공 장인이신데 반대를 하고 계셨어요.","en":"H-How did that happen?\nThe factory manager is a metalcraft artisan and is opposing it.","text":"Sao lại thế?\nGiám đốc nhà máy là nghệ nhân kim khí, anh ấy đang phản đối.\n어쩌다가?\n공장장님이 금속세공 장인이신데 반대를 하고 계셨어요.\nH-How did that happen?\nThe factory manager is a metalcraft artisan and is opposing it.","sourceUid":"merged-mrioyg3c-11","sourceNo":475},{"id":232,"readerNo":233,"displayNo":477,"n":477,"type":"narration","vi":"Ở Nhật Bản chuyện đó có thể xảy ra.\nBên đó, lòng tự trọng của các nghệ nhân rất cao.","ko":"아, 일부는 그럴 수 있죠.\n거기가 장인들 프라이드가 상당하거든요.","en":"That's understandable in Japan.\nThe artisans over there have a lot of pride.","text":"Ở Nhật Bản chuyện đó có thể xảy ra.\nBên đó, lòng tự trọng của các nghệ nhân rất cao.\n아, 일부는 그럴 수 있죠.\n거기가 장인들 프라이드가 상당하거든요.\nThat's understandable in Japan.\nThe artisans over there have a lot of pride.","sourceUid":"merged-mriozhkr-12","sourceNo":477},{"id":233,"readerNo":234,"displayNo":479,"n":479,"type":"narration","vi":"Hồi tôi mua Daichi cũng gặp rắc rối vì chuyện đó.","ko":"제가 다이치 살 때도 그것 때문에 해먹었습니다.","en":"I went through a lot because of that when I was acquiring Daichi.","text":"Hồi tôi mua Daichi cũng gặp rắc rối vì chuyện đó.\n제가 다이치 살 때도 그것 때문에 해먹었습니다.\nI went through a lot because of that when I was acquiring Daichi.","sourceUid":"merged-mrip0is8-13","sourceNo":479},{"id":234,"readerNo":235,"displayNo":480,"n":480,"type":"narration","vi":"Chắc hẳn là vậy rồi.\nVâng.","ko":"네, 그러셨겠네요.\n네","en":"Yes, that makes sense.\nYes.","text":"Chắc hẳn là vậy rồi.\nVâng.\n네, 그러셨겠네요.\n네\nYes, that makes sense.\nYes.","sourceUid":"merged-mrip177u-14","sourceNo":480},{"id":235,"readerNo":236,"displayNo":482,"n":482,"type":"narration","vi":"Đến đầu những năm 90, Daichi là số một về cung tên.","ko":"90년대 초까지 양궁론은 다이치가 1등이었죠","en":"Until the early 1990s, Daichi was number one when it came to archery bows.","text":"Đến đầu những năm 90, Daichi là số một về cung tên.\n90년대 초까지 양궁론은 다이치가 1등이었죠\nUntil the early 1990s, Daichi was number one when it came to archery bows.","sourceUid":"merged-mrip1sv9-15","sourceNo":482},{"id":236,"readerNo":237,"displayNo":483,"n":483,"type":"narration","vi":"Mà thực tế, thị phần cung tên dành cho vận động viên đã thuộc về chúng ta.","ko":"근데 선수들 사이에서는 이미 희장후리한테 뺏기고 있었어요","en":"But they were already losing the market to us among the athletes.","text":"Mà thực tế, thị phần cung tên dành cho vận động viên đã thuộc về chúng ta.\n근데 선수들 사이에서는 이미 희장후리한테 뺏기고 있었어요\nBut they were already losing the market to us among the athletes.","sourceUid":"merged-mrip2cce-16","sourceNo":483},{"id":237,"readerNo":238,"displayNo":484,"n":484,"type":"narration","vi":"Cuối cùng, tình hình kinh doanh của Daichi xấu đi\nvà họ phải bán công ty.","ko":"결국은 다이치 상황이 안 좋아져서 회사를 내놓은 거고요","en":"In the end, Daichi's situation got bad and had to sell the company.","text":"Cuối cùng, tình hình kinh doanh của Daichi xấu đi\nvà họ phải bán công ty.\n결국은 다이치 상황이 안 좋아져서 회사를 내놓은 거고요\nIn the end, Daichi's situation got bad and had to sell the company.","sourceUid":"merged-mrip4h5y-18","sourceNo":484},{"id":238,"readerNo":239,"displayNo":485,"n":485,"type":"narration","vi":"Nên giám đốc đã mua lại công ty đó.","ko":"그래서 대표님이 인수하신 거군요","en":"And that's why you acquired it, CEO.","text":"Nên giám đốc đã mua lại công ty đó.\n그래서 대표님이 인수하신 거군요\nAnd that's why you acquired it, CEO.","sourceUid":"merged-mrip4wee-19","sourceNo":485},{"id":239,"readerNo":240,"displayNo":486,"n":486,"type":"narration","vi":"Nhưng thực ra, tôi mua Daichi không phải vì cần công nghệ của họ.","ko":"저도 다이치 기술이 필요해서 산 건 아니었습니다","en":"I didn't buy it because I needed Daichi's technique.","text":"Nhưng thực ra, tôi mua Daichi không phải vì cần công nghệ của họ.\n저도 다이치 기술이 필요해서 산 건 아니었습니다\nI didn't buy it because I needed Daichi's technique.","sourceUid":"merged-mrip5aj0-20","sourceNo":486},{"id":240,"readerNo":241,"displayNo":487,"n":487,"type":"narration","vi":"Thật ra, lúc đó Wind\nđã vượt trội hơn về công nghệ rồi.","ko":"그때 이미 기술로는 저희가 앞서고 있었거든요","en":"We were already ahead of Daichi\nin terms of technique by then.","text":"Thật ra, lúc đó Wind\nđã vượt trội hơn về công nghệ rồi.\n그때 이미 기술로는 저희가 앞서고 있었거든요\nWe were already ahead of Daichi\nin terms of technique by then.","sourceUid":"merged-mrip65a6-21","sourceNo":487},{"id":241,"readerNo":242,"displayNo":488,"n":488,"type":"narration","vi":"Vậy sao giám đốc lại mua?","ko":"그럼 왜 사셨습니까?","en":"Then why did you acquire it?","text":"Vậy sao giám đốc lại mua?\n그럼 왜 사셨습니까?\nThen why did you acquire it?","sourceUid":"merged-mrip6v7i-22","sourceNo":488},{"id":242,"readerNo":243,"displayNo":489,"n":489,"type":"narration","vi":"Dù sao thì Daichi cũng có danh tiếng nhất định.\nNếu để công ty khác mua lại,\nhọ có thể nhanh chóng đuổi kịp Wind nhờ danh tiếng đó.","ko":"아무래도 다이치가 가지고 있던 명성이 있었으니까요. 다른 데서 인수를 하게 되면 그 명성으로 금방 윈드를 따라잡을 수도 있다고 봤습니다.","en":"Daichi had built a strong reputation.\nIf another company acquired it,\nI thought they could quickly catch up\nto Wind with that reputation.","text":"Dù sao thì Daichi cũng có danh tiếng nhất định.\nNếu để công ty khác mua lại,\nhọ có thể nhanh chóng đuổi kịp Wind nhờ danh tiếng đó.\n아무래도 다이치가 가지고 있던 명성이 있었으니까요. 다른 데서 인수를 하게 되면 그 명성으로 금방 윈드를 따라잡을 수도 있다고 봤습니다.\nDaichi had built a strong reputation.\nIf another company acquired it,\nI thought they could quickly catch up\nto Wind with that reputation.","sourceUid":"merged-mrip7hls-23","sourceNo":489},{"id":243,"readerNo":244,"displayNo":490,"n":490,"type":"narration","vi":"Vậy ra giám đốc mua để phòng thủ.","ko":"방어차원에서 인수를 하셨다는 거군요?","en":"So you acquired it as a defensive move.","text":"Vậy ra giám đốc mua để phòng thủ.\n방어차원에서 인수를 하셨다는 거군요?\nSo you acquired it as a defensive move.","sourceUid":"merged-mrip8kj6-24","sourceNo":490},{"id":244,"readerNo":245,"displayNo":491,"n":491,"type":"narration","vi":"Đúng vậy.\nNhưng lúc đó,\nDaichi đã đưa ra cho tôi một điều kiện nếu muốn mua lại.\nLà tôi phải tạo ra một cây cung tốt hơn cả Daichi.","ko":"네. 근데 그때 다이치가 저에게 인수 조건으로 그걸 내걸더라고요. 다이치보다 좋은 양궁을 만들어 달라고요.","en":"Yes.\nBut...\nDaichi set this as the condition\nfor the acquisition at the time.\n\"Please make a better bow than Daichi.\"","text":"Đúng vậy.\nNhưng lúc đó,\nDaichi đã đưa ra cho tôi một điều kiện nếu muốn mua lại.\nLà tôi phải tạo ra một cây cung tốt hơn cả Daichi.\n네. 근데 그때 다이치가 저에게 인수 조건으로 그걸 내걸더라고요. 다이치보다 좋은 양궁을 만들어 달라고요.\nYes.\nBut...\nDaichi set this as the condition\nfor the acquisition at the time.\n\"Please make a better bow than Daichi.\"","sourceUid":"merged-mrip9clu-25","sourceNo":491},{"id":245,"readerNo":246,"displayNo":492,"n":492,"type":"narration","vi":"Lúc đầu tôi hơi bất ngờ.\nBan đầu tôi nghĩ họ đang khoe khoang.","ko":"처음엔 좀 당혹스러웠어요. 처음에 허셀부리나 보다 했죠.","en":"At first, I was a bit taken aback.\nAt first, I thought it was just bravado.","text":"Lúc đầu tôi hơi bất ngờ.\nBan đầu tôi nghĩ họ đang khoe khoang.\n처음엔 좀 당혹스러웠어요. 처음에 허셀부리나 보다 했죠.\nAt first, I was a bit taken aback.\nAt first, I thought it was just bravado.","sourceUid":"merged-mripmxs5-26","sourceNo":492},{"id":246,"readerNo":247,"displayNo":493,"n":493,"type":"narration","vi":"Giờ nghĩ lại thì thấy,\ncó lẽ đó là sự chân thành của họ.","ko":"근데 지금 생각해보면 진심이 아니었을까 싶어요.","en":"I think he truly meant it.\nBut looking back now,","text":"Giờ nghĩ lại thì thấy,\ncó lẽ đó là sự chân thành của họ.\n근데 지금 생각해보면 진심이 아니었을까 싶어요.\nI think he truly meant it.\nBut looking back now,","sourceUid":"merged-mriptzel-30","sourceNo":493},{"id":247,"readerNo":248,"displayNo":686,"n":686,"type":"narration","vi":"Giám đốc, tôi có thể gặp anh một lát được không?\nTôi sẽ đến chỗ anh ngay đây.","ko":"","en":"CEO, could I see you for a moment?\nI'll come to you right now.","text":"Giám đốc, tôi có thể gặp anh một lát được không?\nTôi sẽ đến chỗ anh ngay đây.\nCEO, could I see you for a moment?\nI'll come to you right now.","sourceUid":"merged-mripufxx-31","sourceNo":686},{"id":248,"readerNo":249,"displayNo":494,"n":494,"type":"narration","vi":"Có chuyện gì vậy?","ko":"무슨 일로 그러시는지?","en":"What is this about?","text":"Có chuyện gì vậy?\n무슨 일로 그러시는지?\nWhat is this about?","sourceUid":"merged-mriu6gsl-32","sourceNo":494},{"id":249,"readerNo":250,"displayNo":495,"n":495,"type":"narration","vi":"Bức ảnh Daichi treo ở văn phòng Wind ấy.","ko":"윈드 사무실에 걸려있던 다이치 사진이요","en":"The photo of Daichi hanging in Wind's office...","text":"Bức ảnh Daichi treo ở văn phòng Wind ấy.\n윈드 사무실에 걸려있던 다이치 사진이요\nThe photo of Daichi hanging in Wind's office...","sourceUid":"merged-mriu7n0n-33","sourceNo":495},{"id":250,"readerNo":251,"displayNo":496,"n":496,"type":"narration","vi":"À, bức ảnh chụp lúc thu mua Daichi?","ko":"아, 그 다이치 인수할 때 찍은 거요?","en":"The one taken when I acquired Daichi?","text":"À, bức ảnh chụp lúc thu mua Daichi?\n아, 그 다이치 인수할 때 찍은 거요?\nThe one taken when I acquired Daichi?","sourceUid":"merged-mriu86nm-34","sourceNo":496},{"id":251,"readerNo":252,"displayNo":497,"n":497,"type":"narration","vi":"Vâng, có phải người nghệ nhân trong ảnh đã vẽ bản thiết kế đó không?","ko":"네, 그 사진 속에 장인께서 그 설계도를 그리신 거죠?","en":"Yes. The artisan in that photo\ndrew that blueprint, right?","text":"Vâng, có phải người nghệ nhân trong ảnh đã vẽ bản thiết kế đó không?\n네, 그 사진 속에 장인께서 그 설계도를 그리신 거죠?\nYes. The artisan in that photo\ndrew that blueprint, right?","sourceUid":"merged-mriuahx2-35","sourceNo":497},{"id":252,"readerNo":253,"displayNo":498,"n":498,"type":"narration","vi":"Vâng.\nVì vậy tôi đã tặng ông ấy bức thư pháp.\nÔn cố tri tân.","ko":"예, 그래서 저도 액자로 선물로 드렸던 거고요\n온고지신","en":"Yes.\nThat's why I also gifted him the framed calligraphy.\n\"On Ko Chi Shin.\"","text":"Vâng.\nVì vậy tôi đã tặng ông ấy bức thư pháp.\nÔn cố tri tân.\n예, 그래서 저도 액자로 선물로 드렸던 거고요\n온고지신\nYes.\nThat's why I also gifted him the framed calligraphy.\n\"On Ko Chi Shin.\"","sourceUid":"merged-mriuc1cp-37","sourceNo":498},{"id":253,"readerNo":254,"displayNo":500,"n":500,"type":"narration","vi":"Cậu vẫn nhớ nhỉ?\nChính tay giám đốc đã viết, đúng không?","ko":"오, 기억하시네\n직접 쓰셨다고 했죠?","en":"Oh, you remember it.\nYou said you wrote it yourself, right?","text":"Cậu vẫn nhớ nhỉ?\nChính tay giám đốc đã viết, đúng không?\n오, 기억하시네\n직접 쓰셨다고 했죠?\nOh, you remember it.\nYou said you wrote it yourself, right?","sourceUid":"merged-mriucg2n-38","sourceNo":500},{"id":254,"readerNo":255,"displayNo":502,"n":502,"type":"narration","vi":"Nghệ nhân ấy đã yêu cầu tôi viết.\nCậu bé trong ảnh là con trai của nghệ nhân ấy, phải không?\nĐúng vậy.","ko":"여기 장인께서 요청을 하셨거든요\n사진 속의 아이가 장인의 아들인 거죠?\n그렇죠","en":"The artisan requested it. The boy in the photo is the artisan's son, right? He is.","text":"Nghệ nhân ấy đã yêu cầu tôi viết.\nCậu bé trong ảnh là con trai của nghệ nhân ấy, phải không?\nĐúng vậy.\n여기 장인께서 요청을 하셨거든요\n사진 속의 아이가 장인의 아들인 거죠?\n그렇죠\nThe artisan requested it. The boy in the photo is the artisan's son, right? He is.","sourceUid":"merged-mriue1d4-41","sourceNo":502},{"id":255,"readerNo":256,"displayNo":505,"n":505,"type":"narration","vi":"Giám đốc còn nhớ tên cậu bé ấy không?\nTôi không nhớ tên con trai ông ấy.","ko":"이름 기억나십니까?\n아들 이름은 기억이 안 나고요","en":"Do you remember his name? I don't remember the son's name.","text":"Giám đốc còn nhớ tên cậu bé ấy không?\nTôi không nhớ tên con trai ông ấy.\n이름 기억나십니까?\n아들 이름은 기억이 안 나고요\nDo you remember his name? I don't remember the son's name.","sourceUid":"merged-mriued0u-42","sourceNo":505},{"id":256,"readerNo":257,"displayNo":507,"n":507,"type":"narration","vi":"Tên của nghệ nhân đó là Daichi Naito.\nRa là vậy.","ko":"장인 선생 이름이 나이토 다이치였습니다\n그렇군요","en":"But the name of the artisan was...\nDaichi Naito.\nI see.","text":"Tên của nghệ nhân đó là Daichi Naito.\nRa là vậy.\n장인 선생 이름이 나이토 다이치였습니다\n그렇군요\nBut the name of the artisan was...\nDaichi Naito.\nI see.","sourceUid":"merged-mriufu2o-44","sourceNo":507},{"id":257,"readerNo":258,"displayNo":509,"n":509,"type":"narration","vi":"Giám đốc.\nTôi nghĩ tôi cần bức ảnh đó.\nSao cơ?","ko":"대표님 그 사진이 필요할 것 같습니다\n네?","en":"CEO.\nI think we'll need that photo.\nPardon?","text":"Giám đốc.\nTôi nghĩ tôi cần bức ảnh đó.\nSao cơ?\n대표님 그 사진이 필요할 것 같습니다\n네?\nCEO.\nI think we'll need that photo.\nPardon?","sourceUid":"merged-mriuh30w-46","sourceNo":509},{"id":258,"readerNo":259,"displayNo":511,"n":511,"type":"narration","vi":"Cậu cần cái này sao? Vâng. Cảm ơn giám đốc.","ko":"이게 필요하시다고요?","en":"You need this?\nYes.\nThank you.","text":"Cậu cần cái này sao? Vâng. Cảm ơn giám đốc.\n이게 필요하시다고요?\nYou need this?\nYes.\nThank you.","sourceUid":"merged-mriuhiyn-47","sourceNo":511},{"id":259,"readerNo":260,"displayNo":512,"n":512,"type":"narration","vi":"Ngày nghỉ mà anh vẫn đi làm. Anh thật siêng năng quá đi!\nMấy người đi giùm được không?\nAnh ấy có điều muốn nói với anh.\nAnh có thể đợi một lúc, được không?\nVậy anh ta phải đúng giờ hẹn chứ?","ko":"すごいですいいかげん帰ってもらえませんかどうしてもお話したいことがあります少しだけお待ちいただけないでしょうかいやずっとここにいられても困るんですよね","en":"You work on your day off, too. That's amazing.\nCan you please leave already?\nThere's something that he needs to tell you.\nCould you please wait a moment?\nWe'll be in trouble if you keep staying here.","text":"Ngày nghỉ mà anh vẫn đi làm. Anh thật siêng năng quá đi!\nMấy người đi giùm được không?\nAnh ấy có điều muốn nói với anh.\nAnh có thể đợi một lúc, được không?\nVậy anh ta phải đúng giờ hẹn chứ?\nすごいですいいかげん帰ってもらえませんかどうしてもお話したいことがあります少しだけお待ちいただけないでしょうかいやずっとここにいられても困るんですよね\nYou work on your day off, too. That's amazing.\nCan you please leave already?\nThere's something that he needs to tell you.\nCould you please wait a moment?\nWe'll be in trouble if you keep staying here.","sourceUid":"merged-mriuk528-49","sourceNo":512},{"id":260,"readerNo":261,"displayNo":513,"n":513,"type":"narration","vi":"Mấy người định ở lại đến bao giờ?\nMong anh thông cảm.\n\nTôi xin lỗi vì đã đến muộn.","ko":"예수님의 이름으로 기도합니다.\nいつまでいるんですか?\n待たせてすみません。","en":"How much longer are you going to stay here?\nPlease.\nI'm sorry to have kept you waiting.","text":"Mấy người định ở lại đến bao giờ?\nMong anh thông cảm.\n\nTôi xin lỗi vì đã đến muộn.\n예수님의 이름으로 기도합니다.\nいつまでいるんですか?\n待たせてすみません。\nHow much longer are you going to stay here?\nPlease.\nI'm sorry to have kept you waiting.","sourceUid":"merged-mrium1zk-50","sourceNo":513},{"id":261,"readerNo":262,"displayNo":516,"n":516,"type":"narration","vi":"Không sao. Anh muốn nói gì?\nTôi muốn xác nhận một điều trước.","ko":"わかりました話って何ですか?\n先ず確認したいことがあります。","en":"Okay. What do you want to tell me?\nThere's something I'd like to confirm first.","text":"Không sao. Anh muốn nói gì?\nTôi muốn xác nhận một điều trước.\nわかりました話って何ですか?\n先ず確認したいことがあります。\nOkay. What do you want to tell me?\nThere's something I'd like to confirm first.","sourceUid":"merged-mriuou5k-53","sourceNo":516},{"id":262,"readerNo":263,"displayNo":518,"n":518,"type":"narration","vi":"Có phải lý do anh Naito không muốn ký hợp đồng với chúng tôi,\nlà vì anh đã thấy tên \"Park Rae Gyeong\" trong hợp đồng không?","ko":"나이토쌤께서 저희와 계약하고 싶지 않으신 거는 계약서에 박래경의 이름을 발견했기 때문인가요?","en":"Is the reason you didn't want to sign our contract\nbecause you saw \"Park Rae Gyeong\" on the contract?\nThere's something I'd like to check.\nDid you reject the contract\nbecause you saw Park Rae Gyeong's name on it?","text":"Có phải lý do anh Naito không muốn ký hợp đồng với chúng tôi,\nlà vì anh đã thấy tên \"Park Rae Gyeong\" trong hợp đồng không?\n나이토쌤께서 저희와 계약하고 싶지 않으신 거는 계약서에 박래경의 이름을 발견했기 때문인가요?\nIs the reason you didn't want to sign our contract\nbecause you saw \"Park Rae Gyeong\" on the contract?\nThere's something I'd like to check.\nDid you reject the contract\nbecause you saw Park Rae Gyeong's name on it?","sourceUid":"merged-mriup2hv-54","sourceNo":518},{"id":263,"readerNo":264,"displayNo":519,"n":519,"type":"narration","vi":"Các hợp đồng trước đây không có sự thay đổi về số lượng,\nnên anh Naito không có lý do gì để anh thấy tên Park Rae Gyeong.","ko":"이전 계약서들은 물량의 수정이 없었기 때문에 나이토쌤께서 박래경의 이름을 볼 일이 없었지만","en":"The previous contracts had no changes in quantity,\nso you wouldn't have seen Park Rae Gyeong's name.","text":"Các hợp đồng trước đây không có sự thay đổi về số lượng,\nnên anh Naito không có lý do gì để anh thấy tên Park Rae Gyeong.\n이전 계약서들은 물량의 수정이 없었기 때문에 나이토쌤께서 박래경의 이름을 볼 일이 없었지만\nThe previous contracts had no changes in quantity,\nso you wouldn't have seen Park Rae Gyeong's name.","sourceUid":"merged-mriuqkm9-55","sourceNo":519},{"id":264,"readerNo":265,"displayNo":520,"n":520,"type":"narration","vi":"Nhưng lần này, ông ấy là người phải phê duyệt,\nvà anh đã thấy tên Park Rae Gyeong. Đúng vậy không?","ko":"이번만큼은 결제가 필요한 사람으로 참여하였고 박래경의 이름을 발견했다. 아닌가요?","en":"But this time, your approval was necessary\nand you saw Park Rae Gyeong's name there.\nIsn't that right?","text":"Nhưng lần này, ông ấy là người phải phê duyệt,\nvà anh đã thấy tên Park Rae Gyeong. Đúng vậy không?\n이번만큼은 결제가 필요한 사람으로 참여하였고 박래경의 이름을 발견했다. 아닌가요?\nBut this time, your approval was necessary\nand you saw Park Rae Gyeong's name there.\nIsn't that right?","sourceUid":"merged-mriurm47-56","sourceNo":520},{"id":265,"readerNo":266,"displayNo":811,"n":811,"type":"narration","vi":"Khác với trước đây,\nlần này ông ấy phải phê duyệt chuyện sửa đổi hợp đồng,\nnên có lẽ đây là lần đầu tiên anh thấy tên Park Rae Gyeong.","ko":"","en":"Unlike before,\nyou ended up participating in an amendment contract.\nAnd you saw\nPark Rae Gyeong's name for the first time.\nWhat about that?","text":"Khác với trước đây,\nlần này ông ấy phải phê duyệt chuyện sửa đổi hợp đồng,\nnên có lẽ đây là lần đầu tiên anh thấy tên Park Rae Gyeong.\nUnlike before,\nyou ended up participating in an amendment contract.\nAnd you saw\nPark Rae Gyeong's name for the first time.\nWhat about that?","sourceUid":"merged-mriuspim-57","sourceNo":811},{"id":266,"readerNo":267,"displayNo":521,"n":521,"type":"narration","vi":"Thì sao chứ?\nGiám đốc Park đã mua lại Daichi, công ty sản xuất cung tên trong quá khứ.","ko":"박래경 대표가 과거에 다이치라는 양공을 만드는 회사를 인수하였고","en":"CEO Park previously acquired\nthe archery bow company Daichi.","text":"Thì sao chứ?\nGiám đốc Park đã mua lại Daichi, công ty sản xuất cung tên trong quá khứ.\n박래경 대표가 과거에 다이치라는 양공을 만드는 회사를 인수하였고\nCEO Park previously acquired\nthe archery bow company Daichi.","sourceUid":"merged-mriuua5s-58","sourceNo":521},{"id":267,"readerNo":268,"displayNo":522,"n":522,"type":"narration","vi":"Vì vậy mà Daichi công ty sản xuất cung s
