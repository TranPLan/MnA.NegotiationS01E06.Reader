v><div class="wrap"><div id="list"></div></div><div class="float"><div class="row"><button class="good" onclick="playCurrent('vi')">VI Dub</button><button class="violet" onclick="playCurrent('ko')">KO Live</button><button class="warn" onclick="smart()">Smart</button><button class="stop" onclick="stopAll()">Stop</button></div></div><script>const project={"version":"READER_V6_DUB_VI_KO_LIVE_PROJECT","title":"MnA.Negotiation S01E06","movieTitle":"MnA.Negotiation","episodeTitle":"S01E06","githubSlug":"mna_negotiation_s01e06","audioFolder":"../audio","viAudioFile":"mna_negotiation_s01e06_VI_Dub.mp3","koAudioFile":"mna_negotiation_s01e06_KO_Live.mp3","source":"Subtitle Dub VI + KO Live Cut Studio","blocks":[{"id":0,"readerNo":1,"displayNo":2,"n":2,"type":"narration","vi":"BẬC THẦY ĐÀM PHÁN S01E06","ko":"협상의 기술 SO1E06\n월드 이즈 데스플릿 오션\n그린 하우스 앤디 체육\n하이 옴 트 유 스윗 이모션\ncause money takes the heart\nmoney takes the heart\nmoney takes the heart away","en":"ART OF NEGOTIATION S01E06 ♫ 'Cause money takes the heart, money takes the heart ♫ ♫ Money takes the heart away ♫ [The Art of Negotiation]","text":"BẬC THẦY ĐÀM PHÁN S01E06\n협상의 기술 SO1E06\n월드 이즈 데스플릿 오션\n그린 하우스 앤디 체육\n하이 옴 트 유 스윗 이모션\ncause money takes the heart\nmoney takes the heart\nmoney takes the heart away\nART OF NEGOTIATION S01E06 ♫ 'Cause money takes the heart, money takes the heart ♫ ♫ Money takes the heart away ♫ [The Art of Negotiation]","sourceUid":"merged-mrfxcakz-2802","sourceNo":2},{"id":1,"readerNo":2,"displayNo":8,"n":8,"type":"narration","vi":"","ko":"","en":"Timing and Subtitles by the 🐺 Wolf in a Suit 👔 Team @ Viki [Lee Je Hoon] [Kim Dae Myeung] [Sung Dong Il] [Jang Hyun Sung] [Oh Man Seok] [Ahn Hyun Ho] [Cha Kang Yoon]","text":"Timing and Subtitles by the 🐺 Wolf in a Suit 👔 Team @ Viki [Lee Je Hoon] [Kim Dae Myeung] [Sung Dong Il] [Jang Hyun Sung] [Oh Man Seok] [Ahn Hyun Ho] [Cha Kang Yoon]","sourceUid":"merged-mrfxa513-2801","sourceNo":8},{"id":2,"readerNo":3,"displayNo":11,"n":11,"type":"narration","vi":"Chào cô.\nChào anh.\nChúng ta vào trong nhé?\nVâng, chúng ta vào trong thôi.\nXin lỗi anh.\nÀ, không sao đâu.\nCông việc mà.\nChỉ là tôi bị chơi xỏ một cú thôi.\nHình như là tôi đã chơi xỏ anh nhỉ.","ko":"들어갈까요?\n네 들어가시죠\n죄송합니다.\n아니에요. 일인데요.\n제가 한 방 먹은 거죠.\n제가 간 밥을 먹였네요.","en":"Hello. Shall we go in? Yes, let's go inside. I'm sorry. Oh, no. This is business. I just got played. That's all. I guess I played you.","text":"Chào cô.\nChào anh.\nChúng ta vào trong nhé?\nVâng, chúng ta vào trong thôi.\nXin lỗi anh.\nÀ, không sao đâu.\nCông việc mà.\nChỉ là tôi bị chơi xỏ một cú thôi.\nHình như là tôi đã chơi xỏ anh nhỉ.\n들어갈까요?\n네 들어가시죠\n죄송합니다.\n아니에요. 일인데요.\n제가 한 방 먹은 거죠.\n제가 간 밥을 먹였네요.\nHello. Shall we go in? Yes, let's go inside. I'm sorry. Oh, no. This is business. I just got played. That's all. I guess I played you.","sourceUid":"merged-mrgei6qw-4","sourceNo":11},{"id":3,"readerNo":4,"displayNo":23,"n":23,"type":"narration","vi":"","ko":"","en":"♫ Pretending to fool around, ♫\n♫ Beyond the words ♫\n♫ The scenery of the summer that is about to end ♫","text":"♫ Pretending to fool around, ♫\n♫ Beyond the words ♫\n♫ The scenery of the summer that is about to end ♫","sourceUid":"merged-mrgeidrz-5","sourceNo":23},{"id":4,"readerNo":5,"displayNo":14,"n":14,"type":"narration","vi":"Hay để tôi đổi chỗ cho cô nhé? Khói thuốc như vậy có sao không?\nKhông sao đâu.\nAnh chu đáo quá.\nKhông đâu.","ko":"자리 바꿔드릴까요?\n담배 먹으면 괜찮으세요?\n괜찮아요.\n친절하시네요.","en":"Would you like to switch seats?\nAre you okay with the cigarette smoke?\nI'm fine.\nYou're kind.\nNo, no.","text":"Hay để tôi đổi chỗ cho cô nhé? Khói thuốc như vậy có sao không?\nKhông sao đâu.\nAnh chu đáo quá.\nKhông đâu.\n자리 바꿔드릴까요?\n담배 먹으면 괜찮으세요?\n괜찮아요.\n친절하시네요.\nWould you like to switch seats?\nAre you okay with the cigarette smoke?\nI'm fine.\nYou're kind.\nNo, no.","sourceUid":"merged-mrgene3r-8","sourceNo":14},{"id":5,"readerNo":6,"displayNo":29,"n":29,"type":"narration","vi":"","ko":"","en":"♫ You intertwine your fingers with mine ♫","text":"♫ You intertwine your fingers with mine ♫","sourceUid":"en-mrfx1did-1723","sourceNo":29},{"id":6,"readerNo":7,"displayNo":17,"n":17,"type":"narration","vi":"Mà cô học tiếng Hàn ở đâu vậy?\nTôi học ở đại học Yonsei.\nỞ Sinchon à? Chỗ trung tâm ngôn ngữ của trường hả?\nTôi cũng học ở đại học Yonsei này.","ko":"근데 한국말은 어떻게 배우셨어요?\n아, 연세대에서\n신촌이요? 어학당?\n저도 연세대인데","en":"But how did you learn Korean?\nI learned it at Yonsei University.\nIn Sinchon? At the language school?\nI also went to Yonsei University.","text":"Mà cô học tiếng Hàn ở đâu vậy?\nTôi học ở đại học Yonsei.\nỞ Sinchon à? Chỗ trung tâm ngôn ngữ của trường hả?\nTôi cũng học ở đại học Yonsei này.\n근데 한국말은 어떻게 배우셨어요?\n아, 연세대에서\n신촌이요? 어학당?\n저도 연세대인데\nBut how did you learn Korean?\nI learned it at Yonsei University.\nIn Sinchon? At the language school?\nI also went to Yonsei University.","sourceUid":"merged-mrgepwe9-10","sourceNo":17},{"id":7,"readerNo":8,"displayNo":21,"n":21,"type":"narration","vi":"Thật sao? Tôi nhập học năm 2015.","ko":"아, 진짜요?\n전 15년대\n저도 1호 학번","en":"Really?\nI enrolled in 2015.","text":"Thật sao? Tôi nhập học năm 2015.\n아, 진짜요?\n전 15년대\n저도 1호 학번\nReally?\nI enrolled in 2015.","sourceUid":"merged-mrger98m-11","sourceNo":21},{"id":8,"readerNo":9,"displayNo":24,"n":24,"type":"narration","vi":"Tôi cũng là sinh viên khóa 15. Tôi đã đi nhậu ở Sinchon nhiều lắm.\nTôi cũng hay đi chơi ở Sinchon.","ko":"저 신촌에서 술 엄청 먹었어요\n저도 신촌에서 많이 놀았어요","en":"I also enrolled in 2015.\nI drank a lot in Sinchon.\nI also played a lot in Sinchon.","text":"Tôi cũng là sinh viên khóa 15. Tôi đã đi nhậu ở Sinchon nhiều lắm.\nTôi cũng hay đi chơi ở Sinchon.\n저 신촌에서 술 엄청 먹었어요\n저도 신촌에서 많이 놀았어요\nI also enrolled in 2015.\nI drank a lot in Sinchon.\nI also played a lot in Sinchon.","sourceUid":"merged-mrges7i6-12","sourceNo":24},{"id":9,"readerNo":10,"displayNo":28,"n":28,"type":"narration","vi":"Chúng ta có thể đã gặp nhau rồi ấy chứ.\nĐúng vậy nhỉ.\nLúc đó tôi cứ tưởng chỉ cần có việc làm là xong.\nVâng.\nTôi cũng nhớ những ngày vui vẻ đó.","ko":"그때는 취직만 하면 되는 줄 알았는데\n네\n저도 그때가 참 좋았어요","en":"We may have met before. You're right. Back then, I thought all I needed was to get hired. Yes. I miss those days as well.","text":"Chúng ta có thể đã gặp nhau rồi ấy chứ.\nĐúng vậy nhỉ.\nLúc đó tôi cứ tưởng chỉ cần có việc làm là xong.\nVâng.\nTôi cũng nhớ những ngày vui vẻ đó.\n그때는 취직만 하면 되는 줄 알았는데\n네\n저도 그때가 참 좋았어요\nWe may have met before. You're right. Back then, I thought all I needed was to get hired. Yes. I miss those days as well.","sourceUid":"merged-mrgevcmf-13","sourceNo":28},{"id":10,"readerNo":11,"displayNo":29,"n":29,"type":"narration","vi":"Hay phải thoát khỏi vị trí em út trong đội mới đỡ vất vả hơn nhỉ? Chắc vậy quá.","ko":"막내만 벗어나면 덜 힘들까요?\n그러게요","en":"Would it get better once I'm no longer the maknae?\nI know, right?\nI'm also the maknae.","text":"Hay phải thoát khỏi vị trí em út trong đội mới đỡ vất vả hơn nhỉ? Chắc vậy quá.\n막내만 벗어나면 덜 힘들까요?\n그러게요\nWould it get better once I'm no longer the maknae?\nI know, right?\nI'm also the maknae.","sourceUid":"merged-mrgexv35-14","sourceNo":29},{"id":11,"readerNo":12,"displayNo":31,"n":31,"type":"narration","vi":"Tôi cũng là em út trong đội mà.\nThôi nào.\nMặc dù đều là em út, nhưng cô Hirose và tôi khác nhau mà.\nTôi đã bị cô Hirose cho một vố còn gì.\nCô Hirose được khen, còn tôi thì bị mắng.","ko":"저도 막내라서\n에이\n같은 막내라도 히로세 씨랑 저는 다르죠\n히로세 씨한테 한 방 먹었잖아요\n베르사 씨는 칭찬 듣고 나는 욕먹","en":"Come on.\nThough we're both maknaes, you and I are different.\nI got played by you, Hirose.\nYou were praised, but I got yelled at.","text":"Tôi cũng là em út trong đội mà.\nThôi nào.\nMặc dù đều là em út, nhưng cô Hirose và tôi khác nhau mà.\nTôi đã bị cô Hirose cho một vố còn gì.\nCô Hirose được khen, còn tôi thì bị mắng.\n저도 막내라서\n에이\n같은 막내라도 히로세 씨랑 저는 다르죠\n히로세 씨한테 한 방 먹었잖아요\n베르사 씨는 칭찬 듣고 나는 욕먹\nCome on.\nThough we're both maknaes, you and I are different.\nI got played by you, Hirose.\nYou were praised, but I got yelled at.","sourceUid":"merged-mrgfa3ov-16","sourceNo":31},{"id":12,"readerNo":13,"displayNo":51,"n":51,"type":"narration","vi":"","ko":"","en":"♫ Until dawn, oh yeah, oh yeah, oh yeah ♫","text":"♫ Until dawn, oh yeah, oh yeah, oh yeah ♫","sourceUid":"en-mrfx1did-1745","sourceNo":51},{"id":13,"readerNo":14,"displayNo":36,"n":36,"type":"narration","vi":"Và tôi cũng đói nữa.\nShizuoka nổi tiếng với món chả cá đó.\nHay là...\nChúng ta đi nhé?","ko":"배도 고프고 시즈오카는 어묵이 유명한데 혹시?","en":"And I'm also hungry.\nShizuoka is famous for its fish cakes.\nBy chance...\nShall we go?","text":"Và tôi cũng đói nữa.\nShizuoka nổi tiếng với món chả cá đó.\nHay là...\nChúng ta đi nhé?\n배도 고프고 시즈오카는 어묵이 유명한데 혹시?\nAnd I'm also hungry.\nShizuoka is famous for its fish cakes.\nBy chance...\nShall we go?","sourceUid":"merged-mrgfast4-17","sourceNo":36},{"id":14,"readerNo":15,"displayNo":44,"n":44,"type":"narration","vi":"Tôi hỏi cô một câu này thôi được không?\nVâng.\nAnh tò mò điều gì?\nLối này.\nShimizu không có ý định giao dịch với chúng tôi đúng không?\nĐó là \"tatemae\" của họ,\nnhưng chúng tôi đã không hiểu được phải không?","ko":"","en":"Could I ask you something?\nSure.\nWhat are you curious about?\nThis way.\nShimizu isn't interested in a deal with us, right?\nThat's their \"tatemae,\"\nbut we're not picking up on that, right?","text":"Tôi hỏi cô một câu này thôi được không?\nVâng.\nAnh tò mò điều gì?\nLối này.\nShimizu không có ý định giao dịch với chúng tôi đúng không?\nĐó là \"tatemae\" của họ,\nnhưng chúng tôi đã không hiểu được phải không?\nCould I ask you something?\nSure.\nWhat are you curious about?\nThis way.\nShimizu isn't interested in a deal with us, right?\nThat's their \"tatemae,\"\nbut we're not picking up on that, right?","sourceUid":"merged-mrgfg8vj-18","sourceNo":44},{"id":15,"readerNo":16,"displayNo":38,"n":38,"type":"narration","vi":"Thực ra, Shimizu đang định chuyển trụ sở chính.\n\nTrụ sở chính ở Shizuoka mà, đúng không?\nĐúng vậy.","ko":"사실 시미즈는 지금 본점을 이동하려고 해요\n시즈오카가 본점 아니에요?\n맞아요","en":"Actually, Shimizu is trying to move its main branch. Isn't Shizuoka its main branch? That's right.","text":"Thực ra, Shimizu đang định chuyển trụ sở chính.\n\nTrụ sở chính ở Shizuoka mà, đúng không?\nĐúng vậy.\n사실 시미즈는 지금 본점을 이동하려고 해요\n시즈오카가 본점 아니에요?\n맞아요\nActually, Shimizu is trying to move its main branch. Isn't Shizuoka its main branch? That's right.","sourceUid":"merged-mrgfjzvz-20","sourceNo":38},{"id":16,"readerNo":17,"displayNo":41,"n":41,"type":"narration","vi":"Nhưng dân số của Shizuoka đã giảm đi rất nhiều.\nVì vậy, họ định chuyển trụ sở chính đến Tokyo.","ko":"하지만 시즈오카는 사람들이 많이 줄어서요\n도쿄로 본점을 옮기려고 하거든요","en":"so we're trying to move the main branch to Tokyo. But Shizuoka's population has diminished greatly","text":"Nhưng dân số của Shizuoka đã giảm đi rất nhiều.\nVì vậy, họ định chuyển trụ sở chính đến Tokyo.\n하지만 시즈오카는 사람들이 많이 줄어서요\n도쿄로 본점을 옮기려고 하거든요\nso we're trying to move the main branch to Tokyo. But Shizuoka's population has diminished greatly","sourceUid":"merged-mrgft3ea-21","sourceNo":41},{"id":17,"readerNo":18,"displayNo":43,"n":43,"type":"narration","vi":"Việc ai đến Tokyo, còn ai ở lại Shizuoka được quyết định trong tháng này.","ko":"누가 도쿄에 갈지 시즈오카에 남을지가 이번 달 결정됐는데","en":"Who will go to Tokyo and who will stay in Shizuoka will be decided this month.","text":"Việc ai đến Tokyo, còn ai ở lại Shizuoka được quyết định trong tháng này.\n누가 도쿄에 갈지 시즈오카에 남을지가 이번 달 결정됐는데\nWho will go to Tokyo and who will stay in Shizuoka will be decided this month.","sourceUid":"merged-mrgfvejt-22","sourceNo":43},{"id":18,"readerNo":19,"displayNo":44,"n":44,"type":"narration","vi":"Và trưởng phòng Yoshida rốt cuộc chắc sẽ phải ở lại\nvì thành tích của anh ấy.","ko":"여시다 팀장님은 남겨뒀어요. 실적 때문에요.","en":"Team Leader Yoshida ended up staying behind\nbecause of his performance.","text":"Và trưởng phòng Yoshida rốt cuộc chắc sẽ phải ở lại\nvì thành tích của anh ấy.\n여시다 팀장님은 남겨뒀어요. 실적 때문에요.\nTeam Leader Yoshida ended up staying behind\nbecause of his performance.","sourceUid":"merged-mrgfxn0t-23","sourceNo":44},{"id":19,"readerNo":20,"displayNo":45,"n":45,"type":"narration","vi":"Ở Hàn Quốc cũng có vấn đề là mọi người chỉ muốn đến Seoul.","ko":"한국도 서울로만 가려고 해서 문제거든요.","en":"Everyone tries to go to Seoul in Korea, too. It's a problem.","text":"Ở Hàn Quốc cũng có vấn đề là mọi người chỉ muốn đến Seoul.\n한국도 서울로만 가려고 해서 문제거든요.\nEveryone tries to go to Seoul in Korea, too. It's a problem.","sourceUid":"merged-mrgfybiq-24","sourceNo":45},{"id":20,"readerNo":21,"displayNo":46,"n":46,"type":"narration","vi":"Dù sao Shizuoka cũng là thành phố nhỏ hơn Tokyo mà.","ko":"아무래도 시즈오카는 도쿄보다 작은 도시니까.","en":"Since Shizuoka is a smaller city than Tokyo.","text":"Dù sao Shizuoka cũng là thành phố nhỏ hơn Tokyo mà.\n아무래도 시즈오카는 도쿄보다 작은 도시니까.\nSince Shizuoka is a smaller city than Tokyo.","sourceUid":"merged-mrgfyx7r-25","sourceNo":46},{"id":21,"readerNo":22,"displayNo":47,"n":47,"type":"narration","vi":"Cô Hirose thì sao? Cô sẽ đến Tokyo à?\nHay ở lại Shizuoka?","ko":"히로세 씨는요? 도쿄로 가나요?\n아니면 시족과의 남나요?","en":"What about you, Hirose? Will you go to Tokyo?\nOr will you remain in Shizuoka?","text":"Cô Hirose thì sao? Cô sẽ đến Tokyo à?\nHay ở lại Shizuoka?\n히로세 씨는요? 도쿄로 가나요?\n아니면 시족과의 남나요?\nWhat about you, Hirose? Will you go to Tokyo?\nOr will you remain in Shizuoka?","sourceUid":"merged-mrgg033r-26","sourceNo":47},{"id":22,"readerNo":23,"displayNo":49,"n":49,"type":"narration","vi":"Phòng chúng tôi có thể có một người được đến Tokyo.\nMà Ozaki có khả năng được đi hơn tôi.","ko":"저희 팀에서 한 명이 도쿄로 갈 수 있어요\n저보다는 오자키산에 가지 않을까?","en":"One person from my team can go to Tokyo.\nIt's more likely that Ozaki will go, not me.","text":"Phòng chúng tôi có thể có một người được đến Tokyo.\nMà Ozaki có khả năng được đi hơn tôi.\n저희 팀에서 한 명이 도쿄로 갈 수 있어요\n저보다는 오자키산에 가지 않을까?\nOne person from my team can go to Tokyo.\nIt's more likely that Ozaki will go, not me.","sourceUid":"merged-mrgg1837-27","sourceNo":49},{"id":23,"readerNo":24,"displayNo":51,"n":51,"type":"narration","vi":"Cô Hirose cũng muốn đi à?\nTôi không biết nữa.","ko":"키로세 씨도 가고 싶은 거고요?\n글쎄요","en":"But you also want to go, Hirose?\nI don't know.","text":"Cô Hirose cũng muốn đi à?\nTôi không biết nữa.\n키로세 씨도 가고 싶은 거고요?\n글쎄요\nBut you also want to go, Hirose?\nI don't know.","sourceUid":"merged-mrgg2chh-28","sourceNo":51},{"id":24,"readerNo":25,"displayNo":53,"n":53,"type":"narration","vi":"Đi Tokyo thì dù sao cũng tốt cho sự nghiệp.","ko":"도쿄로 가는 곳이 아무래도 경력에는 좋지만","en":"Going to Tokyo would be better for my resume.","text":"Đi Tokyo thì dù sao cũng tốt cho sự nghiệp.\n도쿄로 가는 곳이 아무래도 경력에는 좋지만\nGoing to Tokyo would be better for my resume.","sourceUid":"merged-mrgg316v-29","sourceNo":53},{"id":25,"readerNo":26,"displayNo":54,"n":54,"type":"narration","vi":"Mà...\ntrưởng phòng Yoshida không thể cải thiện thành tích\nbằng cách ký hợp đồng với chúng tôi được sao?","ko":"근데요. 요시다 부장님은 우리랑 계약해서 실적을 채우시면 되는 거 아닌가요?","en":"But...\ncan't Mr. Yoshida improve his performance\nby signing the contract with us?","text":"Mà...\ntrưởng phòng Yoshida không thể cải thiện thành tích\nbằng cách ký hợp đồng với chúng tôi được sao?\n근데요. 요시다 부장님은 우리랑 계약해서 실적을 채우시면 되는 거 아닌가요?\nBut...\ncan't Mr. Yoshida improve his performance\nby signing the contract with us?","sourceUid":"merged-mrgg3uyt-30","sourceNo":54},{"id":26,"readerNo":27,"displayNo":55,"n":55,"type":"narration","vi":"Một hợp đồng với Wind\nsẽ không đủ để cải thiện thành tích của anh ấy.\nThành tích chỉ được công nhận khi công ty nhận được tiền thanh toán.","ko":"윈도우의 계약으로는 실적이 되기엔 주문이 자라요.\n실적은 대금 입금돼야 실적으로 인정받을 수 있거든요.","en":"A contract with Wind\nwouldn't be enough to improve his performance.\nSomething is only recognized as a performance\nwhen a payment is received.","text":"Một hợp đồng với Wind\nsẽ không đủ để cải thiện thành tích của anh ấy.\nThành tích chỉ được công nhận khi công ty nhận được tiền thanh toán.\n윈도우의 계약으로는 실적이 되기엔 주문이 자라요.\n실적은 대금 입금돼야 실적으로 인정받을 수 있거든요.\nA contract with Wind\nwouldn't be enough to improve his performance.\nSomething is only recognized as a performance\nwhen a payment is received.","sourceUid":"merged-mrgg6hem-31","sourceNo":55},{"id":27,"readerNo":28,"displayNo":57,"n":57,"type":"narration","vi":"Nhưng tiền đặt cọc của Wind không đủ.\nÀ, chính vì như vậy,\nanh ấy mới không chịu giảm giá sao?","ko":"하지만 윈도우의 계약금으로는 주문하지 않았어요.\n그래서 할인을 안 해주겠다는 건가요?","en":"But Wind's deposit wasn't enough.\nOh, is that why\nhe won't give us a discount?","text":"Nhưng tiền đặt cọc của Wind không đủ.\nÀ, chính vì như vậy,\nanh ấy mới không chịu giảm giá sao?\n하지만 윈도우의 계약금으로는 주문하지 않았어요.\n그래서 할인을 안 해주겠다는 건가요?\nBut Wind's deposit wasn't enough.\nOh, is that why\nhe won't give us a discount?","sourceUid":"merged-mrgg8bul-32","sourceNo":57},{"id":28,"readerNo":29,"displayNo":59,"n":59,"type":"narration","vi":"Nếu không giảm giá,\nanh ấy có thể sẽ đạt được thành tích mục tiêu.","ko":"할인을 해주지 않는다면 실적을 재울 수도 있지만","en":"If he doesn't give you a discount,\nhe may be able to meet his performance target.","text":"Nếu không giảm giá,\nanh ấy có thể sẽ đạt được thành tích mục tiêu.\n할인을 해주지 않는다면 실적을 재울 수도 있지만\nIf he doesn't give you a discount,\nhe may be able to meet his performance target.","sourceUid":"merged-mrgg9c5w-33","sourceNo":59},{"id":29,"readerNo":30,"displayNo":60,"n":60,"type":"narration","vi":"Nhưng nếu chúng tôi không được giảm giá, chẳng có lý do gì để ký hợp đồng này cả. Khó ghê.","ko":"저희는 할인을 못 받으면 계약을 할 이유가 없거든요.","en":"If we can't get a discount,\nthere's no reason to sign this contract.\nThis is hard.","text":"Nhưng nếu chúng tôi không được giảm giá, chẳng có lý do gì để ký hợp đồng này cả. Khó ghê.\n저희는 할인을 못 받으면 계약을 할 이유가 없거든요.\nIf we can't get a discount,\nthere's no reason to sign this contract.\nThis is hard.","sourceUid":"merged-mrggaxis-34","sourceNo":60},{"id":30,"readerNo":31,"displayNo":96,"n":96,"type":"dialogue","vi":"(Tập 6 - Cảm xúc thật)","ko":"","en":"[Episode 6: True feelings]","text":"(Tập 6 - Cảm xúc thật)\n[Episode 6: True feelings]","sourceUid":"merged-mrggbu24-35","sourceNo":96},{"id":31,"readerNo":32,"displayNo":80,"n":80,"type":"narration","vi":"Đây là quán quen của tôi.\nOa.\nLãng mạn quá. Tuyệt vời.\nChúng ta vào trong thôi.","ko":"","en":"This is where I come often.\nWow.\nIt's so charming. Awesome.\nOa.\nLet's go inside.","text":"Đây là quán quen của tôi.\nOa.\nLãng mạn quá. Tuyệt vời.\nChúng ta vào trong thôi.\nThis is where I come often.\nWow.\nIt's so charming. Awesome.\nOa.\nLet's go inside.","sourceUid":"merged-mrggcjf9-36","sourceNo":80},{"id":32,"readerNo":33,"displayNo":83,"n":83,"type":"narration","vi":"- Chào mọi người. - Mọi người đợi lâu chưa?\nCậu đến muộn quá.\nXin lỗi nhé, tàu bị trễ.\nNày, phục vụ ơi.\n- Cho tôi gọi món. - Chào anh.\nChúng tôi muốn gọi món.","ko":"","en":"[Shizuoka Fishcake Stew]\n- Hey there. - Did you wait long?\nBan-chan, you're late.\nSorry, the train was delayed.\nExcuse me, Waiter.\n- My friends just came, so... - Hi, Sir.\nWe'd like to place our orders.","text":"- Chào mọi người. - Mọi người đợi lâu chưa?\nCậu đến muộn quá.\nXin lỗi nhé, tàu bị trễ.\nNày, phục vụ ơi.\n- Cho tôi gọi món. - Chào anh.\nChúng tôi muốn gọi món.\n[Shizuoka Fishcake Stew]\n- Hey there. - Did you wait long?\nBan-chan, you're late.\nSorry, the train was delayed.\nExcuse me, Waiter.\n- My friends just came, so... - Hi, Sir.\nWe'd like to place our orders.","sourceUid":"merged-mrggkkhi-40","sourceNo":83},{"id":33,"readerNo":34,"displayNo":61,"n":61,"type":"narration","vi":"Vậy tiền đặt cọc thường là bao nhiêu phần trăm?","ko":"그러면 계약금은 보통 몇 퍼센트를 붙나요?","en":"So how much do you usually take as a deposit?","text":"Vậy tiền đặt cọc thường là bao nhiêu phần trăm?\n그러면 계약금은 보통 몇 퍼센트를 붙나요?\nSo how much do you usually take as a deposit?","sourceUid":"merged-mrggksmc-41","sourceNo":61},{"id":34,"readerNo":35,"displayNo":62,"n":62,"type":"narration","vi":"Thông thường là 10% được thanh toán vào cuối tháng kế tiếp.","ko":"다음 달이면 도쿄로 떠날 사람들은 이미 정해졌을 테니까","en":"The manual says to pay 10% by the end of next month.","text":"Thông thường là 10% được thanh toán vào cuối tháng kế tiếp.\n다음 달이면 도쿄로 떠날 사람들은 이미 정해졌을 테니까\nThe manual says to pay 10% by the end of next month.","sourceUid":"merged-mrgglhyt-42","sourceNo":62},{"id":35,"readerNo":36,"displayNo":63,"n":63,"type":"narration","vi":"Nếu là tháng tới,\nthì lúc đó đã chốt xong người nào đi Tokyo rồi,\nnên trưởng phòng Yoshida chắc cũng không mặn mà gì nữa.","ko":"요시다 부장님이랑은 또 상관이 없네요.","en":"If it's next month,\nwhoever is Tokyo-bound would be set already,\nso it wouldn't matter to Mr. Yoshida.","text":"Nếu là tháng tới,\nthì lúc đó đã chốt xong người nào đi Tokyo rồi,\nnên trưởng phòng Yoshida chắc cũng không mặn mà gì nữa.\n요시다 부장님이랑은 또 상관이 없네요.\nIf it's next month,\nwhoever is Tokyo-bound would be set already,\nso it wouldn't matter to Mr. Yoshida.","sourceUid":"merged-mrggnhva-44","sourceNo":63},{"id":36,"readerNo":37,"displayNo":64,"n":64,"type":"narration","vi":"Vâng.\nAnh ăn đi.\nĐây là phần mười xiên của quý khách.\n- Cảm ơn cô. - Cảm ơn cô.\nAnh chọn một xiên ăn thử đi.\nTôi chọn xiên này.\nThịt.\n- Tôi ăn thử nhé. - Vâng.","ko":"선택하세요\n저는 이거\n응\n고기\n먹어볼까요?\n네","en":"Yes. Enjoy. Here is your ten-skewer set. - Thank you. - Thank you. Pick one to try. I choose this one. The meat. - I'll try it. - Okay.","text":"Vâng.\nAnh ăn đi.\nĐây là phần mười xiên của quý khách.\n- Cảm ơn cô. - Cảm ơn cô.\nAnh chọn một xiên ăn thử đi.\nTôi chọn xiên này.\nThịt.\n- Tôi ăn thử nhé. - Vâng.\n선택하세요\n저는 이거\n응\n고기\n먹어볼까요?\n네\nYes. Enjoy. Here is your ten-skewer set. - Thank you. - Thank you. Pick one to try. I choose this one. The meat. - I'll try it. - Okay.","sourceUid":"merged-mrggqmjw-45","sourceNo":64},{"id":37,"readerNo":38,"displayNo":70,"n":70,"type":"narration","vi":"Thế nào? Thật sự ngon ghê. - Ngon à? - Ngon lắm. Ngon lắm à? Ngon thật. Nhưng...","ko":"어때요?\n진짜 맛있어요\n맛있어요?\n맛있어\n맛있어요\n근데요","en":"How is it? It's so good. - It's good? - It's tasty. It's tasty? It's good. But...","text":"Thế nào? Thật sự ngon ghê. - Ngon à? - Ngon lắm. Ngon lắm à? Ngon thật. Nhưng...\n어때요?\n진짜 맛있어요\n맛있어요?\n맛있어\n맛있어요\n근데요\nHow is it? It's so good. - It's good? - It's tasty. It's tasty? It's good. But...","sourceUid":"merged-mrghwb9n-46","sourceNo":70},{"id":38,"readerNo":39,"displayNo":76,"n":76,"type":"narration","vi":"sao cô lại nói cho tôi biết tình hình của Shimizu?\nTại tôi cũng thấy có lỗi,\nvà tự nhiên tôi muốn vậy thôi.","ko":"저한테 시미즈 사정을 알려주시는 이유가 있어요 너무 미안한 마음도 있고 저도 그러고 싶었어요 감사합니다. 혹시요","en":"why are you telling me about Shimizu's situation? I feel kind of bad, and I just wanted to. By chance,","text":"sao cô lại nói cho tôi biết tình hình của Shimizu?\nTại tôi cũng thấy có lỗi,\nvà tự nhiên tôi muốn vậy thôi.\n저한테 시미즈 사정을 알려주시는 이유가 있어요 너무 미안한 마음도 있고 저도 그러고 싶었어요 감사합니다. 혹시요\nwhy are you telling me about Shimizu's situation? I feel kind of bad, and I just wanted to. By chance,","sourceUid":"merged-mrgi1h1v-47","sourceNo":76},{"id":39,"readerNo":40,"displayNo":84,"n":84,"type":"narration","vi":"Nếu cô Hirose cũng cần thành tích để được đi Tokyo,\nthì tôi sẽ tìm cách cho.\nVâng.","ko":"히로세 씨도 성과가 필요하신 거면\n도쿄로 가실 수 있게요\n그러신 거면 제가 방법을 알아보겠습니다\n맛있다","en":"if you also need performance points\nto go to Tokyo,\nthen I'll look for a way.\nOkay.","text":"Nếu cô Hirose cũng cần thành tích để được đi Tokyo,\nthì tôi sẽ tìm cách cho.\nVâng.\n히로세 씨도 성과가 필요하신 거면\n도쿄로 가실 수 있게요\n그러신 거면 제가 방법을 알아보겠습니다\n맛있다\nif you also need performance points\nto go to Tokyo,\nthen I'll look for a way.\nOkay.","sourceUid":"merged-mrgi4cgj-48","sourceNo":84},{"id":40,"readerNo":41,"displayNo":85,"n":85,"type":"narration","vi":"Ngon ghê.\n- Anh ăn nhiều vô. - Vâng.\nPhục vụ ơi.\nCho tôi một ly nước chanh.\nVâng.","ko":"많이 드세요\n네","en":"- It's good. - Eat up.\nExcuse me.\nI'd like a lemon sour.\nRight away!","text":"Ngon ghê.\n- Anh ăn nhiều vô. - Vâng.\nPhục vụ ơi.\nCho tôi một ly nước chanh.\nVâng.\n많이 드세요\n네\n- It's good. - Eat up.\nExcuse me.\nI'd like a lemon sour.\nRight away!","sourceUid":"merged-mrgi5tpe-49","sourceNo":85},{"id":41,"readerNo":42,"displayNo":87,"n":87,"type":"narration","vi":"Ồ, mạnh quá.\nMạnh à?\nCảm ơn anh.\nHôm nay cảm ơn cô nhiều lắm.\nCô còn mua đồ ăn ngon cho tôi nữa.\nĐáng lẽ tôi phải mua mới đúng.\nLần sau anh Jin Soo đãi tôi nhé?","ko":"오늘 정말 감사했습니다\n맛있는 것도 사주시고\n제가 샀어야 했는데\n다음에는 진수씨가 사주세요\n네","en":"Oh, it's strong.\nIt's strong?\n[Sea Monster]­\nThank you.\nThank you so much for today.\nAlso for the good food.\nI should've paid.\nNext time, you can buy, okay?\nOkay. Next time,","text":"Ồ, mạnh quá.\nMạnh à?\nCảm ơn anh.\nHôm nay cảm ơn cô nhiều lắm.\nCô còn mua đồ ăn ngon cho tôi nữa.\nĐáng lẽ tôi phải mua mới đúng.\nLần sau anh Jin Soo đãi tôi nhé?\n오늘 정말 감사했습니다\n맛있는 것도 사주시고\n제가 샀어야 했는데\n다음에는 진수씨가 사주세요\n네\nOh, it's strong.\nIt's strong?\n[Sea Monster]­\nThank you.\nThank you so much for today.\nAlso for the good food.\nI should've paid.\nNext time, you can buy, okay?\nOkay. Next time,","sourceUid":"merged-mrgip7ci-51","sourceNo":87},{"id":42,"readerNo":43,"displayNo":92,"n":92,"type":"narration","vi":"Được. Lần sau,\nnếu cô đến Hàn Quốc, tôi sẽ mua đồ ăn ngon cho cô.","ko":"다음에\n한국 오시면\n제가 맛있는 거 사드리겠습니다","en":"I'll buy you something tasty if you come to Korea.","text":"Được. Lần sau,\nnếu cô đến Hàn Quốc, tôi sẽ mua đồ ăn ngon cho cô.\n다음에\n한국 오시면\n제가 맛있는 거 사드리겠습니다\nI'll buy you something tasty if you come to Korea.","sourceUid":"merged-mrgiqqdm-52","sourceNo":92},{"id":43,"readerNo":44,"displayNo":95,"n":95,"type":"narration","vi":"Anh Jin Soo có vẻ là người rất thuần khiết.\nSao? Tôi á?\nVâng.","ko":"진수씨는 순수한 사람 같아요\n네? 제가요?\n네","en":"Jin Su, you seem like a pure person.\nExcuse me? M-Me?\nYes.","text":"Anh Jin Soo có vẻ là người rất thuần khiết.\nSao? Tôi á?\nVâng.\n진수씨는 순수한 사람 같아요\n네? 제가요?\n네\nJin Su, you seem like a pure person.\nExcuse me? M-Me?\nYes.","sourceUid":"merged-mrgirnox-53","sourceNo":95},{"id":44,"readerNo":45,"displayNo":98,"n":98,"type":"narration","vi":"Đây là \"tatemae\" đúng không?\nCô nói tôi thuần khiết...\nKhông phải đâu.\nĐây là \"honne\".","ko":"바텔 말이죠?\n순무소?\n아니요\n번뇌에요","en":"This is \"tatemae,\" right?\nPure...\nNo.\nIt's \"honne.\"","text":"Đây là \"tatemae\" đúng không?\nCô nói tôi thuần khiết...\nKhông phải đâu.\nĐây là \"honne\".\n바텔 말이죠?\n순무소?\n아니요\n번뇌에요\nThis is \"tatemae,\" right?\nPure...\nNo.\nIt's \"honne.\"","sourceUid":"merged-mrgit94y-54","sourceNo":98},{"id":45,"readerNo":46,"displayNo":102,"n":102,"type":"narration","vi":"","ko":"다음 영상에서 만나요.","en":"","text":"다음 영상에서 만나요.","sourceUid":"ko-mrfx0skx-102","sourceNo":102},{"id":46,"readerNo":47,"displayNo":177,"n":177,"type":"narration","vi":"","ko":"","en":"♫ How come ♫ ♫ You never know ♫ ♫ Every thought you know ♫ ♫ This is easy to see ♫ ♫ No more ♫ ♫ Not anymore ♫ ♫ Don't need to wonder ♫ ♫ 'Cause I tell you no lies ♫ ♫ Don't you see what I see in my heart? ♫ ♫ Do you know what I need in my eyes? ♫ ♫ I know ♫ ♫ You're not coming back ♫ ♫ It's all going to end ♫ ♫ But that's okay ♫ ♫ 'Cause I know ♫ ♫ Can all tomorrow ♫ ♫ Hopefully tomorrow ♫ ♫ We'll meet again ♫ ♫ Baby, oh ♫","text":"♫ How come ♫ ♫ You never know ♫ ♫ Every thought you know ♫ ♫ This is easy to see ♫ ♫ No more ♫ ♫ Not anymore ♫ ♫ Don't need to wonder ♫ ♫ 'Cause I tell you no lies ♫ ♫ Don't you see what I see in my heart? ♫ ♫ Do you know what I need in my eyes? ♫ ♫ I know ♫ ♫ You're not coming back ♫ ♫ It's all going to end ♫ ♫ But that's okay ♫ ♫ 'Cause I know ♫ ♫ Can all tomorrow ♫ ♫ Hopefully tomorrow ♫ ♫ We'll meet again ♫ ♫ Baby, oh ♫","sourceUid":"merged-mrgixv5f-56","sourceNo":177},{"id":47,"readerNo":48,"displayNo":103,"n":103,"type":"narration","vi":"Luật sư.\nTôi tưởng cậu là gián điệp không đó.\nCậu có nghe ngóng được gì không?\nDạ có.\nHóa ra tình hình nội bộ Shimizu cũng có vấn đề.\nCô ấy kể hết cho cậu nghe hả?\nVâng.\nHiện giờ, thành tích rất quan trọng với trưởng phòng Yoshida, đúng không?","ko":"감사합니다.\n유시다 부장님은 실적이 중요한 상황이라고 했죠?\n네","en":"Attorney. Excuse me, could I have some water?­ I thought you were a spy. Did you hear anything useful? Yes. It turns out Shimizu also has an internal situation. Did she tell you all about that? Performance is important for Mr. Yoshida right now, right?","text":"Luật sư.\nTôi tưởng cậu là gián điệp không đó.\nCậu có nghe ngóng được gì không?\nDạ có.\nHóa ra tình hình nội bộ Shimizu cũng có vấn đề.\nCô ấy kể hết cho cậu nghe hả?\nVâng.\nHiện giờ, thành tích rất quan trọng với trưởng phòng Yoshida, đúng không?\n감사합니다.\n유시다 부장님은 실적이 중요한 상황이라고 했죠?\n네\nAttorney. Excuse me, could I have some water?­ I thought you were a spy. Did you hear anything useful? Yes. It turns out Shimizu also has an internal situation. Did she tell you all about that? Performance is important for Mr. Yoshida right now, right?","sourceUid":"merged-mrgj7ssr-57","sourceNo":103},{"id":48,"readerNo":49,"displayNo":106,"n":106,"type":"narration","vi":"Tiền đặt cọc cần thiết là bao nhiêu nhỉ?\nNếu áp dụng tỷ lệ chiết khấu 40% cho 9.000 sản phẩm, tiền đặt cọc là 16,666%.","ko":"필요한 계약금이 얼마라고 했죠?\n9,000개 기준 할인율 40% 적용받으면 16.666%입니다","en":"What was the needed deposit again?\nBased on an order of 9000, with a 40% discount,\nit would be 16.666%.","text":"Tiền đặt cọc cần thiết là bao nhiêu nhỉ?\nNếu áp dụng tỷ lệ chiết khấu 40% cho 9.000 sản phẩm, tiền đặt cọc là 16,666%.\n필요한 계약금이 얼마라고 했죠?\n9,000개 기준 할인율 40% 적용받으면 16.666%입니다\nWhat was the needed deposit again?\nBased on an order of 9000, with a 40% discount,\nit would be 16.666%.","sourceUid":"merged-mrgjbztv-58","sourceNo":106},{"id":49,"readerNo":50,"displayNo":108,"n":108,"type":"narration","vi":"Còn chiết khấu 50% thì sao?\nĐể được chiết khấu 50%,\nsố lượng đặt hàng phải vượt quá 10.000 sản phẩm.\nVâng.","ko":"할인율을 50%로 적용하면요?\n할인율 50%를 받으려면 주문량이 1만 개는 넘어야 하는데요\n네","en":"How about a 50% discount?\nIf we want a 50% discount,\nwe'd need to order more than 10,000.\nYes.","text":"Còn chiết khấu 50% thì sao?\nĐể được chiết khấu 50%,\nsố lượng đặt hàng phải vượt quá 10.000 sản phẩm.\nVâng.\n할인율을 50%로 적용하면요?\n할인율 50%를 받으려면 주문량이 1만 개는 넘어야 하는데요\n네\nHow about a 50% discount?\nIf we want a 50% discount,\nwe'd need to order more than 10,000.\nYes.","sourceUid":"merged-mrgjdmyd-59","sourceNo":108},{"id":50,"readerNo":51,"displayNo":111,"n":111,"type":"narration","vi":"Tiền đặt cọc sẽ là 18%.\nCỡ đó chắc ổn rồi.","ko":"계약금 18%입니다\n감사합니다.\n그 정도면 괜찮겠네요.","en":"It would be a deposit of 18%.\nThat would be a good amount.","text":"Tiền đặt cọc sẽ là 18%.\nCỡ đó chắc ổn rồi.\n계약금 18%입니다\n감사합니다.\n그 정도면 괜찮겠네요.\nIt would be a deposit of 18%.\nThat would be a good amount.","sourceUid":"merged-mrgjf5xs-61","sourceNo":111},{"id":51,"readerNo":52,"displayNo":114,"n":114,"type":"narration","vi":"Tôi đặt lịch cuộc họp với họ nhé?\nKhông. Để tôi gặp trưởng phòng Yoshida trước đã.\nVâng.","ko":"미팅 잡을까요?\n아니요. 요시타 부장님은 제가 먼저 만나볼게요.\n네.","en":"Should I set up a meeting?\nNo. I'll meet with Mr. Yoshida first.\nOkay.","text":"Tôi đặt lịch cuộc họp với họ nhé?\nKhông. Để tôi gặp trưởng phòng Yoshida trước đã.\nVâng.\n미팅 잡을까요?\n아니요. 요시타 부장님은 제가 먼저 만나볼게요.\n네.\nShould I set up a meeting?\nNo. I'll meet with Mr. Yoshida first.\nOkay.","sourceUid":"merged-mrgjgjq8-62","sourceNo":114},{"id":52,"readerNo":53,"displayNo":117,"n":117,"type":"narration","vi":"Tôi đi gọi điện thoại một lát rồi quay lại ngay.\nTổ trưởng Yoon, mọi chuyện ổn chứ?\nVâng, giám đốc. Chúng tôi vẫn đang tiến hành.\nTôi có một việc muốn nhờ anh.\nVâng.","ko":"저 잠시 통화 좀 해볼게요.\n윤팀장님, 어떻게 뭐 잘 되고 있어요?\n네, 대표님. 진행 중인데요.\n부탁드릴 게 있어서요.\n네.","en":"I'll go make a call. Be right back.\nMr. Yun, is everything going well?\nYes, CEO. We're in the process.\nI had something to ask of you.\nOkay.","text":"Tôi đi gọi điện thoại một lát rồi quay lại ngay.\nTổ trưởng Yoon, mọi chuyện ổn chứ?\nVâng, giám đốc. Chúng tôi vẫn đang tiến hành.\nTôi có một việc muốn nhờ anh.\nVâng.\n저 잠시 통화 좀 해볼게요.\n윤팀장님, 어떻게 뭐 잘 되고 있어요?\n네, 대표님. 진행 중인데요.\n부탁드릴 게 있어서요.\n네.\nI'll go make a call. Be right back.\nMr. Yun, is everything going well?\nYes, CEO. We're in the process.\nI had something to ask of you.\nOkay.","sourceUid":"merged-mrgjjsoj-64","sourceNo":117},{"id":53,"readerNo":54,"displayNo":122,"n":122,"type":"narration","vi":"Tôi muốn hỏi xem chúng ta có thể tăng tiền cọc lên và trả trước được không.\nBao nhiêu?\n20% ạ.","ko":"저희가 계약금을 좀 높여서 선지급을 할 수 있을까 해서요.\n아, 얼마나?\n20%입니다.","en":"I was wondering if we could pay a higher deposit early.\nHow much?\nTwenty percent.","text":"Tôi muốn hỏi xem chúng ta có thể tăng tiền cọc lên và trả trước được không.\nBao nhiêu?\n20% ạ.\n저희가 계약금을 좀 높여서 선지급을 할 수 있을까 해서요.\n아, 얼마나?\n20%입니다.\nI was wondering if we could pay a higher deposit early.\nHow much?\nTwenty percent.","sourceUid":"merged-mrgjld8x-65","sourceNo":122},{"id":54,"readerNo":55,"displayNo":125,"n":125,"type":"narration","vi":"Và phải thanh toán trong tháng này.\nTrong tháng này thì chúng tôi không đủ tiền đâu, tổ trưởng Yoon.\nVậy thì giám đốc ơi,\ntôi muốn nhờ anh việc khác.","ko":"이번 달 안에 지급해야 하는 조건이고요.\n아, 이달 안에 저희가 그 정도의 연후 없습니다, 팀장님.\n아\n그러면 대표님, 제가 다른 부탁을 좀 드릴게요.","en":"We'd have to pay it this month. We don't have that much funds this month, Mr. Yun. Then, CEO, let me make a different request.","text":"Và phải thanh toán trong tháng này.\nTrong tháng này thì chúng tôi không đủ tiền đâu, tổ trưởng Yoon.\nVậy thì giám đốc ơi,\ntôi muốn nhờ anh việc khác.\n이번 달 안에 지급해야 하는 조건이고요.\n아, 이달 안에 저희가 그 정도의 연후 없습니다, 팀장님.\n아\n그러면 대표님, 제가 다른 부탁을 좀 드릴게요.\nWe'd have to pay it this month. We don't have that much funds this month, Mr. Yun. Then, CEO, let me make a different request.","sourceUid":"merged-mrgjnw2k-66","sourceNo":125},{"id":55,"readerNo":56,"displayNo":129,"n":129,"type":"narration","vi":"Về tiền đặt cọc thì anh có thể đề nghị trụ sở chính hỗ trợ tài chính ngắn hạn.\nCó điều...\nanh đừng tìm gặp giám đốc Ha,\nmà tốt nhất là nên nói chuyện trực tiếp với Chủ tịch luôn.","ko":"그 계약금은 본사에서 단기 자금 지원을 요청하시면 될 겁니다.\n다만 하조모님을 찾아가시지 말고 회장님을 직접 뵙고 말씀드리는 게 좋을 것 같습니다.","en":"You can request short-term funding from HQ.\nJust make sure...\nyou don't go to Mr. Ha.\nIt'd be best if you spoke to the chairman directly.","text":"Về tiền đặt cọc thì anh có thể đề nghị trụ sở chính hỗ trợ tài chính ngắn hạn.\nCó điều...\nanh đừng tìm gặp giám đốc Ha,\nmà tốt nhất là nên nói chuyện trực tiếp với Chủ tịch luôn.\n그 계약금은 본사에서 단기 자금 지원을 요청하시면 될 겁니다.\n다만 하조모님을 찾아가시지 말고 회장님을 직접 뵙고 말씀드리는 게 좋을 것 같습니다.\nYou can request short-term funding from HQ.\nJust make sure...\nyou don't go to Mr. Ha.\nIt'd be best if you spoke to the chairman directly.","sourceUid":"merged-mrgjqrcx-67","sourceNo":129},{"id":56,"readerNo":57,"displayNo":131,"n":131,"type":"narration","vi":"Nhưng về vấn đề cấp vốn,\ngiám đốc Ha là giám đốc tài chính mà.\nTôi gặp trực tiếp Chủ tịch có khác nào vượt mặt giám đốc Ha đâu.","ko":"아니, 자금이면 하조모님이 CF시잖아요. 근데 제가 바로 회장님께 말씀드리면 하조모님 건너뛰는 셈인데.","en":"But... as for funding,\nMr. Ha is the CFO.\nIf I tell the chairman directly,\nthat'd be like skipping past Mr. Ha.","text":"Nhưng về vấn đề cấp vốn,\ngiám đốc Ha là giám đốc tài chính mà.\nTôi gặp trực tiếp Chủ tịch có khác nào vượt mặt giám đốc Ha đâu.\n아니, 자금이면 하조모님이 CF시잖아요. 근데 제가 바로 회장님께 말씀드리면 하조모님 건너뛰는 셈인데.\nBut... as for funding,\nMr. Ha is the CFO.\nIf I tell the chairman directly,\nthat'd be like skipping past Mr. Ha.","sourceUid":"merged-mrh554g8-2","sourceNo":131},{"id":57,"readerNo":58,"displayNo":133,"n":133,"type":"narration","vi":"Vâng, đúng là vậy,\nnhưng tình hình trụ sở chính hiện tại hơi phức tạp.\nTôi nghĩ tốt nhất là lần này anh nên nói trực tiếp với Chủ tịch.\nVà sẵn tiện, tình cờ gặp Chủ tịch trong sảnh để nói thì càng hay.","ko":"네 그렇긴 한데요. 지금 본사 사정이 조금 복잡해서요. 이번만큼은 회장님을 직접 뵙고 말씀드리는 게 좋을 것 같습니다. 이왕이면 로비에서 우연히 만나시는 게 좋을 것 같고요.","en":"Yes, that's true,\nbut our current situation at HQ is a bit messy.\nI think it's best you tell the chairman\ndirectly this time.\nAnd even better to naturally run\ninto the chairman in the lobby.","text":"Vâng, đúng là vậy,\nnhưng tình hình trụ sở chính hiện tại hơi phức tạp.\nTôi nghĩ tốt nhất là lần này anh nên nói trực tiếp với Chủ tịch.\nVà sẵn tiện, tình cờ gặp Chủ tịch trong sảnh để nói thì càng hay.\n네 그렇긴 한데요. 지금 본사 사정이 조금 복잡해서요. 이번만큼은 회장님을 직접 뵙고 말씀드리는 게 좋을 것 같습니다. 이왕이면 로비에서 우연히 만나시는 게 좋을 것 같고요.\nYes, that's true,\nbut our current situation at HQ is a bit messy.\nI think it's best you tell the chairman\ndirectly this time.\nAnd even better to naturally run\ninto the chairman in the lobby.","sourceUid":"merged-mrh56lse-3","sourceNo":133},{"id":58,"readerNo":59,"displayNo":134,"n":134,"type":"narration","vi":"Chào Chủ tịch. Ồ. Có chuyện gì vậy? Xin lỗi Chủ tịch. Đáng lẽ tôi phải quản lý tốt hơn... Trời ạ, anh nói gì vậy? Anh lo làm tốt việc sản xuất là được. Việc bán hàng đã có chúng tôi lo rồi mà.","ko":"회장님\n왜 그래요?\n죄송합니다\n제가 운영을 잘했어야 했는데\n만들거나 잘 만들어라 그래\n파는 거 우리가 알아서 잘 판다고 하더라","en":"Chairman. Oh, hey. I'm sorry. I should've managed the business better. Gosh, what are you saying? Just focus on making good products. Didn't we say we'd handle the sales?","text":"Chào Chủ tịch. Ồ. Có chuyện gì vậy? Xin lỗi Chủ tịch. Đáng lẽ tôi phải quản lý tốt hơn... Trời ạ, anh nói gì vậy? Anh lo làm tốt việc sản xuất là được. Việc bán hàng đã có chúng tôi lo rồi mà.\n회장님\n왜 그래요?\n죄송합니다\n제가 운영을 잘했어야 했는데\n만들거나 잘 만들어라 그래\n파는 거 우리가 알아서 잘 판다고 하더라\nChairman. Oh, hey. I'm sorry. I should've managed the business better. Gosh, what are you saying? Just focus on making good products. Didn't we say we'd handle the sales?","sourceUid":"merged-mrh6p6d1-5","sourceNo":134},{"id":59,"readerNo":60,"displayNo":140,"n":140,"type":"narration","vi":"Nhưng tôi nghe nói Chủ tịch rất tức giận vì vụ niêm yết.\nKhông đâu. Tức giận gì chứ.\nSao vậy? Anh có gì muốn nói với tôi à?\nTôi nghe nói sẽ ký hợp đồng với điều kiện tăng tiền đặt cọc.\nAi nói vậy? Tổ trưởng nào nói à?","ko":"그래도요\n상장 때문에 화가 많이 나셨다고\n화내 이 사람은\n그 계약금을 좀 높이는 조건으로 계약이 될 거라고 하더라고요.\n누가 그래 뭐 팀장이 그라더?","en":"Still,\nI heard you were furious over the listing issue.\nFurious? No...\nWhat is it? Do you have something to tell me?\nI was told they could close the deal by raising the deposit.\nWho told you that? Was it the Team Leader?","text":"Nhưng tôi nghe nói Chủ tịch rất tức giận vì vụ niêm yết.\nKhông đâu. Tức giận gì chứ.\nSao vậy? Anh có gì muốn nói với tôi à?\nTôi nghe nói sẽ ký hợp đồng với điều kiện tăng tiền đặt cọc.\nAi nói vậy? Tổ trưởng nào nói à?\n그래도요\n상장 때문에 화가 많이 나셨다고\n화내 이 사람은\n그 계약금을 좀 높이는 조건으로 계약이 될 거라고 하더라고요.\n누가 그래 뭐 팀장이 그라더?\nStill,\nI heard you were furious over the listing issue.\nFurious? No...\nWhat is it? Do you have something to tell me?\nI was told they could close the deal by raising the deposit.\nWho told you that? Was it the Team Leader?","sourceUid":"merged-mrh6xo5u-8","sourceNo":140},{"id":60,"readerNo":61,"displayNo":145,"n":145,"type":"narration","vi":"Vâng, tổ trưởng Yoon Joo No.\nNếu tăng tiền đặt cọc,\nthì phải giảm tổng tiền chứ, đúng không?\nVâng.","ko":"예, 윤준호 팀장이.\n아이고야. 그러면 뭐 계약금을 이렇게 높이면\n총액은 깎아야지. 안 골라?\n예.","en":"- Yes, Team Leader Yun Ju No. - Aigoo...\nWell, if I increase the deposit,\nthe total sum should be reduced, right?\nYes.","text":"Vâng, tổ trưởng Yoon Joo No.\nNếu tăng tiền đặt cọc,\nthì phải giảm tổng tiền chứ, đúng không?\nVâng.\n예, 윤준호 팀장이.\n아이고야. 그러면 뭐 계약금을 이렇게 높이면\n총액은 깎아야지. 안 골라?\n예.\n- Yes, Team Leader Yun Ju No. - Aigoo...\nWell, if I increase the deposit,\nthe total sum should be reduced, right?\nYes.","sourceUid":"merged-mrh7097u-11","sourceNo":145},{"id":61,"readerNo":62,"displayNo":149,"n":149,"type":"narration","vi":"Bảo cấp tiền cho anh ấy đi.\nVâng.\nDạo này có vẻ anh tập thể dục nhiều lắm nhỉ.","ko":"어, 추락해라.\n네.\n아이고야. 요즘 그래 운동 좀 많이 한갑네.","en":"Provide him with the funds.\nOkay.\nAigoo, I guess you work out a lot these days.","text":"Bảo cấp tiền cho anh ấy đi.\nVâng.\nDạo này có vẻ anh tập thể dục nhiều lắm nhỉ.\n어, 추락해라.\n네.\n아이고야. 요즘 그래 운동 좀 많이 한갑네.\nProvide him with the funds.\nOkay.\nAigoo, I guess you work out a lot these days.","sourceUid":"merged-mrh726m2-12","sourceNo":149},{"id":62,"readerNo":63,"displayNo":152,"n":152,"type":"narration","vi":"Nhìn đùi anh kìa. Vẫn phong độ ghê.\nPhải rồi.","ko":"고 보이면 허벅지 살아있네.\n그래.","en":"Look at your thighs. You've still got it.\nYes, well...","text":"Nhìn đùi anh kìa. Vẫn phong độ ghê.\nPhải rồi.\n고 보이면 허벅지 살아있네.\n그래.\nLook at your thighs. You've still got it.\nYes, well...","sourceUid":"merged-mrh73evt-13","sourceNo":152},{"id":63,"readerNo":64,"displayNo":154,"n":154,"type":"narration","vi":"Người thể lực tốt thì làm ăn cũng tốt.\nÔi chà.\nUống đi.","ko":"체력이 좋은 놈이 사업도 잘한다.\n아이고야.\n들어.","en":"those with good stamina also do well in business.\nDrink.","text":"Người thể lực tốt thì làm ăn cũng tốt.\nÔi chà.\nUống đi.\n체력이 좋은 놈이 사업도 잘한다.\n아이고야.\n들어.\nthose with good stamina also do well in business.\nDrink.","sourceUid":"merged-mrh74i87-14","sourceNo":154},{"id":64,"readerNo":65,"displayNo":157,"n":157,"type":"narration","vi":"Chủ tịch bảo tiến hành đi.\nVâng.","ko":"회장님이 진행하라고 하십니다.\n그래.","en":"The chairman says to proceed.\nOkay.","text":"Chủ tịch bảo tiến hành đi.\nVâng.\n회장님이 진행하라고 하십니다.\n그래.\nThe chairman says to proceed.\nOkay.","sourceUid":"merged-mrh75n0o-15","sourceNo":157},{"id":65,"readerNo":66,"displayNo":159,"n":159,"type":"narration","vi":"Đây là phòng thư ký.\nTrưởng nhóm kế hoạch có ở đó không ạ?\nVâng, cô nói đi.","ko":"비서실인데요. 기획팀장님 계신가요? 네 말씀하세요.","en":"This is the secretary's office.\nIs the Planning Team Leader there?\nYes, go ahead.","text":"Đây là phòng thư ký.\nTrưởng nhóm kế hoạch có ở đó không ạ?\nVâng, cô nói đi.\n비서실인데요. 기획팀장님 계신가요? 네 말씀하세요.\nThis is the secretary's office.\nIs the Planning Team Leader there?\nYes, go ahead.","sourceUid":"merged-mrh76qpy-16","sourceNo":159},{"id":66,"readerNo":67,"displayNo":161,"n":161,"type":"narration","vi":"Nhưng đây có đúng là chỉ thị của Chủ tịch không ạ?\nVâng, tôi hiểu rồi. Vâng.\nÔng ấy đã chấp thuận ngay lập tức đúng như tổ trưởng Yoon nói.","ko":"근데 이거 회장님께서 지시한 게 맞아요?\n아, 팀장님 말씀대로 바로 회의 하시대요.","en":"But was this really the chairman's order?\nYes, I understand. Okay.\nHe approved it right away, as you said.","text":"Nhưng đây có đúng là chỉ thị của Chủ tịch không ạ?\nVâng, tôi hiểu rồi. Vâng.\nÔng ấy đã chấp thuận ngay lập tức đúng như tổ trưởng Yoon nói.\n근데 이거 회장님께서 지시한 게 맞아요?\n아, 팀장님 말씀대로 바로 회의 하시대요.\nBut was this really the chairman's order?\nYes, I understand. Okay.\nHe approved it right away, as you said.","sourceUid":"merged-mrh7i3mf-17","sourceNo":161},{"id":67,"readerNo":68,"displayNo":163,"n":163,"type":"narration","vi":"Tốt rồi. Anh vất vả rồi.\nNhưng ông ấy bảo giảm giá một chút.","ko":"잘 되네요. 고생하셨습니다.\n근데 가격을 좀 아까우라고 하시대요.","en":"That's good. Great work.\nBut he said to lower the price a bit.","text":"Tốt rồi. Anh vất vả rồi.\nNhưng ông ấy bảo giảm giá một chút.\n잘 되네요. 고생하셨습니다.\n근데 가격을 좀 아까우라고 하시대요.\nThat's good. Great work.\nBut he said to lower the price a bit.","sourceUid":"merged-mrh7l00w-18","sourceNo":163},{"id":68,"readerNo":69,"displayNo":165,"n":165,"type":"narration","vi":"Chốt hợp đồng đã khó rồi.\nGiờ lại đòi giảm giá nữa không biết có được không.\nAnh nên mau chóng rời khỏi đó trước khi giám đốc Ha đến đấy.\nPhải cố làm cho được thôi.\nVâng, tôi biết rồi.","ko":"아니, 계약 자체가 힘들 텐데 가격 간다기면 뭐 가능이나 하시지.\n해내야죠.\n서두르셔야 할 것 같아요.\n하정무님 오시기 전에.\n아, 그래?","en":"Closing the deal is hard enough.\nI don't know if you can lower the price.\nI'll need to make it happen.\nYou should hurry on out before Mr. Ha comes.\nYes, I know...","text":"Chốt hợp đồng đã khó rồi.\nGiờ lại đòi giảm giá nữa không biết có được không.\nAnh nên mau chóng rời khỏi đó trước khi giám đốc Ha đến đấy.\nPhải cố làm cho được thôi.\nVâng, tôi biết rồi.\n아니, 계약 자체가 힘들 텐데 가격 간다기면 뭐 가능이나 하시지.\n해내야죠.\n서두르셔야 할 것 같아요.\n하정무님 오시기 전에.\n아, 그래?\nClosing the deal is hard enough.\nI don't know if you can lower the price.\nI'll need to make it happen.\nYou should hurry on out before Mr. Ha comes.\nYes, I know...","sourceUid":"merged-mrh7nm75-20","sourceNo":165},{"id":69,"readerNo":70,"displayNo":170,"n":170,"type":"narration","vi":"Này, giám đốc Park!\nAnh làm gì vậy hả?","ko":"박 대표!\n당신 뭐하는 거야?","en":"Hey, CEO Park!\nWhat's wrong with you!","text":"Này, giám đốc Park!\nAnh làm gì vậy hả?\n박 대표!\n당신 뭐하는 거야?\nHey, CEO Park!\nWhat's wrong with you!","sourceUid":"merged-mrh7pimg-21","sourceNo":170},{"id":70,"readerNo":71,"displayNo":174,"n":174,"type":"narration","vi":"Nếu anh muốn vay tiền từ trụ sở chính,\nanh phải đến gặp giám đốc tài chính là tôi chứ.\nAnh là ai mà dám gặp thẳng Chủ tịch hả?\nTôi đến để gặp giám đốc Ha đó chứ.","ko":"본사에 돈을 빌리러 왔으면 당연히 CFO인 나를 찾아왔어야지\n당신이 뭔데 회장님한테 바로\n아니 전문의 뵈러 왔는데요","en":"If you came to HQ to borrow money,\nyou should've come to me, the CFO!\nWho are you to go directly to the chairman—\nI did come to see you, Mr. Ha.","text":"Nếu anh muốn vay tiền từ trụ sở chính,\nanh phải đến gặp giám đốc tài chính là tôi chứ.\nAnh là ai mà dám gặp thẳng Chủ tịch hả?\nTôi đến để gặp giám đốc Ha đó chứ.\n본사에 돈을 빌리러 왔으면 당연히 CFO인 나를 찾아왔어야지\n당신이 뭔데 회장님한테 바로\n아니 전문의 뵈러 왔는데요\nIf you came to HQ to borrow money,\nyou should've come to me, the CFO!\nWho are you to go directly to the chairman—\nI did come to see you, Mr. Ha.","sourceUid":"merged-mrh7sga8-24","sourceNo":174},{"id":71,"readerNo":72,"displayNo":175,"n":175,"type":"narration","vi":"Nhưng tôi tình cờ gặp Chủ tịch ở sảnh.\nÔng ấy hỏi tôi đến đây làm gì,\nnên tôi không còn cách nào khác là phải nói với ông ấy.","ko":"로비에서 회장님을 만나는 바람에 왜 왔냐고 물어보신데\n대답을 안 할 수도 없거든요","en":"But I happened to run into the chairman in the lobby.\nHe asked me why I came\nso I had no choice but to tell him.","text":"Nhưng tôi tình cờ gặp Chủ tịch ở sảnh.\nÔng ấy hỏi tôi đến đây làm gì,\nnên tôi không còn cách nào khác là phải nói với ông ấy.\n로비에서 회장님을 만나는 바람에 왜 왔냐고 물어보신데\n대답을 안 할 수도 없거든요\nBut I happened to run into the chairman in the lobby.\nHe asked me why I came\nso I had no choice but to tell him.","sourceUid":"merged-mrh7u82n-25","sourceNo":175},{"id":72,"readerNo":73,"displayNo":177,"n":177,"type":"narration","vi":"Vậy họ đã chốt hợp đồng chưa?\nHình như là chưa.","ko":"그래서 계약했대요?\n아직은 아닌 것 같고요","en":"So did they close the deal?\nI don't think they did yet.","text":"Vậy họ đã chốt hợp đồng chưa?\nHình như là chưa.\n그래서 계약했대요?\n아직은 아닌 것 같고요\nSo did they close the deal?\nI don't think they did yet.","sourceUid":"merged-mrh7vl7s-26","sourceNo":177},{"id":73,"readerNo":74,"displayNo":179,"n":179,"type":"narration","vi":"Tôi nghe nói có vẻ cần phải tăng tiền đặt cọc lên.\nHạn chót để đưa ra quyết định là ngày mai còn gì.\nTôi sẽ trình phê duyệt hồ sơ thanh toán vào ngày mai.","ko":"계약금을 좀 올려줘야 될 것 같다고 그러더라고요\n내일까지 결정이 나야 되는 거잖아\n내일 결정서를 올리겠습니다 전문의","en":"I hear they might need to increase the deposit.\nA decision needs to be made by tomorrow.\nI'll submit the transaction approval tomorrow.","text":"Tôi nghe nói có vẻ cần phải tăng tiền đặt cọc lên.\nHạn chót để đưa ra quyết định là ngày mai còn gì.\nTôi sẽ trình phê duyệt hồ sơ thanh toán vào ngày mai.\n계약금을 좀 올려줘야 될 것 같다고 그러더라고요\n내일까지 결정이 나야 되는 거잖아\n내일 결정서를 올리겠습니다 전문의\nI hear they might need to increase the deposit.\nA decision needs to be made by tomorrow.\nI'll submit the transaction approval tomorrow.","sourceUid":"merged-mrh7wp6o-28","sourceNo":179},{"id":74,"readerNo":75,"displayNo":182,"n":182,"type":"narration","vi":"Cảm ơn anh đã phản hồi cuộc gọi khẩn cấp như vậy.\nKhông có gì.\nCảm ơn anh đã gọi cho tôi.","ko":"영상편집 및 자막이 도움이 되셨다면 구독과 좋아요 부탁드립니다.\nThank you for responding to such an urgent call.\nNo problem. Thank you for your call.","en":"Thank you for responding to such an urgent call.\nNo problem. Thank you for your call.","text":"Cảm ơn anh đã phản hồi cuộc gọi khẩn cấp như vậy.\nKhông có gì.\nCảm ơn anh đã gọi cho tôi.\n영상편집 및 자막이 도움이 되셨다면 구독과 좋아요 부탁드립니다.\nThank you for responding to such an urgent call.\nNo problem. Thank you for your call.\nThank you for responding to such an urgent call.\nNo problem. Thank you for your call.","sourceUid":"merged-mrh7yb42-30","sourceNo":182},{"id":75,"readerNo":76,"displayNo":185,"n":185,"type":"narration","vi":"Tôi thích trà Nhật truyền thống hơn cà phê.\nAnh uống được chứ?\nTôi muốn anh có những trải nghiệm đậm chất Nhật Bản khi ở đây.","ko":"I prefer traditional Japanese tea over coffee.\nIs that alright with you?\nI wanted you to experience Japan while you're here.","en":"I prefer traditional Japanese tea over coffee.\nIs that alright with you?\nIs that all right with you?\nI wanted you to experience Japan while you're here.","text":"Tôi thích trà Nhật truyền thống hơn cà phê.\nAnh uống được chứ?\nTôi muốn anh có những trải nghiệm đậm chất Nhật Bản khi ở đây.\nI prefer traditional Japanese tea over coffee.\nIs that alright with you?\nI wanted you to experience Japan while you're here.\nI prefer traditional Japanese tea over coffee.\nIs that alright with you?\nIs that all right with you?\nI wanted you to experience Japan while you're here.","sourceUid":"merged-mrh7ztvz-31","sourceNo":185},{"id":76,"readerNo":77,"displayNo":188,"n":188,"type":"narration","vi":"Vâng. Cảm ơn anh.\nChúng tôi đề xuất mua một số lượng lớn đáng kể,\nkhoảng gấp mười lần số lượng ban đầu,\nvà chúng tôi tin rằng đó sẽ là một lời đề nghị có lợi cho Shimizu.","ko":"Of course, I appreciate it.\nWe proposed purchasing a significantly larger quantity, around 10 times the original amount, believing it would be a favorable offer for Shimizu.","en":"Of course, I appreciate it.\nOf course. I appreciate it.\nWe proposed purchasing a significantly larger quantity, around 10 times the original amount, believing it would be a favorable offer for Shimizu.","text":"Vâng. Cảm ơn anh.\nChúng tôi đề xuất mua một số lượng lớn đáng kể,\nkhoảng gấp mười lần số lượng ban đầu,\nvà chúng tôi tin rằng đó sẽ là một lời đề nghị có lợi cho Shimizu.\nOf course, I appreciate it.\nWe proposed purchasing a significantly larger quantity, around 10 times the original amount, believing it would be a favorable offer for Shimizu.\nOf course, I appreciate it.\nOf course. I appreciate it.\nWe proposed purchasing a significantly larger quantity, around 10 times the original amount, believing it would be a favorable offer for Shimizu.","sourceUid":"merged-mrh81nmp-32","sourceNo":188},{"id":77,"readerNo":78,"displayNo":190,"n":190,"type":"narration","vi":"Tuy nhiên,\ncó vẻ như chúng tôi đã xem nhẹ sự khác biệt văn hóa\ngiữa Nhật Bản và Hàn Quốc.\nVâng.","ko":"네, 문화에 관한 문화에 관한 문화가 있다면 도움이 될 것입니다.","en":"However,\nHowever, it seems we may have underestimated the cultural differences between Japan and South Korea.\nYes.","text":"Tuy nhiên,\ncó vẻ như chúng tôi đã xem nhẹ sự khác biệt văn hóa\ngiữa Nhật Bản và Hàn Quốc.\nVâng.\n네, 문화에 관한 문화에 관한 문화가 있다면 도움이 될 것입니다.\nHowever,\nHowever, it seems we may have underestimated the cultural differences between Japan and South Korea.\nYes.","sourceUid":"merged-mrh84fio-33","sourceNo":190},{"id":78,"readerNo":79,"displayNo":192,"n":192,"type":"narration","vi":"Nếu không hiểu rõ văn hóa thì có thể xảy ra chuyện đó. Cảm ơn anh đã thông cảm. Cảm ơn anh về tách trà này.","ko":"이해해 주셔서 감사합니다.","en":"It can happen if you are not familiar with the culture. Thank you for understanding. Thank you for the tea.","text":"Nếu không hiểu rõ văn hóa thì có thể xảy ra chuyện đó. Cảm ơn anh đã thông cảm. Cảm ơn anh về tách trà này.\n이해해 주셔서 감사합니다.\nIt can happen if you are not familiar with the culture. Thank you for understanding. Thank you for the tea.","sourceUid":"merged-mrh86tpm-34","sourceNo":192},{"id":79,"readerNo":80,"displayNo":301,"n":301,"type":"narration","vi":"Vậy...\nchúng tôi muốn hỏi anh\ncách đạt được thỏa thuận mà không làm mất lòng nhau.","ko":"그럼 우리는 적합한 결과를 얻을 수 있는 방법에 대해 질문을 하고 싶습니다.","en":"Then...\nwe would like to inquire\nabout how we can reach an agreement appropriately.","text":"Vậy...\nchúng tôi muốn hỏi anh\ncách đạt được thỏa thuận mà không làm mất lòng nhau.\n그럼 우리는 적합한 결과를 얻을 수 있는 방법에 대해 질문을 하고 싶습니다.\nThen...\nwe would like to inquire\nabout how we can reach an agreement appropriately.","sourceUid":"merged-mrh890ee-35","sourceNo":301},{"id":80,"readerNo":81,"displayNo":194,"n":194,"type":"narration","vi":"Về yêu cầu số lượng thì không phải không thực hiện được,\nnhưng vẫn có những lo ngại liên quan đến việc thay đổi lịch trình,\ncác vấn đề về trách nhiệm...\nChắc chắn rồi.","ko":"결과를 얻을 수 있는 방법은 적합한 결과를 얻을 수 있는 방법입니다.\n하지만, 계획에 관한 변화에 관한 문제, 책임성에 관한 문제 등이 있습니다.\n물론입니다.","en":"The requested quantity can be done, but there are concerns regarding the change in the schedule, issues of responsibility, and such. Sure.","text":"Về yêu cầu số lượng thì không phải không thực hiện được,\nnhưng vẫn có những lo ngại liên quan đến việc thay đổi lịch trình,\ncác vấn đề về trách nhiệm...\nChắc chắn rồi.\n결과를 얻을 수 있는 방법은 적합한 결과를 얻을 수 있는 방법입니다.\n하지만, 계획에 관한 변화에 관한 문제, 책임성에 관한 문제 등이 있습니다.\n물론입니다.\nThe requested quantity can be done, but there are concerns regarding the change in the schedule, issues of responsibility, and such. Sure.","sourceUid":"merged-mrh8n8dr-36","sourceNo":194},{"id":81,"readerNo":82,"displayNo":197,"n":197,"type":"narration","vi":"Chúng ta giải quyết những lo ngại đó bằng cách thanh toán trước thì sao?","ko":"그럼 우리는 그 문제에 대해서 앞서서 돈을 벌기 위해서 답변할 수 있을까요?","en":"How about we address those concerns\nby paying in advance?","text":"Chúng ta giải quyết những lo ngại đó bằng cách thanh toán trước thì sao?\n그럼 우리는 그 문제에 대해서 앞서서 돈을 벌기 위해서 답변할 수 있을까요?\nHow about we address those concerns\nby paying in advance?","sourceUid":"merged-mrh929wf-37","sourceNo":197},{"id":82,"readerNo":83,"displayNo":198,"n":198,"type":"narration","vi":"Nhưng tại sao tổ trưởng lại gặp riêng anh ấy vậy?\nĐể tôn trọng trưởng phòng Yoshida.\nSao làm thế lại là tôn trọng?","ko":"근데 팀장님은 왜 혼자서 만나시려는 거예요?\n요시다 부장님 배려해서요\n그게 왜 배려해요?","en":"But why did Mr. Yun meet with him by himself?\nTo be considerate of Mr. Yoshida.\nHow is that being considerate?","text":"Nhưng tại sao tổ trưởng lại gặp riêng anh ấy vậy?\nĐể tôn trọng trưởng phòng Yoshida.\nSao làm thế lại là tôn trọng?\n근데 팀장님은 왜 혼자서 만나시려는 거예요?\n요시다 부장님 배려해서요\n그게 왜 배려해요?\nBut why did Mr. Yun meet with him by himself?\nTo be considerate of Mr. Yoshida.\nHow is that being considerate?","sourceUid":"merged-mrh93652-38","sourceNo":198},{"id":83,"readerNo":84,"displayNo":201,"n":201,"type":"narration","vi":"Anh ấy biết việc ký hợp đồng với chúng ta tốt cho Shimizu,\nnhưng anh ấy đã từ chối vì việc thăng tiến của bản thân.","ko":"우리랑 계약하는 게 시미즈를 위해서 좋은 일이라는 거 알면서도\n본인의 영전을 위해서 거절한 거니까","en":"He knows signing a contract with us\nis good for Shimizu,\nbut he rejected it for his own promotion.","text":"Anh ấy biết việc ký hợp đồng với chúng ta tốt cho Shimizu,\nnhưng anh ấy đã từ chối vì việc thăng tiến của bản thân.\n우리랑 계약하는 게 시미즈를 위해서 좋은 일이라는 거 알면서도\n본인의 영전을 위해서 거절한 거니까\nHe knows signing a contract with us\nis good for Shimizu,\nbut he rejected it for his own promotion.","sourceUid":"merged-mrh94zqf-39","sourceNo":201},{"id":84,"readerNo":85,"displayNo":203,"n":203,"type":"narration","vi":"Nếu nói chuyện đó trước mặt người khác,\nthì sẽ ảnh hưởng đến thể diện của trưởng phòng Yoshida.","ko":"그걸 다른 사람들 앞에서 얘기하는 게 요시다 부장 체면이 좀 그렇지?","en":"So Mr. Yoshida would lose face\nto talk about it in front of others.","text":"Nếu nói chuyện đó trước mặt người khác,\nthì sẽ ảnh hưởng đến thể diện của trưởng phòng Yoshida.\n그걸 다른 사람들 앞에서 얘기하는 게 요시다 부장 체면이 좀 그렇지?\nSo Mr. Yoshida would lose face\nto talk about it in front of others.","sourceUid":"merged-mrh965j3-40","sourceNo":203},{"id":85,"readerNo":86,"displayNo":204,"n":204,"type":"narration","vi":"Em nghe nói người Nhật Bản rất coi trọng việc giữ thể diện.\nMà Hàn Quốc cũng y vậy thôi.","ko":"일본이 체면을 중요시한다고 하더라고요\n한국도 그런 편이지만","en":"I hear Japan cares a lot about saving face.\nWell, Korea is like that too.","text":"Em nghe nói người Nhật Bản rất coi trọng việc giữ thể diện.\nMà Hàn Quốc cũng y vậy thôi.\n일본이 체면을 중요시한다고 하더라고요\n한국도 그런 편이지만\nI hear Japan cares a lot about saving face.\nWell, Korea is like that too.","sourceUid":"merged-mrh98aj6-41","sourceNo":204},{"id":86,"readerNo":87,"displayNo":206,"n":206,"type":"narration","vi":"\"Thanh toán trước\" nghĩa là...\nanh đang nói đến thời hạn nào?","ko":"제안을 통해 제가 어떤 결과를 발표했는지 알 수 있을까요?","en":"By \"in advance,\"\nwhat deadline are you referring to?","text":"\"Thanh toán trước\" nghĩa là...\nanh đang nói đến thời hạn nào?\n제안을 통해 제가 어떤 결과를 발표했는지 알 수 있을까요?\nBy \"in advance,\"\nwhat deadline are you referring to?","sourceUid":"merged-mrh99kze-42","sourceNo":206},{"id":87,"readerNo":88,"displayNo":207,"n":207,"type":"narration","vi":"Dựa trên các điều khoản của hợp đồng hiện tại,\nchúng tôi dự kiến sẽ thanh toán 10% tiền trả trước vào tháng tới.","ko":"현재의 계약금에 따라, 다음 달에 10%의 절차금을 갚을 예정입니다.","en":"Based on the current contract terms,\nwe are expected to pay\n10% of the down payment next month.","text":"Dựa trên các điều khoản của hợp đồng hiện tại,\nchúng tôi dự kiến sẽ thanh toán 10% tiền trả trước vào tháng tới.\n현재의 계약금에 따라, 다음 달에 10%의 절차금을 갚을 예정입니다.\nBased on the current contract terms,\nwe are expected to pay\n10% of the down payment next month.","sourceUid":"merged-mrh9bdf5-44","sourceNo":207},{"id":88,"readerNo":89,"displayNo":208,"n":208,"type":"narration","vi":"Nhưng giờ chúng tôi muốn thanh toán 20% trong tháng này.","ko":"하지만 이번 달에 20%를 갚고 싶습니다.","en":"But we would like to pay 20%\nthis month instead.\nThis month?","text":"Nhưng giờ chúng tôi muốn thanh toán 20% trong tháng này.\n하지만 이번 달에 20%를 갚고 싶습니다.\nBut we would like to pay 20%\nthis month instead.\nThis month?","sourceUid":"merged-mrh9c5w7-45","sourceNo":208},{"id":89,"readerNo":90,"displayNo":209,"n":209,"type":"narration","vi":"Trong tháng này? Vâng. Ngoài ra,","ko":"이스라엘? 네, 추가적으로.","en":"Yes. Additionally,","text":"Trong tháng này? Vâng. Ngoài ra,\n이스라엘? 네, 추가적으로.\nYes. Additionally,","sourceUid":"merged-mrh9hi21-46","sourceNo":209},{"id":90,"readerNo":91,"displayNo":211,"n":211,"type":"narration","vi":"chúng tôi yêu cầu hủy đơn đặt hàng hiện tại là 1000 sản phẩm của Wind.\nThay vào đó, chúng tôi muốn lên đơn đặt hàng mới.","ko":"윈즈의 현재 1,000유니트 제한을 요청합니다.\n새로운 제한을 제시하고 싶습니다.","en":"we request the cancellation of Wind's current order of 1,000 units.\nWe would like to place a new order instead.","text":"chúng tôi yêu cầu hủy đơn đặt hàng hiện tại là 1000 sản phẩm của Wind.\nThay vào đó, chúng tôi muốn lên đơn đặt hàng mới.\n윈즈의 현재 1,000유니트 제한을 요청합니다.\n새로운 제한을 제시하고 싶습니다.\nwe request the cancellation of Wind's current order of 1,000 units.\nWe would like to place a new order instead.","sourceUid":"merged-mrh9lphi-48","sourceNo":211},{"id":91,"readerNo":92,"displayNo":215,"n":215,"type":"narration","vi":"Là vì chiết khấu, đúng không?\nDù sao thì đặt hàng từ 1.000 sản phẩm đến 10.000 sản phẩm,\nTôi nghĩ không cần làm vậy đâu.\ntỷ lệ chiết khấu vẫn là 40% thôi.","ko":"음...\n제한이 1,000에서 10,000유니트 이상으로\n제한이 40%로 똑같은데요.","en":"It is because of the discount, right?\nThat may not be a concern.\nFrom 1,000 to 10,000 units,\nthe discount rate is the same at 40% anyway.","text":"Là vì chiết khấu, đúng không?\nDù sao thì đặt hàng từ 1.000 sản phẩm đến 10.000 sản phẩm,\nTôi nghĩ không cần làm vậy đâu.\ntỷ lệ chiết khấu vẫn là 40% thôi.\n음...\n제한이 1,000에서 10,000유니트 이상으로\n제한이 40%로 똑같은데요.\nIt is because of the discount, right?\nThat may not be a concern.\nFrom 1,000 to 10,000 units,\nthe discount rate is the same at 40% anyway.","sourceUid":"merged-mrh9ob76-51","sourceNo":215},{"id":92,"readerNo":93,"displayNo":216,"n":216,"type":"narration","vi":"Không. Chúng tôi dự định đặt hàng 10.001 sản phẩm.\nTrong trường hợp đó,\nchúng tôi biết tỷ lệ chiết khấu sẽ là 50%.","ko":"No, we intend to order 10000원 units. In that case, we understand the discount rate would be 50%.","en":"No. We intend to order 10,001 units.\nIn that case,\nwe understand that the discount rate will be 50%.","text":"Không. Chúng tôi dự định đặt hàng 10.001 sản phẩm.\nTrong trường hợp đó,\nchúng tôi biết tỷ lệ chiết khấu sẽ là 50%.\nNo, we intend to order 10000원 units. In that case, we understand the discount rate would be 50%.\nNo. We intend to order 10,001 units.\nIn that case,\nwe understand that the discount rate will be 50%.","sourceUid":"merged-mrh9pb1a-53","sourceNo":216},{"id":93,"readerNo":94,"displayNo":217,"n":217,"type":"narration","vi":"Không phải điều đó nằm trong quy định của Shimizu sao?\nChúng tôi cần cân nhắc thêm về việc này.\nVâng.","ko":"이즈넷 히메쥬스맨\n우리는 카운스테이를 만나러 갈 것입니다.\n네.","en":"Isn't that Shimizu's manual?\nWe will need to consider it.\nYes.","text":"Không phải điều đó nằm trong quy định của Shimizu sao?\nChúng tôi cần cân nhắc thêm về việc này.\nVâng.\n이즈넷 히메쥬스맨\n우리는 카운스테이를 만나러 갈 것입니다.\n네.\nIsn't that Shimizu's manual?\nWe will need to consider it.\nYes.","sourceUid":"merged-mrhaleov-54","sourceNo":217},{"id":94,"readerNo":95,"displayNo":220,"n":220,"type":"narration","vi":"Nhưng như anh đã biết đó,\nhạn chót đang đến rất gần rồi.","ko":"하지만 아시다시피\n죽음은\n임신합니다.","en":"But as you know,\nthe deadline is imminent.","text":"Nhưng như anh đã biết đó,\nhạn chót đang đến rất gần rồi.\n하지만 아시다시피\n죽음은\n임신합니다.\nBut as you know,\nthe deadline is imminent.","sourceUid":"merged-mrhao9ic-56","sourceNo":220},{"id":95,"readerNo":96,"displayNo":223,"n":223,"type":"narration","vi":"Vâng, giám đốc.\nShimizu đã đồng ý với đề xuất của chúng ta.","ko":"네, 사모님. 시미즈 측에서 저의 제안을 받아들이기로 했습니다.","en":"Yes, Mr. Lee.\nShimizu decided to accept our offer.","text":"Vâng, giám đốc.\nShimizu đã đồng ý với đề xuất của chúng ta.\n네, 사모님. 시미즈 측에서 저의 제안을 받아들이기로 했습니다.\nYes, Mr. Lee.\nShimizu decided to accept our offer.","sourceUid":"merged-mrhcl3u2-57","sourceNo":223},{"id":96,"readerNo":97,"displayNo":224,"n":224,"type":"narration","vi":"May quá.\nChủ tịch chắc cũng sẽ bớt lo lắng.","ko":"다행이네. 회장님도 마음이 좀 누그러지시겠다.","en":"That's good.\nThe chairman should calm down a bit now.","text":"May quá.\nChủ tịch chắc cũng sẽ bớt lo lắng.\n다행이네. 회장님도 마음이 좀 누그러지시겠다.\nThat's good.\nThe chairman should calm down a bit now.","sourceUid":"merged-mrhcnpoy-58","sourceNo":224},{"id":97,"readerNo":98,"displayNo":225,"n":225,"type":"narration","vi":"Giám đốc ổn chứ ạ?","ko":"괜찮으시죠?","en":"You're okay, right?","text":"Giám đốc ổn chứ ạ?\n괜찮으시죠?\nYou're okay, right?","sourceUid":"merged-mrhcoblv-59","sourceNo":225},{"id":98,"readerNo":99,"displayNo":226,"n":226,"type":"narration","vi":"Tất nhiên là tôi ổn. Dù sao tôi cũng sắp nghỉ rồi mà.\nChỉ là tôi thấy có lỗi với cậu thôi.\nGiám đốc sắp nghỉ sao?","ko":"나야 괜찮지. 물러날 사람인데. 자네한테 미안해서 그러지.\n물러나신다고요?","en":"Of course, I'm okay. I'll step down soon, anyway.\nI just feel bad for you.\n- Are you stepping down? - I should.","text":"Tất nhiên là tôi ổn. Dù sao tôi cũng sắp nghỉ rồi mà.\nChỉ là tôi thấy có lỗi với cậu thôi.\nGiám đốc sắp nghỉ sao?\n나야 괜찮지. 물러날 사람인데. 자네한테 미안해서 그러지.\n물러나신다고요?\nOf course, I'm okay. I'll step down soon, anyway.\nI just feel bad for you.\n- Are you stepping down? - I should.","sourceUid":"merged-mrhcpnmz-60","sourceNo":226},{"id":99,"readerNo":100,"displayNo":228,"n":228,"type":"narration","vi":"Phải vậy chứ.\nTôi không thể làm việc mãi mãi được. Cậu cũng biết mà.","ko":"그래야지 내가 천년, 만년 일만 할 수는 없지 않겠나.\n너도 은퇴하고 좀 쉬어야지.","en":"I can't keep working like this forever, you know.\nI should retire and rest.","text":"Phải vậy chứ.\nTôi không thể làm việc mãi mãi được. Cậu cũng biết mà.\n그래야지 내가 천년, 만년 일만 할 수는 없지 않겠나.\n너도 은퇴하고 좀 쉬어야지.\nI can't keep working like this forever, you know.\nI should retire and rest.","sourceUid":"merged-mrhct08z-61","sourceNo":228},{"id":100,"readerNo":101,"displayNo":230,"n":230,"type":"narration","vi":"Đến lúc tôi nên nghỉ hưu và nghỉ ngơi rồi.\nNgay cả khi nghỉ hưu,\ngiám đốc cũng nên nghỉ trong sự chúc tụng nhỉ.\nDù sao cũng cảm ơn cậu đã nói vậy.","ko":"은퇴하시더라도 축하받으면서 하셔야죠.\n말이라도 고맙네.","en":"Even if you do retire,\nyou should do so while being celebrated.\nThank you for your kind words.","text":"Đến lúc tôi nên nghỉ hưu và nghỉ ngơi rồi.\nNgay cả khi nghỉ hưu,\ngiám đốc cũng nên nghỉ trong sự chúc tụng nhỉ.\nDù sao cũng cảm ơn cậu đã nói vậy.\n은퇴하시더라도 축하받으면서 하셔야죠.\n말이라도 고맙네.\nEven if you do retire,\nyou should do so while being celebrated.\nThank you for your kind words.","sourceUid":"merged-mrhcwi93-63","sourceNo":230},{"id":101,"readerNo":102,"displayNo":232,"n":232,"type":"narration","vi":"Cậu nghỉ ngơi đi.\nCô về nghỉ đi.\nVâng.","ko":"그럼 쉬게. 퇴원해야지. 네.","en":"Get some rest.\n[Lee Dong Jun]\nYou should go home now.\nYes.","text":"Cậu nghỉ ngơi đi.\nCô về nghỉ đi.\nVâng.\n그럼 쉬게. 퇴원해야지. 네.\nGet some rest.\n[Lee Dong Jun]\nYou should go home now.\nYes.","sourceUid":"merged-mrhd5k3d-64","sourceNo":232},{"id":102,"readerNo":103,"displayNo":236,"n":236,"type":"narration","vi":"À, Chủ tịch...\nCô nghĩ giờ có muộn quá không?\nTôi có việc phải báo cáo với ông ấy.\nTôi kiểm tra với phòng thư ký nhé?\nHay là để mai...","ko":"아, 회장님. 보고 드릴 게 있는데 늦었을라나?\n비서실에 확인해 볼까요? 아님 내일 하시는 게...","en":"Oh, the chairman...\nI have something to report to him.\nDo you think it's too late now?\nShould I check with the secretary's office?\nOr how about you do so tomorrow?","text":"À, Chủ tịch...\nCô nghĩ giờ có muộn quá không?\nTôi có việc phải báo cáo với ông ấy.\nTôi kiểm tra với phòng thư ký nhé?\nHay là để mai...\n아, 회장님. 보고 드릴 게 있는데 늦었을라나?\n비서실에 확인해 볼까요? 아님 내일 하시는 게...\nOh, the chairman...\nI have something to report to him.\nDo you think it's too late now?\nShould I check with the secretary's office?\nOr how about you do so tomorrow?","sourceUid":"merged-mrhd9gkq-66","sourceNo":236},{"id":103,"readerNo":104,"displayNo":237,"n":237,"type":"narration","vi":"Ừ.\nXin chào.\n(Câu lạc bộ cờ vây Jongno)\nÔi, lâu lắm rồi nhỉ.\n- Tại tôi bận công việc quá. - Vâng.","ko":"아이고 고맙네\n고맙습니다\n살리세요","en":"Okay.\nHello.\n[Jongno Go Club]\nAigoo, it's been a while.\n- I've been busy with work. - I see.","text":"Ừ.\nXin chào.\n(Câu lạc bộ cờ vây Jongno)\nÔi, lâu lắm rồi nhỉ.\n- Tại tôi bận công việc quá. - Vâng.\n아이고 고맙네\n고맙습니다\n살리세요\nOkay.\nHello.\n[Jongno Go Club]\nAigoo, it's been a while.\n- I've been busy with work. - I see.","sourceUid":"merged-mrhdar4d-67","sourceNo":237},{"id":104,"readerNo":105,"displayNo":241,"n":241,"type":"narration","vi":"Anh có đông khách không?\n- Có người ở đằng kia tìm anh. - Ồ, được rồi.","ko":"사진만 하시고\n좀 수고하십시오","en":"You've got a lot of customers?\n- Someone's over there for you. - Oh, okay.","text":"Anh có đông khách không?\n- Có người ở đằng kia tìm anh. - Ồ, được rồi.\n사진만 하시고\n좀 수고하십시오\nYou've got a lot of customers?\n- Someone's over there for you. - Oh, okay.","sourceUid":"merged-mrhdj0ju-68","sourceNo":241},{"id":105,"readerNo":106,"displayNo":314,"n":314,"type":"dialogue","vi":"(Con gái lớn của bố: Bố ơi, mua gà rán về nhé.)\n(Được.)","ko":"","en":"[My Eldest Daughter: Dad, bring some fried chicken with you.] [Okay.]","text":"(Con gái lớn của bố: Bố ơi, mua gà rán về nhé.)\n(Được.)\n[My Eldest Daughter: Dad, bring some fried chicken with you.] [Okay.]","sourceUid":"merged-mrhdlmk9-69","sourceNo":314},{"id":106,"readerNo":107,"displayNo":242,"n":242,"type":"narration","vi":"Đột nhiên tôi nhận được tin nhắn quan trọng.","ko":"어 중요한 연락이 와가지고","en":"I suddenly got an important message to check.","text":"Đột nhiên tôi nhận được tin nhắn quan trọng.\n어 중요한 연락이 와가지고\nI suddenly got an important message to check.","sourceUid":"merged-mrhdlsab-70","sourceNo":242},{"id":107,"readerNo":108,"displayNo":243,"n":243,"type":"narration","vi":"Sao giám đốc Ha lại muốn gặp tôi?","ko":"전문의께서 저를 뭔 일로 다 보자고","en":"So why did you ask to see me, Mr. Ha?","text":"Sao giám đốc Ha lại muốn gặp tôi?\n전문의께서 저를 뭔 일로 다 보자고\nSo why did you ask to see me, Mr. Ha?","sourceUid":"merged-mrhdnjsj-71","sourceNo":243},{"id":108,"readerNo":109,"displayNo":244,"n":244,"type":"narration","vi":"Tại tôi thấy lần trước giám đốc Oh vất vả nhiều rồi,\nnên tôi muốn an ủi một chút.\nAn ủi tôi sao?\nGiám đốc Oh đã khổ tâm nhiều mà.","ko":"아니 뭐 저번에 보니까 고생하시길래 위로라도 좀 해드리려고\n위로요?\n마음고생 많으시지 않습니까","en":"I noticed you were having a hard time last time,\nso I wanted to comfort you a bit.\nComfort me?\nI mean, you're going through a lot emotionally.","text":"Tại tôi thấy lần trước giám đốc Oh vất vả nhiều rồi,\nnên tôi muốn an ủi một chút.\nAn ủi tôi sao?\nGiám đốc Oh đã khổ tâm nhiều mà.\n아니 뭐 저번에 보니까 고생하시길래 위로라도 좀 해드리려고\n위로요?\n마음고생 많으시지 않습니까\nI noticed you were having a hard time last time,\nso I wanted to comfort you a bit.\nComfort me?\nI mean, you're going through a lot emotionally.","sourceUid":"merged-mrhdpjiy-73","sourceNo":244},{"id":109,"readerNo":110,"displayNo":247,"n":247,"type":"narration","vi":"Wind chẳng phải do giám đốc Ha mua lại sao?","ko":"윈드는 전무님이 사신 거 아니에요?","en":"Didn't you acquire Wind, Mr. Ha?","text":"Wind chẳng phải do giám đốc Ha mua lại sao?\n윈드는 전무님이 사신 거 아니에요?\nDidn't you acquire Wind, Mr. Ha?","sourceUid":"merged-mrhdq7v1-74","sourceNo":247},{"id":110,"readerNo":111,"displayNo":248,"n":248,"type":"narration","vi":"Đúng là vậy.\nVậy cậu cũng phải chịu trách nhiệm chứ. Sao lại có thể làm ngơ như vậy được?","ko":"그랬죠. 그럼 같이 책임을 주셔야지 이렇게 나몰라라는 건 좀 아니지 않습니까?","en":"I did.\nThen you should take responsibility, too.\nCompletely ignoring it is messed up, isn't it?","text":"Đúng là vậy.\nVậy cậu cũng phải chịu trách nhiệm chứ. Sao lại có thể làm ngơ như vậy được?\n그랬죠. 그럼 같이 책임을 주셔야지 이렇게 나몰라라는 건 좀 아니지 않습니까?\nI did.\nThen you should take responsibility, too.\nCompletely ignoring it is messed up, isn't it?","sourceUid":"merged-mrhdr18m-75","sourceNo":248},{"id":111,"readerNo":112,"displayNo":249,"n":249,"type":"narration","vi":"Làm ngơ gì chứ?\nChuyện niêm yết là do bộ phận IR phụ trách.\nGiám đốc Lee đã xin lỗi tôi rồi.\nVà tôi nói này, Wind chắc chắn sẽ được niêm yết.","ko":"뭐가 아니에요, 또. 상장은 IR팀에서 하는 건데.\n이 상무님은 저한테 미안하다고 하셨어요.\n그리고요, 윈드는요, 상장 될 겁니다.","en":"What do you mean, messed up?\nListing is the Investor Relations Team's responsibility.\nMr. Lee apologized to me.\nAlso, Wind...\nwill get listed.","text":"Làm ngơ gì chứ?\nChuyện niêm yết là do bộ phận IR phụ trách.\nGiám đốc Lee đã xin lỗi tôi rồi.\nVà tôi nói này, Wind chắc chắn sẽ được niêm yết.\n뭐가 아니에요, 또. 상장은 IR팀에서 하는 건데.\n이 상무님은 저한테 미안하다고 하셨어요.\n그리고요, 윈드는요, 상장 될 겁니다.\nWhat do you mean, messed up?\nListing is the Investor Relations Team's responsibility.\nMr. Lee apologized to me.\nAlso, Wind...\nwill get listed.","sourceUid":"merged-mrhdsm61-76","sourceNo":249},{"id":112,"readerNo":113,"displayNo":252,"n":252,"type":"narration","vi":"Trời ạ, giám đốc Oh.\nTrời đất ơi!\nVới cái kiểu này làm sao mà ông lên được chức giám đốc hay vậy?","ko":"아니, 대표님!\n이야, 아니 이런 눈치를 어떻게 임원까지 하셨을까?","en":"CEO.\nHow did you become an executive\nwhen you're so clueless?","text":"Trời ạ, giám đốc Oh.\nTrời đất ơi!\nVới cái kiểu này làm sao mà ông lên được chức giám đốc hay vậy?\n아니, 대표님!\n이야, 아니 이런 눈치를 어떻게 임원까지 하셨을까?\nCEO.\nHow did you become an executive\nwhen you're so clueless?","sourceUid":"merged-mrhdtqc2-77","sourceNo":252},{"id":113,"readerNo":114,"displayNo":254,"n":254,"type":"narration","vi":"Ý cậu là gì đấy?\nTôi nghe nói gần đây giám đốc Oh đã bị Chủ tịch mắng đúng không?","ko":"무슨 소리입니까?\n오 대표 얼마 전에 회장님한테 엄청 혼나셨다면서요.","en":"What are you talking about?\nI thought...\nyou heard an earful from the chairman recently.","text":"Ý cậu là gì đấy?\nTôi nghe nói gần đây giám đốc Oh đã bị Chủ tịch mắng đúng không?\n무슨 소리입니까?\n오 대표 얼마 전에 회장님한테 엄청 혼나셨다면서요.\nWhat are you talking about?\nI thought...\nyou heard an earful from the chairman recently.","sourceUid":"merged-mrhdw6du-79","sourceNo":254},{"id":114,"readerNo":115,"displayNo":256,"n":256,"type":"narration","vi":"Chủ tịch chỉ nóng giận nói vài câu thôi.\nNói thật ra có gì to tát đâu, mắng chửi cái gì chứ.","ko":"그냥 회장님이 욱하셔서 한마디 하신거지. 그리고 솔직히 그렇게 막 뭐라고 그러지도 않았어요. 무슨...","en":"He just lost his temper and took it out on me.\nAnd honestly,\nhe didn't really say that much! Goodness.","text":"Chủ tịch chỉ nóng giận nói vài câu thôi.\nNói thật ra có gì to tát đâu, mắng chửi cái gì chứ.\n그냥 회장님이 욱하셔서 한마디 하신거지. 그리고 솔직히 그렇게 막 뭐라고 그러지도 않았어요. 무슨...\nHe just lost his temper and took it out on me.\nAnd honestly,\nhe didn't really say that much! Goodness.","sourceUid":"merged-mrhdxghh-80","sourceNo":256},{"id":115,"readerNo":116,"displayNo":257,"n":257,"type":"narration","vi":"Khoảng phải vậy đâu, cái ông này.","ko":"아니 그게 아니지 이 사람아.","en":"That's not it, man.","text":"Khoảng phải vậy đâu, cái ông này.\n아니 그게 아니지 이 사람아.\nThat's not it, man.","sourceUid":"merged-mrhe0qom-81","sourceNo":257},{"id":116,"readerNo":117,"displayNo":258,"n":258,"type":"narration","vi":"Giám đốc Oh này.\nÔng nghĩ hôm đó Chủ tịch mắng như vậy là vì chuyện của Wind sao?","ko":"아니 오 대표. 회장님한테 그렇게 혼난게 윈드 때문인 것 같아요?","en":"CEO Oh,\ndo you think you got scolded by him\nbecause of Wind?","text":"Giám đốc Oh này.\nÔng nghĩ hôm đó Chủ tịch mắng như vậy là vì chuyện của Wind sao?\n아니 오 대표. 회장님한테 그렇게 혼난게 윈드 때문인 것 같아요?\nCEO Oh,\ndo you think you got scolded by him\nbecause of Wind?","sourceUid":"merged-mrhehi5l-84","sourceNo":258},{"id":117,"readerNo":118,"displayNo":259,"n":259,"type":"narration","vi":"Thực ra Chủ tịch gọi cả giám đốc Lee đến để mắng giám đốc Oh,\nmục đích là muốn giám đốc Lee nghe thấy chứ không phải giám đốc Oh đâu.","ko":"회장님이 그날 이상무님까지 불러서 오 대표를 그렇게 혼내킨 건요\n이상무님 들으라고 그러신 거예요 오 대표가 아니라","en":"The chairman also called in Mr. Lee and scolded you in front of him\nfor Mr. Lee to hear. It wasn't for you, CEO Oh.","text":"Thực ra Chủ tịch gọi cả giám đốc Lee đến để mắng giám đốc Oh,\nmục đích là muốn giám đốc Lee nghe thấy chứ không phải giám đốc Oh đâu.\n회장님이 그날 이상무님까지 불러서 오 대표를 그렇게 혼내킨 건요\n이상무님 들으라고 그러신 거예요 오 대표가 아니라\nThe chairman also called in Mr. Lee and scolded you in front of him\nfor Mr. Lee to hear. It wasn't for you, CEO Oh.","sourceUid":"merged-mrhejga4-85","sourceNo":259},{"id":118,"readerNo":119,"displayNo":261,"n":261,"type":"narration","vi":"Nhưng mà...\nhọ khá là thân thiết.\nSao phải làm vậy?","ko":"아니 두 분 사이가 있는데 왜?","en":"But...\nthey are quite close.\nSo why?","text":"Nhưng mà...\nhọ khá là thân thiết.\nSao phải làm vậy?\n아니 두 분 사이가 있는데 왜?\nBut...\nthey are quite close.\nSo why?","sourceUid":"merged-mrhem9io-88","sourceNo":261},{"id":119,"readerNo":120,"displayNo":262,"n":262,"type":"narration","vi":"Vì có mối quan hệ thân thiết,\nnên Chủ tịch mới không tiện nói thẳng thừng với giám đốc Lee.\nVậy nên mới gọi giám đốc Oh đến để nói những lời muốn nói với giám đốc Lee.","ko":"사이가 있으니까 이상무님한테 바로 하기 그럴 거 아닙니까\n그러니까 오 대표를 세워놓고 이상무한테 할 소리를 하신 거라니까","en":"Since they're close, it'd be hard to tell him directly.\nThat's why he brought you in\nand said what he wanted to say to Mr. Lee.","text":"Vì có mối quan hệ thân thiết,\nnên Chủ tịch mới không tiện nói thẳng thừng với giám đốc Lee.\nVậy nên mới gọi giám đốc Oh đến để nói những lời muốn nói với giám đốc Lee.\n사이가 있으니까 이상무님한테 바로 하기 그럴 거 아닙니까\n그러니까 오 대표를 세워놓고 이상무한테 할 소리를 하신 거라니까\nSince they're close, it'd be hard to tell him directly.\nThat's why he brought you in\nand said what he wanted to say to Mr. Lee.","sourceUid":"merged-mrheniip-90","sourceNo":262},{"id":120,"readerNo":121,"displayNo":264,"n":264,"type":"narration","vi":"Tôi đã nói rồi mà.\nChuyện niêm yết là do bộ phận IR làm.","ko":"내가 얘기했잖아요 상장은 IR팀에서 하는 거라고","en":"I told you already\nthat listing is handled by the IR Team.","text":"Tôi đã nói rồi mà.\nChuyện niêm yết là do bộ phận IR làm.\n내가 얘기했잖아요 상장은 IR팀에서 하는 거라고\nI told you already\nthat listing is handled by the IR Team.","sourceUid":"merged-mrheos17-91","sourceNo":264},{"id":121,"readerNo":122,"displayNo":269,"n":269,"type":"narration","vi":"Vậy thì sao?\nCái gì mà \"vậy thì sao\"?\nÝ tôi là không thể cứ để yên như vậy được.\nCậu đừng có nói vòng vo nữa, muốn nói gì thì nói thẳng đi.","ko":"그래서요?\n그래서는 뭐가 그래서야\n다 하고만 있으면 안 된다는 거지 내 말은\n그러니까 빙빙 돌리지 마시고 할 말 있으면 그냥 하세요","en":"- So? - What do you mean, so?\nI'm saying you shouldn't just take things.\nStop beating about the bush.\nIf you have something to say, just say it.","text":"Vậy thì sao?\nCái gì mà \"vậy thì sao\"?\nÝ tôi là không thể cứ để yên như vậy được.\nCậu đừng có nói vòng vo nữa, muốn nói gì thì nói thẳng đi.\n그래서요?\n그래서는 뭐가 그래서야\n다 하고만 있으면 안 된다는 거지 내 말은\n그러니까 빙빙 돌리지 마시고 할 말 있으면 그냥 하세요\n- So? - What do you mean, so?\nI'm saying you shouldn't just take things.\nStop beating about the bush.\nIf you have something to say, just say it.","sourceUid":"merged-mrherezz-93","sourceNo":269},{"id":122,"readerNo":123,"displayNo":270,"n":270,"type":"narration","vi":"Ông sắp đến kỳ tái ký hợp đồng rồi, đúng không?","ko":"재계약 얼마 안 남았죠.","en":"Your contract renewal is coming up, right?","text":"Ông sắp đến kỳ tái ký hợp đồng rồi, đúng không?\n재계약 얼마 안 남았죠.\nYour contract renewal is coming up, right?","sourceUid":"merged-mrheszyn-94","sourceNo":270},{"id":123,"readerNo":124,"displayNo":272,"n":272,"type":"narration","vi":"Giám đốc Oh, muốn làm việc lâu dài chuyện như này phải giải quyết rõ ràng.\nGiải quyết rõ ràng cái gì chứ?\nLà trách nhiệm của giám đốc Lee.\nPhải làm cho rõ ràng.","ko":"오래 보려면 이런 거 분명히 해야 돼 뭘 분명히 해요? 이상모님 책임이라고 확실히 해야지","en":"If you want to stick around,\nyou need to make these things clear.\nMake what clear?\nThat Mr. Lee is to blame.\nYou should make that clear.","text":"Giám đốc Oh, muốn làm việc lâu dài chuyện như này phải giải quyết rõ ràng.\nGiải quyết rõ ràng cái gì chứ?\nLà trách nhiệm của giám đốc Lee.\nPhải làm cho rõ ràng.\n오래 보려면 이런 거 분명히 해야 돼 뭘 분명히 해요? 이상모님 책임이라고 확실히 해야지\nIf you want to stick around,\nyou need to make these things clear.\nMake what clear?\nThat Mr. Lee is to blame.\nYou should make that clear.","sourceUid":"merged-mrhewi1c-97","sourceNo":272},{"id":124,"readerNo":125,"displayNo":274,"n":274,"type":"narration","vi":"Cậu làm vậy được không hả?\nĐến Chủ tịch không tiện mắng thẳng nên mới gọi tôi đến còn gì.\nVậy nên mới phải triệu tập cuộc họp hội đồng quản trị chứ.","ko":"아니 전무님이 하실 수 있어요? 회장님도 바로 혼내키지 못해서 나까지 불렀다면서?\n그러니까 이사회를 소집해야지.","en":"Could you do that? You said the chairman scolded me since he couldn't tell him directly. That's why we need to call for a board meeting.","text":"Cậu làm vậy được không hả?\nĐến Chủ tịch không tiện mắng thẳng nên mới gọi tôi đến còn gì.\nVậy nên mới phải triệu tập cuộc họp hội đồng quản trị chứ.\n아니 전무님이 하실 수 있어요? 회장님도 바로 혼내키지 못해서 나까지 불렀다면서?\n그러니까 이사회를 소집해야지.\nCould you do that? You said the chairman scolded me since he couldn't tell him directly. That's why we need to call for a board meeting.","sourceUid":"merged-mrhey4aw-98","sourceNo":274},{"id":125,"readerNo":126,"displayNo":276,"n":276,"type":"narration","vi":"Gì cơ? Còn cách nào khác sao? Ừ.","ko":"네? 뭐? 다른 방법 있어요? 어","en":"Pardon?\nWell, do you have any other ideas?\nYes.","text":"Gì cơ? Còn cách nào khác sao? Ừ.\n네? 뭐? 다른 방법 있어요? 어\nPardon?\nWell, do you have any other ideas?\nYes.","sourceUid":"merged-mrhf0d8f-99","sourceNo":276},{"id":126,"readerNo":127,"displayNo":278,"n":278,"type":"narration","vi":"Chúng tôi đến muộn chút.\nKhông đâu.\nĐến đúng lúc rồi mà.\nTôi bảo họ đến uống cùng luôn. Ông không phiền chứ?","ko":"좋습니다 아냐 아냐 뭐 딱 맞춰 구멍 뭐 오늘 같이 한잔 하자고 불렀습니다","en":"- I'm sorry I'm late. - No, no.\nYou came right on time.\nI invited them for drinks. That's okay, right?","text":"Chúng tôi đến muộn chút.\nKhông đâu.\nĐến đúng lúc rồi mà.\nTôi bảo họ đến uống cùng luôn. Ông không phiền chứ?\n좋습니다 아냐 아냐 뭐 딱 맞춰 구멍 뭐 오늘 같이 한잔 하자고 불렀습니다\n- I'm sorry I'm late. - No, no.\nYou came right on time.\nI invited them for drinks. That's okay, right?","sourceUid":"merged-mrhf7gky-103","sourceNo":278},{"id":127,"readerNo":128,"displayNo":279,"n":279,"type":"narration","vi":"Mọi người đến rồi à? Mau vào đi.\nGiám đốc Kim.\nGiám đốc Oh cũng đến rồi à?\nSao cậu lại ở đây?\nChuyện gì đâu. Tôi đến ăn cơm thôi.\nChứ còn làm gì nữa?","ko":"좋으니 맞습니다 아 아 아 아 어디 패드 왔네\n뭐 주시겠어요 좀 일이 길 밥 먹으러 왔지 왜 없겠어","en":"Mr. Han.\n- I'm here. - Hey.\nCEO Kim.\nYou're here, too, CEO Oh.\nWhat brings you here?\nWhat do you mean? I came to eat.\nWhy else?","text":"Mọi người đến rồi à? Mau vào đi.\nGiám đốc Kim.\nGiám đốc Oh cũng đến rồi à?\nSao cậu lại ở đây?\nChuyện gì đâu. Tôi đến ăn cơm thôi.\nChứ còn làm gì nữa?\n좋으니 맞습니다 아 아 아 아 어디 패드 왔네\n뭐 주시겠어요 좀 일이 길 밥 먹으러 왔지 왜 없겠어\nMr. Han.\n- I'm here. - Hey.\nCEO Kim.\nYou're here, too, CEO Oh.\nWhat brings you here?\nWhat do you mean? I came to eat.\nWhy else?","sourceUid":"merged-mrhfatma-104","sourceNo":279},{"id":128,"readerNo":129,"
